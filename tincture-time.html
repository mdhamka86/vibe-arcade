<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Tincture Time Apothecary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f2ea;         /* warm cream */
    --surface:#ffffff;    /* clean card */
    --surface2:#efece1;   /* subtle raised */
    --line:#e3ddcd;       /* hairline */
    --line2:#d6cfba;
    --sage:#6f8a6a;       /* brand green */
    --sageDeep:#42583d;   /* headings/deep */
    --sageSoft:#9db396;
    --amber:#c1863a;      /* single warm accent (the maceration) */
    --amberSoft:#e8dcc4;
    --oil:#c2a63f;
    --canna:#5f8a78;
    --ink:#2f342a;        /* text */
    --muted:#7f8574;      /* secondary */
    --danger:#b05a45;
    --r:14px;             /* one restrained radius, not over-rounded */
    --rs:10px;
    --pad:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  #root{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .app{display:flex;flex-direction:column;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;}
  a{color:var(--sageDeep);text-decoration:none;}
  .ic{flex-shrink:0;display:block;}

  /* header: quiet, editorial */
  .hdr{padding:20px var(--pad) 12px;text-align:left;}
  .wordmark{font-family:'Dancing Script',cursive;font-weight:700;font-size:30px;color:var(--sageDeep);line-height:1;}
  .kicker{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--sageSoft);margin-top:4px;}

  /* main scroll area, leaves room for tab bar */
  .main{flex:1;overflow-y:auto;padding-bottom:88px;}
  .screen{padding:4px var(--pad) 16px;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.screen{animation:none;}}

  .screenHead{display:flex;align-items:center;justify-content:space-between;margin:8px 0 18px;}
  h1{font-size:24px;font-weight:700;color:var(--sageDeep);letter-spacing:-.3px;}
  h2{font-size:19px;font-weight:600;color:var(--sageDeep);margin-bottom:16px;display:flex;align-items:center;letter-spacing:-.2px;}
  .lead{color:var(--muted);font-size:14px;margin:-8px 0 16px;}

  /* SmartImg: hotlinked image with graceful fallback */
  .smartImg{position:relative;width:100%;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:var(--surface2);margin-bottom:16px;}
  .smartImg.fallback{display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 100% at 25% 0%, #dfe6d8, var(--surface2) 70%);}
  .smartImgFallbackIcon{color:var(--sageSoft);opacity:.7;}
  .smartImgTag{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .35s ease;filter:saturate(1.05) brightness(.97);}
  .smartImgTag.loaded{opacity:1;}
  .smartImgOverlay{position:absolute;inset:0;background:linear-gradient(to top, var(--bg) 2%, rgba(245,242,234,.75) 20%, rgba(245,242,234,.15) 48%, transparent 72%);pointer-events:none;}
  .smartImgCap{position:absolute;left:16px;right:16px;bottom:12px;}
  .smartImgLabel{font-size:17px;font-weight:700;color:var(--sageDeep);letter-spacing:-.2px;line-height:1.1;}
  .smartImgSub{font-size:11.5px;font-weight:600;color:var(--sage);margin-top:3px;letter-spacing:.02em;}

  /* buttons */
  .btn{border:none;border-radius:var(--rs);font-weight:600;font-size:14px;transition:transform .08s ease,background .15s ease,opacity .15s ease;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .btn:active{transform:scale(.97);}
  .btn.isLocked{opacity:.55;}
  .btn.primary{background:var(--sage);color:#fff;padding:12px 18px;}
  .btn.primary:disabled{background:var(--line2);color:var(--muted);}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line2);padding:11px 16px;}
  .btn.danger{color:var(--danger);border-color:transparent;}
  .btn.sm{padding:9px 13px;font-size:13px;}
  .btn.big{width:100%;padding:15px;font-size:15px;}
  .fab{background:var(--sage);color:#fff;border:none;border-radius:var(--rs);padding:10px 15px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:6px;}
  .fab:active{transform:scale(.97);}
  .iconBtn{background:transparent;border:none;color:var(--sageDeep);padding:6px;display:flex;border-radius:8px;}
  .iconBtn:active{background:var(--surface2);}

  /* cards: flat, hairline border, restrained radius, NO left-stripe, NO gradient */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:var(--pad);}
  .list{display:flex;flex-direction:column;gap:10px;}

  .muted{color:var(--muted);}
  .small{font-size:13px;}
  .tiny{font-size:11.5px;}

  /* empty state */
  .empty{text-align:center;padding:56px 24px;color:var(--muted);}

  /* More menu */
  .moreRow{display:flex;align-items:center;gap:14px;width:100%;text-align:left;border:1px solid var(--line);}
  .moreIc{color:var(--sage);flex-shrink:0;}
  .moreBody{flex:1;min-width:0;}
  .moreLabel{font-weight:650;font-size:15px;color:var(--sageDeep);}
  .moreBlurb{font-size:12.5px;margin-top:1px;}
  .moreArrow{color:var(--sageSoft);flex-shrink:0;}

  /* stat cards (Stock + Sales) */
  .statGrid{display:flex;gap:10px;margin-bottom:14px;}
  .statCard{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 14px;text-align:center;}
  .statCard.wide{flex:1.6;}
  .statNum{font-size:26px;font-weight:700;color:var(--sageDeep);letter-spacing:-.5px;line-height:1;}
  .statNum.small{font-size:19px;}
  .statNum.pos{color:#3f7a43;}
  .statNum.neg{color:var(--danger);}
  .statLbl{font-size:11px;margin-top:6px;letter-spacing:.02em;}

  /* low stock banner */
  .lowBanner{display:flex;align-items:center;gap:9px;background:#fbf3e6;border:1px solid #e6cfa0;border-radius:var(--rs);padding:11px 13px;font-size:13px;color:#8a5a1f;font-weight:500;margin-bottom:14px;}

  /* threshold setter */
  .thresholdRow{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:18px;}
  .threshInp{width:54px;text-align:center;border:1px solid var(--line2);border-radius:8px;padding:5px;font-size:14px;font-weight:600;color:var(--sageDeep);}

  /* stock rows */
  .stockRow{display:flex;flex-direction:column;gap:9px;}
  .stockTop{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .stockName{font-weight:650;font-size:15px;color:var(--sageDeep);}
  .expTag{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;}
  .expTag.ok{background:#e4efe0;color:#3f7a43;}
  .expTag.soon{background:#fbf0dc;color:#9a6a2a;}
  .expTag.exp{background:#f6e0da;color:#a6432f;}
  .stockBar{height:7px;background:var(--surface2);border-radius:6px;overflow:hidden;}
  .stockBarFill{height:100%;background:var(--sage);border-radius:6px;transition:width .3s;}
  .stockNums{display:flex;gap:14px;font-size:12px;flex-wrap:wrap;}
  .stockLeft{color:var(--sageDeep);font-size:13px;}

  /* sales */
  .btn.wide{width:100%;justify-content:center;margin-bottom:16px;}
  .salesList{margin-top:6px;}
  .saleRow{position:relative;display:flex;flex-direction:column;gap:9px;}
  .saleRow .saleTop{margin-bottom:-4px;}
  .saleTop{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding-right:24px;}
  .saleWho{font-weight:650;font-size:14.5px;color:var(--sageDeep);}
  .salePrice{font-weight:700;font-size:15px;color:#3f7a43;white-space:nowrap;}
  .saleMeta{font-size:12px;line-height:1.4;}
  .saleContact{font-size:11.5px;display:flex;align-items:center;gap:5px;}
  .saleDel{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;padding:0;}
  .saleDel:active{background:var(--line);}
  .saleActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;}

  /* sales/leads section toggle */
  .sectionSeg{margin-bottom:16px;}
  .segBadge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 4px;margin-left:6px;background:var(--danger);color:#fff;border-radius:10px;font-size:10px;font-weight:700;}
  .segBtn.on .segBadge{background:#fff;color:var(--sageDeep);}

  /* sample chips in lead form */
  .sampleChips{display:flex;flex-wrap:wrap;gap:7px;}
  .sampleChip{background:var(--surface2);border:1px solid var(--line2);border-radius:20px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--muted);}
  .sampleChip.on{background:#e4efe0;border-color:var(--sage);color:var(--sageDeep);}
  .sampleChip:active{transform:scale(.97);}
  .followNote{display:flex;gap:6px;align-items:flex-start;line-height:1.4;}
  .followNote .ic{flex-shrink:0;margin-top:1px;color:var(--sage);}

  /* lead rows */
  .leadRow{display:flex;flex-direction:column;gap:10px;position:relative;}
  .leadRow.due{border-color:#e6cfa0;background:#fdfaf3;}
  .leadTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding-right:22px;}
  .leadHead{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
  .leadShop{font-weight:700;font-size:16px;color:var(--sageDeep);display:flex;align-items:center;gap:8px;flex-wrap:wrap;text-decoration:none;}
  .leadShopLink .leadMapIc{color:var(--sageSoft);}
  .leadShopLink:active{opacity:.7;}
  .leadLoc{font-size:12px;font-weight:500;}
  .leadStatus{align-self:flex-start;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
  .ls-sampled{background:#eceadd;color:#6a6a3a;}
  .ls-messaged{background:#e0eaf0;color:#3a5a72;}
  .ls-interested{background:#fbf0dc;color:#9a6a2a;}
  .ls-ordered{background:#e4efe0;color:#3f7a43;}
  .ls-passed{background:#f0e4e2;color:#96574a;}
  .leadContact{display:flex;gap:14px;font-size:12.5px;flex-wrap:wrap;}
  .leadContact span{display:inline-flex;align-items:center;gap:4px;}
  .leadSamples{display:flex;flex-wrap:wrap;gap:6px;}
  .sampleTag{font-size:11px;font-weight:600;background:var(--surface2);border:1px solid var(--line);border-radius:6px;padding:3px 8px;color:var(--sageDeep);}
  .leadDates{display:flex;gap:14px;flex-wrap:wrap;}
  .followDue{color:#a6432f;font-weight:700;}
  .leadStatusRow{display:flex;flex-wrap:wrap;gap:6px;}
  .statusPick{background:var(--surface2);border:1px solid var(--line2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--muted);opacity:.75;}
  .statusPick.on{opacity:1;border-width:1.5px;}
  .statusPick.ls-sampled.on{background:#eceadd;color:#6a6a3a;border-color:#c5c290;}
  .statusPick.ls-messaged.on{background:#e0eaf0;color:#3a5a72;border-color:#a0bcd0;}
  .statusPick.ls-interested.on{background:#fbf0dc;color:#9a6a2a;border-color:#e6cfa0;}
  .statusPick.ls-ordered.on{background:#e4efe0;color:#3f7a43;border-color:#a8cca0;}
  .statusPick.ls-passed.on{background:#f0e4e2;color:#96574a;border-color:#d8b8b0;}
  .leadEdit{background:var(--surface2);border-radius:var(--rs);padding:13px;display:flex;flex-direction:column;gap:12px;}

  /* sale form */
  .saleForm{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:16px;display:flex;flex-direction:column;gap:13px;}
  .formField{display:flex;flex-direction:column;gap:5px;}
  .formField label{font-size:12px;font-weight:600;color:var(--muted);}
  .formRow2{display:flex;gap:10px;}
  .formRow2 .formField{flex:1;min-width:0;}
  .formActions{display:flex;gap:9px;justify-content:flex-end;margin-top:2px;}
  select.inp{appearance:none;-webkit-appearance:none;background:var(--surface2);}

  /* batch record editor in cellar */
  .recordBlock{border:1px solid var(--line);border-radius:var(--rs);overflow:hidden;}
  .recordToggle{display:flex;align-items:center;gap:9px;width:100%;padding:11px 13px;background:var(--surface2);border:none;color:var(--sageDeep);font-size:13.5px;font-weight:600;text-align:left;}
  .recordToggle .recordSummary{margin-left:auto;font-weight:500;font-size:12px;}
  .recordChevron{color:var(--sageSoft);}
  .recordFields{padding:14px 13px;display:flex;flex-direction:column;gap:12px;}
  .recField{display:flex;flex-direction:column;gap:5px;}
  .recField label{font-size:11.5px;font-weight:600;color:var(--muted);}
  .recRow2{display:flex;gap:10px;}
  .recRow2 .recField{flex:1;min-width:0;}
  .proposeBtn{align-self:flex-start;background:transparent;border:1px dashed var(--line2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--sage);margin-top:2px;}
  .proposeBtn:active{background:var(--surface2);border-style:solid;}
  .expiryNote{background:#eef3ec;border-radius:var(--rs);padding:11px 12px;margin-top:2px;}
  .expiryNoteHd{display:flex;gap:7px;font-size:12px;font-weight:600;color:var(--sageDeep);line-height:1.35;margin-bottom:8px;}
  .expiryNoteHd .ic{flex-shrink:0;margin-top:1px;color:var(--sage);}
  .keepList{margin:0;padding-left:18px;display:flex;flex-direction:column;gap:5px;}
  .keepList li{font-size:12px;line-height:1.4;color:#55645a;}
  .emptyIc{margin:0 auto 14px;color:var(--sageSoft);}
  .empty p{margin:2px 0;}

  /* chips */
  .chip{font-size:11px;font-weight:600;letter-spacing:.3px;padding:2px 9px;border-radius:20px;background:var(--surface2);color:var(--muted);}
  .chip.spirit{background:var(--amberSoft);color:#8a5a1f;}
  .chip.oil{background:#eee6c4;color:#7d6a1c;}
  .chip.test{background:#d9e7e0;color:#3f6857;}

  /* jar grid */
  .jarGrid{display:flex;flex-direction:column;gap:12px;}
  .jarCard{display:flex;flex-direction:column;gap:12px;padding:16px;}
  .jarCard.ready{border-color:var(--amber);}
  .jarTop{display:flex;gap:14px;align-items:center;}
  .jarVis{width:44px;height:58px;border:1.5px solid var(--line2);border-radius:6px 6px 11px 11px;overflow:hidden;position:relative;flex-shrink:0;background:var(--surface2);}
  .fill{position:absolute;left:0;right:0;bottom:0;background:var(--amber);transition:height 1s linear;opacity:.9;}
  .fill.oil{background:var(--oil);}
  .fill.canna{background:var(--canna);}
  .jarText{min-width:0;flex:1;}
  .jarName{font-weight:650;font-size:16px;color:var(--sageDeep);line-height:1.2;letter-spacing:-.2px;}
  .jarSub{font-size:12.5px;margin-top:1px;}
  .jarSpec{font-size:12px;margin-top:5px;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 0;}
  .jarDetail{font-size:12.5px;color:var(--ink-soft,#57544d);background:var(--surface2);border-radius:var(--rs);padding:9px 12px;line-height:1.45;}

  /* clock, prominent and centred as the card's heartbeat */
  .jarClock{display:flex;align-items:center;justify-content:center;gap:8px;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--sageDeep);letter-spacing:-.5px;padding:4px 0;}
  .jarClock.done{color:var(--amber);font-size:17px;}
  .jarClock .ic{opacity:.7;}

  /* insight block, clean stacked layout */
  .insight{display:flex;flex-direction:column;gap:10px;background:var(--surface2);border-radius:var(--r);padding:13px;}
  .insightRow{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft,#57544d);line-height:1.4;}
  .insightRow .ic{color:var(--sage);flex-shrink:0;}
  .insightRow b{color:var(--sageDeep);font-weight:650;}
  .insightStrength{display:flex;flex-direction:column;gap:5px;padding-top:10px;border-top:1px solid var(--line);}
  .insightTagRow{display:flex;align-items:center;gap:9px;}
  .strengthTag{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 10px;border-radius:20px;flex-shrink:0;}
  .strengthMg{font-size:14px;font-weight:700;color:var(--sageDeep);font-variant-numeric:tabular-nums;}
  .insightDesc{font-size:12px;line-height:1.4;}
  .insightJoint{display:flex;align-items:center;gap:7px;font-size:12px;color:#8a5a1f;background:var(--amberSoft);border-radius:8px;padding:6px 10px;line-height:1.35;}
  .insightJoint .ic{color:#8a5a1f;flex-shrink:0;}
  .strengthTag.s1{background:#e7efe4;color:#40663f;}
  .strengthTag.s2{background:#d9e7e0;color:#3f6857;}
  .strengthTag.s3{background:var(--amberSoft);color:#8a5a1f;}
  .strengthTag.s4{background:#f2e0cf;color:#a05a25;}
  .strengthTag.s5{background:#f2ddd9;color:#a6432f;}
  .hint{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);justify-content:center;}
  .alarmNudge{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#8a5a1f;background:var(--amberSoft);border-radius:var(--rs);padding:10px 12px;line-height:1.45;}
  .alarmNudge .ic{margin-top:1px;flex-shrink:0;}
  .cardBtns{display:flex;gap:8px;margin-top:2px;}
  .cardBtns .btn{flex:1;}


  /* wizard */
  .wizard{display:flex;flex-direction:column;min-height:calc(100vh - 0px);padding-bottom:0;}
  .wizTop{display:flex;align-items:center;gap:12px;padding:8px 4px 18px;}
  .steps{display:flex;gap:6px;flex:1;}
  .stepDot{height:4px;flex:1;border-radius:2px;background:var(--line2);transition:background .2s;}
  .stepDot.on{background:var(--sage);}
  .stepDot.done{background:var(--sageSoft);}
  .stepLbl{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}
  .wizBody{flex:1;}
  .wizFoot{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(245,242,234,0),var(--bg) 30%);padding:16px 0 22px;}

  .step{animation:fade .2s ease;}
  @media (prefers-reduced-motion:reduce){.step{animation:none;}}

  /* big choice tiles */
  .bigChoices{display:flex;flex-direction:column;gap:12px;}
  .bigChoice{display:flex;flex-direction:column;align-items:flex-start;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;color:var(--sageDeep);transition:border-color .15s,transform .08s;}
  .bigChoice:active{transform:scale(.99);}
  .bigChoice.on{border-color:var(--sage);border-width:1.5px;}
  .bcName{font-size:18px;font-weight:700;}
  .bcSub{font-size:13px;color:var(--muted);font-weight:400;}

  /* botanical grid */
  .botGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .botBtn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:var(--rs);padding:11px 10px;color:var(--sageDeep);transition:border-color .15s,transform .08s;text-align:left;}
  .botBtn:active{transform:scale(.97);}
  .botBtn.on{border-color:var(--sage);border-width:1.5px;background:#fbfaf5;}
  .botBtn.canna{border-style:dashed;}
  .botBtn.canna.on{border-color:var(--canna);}
  .botName{font-size:13.5px;font-weight:600;line-height:1.15;}
  .botType{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
  .noteRow{margin-top:14px;padding:12px 14px;background:var(--surface2);border-radius:var(--rs);font-size:13.5px;color:var(--ink);line-height:1.45;}

  /* fields */
  .fieldRow{margin-bottom:16px;}
  .fieldRow>label{display:flex;align-items:center;font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .seg{display:flex;gap:8px;}
  .segBtn{flex:1;background:var(--surface);border:1px solid var(--line2);border-radius:var(--rs);padding:12px 8px;font-size:13.5px;font-weight:500;color:var(--muted);transition:border-color .15s,color .15s;}
  .segBtn.on{border-color:var(--sage);border-width:1.5px;color:var(--sageDeep);font-weight:600;}
  .inp{width:100%;background:var(--surface);border:1px solid var(--line2);border-radius:var(--rs);padding:12px 14px;font-size:15px;color:var(--ink);}
  .inp:focus{outline:none;border-color:var(--sage);}
  .inpSm{width:96px;background:var(--surface);border:1px solid var(--line2);border-radius:var(--rs);padding:10px 12px;font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums;}
  .inpSm:focus{outline:none;border-color:var(--sage);}

  .okRow{display:flex;align-items:center;gap:8px;background:#e7efe4;color:#3f6042;border-radius:var(--rs);padding:11px 14px;font-size:13.5px;margin-bottom:16px;}

  /* THC maker tips panel */
  .thcTips{border:1px solid var(--line2);border-radius:var(--r);margin-bottom:16px;overflow:hidden;}
  .thcTipsHd{width:100%;display:flex;align-items:center;gap:9px;background:var(--surface2);border:none;padding:13px 14px;color:var(--sageDeep);font-size:14px;font-weight:600;text-align:left;}
  .thcTipsHd:active{background:#e8e4d7;}
  .thcTipsTitle{flex:1;}
  .thcTipsToggle{font-size:12px;font-weight:600;color:var(--muted);}
  .thcTipsHd .rot{transform:rotate(90deg);}
  .thcTipsBody{padding:14px;border-top:1px solid var(--line);}
  .thcIntro{font-size:13px;margin-bottom:14px;line-height:1.45;}
  .tipGroup{margin-bottom:16px;}
  .tipGroup:last-of-type{margin-bottom:12px;}
  .tipHd{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--sageDeep);margin-bottom:8px;}
  .tipIc{color:var(--sage);flex-shrink:0;}
  .tipList{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:7px;}
  .tipList li{position:relative;padding-left:16px;font-size:13px;line-height:1.5;color:var(--ink-soft,#57544d);}
  .tipList li:before{content:"";position:absolute;left:3px;top:8px;width:4px;height:4px;border-radius:50%;background:var(--sageSoft);}
  .yieldRow{background:var(--surface2);border-radius:var(--rs);padding:12px 14px;font-size:13.5px;line-height:1.5;margin-bottom:16px;}
  .yieldRow b{color:#8a5a1f;}

  .bathRow{display:flex;gap:10px;}
  .bathRow.tight{margin-top:2px;}
  .bathStat{flex:1;background:var(--surface2);border-radius:var(--rs);padding:12px;text-align:center;}
  .bathNum{display:block;font-size:19px;font-weight:700;color:#8a5a1f;font-variant-numeric:tabular-nums;letter-spacing:-.3px;}
  .bathNum.warn{color:var(--danger);}
  .bathLbl{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}

  /* decarb note: bordered card, no stripe */
  .decarbCard{border:1px solid #e2c4bb;background:#faf1ee;border-radius:var(--r);padding:14px;margin-bottom:16px;}
  .decarbHd{display:flex;align-items:center;gap:7px;font-weight:600;font-size:14px;color:var(--danger);margin-bottom:12px;}
  .decarbCard p{margin:10px 0;line-height:1.45;}

  /* review */
  .reviewCard{margin-bottom:14px;}
  .rvName{font-size:18px;font-weight:700;color:var(--sageDeep);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .rvGrid{display:flex;gap:10px;margin-bottom:14px;}
  .rvGrid>div{flex:1;background:var(--surface2);border-radius:var(--rs);padding:14px;text-align:center;}
  .rvNum{display:block;font-size:21px;font-weight:700;color:var(--sageDeep);font-variant-numeric:tabular-nums;}
  .rvLbl{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:3px;}
  .reviewCard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;}
  .overrides{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .sealCard{background:var(--surface2);border-radius:var(--r);padding:14px;}
  .sealHd{display:flex;align-items:center;gap:7px;font-weight:600;font-size:13.5px;color:var(--sageDeep);margin-bottom:8px;}
  .sealCard p{font-size:13px;line-height:1.5;margin-bottom:10px;}

  /* link rows */
  .linkRow{display:flex;align-items:center;gap:8px;color:var(--sageDeep);font-size:13.5px;font-weight:500;padding:4px 0;}
  .linkRow:active{opacity:.6;}

  /* cellar rows */
  .cellarRow{display:flex;flex-direction:column;gap:12px;}
  .cellarRow.proven{border-color:var(--amber);}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .rowName{font-weight:600;font-size:15px;color:var(--sageDeep);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .rowSub{font-size:12.5px;margin-top:1px;}
  .rowRight{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
  .rowStamp{font-size:10.5px;text-align:right;line-height:1.3;white-space:nowrap;}

  /* photo captions */
  .capTag{position:absolute;left:4px;bottom:4px;right:4px;background:rgba(28,27,24,.62);color:#f3f0e6;border:none;border-radius:7px;padding:4px 7px;font-size:11px;font-weight:500;text-align:left;line-height:1.25;max-height:44px;overflow:hidden;}
  .capTag.has{background:rgba(28,27,24,.72);}
  .capEditor{position:absolute;left:4px;right:4px;bottom:4px;display:flex;gap:4px;}
  .capInput{flex:1;min-width:0;border:none;border-radius:7px;padding:4px 7px;font-size:11px;background:rgba(255,255,255,.95);color:var(--ink);}
  .capInput:focus{outline:none;}
  .capSave{flex-shrink:0;width:26px;border:none;border-radius:7px;background:var(--sage);color:#fff;display:flex;align-items:center;justify-content:center;}

  /* appending note list */
  .noteList{display:flex;flex-direction:column;gap:8px;}
  .noteItem{display:flex;gap:9px;align-items:flex-start;background:var(--surface2);border-radius:var(--rs);padding:10px 11px;}
  .noteIcon{color:var(--sageSoft);margin-top:2px;flex-shrink:0;}
  .noteBody{flex:1;min-width:0;}
  .noteText{font-size:13px;line-height:1.45;color:var(--ink-soft,#57544d);}
  .noteStamp{font-size:10.5px;margin-top:3px;}
  .noteDel{flex-shrink:0;width:20px;height:20px;border:none;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;padding:0;border-radius:50%;}
  .noteDel:active{background:var(--line);}

  /* delete confirm */
  .delConfirm{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:#faf1ee;border:1px solid #e2c4bb;border-radius:var(--rs);padding:11px 13px;font-size:13px;color:#a6543f;font-weight:500;}
  .delBtns{display:flex;gap:7px;}
  .btn.primary.danger{background:var(--danger);}
  .rowMeta{font-size:12.5px;margin-top:3px;}
  .starBtn{background:transparent;border:none;color:var(--line2);padding:4px;display:flex;transition:transform .1s;}
  .starBtn:active{transform:scale(1.2);}
  .starBtn.on{color:var(--amber);}

  /* rating chip in the name row */
  .chip.rate{border:1px solid transparent;}
  .chip.rate.off{background:#f2e3df;color:#a6543f;}
  .chip.rate.good{background:#e7efe4;color:#40663f;}
  .chip.rate.great{background:var(--amberSoft);color:#8a5a1f;}

  /* quick rating capture */
  .rateRow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .rateLbl{font-size:13px;color:var(--muted);font-weight:500;}
  .rateBtns{display:flex;gap:6px;}
  .rateBtn{border:1px solid var(--line2);background:var(--surface);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);transition:border-color .15s,color .15s,background .15s;}
  .rateBtn:active{transform:scale(.96);}
  .rateBtn.off:hover,.rateBtn.off:focus{border-color:#c98a78;color:#a6543f;}
  .rateBtn.good:hover,.rateBtn.good:focus{border-color:var(--sageSoft);color:#40663f;}
  .rateBtn.great:hover,.rateBtn.great:focus{border-color:var(--amber);color:#8a5a1f;}

  /* saved note */
  .savedNote{display:flex;gap:8px;align-items:flex-start;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:13px;color:var(--ink-soft,#57544d);line-height:1.45;}
  .savedNote .ic{color:var(--sageSoft);margin-top:2px;flex-shrink:0;}

  /* note editor */
  .noteEditor{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .noteEditor .inp{flex:1;}
  .noteEditor .btn{flex-shrink:0;}

  /* row actions: mini buttons */
  .rowActions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);flex-wrap:wrap;}
  .miniBtn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line2);border-radius:var(--rs);padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--sageDeep);transition:border-color .15s,background .15s;}
  .miniBtn:active{transform:scale(.97);}
  .miniBtn:hover{border-color:var(--sage);background:#fbfaf5;}

  /* batch photo gallery */
  .photoGallery{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-top:2px;-webkit-overflow-scrolling:touch;}
  .galleryItem{position:relative;flex:0 0 auto;width:130px;height:130px;border-radius:var(--rs);overflow:hidden;border:1px solid var(--line);}
  .galleryItem img{width:100%;height:100%;object-fit:cover;display:block;}
  .photoDel{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;border:none;background:rgba(28,27,24,.6);color:#fff;display:flex;align-items:center;justify-content:center;padding:0;}
  .photoDel:active{background:rgba(28,27,24,.85);}

  /* golden vs swampy colour guide */
  .colourGuide{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:var(--pad);margin-bottom:14px;}
  .cgTitle{font-size:14px;font-weight:600;color:var(--sageDeep);margin-bottom:4px;}
  .cgIntro{font-size:12.5px;line-height:1.45;margin-bottom:14px;}
  .cgRow{display:flex;gap:10px;}
  .cgCard{flex:1;border:1px solid var(--line);border-radius:var(--rs);padding:12px;text-align:center;}
  .cgCard.good{border-color:var(--sageSoft);}
  .cgCard.bad{border-color:#cbb89a;}
  .cgSwatch{width:100%;height:52px;border-radius:8px;margin-bottom:9px;}
  .cgSwatch.golden{background:linear-gradient(160deg,#e6b859,#c1863a);}
  .cgSwatch.swampy{background:linear-gradient(160deg,#7d8a3f,#4a5527);}
  .cgLabel{font-size:13.5px;font-weight:700;color:var(--sageDeep);margin-bottom:4px;}
  .cgDesc{font-size:11.5px;line-height:1.4;}
  .cgNote{font-size:11.5px;line-height:1.45;margin-top:12px;}

  /* guides */
  .guideCard{display:flex;flex-direction:column;gap:12px;}
  .guideHd{display:flex;gap:11px;align-items:flex-start;}
  .guideIc{color:var(--sage);margin-top:2px;}
  .guideStage{font-weight:600;font-size:15px;color:var(--sageDeep);}
  .guideBlurb{font-size:13px;line-height:1.4;margin-top:2px;}
  .guideLinks{display:flex;flex-direction:column;gap:2px;border-top:1px solid var(--line);padding-top:8px;}

  /* kit */
  .kitSec{margin-bottom:22px;}
  .kitLbl{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .buyIntro{font-size:12px;line-height:1.45;margin:-4px 0 10px;}
  .buyRow{display:flex;flex-direction:column;gap:7px;}
  .buyName{font-weight:650;font-size:14.5px;color:var(--sageDeep);display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;}
  .buyRank{font-size:11px;font-weight:600;color:#8a5a1f;background:var(--amberSoft);padding:2px 8px;border-radius:20px;}
  .buyNote{line-height:1.4;}
  .buyLinks{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px;}
  .buyChip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--sageDeep);border:1px solid var(--line2);border-radius:20px;padding:5px 11px;transition:border-color .15s,background .15s;}
  .buyChip:active{transform:scale(.97);}
  .buyChip:hover{border-color:var(--sage);background:#fbfaf5;}
  .buyLine{margin-top:12px;}
  .shopRow{display:flex;align-items:center;gap:12px;text-decoration:none;}
  .shopBody{flex:1;min-width:0;}
  .shopName{font-weight:650;font-size:14.5px;color:var(--sageDeep);display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;}
  .shopArea{font-size:11px;font-weight:600;color:var(--sage);background:#eef3ec;padding:2px 8px;border-radius:20px;}
  .shopArrow{color:var(--sageSoft);flex-shrink:0;}
  .shopDir{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--sage);margin-top:5px;}
  .shopDir .ic{flex-shrink:0;}
  .kitRow{display:flex;gap:12px;align-items:flex-start;}
  .kitTick{color:var(--sage);display:flex;margin-top:1px;flex-shrink:0;}
  .kitName{font-weight:600;font-size:14.5px;color:var(--sageDeep);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .kitBody{flex:1;min-width:0;}
  .checkBox{width:22px;height:22px;flex-shrink:0;border:1.5px solid var(--line2);border-radius:6px;background:var(--surface);color:var(--sage);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:border-color .15s;}
  .checkBox.on{border-color:var(--sage);background:#eef3ec;}
  .kitRow.got .kitName{color:var(--muted);}
  .urg{font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:20px;}
  .urg.now{background:var(--amberSoft);color:#8a5a1f;}
  .urg.later{background:var(--surface2);color:var(--muted);}

  /* tooltip */
  .infoWrap{position:relative;display:inline-flex;margin-left:6px;vertical-align:middle;}
  .infoDot{width:18px;height:18px;border:none;background:transparent;color:var(--sageSoft);display:flex;align-items:center;justify-content:center;padding:0;}
  .infoPop{position:absolute;top:24px;left:50%;transform:translateX(-50%);width:220px;z-index:50;background:var(--sageDeep);color:#f3f0e6;font-size:12.5px;font-weight:400;line-height:1.5;letter-spacing:0;text-transform:none;padding:11px 13px;border-radius:10px;box-shadow:0 8px 24px -8px rgba(47,52,42,.4);}
  .infoPop:before{content:"";position:absolute;top:-5px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:var(--sageDeep);}

  /* bottom tab bar */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;display:flex;background:var(--surface);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:30;}
  .tab{flex:1;min-width:0;background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted);font-size:10.5px;font-weight:500;transition:color .15s;}
  .tab.on{color:var(--sage);}
  .tab span{letter-spacing:.1px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;font-size:clamp(9px, 2.6vw, 10.5px);}

  /* sous weed topic cards */
  .testBanner{display:flex;align-items:center;gap:7px;background:#faf1ee;border:1px solid #e2c4bb;color:#a6543f;border-radius:var(--rs);padding:9px 13px;font-size:12.5px;font-weight:500;margin-bottom:14px;}
  .topicCard{padding:0;overflow:hidden;}
  .topicHd{width:100%;display:flex;align-items:center;gap:11px;background:transparent;border:none;padding:15px var(--pad);color:var(--sageDeep);font-size:14.5px;font-weight:600;text-align:left;}
  .topicHd:active{background:var(--surface2);}
  .topicIc{color:var(--sage);flex-shrink:0;}
  .topicTitle{flex:1;}
  .topicHd .rot{transform:rotate(90deg);}
  .topicBody{padding:2px var(--pad) 16px;border-top:1px solid var(--line);}
  .topicIntro{font-size:13px;line-height:1.5;margin:12px 0 12px;}

  .sourceRow{display:flex;flex-direction:column;gap:4px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);}

  /* potency calculator */
  .calc{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:var(--pad);margin-bottom:14px;}
  .calc.embedded{background:var(--surface2);margin-bottom:16px;}
  .calcHd{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--sageDeep);margin-bottom:13px;}
  .calcIc{color:var(--sage);}
  .calcInputs{display:flex;gap:8px;}
  .calcField{flex:1;min-width:0;}
  .calcField label{display:block;font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .calcField .inp{padding:10px 10px;font-size:15px;text-align:center;}
  .calcResult{display:flex;gap:8px;margin-top:14px;}
  .calcStat{flex:1;background:var(--surface2);border-radius:var(--rs);padding:12px 8px;text-align:center;}
  .calc.embedded .calcStat{background:var(--surface);}
  .calcStat.big{background:var(--amberSoft);}
  .calcNum{display:block;font-size:20px;font-weight:700;color:var(--sageDeep);font-variant-numeric:tabular-nums;letter-spacing:-.3px;}
  .calcStat.big .calcNum{color:#8a5a1f;}
  .calcLbl{display:block;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:3px;line-height:1.3;}
  .calcHint{margin-top:14px;font-size:13px;text-align:center;padding:10px;}
  .calcNote{margin-top:12px;font-size:11.5px;line-height:1.45;}

  /* strain picker */
  .strainPick{margin-bottom:14px;}
  .strainToggle{width:100%;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line2);border-radius:var(--rs);padding:11px 13px;font-size:13.5px;font-weight:500;color:var(--sageDeep);text-align:left;}
  .strainToggle span{flex:1;}
  .strainIc{color:var(--sage);flex-shrink:0;}
  .strainToggle .rot{transform:rotate(90deg);}
  .strainPanel{margin-top:8px;border:1px solid var(--line);border-radius:var(--rs);padding:10px;background:var(--surface);}
  .strainSearch{margin-bottom:8px;font-size:14px;}
  .strainList{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
  .strainRow{display:flex;align-items:center;gap:8px;background:transparent;border:none;border-radius:8px;padding:9px 10px;text-align:left;transition:background .12s;}
  .strainRow:active{background:var(--surface2);}
  .strainRow:hover{background:var(--surface2);}
  .strainName{flex:1;font-size:13.5px;font-weight:500;color:var(--ink);}
  .strainThc{font-size:13px;font-weight:700;color:#8a5a1f;font-variant-numeric:tabular-nums;}
  .strainType{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--muted);}
  .strainType.sativa{background:#eef3ec;color:#4f7d3f;}
  .strainType.indica{background:#efe8f0;color:#6f5a8a;}
  .strainType.hybrid{background:#f5ecdf;color:#8a6a2f;}
  .strainType.cbd{background:#d9e7e0;color:#3f6857;}
  .strainEmpty{padding:12px;text-align:center;font-size:13px;}
  .strainNote{margin-top:8px;font-size:11px;line-height:1.4;padding:0 2px;}

  /* carrier selector */
  .calcField.full{margin-bottom:12px;}
  .carrierGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
  .carrierBtn{background:var(--surface);border:1px solid var(--line2);border-radius:var(--rs);padding:9px 6px;font-size:12px;font-weight:600;color:var(--muted);transition:border-color .15s,color .15s;text-align:center;line-height:1.2;}
  .carrierBtn.withEff{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;}
  .carrierBtnName{display:block;}
  .effBadge{font-size:10px;font-weight:700;letter-spacing:.2px;padding:1px 7px;border-radius:20px;}
  .effBadge.e5{background:#d5e5cf;color:#356030;}
  .effBadge.e4{background:#dfead9;color:#40663f;}
  .effBadge.e3{background:#eae7d2;color:#7a6a2a;}
  .effBadge.e2{background:#f0e2cf;color:#9a6a2a;}
  .effBadge.e1{background:#f2ddd9;color:#a6432f;}
  .effLegend{font-size:11px;line-height:1.4;margin:-8px 0 14px;}
  .calc.embedded .carrierBtn{background:var(--surface);}
  .carrierBtn:active{transform:scale(.97);}
  .carrierBtn.on{border-color:var(--sage);border-width:1.5px;color:var(--sageDeep);}
  .carrierNote{font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:14px;}
  .calcModeRow{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
  .calcModeLbl{font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);}
  .calcModeSeg{width:100%;}
  .ratioTag{display:inline-block;background:var(--amberSoft);color:#8a5a1f;font-weight:600;font-size:11px;padding:1px 8px;border-radius:20px;margin-left:2px;white-space:nowrap;}
  .weakTag{display:inline-block;background:#f2e3df;color:#a6543f;font-weight:600;font-size:11px;padding:1px 8px;border-radius:20px;margin-left:6px;white-space:nowrap;}

function makeThumb(file, maxPx, cb) {
  try {
    var reader = new FileReader();

      var img = new Image();
      img.onload = function () {
        var w = img.width; var h = img.height;
        var scale = Math.min(1, maxPx / Math.max(w, h));
        var cw = Math.round(w * scale); var ch = Math.round(h * scale);
        var canvas = document.createElement("canvas");
        canvas.width = cw; canvas.height = ch;
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, cw, ch);
        var out = canvas.toDataURL("image/jpeg", 0.72);
        cb(out);
      };
      img.onerror = function () { cb(null); };
      img.src = e.target.result;
    };
    reader.onerror = function () { cb(null); };
    reader.readAsDataURL(file);
  } catch (err) { cb(null); }
}

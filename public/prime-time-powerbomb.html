// ---------- Booking: build the card across five explicit slots ----------
// Slots 1/3/5 are matches (5 is the main event), 2/4 are promos/vignettes.
// A wrestler who has already worked a MATCH this week is locked out of
// further matches (greyed, unpickable) but stays available for promos,
// unless an in-week event has sprung them loose.
const SLOT_PLAN = [
  { kind: "match", label: "Opening Match", short: "MATCH 1" },
  { kind: "promo", label: "Promo / Vignette", short: "PROMO 1" },
  { kind: "match", label: "Mid-Card Match", short: "MATCH 2" },
  { kind: "promo", label: "Promo / Vignette", short: "PROMO 2" },
  { kind: "match", label: "Main Event", short: "MAIN EVENT", main: true },
];

function Booking({ player, card, week, totalWeeks, onAdd, onRemove, onRun, freedFromLock, lockEventNote, storylines, sortMode, onSortChange }) {
  const SLOTS = SLOT_PLAN.length;
  const slotIdx = card.length;
  const plan = SLOT_PLAN[Math.min(slotIdx, SLOTS - 1)];
  const isMain = plan && plan.main;
  const slotIsMatch = plan && plan.kind === "match";
  const [segType, setSegType] = useState(null);
  const [chosen, setChosen] = useState([]);

  const available = player.roster.filter(w => w.injured <= 0);

  // wrestlers (by id) who have already worked a MATCH on a previously-booked slot
  const matchUsed = new Set();
  card.forEach(c => {
    if (c.seg.kind !== "promo") c.participantIds.forEach(id => matchUsed.add(id));
  });
  // an in-week event can spring specific wrestlers loose from the lock
  const freed = freedFromLock || new Set();
  const isLockedForMatch = (w) => matchUsed.has(w.id) && !freed.has(w.id);

  // which segment types are valid for THIS slot: gated by the slot's kind first,
  // then (for the main event) restricted to the marquee options.
  const validTypes = SEGMENT_TYPES.filter(s => {
    if (slotIsMatch) {
      if (s.kind === "promo") return false;
      if (isMain) return s.tiers.includes("main") || s.bigmatch || s.base >= 66;
      return true;
    }
    return s.kind === "promo";
  });

  // eligible participants for the chosen segment type, respecting team/singles + tier.
  // for MATCH slots, match-locked wrestlers are excluded entirely.
  function eligibleFor(seg) {
    return available.filter(w => {
      if (seg.team && !w.isTeam) return false;
      if (!seg.team && w.isTeam) return false;
      const t = wrestlerTier(w);
      if (!seg.tiers.includes(t)) return false;
      if (seg.kind !== "promo" && isLockedForMatch(w)) return false;
      return true;
    });
  }

  function togglePick(w) {
    if (!segType) return;
    if (segType.kind !== "promo" && isLockedForMatch(w)) return; // belt and braces
    setChosen(prev => {
      if (prev.find(x => x.id === w.id)) return prev.filter(x => x.id !== w.id);
      if (prev.length >= segType.slots) return prev;
      return [...prev, w];
    });
  }

  // champion-in-a-non-title-match check: if a chosen wrestler holds the relevant
  // belt and the segment isn't already a title match, ask whether to risk the gold.
  function championInPlay() {
    if (!segType || segType.kind === "title" || segType.kind === "tagtitle") return null;
    if (segType.kind === "promo") return null;
    const champ = chosen.find(w => w.isChampion && ((segType.team && w.isTagChampion) || (!segType.team && !w.isTeam && w.isChampion && !w.isTagChampion)));
    return champ || null;
  }

  function confirmSlot() {
    if (!segType || chosen.length !== segType.slots) return;
    const champ = championInPlay();
    if (champ) {
      setPendingConfirm({ segType, chosen, champ });
      return;
    }
    onAdd(segType, chosen);
    setSegType(null);
    setChosen([]);
  }

  // local title-match prompt state (kept in-component so it overlays the picker)
  const [pendingConfirm, setPendingConfirm] = useState(null);
  function resolveTitlePrompt(putOnLine) {
    if (!pendingConfirm) return;
    const { segType: st, chosen: ch } = pendingConfirm;
    if (putOnLine) {
      // swap to the matching title segment type so the belt is genuinely at stake
      const titleType = SEGMENT_TYPES.find(s => st.team ? s.kind === "tagtitle" : s.kind === "title" && !s.hardcore) || st;
      onAdd(titleType, ch);
    } else {
      onAdd(st, ch);
    }
    setPendingConfirm(null);
    setSegType(null);
    setChosen([]);
  }

  if (pendingConfirm) {
    const champ = pendingConfirm.champ;
    const belt = champ.isTagChampion ? "tag team titles" : "championship";
    return (
      <div>
        <WeekHeader week={week} totalWeeks={totalWeeks} money={null} title="Title On The Line?" />
        <Card style={{ borderColor: "#ffd54f55" }}>
          <div style={{ fontSize: 10, letterSpacing: ".15em", color: "#ffd54f", fontWeight: 800, marginBottom: 8 }}>CHAMPION IN A NON-TITLE MATCH</div>
          <div style={{ fontSize: 14, color: "#ece8f5", lineHeight: 1.55 }}>
            <b style={{ color: "#ffd54f" }}>{champ.name}</b> is walking into this one holding the {belt}. Do you want to put the gold on the line, or keep it a non-title bout?
          </div>
          <div style={{ fontSize: 12, color: "#9b94b3", marginTop: 8, lineHeight: 1.5 }}>
            Putting it on the line rates higher and means more if they win, but a hot challenger could walk out with your belt.
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            <button onClick={() => resolveTitlePrompt(true)} className="ptp-btn" style={{ flex: 1, padding: "11px", background: "#1f1a0c", color: "#ffd54f", border: "1px solid #ffd54f55", borderRadius: 6, fontFamily: display, fontWeight: 800, fontSize: 13, cursor: "pointer" }}>Put the belt on the line</button>
            <button onClick={() => resolveTitlePrompt(false)} className="ptp-btn" style={{ flex: 1, padding: "11px", background: "transparent", color: "#9b94b3", border: "1px solid #261f38", borderRadius: 6, fontFamily: display, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Keep it non-title</button>
          </div>
        </Card>
      </div>
    );
  }

  if (card.length >= SLOTS) {
    // card complete, review + run
    return (
      <div>
        <WeekHeader week={week} totalWeeks={totalWeeks} money={null} title="The Card Is Set" />
        <Card>
          {card.map((c, i) => {
            const seg = c.seg;
            const parts = c.participantIds.map(id => player.roster.find(r => r.id === id)).filter(Boolean);
            const main = i === SLOTS - 1;
            const sp = SLOT_PLAN[i];
            const isPromoSlot = sp && sp.kind === "promo";
            return (
              <div key={i} style={{ padding: "10px 0", borderBottom: i < SLOTS - 1 ? "1px solid #1d1830" : "none" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <span style={{ fontSize: 10, color: main ? "#ffd54f" : isPromoSlot ? "#9d8cff" : "var(--accent)", fontWeight: 800, letterSpacing: ".12em" }}>
                      {main ? "★ MAIN EVENT" : `SLOT ${i + 1} · ${isPromoSlot ? "PROMO" : "MATCH"}`}
                    </span>
                    <div style={{ fontFamily: display, fontWeight: 800, fontSize: 15 }}>{seg.label}</div>
                    <div style={{ fontSize: 12, color: "#9b94b3" }}>{parts.map(p => p.name).join(seg.kind === "promo" && parts.length > 1 ? " vs " : seg.team ? " vs " : parts.length > 2 ? ", " : " vs ")}</div>
                  </div>
                  <button onClick={() => onRemove(i)} className="ptp-btn" style={{ background: "transparent", color: "#ff7088", border: "1px solid #3a2230", borderRadius: 4, padding: "4px 9px", fontSize: 11, cursor: "pointer", fontWeight: 700 }}>Drop</button>
                </div>
              </div>
            );
          })}
        </Card>
        <AccentBtn onClick={onRun}>Go live · Run the show</AccentBtn>
      </div>
    );
  }

  return (
    <div>
      <WeekHeader week={week} totalWeeks={totalWeeks} money={null} title={isMain ? "Book the Main Event" : `Book ${plan.label}`} />
      <div style={{ display: "flex", gap: 5, marginBottom: 6 }}>
        {SLOT_PLAN.map((sp, i) => (
          <div key={i} style={{ flex: 1, height: 5, borderRadius: 3,
            background: i < card.length ? (sp.main ? "#ffd54f" : sp.kind === "promo" ? "#9d8cff" : "var(--accent)")
              : i === card.length ? "#4a4366" : "#1d1830" }} />
        ))}
      </div>
      <div style={{ display: "flex", gap: 5, marginBottom: 12 }}>
        {SLOT_PLAN.map((sp, i) => (
          <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 7.5, letterSpacing: ".06em", fontWeight: 700,
            color: i === card.length ? "#cfc8e6" : "#5a5470" }}>{sp.main ? "MAIN" : sp.kind === "promo" ? "PROMO" : "MATCH"}</div>
        ))}
      </div>

      {lockEventNote && card.length === 0 && (
        <div style={{ fontSize: 12, color: "#ffd9a8", background: "#1f1709", border: "1px solid #4a3318", borderRadius: 6, padding: "8px 11px", marginBottom: 10, lineHeight: 1.45 }}>
          <b style={{ color: "#ffb968" }}>In-week event · </b>{lockEventNote}
        </div>
      )}

      {storylines && storylines.filter(s => s.status === "active").length > 0 && (
        <Card style={{ borderColor: "#3a2a4a", padding: "9px 13px", marginBottom: 10 }}>
          <div style={{ fontSize: 10, letterSpacing: ".14em", color: "#c79bff", fontWeight: 800, marginBottom: 6 }}>ACTIVE STORYLINES</div>
          {storylines.filter(s => s.status === "active").map(s => {
            const arch = storylineArchetypeById(s.archId);
            return (
              <div key={s.id} style={{ fontSize: 12, color: "#cfc8e6", padding: "3px 0", lineHeight: 1.4 }}>
                <b style={{ color: "#c79bff" }}>{s.aName} vs {s.bName}</b> · {arch ? arch.name : "Angle"} · heat {s.heat}
                <div style={{ fontSize: 10.5, color: "#8c85a6" }}>Book them together to escalate it.</div>
              </div>
            );
          })}
        </Card>
      )}

      {!segType && (
        <>
          <div style={{ fontSize: 12, color: "#9b94b3", marginBottom: 8 }}>
            {isMain ? "The main event carries double weight in the ratings. Pick your biggest match."
              : slotIsMatch ? "This is a match slot. Anyone you book here is then locked out of further matches tonight, though they can still cut a promo."
              : "This is a promo or vignette slot. Talking segments build stories and heat without burning a wrestler's one match for the night."}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {validTypes.map(s => {
              const elig = eligibleFor(s);
              const ok = elig.length >= s.slots;
              const isTitleType = s.kind === "title" || s.kind === "tagtitle";
              return (
                <button key={s.id} disabled={!ok} onClick={() => { setSegType(s); setChosen([]); }} className="ptp-pick" style={{
                  textAlign: "left", padding: "11px 12px", borderRadius: 6, cursor: ok ? "pointer" : "default",
                  background: isTitleType ? "#1f1a0c" : "#120f1d",
                  border: `1.5px solid ${ok ? (isTitleType ? "#ffd54f55" : "#261f38") : "#1a1626"}`,
                  opacity: ok ? 1 : 0.42, color: "#ece8f5",
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontFamily: display, fontWeight: 800, fontSize: 13, color: isTitleType ? "#ffd54f" : "#f3eeff" }}>{s.label}</span>
                    <span style={{ fontSize: 9, color: "#6f6889" }}>{s.slots}{s.team ? " tms" : ""}</span>
                  </div>
                  <div style={{ fontSize: 10.5, color: "#8c85a6", marginTop: 3, lineHeight: 1.35 }}>{s.desc}</div>
                  {!ok && <div style={{ fontSize: 9, color: "#ff7088", marginTop: 4 }}>Not enough eligible {s.team ? "teams" : "wrestlers"}</div>}
                </button>
              );
            })}
          </div>
        </>
      )}

      {segType && (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div>
              <span style={{ fontFamily: display, fontWeight: 800, fontSize: 16, color: (segType.kind === "title" || segType.kind === "tagtitle") ? "#ffd54f" : "var(--accent)" }}>{segType.label}</span>
              <span style={{ fontSize: 12, color: "#9b94b3", marginLeft: 8 }}>pick {segType.slots}</span>
            </div>
            <button onClick={() => { setSegType(null); setChosen([]); }} className="ptp-btn" style={{ background: "transparent", color: "#9b94b3", border: "1px solid #261f38", borderRadius: 4, padding: "5px 10px", fontSize: 11, cursor: "pointer", fontWeight: 700 }}>Change type</button>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "2px 0 6px" }}>
            <span style={{ fontSize: 10, letterSpacing: ".12em", color: "#6f6889", fontWeight: 700 }}>SORT BY</span>
            <SortToggle mode={sortMode} onChange={onSortChange} />
          </div>
          <Card style={{ padding: "6px 14px" }}>
            {sortRoster(eligibleFor(segType), sortMode).map(w => {
              const sel = chosen.find(x => x.id === w.id);
              return (
                <div key={w.id} onClick={() => togglePick(w)} style={{ cursor: "pointer", background: sel ? "#1c1730" : "transparent", borderRadius: 5, paddingLeft: 8, paddingRight: 8, marginLeft: -8, marginRight: -8, border: sel ? "1px solid var(--accent)" : "1px solid transparent" }}>
                  <RosterRow w={w} accent={sel ? "var(--accent)" : undefined} compact right={
                    <div style={{ textAlign: "right", minWidth: 30 }}>
                      <div style={{ fontSize: 16, fontWeight: 900, color: sel ? "var(--accent)" : "#3a3450" }}>{sel ? "✓" : "+"}</div>
                    </div>
                  } />
                </div>
              );
            })}
            {segType.kind !== "promo" && sortRoster(available.filter(w => {
              if (segType.team && !w.isTeam) return false;
              if (!segType.team && w.isTeam) return false;
              if (!segType.tiers.includes(wrestlerTier(w))) return false;
              return isLockedForMatch(w);
            }), sortMode).map(w => (
              <div key={w.id} style={{ opacity: 0.4, paddingLeft: 8, paddingRight: 8, marginLeft: -8, marginRight: -8 }}>
                <RosterRow w={w} compact right={
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 9, color: "#ff9d6f", fontWeight: 800, letterSpacing: ".05em" }}>WORKED</div>
                    <div style={{ fontSize: 8.5, color: "#6f6889" }}>match used</div>
                  </div>
                } />
              </div>
            ))}
          </Card>
          <AccentBtn onClick={confirmSlot} disabled={chosen.length !== segType.slots}>
            {chosen.length === segType.slots ? (isMain ? "Lock the main event" : "Add to the card") : `Choose ${segType.slots - chosen.length} more`}
          </AccentBtn>
        </>
      )}
    </div>
  );
}

// ---------- ShowTime: optional sabotage, then the live ticker ----------
function ShowTime({ player, rival, pShow, rShow, sabotageOptions, money, sabotageDone, onSabotage, onSkipSabotage, revealIdx, setRevealIdx, onSettle }) {
  // flatten the player's show into a single ticker stream of beats.
  // segends carrying a title change, or a high-rated match (a storyline-grade
  // moment), are flagged pauseOn so the auto-roll taps the brakes there.
  const stream = useMemo(() => {
    const beats = [];
    pShow.card.forEach((res, si) => {
      const main = si === pShow.card.length - 1;
      beats.push({ type: "seghead", seg: res.seg, parts: res.participants, main, rating: res.rating, stars: res.stars });
      res.timeline.forEach(b => beats.push({ ...b, seg: res.seg }));
      const bigMoment = !!res.titleChange || (res.seg.kind !== "promo" && res.rating >= 78) || main;
      beats.push({ type: "segend", seg: res.seg, rating: res.rating, stars: res.stars, titleChange: res.titleChange, main, pauseOn: bigMoment });
    });
    return beats;
  }, [pShow]);

  const done = revealIdx >= stream.length;
  const [auto, setAuto] = useState(false);   // is the broadcast auto-rolling right now?
  const started = revealIdx > 0;

  // auto-roll: advance one beat at a time on a timer, but stop when the beat we
  // just revealed is a flagged big moment (title change / marquee match), letting
  // it breathe. The player taps Continue to resume the roll.
  useEffect(() => {
    if (!auto || done) return;
    const justRevealed = stream[revealIdx - 1];
    if (justRevealed && justRevealed.pauseOn) { setAuto(false); return; }
    const next = stream[revealIdx];
    const delay = next && next.type === "seghead" ? 850 : next && next.type === "segend" ? 700 : 520;
    const t = setTimeout(() => setRevealIdx(i => Math.min(stream.length, i + 1)), delay);
    return () => clearTimeout(t);
  }, [auto, revealIdx, done, stream]);

  function startBroadcast() { setRevealIdx(1); setAuto(true); }
  function stepForward() { setRevealIdx(i => Math.min(stream.length, i + 1)); }
  function resumeRoll() { setRevealIdx(i => Math.min(stream.length, i + 1)); setAuto(true); }

  // sabotage gate first
  if (!sabotageDone) {
    return (
      <div>
        <Eyebrow color="#ff7088">Before you go live · Dirty tricks</Eyebrow>
        <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 26, margin: "4px 0 6px" }}>War room</h2>
        <p style={{ color: "#8c85a6", fontSize: 13, marginBottom: 12 }}>
          The rival is taping their show right now. Pull a stunt to swing the night, or run clean and let the wrestling do the talking. Each trick has a backfire risk.
        </p>
        {sabotageOptions.map(opt => (
          <Card key={opt.id} style={{ padding: 13 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <span style={{ fontFamily: display, fontWeight: 800, fontSize: 15, color: "#ff8fa3" }}>{opt.label}</span>
              <span style={{ fontSize: 12, color: "#54e0a0", fontWeight: 700 }}>${opt.cost}K</span>
            </div>
            <div style={{ fontSize: 12, color: "#9b94b3", margin: "5px 0 8px", lineHeight: 1.45 }}>{opt.desc}</div>
            <button onClick={() => onSabotage(opt)} disabled={money < opt.cost} className="ptp-btn" style={{
              width: "100%", padding: "9px", borderRadius: 5, cursor: money < opt.cost ? "default" : "pointer",
              background: money < opt.cost ? "#23202e" : "#3a1b22", color: money < opt.cost ? "#6a6580" : "#ff8fa3",
              border: "1px solid #5a2230", fontFamily: display, fontWeight: 800, fontSize: 12, letterSpacing: ".05em",
            }}>{money < opt.cost ? "Can't afford" : "Pull it"}</button>
          </Card>
        ))}
        <AccentBtn ghost onClick={onSkipSabotage}>Run clean · No tricks tonight</AccentBtn>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 9, height: 9, borderRadius: "50%", background: "#ff3b5c", animation: "pulse 1s infinite", display: "inline-block" }} />
            <span style={{ fontSize: 11, letterSpacing: ".2em", color: "#ff3b5c", fontWeight: 800 }}>LIVE · {player.tag}</span>
          </div>
          <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 24, margin: "3px 0 0" }}>Monday Night</h2>
        </div>
      </div>

      {sabotageDone && !sabotageDone.skipped && (
        <div style={{ fontSize: 12, color: sabotageDone.backfired ? "#ff7088" : "#54e0a0", background: "#15111f", border: "1px solid #261f38", borderRadius: 6, padding: "8px 11px", marginBottom: 10 }}>
          <b>{sabotageDone.label}:</b> {sabotageDone.line}
        </div>
      )}

      <Card style={{ padding: 0, maxHeight: done ? "none" : 420, overflow: "hidden" }}>
        <div style={{ padding: "4px 14px" }}>
          {stream.slice(0, revealIdx).map((b, i) => <TickerBeat key={i} b={b} />)}
        </div>
      </Card>

      {!done && !started && (
        <AccentBtn onClick={startBroadcast}>Start the broadcast</AccentBtn>
      )}

      {!done && started && (
        <>
          {/* primary action: always a clear way forward, never stuck */}
          {auto ? (
            <button onClick={() => setAuto(false)} className="ptp-btn" style={{
              width: "100%", padding: "11px", background: "#15111f", color: "var(--accent)",
              border: "1px solid var(--accent)", borderRadius: 5, fontFamily: display, fontWeight: 800, fontSize: 13, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--accent)", animation: "pulse 1s infinite" }} />
              On air · Tap to pause
            </button>
          ) : (
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={stepForward} className="ptp-btn" style={{
                flex: 1, padding: "11px", background: "var(--accent)", color: "#07060e",
                border: "none", borderRadius: 5, fontFamily: display, fontWeight: 800, fontSize: 13, cursor: "pointer",
              }}>
                {stream[revealIdx - 1] && stream[revealIdx - 1].pauseOn ? "Continue ▸" : "Next ▸"}
              </button>
              <button onClick={resumeRoll} className="ptp-btn" style={{
                flex: 1, padding: "11px", background: "transparent", color: "var(--accent)",
                border: "1px solid var(--accent)", borderRadius: 5, fontFamily: display, fontWeight: 800, fontSize: 13, cursor: "pointer",
              }}>▸ Auto-play</button>
            </div>
          )}
          <button onClick={() => { setAuto(false); setRevealIdx(stream.length); }} className="ptp-btn" style={{
            width: "100%", padding: "11px", marginTop: 8, background: "transparent", color: "#9b94b3",
            border: "1px solid #261f38", borderRadius: 5, fontFamily: display, fontWeight: 700, fontSize: 13, cursor: "pointer",
          }}>Skip to end card</button>
        </>
      )}
      {done && (
        <div>
          <div style={{ display: "flex", gap: 10, margin: "12px 0" }}>
            <ScoreBox label={player.tag} val={pShow.nielsen} accent="var(--accent)" big />
            <div style={{ display: "flex", alignItems: "center", fontFamily: display, fontWeight: 900, color: "#6f6889", fontSize: 16 }}>vs</div>
            <ScoreBox label={rival.tag} val={rShow.nielsen} accent="#ff7088" big />
          </div>
          <AccentBtn onClick={onSettle}>See the overnight verdict</AccentBtn>
        </div>
      )}
    </div>
  );
}

function TickerBeat({ b }) {
  if (b.type === "seghead") {
    return (
      <div style={{ margin: "14px 0 6px", paddingTop: 10, borderTop: "1px solid #1d1830" }}>
        <div style={{ fontSize: 10, letterSpacing: ".14em", fontWeight: 800, color: b.main ? "#ffd54f" : "var(--accent)" }}>
          {b.main ? "★ MAIN EVENT" : b.seg.label.toUpperCase()}
        </div>
        <div style={{ fontFamily: display, fontWeight: 800, fontSize: 15, color: "#f3eeff", marginTop: 2 }}>
          {b.parts.map(p => p.name).join(b.seg.kind === "promo" && b.parts.length > 1 ? " & " : " vs ")}
        </div>
      </div>
    );
  }
  if (b.type === "segend") {
    return (
      <div style={{ margin: "6px 0 4px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 12, color: "#9b94b3" }}>
          {b.titleChange ? <span style={{ color: "#ffd54f", fontWeight: 700 }}>{b.titleChange}</span> : "Segment grade"}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Stars stars={b.stars} />
          <span style={{ fontFamily: display, fontWeight: 900, fontSize: 16, color: b.rating >= 75 ? "#54e0a0" : b.rating >= 55 ? "#ffd54f" : "#ff7088" }}>{b.rating}</span>
        </div>
      </div>
    );
  }
  const color = b.type === "good" ? "#cfeede" : b.type === "bad" ? "#ffd0d8" : "#bdb6d4";
  const dot = b.type === "good" ? "#54e0a0" : b.type === "bad" ? "#ff7088" : "#5a5470";
  return (
    <div style={{ display: "flex", gap: 9, padding: "4px 0", animation: "fadeUp .25s ease both" }}>
      <span style={{ width: 5, height: 5, borderRadius: "50%", background: dot, marginTop: 7, flexShrink: 0 }} />
      <span style={{ fontSize: 13, color, lineHeight: 1.45 }}>{b.text}</span>
    </div>
  );
}
function Stars({ stars }) {
  const full = Math.floor(stars);
  const half = stars - full >= 0.5;
  return (
    <span style={{ fontSize: 12, color: "#ffd54f", letterSpacing: "1px" }}>
      {"★".repeat(full)}{half ? "½" : ""}<span style={{ color: "#3a3354" }}>{"☆".repeat(Math.max(0, 5 - full - (half ? 1 : 0)))}</span>
    </span>
  );
}
function ScoreBox({ label, val, accent, big }) {
  return (
    <div style={{ flex: 1, textAlign: "center", padding: big ? "14px 8px" : "9px", background: "#120f1d", border: `1px solid ${accent}44`, borderRadius: 7 }}>
      <div style={{ fontSize: 10, letterSpacing: ".14em", color: "#9b94b3", fontWeight: 700 }}>{label}</div>
      <div style={{ fontFamily: display, fontWeight: 900, fontSize: big ? 34 : 22, color: accent, textShadow: `0 0 16px ${accent}66` }}>{val}</div>
      <div style={{ fontSize: 9, color: "#6f6889", letterSpacing: ".1em" }}>RATING</div>
    </div>
  );
}

      {review.heistApplied && (

          <div style={{ fontSize: 13, color: "#ffe2b0", lineHeight: 1.5 }}>

            <b style={{ color: "#c79bff" }}>{storylineFork.aName}</b> and <b style={{ color: "#c79bff" }}>{storylineFork.bName}</b> have built real heat ({storylineFork.heat}). {forkArch.blurb}
          </div>
          {!forkResolved ? (
            <>
              <div style={{ fontSize: 12, color: "#9b94b3", margin: "8px 0", lineHeight: 1.5 }}>
                Cash in now for a reliable blow-off and a healthy payday, or push it further for a much bigger spike, at the risk of the whole thing going cold.
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => onResolveFork("cash")} className="ptp-btn" style={{ flex: 1, padding: "11px", background: "#2a1f3a", color: "#e7d6ff", border: "1px solid #5a3a7a", borderRadius: 6, fontFamily: display, fontWeight: 800, fontSize: 13, cursor: "pointer" }}>Cash it in now</button>
                <button onClick={() => onResolveFork("push")} className="ptp-btn" style={{ flex: 1, padding: "11px", background: "transparent", color: "#c79bff", border: "1px solid #5a3a7a", borderRadius: 6, fontFamily: display, fontWeight: 800, fontSize: 13, cursor: "pointer" }}>Push it further</button>
              </div>
            </>
          ) : (
            <div style={{ marginTop: 6 }}>
              <div style={{ fontSize: 13, color: forkResolved.success ? "#aed581" : "#ff7088", lineHeight: 1.5, fontStyle: "italic" }}>{forkResolved.line}</div>
              <button onClick={onDismissFork} className="ptp-btn" style={{ width: "100%", marginTop: 10, padding: "9px", background: "transparent", color: "#9b94b3", border: "1px solid #261f38", borderRadius: 5, fontFamily: display, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Noted</button>
            </div>
          )}
        </Card>
      )}

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between" }}>
          {[["Record", `${wins}-${losses}`, "#cfc8e6"], ["Win streak", `${streak}`, streak > 0 ? "#54e0a0" : "#9b94b3"], ["Peak segment", `${review.peak}`, "#ffd54f"], ["Net $", `${review.net > 0 ? "+" : ""}${review.net}K`, review.net >= 0 ? "#54e0a0" : "#ff7088"]].map(([l, v, c], i) => (
            <div key={i} style={{ textAlign: "center", flex: 1 }}>
              <div style={{ fontFamily: display, fontWeight: 900, fontSize: 19, color: c }}>{v}</div>
              <div style={{ fontSize: 9, color: "#6f6889", letterSpacing: ".08em" }}>{l.toUpperCase()}</div>
            </div>
          ))}
        </div>
      </Card>

      {tagProposals.length > 0 && (
        <Card style={{ borderColor: "#2a3a1f" }}>
          <div style={{ fontSize: 10, letterSpacing: ".15em", color: "#aed581", fontWeight: 800, marginBottom: 7 }}>CHEMISTRY · TAG TEAM PROPOSAL</div>
          {tagProposals.map((p, i) => (
            <div key={i} style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 13, color: "#cfc8e6", lineHeight: 1.5 }}>
                <b>{p.a.name}</b> and <b>{p.b.name}</b> have real chemistry as a pair. Make them a permanent tag team?
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                <button onClick={() => onAcceptTag(p)} className="ptp-btn" style={{ flex: 1, padding: "8px", background: "#2a3a1f", color: "#aed581", border: "1px solid #3a4a2f", borderRadius: 5, fontWeight: 800, fontSize: 12, cursor: "pointer", fontFamily: display }}>Form the team</button>
                <button onClick={() => onDeclineTag(p)} className="ptp-btn" style={{ flex: 1, padding: "8px", background: "transparent", color: "#9b94b3", border: "1px solid #261f38", borderRadius: 5, fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: display }}>Keep them singles</button>
              </div>
            </div>
          ))}
        </Card>
      )}

      <AccentBtn onClick={onNext}>{week >= totalWeeks ? "See the final reckoning" : "Onto next week"}</AccentBtn>
    </div>
  );
}

// ============================================================
// RUN END — the screenshot moment. Verdict, stats, awards, the war's shape,
// and a real Monday Night Wars parallel chosen to fit how the run went.
// ============================================================
// authentic MNW parallels (verified history), matched to outcome
const MNW_PARALLELS = {
  blowout_win: [
    "Like the WWF in 1999: you didn't just win the war, you lapped them. At their peak, Raw and Nitro each pulled over 10 million viewers a week, but once the momentum tipped it became a rout.",
    "This is the Attitude-Era surge writ small. From late 1998 the WWF reeled off 80-plus straight weekly wins on the way to burying the competition.",
  ],
  win: [
    "The real war flipped for good in late 1998, when Raw overtook Nitro and never gave the lead back. You pulled off the same turn.",
    "WCW led for 83 consecutive weeks before the WWF clawed back. Building a lead is one thing, holding it is the war. You held it.",
  ],
  narrow_win: [
    "For two years this thing was a coin-flip on a knife's edge before anyone pulled clear. Yours came right down to the wire too.",
    "In the mid-90s the lead changed hands almost weekly. A war this close is exactly how the golden age felt.",
  ],
  narrow_loss: [
    "The WWF spent most of 1996-97 chasing from behind before the comeback. You're in good company. The deficit is where legends are forged.",
    "WCW's Nitro out-drew Raw for a year and a half before the tide turned. Losing the war isn't the end of the story, it's the first act of the comeback.",
  ],
  loss: [
    "WCW had every advantage, Ted Turner's money, the nWo, the hottest angle in the business, and still lost the war through bad booking. Talent isn't enough. The book is everything.",
    "The infamous 'Fingerpoke of Doom' in 1999 saw WCW torch its own momentum overnight. One bad call can undo a year of build. Learn it, rebook it.",
  ],
  blowout_loss: [
    "By 2001 Nitro's rating had cratered and Vince McMahon bought the competition live on air for a reported 2.5 million dollars. Rock bottom is real, but so is the rebuild. Run it back.",
    "WCW lost a reported 62 million dollars in 2000 amid a talent-spending binge and chaotic booking. Overspending without a plan sinks promotions. The roguelite gods demand a smarter run.",
  ],
};

function RunEnd({ player, rival, history, wins, losses, totalWeeks, onRestart }) {
  const margin = wins - losses;
  const won = wins > losses;
  const avgPlayer = round1(history.reduce((s, h) => s + h.playerN, 0) / Math.max(1, history.length));
  const avgRival = round1(history.reduce((s, h) => s + h.rivalN, 0) / Math.max(1, history.length));
  const bestWeek = history.reduce((b, h) => h.playerN > (b ? b.playerN : 0) ? h : b, null);
  const peakSeg = Math.max(...history.map(h => h.peak));
  // longest win streak across the run
  let longest = 0, cur = 0;
  history.forEach(h => { if (h.result === "win") { cur++; longest = Math.max(longest, cur); } else cur = 0; });

  // verdict bucket
  let bucket, verdict, vColor;
  if (won && margin >= Math.ceil(totalWeeks * 0.55)) { bucket = "blowout_win"; verdict = "TOTAL DOMINATION"; vColor = "#ffd54f"; }
  else if (won && margin >= 3) { bucket = "win"; verdict = "WAR WON"; vColor = "#54e0a0"; }
  else if (won) { bucket = "narrow_win"; verdict = "EDGED IT OUT"; vColor = "#54e0a0"; }
  else if (margin === 0) { bucket = "narrow_win"; verdict = "DEAD HEAT, YOUR SHADE"; vColor = "#cfc8e6"; }
  else if (margin >= -2) { bucket = "narrow_loss"; verdict = "NARROWLY OUT-DRAWN"; vColor = "#ff9d7a"; }
  else if (margin >= -Math.ceil(totalWeeks * 0.5)) { bucket = "loss"; verdict = "WAR LOST"; vColor = "#ff7088"; }
  else { bucket = "blowout_loss"; verdict = "BURIED"; vColor = "#ff3b5c"; }
  const parallel = pick(MNW_PARALLELS[bucket]);

  // standout wrestlers
  const topStar = [...player.roster].sort((a, b) => b.popularity - a.popularity)[0];
  const champ = player.roster.find(w => w.id === player.titles.world.holderId);
  const tagChamp = player.roster.find(w => w.id === player.titles.tag.holderId);
  const mostTitles = [...player.roster].sort((a, b) => (b.titles || 0) - (a.titles || 0))[0];
  const bestStealer = [...player.roster].sort((a, b) => (b.showStealers || 0) - (a.showStealers || 0))[0];
  const wunder = player.roster.find(w => w.isWunderkind);

  // fun titbits
  const totalBotches = player.roster.reduce((s, w) => s + (w.botches || 0), 0);
  const titbits = [
    `Your show averaged a ${avgPlayer} rating across ${totalWeeks} weeks. The rival averaged ${avgRival}.`,
    `Hottest single segment of the run peaked at ${peakSeg}.`,
    longest > 1 ? `Longest unbeaten run: ${longest} straight Mondays on top.` : `You never strung more than one win together. Consistency is the next mountain.`,
    totalBotches > 0 ? `Your roster botched ${totalBotches} spot${totalBotches > 1 ? "s" : ""} on live TV. The bloopers reel sells itself.` : `A clean run, zero botches on record. The agents slept easy.`,
  ];

  return (
    <div>
      <div style={{ textAlign: "center", padding: "10px 0 6px" }}>
        <div style={{ fontSize: 11, letterSpacing: ".26em", color: "var(--accent)", fontWeight: 800 }}>{player.name.toUpperCase()} · FINAL RECKONING</div>
        <div style={{ fontFamily: display, fontWeight: 900, fontSize: 44, color: vColor, textShadow: `0 0 26px ${vColor}66`, lineHeight: .95, margin: "8px 0" }}>{verdict}</div>
        <div style={{ fontFamily: display, fontWeight: 900, fontSize: 30, color: "#f3eeff" }}>
          {wins} <span style={{ color: "#6f6889", fontSize: 18 }}>—</span> {losses}
        </div>
        <div style={{ fontSize: 12, color: "#9b94b3" }}>{player.tag} vs {rival.tag} · {totalWeeks}-week war</div>
      </div>

      {/* the war's shape: a tiny sparkline of weekly margins */}
      <Card style={{ padding: "14px 14px 10px" }}>
        <div style={{ fontSize: 10, letterSpacing: ".15em", color: "#9b94b3", fontWeight: 700, marginBottom: 8 }}>THE SHAPE OF THE WAR</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 56 }}>
          {history.map((h, i) => {
            const d = h.playerN - h.rivalN;
            const mag = Math.min(1, Math.abs(d) / 3);
            const up = d >= 0;
            return (
              <div key={i} title={`Wk ${h.week}: ${h.playerN} vs ${h.rivalN}`} style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", height: "100%" }}>
                <div style={{ width: "100%", height: `${(up ? mag : 0) * 100}%`, background: "var(--accent)", borderRadius: "2px 2px 0 0", minHeight: up ? 3 : 0 }} />
                <div style={{ width: "100%", height: 1, background: "#3a3354" }} />
                <div style={{ width: "100%", height: `${(!up ? mag : 0) * 100}%`, background: "#ff7088", borderRadius: "0 0 2px 2px", minHeight: !up ? 3 : 0 }} />
              </div>
            );
          })}
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#6f6889", marginTop: 4 }}>
          <span>Wk 1</span><span>Wk {totalWeeks}</span>
        </div>
      </Card>

      {/* stat grid */}
      <Card>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <Stat label="Avg rating" val={avgPlayer} color="var(--accent)" />
          <Stat label="Best week" val={bestWeek ? bestWeek.playerN : "-"} sub={bestWeek ? `Week ${bestWeek.week}` : ""} color="#54e0a0" />
          <Stat label="Peak segment" val={peakSeg} color="#ffd54f" />
          <Stat label="Longest streak" val={longest} sub="Mondays" color="#54e0ff" />
        </div>
      </Card>

      {/* awards */}
      <Card style={{ borderColor: "#2c2442" }}>
        <div style={{ fontSize: 10, letterSpacing: ".15em", color: "var(--accent)", fontWeight: 800, marginBottom: 9 }}>END-OF-RUN HONOURS</div>
        {[
          ["Face of the promotion", topStar ? `${topStar.name} (${topStar.popularity} pop)` : "-"],
          ["Reigning World Champ", champ ? champ.name : "Vacant, chaos reigns"],
          ["Tag Champions", tagChamp ? tagChamp.name : "Vacant"],
          ["Most decorated", mostTitles && mostTitles.titles ? `${mostTitles.name} (${mostTitles.titles} reign${mostTitles.titles > 1 ? "s" : ""})` : "-"],
          ["Show-stealer", bestStealer && bestStealer.showStealers ? `${bestStealer.name} (${bestStealer.showStealers} classics)` : "-"],
          wunder ? ["The phenom you landed", `${wunder.name}, ${wunder.nation ? wunder.nation.flag : ""} ${wunder.nickname}`] : null,
        ].filter(Boolean).map(([l, v], i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #1d1830", fontSize: 13 }}>
            <span style={{ color: "#9b94b3" }}>{l}</span>
            <span style={{ color: "#f3eeff", fontWeight: 600, textAlign: "right", maxWidth: "60%" }}>{v}</span>
          </div>
        ))}
      </Card>

      {/* titbits */}
      <Card>
        <div style={{ fontSize: 10, letterSpacing: ".15em", color: "#9b94b3", fontWeight: 700, marginBottom: 7 }}>RUN TITBITS</div>
        {titbits.map((t, i) => <div key={i} style={{ fontSize: 12.5, color: "#cfc8e6", padding: "3px 0", lineHeight: 1.45 }}>· {t}</div>)}
      </Card>

      {/* MNW parallel */}
      <Card style={{ borderColor: "#3a2f1a", background: "linear-gradient(180deg,#1a160c,#120f1d)" }}>
        <div style={{ fontSize: 10, letterSpacing: ".15em", color: "#ffd54f", fontWeight: 800, marginBottom: 6 }}>VS THE REAL MONDAY NIGHT WARS</div>
        <div style={{ fontSize: 13, color: "#e8dcc0", lineHeight: 1.55 }}>{parallel}</div>
      </Card>

      <AccentBtn onClick={onRestart}>Run it back · New war</AccentBtn>
      <p style={{ textAlign: "center", color: "#5a5470", fontSize: 11, marginTop: 10 }}>
        Screenshot the card. Every war is procedurally generated, the next one writes a different story.
      </p>
    </div>
  );
}
function Stat({ label, val, sub, color }) {
  return (
    <div style={{ background: "#0f0c1a", borderRadius: 6, padding: "10px 12px", border: "1px solid #1d1830" }}>
      <div style={{ fontSize: 9, color: "#8c85a6", letterSpacing: ".1em" }}>{label.toUpperCase()}</div>
      <div style={{ fontFamily: display, fontWeight: 900, fontSize: 24, color: color || "#f3eeff" }}>{val}</div>
      {sub && <div style={{ fontSize: 9, color: "#6f6889" }}>{sub}</div>}
    </div>
  );
}

// ---------- entry point ----------
function App() { return <Game />; }
</script>

      '\n\nIf you are viewing this inside an app preview, open the real website link in your browser instead.</div>';
  }
  function loadScript(urls, done, fail) {
    var i = 0;
    function tryNext() {
      if (i >= urls.length) { fail(); return; }
      var s = document.createElement("script");

      s.onerror = function () { tryNext(); };
      document.head.appendChild(s);
    }
    tryNext();
  }
  var REACT = ["https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js","https://unpkg.com/react@18.3.1/umd/react.production.min.js","https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"];
  var REACTDOM = ["https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js","https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js","https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"];
  var BABEL = ["https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js","https://unpkg.com/@babel/standalone@7.25.6/babel.min.js","https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"];
  function boot() {

      var mount = "\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));";
      var src = document.getElementById("appsrc").textContent;
      var compiled = Babel.transform(hooks + src + mount, { presets: ["react"] }).code;
      (0, eval)(compiled);
    } catch (err) { showError((err && err.stack) || err); }
  }
  loadScript(REACT, function () {
    loadScript(REACTDOM, function () {
      loadScript(BABEL, boot, function () { showError("Could not load Babel."); });
    }, function () { showError("Could not load ReactDOM."); });
  }, function () { showError("Could not load React."); });

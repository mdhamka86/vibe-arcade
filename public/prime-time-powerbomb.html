// ---------- tiny rng helpers ----------
const rand = (a, b) => a + Math.random() * (b - a);
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const chance = (p) => Math.random() < p;
const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const uid = () => Math.random().toString(36).slice(2, 9);

// short broadcast tag from a promo name, e.g. "Apex Wrestling Alliance" -> "AWA"
function promoTag(name) {

}

// ============================================================
// TIERS — main-eventers, mid-carders, jobbers. Gates match-type booking.
// Derived from overall + popularity. A wrestler's tier is dynamic; great
// booking promotes a mid-carder into the main event over a run.
// ============================================================
function wrestlerTier(w) {
  const score = overallOf(w) * 0.55 + w.popularity * 0.45 + (w.isChampion ? 8 : 0);
  if (score >= 72) return "main";
  if (score >= 52) return "mid";
  return "jobber";
}
const TIER_LABEL = { main: "Main Eventer", mid: "Mid-Carder", jobber: "Jobber" };
const TIER_COLOR = { main: "#ffd54f", mid: "#4fc3f7", jobber: "#7d8590" };

function overallOf(w) {
  if (w.isTeam) return Math.round((w.members[0].o + w.members[1].o) / 2);
  return Math.round((w.workrate + w.mic + w.charisma) / 3);
}

// resolve a participant's effective work/mic/charisma in one pass. singles carry
// these directly; teams derive them by averaging their members, falling back to
// the team overall if member stats are somehow missing. returning the trio in a
// single call avoids re-scanning a team's members three times per score, and the
// fallbacks guarantee finite numbers so segment scoring can never produce NaN.
function effStats(w) {
  if (!w.isTeam) {
    return { wr: w.workrate, mc: w.mic, ch: w.charisma };
  }
  const m = w.members || [];
  const avg = (key) => {
    const vals = m.map(x => (typeof x[key] === "number" ? x[key] : null)).filter(v => v != null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : (overallOf(w) || 50);
  };
  return { wr: avg("workrate"), mc: avg("mic"), ch: avg("charisma") };
}

// comparator factory: sort wrestlers/teams either alphabetically by name, or by
// rating (overall for singles, tag rating for teams) highest-first. used by every
// wrestler list so the player can toggle the whole interface between the two.
function rosterComparator(mode) {
  if (mode === "rating") {
    return (a, b) => {
      const ra = a.isTeam ? (a.tagRating || overallOf(a)) : overallOf(a);
      const rb = b.isTeam ? (b.tagRating || overallOf(b)) : overallOf(b);
      if (rb !== ra) return rb - ra;          // higher rating first
      return a.name.localeCompare(b.name);     // ties break alphabetically
    };
  }
  return (a, b) => a.name.localeCompare(b.name); // default: A to Z
}

// sort a flat list of wrestlers/teams by the chosen mode (non-mutating).
function sortRoster(list, mode) {
  return [...list].sort(rosterComparator(mode));
}

// split a roster into singles and tag teams, each sorted by the chosen mode,
// so the talent reads like a clean call-sheet. defaults to alphabetical.
function splitRoster(roster, mode = "name") {
  const cmp = rosterComparator(mode);
  return {
    singles: roster.filter(w => !w.isTeam).sort(cmp),
    teams: roster.filter(w => w.isTeam).sort(cmp),
  };
}

  let name, guard = 0;
  do {
    const r = Math.random();
    if (nation && r < 0.55) name = nationName(nation, null); // nation-flavoured
    else if (r < 0.62) name = pick(LEGEND_ALLUSION);
    else if (r < 0.70) name = pick(PUN_NAMES);
    else if (r < 0.86) name = pick(RING_NAMES);
    else name = `${pick(FIRST_NAMES)} ${pick(LAST_NAMES)}`;
    guard++;
  } while (used && used.has(name) && guard < 60);
  if (used) used.add(name);
  return name;
}

// core generator. opts.parity squeezes stats toward a target for equal rosters.
// opts.wunderkind makes a generational free agent. opts.nation forces origin.
function genWrestler(used, opts = {}) {
  const nation = opts.nation || (chance(0.4) ? pickNation() : null);
  const name = opts.name || genWrestlerName(used, nation);
  const a = opts.wunderkind
    ? pick([ARCHETYPES[0], ARCHETYPES[1], ARCHETYPES[2], ARCHETYPES[7]]) // elite spreads
    : pick(ARCHETYPES);

  let workrate = randInt(a.workrate[0], a.workrate[1]);
  let mic = randInt(a.mic[0], a.mic[1]);
  let charisma = randInt(a.charisma[0], a.charisma[1]);

  if (opts.parity) {
    const t = opts.target || 60;
    workrate = Math.round(workrate * 0.4 + t * 0.6 + randInt(-6, 6));
    mic = Math.round(mic * 0.4 + t * 0.6 + randInt(-6, 6));
    charisma = Math.round(charisma * 0.4 + t * 0.6 + randInt(-6, 6));
  }
  if (opts.wunderkind) {
    workrate = Math.max(workrate, randInt(82, 96));
    charisma = Math.max(charisma, randInt(80, 95));
    mic = Math.max(mic, randInt(72, 94));
  }
  workrate = clamp(workrate, 20, 98);
  mic = clamp(mic, 20, 98);
  charisma = clamp(charisma, 20, 98);

  const trait = opts.wunderkind
    ? pick(TRAIT_BANK.filter(t => ["Ratings Magnet","Workrate Machine","Mic God","Crossover Star","Big Match Player"].includes(t.tag)))
    : pick(TRAIT_BANK);
  const overall = (workrate + mic + charisma) / 3;
  const align = opts.align || (chance(0.5) ? "face" : "heel");

  let popularity = opts.parity ? Math.round((opts.target || 60) + randInt(-8, 8))
    : opts.wunderkind ? randInt(78, 92)
    : randInt(25, 85);
  if (trait.tag === "Ratings Magnet" || trait.tag === "Crossover Star") popularity = Math.min(100, popularity + 12);
  if (a.tag === "Grizzled Vet") popularity = Math.min(100, popularity + 8);
  popularity = clamp(popularity, 15, 100);

  const contractWeeks = opts.parity ? randInt(3, 9) : opts.wunderkind ? 99 : randInt(1, 8);
  const salary = round1(((overall + popularity) / 200) * 2.4);
  const fee = Math.max(1, Math.round((overall + popularity - 70) / 7) + (trait.eff.ratings ? 2 : 0) + (opts.wunderkind ? 6 : 0));

  return {
    id: uid(), name, nation,
    nickname: pick(NICKNAMES),
    persona: pick(PERSONAS),
    archetype: a.tag,
    trait, align,
    quirk: pick(QUIRKS),
    backstory: opts.wunderkind ? wunderkindBackstory(nation) : pick(BACKSTORIES),
    workrate, mic, charisma,
    popularity, momentum: 0,
    contractWeeks, salary, fee,
    age: opts.wunderkind ? randInt(22, 28) : randInt(21, 44),
    injured: 0,
    isWunderkind: !!opts.wunderkind,
    mainEvents: 0, showStealers: 0, botches: 0, titles: 0, isChampion: false,
    pairCount: {},      // tracks tag-team chemistry with partners
    isTeam: false,
  };
}

const TEAM_NAME_ADJ = ["Brutal","Savage","Golden","Crimson","Iron","Velvet","Atomic","Lethal","Royal","Feral",

const TEAM_NAME_NOUN = ["Dynasty","Outlaws","Brotherhood","Empire","Syndicate","Mafia","Wolves","Express",
  "Conspiracy","Cartel","Machine","Order","Collective","Hooligans","Aces","Mercenaries","Saints","Dogs",
  "Hurricane","Authority","Renegades","Bandits"];

  "The Demolition Crew","The Wrecking Ball","The Last Call","The Main Event Mafia-ish","The Steel Curtain Call",
  "The Suplex City Council","The Chair Shot Heard Round the World","The Tag Team Dream","The Doomsday Device"];

  "Pain & Gain","Thunder & Lightning","Salt & Vinegar","Hugh & Cry","Smash & Grab","Cease & Desist",
  "Law & Disorder","Rhythm & Bruise","Aches & Pains"];
function genTeamName(used) {
  let n, g = 0;
  do {
    const r = Math.random();
    if (r < 0.3) n = `${pick(TEAM_NAME_ADJ)} ${pick(TEAM_NAME_NOUN)}`;
    else if (r < 0.5) n = pick(TEAM_NAME_THE);
    else if (r < 0.68) n = pick(TEAM_NAME_PUN);
    else if (r < 0.84) n = `The ${pick(TEAM_NAME_ADJ)} ${pick(TEAM_NAME_NOUN)}`;
    else n = `${pick(TEAM_NAME_NOUN)} of ${pick(["Doom","Destruction","Mayhem","Chaos","Glory","Steel","Fury"])}`;
    g++;
  } while (used && used.has(n) && g < 50);

// build a team unit from two singles wrestlers
function formTeam(a, b, usedTeamNames) {
  const name = genTeamName(usedTeamNames);
  const o = Math.round((overallOf(a) + overallOf(b)) / 2);
  // teams get a chemistry bonus to popularity
  const pop = clamp(Math.round((a.popularity + b.popularity) / 2 + randInt(2, 10)), 15, 100);
  return {
    id: uid(),
    isTeam: true,
    name,
    members: [
      { id: a.id, name: a.name, o: overallOf(a), align: a.align, workrate: a.workrate, mic: a.mic, charisma: a.charisma },
      { id: b.id, name: b.name, o: overallOf(b), align: b.align, workrate: b.workrate, mic: b.mic, charisma: b.charisma },
    ],
    memberIds: [a.id, b.id],
    // a team's tag rating is the pair's average overall plus a small unit bonus
    tagRating: clamp(Math.round((overallOf(a) + overallOf(b)) / 2) + randInt(2, 6), 10, 99),
    align: a.align === b.align ? a.align : "face",
    trait: (a.trait.eff.multi || b.trait.eff.multi) ? (a.trait.eff.multi ? a.trait : b.trait) : pick([a.trait, b.trait]),
    persona: pick([a.persona, b.persona]),
    nickname: pick(["The Tag Division's Finest","Future Hall of Famers","The Team to Beat","Money in the Bank-ish"]),
    popularity: pop, momentum: 0,
    contractWeeks: Math.min(a.contractWeeks, b.contractWeeks),
    salary: round1(a.salary + b.salary),
    fee: a.fee + b.fee,
    injured: 0,
    isChampion: false, isTagChampion: false,
    mainEvents: 0, showStealers: 0, botches: 0, titles: 0,
  };
}

  (a) => `${a} takes a sickening bump off the apron. "Holy ----" chant incoming.`,
  (a) => `${a} sets up a spot so dangerous the referee covers their eyes.`,
];
const TITLE_FLAVOR = [

  (a) => `The championship raises the stakes; ${a} is wrestling like their career depends on it.`,
  (a) => `${a} digs deeper than ever with gold on the line.`,
  (a) => `Confetti, tears, the works. ${a} is making this title feel like the biggest prize in the sport.`,

  "The crowd splits into duelling chants.","A 'this is awesome' chant breaks out.",
  "Someone in the front row holds up a sign the camera can't show.","The arena's so loud the broadcast mics peak.",
  "A 'holy ----' chant rolls through the building.","The crowd is red-hot and feeding off every near-fall."];

// score one participant's contribution to a segment, reading stats + trait + tier
function participantScore(w, seg, ctx) {
  const lean = seg.lean;
  let s = 0;
  // resolve effective stats once (teams average their members; see effStats).
  // this is what stops tag matches poisoning the maths with NaN.
  const { wr, mc, ch } = effStats(w);
  if (seg.kind === "promo") {
    s = mc * (lean.m || 0.7) + ch * (lean.c || 0.3);
  } else {
    s = wr * (lean.w || 0.5) + ch * (lean.c || 0.5);
    if (lean.m) s += mc * lean.m;
  }
  s += ((w.popularity || 50) - 50) * 0.25;     // over wrestlers draw
  s += (w.momentum || 0) * 1.5;                 // hot streaks matter

  const tr = w.trait.eff;
  if (tr.match && seg.kind === "match") s += tr.match;
  if (tr.matchBoost && seg.kind === "match") s += tr.matchBoost;
  if (tr.promo && seg.kind === "promo") s += tr.promo;
  if (tr.ratings) s += tr.ratings * 0.5;
  if (tr.hardcore && seg.hardcore) s += tr.hardcore;
  if (tr.multi && seg.slots >= 3) s += tr.multi;
  if (tr.steady) s += tr.steady;
  if (tr.bigmatch && seg.bigmatch) s += tr.bigmatch;
  if (tr.momentum) s += (w.momentum || 0) * 2;  // slow burn snowball

  return s;
}

// ---------- the booking simulator: runs one segment, returns a ticker timeline ----------
function simulateSegment(seg, participants, ctx) {
  // participants: array of wrestler/team objects already chosen for this slot
  const isTitle = seg.kind === "title" || seg.kind === "tagtitle";

  // base quality from participants
  let raw = seg.base;
  let totalP = 0;
  participants.forEach((w) => { totalP += participantScore(w, seg, ctx); });
  const avgP = participants.length ? totalP / participants.length : 50;
  raw += (avgP - 55) * 0.55;

  // crowd / variance
  raw += rand(-6, 6);

  // chemistry: more participants = more ceiling but more botch risk
  const timeline = [];
  const beats = seg.kind === "promo" ? randInt(3, 4) : randInt(4, 6);
  let botchCount = 0, highCount = 0;

  const nameOf = (w) => w.name;
  // push a beat only if its text isn't a repeat of one already shown this segment.
  // tries a few times to find fresh flavour before giving up, which kills the
  // "same line twice in a row" problem in the live ticker.
  const seenLines = new Set();
  const pushBeat = (type, textFn, tries = 5) => {
    let text = textFn();
    let n = 0;
    while (seenLines.has(text) && n < tries) { text = textFn(); n++; }
    if (seenLines.has(text)) return false; // genuinely couldn't find a fresh one
    seenLines.add(text);
    timeline.push({ type, text });
    return true;
  };

  // opening beat
  const opener = participants[0];
  let openLine;
  if (seg.kind === "promo") openLine = `${nameOf(opener)} ${pick(opener.persona.lines)}.`;
  else openLine = `${nameOf(opener)} and ${participants.length > 1 ? nameOf(participants[1]) : "the field"} lock up to a big reaction.`;
  seenLines.add(openLine);
  timeline.push({ type: "neutral", text: openLine });

  for (let i = 0; i < beats; i++) {
    const actor = pick(participants);
    const tr = actor.trait.eff;
    const skill = (overallOf(actor) + actor.popularity) / 200;

    let goodCut = 0.42 + skill * 0.2;
    let botchCut = 0.14 - skill * 0.06 + (tr.botch || 0) + (tr.highspot ? 0.05 : 0);
    if (seg.hardcore) botchCut += 0.03;

    const roll = Math.random();
    if (roll < botchCut) {
      botchCount++;
      raw -= rand(2, 5);
      if (actor.botches != null) actor._botchedThis = true;
      const fn = seg.kind === "promo" ? PROMO_LOW : MATCH_LOW;
      pushBeat("bad", () => pick(fn)(nameOf(actor)));
    } else if (roll < goodCut) {
      highCount++;
      raw += rand(2, 6) + skill * 3;
      let bank;
      if (isTitle) bank = TITLE_FLAVOR;
      else if (seg.hardcore && chance(0.5)) bank = HARDCORE_FLAVOR;
      else bank = seg.kind === "promo" ? PROMO_HIGH : MATCH_HIGH;
      pushBeat("good", () => pick(bank)(nameOf(actor)));
    } else {
      if (chance(0.5)) pushBeat("neutral", () => pick(CROWD_FLAVOR));
      else {
        const actor2 = pick(participants);
        pushBeat("neutral", () => actor2.persona ? `${nameOf(actor2)} ${pick(actor2.persona.lines)}.` : pick(CROWD_FLAVOR));
      }
    }
  }

  // closing beat
  const finisher = participants[randInt(0, participants.length - 1)];
  if (seg.kind === "promo") {
    timeline.push({ type: "good", text: `${nameOf(finisher)} drops the mic. Segment over, point made.` });
  } else {
    raw += rand(0, 5);
    timeline.push({ type: "good", text: `${nameOf(finisher)} hits the finish and gets the win to a huge reaction.` });
  }

  // final rating out of ~100 -> wrestling "star rating" out of 5 for matches.
  // guard against any non-finite raw value so a single bad stat can never
  // cascade a NaN through the whole show scoreboard.
  if (!Number.isFinite(raw)) raw = seg.base || 50;
  let rating = clamp(Math.round(raw), 8, 99);
  const stars = Math.round((rating / 100) * 5 * 4) / 4; // quarter stars

  return {
    seg, participants, timeline, rating, stars,
    botchCount, highCount,
    winner: seg.kind !== "promo" ? finisher : null,
  };
}

// ============================================================
// RIVAL AI BOOKER — a cutthroat opponent. Books a smart card every week,
// targeting variety, big-match feel, and its hottest talent in the main
// event. Difficulty ramp gives it a slight edge that skill can overcome.
// ============================================================
function aiBookShow(promo, weekNum, difficulty) {
  const roster = promo.roster.filter(w => w.injured <= 0);
  const teams = roster.filter(w => w.isTeam);
  const singles = roster.filter(w => !w.isTeam);
  const byTier = (t) => singles.filter(w => wrestlerTier(w) === t);
  const mains = byTier("main");
  const mids = byTier("mid");

  const card = [];
  const used = new Set();
  const grab = (pool, n) => {
    const avail = pool.filter(w => !used.has(w.id));
    const chosen = shuffle(avail).slice(0, n);
    chosen.forEach(w => used.add(w.id));
    return chosen;
  };

  // The AI books to its strengths: hot talent in marquee spots.
  // 1) opener: a match or promo featuring a mid-carder
  const openType = pick(SEGMENT_TYPES.filter(s => s.kind === "match" && s.slots === 2 && !s.bigmatch));
  const oP = grab(mids.length >= 2 ? mids : singles, 2);
  if (oP.length === 2) card.push(simulateSegment(openType, oP, { ai: true }));

  // 2) a promo or tag to build variety
  if (teams.length >= 2 && chance(0.5)) {
    const tg = grab(teams, 2);
    if (tg.length === 2) card.push(simulateSegment(SEGMENT_TYPES.find(s => s.id === "tag"), tg, { ai: true }));
  } else {
    const promoType = pick(SEGMENT_TYPES.filter(s => s.kind === "promo"));
    const pP = grab([...mains, ...mids], promoType.slots);
    if (pP.length === promoType.slots) card.push(simulateSegment(promoType, pP, { ai: true }));
  }

  // 3) a mid-to-upper card match, sometimes a title defence, OR a crowning
  //    match if a belt was vacated by a raid (top priority for the rival).
  const worldVacant = promo.vacated && promo.vacated.world != null && !promo.titles.world.holderId;
  const tagVacant = promo.vacated && promo.vacated.tag != null && !promo.titles.tag.holderId;
  if (tagVacant && teams.length >= 2) {
    // crown new tag champs: two teams contest the vacant tag titles
    const tg = grab(teams, 2);
    if (tg.length === 2) {
      const seg = simulateSegment(SEGMENT_TYPES.find(s => s.id === "tagtitle"), tg, { ai: true });
      seg.isCrowning = true;
      card.push(seg);
    }
  } else if (worldVacant && singles.length >= 2) {
    // crown a new world champ: contest the vacant world title. draw from the
    // best available, falling back to the wider singles pool so it reliably happens.
    const pool = (mains.length + mids.length) >= 2 ? [...mains, ...mids] : singles;
    const cr = grab(pool, 2);
    if (cr.length === 2) {
      const seg = simulateSegment(SEGMENT_TYPES.find(s => s.id === "title"), cr, { ai: true });
      seg.isCrowning = true;
      card.push(seg);
    }
  } else if (chance(0.4 + difficulty * 0.05) && promo.titles.world.holderId) {
    const champ = roster.find(w => w.id === promo.titles.world.holderId && w.injured <= 0);
    const challenger = grab(mains.filter(w => w.id !== (champ && champ.id)), 1)[0] || grab(mids, 1)[0];
    if (champ && challenger) {
      card.push(simulateSegment(SEGMENT_TYPES.find(s => s.id === "title"), [champ, challenger], { ai: true }));
    }
  } else {
    const mt = pick(SEGMENT_TYPES.filter(s => s.kind === "match" && s.slots <= 3 && !s.bigmatch));
    const mp = grab([...mains, ...mids], mt.slots);
    if (mp.length === mt.slots) card.push(simulateSegment(mt, mp, { ai: true }));
  }

  // 4) MAIN EVENT: top stars, marquee match type
  const meType = pick(SEGMENT_TYPES.filter(s => s.tiers.includes("main") && (s.bigmatch || s.base >= 70)));
  const mePool = mains.length >= meType.slots ? mains : [...mains, ...mids];
  const meP = grab(mePool, meType.slots);
  if (meP.length === meType.slots) {
    const meSeg = simulateSegment(meType, meP, { ai: true, mainEvent: true });
    meSeg.rating = clamp(meSeg.rating + 6, 8, 99); // main-event bump
    card.push(meSeg);
  }

  // overall show rating: weighted, main event counts double
  return scoreShow(card, difficulty, true);
}

// compute a show's overall rating (a Nielsen-style number ~ 1.0 to 10.0)
function scoreShow(card, difficulty, isAi) {
  if (!card.length) return { card, overall: 0, nielsen: 1.0, peak: 0 };
  let sum = 0, weight = 0;
  card.forEach((s, i) => {
    const w = i === card.length - 1 ? 2 : 1; // main event double weight
    sum += s.rating * w; weight += w;
  });
  let overall = sum / weight;
  // AI gets a small competence edge that scales with difficulty
  if (isAi) overall += difficulty * 1.4;
  overall = clamp(overall, 8, 99);
  // convert to a Nielsen-style rating (segment 8-99 -> ~1.5-9.5)
  const nielsen = round1(1.2 + (overall / 99) * 8.3);
  const peak = Math.max(...card.map(s => s.rating));
  return { card, overall: Math.round(overall), nielsen, peak };
}

// SABOTAGE — dirty tricks against the rival, à la the real ratings war
// (spoiling results, poaching, counter-programming). Risk/reward: each has
// upside and a backfire chance.
// ============================================================
const SABOTAGE_OPTIONS = [
  { id: "spoiler", label: "Spoil their main event", cost: 2,
    desc: "Leak the rival's taped main-event result on your broadcast. Classic Bischoff move.",
    fx: (rivalShow) => ({ rivalPenalty: rand(0.4, 1.1), backfire: 0.2, msg: "You read their results live on air. Cold-blooded." }) },
  { id: "counter", label: "Counter-program a star", cost: 3,
    desc: "Put your hottest act head-to-head with their main event to steal the quarter-hour.",
    fx: () => ({ selfBoost: rand(0.3, 0.9), backfire: 0.15, msg: "You went straight at them in the ratings. Bold." }) },
  { id: "raid", label: "Backstage raid", cost: 4,
    desc: "Send people to their parking lot to cause chaos and 'invade' the broadcast.",
    fx: () => ({ rivalPenalty: rand(0.5, 1.4), selfBoost: rand(0.1, 0.5), backfire: 0.35, msg: "An invasion angle. The internet is on fire." }) },
  { id: "presspoach", label: "Plant a poaching rumour", cost: 2,
    desc: "Leak that you're signing their champion. Sows locker-room chaos over there.",
    fx: () => ({ rivalPenalty: rand(0.3, 0.9), backfire: 0.25, msg: "Their locker room is reportedly in turmoil." }) },
];

function runSabotage(opt, rivalNielsen) {
  const res = opt.fx();
  const backfired = chance(res.backfire);
  let rivalDelta = 0, selfDelta = 0, line;
  if (backfired) {
    line = `It backfired. ${pick(["The rival spun it into a sympathy angle.","Your own crowd turned on the stunt.","The press called it desperate.","It made their guy look like a megastar."])}`;
    selfDelta -= rand(0.2, 0.7);
    if (res.rivalPenalty) rivalDelta += rand(0.1, 0.4); // helped them instead
  } else {
    line = res.msg;
    if (res.rivalPenalty) rivalDelta -= res.rivalPenalty;
    if (res.selfBoost) selfDelta += res.selfBoost;
  }
  return { backfired, rivalDelta: round1(rivalDelta), selfDelta: round1(selfDelta), line };
}

// ============================================================
// POST-SHOW EFFECTS — how a week of booking reshapes the roster.
// Good segments raise popularity & momentum; title wins mint stars; big
// matches and hardcore spots risk injury; contracts tick down.
// ============================================================
function applySegmentEffects(result, promo) {
  const seg = result.seg;
  const quality = result.rating;
  result.participants.forEach((w) => {
    const live = promo.roster.find(r => r.id === w.id);
    if (!live) return;
    // popularity shift scaled by segment quality vs their current pop
    let popShift = (quality - live.popularity) * 0.10;
    if (seg.bigmatch) popShift *= 1.6;            // title/main-event matches move the needle hard
    if (seg.kind === "title" || seg.kind === "tagtitle") popShift *= 1.3;
    popShift += rand(-1.5, 1.5);
    live.popularity = clamp(Math.round(live.popularity + popShift), 10, 100);

    // turn promo: flip alignment. the crowd needs a beat to recalibrate, so the
    // wrestler takes a short-term popularity dip that the rebalanced roster repays.
    if (seg.isTurn) {
      const wasFace = live.align === "face";
      live.align = wasFace ? "heel" : "face";
      // a well-cut turn promo dips less; a flat one stings more
      const dip = quality >= 70 ? randInt(3, 6) : randInt(6, 11);
      live.popularity = clamp(live.popularity - dip, 10, 100);
      live.justTurned = wasFace ? "heel" : "face";
      result.turnNote = `${live.name} turned ${wasFace ? "heel" : "babyface"}! ${wasFace
        ? "The boos are rolling in, and a new villain is born."
        : "The crowd has come around, and a new fan favourite steps forward."}`;
    }

    // momentum: good shows build it, bad ones bleed it
    if (quality >= 70) live.momentum = Math.min(6, (live.momentum || 0) + 1);
    else if (quality < 45) live.momentum = Math.max(-3, (live.momentum || 0) - 1);

    // career tally
    if (result.botchCount && w._botchedThis) { live.botches = (live.botches || 0) + 1; delete w._botchedThis; }
    if (quality >= 80) live.showStealers = (live.showStealers || 0) + 1;

    // injury risk on physical/hardcore/big matches
    if (seg.kind !== "promo") {
      let injRisk = 0.015 + (seg.hardcore ? 0.03 : 0) + (seg.bigmatch ? 0.015 : 0);
      injRisk += (live.trait.eff.injury || 0);
      injRisk = Math.max(0.003, injRisk);
      if (chance(injRisk)) {
        live.injured = randInt(1, 3);
        result.injuryNote = `${live.name} got banged up and will be out ${live.injured} week${live.injured > 1 ? "s" : ""}.`;
      }
    }
  });

  // title changes: if it's a title match, the winner can capture the belt
  if ((seg.kind === "title" || seg.kind === "tagtitle") && result.winner) {
    const titleKey = seg.kind === "title" ? "world" : "tag";
    const title = promo.titles[titleKey];
    const winner = promo.roster.find(r => r.id === result.winner.id);
    if (winner && title.holderId !== winner.id) {
      // challenger dethrones champ ~ proportional to match quality & their pop
      const champ = promo.roster.find(r => r.id === title.holderId);
      const upsetOdds = clamp(0.35 + (winner.popularity - (champ ? champ.popularity : 50)) / 200, 0.2, 0.75);
      if (!title.holderId || chance(upsetOdds)) {
        if (champ) champ.isChampion = false;
        title.holderId = winner.id;
        winner.isChampion = true;
        winner.titles = (winner.titles || 0) + 1;
        winner.popularity = clamp(winner.popularity + randInt(6, 14), 10, 100); // new champ bump
        result.titleChange = `${winner.name} captures the ${title.name}!`;
      } else {
        result.titleChange = `${champ ? champ.name : "The champion"} retains the ${title.name} in a war.`;
      }
    } else if (winner && title.holderId === winner.id) {
      result.titleChange = `${winner.name} successfully defends the ${title.name}.`;
    }
  }
  if (result.winner) {
    const win = promo.roster.find(r => r.id === result.winner.id);
    if (win && seg.tiers && seg.tiers.includes("main")) win.mainEvents = (win.mainEvents || 0) + 1;
  }
}

// tag-team chemistry: track player pairings; propose a team after enough bouts
function trackTagChemistry(playerSegments, promo, usedTeamNames) {
  const proposals = [];
  playerSegments.forEach((res) => {
    if (res.seg.team) return; // already a team match
    if (res.seg.slots === 2 && res.seg.kind === "match" && res.participants.length === 2) {
      const [a, b] = res.participants;
      if (a.isTeam || b.isTeam) return;
      const la = promo.roster.find(r => r.id === a.id);
      const lb = promo.roster.find(r => r.id === b.id);
      if (!la || !lb) return;
      // only same-alignment singles can become a team
      if (la.align !== lb.align) return;
      la.pairCount = la.pairCount || {}; lb.pairCount = lb.pairCount || {};
      la.pairCount[lb.id] = (la.pairCount[lb.id] || 0) + 1;
      lb.pairCount[la.id] = (lb.pairCount[la.id] || 0) + 1;
      if (la.pairCount[lb.id] === 2 && res.rating >= 55) {
        proposals.push({ a: la, b: lb });
      }
    }
  });
  return proposals;
}

function storylineArchetypeById(id) { return STORYLINE_ARCHETYPES.find(s => s.id === id); }

// scan a freshly-resolved player segment for a brand-new storyline opportunity.
// returns a storyline-seed object or null. only singles-or-team matches that
// rate well and whose participants' types "blend" into a known shape qualify.
function detectStoryline(res, existingStorylines) {
  if (!res || res.seg.kind === "promo") return null;
  // keep only real participants (drop any falsy/missing slots). works for both
  // singles and team matches; the two principals are read from the first slots.
  const parts = res.participants.filter(Boolean);
  if (parts.length < 2) return null;
  // only consider the two principals (first two slots) to keep angles legible
  const a = parts[0], b = parts[1];
  if (!a || !b) return null;
  // don't double-book the same pair into a second storyline
  const pairKey = [a.id, b.id].sort().join("~");
  if (existingStorylines.some(s => s.pairKey === pairKey && s.status !== "resolved")) return null;
  // find every archetype whose trigger fires, pick the richest one
  const matches = STORYLINE_ARCHETYPES.filter(arch => {
    try { return arch.trigger(a, b, res); } catch (e) { return false; }
  });
  if (!matches.length) return null;
  // prefer the rarer/higher-payoff shapes when several qualify
  matches.sort((x, y) => y.payoffBase - x.payoffBase);
  const arch = matches[0];
  return {
    id: uid(),
    archId: arch.id,
    pairKey,
    aId: a.id, bId: b.id,
    aName: a.name, bName: b.name,
    heat: arch.heatBuild,
    stage: 1,            // escalation stage; grows with each match/promo featuring the pair
    status: "active",    // active -> (resolved | collapsed)
    bornWeek: null,      // filled in by caller
    lastBeat: arch.beats[0](a, b),
  };
}

// after a show, advance any active storyline whose pair appeared again this week.
// matches escalate heat hard; promos escalate it a little. returns notes to surface.
function advanceStorylines(storylines, playerCard, weekNum) {
  const notes = [];
  storylines.forEach(s => {
    if (s.status !== "active") return;
    const arch = storylineArchetypeById(s.archId);
    if (!arch) return;
    // did both principals feature together in any segment this week?
    let featured = null;
    playerCard.forEach(res => {
      const ids = res.participants.map(p => p.id);
      if (ids.includes(s.aId) && ids.includes(s.bId)) featured = res;
    });
    if (!featured) return;
    const isMatch = featured.seg.kind !== "promo";
    const gain = isMatch ? arch.escalateBonus + Math.round((featured.rating - 55) * 0.2)
                         : Math.round(arch.escalateBonus * 0.55);
    s.heat = clamp(s.heat + Math.max(2, gain), 0, 100);
    s.stage = Math.min(3, s.stage + 1);
    const beat = arch.beats[Math.min(arch.beats.length - 1, s.stage - 1)];
    const aLive = { name: s.aName }, bLive = { name: s.bName };
    s.lastBeat = beat(aLive, bLive);
    notes.push({ tag: arch.name, status: "escalating", who: `${s.aName} vs ${s.bName}`, beat: s.lastBeat, heat: s.heat });
  });
  return notes;
}

// resolve a storyline via the player's chosen fork.
// "cash" = book the blow-off now: reliable popularity + money payoff.
// "push" = escalate further for a bigger payoff, but a real chance it goes cold.
function resolveStoryline(storyline, fork, promo) {
  const arch = storylineArchetypeById(storyline.archId);
  const a = promo.roster.find(r => r.id === storyline.aId);
  const b = promo.roster.find(r => r.id === storyline.bId);
  const heatMult = 0.6 + storyline.heat / 100;     // hotter angles pay more
  const out = { storylineId: storyline.id, fork };

  if (fork === "cash") {
    const pop = Math.round(arch.payoffBase * heatMult);
    const cash = round1(arch.payoffBase * heatMult * 0.35);
    if (a) a.popularity = clamp(a.popularity + pop, 10, 100);
    if (b) b.popularity = clamp(b.popularity + Math.round(pop * 0.7), 10, 100);
    storyline.status = "resolved";
    out.success = true;
    out.cash = cash;
    out.line = `You cashed in the ${arch.name.toLowerCase()} between ${storyline.aName} and ${storyline.bName}. The blow-off delivered: both came out bigger stars, and the gate was healthy (+$${cash}K).`;
    out.popA = pop;
  } else {
    // push further: gamble on an even bigger payoff
    const risk = clamp(arch.riskBase + (storyline.stage >= 3 ? 0.12 : 0) - storyline.heat / 400, 0.05, 0.6);
    if (chance(risk)) {
      // it went cold
      if (a) a.popularity = clamp(a.popularity - randInt(4, 9), 10, 100);
      if (b) b.popularity = clamp(b.popularity - randInt(2, 6), 10, 100);
      storyline.status = "collapsed";
      out.success = false;
      out.line = `You pushed the ${arch.name.toLowerCase()} further and it went cold. The crowd checked out before the payoff, and both wrestlers cooled off. A gamble that didn't land.`;
    } else {
      const pop = Math.round(arch.payoffBase * heatMult * 1.7);
      const cash = round1(arch.payoffBase * heatMult * 0.6);
      if (a) a.popularity = clamp(a.popularity + pop, 10, 100);
      if (b) b.popularity = clamp(b.popularity + Math.round(pop * 0.75), 10, 100);
      storyline.heat = clamp(storyline.heat + 12, 0, 100);
      storyline.stage = Math.min(3, storyline.stage + 1);
      out.success = true;
      out.bigger = true;
      out.cash = cash;
      out.popA = pop;
      out.line = `You pushed the ${arch.name.toLowerCase()} further and it paid off huge. ${storyline.aName} and ${storyline.bName} are now the hottest thing on the show (+$${cash}K, major popularity spike).`;
      // a pushed-further angle stays live for one more cash-in
      storyline.pushedOnce = true;
    }
  }
  return out;
}

// ============================================================
// THE OPPOSING GM — Nadine Naomi. A fierce-awesome rival promoter cut from
// the cloth of the great women managers: Sensational Sherri's brash, in-your-
// face command of a crowd and willingness to get physical, Miss Elizabeth's
// poise, the conductor's touch for manipulating a room. She runs the enemy
// promotion and, after every Monday night, files a barbed verdict on your show.
//
// EASTER EGG: for the first few weeks she's an unnamed "rival war room" voice.
// Once the war heats up (REVEAL_WEEK), the curtain drops and it's Nadine Naomi,
// signed and personal from then on.
// ============================================================
const NADINE_REVEAL_WEEK = 4;

const NADINE_BIO = {

};

// mystery-phase masks shown before the reveal
const NADINE_MASKS = ["The Rival War Room", "The Enemy GM", "A Voice From The Other Side", "The Shadow Booker"];

// her weekly verdict reacts to the RESULT. each bank is a set of short barbs.
// Pre-reveal lines are deliberately faceless; post-reveal lines get personal.
const NADINE_BARBS = {
  // you decisively beat her
  playerBigWin: [

    "A genuinely good show. I hate that I have to admit it. Don't get comfortable.",

  playerWin: [

    "You squeaked it. Next Monday I'm not leaving it to the overnights.",

  ],
  // a coin-flip
  close: [

  rivalWin: [

    "I watched your main event. So did half your audience, before they flipped to me.",
    "That's how it's done. Watch the tape. Specifically, watch my tape.",
    "You brought a booking sheet to a war. Cute. I brought a flamethrower.",
  ],
  // she lost a championship this week
  rivalLostBelt: [

  ],

  storylineHot: [

    "A hot feud on your show. I noticed. So did my talent scouts. Mind your contracts.",
    "Decent storyline. I'd have paid it off two weeks sooner, but you do you.",

// pick Nadine's verdict for the week given the outcome and context.
// returns { masked, name, line } where masked=true before the reveal.
function nadineVerdict(ctx) {
  const { week, diff, rivalLostBelt, storylineHot, youRaidedHer } = ctx;
  let bank;
  if (youRaidedHer) bank = NADINE_BARBS.raidedHer;
  else if (rivalLostBelt && chance(0.6)) bank = NADINE_BARBS.rivalLostBelt;
  else if (storylineHot && chance(0.5)) bank = NADINE_BARBS.storylineHot;
  else if (diff > 1.2) bank = NADINE_BARBS.playerBigWin;
  else if (diff > 0.3) bank = NADINE_BARBS.playerWin;
  else if (diff >= -0.3) bank = NADINE_BARBS.close;
  else bank = NADINE_BARBS.rivalWin;

  const masked = week < NADINE_REVEAL_WEEK;
  const isRevealWeek = week === NADINE_REVEAL_WEEK;
  return {
    masked,
    isRevealWeek,
    name: masked ? pick(NADINE_MASKS) : NADINE_BIO.name,
    line: pick(bank),
  };
}

// ============================================================
// WEEKLY REVIEW — funny quips + grade vs rival. The screenshot moment.
// ============================================================
const WIN_QUIPS = [
  "The rival's booker is reportedly throwing a clipboard across the production truck.",
  "Wrestling Twitter has declared your show 'a banger' in the only language it knows: all caps.",
  "Somewhere, a rival executive is explaining to a network suit why they lost the night.",
  "Your main event trended worldwide. The other guys trended too, but for the wrong reasons.",
  "The dirt sheets gave your show the thumbs up. Don't let it go to your head.",
  "A 'you still got it' chant broke out for a wrestler who never had it. Beautiful.",
];
const LOSE_QUIPS = [
  "The rival ran a surprise return and your quarter-hours fell off a cliff.",
  "Your main event was good. Theirs was a moment. That's the difference tonight.",
  "The dirt sheets were kind. The ratings were not.",
  "Half your audience flipped over at the top of the hour and didn't flip back.",
  "A backstage source says morale is 'fine', which is exactly what they say when it isn't.",
  "You got out-booked. It happens. Learn the lesson, book the comeback.",
];
const CLOSE_QUIPS = [
  "Separated by a rounding error. This war is going down to the wire.",
  "Too close to call until the overnights came in. Heart-stopping stuff.",
  "A genuine coin-flip of a Monday night. The fans were the real winners. Gross, but true.",
];

function gradeWeek(playerNielsen, rivalNielsen) {
  const diff = round1(playerNielsen - rivalNielsen);
  let result, grade, quip;
  if (diff > 0.3) { result = "win"; quip = pick(WIN_QUIPS); }
  else if (diff < -0.3) { result = "loss"; quip = pick(LOSE_QUIPS); }
  else { result = diff >= 0 ? "win" : "loss"; quip = pick(CLOSE_QUIPS); }
  // letter grade off the player's own show quality
  const g = playerNielsen;
  grade = g >= 8 ? "A+" : g >= 7 ? "A" : g >= 6.2 ? "B+" : g >= 5.4 ? "B" : g >= 4.6 ? "C+" : g >= 3.8 ? "C" : g >= 3 ? "D" : "F";
  return { result, diff, grade, quip };
}

// ============================================================
// FREE-AGENT MARKET + WUNDERKIND RUMOURS
// ============================================================
function genFreeAgents(used, n) {
  const pool = [];
  for (let i = 0; i < n; i++) pool.push(genWrestler(used, {}));
  pool.sort((a, b) => a.fee - b.fee);
  return pool;
}
const RUMOR_LINES = [
  "Dirt sheets are buzzing: a generational free agent is about to hit the open market. Every promotion will want them.",
  "Word in the locker room is a can't-miss prospect just became available. Snap them up before the rival does.",
  "A rumour is spreading fast: the next big thing is shopping for a contract. This is a chance to change your run.",
  "Backstage whispers say a bona fide future superstar is testing free agency. Pounce next week or lose them.",
];

// ============================================================
// RUN SETUP — build two equal promotions, pick a side, generate the world.
// ============================================================
const RUN_LENGTHS = [
  { weeks: 8, label: "Sprint", desc: "8 weeks. A quick war, decided fast." },
  { weeks: 12, label: "Standard", desc: "12 weeks. The classic ratings-war arc." },
  { weeks: 16, label: "Saga", desc: "16 weeks. A grind. Build a dynasty or get buried." },
];

function buildPromotion(name, usedNames, usedTeamNames, isPlayer) {
  const titles = makeTitles(name);
  const roster = [];
  // 6 singles at parity, spread across a target band for tier variety.
  // 4 more singles for depth. assign alignments from a deliberately balanced
  // pool so every promotion opens with a fair mix of faces and heels, which is
  // what makes good opposing-alignment matches bookable from week one.
  const targets = [74, 70, 64, 60, 56, 50, 58, 54, 52, 48];
  // 10 singles -> 5 faces, 5 heels, shuffled so tiers aren't alignment-locked
  const aligns = shuffle(["face","face","face","face","face","heel","heel","heel","heel","heel"]);
  targets.forEach((t, i) => roster.push(genWrestler(usedNames, { parity: true, target: t, align: aligns[i] })));
  // start with 2 tag teams each: one face team, one heel team, so the tag
  // division also has a natural opposition built in from the start.
  const teamAligns = ["face", "heel"];
  for (let i = 0; i < 2; i++) {
    const al = teamAligns[i];
    const a = genWrestler(usedNames, { parity: true, target: randInt(54, 66), align: al });
    const b = genWrestler(usedNames, { parity: true, target: randInt(54, 66), align: al });
    const team = formTeam(a, b, usedTeamNames);
    roster.push(team);
  }
  // assign the two belts to the most over eligible acts
  const singles = roster.filter(w => !w.isTeam).sort((a, b) => b.popularity - a.popularity);
  const teams = roster.filter(w => w.isTeam).sort((a, b) => b.popularity - a.popularity);
  if (singles[0]) { singles[0].isChampion = true; titles.world.holderId = singles[0].id; singles[0].titles = 1; }
  if (teams[0]) { teams[0].isChampion = true; teams[0].isTagChampion = true; titles.tag.holderId = teams[0].id; teams[0].titles = 1; }

  return {
    id: uid(), name, tag: promoTag(name), isPlayer,
    roster, titles,
    color: isPlayer ? null : "#c0392b",
  };
}

// ---------- MAIN GAME COMPONENT ----------
function Game() {
  const [phase, setPhase] = useState("intro");
  const [player, setPlayer] = useState(null);
  const [rival, setRival] = useState(null);
  const [week, setWeek] = useState(1);
  const [totalWeeks, setTotalWeeks] = useState(12);
  const [money, setMoney] = useState(20);
  const [difficulty, setDifficulty] = useState(0);
  const [playerColor, setPlayerColor] = useState("#ff2e88");

  // booking state for the current week
  const [card, setCard] = useState([]);            // chosen player segments (specs, not yet simmed)
  const [pendingShow, setPendingShow] = useState(null);  // simmed player show
  const [rivalShow, setRivalShow] = useState(null);
  const [weekReview, setWeekReview] = useState(null);
  const [revealIdx, setRevealIdx] = useState(0);
  const [history, setHistory] = useState([]);       // per-week records
  const [sabotageDone, setSabotageDone] = useState(null);
  const [tagProposals, setTagProposals] = useState([]);
  const [freeAgents, setFreeAgents] = useState([]);
  const [wunderkindPending, setWunderkindPending] = useState(null); // a wunderkind on the market
  const [rumorActive, setRumorActive] = useState(null);
  const [setupRun, setSetupRun] = useState({ weeks: 12, side: null, options: null });
  const [storylines, setStorylines] = useState([]);          // active/ resolved angles
  const [freedFromLock, setFreedFromLock] = useState(new Set()); // ids sprung from the match-lock this week
  const [lockEventNote, setLockEventNote] = useState(null);  // surfaced "sprung loose" headline
  const [storylineResolve, setStorylineResolve] = useState(null); // a storyline awaiting the player's fork
  const [heistBoost, setHeistBoost] = useState(0);   // pending ratings boost from a champion raid, applied to next show
  const [heistNote, setHeistNote] = useState(null);  // headline describing the heist
  const [sortMode, setSortMode] = useState("rating"); // how every wrestler list is sorted: "name" | "rating"

  const usedNames = useRef(new Set());
  const usedTeamNames = useRef(new Set());

  const wins = history.filter(h => h.result === "win").length;
  const losses = history.filter(h => h.result === "loss").length;
  let streak = 0;
  for (let i = history.length - 1; i >= 0; i--) { if (history[i].result === "win") streak++; else break; }

  // ---- start setup ----
  function beginSetup() {
    usedNames.current = new Set();
    usedTeamNames.current = new Set();
    setPhase("setup");
  }

  // ---- generate the two promotions and let player pick a side ----
  function generateMatchup(weeks) {
    const usedPromo = new Set();
    const aName = genPromoName(usedPromo);
    const bName = genPromoName(usedPromo);
    const a = buildPromotion(aName, usedNames.current, usedTeamNames.current, true);
    const b = buildPromotion(bName, usedNames.current, usedTeamNames.current, false);
    setSetupRun({ weeks, side: null, options: [a, b] });
  }

  function chooseSide(promo, weeks) {
    const opts = setupRun.options;
    const other = opts.find(p => p.id !== promo.id);
    promo.isPlayer = true; promo.color = playerColor;
    other.isPlayer = false; other.color = "#c0392b";
    setPlayer(promo);
    setRival(other);
    setTotalWeeks(weeks);
    setWeek(1);
    setMoney(20);
    setDifficulty(0);
    setHistory([]);
    startWeek(promo, other, 1);
  }

  // ---- begin a booking week ----
  function startWeek(p, r, wk) {
    setCard([]);
    setPendingShow(null);
    setRivalShow(null);
    setWeekReview(null);
    setSabotageDone(null);
    setTagProposals([]);
    // in-week event: a random healthy wrestler is "sprung loose" and can work
    // a second match this week despite the usual one-match lock. ~20% of weeks.
    const healthy = (p.roster || []).filter(w => w.injured <= 0 && !w.isTeam);
    if (healthy.length && chance(0.20)) {
      const lucky = pick(healthy);
      setFreedFromLock(new Set([lucky.id]));
      setLockEventNote(`Backstage shake-up: ${lucky.name} has talked their way onto the card twice tonight. They can work a second match this week.`);
    } else {
      setFreedFromLock(new Set());
      setLockEventNote(null);
    }
    // free agents refresh weekly; wunderkind appears if rumored last week
    let fa = genFreeAgents(usedNames.current, randInt(3, 4));
    if (rumorActive) {
      const wk2 = genWunderkind(usedNames.current);
      fa = [wk2, ...fa];
      setWunderkindPending(wk2);
      setRumorActive(null);
    } else {
      setWunderkindPending(null);
      // chance to start a new rumour (1-2 per run, weighted to mid-run)
      if (!rumorActive && wk >= 2 && wk <= (totalWeeks - 2) && chance(0.22)) {
        setRumorActive(pick(RUMOR_LINES));
      }
    }
    setFreeAgents(fa);
    setPhase("contracts");
  }

  // ---- contract / roster actions ----
  function signFreeAgent(fa) {
    if (money < fa.fee) return;
    setMoney(m => round1(m - fa.fee));
    setPlayer(p => ({ ...p, roster: [...p.roster, { ...fa, contractWeeks: fa.isWunderkind ? 12 : randInt(4, 8) }] }));
    setFreeAgents(list => list.filter(x => x.id !== fa.id));
    if (fa.isWunderkind) setWunderkindPending(null);
  }
  function poachRival(w) {
    const cost = w.fee + 3; // premium to poach
    if (money < cost) return;
    setMoney(m => round1(m - cost));

    const wasChampion = w.isChampion;
    const wasTagChamp = w.isTagChampion;

    // pull them off the rival's roster and, if they held gold, vacate that belt
    // and flag it for a crowning match on the rival's next show.
    setRival(r => {
      const roster = r.roster.filter(x => x.id !== w.id);
      const t = cloneTitles(r.titles);
      const vacated = { ...(r.vacated || {}) };
      if (t.world.holderId === w.id) { t.world.holderId = null; vacated.world = week; }
      if (t.tag.holderId === w.id) { t.tag.holderId = null; vacated.tag = week; }
      return { ...r, roster, titles: t, vacated };
    });

    // bring them in. a poached champion arrives as a conquering hero: a popularity
    // surge (scaled smaller since the ratings boost shares the reward).
    const popBump = wasChampion ? randInt(8, 14) : 0;
    setPlayer(p => ({
      ...p,
      roster: [...p.roster, {
        ...w, isChampion: false, isTagChampion: false,
        popularity: clamp((w.popularity || 50) + popBump, 10, 100),
        contractWeeks: randInt(4, 8),
      }],
    }));

    // the heist boosts your NEXT show's ratings (you stole the spotlight).
    if (wasChampion) {
      setHeistBoost(b => round1((b || 0) + rand(0.5, 0.9)));
      setHeistNote(`You raided ${rival ? rival.name : "the rival"}'s ${wasTagChamp ? "tag team" : "world"} champion. The whole industry is talking, and ${w.name} arrives on your show as a marked star.`);
    }
  }
  function reSign(w) {
    const cost = Math.max(1, Math.round(w.fee / 2));
    if (money < cost) return;
    setMoney(m => round1(m - cost));
    setPlayer(p => ({
      ...p,
      roster: p.roster.map(x => x.id === w.id ? { ...x, contractWeeks: x.contractWeeks + randInt(4, 7) } : x),
    }));
  }
  function proceedToBooking() { setPhase("booking"); }

  // ---- booking: add a segment spec to the card ----
  function addSegment(seg, participants) {
    setCard(c => [...c, { seg, participantIds: participants.map(p => p.id) }]);
  }
  function removeSegment(idx) {
    setCard(c => c.filter((_, i) => i !== idx));
  }

  // ---- run the player's show, then the rival's, then grade ----
  function runShow() {
    // resolve participant ids -> live objects, simulate each player segment
    const playerResults = card.map(({ seg, participantIds }) => {
      const parts = participantIds.map(id => player.roster.find(r => r.id === id)).filter(Boolean);
      return simulateSegment(seg, parts, { player: true, mainEvent: false });
    });
    // last segment is the main event: bump it
    if (playerResults.length) {
      const me = playerResults[playerResults.length - 1];
      me.rating = clamp(me.rating + 6, 8, 99);
      me.isMainEvent = true;
    }
    const pShow = scoreShow(playerResults, 0, false);

    // rival books its show
    const rShow = aiBookShow(rival, week, difficulty);

    // sabotage adjustments
    let pN = pShow.nielsen, rN = rShow.nielsen;
    if (sabotageDone) {
      rN = round1(Math.max(1.0, rN + sabotageDone.rivalDelta));
      pN = round1(Math.max(1.0, pN + sabotageDone.selfDelta));
    }
    // champion-heist boost: stealing the rival's champ lifts your overnights.
    if (heistBoost > 0) {
      pN = round1(pN + heistBoost);
      pShow.heistApplied = round1(heistBoost);
    }
    pShow.nielsen = pN; rShow.nielsen = rN;

    setPendingShow(pShow);
    setRivalShow(rShow);
    setRevealIdx(0);
    setPhase("showtime");
  }

  // ---- after the player has watched their show ticker, settle the week ----
  function settleWeek() {
    const pShow = pendingShow, rShow = rivalShow;
    // snapshot pre-show popularity so the review can report who climbed (raid targets)
    const prePop = {};
    player.roster.forEach(w => { prePop[w.id] = w.popularity; });

    // apply effects to player roster from each segment
    const pClone = { ...player, roster: player.roster.map(r => ({ ...r })), titles: cloneTitles(player.titles) };
    pShow.card.forEach(res => applySegmentEffects(res, pClone));

    // apply lighter effects to rival from its own show (keeps their stars evolving)
    const rClone = { ...rival, roster: rival.roster.map(r => ({ ...r })), titles: cloneTitles(rival.titles) };
    rShow.card.forEach(res => applySegmentEffects(res, rClone));

    // clear any belt-vacancy flag the rival resolved this week (a crowning match
    // refilled the belt). if they failed to crown, the vacancy persists to next week.
    if (rClone.vacated) {
      const vac = { ...rClone.vacated };
      if (rClone.titles.world.holderId) delete vac.world;
      if (rClone.titles.tag.holderId) delete vac.tag;
      rClone.vacated = vac;
    }

    // ---- storyline pass: advance existing angles, detect new ones ----
    const slWorking = storylines.map(s => ({ ...s }));
    const storyNotes = advanceStorylines(slWorking, pShow.card, week);
    // detect at most one new storyline per week, from the best-rated qualifying match
    const sortedByRating = [...pShow.card].filter(res => res.seg.kind !== "promo").sort((a, b) => b.rating - a.rating);
    for (const res of sortedByRating) {
      const seed = detectStoryline(res, slWorking);
      if (seed) {
        seed.bornWeek = week;
        slWorking.push(seed);
        const arch = storylineArchetypeById(seed.archId);
        storyNotes.push({ tag: arch ? arch.name : "Storyline", status: "forming", who: `${seed.aName} vs ${seed.bName}`, beat: seed.lastBeat, heat: seed.heat });
        break;
      }
    }
    setStorylines(slWorking);

    // a storyline that has reached stage 3 and run hot is ripe for a payoff fork
    const ripe = slWorking.find(s => s.status === "active" && (s.stage >= 3 || s.heat >= 38) && !s.forkOffered);
    let pendingFork = null;
    if (ripe) { ripe.forkOffered = true; pendingFork = { ...ripe }; }

    // tag-team proposals from player's booking
    const proposals = trackTagChemistry(pShow.card, pClone, usedTeamNames.current);

    // ---- review enrichment: best/worst match across BOTH shows, raid targets ----
    const allMatches = [
      ...pShow.card.filter(r => r.seg.kind !== "promo").map(r => ({ ...r, side: pClone.tag })),
      ...rShow.card.filter(r => r.seg.kind !== "promo").map(r => ({ ...r, side: rClone.tag })),
    ];
    let bestMatch = null, worstMatch = null;
    if (allMatches.length) {
      bestMatch = allMatches.reduce((a, b) => b.rating > a.rating ? b : a);
      worstMatch = allMatches.reduce((a, b) => b.rating < a.rating ? b : a);
    }
    const matchName = (res) => res.participants.map(p => p.name).join(res.seg.team ? " & " : " vs ");
    const bestMatchInfo = bestMatch ? { label: bestMatch.seg.label, who: matchName(bestMatch), rating: bestMatch.rating, side: bestMatch.side } : null;
    const worstMatchInfo = worstMatch ? { label: worstMatch.seg.label, who: matchName(worstMatch), rating: worstMatch.rating, side: worstMatch.side } : null;

    // raid targets: your wrestlers who gained the most popularity tonight
    const climbers = pClone.roster
      .filter(w => prePop[w.id] != null && w.popularity - prePop[w.id] >= 4)
      .map(w => ({ name: w.name, gain: w.popularity - prePop[w.id], pop: w.popularity }))
      .sort((a, b) => b.gain - a.gain)
      .slice(0, 3);

    // contracts tick down; injuries heal
    pClone.roster.forEach(w => {
      w.contractWeeks = Math.max(0, w.contractWeeks - 1);
      if (w.injured > 0) w.injured = Math.max(0, w.injured - 1);
      if (w.trait && w.trait.eff && w.trait.eff.momentum && w.momentum > 0) w.popularity = clamp(w.popularity + 1, 10, 100);
    });
    rClone.roster.forEach(w => {
      w.contractWeeks = Math.max(0, w.contractWeeks - 1);
      if (w.injured > 0) w.injured = Math.max(0, w.injured - 1);
    });
    // rival re-signs its own expiring talent automatically (so you must poach early)
    rClone.roster.forEach(w => { if (w.contractWeeks <= 0) w.contractWeeks = randInt(3, 6); });

    // income: base broadcast + merch movers + popularity bonus + win bonus
    const grade = gradeWeek(pShow.nielsen, rShow.nielsen);
    let income = 4 + pShow.nielsen * 0.6;
    pClone.roster.forEach(w => { if (w.trait && w.trait.eff && w.trait.eff.income && w.injured <= 0) income += w.trait.eff.income; });
    if (grade.result === "win") income += 3;
    const salaries = pClone.roster.reduce((s, w) => s + (w.salary || 0), 0);
    const net = round1(income - salaries);

    setMoney(m => round1(m + net));
    setPlayer(pClone);
    setRival(rClone);

    // record + funny injury/title notes
    const notes = [];
    pShow.card.forEach(res => { if (res.titleChange) notes.push(res.titleChange); if (res.injuryNote) notes.push(res.injuryNote); if (res.turnNote) notes.push(res.turnNote); });
    // surface the champion-heist headline if one happened this week
    if (heistNote) notes.unshift(heistNote);

    // did the rival crown a new champion this week to fill a belt you vacated?
    const crownNotes = [];
    rShow.card.forEach(res => {
      if (res.titleChange && res.titleChange.includes("captures")) {
        crownNotes.push(`${rival.name} crowned a new champion to fill the belt you raided: ${res.titleChange}`);
      }
    });
    crownNotes.forEach(n => notes.push(n));

    const rec = {
      week, result: grade.result, grade: grade.grade, diff: grade.diff,
      playerN: pShow.nielsen, rivalN: rShow.nielsen,
      peak: pShow.peak, quip: grade.quip, notes,
      net, income: round1(income), salaries: round1(salaries),
    };
    setHistory(h => [...h, rec]);

    // Nadine Naomi's weekly verdict. she reacts to the result, and to whether a
    // belt changed hands on your show (poking the bear), a storyline caught fire,
    // or you raided one of HER champions (which makes it deeply personal).
    const playerTookBelt = notes.some(n => n.includes("captures"));
    const storylineHot = storyNotes.length > 0;
    const youRaidedHer = !!heistNote;
    const nadine = nadineVerdict({ week, diff: grade.diff, rivalLostBelt: playerTookBelt, storylineHot, youRaidedHer });

    setWeekReview({ ...rec, pShow, rShow, proposals, storyNotes, bestMatch: bestMatchInfo, worstMatch: worstMatchInfo, climbers, nadine, heistApplied: pShow.heistApplied });
    setTagProposals(proposals);
    if (pendingFork) setStorylineResolve(pendingFork);
    // clear the one-shot heist boost and note now that they've been spent
    setHeistBoost(0);
    setHeistNote(null);
    setPhase("review");
  }

  // ---- resolve a ripe storyline via the player's chosen fork ----
  function resolveStorylineFork(fork) {
    if (!storylineResolve) return;
    const pClone = { ...player, roster: player.roster.map(r => ({ ...r })), titles: cloneTitles(player.titles) };
    const slWorking = storylines.map(s => ({ ...s }));
    const live = slWorking.find(s => s.id === storylineResolve.id);
    if (live) {
      const out = resolveStoryline(live, fork, pClone);
      if (out.cash) setMoney(m => round1(m + out.cash));
      setPlayer(pClone);
      setStorylines(slWorking);
      setStorylineResolve({ ...storylineResolve, resolved: out });
    }
  }
  function dismissStorylineFork() { setStorylineResolve(null); }

  // ---- accept / decline a tag-team formation ----
  function acceptTag(prop) {
    setPlayer(p => {
      const a = p.roster.find(r => r.id === prop.a.id);
      const b = p.roster.find(r => r.id === prop.b.id);
      if (!a || !b) return p;
      const team = formTeam(a, b, usedTeamNames.current);
      const roster = p.roster.filter(r => r.id !== a.id && r.id !== b.id);
      roster.push(team);
      return { ...p, roster };
    });
    setTagProposals(list => list.filter(x => !(x.a.id === prop.a.id && x.b.id === prop.b.id)));
  }
  function declineTag(prop) {
    setTagProposals(list => list.filter(x => !(x.a.id === prop.a.id && x.b.id === prop.b.id)));
  }

  // ---- sabotage (pre-show, once per week) ----
  function doSabotage(opt) {
    if (money < opt.cost) return;
    setMoney(m => round1(m - opt.cost));
    const res = runSabotage(opt, rivalShow ? rivalShow.nielsen : 5);
    setSabotageDone({ ...res, label: opt.label });
  }
  function skipSabotage() { setSabotageDone({ skipped: true }); }

  // ---- advance to next week or end the run ----
  function nextWeek() {
    if (week >= totalWeeks) { setPhase("runend"); return; }
    // difficulty creeps up as the war heats up, and harder if you're winning big
    const lead = wins - losses;
    setDifficulty(d => clamp(round1(d + 0.18 + Math.max(0, lead) * 0.04), 0, 5));
    const nw = week + 1;
    setWeek(nw);
    startWeek(player, rival, nw);
  }

  function fullRestart() {
    setPhase("intro"); setPlayer(null); setRival(null); setHistory([]);
    setWeek(1); setMoney(20); setDifficulty(0);
    setRumorActive(null); setWunderkindPending(null);
    setStorylines([]); setStorylineResolve(null);
    setFreedFromLock(new Set()); setLockEventNote(null);
    setHeistBoost(0); setHeistNote(null);
    usedNames.current = new Set(); usedTeamNames.current = new Set();
  }

  // ===================== RENDER =====================
  return (
    <Shell color={player ? player.color : playerColor}>
      {phase === "intro" && <Intro onStart={beginSetup} />}
      {phase === "setup" && (
        <Setup
          runLengths={RUN_LENGTHS}
          options={setupRun.options}
          onGenerate={generateMatchup}
          onChoose={chooseSide}
          onBackToSetup={() => setSetupRun(s => ({ ...s, options: null }))}
          playerColor={playerColor} setPlayerColor={setPlayerColor}
          weeks={setupRun.weeks}
        />
      )}
      {phase === "contracts" && player && (
        <Contracts
          player={player} rival={rival} money={money} week={week} totalWeeks={totalWeeks}
          freeAgents={freeAgents} wunderkind={wunderkindPending} rumor={rumorActive}
          onSign={signFreeAgent} onPoach={poachRival} onReSign={reSign}
          onProceed={proceedToBooking}
          sortMode={sortMode} onSortChange={setSortMode}
        />
      )}
      {phase === "booking" && player && (
        <Booking
          player={player} card={card} week={week} totalWeeks={totalWeeks}
          onAdd={addSegment} onRemove={removeSegment} onRun={runShow}
          freedFromLock={freedFromLock} lockEventNote={lockEventNote}
          storylines={storylines}
          sortMode={sortMode} onSortChange={setSortMode}
        />
      )}
      {phase === "showtime" && pendingShow && (
        <ShowTime
          player={player} rival={rival}
          pShow={pendingShow} rShow={rivalShow}
          sabotageOptions={SABOTAGE_OPTIONS} money={money}
          sabotageDone={sabotageDone} onSabotage={doSabotage} onSkipSabotage={skipSabotage}
          revealIdx={revealIdx} setRevealIdx={setRevealIdx}
          onSettle={settleWeek}
        />
      )}
      {phase === "review" && weekReview && (
        <Review
          review={weekReview} player={player} rival={rival}
          tagProposals={tagProposals} onAcceptTag={acceptTag} onDeclineTag={declineTag}
          week={week} totalWeeks={totalWeeks} wins={wins} losses={losses} streak={streak}
          money={money} onNext={nextWeek}
          storylineFork={storylineResolve} onResolveFork={resolveStorylineFork} onDismissFork={dismissStorylineFork}
        />
      )}
      {phase === "runend" && (
        <RunEnd
          player={player} rival={rival} history={history}
          wins={wins} losses={losses} totalWeeks={totalWeeks}
          onRestart={fullRestart}
        />
      )}
    </Shell>
  );
}

// ============================================================
// UI LAYER — sleek 80s-arcade wrestling: neon, chrome, bold display type,
// subtle scanlines. Minimal emojis.
// ============================================================
const mono = "'JetBrains Mono', 'SF Mono', 'Roboto Mono', monospace";
const display = "'Archivo', 'Arial Narrow', sans-serif";

function Shell({ color, children }) {
  const css = `
    * { box-sizing: border-box; }
    ::selection { background: ${color}; color: #07060e; }
    @keyframes fadeUp { from {opacity:0; transform:translateY(8px);} to {opacity:1; transform:none;} }
    @keyframes popIn { 0%{opacity:0; transform:translateY(10px) scale(.98);} 100%{opacity:1; transform:none;} }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.5;} }
    @keyframes scan { 0%{background-position:0 0;} 100%{background-position:0 6px;} }
    @keyframes glow { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.25);} }
    .ptp-card { animation: fadeUp .34s ease both; }
    .ptp-btn { transition: transform .08s ease, filter .15s ease; }
    .ptp-btn:active { transform: scale(.97); }
    .ptp-btn:hover { filter: brightness(1.14); }
    .ptp-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
    .ptp-pick { transition: all .12s ease; }
    .ptp-pick:hover { border-color: ${color} !important; }
    @media (prefers-reduced-motion: reduce){ .ptp-card{animation:none;} }
  `;
  return (
    <div style={{
      minHeight: "100vh", background: "#07060e", color: "#ece8f5",
      fontFamily: mono, "--accent": color,
      backgroundImage:
        `radial-gradient(circle at 15% -10%, ${color}26, transparent 44%),
         radial-gradient(circle at 90% 0%, #2a0a4a55, transparent 40%),
         repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 3px)`,
    }}>
      <style>{css}</style>
      <div style={{ maxWidth: 780, margin: "0 auto", padding: "20px 16px 72px" }}>
        {children}
      </div>
    </div>
  );
}

function AccentBtn({ children, onClick, disabled, ghost, danger }) {
  const bg = disabled ? "#23202e" : danger ? "#ff3b5c" : ghost ? "transparent" : "var(--accent)";
  return (
    <button className="ptp-btn" onClick={onClick} disabled={disabled} style={{
      width: "100%", padding: "15px 18px", marginTop: 12,
      background: bg,
      color: disabled ? "#6a6580" : ghost ? "var(--accent)" : "#07060e",
      border: ghost ? "1.5px solid var(--accent)" : "none",
      borderRadius: 5, fontFamily: display, fontWeight: 800, fontSize: 16,
      letterSpacing: ".05em", textTransform: "uppercase", cursor: disabled ? "default" : "pointer",
      boxShadow: disabled || ghost ? "none" : `0 0 18px ${typeof bg === "string" && bg.startsWith("#") ? bg + "55" : "var(--accent)"}`,
    }}>{children}</button>
  );
}
function Eyebrow({ children, color }) {
  return <div style={{ fontSize: 11, letterSpacing: ".26em", textTransform: "uppercase", color: color || "var(--accent)", fontWeight: 700, marginBottom: 6 }}>{children}</div>;
}
function Card({ children, style }) {
  return <div className="ptp-card" style={{ background: "#120f1d", border: "1px solid #261f38", borderRadius: 8, padding: 16, marginBottom: 12, ...style }}>{children}</div>;
}
function AlignBadge({ align }) {
  const face = align === "face";
  return <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: ".1em", padding: "2px 6px", borderRadius: 3,
    background: face ? "#1b3a2e" : "#3a1b22", color: face ? "#54e0a0" : "#ff7088", textTransform: "uppercase" }}>
    {face ? "Face" : "Heel"}</span>;
}
function TierBadge({ w }) {
  const t = wrestlerTier(w);
  return <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: ".1em", padding: "2px 6px", borderRadius: 3,
    background: "#1a1528", color: TIER_COLOR[t], border: `1px solid ${TIER_COLOR[t]}44`, textTransform: "uppercase" }}>
    {TIER_LABEL[t]}</span>;
}

// ---------- Intro ----------
function Intro({ onStart }) {
  return (
    <div className="ptp-card" style={{ paddingTop: 44 }}>
      <Eyebrow>A wrestling ratings-war roguelite</Eyebrow>
      <h1 style={{ fontFamily: display, fontWeight: 900, fontSize: 54, lineHeight: .9, margin: "6px 0 4px", letterSpacing: "-.02em", textShadow: "0 0 24px var(--accent)" }}>
        PRIME<br/>TIME<br/><span style={{ color: "var(--accent)" }}>POWERBOMB</span>
      </h1>
      <p style={{ color: "#9b94b3", fontSize: 14, lineHeight: 1.6, maxWidth: 520, marginTop: 14 }}>
        It's Monday night. Two wrestling promotions. One time slot. You're the booker, and every week you go to war with a rival show for the ratings. Book the matches, crown the champions, cut the promos, sign the next big thing before they do, and pull every dirty trick in the business. Every run is procedurally built, so no two wars play the same.
      </p>
      <div style={{ display: "flex", gap: 8, margin: "20px 0", flexWrap: "wrap" }}>
        {[["Book", "3 segments + a main event"], ["Crown", "2 belts, made & broken"], ["Poach", "raid the rival roster"], ["Sabotage", "win at any cost"]].map(([a, b], i) => (
          <div key={i} style={{ flex: "1 1 150px", border: "1px solid #261f38", borderRadius: 5, padding: "10px 12px", background: "#120f1d" }}>
            <div style={{ fontSize: 11, color: "var(--accent)", letterSpacing: ".1em", fontWeight: 800 }}>{a.toUpperCase()}</div>
            <div style={{ fontSize: 12, color: "#cfc8e6" }}>{b}</div>
          </div>
        ))}
      </div>
      <AccentBtn onClick={onStart}>Enter the war</AccentBtn>
      <p style={{ color: "#5a5470", fontSize: 11, marginTop: 14, textAlign: "center" }}>
        Inspired by the golden-age Monday Night Wars. Engine cousin of Apex &amp; Attrition.
      </p>
    </div>
  );
}

// ---------- reusable wrestler / team row ----------
function SectionLabel({ children, style }) {
  return (
    <div style={{ fontSize: 9.5, letterSpacing: ".16em", color: "#8c85a6", fontWeight: 800, textTransform: "uppercase", margin: "2px 0 4px", paddingBottom: 3, borderBottom: "1px solid #221c34", ...(style || {}) }}>
      {children}
    </div>
  );
}

// a two-state sort toggle: alphabetical (A–Z) or by rating (high first).
// shared across every wrestler list so the whole interface sorts the same way.
function SortToggle({ mode, onChange }) {
  const opts = [["name", "A–Z"], ["rating", "Rating"]];
  return (
    <div style={{ display: "inline-flex", gap: 3, background: "#15111f", border: "1px solid #261f38", borderRadius: 6, padding: 3 }}>
      {opts.map(([val, label]) => (
        <button key={val} onClick={() => onChange(val)} className="ptp-btn" style={{
          padding: "4px 10px", fontSize: 10.5, fontWeight: 800, letterSpacing: ".04em", cursor: "pointer",
          borderRadius: 4, border: "none",
          background: mode === val ? "var(--accent)" : "transparent",
          color: mode === val ? "#07060e" : "#9b94b3",
        }}>{label}</button>
      ))}
    </div>
  );
}

function RosterRow({ w, accent, compact, right }) {
  const isTeam = w.isTeam;
  const ovr = overallOf(w);
  const rating = isTeam ? (w.tagRating || ovr) : ovr;
  // colour the rating by tier band so signing decisions read at a glance
  const ratingColor = rating >= 80 ? "#ffd54f" : rating >= 68 ? "#54e0a0" : rating >= 55 ? "#cfc8e6" : "#9b94b3";
  // supporting detail line: who/what they are, origin, status. popularity and the
  // rating live in their own dedicated spots, so they are deliberately NOT repeated here.
  const detailBits = [];
  if (isTeam) detailBits.push(`${w.members[0].name} & ${w.members[1].name}`);
  else detailBits.push(`${w.archetype} · ${w.trait.tag}`);
  if (w.nation && !isTeam) detailBits.push(w.nation.flag);
  if (w.injured > 0) detailBits.push(`OUT ${w.injured}w`);

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, padding: compact ? "8px 0" : "11px 0", borderBottom: "1px solid #1d1830" }}>
      {/* left rail: one clean rating block, the row's visual anchor */}
      <div style={{ flexShrink: 0, width: 44, textAlign: "center" }}>
        <div style={{ fontFamily: display, fontWeight: 900, fontSize: 20, lineHeight: 1, color: ratingColor }}>{rating}</div>
        <div style={{ fontSize: 8, color: "#6f6889", letterSpacing: ".1em", marginTop: 2 }}>{isTeam ? "TAG" : "OVR"}</div>
      </div>

      {/* middle: name + badges, then a single supporting detail line */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
          <span style={{ fontFamily: display, fontWeight: 800, fontSize: 14, color: "#f3eeff" }}>{w.name}</span>
          {w.isChampion && !w.isTagChampion && <span title="World Champion" style={{ fontSize: 8.5, fontWeight: 900, color: "#ffd54f", background: "#2a2208", border: "1px solid #ffd54f88", borderRadius: 3, padding: "1px 5px", letterSpacing: ".05em" }}>WORLD CHAMP</span>}
          {w.isChampion && w.isTagChampion && <span title="Tag Team Champions" style={{ fontSize: 8.5, fontWeight: 900, color: "#7fd4ff", background: "#0a1f2a", border: "1px solid #7fd4ff88", borderRadius: 3, padding: "1px 5px", letterSpacing: ".05em" }}>TAG CHAMP</span>}
          {w.isWunderkind && <span style={{ fontSize: 8.5, fontWeight: 900, color: "#54e0ff", border: "1px solid #54e0ff66", borderRadius: 3, padding: "1px 5px", letterSpacing: ".06em" }}>PHENOM</span>}
          <AlignBadge align={w.align} />
        </div>
        <div style={{ fontSize: 11, color: "#8c85a6", marginTop: 3, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
          {detailBits.join(" · ")}
        </div>
      </div>

      {/* right: the action button, or a compact pop/tier readout when there's none */}
      <div style={{ textAlign: "right", flexShrink: 0 }}>
        {right ? right : (
          <>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#cfc8e6" }}>{w.popularity}</div>
            <div style={{ fontSize: 8, color: "#6f6889", letterSpacing: ".1em" }}>POP</div>
          </>
        )}
      </div>
    </div>
  );
}

// ---------- Setup ----------
function Setup({ runLengths, options, onGenerate, onChoose, onBackToSetup, playerColor, setPlayerColor, weeks }) {
  const [chosenWeeks, setChosenWeeks] = useState(12);
  const COLORS = ["#ff2e88", "#00e5ff", "#ffd200", "#7b5cff", "#00e676", "#ff6d00", "#ff3b5c", "#1de9b6"];

  if (!options) {
    return (
      <div>
        <Eyebrow>New run · Set the stage</Eyebrow>
        <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 30, margin: "4px 0 12px" }}>How long is the war?</h2>
        <Card>
          {runLengths.map((r) => (
            <button key={r.weeks} className="ptp-pick" onClick={() => setChosenWeeks(r.weeks)} style={{
              display: "block", width: "100%", textAlign: "left", marginBottom: 8, cursor: "pointer",
              background: chosenWeeks === r.weeks ? "#1c1730" : "#0f0c1a",
              border: `1.5px solid ${chosenWeeks === r.weeks ? "var(--accent)" : "#261f38"}`,
              borderRadius: 6, padding: "12px 14px", color: "#ece8f5",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontFamily: display, fontWeight: 800, fontSize: 16 }}>{r.label}</span>
                <span style={{ fontSize: 12, color: "var(--accent)", fontWeight: 700 }}>{r.weeks} weeks</span>
              </div>
              <div style={{ fontSize: 12, color: "#8c85a6", marginTop: 3 }}>{r.desc}</div>
            </button>
          ))}
        </Card>
        <div style={{ marginBottom: 4, fontSize: 11, color: "#9b94b3", letterSpacing: ".1em", textTransform: "uppercase" }}>Your promotion's colour</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
          {COLORS.map(c => (
            <button key={c} onClick={() => setPlayerColor(c)} style={{
              width: 34, height: 34, borderRadius: 6, cursor: "pointer", background: c,
              border: playerColor === c ? "3px solid #fff" : "3px solid transparent",
            }} />
          ))}
        </div>
        <AccentBtn onClick={() => onGenerate(chosenWeeks)}>Generate the matchup</AccentBtn>
      </div>
    );
  }

  // pick-a-side screen
  return (
    <div>
      <Eyebrow>Choose your side</Eyebrow>
      <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 28, margin: "4px 0 6px" }}>Two promotions. Pick one.</h2>
      <p style={{ color: "#8c85a6", fontSize: 13, marginBottom: 12 }}>
        Both start on equal footing, same firepower, different faces. Browse each roster below. Happy with one? Run with it and the other becomes your rival, handed to a cutthroat AI booker. Not feeling either? Reroll for a fresh pair, or step back to change the run settings.
      </p>
      {options.map((promo) => {
        const top = sortRoster(promo.roster, "rating").slice(0, 4);
        const champ = promo.roster.find(w => w.id === promo.titles.world.holderId);
        return (
          <Card key={promo.id} style={{ borderColor: "#2c2442" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <div>
                <div style={{ fontFamily: display, fontWeight: 900, fontSize: 22 }}>{promo.name}</div>
                <div style={{ fontSize: 11, color: "var(--accent)", letterSpacing: ".15em", fontWeight: 700 }}>{promo.tag} · {promo.roster.length} ACTS</div>
              </div>
            </div>
            <div style={{ fontSize: 12, color: "#9b94b3", margin: "8px 0 4px" }}>Top of the card:</div>
            {top.map(w => <RosterRow key={w.id} w={w} />)}
            {champ && <div style={{ fontSize: 11, color: "#ffd54f", marginTop: 8 }}>World Champ: {champ.name}</div>}
            <AccentBtn onClick={() => onChoose(promo, chosenWeeks)}>Run with {promo.name.split(" ")[0]}</AccentBtn>
          </Card>
        );
      })}
      <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
        <button className="ptp-btn" onClick={() => onGenerate(chosenWeeks)} style={{
          flex: 1, padding: "12px", background: "transparent",
          color: "#cfc8e6", border: "1px solid #3a3354", borderRadius: 5,
          fontFamily: display, fontWeight: 700, fontSize: 13, cursor: "pointer", letterSpacing: ".04em",
        }}>↻ Reroll companies</button>
        <button className="ptp-btn" onClick={onBackToSetup} style={{
          flex: 1, padding: "12px", background: "transparent",
          color: "#9b94b3", border: "1px solid #261f38", borderRadius: 5,
          fontFamily: display, fontWeight: 700, fontSize: 13, cursor: "pointer", letterSpacing: ".04em",
        }}>← Run settings</button>
      </div>
    </div>
  );
}

}

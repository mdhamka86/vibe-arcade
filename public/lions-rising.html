let UID = 1;
const rnd = (a, b) => Math.random() * (b - a) + a;
const ri = (a, b) => Math.floor(rnd(a, b + 1));
const pick = (arr) => arr[ri(0, arr.length - 1)];
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const avg = (arr) => (arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : 0);

// attribute band the whole game respects
const ATTR_MIN = 38, ATTR_MAX = 88;
const cap = (v) => clamp(Math.round(v), ATTR_MIN, ATTR_MAX);

function P(n, pos, age, pac, tec, phy, men, club, extra = {}) {
  return { n, pos, age, pac: cap(pac), tec: cap(tec), phy: cap(phy), men: cap(men), club, real: true, ...extra };
}

const OVR_WEIGHTS = {

};
const OVR_DEFAULT = [0.25, 0.25, 0.25, 0.25];
function overall(p) {
  const w = OVR_WEIGHTS[p.pos] || OVR_DEFAULT;
  return Math.round(p.pac * w[0] + p.tec * w[1] + p.phy * w[2] + p.men * w[3]);

function realCaps(seed) {
  if (REAL_CAPS[seed.n] != null) return REAL_CAPS[seed.n];
  if (seed.youth || seed.depth) return ri(0, 6);
  // estimate from age for undocumented seniors: roughly 3 caps a year after 18
  return clamp(Math.round((seed.age - 18) * ri(2, 4)), 2, 80);
}
function makeReal(seed) { return { id: UID++, ...seed, form: ri(-3, 3), caps: realCaps(seed), retired: false, clubForm: ri(-2, 2) }; }

// real young prospect: enters raw, improves toward ceiling each window.
// growthArrow holds last window's overall gain so the UI can show a green arrow.
function makeProspect() {
  const r = pick(REAL_PROSPECTS);
  const core = r.base;
  const j = () => cap(core + ri(-4, 4));
  return {
    id: UID++, n: r.n, pos: r.pos, club: r.from, age: ri(17, 20),
    pac: j(), tec: j(), phy: j(), men: j(),
    real: true, youth: true, form: 0, caps: 0, retired: false,
    _ceiling: r.ceil, _devType: pick(["fast", "fast", "steady", "steady", "steady", "late", "bust"]),
    growthArrow: 0, clubForm: ri(-2, 3),
  };
}

function Tip({ text, children }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    if (!show) return;
    const close = () => setShow(false);
    const t = setTimeout(close, 4000);
    document.addEventListener("click", close);
    return () => { clearTimeout(t); document.removeEventListener("click", close); };
  }, [show]);
  function onTap(e) {
    // don't hijack taps on actual controls (Court/Offer buttons) wrapped by the tip
    if (e.target.closest("button")) return;
    e.stopPropagation();
    setShow((s) => !s);
  }
  return (
    <span className={`tip ${show ? "show" : ""}`} onClick={onTap}>
      {children}<span className="tiptext">{text}</span>
    </span>
  );
}

// ----- non-repeating pickers: cycle a pool without repeats until exhausted -----
function makeCycler(pool) {
  let bag = [];
  return () => {
    if (bag.length === 0) bag = [...pool].sort(() => Math.random() - 0.5);
    return bag.pop();
  };
}

// builds a short, varied newspaper-style match report from the result
function makeMatchReport({ opp, og, ag, outcome, scorerLine, motm, tactic, causewayBonus }) {
  const margin = Math.abs(og - ag);
  const lead = (() => {
    if (causewayBonus) return `The Causeway roared red and white as Singapore got the better of old rivals ${opp}.`;
    if (outcome === "W" && margin >= 3) return `A statement performance. Singapore swept ${opp} aside with real authority.`;
    if (outcome === "W" && margin === 2) return `A controlled, confident win for the Lions against ${opp}.`;
    if (outcome === "W") return `Singapore edged a tight one past ${opp}, grinding out the result.`;
    if (outcome === "D" && og >= 2) return `An entertaining share of the spoils as Singapore and ${opp} traded blows.`;
    if (outcome === "D") return `A cagey, hard-fought stalemate between Singapore and ${opp}.`;
    if (outcome === "L" && margin >= 3) return `A chastening afternoon for the Lions, outclassed by ${opp}.`;
    if (outcome === "L" && margin === 2) return `${opp} had the edge, and Singapore couldn't quite respond.`;
    return `Heartbreak by the odd goal as ${opp} nicked it against a battling Singapore.`;
  })();
  const mid = (() => {
    if (outcome === "W") return scorerLine ? `${scorerLine} did the damage on the scoresheet.` : `The Lions found a way without their names headlining the goals.`;
    if (outcome === "D") return scorerLine ? `${scorerLine} kept Singapore in it.` : `Chances came and went, but the net stayed unkind.`;
    return scorerLine ? `${scorerLine} offered hope, but it wasn't enough.` : `The Lions huffed and puffed but couldn't break through.`;
  })();
  const tac = `Set up to ${tactic === "Front Foot" ? "press high and attack" : tactic === "Low Block" ? "sit deep and frustrate" : "stay balanced"}, the gaffer's plan ${outcome === "W" ? "paid off handsomely" : outcome === "D" ? "earned a point" : "didn't come off this time"}.`;
  const motmLine = motm ? `${motm.n} was the standout, rated ${motm.rating.toFixed(1)} and named Man of the Match.` : "";
  return { lead, mid, tac, motmLine };
}

  const SQUAD_MINS = { GK: 2, DEF: 5, MID: 5, ATT: 3 };

  const squadCoverage = useMemo(() => {
    const counts = { GK: 0, DEF: 0, MID: 0, ATT: 0 };
    squadPool.forEach((p) => { counts[posBucket(p.pos)]++; });
    const missing = [];
    const LABEL = { GK: "goalkeeper", DEF: "defender", MID: "midfielder", ATT: "forward" };

      if (counts[g] < need) missing.push(`${need - counts[g]} more ${LABEL[g]}${need - counts[g] > 1 ? "s" : ""}`);
    });

  }, [squadPool]);
  // the best 50 players shown on the selection screen, with every position covered.
  // club form is factored into the ranking so the 50 rotates as form shifts each turn.
  const top50Pool = useMemo(() => {
    if (livePool.length <= 50) return livePool;
    const score = (p) => overall(p) + (p.clubForm || 0);
    const bucket = posBucketG;
    const minPer = { GK: 3, DEF: 8, MID: 8, ATT: 5 }; // guarantee coverage
    const byGroup = { GK: [], DEF: [], MID: [], ATT: [] };
    const ranked = [...livePool].sort((a, b) => score(b) - score(a)); // sort once, reuse
    ranked.forEach((p) => byGroup[bucket(p.pos)].push(p));
    const chosen = new Set();
    Object.entries(minPer).forEach(([g, n]) => byGroup[g].slice(0, n).forEach((p) => chosen.add(p.id)));
    // fill remaining slots up to 50 with the best leftover by score
    ranked.forEach((p) => { if (chosen.size < 50) chosen.add(p.id); });
    return livePool.filter((p) => chosen.has(p.id));
  }, [livePool]);
  // grade how much each position group needs reinforcing (fewer + weaker = more need)
  const squadNeeds = useMemo(() => {
    const groups = { GK: "Goalkeeper", DEF: "Defence", MID: "Midfield", ATT: "Attack" };
    const bucket = posBucketG;
    const ideal = { GK: 3, DEF: 8, MID: 7, ATT: 6 }; // healthy depth per group
    const out = [];
    for (const key of Object.keys(groups)) {
      const players = livePool.filter((p) => bucket(p.pos) === key);
      const count = players.length;
      const ratings = players.map((p) => overall(p)).sort((a, b) => b - a);
      const top = ratings.length ? ratings[0] : 0; // best player in the group
      const topAvg = ratings.length ? avg(ratings.slice(0, ideal[key])) : 0;
      // is there an uncommitted heritage target who would be the new best here?
      const upgrade = targets
        .filter((t) => t.status !== "committed" && bucket(t.pos) === key)
        .map((t) => ({ n: t.n, ovr: overall(t) }))
        .filter((t) => t.ovr > top)
        .sort((a, b) => b.ovr - a.ovr)[0] || null;
      const depthGap = Math.max(0, ideal[key] - count);
      const qualGap = Math.max(0, 72 - topAvg);
      const need = depthGap * 6 + qualGap;
      out.push({ key, label: groups[key], count, top: Math.round(top), topAvg: Math.round(topAvg), need, upgrade });

    Object.entries(SQUAD_MINS).forEach(([g, need]) => {

    slots.forEach((role, idx) => {
      let best = null, bs = -1;
      avail.forEach((p) => { if (used.has(p.id)) return; const sc = (overall(p) + (p.form || 0)) * slotFit(p.pos, role); if (sc > bs) { bs = sc; best = p; } });
      if (best) { nx[idx] = best.id; used.add(best.id); }

  function play() {

    setXiTally((t) => ({ local: t.local + xiLocal, heritage: t.heritage + xiHeritage }));
    let sum = 0;
    xiList.forEach(({ role, p }) => { sum += (overall(p) + (p.form || 0)) * slotFit(p.pos, role); });
    let our = sum / 11;
    const t = TACTICS[tactic];
    let adj = 0;
    if (tactic === "Low Block") adj = oppStr > our ? 4 : -2;
    if (tactic === "Front Foot") adj = oppStr < our ? 4 : -5;
    our += adj;

    // pre-match team talk: each has an upside and a downside, resolved 50/50
    let talkAtk = 0, talkDef = 0, talkResult = null;
    if (teamTalk) {
      const tt = teamTalk;
      const good = Math.random() < 0.55; // slight edge to it working
      if (good) { talkAtk = Math.max(0, tt.atk); talkDef = Math.max(0, tt.def); }
      else { talkAtk = Math.min(0, tt.atk); talkDef = Math.min(0, tt.def); }
      // formAll applies regardless (the rousing ones lift morale either way)
      talkResult = { good, label: tt.label, effect: good ? tt.effGood : tt.effBad };
    }

    const diff = our - oppStr;
    const og = clamp(Math.round(rnd(0, 2.3) + diff / 11 + t.atk * 0.3 + talkAtk * 0.4), 0, 6);
    const ag = clamp(Math.round(rnd(0, 2.3) - diff / 11 - t.def * 0.3 - talkDef * 0.4), 0, 6);
    const outcome = og > ag ? "W" : og < ag ? "L" : "D";

    // --- assign goalscorers, weighted toward attackers ---
    const scoreWeight = (p) => ({ ST: 10, RW: 6, LW: 6, AM: 6, CM: 3, RB: 1.5, LB: 1.5, DM: 1.5, CB: 1, GK: 0 }[p.pos] || 2);
    const scorers = [];
    const scorerFullNames = [];
    const attackers = xiList.map((x) => x.p);
    for (let i = 0; i < og; i++) {
      const totalW = attackers.reduce((s, p) => s + scoreWeight(p), 0);
      let r = rnd(0, totalW), chosen = attackers[0];
      for (const p of attackers) { r -= scoreWeight(p); if (r <= 0) { chosen = p; break; } }
      scorers.push(chosen.n.split(" ").slice(-1)[0]);
      scorerFullNames.push(chosen.n);
    }
    // tally for display: "Ilhan x2, Shawal"
    const tally = {};
    scorers.forEach((n) => { tally[n] = (tally[n] || 0) + 1; });
    const scorerLine = Object.entries(tally).map(([n, c]) => c > 1 ? `${n} ×${c}` : n).join(", ");
    // pick a fun fact about one of the goalscorers (real if known, funny fallback otherwise)
    let scorerFact = null;
    if (scorerFullNames.length) {
      const withReal = scorerFullNames.find((n) => playerFact(n));
      const factName = withReal || pick(scorerFullNames);
      const factText = playerFact(factName) || `${factName.split(" ").slice(-1)[0]} ${funnyFactCycler.current()}`;
      scorerFact = { name: factName, text: factText };
    }

    // --- per-player match ratings (6.0-9.5), drive development ---
    const matchRatings = {};
    xiList.forEach(({ role, p }) => {
      const fit = slotFit(p.pos, role);
      let r = 6.5 + (outcome === "W" ? 0.6 : outcome === "D" ? 0 : -0.6);
      r += (fit - 0.85) * 2;               // playing in position helps
      r += rnd(-0.8, 0.9);                  // variance
      if (scorers.includes(p.n.split(" ").slice(-1)[0])) r += 0.8; // scored
      // GK / defenders rewarded for clean sheets
      if ((p.pos === "GK" || p.pos === "CB") && ag === 0) r += 0.6;
      matchRatings[p.id] = clamp(Math.round(r * 10) / 10, 5.0, 9.7);
    });

    const xiSet = new Set(Object.values(lineup));

    // --- rare, funny injury (about 12% a match, only to someone who played) ---
    let injury = null;
    if (Math.random() < 0.12) {
      const xiPlayers = [...xiSet].map((id) => playerById(id)).filter(Boolean);
      const victim = pick(xiPlayers);
      if (victim) {
        const weeks = ri(1, 2);
        injury = { id: victim.id, n: victim.n, pos: victim.pos, until: w + weeks, reason: pick(INJURY_REASONS), physio: pick(PHYSIO_NOTES) };
      }
    }

    setPool((cur) => cur.map((p) => {
      if (!xiSet.has(p.id)) return p;
      const df = outcome === "W" ? ri(0, 3) : outcome === "D" ? ri(-1, 2) : ri(-3, 1);
      const inj = injury && injury.id === p.id ? { injuredUntil: injury.until, injuryReason: injury.reason } : {};
      return { ...p, form: clamp((p.form || 0) + df, -6, 8), caps: p.caps + 1, lastRating: matchRatings[p.id], ...inj };
    }));

    // --- FIFA ranking movement: beating stronger sides climbs faster ---
    const gap = oppStr - our; // positive = opponent was stronger
    let rankDelta = 0;
    if (outcome === "W") {
      // bigger jump the tougher the opponent; qualifiers and clear upsets jump hardest
      rankDelta = -(2 + Math.max(0, Math.round(gap / 2)) + (fixture.type === "qualifier" ? 2 : 0));
      if (gap >= 8) rankDelta -= 3; // statement upset bonus
    } else if (outcome === "D") {
      rankDelta = gap > 6 ? -2 : gap > 0 ? -1 : 0;
    } else {
      rankDelta = oppStr < our ? 3 : 1; // losing to weaker sides hurts more
    }
    // Causeway Challenge easter egg: beating Malaysia is worth a little extra
    const causewayBonus = (fixture.opp === "Malaysia" && outcome === "W");
    if (causewayBonus) rankDelta -= 2;
    const newRanking = clamp(ranking + rankDelta, 1, 200);
    setRanking(newRanking);

    const infGain = (outcome === "W" ? 2 : outcome === "D" ? 1 : 0) + (causewayBonus ? 1 : 0);

    // --- man of the match: highest match rating among the XI, gets a small form bonus ---
    let motm = null;
    const ratedEntries = Object.entries(matchRatings).map(([id, r]) => ({ p: playerById(Number(id)), r })).filter((x) => x.p);
    if (ratedEntries.length) {
      ratedEntries.sort((a, b) => b.r - a.r);
      const top = ratedEntries[0];
      motm = { id: top.p.id, n: top.p.n, pos: top.p.pos, rating: top.r };
      setPool((cur) => cur.map((p) => p.id === top.p.id ? { ...p, form: clamp((p.form || 0) + 2, -6, 8) } : p));
    }

    // --- short auto-generated match report ---
    const report = makeMatchReport({ opp: fixture.opp, og, ag, outcome, scorerLine, motm, tactic, causewayBonus });
    const vmargin = Math.abs(og - ag);
    const vkey = outcome === "W" ? (vmargin >= 3 ? "bigWin" : "win") : outcome === "D" ? "draw" : (vmargin >= 3 ? "bigLoss" : "loss");
    const vb = VERDICT_BUILD[vkey];
    const verdict = `${pick(vb.lead)} ${pick(vb.tail)}`;

    setLastMatch({ w, opp: fixture.opp, type: fixture.type, og, ag, outcome, tactic, formation, infGain, scorerLine, rankBefore: ranking, rankAfter: newRanking, matchRatings, injury, causewayBonus, motm, report, talkResult, verdict, scorerFact });
    setTeamTalk(null);
    // press conference appears ~50% of matches, never repeating a question within a run
    setPresser(Math.random() < 0.5 ? presserCycler.current() : null);
    setScreen("matchresult");
  }

  function chooseFriendly(opp) {
    setSchedule((cur) => cur.map((s) => s.w === w ? { ...s, opp, type: "friendly", note: "Self-arranged friendly (recruitment signal)" } : s));
    if (opp === "Malaysia") {
      setMsg("🔥 THE CAUSEWAY CHALLENGE! Singapore vs Malaysia is a must-win for Kallang Roar pride. Beat the old rivals and you'll get a small bonus boost (Influence + a bigger ranking jump). Don't you dare lose this one.");
    } else {
      setMsg(`Friendly vs ${opp} booked. Heritage targets are watching your ambition.`);
    }
  }

  function toggleSelect(id) {
    setSelected((cur) => {
      const nx = new Set(cur);
      if (nx.has(id)) nx.delete(id);
      else { if (nx.size >= SQUAD_MAX) { setMsg(`Squad is full at ${SQUAD_MAX}. Drop someone first.`); return nx; } nx.add(id); }
      return nx;
    });
  }

  function confirmSquad() {
    if (selected.size === 0 || selected.size > SQUAD_MAX) return;
    if (!squadCoverage.ok) { setMsg(`Your squad needs ${squadCoverage.missing.join(", ")} before you can confirm.`); return; }
    // fresh random set of 5 team talks for this match, so the hub never looks identical
    setMatchTalks([...TEAM_TALKS].sort(() => Math.random() - 0.5).slice(0, 5));
    // clear any XI placements for players not in the 25
    setLineup((cur) => { const nx = {}; for (const k of Object.keys(cur)) if (selected.has(cur[k])) nx[k] = cur[k]; return nx; });
    setHeld(null); setMsg("");
    setScreen("hub");
  }

  function advance() {
    // record result now
    setResults((r) => [...r, lastMatch]);
    if (w >= TOTAL_WINDOWS) { buildProphecy(); setScreen("prophecy"); return; }

    const retired = [], devNews = [], intakeNews = [];
    let next = pool.map((p) => {
      if (p.retired) return p;
      let np = { ...p, age: p.age + (w % 2 === 0 ? 1 : 0) };
      // match-rating multiplier: a 7.0 is neutral, higher accelerates growth, lower stalls it
      const perfMult = p.lastRating ? clamp(0.5 + (p.lastRating - 7.0) * 0.4, 0.3, 1.8) : 1;
      if (p.youth) {
        const before = overall(p);
        const gap = p._ceiling - before;
        let g = 0;
        if (p._devType === "fast") g = gap * rnd(0.22, 0.4);
        else if (p._devType === "steady") g = gap * rnd(0.1, 0.22);
        else if (p._devType === "late") g = w > 7 ? gap * rnd(0.18, 0.34) : gap * rnd(0.02, 0.07);
        else g = gap * rnd(-0.04, 0.07); // bust
        g *= perfMult; // playing well speeds development, warming the bench slows it
        np.pac = cap(np.pac + g * 0.9 + ri(-1, 1));
        np.tec = cap(np.tec + g * 1.0 + ri(-1, 1));
        np.phy = cap(np.phy + g * 0.9 + ri(-1, 1));
        np.men = cap(np.men + g * 1.1 + ri(-1, 1));
        np.growthArrow = overall(np) - before;
        if (Math.abs(g) > 3) devNews.push({ n: np.n, up: g > 0, ovr: overall(np), bust: p._devType === "bust" && g <= 0 });
      } else if (p.lastRating && p.lastRating >= 7.6 && p.age < 31 && overall(p) < 84) {
        // in-form senior players sharpen slightly (peak years only)
        const before = overall(p);
        np.tec = cap(np.tec + 1); np.men = cap(np.men + 1);
        np.growthArrow = overall(np) - before;
        if (np.growthArrow > 0) devNews.push({ n: np.n, up: true, ovr: overall(np), bust: false });
      } else {
        np.growthArrow = 0;
      }
      np.lastRating = undefined; // consumed
      const rc = np.age >= 40 ? 0.5 : np.age >= 36 ? 0.22 : np.age >= 34 ? 0.08 : 0;
      if (!np.youth && Math.random() < rc) {
        np.retired = true;
        retired.push({ n: np.n, age: np.age, caps: np.caps, pos: np.pos, bio: BIOS[np.n] || GENERIC_BIO, job: pick(COOL_JOBS), fact: playerFact(np.n) || `${np.n.split(" ").slice(-1)[0]} ${funnyFactCycler.current()}` });
      }
      return np;
    });
    // simulate each player's club form for the upcoming window (drives selection arrows)
    next = next.map((p) => {
      if (p.retired) return p;
      const drift = ri(-3, 3) + (p.youth ? 1 : 0); // youngsters trend up at club level
      const cf = clamp((p.clubForm || 0) * 0.4 + drift, -6, 7);
      return { ...p, clubForm: Math.round(cf), prevClubForm: p.clubForm || 0 };
    });
    const havePros = new Set(next.filter((p) => !p.retired).map((p) => p.n));
    const intake = [];
    let guard = 0;
    while (intake.length < ri(2, 3) && guard < 40) {
      guard++;
      const cand = makeProspect();
      if (havePros.has(cand.n) || intake.find((x) => x.n === cand.n)) continue;
      havePros.add(cand.n); intake.push(cand);
      intakeNews.push({ n: cand.n, pos: cand.pos, age: cand.age, ovr: overall(cand), ceil: cand._ceiling });
    }
    next = [...next, ...intake];

    setTargets((cur) => cur.map((t) => t.status === "declined" && recentForm > 0.6 && Math.random() < 0.5 ? { ...t, status: "open" } : t));

    // legend mentor visit (~22%): a Singapore great drops by, lifts the whole squad a touch
    let legendVisit = null;
    if (Math.random() < 0.22) {
      const L = pick(LEGENDS);
      legendVisit = { n: L.n, bio: L.bio };
      next = next.map((p) => p.retired ? p : { ...p, form: clamp((p.form || 0) + 1, -6, 8) });
    }

    // clear retired/placed from lineup
    const live = new Set(next.filter((p) => !p.retired).map((p) => p.id));
    setLineup((cur) => { const nx = {}; for (const k of Object.keys(cur)) if (live.has(cur[k])) nx[k] = cur[k]; return nx; });

    // roll a side event; if it's the MRT breakdown, a random available player misses the next match
    const sideEvent = Math.random() < 0.7 ? pick(SIDE_EVENTS) : null;
    if (sideEvent && sideEvent.missPlayer) {
      const available = next.filter((p) => !p.retired && (p.injuredUntil || 0) <= w + 1);
      const unlucky = pick(available);
      if (unlucky) {
        sideEvent.missName = unlucky.n;
        next = next.map((p) => p.id === unlucky.id ? { ...p, injuredUntil: w + 2, injuryReason: "was stranded by the MRT breakdown" } : p);
      }
    }

    setPool(next);
    setEvents({ retired, devNews, intakeNews, sideEvent, legendVisit });
    setInfluence(INFLUENCE_START + ((lastMatch && lastMatch.infGain) || 0)); // refill + win bonus
    setHeld(null); setMsg("");
    setW(w + 1);
    setScreen("windownews");
  }

  function buildProphecy() {
    const finalR = teamRating;
    const climb = finalR - baseline;
    const climbPct = baseline ? Math.round((climb / baseline) * 100) : 0;
    const heritageJoined = pool.filter((p) => p.naturalised && !REAL_POOL.find((r) => r.n === p.n)).length;
    const youthBreakout = pool.filter((p) => p.youth && !p.retired && overall(p) >= 70).length;
    const wins = [...results, lastMatch].filter((r) => r && r.outcome === "W").length;

    // strength lookup: Singapore uses YOUR built rating; everyone else their real-anchored rating
    const strOf = (team) => (team === "Singapore" ? finalR : (OPP[team] != null ? OPP[team] : 65));
    // sim one match, returns {og, ag} from teamA's perspective; knockout forces a winner
    function sim(a, b, knockout) {
      const diff = strOf(a) - strOf(b);
      let ag = clamp(Math.round(rnd(0, 2.1) + diff / 13), 0, 5);
      let bg = clamp(Math.round(rnd(0, 2.1) - diff / 13), 0, 5);
      if (knockout && ag === bg) {
        // extra time / pens nudge toward the stronger side but leave room for an upset
        if (rnd(0, 1) < clamp(0.5 + diff / 30, 0.15, 0.85)) ag += 1; else bg += 1;
      }
      return { ag, bg };
    }

    // --- Group D: Singapore's real group ---
    const groupRivals = ASIAN_CUP_GROUPS.D.filter((t) => t !== "Singapore"); // Australia, Tajikistan, Iraq
    const games = groupRivals.map((opp) => {
      const { ag, bg } = sim("Singapore", opp, false);
      const res = ag > bg ? "W" : ag < bg ? "L" : "D";
      return { opp, og: ag, ag: bg, res, pts: res === "W" ? 3 : res === "D" ? 1 : 0 };
    });
    const pts = games.reduce((s, g) => s + g.pts, 0);
    const gd = games.reduce((s, g) => s + (g.og - g.ag), 0);
    const gf = games.reduce((s, g) => s + g.og, 0);

    // simple model of the rivals' own mini-table to place Singapore 1st-4th
    // approximate each rival's expected points from their strength vs the group
    const groupTeams = ASIAN_CUP_GROUPS.D.map((t) => {
      if (t === "Singapore") return { t, pts, gd, gf };
      // rival expected points: sim them vs the other two non-SG teams + their result vs us (inverse)
      let rp = 0, rgd = 0, rgf = 0;
      ASIAN_CUP_GROUPS.D.forEach((o) => {
        if (o === t) return;
        if (o === "Singapore") {
          const ours = games.find((g) => g.opp === t);
          const r = ours.res === "W" ? "L" : ours.res === "L" ? "W" : "D";
          rp += r === "W" ? 3 : r === "D" ? 1 : 0; rgd += ours.ag - ours.og; rgf += ours.ag;
        } else {
          const { ag, bg } = sim(t, o, false);
          rp += ag > bg ? 3 : ag === bg ? 1 : 0; rgd += ag - bg; rgf += ag;
        }
      });
      return { t, pts: rp, gd: rgd, gf: rgf };
    });
    groupTeams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    const placeIdx = groupTeams.findIndex((x) => x.t === "Singapore");
    const placing = ["1st", "2nd", "3rd", "4th"][placeIdx];

    // advancement: top 2 always; 3rd qualifies as one of 4 best thirds (~60% if competitive)
    let advanced = false, bestThird = false;
    if (placeIdx <= 1) advanced = true;
    else if (placeIdx === 2) { bestThird = pts >= 4 || (pts === 3 && gd >= 0); advanced = bestThird; }

    // --- knockout run (only if advanced) ---
    const knockout = [];
    let alive = advanced, roundsWon = 0;
    if (advanced) {
      // plausible real opponents by round, scaling in difficulty
      const ko = [
        { round: "Round of 16", opp: placeIdx === 0 ? "Vietnam" : "South Korea" },
        { round: "Quarter-final", opp: "Iran" },
        { round: "Semi-final", opp: "Saudi Arabia" },
        { round: "Final", opp: "Japan" },
      ];
      for (const tie of ko) {
        if (!alive) break;
        const { ag, bg } = sim("Singapore", tie.opp, true);
        const win = ag > bg;
        knockout.push({ ...tie, og: ag, ag: bg, win });
        if (win) roundsWon++; else { alive = false; }
      }
    }

    // headline based on how deep the run went
    let headline, tone, finishLabel;
    const wonFinal = knockout.length === 4 && knockout[3].win;
    if (wonFinal) { headline = "CHAMPIONS OF ASIA"; finishLabel = "Winners"; tone = "Do not adjust your screen. Singapore, ranked outside the world's top 140 a year ago, are CHAMPIONS OF ASIA. The single greatest story in the history of the Asian game. Gavin Lee has built a miracle."; }
    else if (knockout.length === 4) { headline = "RUNNERS-UP — UNTHINKABLE"; finishLabel = "Final"; tone = "Singapore reached the final of the Asian Cup. Beaten at the last, but a fairytale beyond anyone's wildest dreams. A nation will never forget this team."; }
    else if (roundsWon >= 2) { headline = "INTO THE SEMI-FINALS"; finishLabel = "Semi-final"; tone = "The Lions roared into the last four of Asia. Pure history, the kind of run that rewrites what a small footballing nation believes is possible."; }
    else if (roundsWon === 1) { headline = "QUARTER-FINAL HEROES"; finishLabel = "Quarter-final"; tone = "A knockout win and a place in the last eight of the continent. Singapore announced themselves on the biggest stage."; }
    else if (advanced) { headline = "THROUGH THE GROUP — HISTORY MADE"; finishLabel = "Round of 16"; tone = "Out of a group with Australia and Iraq, Singapore reached the Asian Cup knockouts for the first time ever. The bus home will be loud."; }
    else if (pts >= 3) { headline = "PROUD BUT EDGED OUT"; finishLabel = "Group stage"; tone = "Real points against a brutal group, but the Lions bow out at the first stage with their heads held very high."; }
    else if (pts >= 1) { headline = "A POINT TO BUILD ON"; finishLabel = "Group stage"; tone = "Outgunned by Australia, Iraq and a tricky Tajikistan, but the Lions never stopped competing and took something home."; }
    else { headline = "THE EDUCATION OF A NATION"; finishLabel = "Group stage"; tone = "Three hard lessons against elite opposition. No points, but priceless experience for a young core."; }

    setProphecy({
      finalR, baseline, climb, climbPct, heritageJoined, youthBreakout, wins,
      groupName: "D", groupRivals, games, pts, gd, placing, advanced, bestThird,
      knockout, finishLabel, headline, tone, groupTable: groupTeams,
      finalRank: ranking,
    });
  }

  // ================= RENDER =================
  return (
    <div className="wrap">
      <style>{css}</style>

      {confirmRestart && (
        <div className="modalback" onClick={() => setConfirmRestart(false)}>

              <button className="modalcancel" onClick={() => setConfirmRestart(false)}>Keep playing</button>
              <button className="modalconfirm" onClick={doRestart}>Restart</button>
            </div>
          </div>
        </div>
      )}

      {screen === "intro" && (
        <div className="screen intro">
          <div className="monogram flag"><span>🇸🇬</span><div className="mline" /></div>
          <div className="kicker">10 TURNS</div>
          <h1>Lions<span> Rising</span></h1>
          <p className="tagline">A mini football manager game celebrating Singapore's maiden Asian Cup qualification.</p>
          <p className="lede">You are Singapore's new coach. <strong>10 turns</strong> to build the Lions before their first <strong>Asian Cup</strong>. Pick, recruit, win, and see how far you can take them.</p>
          <p className="ledesub">A quick take on Football Manager, inspired by 38and0 with a local twist.</p>
          <div className="goalshd">Your mission</div>
          <div className="pillars">
            <div className="pillar"><span className="pnum">01</span><b>How far can you take the Lions?</b><p>Lift Singapore's rating and ranking as high as you can before the Asian Cup kicks off.</p></div>
            <div className="pillar"><span className="pnum">02</span><b>Naturalisation route or local route?</b><p>Chase heritage stars from abroad, build through homegrown talent, or blend both. Your call.</p></div>
            <div className="pillar"><span className="pnum">03</span><b>Know our boys better</b><p>Real Singapore players, real clubs. Get to know the squad as you pick, develop and lead them.</p></div>
          </div>
          <button className="bigbtn" onClick={start}>Begin the road →</button>
          <button className="bigbtn knowbtn" onClick={() => { setProfilePlayer(null); setKnowReturn("intro"); setScreen("knowlions"); }}>Know Your Lions</button>
          <p className="foot">All events are fictional. I hope as f*** we go as far as we can. Make us proud, boys!</p>
        </div>
      )}

      {screen === "howto" && (
        <div className="screen">
          <div className="httag">Before you kick off</div>
          <h2 className="htttl">The 30-second team talk</h2>
          <p className="htintro">No manuals, lah. Here's everything you need, then we play.</p>

          <div className="htcard">
            <div className="htnum">1</div>
            <div><b>The objective</b><p>You have 10 turns before the Asian Cup. Each turn: build your squad, play a match, climb the FIFA ranking. Get the Lions as high as you can, then survive the tournament. No pressure. Okay, a little pressure.</p></div>
          </div>

          <div className="htcard">
            <div className="htnum">2</div>
            <div><b>Naturalisation & heritage</b><p>First stop each turn. Real players with Singaporean roots (think Perry Ng at Cardiff) can be courted using Influence. Spend it to convince them to wear the Lion. They might say yes, they might ghost you. Quality costs more.</p></div>
          </div>

          <div className="htcard">
            <div className="htnum">3</div>
            <div><b>The 25-man selection</b><p>Your coaches shortlist the best 50, you trim to 25. You must cover every position (min 2 GK, 5 DEF, 5 MID, 3 ATT) or you can't confirm. Injured or stranded players are greyed out. Tap "Best 25" if you trust the staff.</p></div>
          </div>

          <div className="htcard">
            <div className="htnum">4</div>
            <div><b>Formation, XI & tactics</b><p>Pick a shape (4-3-3, 4-4-2, etc), fill your 11, and choose a tactic from Park the Bus to All-Out Attack. Then a team talk: every option can fire them up or backfire spectacularly. Choose your kopitiam wisdom wisely.</p></div>
          </div>

          <div className="htcard">
            <div className="htnum">5</div>
            <div><b>Then just play</b><p>Watch the match, read the tabloid headlines, handle the press, ride the chaos. Win or lose, you move to the next turn. After turn 10, the Asian Cup awaits. Majulah!</p></div>

              <div className="npcol"><h4>Academy watch</h4><ul>{events.intakeNews.map((p, i) => <li key={i}><b>{p.n}</b> ({p.pos}, {p.age}) · {p.ovr} now <span className="pothint">▲ will grow if you play him</span></li>)}</ul></div>

      {screen === "prophecy" && prophecy && (
        <div className="screen">
          <div className="kicker">FULL TIME ON THE ROAD · YOU MADE IT TO SAUDI</div>
          <h1>Asian Cup <span>Reckoning</span></h1>
          <p className="lede">Congratulations, you got Singapore to its first Asian Cup on merit. 10 turns done. We simulated the whole tournament in the background, here's how your Lions did.</p>

          <div className="finalrankbox">
            <span className="frlabel">Final FIFA World Ranking</span>
            <b className="frnum">#{prophecy.finalRank}</b>
            <span className={`frmove ${prophecy.finalRank < 148 ? "up" : prophecy.finalRank > 148 ? "down" : "flat"}`}>
              {prophecy.finalRank < 148 ? `▲ up ${148 - prophecy.finalRank} from #148` : prophecy.finalRank > 148 ? `▼ down ${prophecy.finalRank - 148}` : "level with where you started"}

          </div>

          <h2 className="thead">Group D · Australia, Iraq, Tajikistan, Singapore</h2>

            {prophecy.games.map((g, i) => (

                <span className="simopp">🇸🇬 SGP vs {FLAG[g.opp]} {g.opp}</span>
                <span className="simscore">{g.og} – {g.ag}</span>
                <span className="simres">{g.res}</span>
              </div>

            <div className="grouptable">
              {prophecy.groupTable.map((t, i) => (

                  <span className="gtname">{FLAG[t.t === "Singapore" ? "Singapore" : t.t] || "🇸🇬"} {t.t}</span>

          {prophecy.knockout.length > 0 && (
            <>
              <h2 className="thead">Knockout run</h2>

            <div><b>{prophecy.heritageJoined}</b><span>heritage signings</span></div>
            <div><b>{prophecy.youthBreakout}</b><span>youth at 70+</span></div>
            <div><b>{prophecy.wins}</b><span>wins on the road</span></div>

          <div className="roarcard">
            <div className="roarcardhd">{prophecy.climb > 0 ? "How you improved the nation" : prophecy.climb < 0 ? "How it went backwards" : "How the year held steady"}</div>

              {prophecy.climb > 0
                ? `You lifted the team rating by ${prophecy.climb} points (${prophecy.climbPct}%) and climbed ${Math.max(0, 148 - prophecy.finalRank)} places up the world ranking. A genuine step forward for Singapore football.`
                : prophecy.climb < 0
                ? `The rating actually dropped ${-prophecy.climb} points and the ranking slipped. A tough campaign, the rebuild clearly has more road left in it.`
                : `The rating barely moved. Steady, but the next gaffer will want to find another gear.`}

          </div>

          {(() => {
            const joined = targets.filter((t) => t.status === "joined").length;
            const total = xiTally.local + xiTally.heritage;
            const heritagePct = total ? Math.round((xiTally.heritage / total) * 100) : 0;
            const localPct = 100 - heritagePct;
            const lean = heritagePct >= 60 ? "You went the NATURALISATION route, building your XI around imported heritage stars."
              : heritagePct >= 35 ? "You ran a BLENDED squad, mixing homegrown Lions with heritage recruits."
              : "You stayed loyal to the LOCAL route, trusting Singapore's own. Old-school and proud.";

              <div className="roarcard stats">
                <div className="roarcardhd">Your campaign by the numbers</div>
                <div className="statgrid">
                  <div className="statbox"><b>{joined}</b><span>players naturalised</span></div>
                  <div className="statbox"><b>{prophecy.wins}</b><span>wins on the road</span></div>
                  <div className="statbox"><b>{localPct}%</b><span>XI minutes to locals</span></div>
                  <div className="statbox"><b>{heritagePct}%</b><span>XI minutes to heritage</span></div>
                </div>
                <div className="leanbar">
                  <div className="leanfill local" style={{ width: `${localPct}%` }}>{localPct >= 18 ? "Local" : ""}</div>
                  <div className="leanfill heritage" style={{ width: `${heritagePct}%` }}>{heritagePct >= 18 ? "Heritage" : ""}</div>
                </div>
                <p className="roarline leanverdict">{lean}</p>
              </div>
            );
          })()}

          <div className="roarcard">
            <div className="roarcardhd">The dressing room</div>
            <p className="roarquote">{prophecy.advanced ? pick(PLAYER_QUOTES_GOOD) : pick(PLAYER_QUOTES_BAD)}</p>
          </div>

          <div className="roarcard">
            <div className="roarcardhd">The fans</div>
            <p className="roarquote">{prophecy.advanced ? pick(FAN_QUOTES_GOOD) : pick(FAN_QUOTES_BAD)}</p>
          </div>

          {headlines.length > 0 && (
            <div className="roarcard scrapbook">
              <div className="roarcardhd">Your press conference scrapbook</div>
              {[...new Set(headlines)].slice(0, 3).map((h, i) => <p key={i} className="scrapline">“{h}”</p>)}
            </div>
          )}

          <div className="roarcard advice">
            <div className="roarcardhd">For your next run</div>
            {(() => {
              const shuffled = [...RUN_ADVICE].sort(() => Math.random() - 0.5).slice(0, 2);
              return shuffled.map((a, i) => <p key={i} className="roarline">{a}</p>);
            })()}
            <p className="roarnudge">Play again and push that ranking even higher, #{prophecy.finalRank} is a record to beat, not a ceiling.</p>
          </div>

          <div className="roarcard hof">
            <div className="roarcardhd">Hall of Fame — best managers</div>
            {!savedRun ? (
              <div className="hofsave">
                <p className="roarline">Save your run to the permanent Hall of Fame (ranked by final world ranking):</p>
                <input className="hofinput" type="text" placeholder="Your manager name" value={managerName} maxLength={24} onChange={(e) => setManagerName(e.target.value)} />
                <button className="hofbtn" onClick={() => saveToHallOfFame(managerName)}>Save to Hall of Fame</button>
              </div>
            ) : (
              <p className="roarline saved">✓ Saved. You're in the books.</p>
            )}

              <div className="hoflist">

                  <div key={i} className={`hofrow ${i === 0 ? "top" : ""}`}>
                    <span className="hofpos">{i + 1}</span>
                    <span className="hofname">{h.name}</span>
                    <span className="hoffinish">{h.finish}</span>
                    <span className="hofrank">#{h.rank}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          <p className="roartag">Majulah. Make us proud, boys.</p>
          <button className="bigbtn knowbtn" onClick={() => { setProfilePlayer(null); setKnowReturn("roar"); setScreen("knowlions"); }}>Know Your Lions →</button>
          <button className="bigbtn" onClick={() => { setSavedRun(false); setManagerName(""); setScreen("intro"); }}>Play again →</button>
          <p className="foot">All events are fictional. Built for the love of the Kallang Roar.</p>
        </div>
      )}

      {screen === "knowlions" && (
        <div className="screen">
          <div className="klhead">
            <div>
              <div className="kltag">KNOW YOUR LIONS</div>
              <h2 className="klttl">{profilePlayer ? profilePlayer.n : "The Squad"}</h2>
            </div>
            <button className="klback" onClick={() => profilePlayer ? setProfilePlayer(null) : setScreen(knowReturn)}>{profilePlayer ? "← All players" : "← Back"}</button>
          </div>

          {!profilePlayer && (
            <>
              <p className="screenintro">Singapore's real footballers, the players who carry the Lions. Tap any name to learn their story.</p>
              <div className="klgrid">
                {(() => {
                  const GROUP_LABEL = ["Goalkeepers", "Defenders", "Midfielders", "Forwards"];
                  const all = [...REAL_POOL].sort((a, b) => (POS_RANK[a.pos] != null ? POS_RANK[a.pos] : 99) - (POS_RANK[b.pos] != null ? POS_RANK[b.pos] : 99));
                  let last = -1; const out = [];
                  all.forEach((p) => {
                    const g = POS_ORDER[p.pos];
                    if (g !== last) { out.push(<div key={`h${g}`} className="klgrouphd">{GROUP_LABEL[g]}</div>); last = g; }
                    out.push(
                      <button key={p.n} className="klcard" onClick={() => setProfilePlayer(p)}>
                        <span className="klpos">{p.pos}</span>
                        <span className="klname">{p.n}{p.captain && " ©"}{p.hero && " ⭐"}{p.naturalised && " 🛂"}</span>
                        <span className="klclub">{p.club}</span>
                        <span className="klovr">{overall(p)}</span>
                      </button>
                    );
                  });
                  return out;
                })()}
              </div>
            </>
          )}

          {profilePlayer && (() => {
            const p = profilePlayer;
            const caps = REAL_CAPS[p.n];
            const bio = BIOS[p.n];
            const fact = PLAYER_FACTS[p.n];
            const roleDesc = { GK: "Goalkeeper", CB: "Centre-back", RB: "Right-back", LB: "Left-back", DM: "Defensive midfielder", CM: "Central midfielder", AM: "Attacking midfielder", RW: "Right winger", LW: "Left winger", ST: "Striker" }[p.pos] || p.pos;
            return (
              <div className="klprofile">
                <div className="klphero">
                  <div className="klpovr">{overall(p)}</div>
                  <div className="klpmain">
                    <div className="klpname">{p.n}{p.captain && " ©"}{p.hero && " ⭐"}</div>
                    <div className="klprole">{roleDesc} · {p.age} years old</div>
                    <div className="klpclub">{p.club}</div>
                    {p.naturalised && <div className="klpnat">🛂 Naturalised / heritage Lion</div>}
                  </div>
                </div>

                <div className="klattrs">
                  {[["Pace", p.pac], ["Technique", p.tec], ["Physical", p.phy], ["Mental", p.men]].map(([label, val]) => (
                    <div key={label} className="klattr">
                      <div className="klattrtop"><span>{label}</span><b>{val}</b></div>
                      <div className="klbar"><div className="klbarfill" style={{ width: `${val}%` }} /></div>
                    </div>
                  ))}
                </div>

                {caps != null && <div className="klcaps"><b>{caps}</b> Singapore caps</div>}
                {bio && <div className="klsection"><h4>Who he is</h4><p>{bio}</p></div>}
                {fact && <div className="klsection"><h4>Did you know?</h4><p>{fact}</p></div>}
                {!bio && !fact && <div className="klsection"><p className="quiet">A real member of the Singapore footballing family, carrying the Lions forward.</p></div>}
              </div>
            );
          })()}

          {knowReturn === "intro"
            ? <button className="bigbtn" onClick={start}>Begin the road →</button>
            : knowReturn === "howto"
            ? <button className="bigbtn" onClick={() => setScreen("howto")}>← Back to the guide</button>
            : <button className="bigbtn" onClick={() => { setSavedRun(false); setManagerName(""); setScreen("intro"); }}>Play again →</button>}
        </div>
      )}
    </div>
  );
}

function TopBar({ w, teamRating, baseline, influence, ranking, onRestart }) {
  const climb = baseline ? teamRating - baseline : 0;
  const rankClimb = ranking != null ? 148 - ranking : 0;
  return (
    <div className="hudwrap">
      <div className="titlebar">
        <div className="tbleft"><span className="tbmono flag">🇸🇬</span><div><div className="tbtitle">10 Turns: Lions Rising</div><div className="tbsub">A Mini Football Manager Game</div></div></div>
        <div className="tbright">
          <div className="tbrank">
            <span>World Rank</span>
            <b>#{ranking != null ? ranking : 148}{rankClimb > 0 ? <em className="up"> ▲{rankClimb}</em> : rankClimb < 0 ? <em className="down"> ▼{-rankClimb}</em> : null}</b>
          </div>
          {onRestart && <button className="restartbtn" onClick={onRestart} title="Restart game">↺</button>}
        </div>
      </div>
      <div className="topbar">
        <div className="tb"><span>Turn</span><b>{w}<i>/{TOTAL_WINDOWS}</i></b></div>
        <div className="tb"><span>Turns to Asian Cup</span><b>{TOTAL_WINDOWS - w}<i> left</i></b></div>
        <div className="tb rating"><span>Team Rating</span><b>{teamRating}{baseline ? <em className={climb >= 0 ? "up" : "down"}> {climb >= 0 ? "+" : ""}{climb}</em> : null}</b></div>
        <div className="tb inf"><span>Influence</span><b className="infv">⚡{influence}</b></div>
      </div>
    </div>
  );
}

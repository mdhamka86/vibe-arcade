<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Werkroom — A Drag Race Season Run</title>
  <meta name="description" content="A browser-based RuPaul's Drag Race season simulator. Name your queen, werk the challenges, lip sync for your legacy." />
  <style>
    html, body { margin: 0; padding: 0; background: #0c0510; }
    * { -webkit-tap-highlight-color: transparent; }
  </style>
  <!-- React + Babel from CDN so there's no build step -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!-- the game code, compiled in the browser by Babel -->
  <script type="text/babel" data-presets="react" src="werkroom-game.js"></script>
  <script type="text/babel" data-presets="react">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<DragRaceGame />);
  </script>
</body>
</html>

function generateRivalName() {
  const roll = Math.random();
  if (roll < 0.15) {
    return `${RIVAL_GROUP_PREFIX[Math.floor(Math.random() * RIVAL_GROUP_PREFIX.length)]} ${RIVAL_LAST[Math.floor(Math.random() * RIVAL_LAST.length)]}`;
  }
  if (roll < 0.3) {
    return RIVAL_FIRST[Math.floor(Math.random() * RIVAL_FIRST.length)];
  }
  return `${RIVAL_FIRST[Math.floor(Math.random() * RIVAL_FIRST.length)]} ${RIVAL_LAST[Math.floor(Math.random() * RIVAL_LAST.length)]}`;
}

function generateTitle(genre, isAlbum) {
  const bank = TITLE_WORDS[genre] || TITLE_WORDS.Pop;
  const base = bank[Math.floor(Math.random() * bank.length)];
  if (isAlbum) {
    return base + ALBUM_SUFFIX[Math.floor(Math.random() * ALBUM_SUFFIX.length)];
  }
  return base;
}

function getArtistTitle(genre, stats) {
  if (!stats) return "";
  const combined = (stats.popularity || 0) + (stats.reputation || 0);
  const tier = combined >= 100 ? "high" : combined >= 45 ? "mid" : "low";
  const bank = GENRE_TITLES[genre] || GENRE_TITLES.Pop;
  const pool = bank[tier];
  return pool[Math.floor(Math.random() * pool.length)];
}

function generateLogLine(actionId, name) {
  const pool = LOG_LINES[actionId] || ["{name} put in work."];
  const line = pool[Math.floor(Math.random() * pool.length)];
  return line.replace(/{name}/g, name);
}

function isDeltaNetPositive(delta) {
  // Weighs money lightly relative to other stats so a small cash loss with a big
  // stat gain still reads as positive overall, and vice versa.
  let score = 0;
  Object.entries(delta || {}).forEach(([k, v]) => {
    score += k === "money" ? v * 0.15 : v;
  });
  return score >= 0;
}

// Tracks recently generated reaction lines across the WHOLE run so they stay
// fresh action after action instead of resetting variety on every call.
const recentReactionLines = [];
const RECENT_REACTION_MEMORY = 20;

function generateReaction(delta) {
  const positive = isDeltaNetPositive(delta);
  const openers = positive ? REACTION_POSITIVE_OPENERS : REACTION_NEGATIVE_OPENERS;
  const qualifiers = positive ? REACTION_POSITIVE_QUALIFIERS : REACTION_NEGATIVE_QUALIFIERS;
  const closers = positive ? REACTION_POSITIVE_CLOSERS : REACTION_NEGATIVE_CLOSERS;

  let text;
  for (let attempt = 0; attempt < 8; attempt++) {
    const opener = openers[Math.floor(Math.random() * openers.length)];
    const qualifier = qualifiers[Math.floor(Math.random() * qualifiers.length)];
    const closer = closers[Math.floor(Math.random() * closers.length)];
    // Each part is its own clause joined with commas, then sentence-cased once at
    // the end, so there's never a lowercase letter starting a new sentence.
    const clauses = [opener, qualifier, closer].filter(Boolean);
    text = clauses.join(", ") + ".";
    text = text.charAt(0).toUpperCase() + text.slice(1);
    if (!recentReactionLines.includes(text)) break;
  }
  recentReactionLines.push(text);
  if (recentReactionLines.length > RECENT_REACTION_MEMORY) recentReactionLines.shift();
  return { text, positive };
}

// Picks an encounter. When the player has signed away a lot of creative control
// (low-control label/path choices), the masters dispute event becomes heavily
// favored, mirroring real-world "who owns your masters" rights drama.
function pickEncounter(age, stats, lowControlSignal) {
  const pool = age < 18 ? ENCOUNTERS_YOUNG : ENCOUNTERS_OLDER;
  const baseEligible = pool.filter(
    (e) =>
      !e.requiresLowControl &&
      (!e.minPopularity || stats.popularity >= e.minPopularity) &&
      (!e.minAge || age >= e.minAge)
  );

  const mastersEvent = pool.find((e) => e.id === "mastersdispute");
  const mastersEligible = mastersEvent && age >= mastersEvent.minAge && lowControlSignal >= 0.4;

  if (mastersEligible && Math.random() < 0.65) {
    // Heavily probable, not guaranteed, when control has been signed away.
    return mastersEvent;
  }

  return baseEligible[Math.floor(Math.random() * baseEligible.length)];
}

// ============================================================
// Title Mood Detection — reviews react to the actual vibe of the title,
// funny titles get a funny callback, sad titles get a sad callback, etc.
// Works on both generated and player-typed titles via keyword matching.
// ============================================================

const TITLE_MOOD_KEYWORDS = {
  sad: ["sad", "tears", "cry", "lonely", "gone", "goodbye", "broken", "hollow", "grief", "alone", "fading", "lost", "ghost", "ashfall", "severance", "borrowed time", "low tide", "afterhours", "aftertaste"],
  angry: ["rage", "wrath", "burn", "fire", "war", "fight", "riot", "smoke", "static", "voltage", "thunderhead", "iron", "crimson", "vow", "throne"],
  romantic: ["love", "heart", "kiss", "honey", "velvet", "moon", "luz", "corazon", "vida dulce", "slow burn", "soft focus"],
  party: ["party", "summer", "dance", "club", "neon", "gold rush", "voltage", "strobe", "pulse", "riptide", "bailando"],
  chill: ["porch", "drift", "quiet", "slow", "low key", "sunday", "lounge", "acoustic", "cabin", "tape", "polaroid"],
};

function detectTitleMood(title) {
  const lower = (title || "").toLowerCase();
  for (const [mood, keywords] of Object.entries(TITLE_MOOD_KEYWORDS)) {
    if (keywords.some((kw) => lower.includes(kw))) return mood;
  }
  return "neutral";
}

function getMoodCallback(title, tier) {
  const mood = detectTitleMood(title);
  if (mood === "neutral") return null;
  const simpleTier = tier.includes("glowing") ? "glowing" : tier.includes("mixed") ? "mixed" : "rough";
  const pool = TITLE_MOOD_CALLBACKS[mood]?.[simpleTier];
  if (!pool || !pool.length) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

function buildReviewLine(tier, title, usedOpeners) {
  const { openers, qualifiers, closers } = REVIEW_PARTS[tier];

  let opener;
  for (let attempt = 0; attempt < 8; attempt++) {
    opener = openers[Math.floor(Math.random() * openers.length)];
    if (!usedOpeners || !usedOpeners.includes(opener)) break;
  }

  const qualifier = qualifiers[Math.floor(Math.random() * qualifiers.length)];
  const closer = closers[Math.floor(Math.random() * closers.length)];
  // About a third of the time, swap the qualifier for a title-mood-aware callback,
  // so reviews actually respond to the vibe of the song rather than being generic.
  const moodCallback = Math.random() < 0.4 ? getMoodCallback(title, tier) : null;
  const parts = moodCallback ? [opener, moodCallback, closer] : [opener, qualifier, closer];
  // Capitalize each non-empty part so a multi-sentence line never has a lowercase
  // second sentence (e.g. "...landing. the hook never shows up." was the bug).
  const line = parts
    .filter(Boolean)
    .map((s) => s.charAt(0).toUpperCase() + s.slice(1))
    .join(" ");
  return { line, opener };
}

function generateReviews(score, age, title) {
  const isYoung = age < 18;
  const usedOpenersThisRelease = [];

  return Array.from({ length: 3 }, () => {
    // Reviews have their own small variance so three reviewers can disagree slightly
    const personalScore = clamp(score + (Math.random() * 24 - 12), 0, 100);
    let tier;
    if (personalScore >= 70) tier = isYoung ? "young_glowing" : "glowing";
    else if (personalScore >= 40) tier = isYoung ? "young_mixed" : "mixed";
    else tier = isYoung ? "young_rough" : "rough";

    const stars = clamp(Math.round((personalScore / 100) * 5 * 2) / 2, 0.5, 5); // half-star precision

    let identity;
    for (let attempt = 0; attempt < 8; attempt++) {
      identity = generateReviewerIdentity(isYoung);
      if (!recentReviewIdentities.includes(identity.display)) break;
    }
    rememberRecent(recentReviewIdentities, identity.display);

    let line, opener;
    for (let attempt = 0; attempt < 8; attempt++) {
      const built = buildReviewLine(tier, title, usedOpenersThisRelease);
      line = built.line;
      opener = built.opener;
      if (!recentReviewLines.includes(line)) break;
    }
    usedOpenersThisRelease.push(opener);
    rememberRecent(recentReviewLines, line);

    return { source: identity.display, context: identity.context, stars, line };
  });
}

    discography = `${character.name} leaves behind ${releases.length} release${releases.length === 1 ? "" : "s"}, ${chartedCount} of which charted. ${tail}`;
  }

  return { opener, body, regret, callToReplay, quote, quotePerson, discography };
}

// ============================================================
// What Might Have Been — real, personalized hints based on what the
// player actually did (or didn't do) this run, to guide the next attempt.
// ============================================================

function generateNextRunHints(releases, manager, careerPath, totalEarnings, careerRatingId) {
  const hints = [];
  const albumCount = releases.filter((r) => r.type === "album").length;
  const chartedCount = releases.filter((r) => r.charted).length;
  const lowControlReleases = releases.filter((r) => r.label && r.label.control < 0.7).length;

  if (releases.length === 0) {
    hints.push("This run never released a single track. Next time, even a cheap bedroom single beats a perfect demo nobody hears.");
  } else if (releases.length <= 2) {
    hints.push(`Only ${releases.length} release${releases.length === 1 ? "" : "s"} the whole run. More releases means more shots at the chart, and more royalties stacking up.`);
  }

  if (albumCount === 0 && totalEarnings > 200) {
    hints.push("Never once dropped an album, despite having the capital for it eventually. Albums hit harder once you can afford the production cost.");
  }

  if (chartedCount === 0 && releases.length > 0) {
    hints.push("Nothing charted this run. Consider investing more in Studio and Producer tiers before releasing, quality really does set the ceiling.");
  }

  if (!manager || manager.id === "none") {
    hints.push("Stayed unmanaged the whole career. A manager's connections and marketability boost can compound fast if you find the right one.");
  }

  if (lowControlReleases >= 2) {
    hints.push("Signed away creative control more than once. Watch out for what that costs you down the line, masters have a way of mattering later.");
  }

  if (!careerPath) {
    hints.push("Never locked in a Career Path before the run ended. Committing earlier gives that reach bonus more time to compound.");
  }

  if (hints.length === 0) {
    hints.push("Honestly? Solid run. Next time, just try to chart a little earlier, or squeeze in one more release before the clock runs out.");
  }

  return hints.slice(0, 3);
}

const COMPARISON_BETTER_LINES = [
  "Outdid the last one. Growth. Actual growth.",
  "Beat the previous run. Somebody's been taking notes.",
  "Topped last time's numbers. The student has become slightly less embarrassing.",
  "Improvement, undeniably. Last run is shaking right now.",
  "Did better than before. Modest applause, but applause.",
  "A genuine step up from last time. Don't let it go to your head.",
];

const COMPARISON_WORSE_LINES = [
  "Underperformed the last run. Rough sequel, honestly.",
  "Worse than last time. The prequel was better, somehow.",
  "Fell short of the previous attempt. We don't talk about this run at family dinners.",
  "A step down from last run's numbers. Everyone has an off life.",
  "Didn't quite live up to last time. Comeback arc needed.",
  "Regression, plain and simple. Last run is laughing right now.",
];

const COMPARISON_EQUAL_LINES = [
  "Basically identical to last time. Eerily consistent, almost suspicious.",
  "Matched the previous run almost exactly. Make of that what you will.",
  "A near-perfect tie with last time. Predictable, in a weirdly impressive way.",
];

function generateRunComparison(currentEarnings, lastRunSummary) {
  if (!lastRunSummary || typeof lastRunSummary.earnings !== "number") return null;
  const diff = currentEarnings - lastRunSummary.earnings;
  const pctDiff = lastRunSummary.earnings > 0 ? Math.abs(diff) / lastRunSummary.earnings : 1;

  let pool;
  if (pctDiff < 0.05) pool = COMPARISON_EQUAL_LINES;
  else if (diff > 0) pool = COMPARISON_BETTER_LINES;
  else pool = COMPARISON_WORSE_LINES;

  const line = pool[Math.floor(Math.random() * pool.length)];
  return { line, diff, previousEarnings: lastRunSummary.earnings, previousName: lastRunSummary.name };
}

// Sidebar "another artist also died" teaser. Pulls an actual rival from the
// player's own chart who out-earned them, showing the real gap, so the hook
// connects to the player's actual run rather than being a disconnected aside.
function generateSidebarArtist(rivals, playerEarnings) {
  const richerRivals = rivals.filter((r) => (r.revenue || 0) > playerEarnings);
  const death = generateDeathScene(pick?.name);
  const rating = CAREER_RATING_TIERS[Math.floor(Math.random() * CAREER_RATING_TIERS.length)];

  if (richerRivals.length === 0) {
    // The player out-earned literally every rival. Pick their closest competitor
    // (the one they beat by the smallest margin) for the best story, and frame
    // it as the player putting them to shame, even in death.
    const sorted = [...rivals].sort((a, b) => (b.revenue || 0) - (a.revenue || 0));
    const closest = sorted[0];
    const gap = closest ? Math.round(playerEarnings - (closest.revenue || 0)) : null;
    return {
      name: closest ? closest.name : generateRivalName(),
      cause: death.cause,
      ratingLabel: rating.label,
      earnings: closest ? Math.round(closest.revenue || 0) : null,
      gap: null,
      shamed: true,
      shameGap: gap,
    };
  }

  const pick = richerRivals[Math.floor(Math.random() * richerRivals.length)];
  const gap = Math.round((pick.revenue || 0) - playerEarnings);
  return { name: pick.name, cause: death.cause, ratingLabel: rating.label, earnings: Math.round(pick.revenue || 0), gap, shamed: false, shameGap: null };
}


const START_AGE = 16;
const DEATH_AGE = 27; // the 27 Club. The game always ends here, no exceptions.
const TURN_LIMIT = 34; // (27-16)*12 = 132 months, divided over 33 turn-gaps = exactly 4 months per turn
const MONTHS_PER_TURN = ((DEATH_AGE - START_AGE) * 12) / (TURN_LIMIT - 1); // always lands exactly on age 27 at the final turn
const START_RIVAL_COUNT = 120; // a real chart needs real depth to feel hard to crack
const CHART_SIZE = 100; // top 100, anything below this is simply "Did Not Chart"

// Unlock gates so the game ages realistically
const NETWORK_MIN_AGE = 18;
const TOUR_MIN_AGE = 18;
const TOUR_MIN_POPULARITY = 30;
const MANAGER_UNLOCK_AGE = 17;
const MANAGER_UNLOCK_MONEY = 250;
const CAREER_PATH_UNLOCK_AGE = 18;
const CAREER_PATH_UNLOCK_MONEY = 400;

function ageAtTurn(turn) {
  const cappedTurn = Math.min(turn, TURN_LIMIT);
  const totalMonths = (cappedTurn - 1) * MONTHS_PER_TURN;
  const years = Math.floor(totalMonths / 12);
  const months = totalMonths % 12;
  const age = Math.min(START_AGE + years, DEATH_AGE);
  const displayMonths = age === DEATH_AGE ? 0 : months;

  // Exact countdown to the 27 Club, in years and months, not just whole years.
  const monthsRemaining = Math.max(0, (DEATH_AGE - START_AGE) * 12 - totalMonths);
  const countdownYears = Math.floor(monthsRemaining / 12);
  const countdownMonths = monthsRemaining % 12;

  return {
    age,
    months: displayMonths,
    label: `Age ${age}${displayMonths ? `, ${displayMonths}mo` : ""}`,
    compact: `${age}y${displayMonths ? ` ${displayMonths}m` : ""}`,
    fullLabel: `Age: ${age} year${age === 1 ? "" : "s"} ${displayMonths} month${displayMonths === 1 ? "" : "s"} old`,
    countdownYears,
    countdownMonths,
    countdownLabel:
      monthsRemaining <= 0
        ? "this is it"
        : `${countdownYears > 0 ? `${countdownYears} year${countdownYears === 1 ? "" : "s"}` : ""}${countdownYears > 0 && countdownMonths > 0 ? " and " : ""}${countdownMonths > 0 ? `${countdownMonths} month${countdownMonths === 1 ? "" : "s"}` : ""}${countdownYears === 0 && countdownMonths === 0 ? "0 months" : ""} to 27 club`,
  };
}

function clamp(n, min = 0, max = 100) {
  return Math.max(min, Math.min(max, n));
}

function rivalEarnings(power) {
  // Uses the exact same chart-position-based curve the player's own releases use.
  // A rival's approximate chart position is derived from where their power sits
  // within the known power distribution (the same tiers used in makeRival), so
  // earnings stay genuinely comparable to what the player would earn at that spot.
  // Also applies the same baseline average industry cut used at live release time.
  const approxPos = Math.max(1, Math.round(CHART_SIZE * (1 - power / 100)));
  const chartPos = Math.min(approxPos, CHART_SIZE);
  const chartMult = (CHART_SIZE - chartPos + 1) / CHART_SIZE;
  const streams = Math.round(Math.max(25, power * 160 * chartMult));
  const revenue = Math.round(streams * 0.004 * 60 * 0.8);
  return { streams, revenue, approxChartPos: chartPos };
}

function makeRival() {
  const genre = GENRES[Math.floor(Math.random() * GENRES.length)];
  // Power curve: realistic spread from emerging acts to superstars.
  // Bottom floor is softer than reality to give debuts visible progress,
  // while the top end stays genuinely hard to crack.
  const roll = Math.random();
  let power;
  if (roll < 0.03) power = 85 + Math.random() * 15;       // superstar tier, ~3%
  else if (roll < 0.15) power = 65 + Math.random() * 20;  // established tier, ~12%
  else if (roll < 0.45) power = 44 + Math.random() * 21;  // solid mid tier, ~30%
  else if (roll < 0.80) power = 22 + Math.random() * 22;  // working acts, ~35%
  else power = 10 + Math.random() * 14;                    // emerging acts, ~20%
  const genreBank = TITLE_WORDS[genre] || TITLE_WORDS.Pop;
  const title = genreBank[Math.floor(Math.random() * genreBank.length)];
  return {
    id: Math.random().toString(36).slice(2),
    name: generateRivalName(),
    genre,
    title,
    power,
    ...rivalEarnings(power),
  };
}

const BASE_STATS = { skill: 28, marketability: 26, popularity: 8, reputation: 14, luck: 22, money: 120 };

function makeInitialStats(background) {
  const base = { ...BASE_STATS };
  const bg = BACKGROUNDS.find((b) => b.id === background);
  if (bg) {
    Object.entries(bg.bonus).forEach(([k, v]) => {
      base[k] = (base[k] || 0) + v;
    });
    if (bg.penalty) {
      Object.entries(bg.penalty).forEach(([k, v]) => {
        base[k] = (base[k] || 0) + v;
      });
    }
  }
  return base;
}

  { id: "gig", label: "Busk / Small Gigs", desc: "Low risk income." },
  { id: "content", label: "Content Grind", desc: "Pop + $, can flop." },
  { id: "network", label: "Network / Schmooze", desc: "Rep + Pop boost, can misfire.", minAge: NETWORK_MIN_AGE, lockedDesc: `Unlocks at age ${NETWORK_MIN_AGE}.` },
  { id: "press", label: "Press / Interview", desc: "Big Rep swing, cuts both ways.", minAge: 18, lockedDesc: "Unlocks at age 18. Nobody's asking yet." },
  { id: "collab", label: "Collaborate", desc: "Chart rival feature. Risk + reward.", minAge: 18, minPopularity: 20, lockedDesc: "Unlocks at age 18 with some Popularity." },
  { id: "meetgreet", label: "Fan Meet & Greet", desc: "Pure Popularity play. Energising.", minAge: 18, minPopularity: 25, lockedDesc: `Age 18+, Pop 25+.` },
  { id: "tour", label: "Tour / Concert", desc: "Big swing, real risk.", minAge: TOUR_MIN_AGE, minPopularity: TOUR_MIN_POPULARITY, lockedDesc: `Age ${TOUR_MIN_AGE}+, Pop ${TOUR_MIN_POPULARITY}+.` },
];

function OneMoreGig() {
  const [phase, setPhase] = useState("foreword"); // foreword | create | loop | release | reviews | result | end | manager_offer | path_offer
  const [character, setCharacter] = useState(null);
  const [stats, setStats] = useState(null);
  const [turn, setTurn] = useState(1);
  const [log, setLog] = useState([]);
  const [activeEncounter, setActiveEncounter] = useState(null);
  const [lastDelta, setLastDelta] = useState(null);
  const [lastReaction, setLastReaction] = useState(null);
  const [artistTitle, setArtistTitle] = useState("");
  const artistTitleTierRef = useRef(null);
  const [rivals, setRivals] = useState([]);
  const [climate, setClimate] = useState(CLIMATES[CLIMATES.length - 1]);
  const [releases, setReleases] = useState([]);
  const [momentum, setMomentum] = useState([]);
  const [lastChartResult, setLastChartResult] = useState(null);
  const [manager, setManager] = useState(null); // locked once chosen
  const [careerPath, setCareerPath] = useState(null); // locked once chosen
  const [managerOfferSeen, setManagerOfferSeen] = useState(false);
  const [pathOfferSeen, setPathOfferSeen] = useState(false);
  const [leaderboard, setLeaderboard] = useState([]);
  const [leaderboardLoaded, setLeaderboardLoaded] = useState(false);
  const [careerRating, setCareerRating] = useState(null);
  const [deathScene, setDeathScene] = useState(null);
  const [obituary, setObituary] = useState(null);
  const [sidebarArtist, setSidebarArtist] = useState(null);
  const [nextRunHints, setNextRunHints] = useState([]);
  const [lastRunSummary, setLastRunSummary] = useState(null);
  const [runComparison, setRunComparison] = useState(null);

  // Load the persistent leaderboard and last-run summary once on mount
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const result = await window.storage.get("leaderboard", false);
        if (!cancelled && result?.value) {
          const parsed = JSON.parse(result.value);
          if (Array.isArray(parsed)) setLeaderboard(parsed);
        }
      } catch (e) {
        // no leaderboard saved yet, that's fine
      }
      try {
        const lastRunResult = await window.storage.get("lastRunSummary", false);
        if (!cancelled && lastRunResult?.value) {
          setLastRunSummary(JSON.parse(lastRunResult.value));
        }
      } catch (e) {
        // no previous run saved yet, that's fine, this must be the first ever run
      } finally {
        if (!cancelled) setLeaderboardLoaded(true);
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  // Hall of Fame: the persistent all-time leaderboard, ranked by career earnings.
  const saveLeaderboardEntry = useCallback(async (entry) => {
    try {
      const existingResult = await window.storage.get("leaderboard", false).catch(() => null);
      const existing = existingResult?.value ? JSON.parse(existingResult.value) : [];
      const updated = [...(Array.isArray(existing) ? existing : []), entry]
        .sort((a, b) => b.earnings - a.earnings)
        .slice(0, 50); // keep the top 50 all-time runs
      await window.storage.set("leaderboard", JSON.stringify(updated), false);
      setLeaderboard(updated);
    } catch (e) {
      // storage failed, leaderboard just won't persist this run
    }
  }, []);

  const saveLastRunSummary = useCallback(async (summary) => {
    try {
      await window.storage.set("lastRunSummary", JSON.stringify(summary), false);
    } catch (e) {
      // storage failed, the comparison just won't be available next time
    }
  }, []);

  const startGame = useCallback((char) => {
    // Reset run-scoped dedup memory so a new game starts fresh
    recentReactionLines.length = 0;
    recentReviewIdentities.length = 0;
    recentReviewLines.length = 0;
    setCharacter(char);
    setStats(makeInitialStats(char.background));
    setTurn(1);
    setLog([{ text: `${char.name} steps into the ${char.genre} scene for the first time.`, type: "intro" }]);
    setRivals(Array.from({ length: START_RIVAL_COUNT }, makeRival));
    setClimate(CLIMATES[Math.floor(Math.random() * CLIMATES.length)]);
    setReleases([]);
    setMomentum([]);
    setManager(null);
    setCareerPath(null);
    setManagerOfferSeen(false);
    setPathOfferSeen(false);
    setCareerRating(null);
    setDeathScene(null);
    setObituary(null);
    setArtistTitle("");
    artistTitleTierRef.current = null;
    setSidebarArtist(null);
    setNextRunHints([]);
    setRunComparison(null);
    setPhase("loop");
  }, []);

  const applyDelta = useCallback((delta) => {
    setStats((s) => {
      const next = { ...s };
      Object.entries(delta).forEach(([k, v]) => {
        if (k === "money") next.money = Math.max(0, next.money + v);
        else next[k] = clamp(next[k] + v);
      });
      return next;
    });
    setLastDelta(delta);
    setLastReaction(generateReaction(delta));
  }, []);

  const maybeShiftClimate = useCallback(() => {
    if (Math.random() < 0.38) {
      setClimate((prev) => {
        let next = CLIMATES[Math.floor(Math.random() * CLIMATES.length)];
        while (next.name === prev.name) next = CLIMATES[Math.floor(Math.random() * CLIMATES.length)];
        return next;
      });
    }
  }, []);

  const drift_rivals = useCallback(() => {
    setRivals((rs) =>
      rs.map((r) => {
        const newPower = clamp(r.power + (Math.random() * 10 - 5), 5, 99);
        return { ...r, power: newPower, ...rivalEarnings(newPower) };
      })
    );
  }, []);

  const maybeEncounter = useCallback(() => {
    if (Math.random() < 0.4) {
      const currentAge = ageAtTurn(turn).age;
      // Average creative control given up across releases and the locked career path.
      // Lower average control = higher chance the masters dispute event fires.
      const releaseControls = releases.map((r) => (r.label ? r.label.control : 1));
      const pathControl = careerPath ? careerPath.controlMult : 1;
      const allControls = [...releaseControls, pathControl];
      const avgControl = allControls.length ? allControls.reduce((a, b) => a + b, 0) / allControls.length : 1;
      const lowControlSignal = clamp(1 - avgControl, 0, 1); // 0 = full control kept, 1 = signed it all away
      const enc = pickEncounter(currentAge, stats, lowControlSignal);
      setActiveEncounter(enc);
      return true;
    }
    return false;
  }, [turn, stats, releases, careerPath]);

  const tickMomentum = useCallback(() => {
    setMomentum((list) => {
      const active = [];
      let moneyGain = 0;
      let popGain = 0;
      list.forEach((m) => {
        moneyGain += m.perTurnMoney;
        popGain += m.perTurnPop;
        if (m.turnsLeft - 1 > 0) active.push({ ...m, turnsLeft: m.turnsLeft - 1 });
      });
      if (moneyGain > 0 || popGain > 0) {
        setStats((s) => ({ ...s, money: s.money + moneyGain, popularity: clamp(s.popularity + popGain) }));
        if (moneyGain > 0) {
          setLog((l) => [{ text: `Royalties keep rolling in. +$${Math.round(moneyGain)} from recent releases.`, type: "royalty" }, ...l]);
        }
      }
      return active;
    });
  }, []);

  const advanceTurnCommon = useCallback(() => {
    maybeShiftClimate();
    drift_rivals();
    tickMomentum();
    const passiveIncome = (manager?.traits.moneyPerTurn || 0) + (careerPath?.moneyPerTurn || 0);
    setStats((s) => ({ ...s, popularity: clamp(s.popularity - 0.6), money: s.money + passiveIncome })); // slow natural decay
    setTurn((t) => t + 1);
  }, [maybeShiftClimate, drift_rivals, tickMomentum, manager, careerPath]);

  // Check whether the manager or career-path offer should trigger, runs after stats/turn settle.
  const checkCareerOffers = useCallback(() => {
    const currentAge = ageAtTurn(turn).age;
    if (!manager && !managerOfferSeen && currentAge >= MANAGER_UNLOCK_AGE && stats.money >= MANAGER_UNLOCK_MONEY) {
      setManagerOfferSeen(true);
      setPhase("manager_offer");
      return true;
    }
    if (manager !== null && !careerPath && !pathOfferSeen && currentAge >= CAREER_PATH_UNLOCK_AGE && stats.money >= CAREER_PATH_UNLOCK_MONEY) {
      setPathOfferSeen(true);
      setPhase("path_offer");
      return true;
    }
    return false;
  }, [turn, stats, manager, managerOfferSeen, careerPath, pathOfferSeen]);

  useEffect(() => {
    if (phase === "loop" && stats && !activeEncounter) {
      checkCareerOffers();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [turn, phase]);

  useEffect(() => {
    if (!stats || !character) return;
    const combined = (stats.popularity || 0) + (stats.reputation || 0);
    const tier = combined >= 100 ? "high" : combined >= 45 ? "mid" : "low";
    if (tier !== artistTitleTierRef.current) {
      artistTitleTierRef.current = tier;
      setArtistTitle(getArtistTitle(character.genre, stats));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [stats?.popularity, stats?.reputation, character]);

  const handleAction = useCallback(
    (actionId) => {
      let delta = {};
      let text = "";

      switch (actionId) {
        case "train": {
          const success = Math.random() < 0.58;
          delta = success ? { skill: 6 + Math.random() * 4, luck: 1 } : { skill: -2 - Math.random() * 3 };
          text = generateLogLine(success ? "train_success" : "train_fail", character.name);
          break;
        }
        case "market": {
          if (stats.money < 20) {
            text = "Not enough money to market yourself right now.";
            setLog((l) => [{ text, type: "warn" }, ...l]);
            return;
          }
          const success = Math.random() < 0.58;
          delta = success ? { marketability: 6 + Math.random() * 5, money: -20 } : { marketability: -2 - Math.random() * 3, money: -20 };
          text = generateLogLine(success ? "market_success" : "market_fail", character.name);
          break;
        }
        case "network": {
          const currentAge = ageAtTurn(turn).age;
          if (currentAge < NETWORK_MIN_AGE) {
            text = `Not much of an industry circuit to work yet at ${currentAge}. This unlocks at ${NETWORK_MIN_AGE}.`;
            setLog((l) => [{ text, type: "warn" }, ...l]);
            return;
          }
          const success = Math.random() < 0.6;
          delta = success
            ? { reputation: 7 + Math.random() * 5, popularity: 2 + Math.random() * 3, luck: 1 }
            : { reputation: -2 - Math.random() * 2, marketability: -1 };
          text = generateLogLine(success ? "network_success" : "network_fail", character.name);
          break;
        }
        case "gig": {
          const success = Math.random() < 0.55; // slightly safer, this is the low-stakes option
          delta = success ? { money: 18 + Math.random() * 18, skill: 1, popularity: 1 } : { money: 3, skill: 0 };
          text = generateLogLine(success ? "gig_success" : "gig_fail", character.name);
          break;
        }
        case "content": {
          const success = Math.random() < 0.55;
          delta = success
            ? { popularity: 4 + (stats.marketability / 100) * 6, money: 12 + Math.random() * 10 }
            : { popularity: -2, money: 2 };
          text = generateLogLine(success ? "content_success" : "content_fail", character.name);
          break;
        }
        case "press": {
          const currentAge = ageAtTurn(turn).age;
          if (currentAge < 18) {
            text = "Nobody's interviewing a 16 year old yet. Unlocks at 18.";
            setLog((l) => [{ text, type: "warn" }, ...l]);
            return;
          }
          const success = Math.random() < 0.55;
          delta = success
            ? { reputation: 9 + Math.random() * 6, marketability: 3 + Math.random() * 3, popularity: 2 }
            : { reputation: -4 - Math.random() * 4, marketability: -2 };
          text = generateLogLine(success ? "press_success" : "press_fail", character.name);
          break;
        }
        case "collab": {
          const currentAge = ageAtTurn(turn).age;
          if (currentAge < 18 || stats.popularity < 20) {
            text = "Need age 18+ and some Popularity before anyone on the chart takes the call.";
            setLog((l) => [{ text, type: "warn" }, ...l]);
            return;
          }
          const rivalPick = rivals.length > 0 ? rivals[Math.floor(Math.random() * Math.min(rivals.length, 40))] : null;
          const rivalName = rivalPick ? rivalPick.name : "a chart artist";
          const success = Math.random() < 0.55;
          delta = success
            ? { popularity: 8 + Math.random() * 6, reputation: 4 + Math.random() * 4 }
            : { reputation: -2, popularity: -2 };
          text = generateLogLine(success ? "collab_success" : "collab_fail", character.name).replace("someone on the chart", rivalName).replace("a chart rival", rivalName);
          break;
        }
        case "meetgreet": {
          const currentAge = ageAtTurn(turn).age;
          if (currentAge < 18 || stats.popularity < 25) {
            text = "Age 18+ and Pop 25+ needed — the line's empty if nobody knows the name yet.";
            setLog((l) => [{ text, type: "warn" }, ...l]);
            return;
          }
          const success = Math.random() < 0.62;
          delta = success
            ? { popularity: 7 + Math.random() * 5, reputation: 2, money: -10 }
            : { popularity: -2, reputation: -1, money: -10 };
          text = generateLogLine(success ? "meetgreet_success" : "meetgreet_fail", character.name);
          break;
        }
        case "tour": {
          const currentAge = ageAtTurn(turn).age;
          if (currentAge < TOUR_MIN_AGE) {

            text = `Too young to headline real venues yet. Touring unlocks at ${TOUR_MIN_AGE}.`;
            setLog((l) => [{ text, type: "warn" }, ...l]);
            return;
          }
          if (stats.popularity < TOUR_MIN_POPULARITY) {
            text = `Popularity too low to book a real tour yet. Needs ${TOUR_MIN_POPULARITY}+.`;
            setLog((l) => [{ text, type: "warn" }, ...l]);
            return;
          }
          {
            const success = Math.random() < 0.3 + stats.popularity / 150;
            delta = success
              ? { money: 80 + Math.random() * 80, popularity: 4 }
              : { money: -20, popularity: -4, reputation: -2 };
            text = generateLogLine(success ? "tour_success" : "tour_fail", character.name);
          }
          break;
        }
        default:
          break;
      }

      applyDelta(delta);
      setLog((l) => [{ text, type: "action", delta, age: ageAtTurn(turn).compact }, ...l]);
      const fired = maybeEncounter();
      if (!fired) advanceTurnCommon();
      else {
        maybeShiftClimate();
        drift_rivals();
        tickMomentum();
        setTurn((t) => t + 1);
      }
    },
    [character, stats, applyDelta, maybeEncounter, advanceTurnCommon, maybeShiftClimate, drift_rivals, tickMomentum, turn]
  );

  const resolveEncounter = useCallback(
    (choice) => {
      applyDelta(choice.delta);
      setLog((l) => [{ text: `${activeEncounter.title}: ${choice.label}`, type: "encounter", delta: choice.delta, age: ageAtTurn(turn).compact }, ...l]);
      setActiveEncounter(null);
    },
    [activeEncounter, applyDelta, turn]
  );

  const handleRelease = useCallback(
    (combo) => {
      // pay costs / receive advance
      setStats((s) => ({ ...s, money: Math.max(0, s.money - combo.netCost) }));

      const climateMatch = climate.genres.includes(character.genre);
      const climateMult = climateMatch ? climate.mult : 1.0;

      const pathReachMult = careerPath ? careerPath.reachMult : 1.0;

      const comboQuality =
        (combo.studio.mult + combo.producer.mult) / 2 * combo.label.reach * pathReachMult +
        (combo.marketingSpend / 300) * 0.3;

      const baseScore =
        stats.skill * 0.35 +
        stats.marketability * 0.25 +
        stats.popularity * 0.2 +
        comboQuality * 100 * 0.2;

      const luckMod = 0.85 + (stats.luck / 100) * 0.3;
      const variance = 0.85 + Math.random() * 0.3;

      // Career-stage suppression. Hard at first, genuinely climbable.
      // Reaches full power around the 4th-5th release.
      const trackRecordMult = Math.min(1, 0.72 + releases.length * 0.08);

      const finalScore = baseScore * luckMod * variance * climateMult * trackRecordMult * (combo.producer.repBonus ? 1.05 : 1);

      // rank against rivals on a real 100+ deep chart
      const field = [...rivals, { name: character.name, power: finalScore, isPlayer: true }];
      field.sort((a, b) => b.power - a.power);
      const rawPos = field.findIndex((f) => f.isPlayer) + 1;
      const charted = rawPos <= CHART_SIZE;
      const chartPos = charted ? rawPos : null;

      const popDelta = charted ? clamp(20 - chartPos, -8, 18) : -1;
      const repDelta = finalScore > 65 ? 4 : finalScore < 30 ? -4 : 1;

      // Streams: a real 100+ deep chart, position determines reach. Career-stage
      // realism (a debut struggling to chart) is already handled by trackRecordMult
      // above, suppressing finalScore and therefore chart position itself. Streams
      // are derived from chart position using the EXACT SAME formula rivals use,
      // so a better chart position always earns more, full stop, no double penalty.
      const isDebut = releases.length === 0;
      const chartMult = charted ? (CHART_SIZE - chartPos + 1) / CHART_SIZE : 0.03;
      const baseStreams = Math.round(Math.max(25, finalScore * 160 * chartMult));
      const unitMult = combo.type === "album" ? 4 : 1; // album = multiple tracks worth of streams
      const streamCount = Math.round(baseStreams * unitMult);

      const pricePerStream = 0.004; // realistic-ish per-stream payout
      const labelCut = combo.label.id === 2 ? 0.45 : combo.label.id === 1 ? 0.7 : 1;
      const managerCut = manager ? 1 - manager.cut : 1;
      // Singles and albums both get the same base monetization multiplier rivals get,
      // albums simply carry more tracks worth of streams (handled above via unitMult).
      const monetizationMult = 60;
      const grossRevenue = Math.round(streamCount * pricePerStream * monetizationMult);
      const salesRevenue = Math.round(grossRevenue * labelCut * managerCut);
      const managerFee = manager ? Math.round(grossRevenue * labelCut * manager.cut) : 0;

      // Build a display-ready version of the field for the CHART TABLE specifically.
      // This shows gross earnings (before any label/manager cut) for every entry,
      // player included, so the table tracks chart rank purely and consistently.
      // Net take-home (after the player's specific deal terms) is shown separately
      // in the summary boxes above, where the deal breakdown is actually explained.
      const displayField = field.map((f, idx) => {
        const rank = idx + 1;
        const rankChartMult = (CHART_SIZE - rank + 1) / CHART_SIZE;
        if (f.isPlayer) {
          return { ...f, title: combo.title, genre: character.genre, revenue: grossRevenue };
        }
        const rivalStreams = Math.round(Math.max(25, f.power * 160 * rankChartMult));
        const rivalGrossRevenue = Math.round(rivalStreams * pricePerStream * monetizationMult);
        return { ...f, revenue: rivalGrossRevenue, streams: rivalStreams };
      });

      // Keep the persistent rival pool's own displayed numbers in sync too, so the
      // obituary sidebar and any other rival lookups stay consistent with the chart.
      setRivals((rs) =>
        rs.map((r) => {
          const liveEntry = displayField.find((f) => f.id === r.id);
          return liveEntry ? { ...r, revenue: liveEntry.revenue, streams: liveEntry.streams } : r;
        })
      );

      // Immediate cut lands now, the rest trickles in afterward. Marketing spend
      // makes the tail both wider (more total $ trickling) and longer (more turns).
      const marketingFactor = clamp(combo.marketingSpend / 250, 0, 1); // 0 to 1
      const immediateShare = 0.45 - marketingFactor * 0.15; // heavier marketing pushes more into the tail
      const immediateCut = Math.round(salesRevenue * immediateShare);
      const trickleRemaining = salesRevenue - immediateCut;
      const momentumTurns = 2 + Math.round(marketingFactor * 4); // 2 turns at $0 spend, up to 6 turns at $250+

      applyDelta({
        popularity: popDelta,
        reputation: repDelta + (combo.producer.repBonus || 0),
        money: immediateCut,
      });

      const currentAge = ageAtTurn(turn).age;
      const reviews = generateReviews(finalScore, currentAge, combo.title);

      const release = {
        ...combo,
        finalScore: Math.round(finalScore),
        chartPos,
        charted,
        isDebut,
        climate: climate.name,
        genre: character.genre,
        turn,
        streamCount,
        salesRevenue,
        immediateCut,
        managerFee,
        momentumTurns,
        reviews,
      };
      setReleases((r) => [release, ...r]);
      if (trickleRemaining > 0) {
        setMomentum((m) => [
          ...m,
          {
            id: release.turn + "-" + Math.random().toString(36).slice(2),
            title: combo.title,
            turnsLeft: momentumTurns,
            perTurnMoney: Math.round(trickleRemaining / momentumTurns),
            perTurnPop: 0.5 + marketingFactor * 0.7,
          },
        ]);
      }
      setLastChartResult({ release, field: displayField, chartPos });
      setLog((l) => [
        {
          text: charted
            ? `"${combo.title}" drops. Debuts at #${chartPos} during ${climate.name}. ~${streamCount.toLocaleString()} streams, $${salesRevenue.toLocaleString()} in.`
            : `"${combo.title}" drops quietly. Did not chart this time, ~${streamCount.toLocaleString()} streams so far.`,
          type: "release",
          age: ageAtTurn(turn).compact,
        },
        ...l,
      ]);
      setPhase("reviews");
    },
    [climate, character, stats, rivals, applyDelta, turn, manager, careerPath]
  );

  const closeResult = useCallback(() => {
    setPhase("loop");
    advanceTurnCommon();
  }, [advanceTurnCommon]);

  const totalEarnings = useMemo(() => {
    if (!releases.length) return 0;
    return releases.reduce((sum, r) => sum + (r.salesRevenue || 0), 0);
  }, [releases]);

  // Derived from the persistent Hall of Fame leaderboard, so this genuinely
  // survives page reloads instead of resetting every session.
  const highScore = useMemo(() => {
    if (!leaderboard.length) return null;
    return Math.max(...leaderboard.map((e) => e.earnings || 0));
  }, [leaderboard]);

  // Fame Index: pure chart/critical legacy, independent of money.
  const fameIndex = useMemo(() => {
    if (!stats) return 0;
    const chartedReleases = releases.filter((r) => r.charted);
    const peakChart = chartedReleases.length ? Math.min(...chartedReleases.map((r) => r.chartPos)) : null;
    const chartScore = peakChart !== null ? Math.max(0, 100 - peakChart) * 8 : 0;
    const chartDepthBonus = chartedReleases.length * 15; // rewards more than one hit
    return Math.round(chartScore + chartDepthBonus + stats.reputation * 6 + stats.popularity * 5);
  }, [stats, releases]);

  // Legacy Score: the true headline number, a blend of fame and fortune,
  // like a Hotify Hall of Fame Index. This is what the rating tiers judge.
  const score = useMemo(() => {
    return Math.round(fameIndex + totalEarnings * 0.4);
  }, [fameIndex, totalEarnings]);

  const endRun = useCallback(() => {
    const rating = getCareerRating(score);
    setCareerRating(rating);
    const death = generateDeathScene(character?.name);
    setDeathScene(death);
    setObituary(generateObituary(character, rating, death, releases, totalEarnings));
    setSidebarArtist(generateSidebarArtist(rivals, totalEarnings));
    setNextRunHints(generateNextRunHints(releases, manager, careerPath, totalEarnings, rating.id));
    setRunComparison(generateRunComparison(totalEarnings, lastRunSummary));
    saveLeaderboardEntry({
      name: character?.name || "Unknown Artist",
      genre: character?.genre || "Unknown",
      earnings: totalEarnings,
      score,
      ratingLabel: rating.label,
      retiredAge: ageAtTurn(turn).label,
      timestamp: Date.now(),
    });
    saveLastRunSummary({
      name: character?.name || "Unknown Artist",
      earnings: totalEarnings,
      score,
      timestamp: Date.now(),
    });
    setPhase("end");
  }, [score, totalEarnings, character, turn, releases, rivals, manager, careerPath, lastRunSummary, saveLeaderboardEntry, saveLastRunSummary]);

  // auto end at turn limit
  if (phase === "loop" && turn > TURN_LIMIT) {
    endRun();
  }

  // ---------- Render ----------

  if (phase === "foreword") {
    return (
      <div style={styles.app}>
        <div style={styles.stage}>
          <div style={styles.eyebrow}>ONE MORE GIG: THE 27 CLUB</div>
          <h1 style={styles.h1}>You're 16.</h1>
          <div style={styles.forewordText}>
            You're 16, broke, and absolutely convinced you're about to change music forever.
            Bedroom studio, laptop, completely unreasonable self-belief.
            Not a bad starting point, honestly.
          </div>
          <div style={styles.forewordText}>
            You've got eleven years to build something real. Chart climbs, bad decisions that become good stories,
            late nights that were absolutely worth it, and a few that definitely weren't.
            The only guarantee is where it ends: the 27 Club.
            How you get there is entirely up to you.
          </div>
          <div style={styles.forewordOmen}>
            The clock starts now. Make some noise.
          </div>
          <div style={styles.forewordQuestion}>One more gig?</div>
          <button onClick={() => setPhase("create")} style={styles.primaryBtnMt22}>
            Let's Go
          </button>
        </div>
      </div>
    );
  }

  if (phase === "create") {
    return <div style={styles.app}><CharacterCreation onComplete={startGame} /></div>;
  }

  if (phase === "manager_offer") {
    return (
      <div style={styles.app}>
        <div style={styles.stage}>
          <div style={styles.eyebrow}>CAREER MOMENT</div>
          <h1 style={styles.h1}>Time to Pick Representation</h1>
          <div style={styles.forewordText}>
            People are starting to take notice. A few managers have reached out. Whoever you pick is who you're working with for the rest of this run, choose carefully.
          </div>
          <div style={styles.bgGrid}>
            {MANAGERS.map((m) => (
              <button
                key={m.id}
                onClick={() => {
                  setManager(m);
                  applyDelta({ marketability: m.traits.marketability, reputation: m.traits.reputation });
                  setLog((l) => [{ text: `${character.name} signs with ${m.name === "Stay Unmanaged" ? "no one, staying independent" : m.name}.`, type: "career" }, ...l]);
                  setPhase("loop");
                }}
                style={styles.offerCard}
              >
                <div style={styles.bgName}>{m.name}</div>
                <div style={styles.bgDesc}>{m.desc}</div>
                <div style={styles.offerBlurb}>{m.blurb}</div>
                <div style={styles.offerStats}>
                  {m.cut > 0 && <span>Takes {Math.round(m.cut * 100)}% of release revenue</span>}
                  {m.cut === 0 && <span>No cut taken</span>}
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if (phase === "path_offer") {
    return (
      <div style={styles.app}>
        <div style={styles.stage}>
          <div style={styles.eyebrow}>CAREER MOMENT</div>
          <h1 style={styles.h1}>Pick Your Path</h1>
          <div style={styles.forewordText}>
            This is the big one. How you put out music from here is locked in for the rest of this run.
          </div>
          <div style={styles.bgGrid}>
            {CAREER_PATHS.map((p) => (
              <button
                key={p.id}
                onClick={() => {
                  setCareerPath(p);
                  applyDelta({ money: p.advance });
                  setLog((l) => [{ text: `${character.name} commits to: ${p.name}.`, type: "career" }, ...l]);
                  setPhase("loop");
                }}
                style={styles.offerCard}
              >
                <div style={styles.bgName}>{p.name}</div>
                <div style={styles.bgDesc}>{p.desc}</div>
                <div style={styles.offerBlurb}>{p.blurb}</div>
                <div style={styles.offerStats}>
                  {p.advance > 0 && <span>+${p.advance} now</span>}
                  {p.moneyPerTurn > 0 && <span>{p.advance > 0 ? " · " : ""}+${p.moneyPerTurn}/turn passive</span>}
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if (phase === "release") {
    return (
      <div style={styles.app}>
        <ReleaseBuilder
          stats={stats}
          genre={character.genre}
          climate={climate}
          onCancel={() => setPhase("loop")}
          onRelease={handleRelease}
        />
      </div>
    );
  }

  if (phase === "reviews" && lastChartResult) {
    const { release } = lastChartResult;
    return (
      <div style={styles.app}>
        <div style={styles.stage}>
          <div style={styles.eyebrow}>THE REVIEWS ARE IN</div>
          <h1 style={styles.h1}>"{release.title}"</h1>
          <div style={styles.chartSub}>
            {release.isDebut ? "Your debut release. First impressions count." : `${release.genre} · ${release.type === "album" ? "Album" : "Single"}`}
          </div>

          <div style={styles.reviewList}>
            {release.reviews.map((r, i) => (
              <div key={i} style={styles.reviewCard}>
                <div style={styles.reviewHeader}>
                  <span style={styles.reviewSource}>{r.source}</span>
                  <span style={styles.reviewStars}>{"★".repeat(Math.floor(r.stars))}{r.stars % 1 !== 0 ? "½" : ""}{"☆".repeat(5 - Math.ceil(r.stars))}</span>
                </div>
                <div style={styles.reviewContext}>{r.context}</div>
                <div style={styles.reviewLine}>"{r.line}"</div>
              </div>
            ))}
          </div>

          <button onClick={() => setPhase("result")} style={styles.primaryBtnMt20}>See Chart Result</button>
        </div>
      </div>
    );
  }

  if (phase === "result" && lastChartResult) {
    const { release, field, chartPos } = lastChartResult;
    // Show a window of the chart around the player's position so a #87 finish is still visible in context,
    // instead of always showing a top 10 the player isn't anywhere near early on.
    let windowStart = 0;
    let windowEnd = Math.min(10, field.length);
    if (release.charted) {
      const playerIdx = chartPos - 1;
      windowStart = Math.max(0, playerIdx - 3);
      windowEnd = Math.min(field.length, playerIdx + 4);
    }
    const visibleField = field.slice(windowStart, windowEnd);

    return (
      <div style={styles.app}>
        <div style={styles.stage}>
          <div style={styles.eyebrow}>CHART RESULT</div>
          <h1 style={styles.h1}>"{release.title}"</h1>
          {release.charted ? (
            <>
              <div style={styles.bigChartPos}>#{chartPos}</div>
              <div style={styles.chartSub}>{release.genre} · during {release.climate}</div>
            </>
          ) : (
            <>
              <div style={styles.bigChartPosMuted}>Did Not Chart</div>
              <div style={styles.chartSub}>
                {release.isDebut ? "Most debuts start here. Nobody charts on the first try." : "Outside the Top 100 this time."}
              </div>
            </>
          )}

          <div style={styles.salesRow}>
            <div style={styles.salesCell}>
              <div style={styles.salesLabel}>Streams</div>
              <div style={styles.salesValue}>{release.streamCount.toLocaleString()}</div>
            </div>
            <div style={styles.salesCell}>
              <div style={styles.salesLabel}>Total Earned</div>
              <div style={styles.salesValue}>${release.salesRevenue.toLocaleString()}</div>
            </div>
            <div style={styles.salesCell}>
              <div style={styles.salesLabel}>Paid Now</div>
              <div style={styles.salesValue}>${release.immediateCut.toLocaleString()}</div>
            </div>
          </div>
          {release.salesRevenue > release.immediateCut && (
            <div style={styles.momentumNote}>
              The rest trickles in as royalties over the next {release.momentumTurns} months, {release.marketingSpend > 100 ? "that marketing spend is keeping it wide and sustained" : "modest spend means a shorter tail"}.
            </div>
          )}
          {release.managerFee > 0 && (
            <div style={styles.momentumNote}>
              {manager.name} already took their cut: ${release.managerFee.toLocaleString()}.
            </div>
          )}

          {release.charted && (
            <div style={styles.chartList}>
              <div style={styles.chartHeaderRow}>
                <span style={styles.chartRank}>#</span>
                <span style={styles.chartHeaderTitle}>Title / Artist</span>
                <span style={styles.chartHeaderGenre}>Genre</span>
                <span style={styles.chartHeaderMoney}>Earned</span>
              </div>
              {visibleField.map((f, i) => {
                const rank = windowStart + i + 1;
                const displayTitle = f.title || "Untitled";
                const displayRevenue = f.revenue ?? f.salesRevenue ?? 0;
                return (
                  <div key={i} style={f.isPlayer ? styles.chartRowBasePlayer : styles.chartRowBase}>
                    <span style={styles.chartRank}>{rank}</span>
                    <span style={styles.chartTitleArtist}>
                      <span style={styles.chartTitleText}>"{displayTitle}"</span>
                      <span style={styles.chartArtistText}>{f.isPlayer ? `${f.name} (you)` : f.name}</span>
                    </span>
                    <span style={styles.chartGenreText}>{f.genre}</span>
                    <span style={styles.chartScore}>${Math.round(displayRevenue).toLocaleString()}</span>
                  </div>
                );
              })}
            </div>
          )}

          <button onClick={closeResult} style={styles.primaryBtnMt24}>Continue Career</button>
        </div>
      </div>
    );
  }

  if (phase === "end") {
    const myRank = leaderboard.findIndex(
      (e) => e.name === character.name && e.timestamp && Math.abs(Date.now() - e.timestamp) < 5000
    );
    return (
      <div style={styles.app}>
        <div style={styles.stage}>
          <div style={styles.newspaper}>
            <div style={styles.masthead}>
              <div style={styles.mastheadTitle}>THE DAILY ENCORE</div>
              <div style={styles.mastheadSub}>OBITUARIES · IN MEMORIAM · EST. JUNE 26, 2016</div>
            </div>

            <div style={styles.newspaperGrid}>
              <div style={styles.newspaperMain}>
                <h1 style={styles.obitHeadline}>{character.name}, 27, Of The 27 Club</h1>
                {careerRating && <div style={styles.obitRatingTag}>{careerRating.label}</div>}

                {deathScene && (
                  <div style={styles.deathBlock}>
                    <div style={styles.deathTitle}>{deathScene.title}</div>
                    <div style={styles.deathCause}>{deathScene.cause}</div>
                    <div style={styles.deathEpitaph}>"{deathScene.epitaph}"</div>
                  </div>
                )}

                {obituary && (
                  <div style={styles.obitBody}>
                    <p style={styles.obitParagraph}>
                      {obituary.opener} <strong>{character.name}</strong>, the {character.genre} artist who {obituary.body}
                    </p>
                    <p style={styles.obitParagraph}>{obituary.discography}</p>
                    <p style={styles.obitParagraph}>{obituary.regret}</p>
                    {obituary.quote && (
                      <div style={styles.obitQuoteBlock}>
                        <div style={styles.obitQuoteText}>"{obituary.quote}"</div>
                        <div style={styles.obitQuoteAttrib}>— {obituary.quotePerson}</div>
                      </div>
                    )}
                  </div>
                )}

                {obituary && <div style={styles.obitReplayHook}>{obituary.callToReplay}</div>}

                {runComparison && (
                  <div style={styles.comparisonBlock}>
                    <div style={styles.comparisonLine}>{runComparison.line}</div>
                    <div style={styles.comparisonNumbers}>
                      This run: ${totalEarnings.toLocaleString()} · Last run ({runComparison.previousName}): ${runComparison.previousEarnings.toLocaleString()}
                    </div>
                  </div>
                )}
              </div>

              <div style={styles.newspaperSidebar}>
                <div style={styles.sidebarLabel}>ALSO IN THIS ISSUE</div>
                {sidebarArtist && sidebarArtist.shamed && (
                  <div style={styles.sidebarCard}>
                    <div style={styles.sidebarName}>{character.name} Puts {sidebarArtist.name} to Shame, Even in Death</div>
                    <div style={styles.sidebarCause}>
                      {sidebarArtist.name} also passed at 27. {sidebarArtist.cause}
                    </div>
                    <div style={styles.sidebarEarningsGood}>
                      Out-earned {sidebarArtist.name} by ${sidebarArtist.shameGap?.toLocaleString()}, even from beyond the grave.
                    </div>
                    <div style={styles.sidebarTurnPage}>Turn to page 3 for the full story →</div>
                  </div>
                )}
                {sidebarArtist && !sidebarArtist.shamed && (
                  <div style={styles.sidebarCard}>
                    <div style={styles.sidebarName}>{sidebarArtist.name}, 27</div>
                    <div style={styles.sidebarCause}>{sidebarArtist.cause}</div>
                    {sidebarArtist.gap !== null && (
                      <div style={styles.sidebarEarnings}>
                        Out-earned you by ${sidebarArtist.gap.toLocaleString()} (${sidebarArtist.earnings.toLocaleString()} total)
                      </div>
                    )}
                    <div style={styles.sidebarRating}>{sidebarArtist.ratingLabel}</div>
                    <div style={styles.sidebarTurnPage}>Turn to page 3 for the full story →</div>
                  </div>
                )}
                <div style={styles.sidebarLabel}>WHAT MIGHT HAVE BEEN</div>
                {nextRunHints.map((hint, i) => (
                  <div key={i} style={styles.hintLine}>
                    <span style={styles.hintBullet}>★</span> {hint}
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={styles.salesRow}>
            <div style={styles.salesCell}>
              <div style={styles.salesLabel}>Career Earnings</div>
              <div style={styles.salesValue}>${totalEarnings.toLocaleString()}</div>
            </div>
            <div style={styles.salesCell}>
              <div style={styles.salesLabel}>Fame Index</div>
              <div style={styles.salesValue}>{fameIndex.toLocaleString()}</div>
            </div>
            <div style={styles.salesCell}>
              <div style={styles.salesLabel}>Legacy Score</div>
              <div style={styles.salesValue}>{score.toLocaleString()}</div>
            </div>
          </div>

          <div style={styles.fieldBlock}>
            <div style={styles.fieldLabel}>🏆 Hall of Fame · All-Time Top Earners</div>
            {!leaderboardLoaded && <div style={styles.mutedText}>Loading the Hall of Fame...</div>}
            {leaderboardLoaded && leaderboard.length === 0 && (
              <div style={styles.mutedText}>First run on the books. Future you has a number to beat.</div>
            )}
            {highScore !== null && (
              <div style={styles.personalBestNote}>
                Your best ever: ${highScore.toLocaleString()}{totalEarnings === highScore && totalEarnings > 0 ? " — that's THIS run!" : ""}
              </div>
            )}
            {leaderboard.slice(0, 10).map((entry, i) => {
              const isThisRun = i === myRank;
              return (
                <div key={i} style={isThisRun ? styles.leaderboardRowMineBase : styles.leaderboardRow}>
                  <span style={styles.chartRank}>{i + 1}</span>
                  <span style={styles.leaderboardName}>
                    {entry.name}
                    <span style={styles.leaderboardMeta}> · {entry.genre} · {entry.ratingLabel}</span>
                  </span>
                  <span style={styles.chartScore}>${entry.earnings.toLocaleString()}</span>
                </div>
              );
            })}
          </div>

          <div style={styles.fieldBlock}>
            <div style={styles.fieldLabel}>Career Stats</div>
            <StatBar stats={stats} />
          </div>

          <div style={styles.fieldBlock}>
            <div style={styles.fieldLabel}>Releases ({releases.length})</div>
            {releases.length === 0 && <div style={styles.mutedText}>No releases this run.</div>}
            {releases.map((r, i) => (
              <div key={i} style={styles.releaseRow}>
                <span>"{r.title}"</span>
                <span style={styles.chartScore}>{r.charted ? `#${r.chartPos}` : "Unlisted"} · ${r.salesRevenue.toLocaleString()}</span>
              </div>
            ))}
          </div>

          <button
            onClick={() => {
              setPhase("foreword");
              setCharacter(null);
              setStats(null);
            }}
            style={styles.primaryBtnMt16}
          >
            One More Gig
          </button>
        </div>
      </div>
    );
  }

  // ---------- loop phase ----------
  const currentAgeInfo = ageAtTurn(turn);
  const yearsLeft = DEATH_AGE - currentAgeInfo.age;
  const isLateGame = yearsLeft <= 5; // midpoint onward, 11 year career so ~5.5yr mark
  const isFinalStretch = yearsLeft <= 2;
  const hasNeverReleased = releases.length === 0;

  return (
    <div style={isFinalStretch ? styles.appLateGameBase : styles.app}>
      <div style={styles.stage}>
        <div style={styles.topRow}>
          <div>
            <div style={styles.eyebrow}>
              {character.name.toUpperCase()} · {character.genre}
              {artistTitle && <span style={styles.artistTitleTag}> · {artistTitle}</span>}
            </div>
            <div style={styles.turnLabel}>
              {currentAgeInfo.fullLabel}
              <span style={isFinalStretch ? styles.countdownTagUrgentBase : styles.countdownTag}>
                {currentAgeInfo.countdownLabel}
              </span>
            </div>
          </div>
          <div style={styles.climateBlock}>
            <div style={styles.climateLabel}>GENRE CLIMATE</div>
            <div style={styles.climateTag}>{climate.name}</div>
            <div style={styles.climateGenres}>
              {climate.genres.length === 0 ? "no genre favored right now" : climate.genres.join(" + ")}
            </div>
            {climate.genres.includes(character.genre) ? (
              <div style={styles.climateMatch}>✓ {character.genre} is hot right now</div>
            ) : climate.genres.length > 0 ? (
              <div style={styles.climateNoMatch}>{character.genre} isn't favored this season</div>
            ) : null}
          </div>
        </div>

        {(manager || careerPath) && (
          <div style={styles.repStrip}>
            {manager && <span>{manager.id === "none" ? "Unmanaged" : manager.name}</span>}
            {manager && careerPath && <span style={styles.repDivider}>·</span>}
            {careerPath && <span>{careerPath.name}</span>}
          </div>
        )}

        <StatBar stats={stats} />

        {activeEncounter ? (
          <div style={styles.encounterBox}>
            <div style={styles.encounterTitle}>{activeEncounter.title}</div>
            <div style={styles.encounterText}>{activeEncounter.text}</div>
            <div style={styles.encounterChoices}>
              {activeEncounter.choices.map((c, i) => (
                <button key={i} onClick={() => resolveEncounter(c)} style={styles.choiceBtn}>
                  <span>{c.label}</span>
                  <StatDelta delta={c.delta} />
                </button>
              ))}
            </div>
          </div>
        ) : (
          <>
            {lastDelta && (
              <div style={styles.lastDeltaBox}>
                {lastReaction && (
                  <div style={lastReaction.positive ? styles.reactionLinePositive : styles.reactionLineNegative}>
                    {lastReaction.text}
                  </div>
                )}
                <StatDelta delta={lastDelta} />
              </div>
            )}

            {hasNeverReleased && turn > 3 && (
              <div style={styles.releaseNudge}>
                Real talk: stats only get you so far. Releasing singles and albums is how you actually chart, earn, and build a legacy. Don't leave it too late.
              </div>
            )}

            {!hasNeverReleased && isFinalStretch && (
              <div style={styles.urgencyBanner}>
                {yearsLeft <= 0
                  ? "This is your last shot at the books. Whatever happens next is the legacy."
                  : `Only ${yearsLeft} year${yearsLeft === 1 ? "" : "s"} left before 27. If you've got one more release in you, now's the time.`}
              </div>
            )}

            <div style={styles.actionGrid}>
              {ACTIONS.map((a) => {
                const currentAge = ageAtTurn(turn).age;
                const ageLocked = a.minAge && currentAge < a.minAge;
                const popLocked = a.minPopularity && stats.popularity < a.minPopularity;
                const locked = ageLocked || popLocked;
                return (
                  <button
                    key={a.id}
                    onClick={() => !locked && handleAction(a.id)}
                    style={{ ...styles.actionCard, ...(locked ? styles.actionCardLocked : {}) }}
                  >
                    <div style={styles.actionLabel}>{a.label}{locked ? " 🔒" : ""}</div>
                    <div style={styles.actionDesc}>{locked ? a.lockedDesc : a.desc}</div>
                  </button>
                );
              })}
            </div>

            <button onClick={() => setPhase("release")} style={{ ...styles.releaseBtn, ...(hasNeverReleased ? styles.releaseBtnPulse : {}) }}>
              🎤 Work Toward a Release{hasNeverReleased ? " — start here" : ""}
            </button>

            <div style={styles.logBox}>
              <div style={styles.logTitle}>Career Highlights</div>
              {log.slice(0, 6).map((entry, i) => (
                <div key={i} style={styles.logLine}>
                  <span style={styles.logBullet}>•</span>
                  <span>
                    {entry.age && <span style={styles.logAge}>[{entry.age}]</span>} {entry.text}
                  </span>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

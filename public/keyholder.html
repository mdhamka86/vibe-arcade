// ============================================================
// THE KEYHOLDER — private relocation concierge board.

// Every client-specific value lives in the CLIENT block below.
// A new engagement = fork this file, rewrite CLIENT, ship.
// Nothing below the CLIENT block knows who the client is.
//
// Scaffold pattern matches the established hammyLabs single-file apps.
// ============================================================

// ------------------------------------------------------------

// engagement. The PHASES and COST_GROUPS below are Phuket-specific prose
// written for a two-child family: 5 references to Rachel and Ethan by name,
// ~16 to Phuket/BISP/Ko Kaew. A fork for a childless client leaves "School
// shortlist built for Rachel (Y7) and Ethan (Y3)" on their board and bills
// them for a capital levy they don't owe.
//
// So a fork is: rewrite CLIENT, then rewrite PHASES + COST_GROUPS for that
// family's actual move. That second half is the job the concierge is being
// paid for, and it is the reason this is a white-glove service and not a SaaS.
// The engine is generic. The engagement never is.
// ------------------------------------------------------------

// ------------------------------------------------------------
// PROVENANCE — the corridor knowledge, dated.
//
// Every researched figure carries the day it was checked and where it
// came from. This is the difference between local knowledge and a guess
// in a suit. It is also the liability control: a fee that has drifted
// shows amber rather than quietly being wrong in a client's budget.
// ------------------------------------------------------------
const TODAY = new Date();
function ageDays(iso) {
  return Math.floor((TODAY - new Date(iso + "T00:00:00+07:00")) / 86400000);
}
function freshness(iso) {
  if (!iso) return { state: "none", days: null };
  const d = ageDays(iso);
  if (d <= CLIENT.staleAfterDays) return { state: "fresh", days: d };
  if (d <= CLIENT.staleAfterDays * 2) return { state: "ageing", days: d };
  return { state: "stale", days: d };
}
const FRESH_COLOUR = { fresh: "#7fa88b", ageing: "#c98b5a", stale: "#e06c5a", none: "#7d8a9c" };
// Every date in this app is a Thailand date. Formatting without pinning the
// zone renders it a day early for anyone west of Bangkok, which on a
// "verified on" stamp is a small lie and on a move-in date is a large one.
const TZ = "Asia/Bangkok";
function fmtShort(iso) {
  return new Date(iso + "T00:00:00+07:00")
    .toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric", timeZone: TZ });
}

// derived
const PARTY = CLIENT.parties;

function partyByName(n) { return PARTY_LIST.find(p => p.name === n) || null; }

// a name on the board that is not a party to this engagement is worth showing
// as such rather than silently styling it like everyone else.
function isKnownParty(n) { return !!partyByName(n); }
function isConcierge(n) { const p = partyByName(n); return !!p && p.role === "Concierge"; }

function tierIncludes(itemTier) {
  return TIER_RANK[CLIENT.tier] >= TIER_RANK[itemTier];

// THE ADMISSIONS WINDOW — the second clock.

// wave is October to February. Competitive year groups (Year 7, IB
// Diploma) often close by Christmas. A family moving in August with a
// Year 7 child has already missed the main wave and is in waitlist
// territory. Saying so plainly is the job.
// ------------------------------------------------------------

  termStart: "2026-08-17",          // August academic year
  mainWave: { from: "2025-10-01", to: "2026-02-28" },
  springWave: { from: "2026-03-01", to: "2026-05-31" },
  // Year 7 is named repeatedly as one of the tight groups
  tightYears: ["Year 7", "Year 12"],
  verified: "2026-07-15",
  src: "Phuket admissions guidance, cross-checked across four sources",
};

function waveNow() {
  const now = TODAY;
  const d = iso => new Date(iso + "T00:00:00+07:00");
  if (now <= d(ADMISSIONS.mainWave.to)) return "main";
  if (now <= d(ADMISSIONS.springWave.to)) return "spring";
  return "late";
}
function tightChildren() {
  return CLIENT.children.filter(c => ADMISSIONS.tightYears.includes(c.year));
}

function fmtDest(n) {

  return CLIENT.dest.symbol + v.toLocaleString("en-US");

  const r = Number(rate) || CLIENT.fxDefault;
  const v = (Number(destAmt) || 0) / r;
  return CLIENT.origin.symbol + v.toLocaleString("en-US", { maximumFractionDigits: 0 });
}

    c[it.id] = it.isFee ? Math.round(TIER_META[CLIENT.tier].fee * CLIENT.fxDefault) : it.val;

  return c;
}

// ------------------------------------------------------------
// derived maths — readiness, money, dates

const pct = (a, b) => (b === 0 ? 0 : Math.round((a / b) * 100));

function phaseReadiness(phaseId, done) {
  const live = SCOPED_TASKS.filter(t => t.phase === phaseId);
  return { done: live.filter(t => done[t.id]).length, total: live.length };
}
function overallReadiness(done) {
  return { done: SCOPED_TASKS.filter(t => done[t.id]).length, total: SCOPED_TASKS.length };
}
function ownerSplit(done) {
  const out = {};
  Object.keys(OWNER).forEach(k => {
    const live = SCOPED_TASKS.filter(t => t.owner === k);
    out[k] = { done: live.filter(t => done[t.id]).length, total: live.length };
  });
  return out;
}
function daysUntil(iso) {
  const d = new Date(iso + "T00:00:00+07:00");
  return Math.ceil((d - new Date()) / 86400000);
}
function fmtDate(iso) {
  return new Date(iso + "T00:00:00+07:00").toLocaleDateString("en-GB",
    { day: "numeric", month: "long", year: "numeric", timeZone: TZ });
}
function withinHours() {
  const h = Number(new Date().toLocaleString("en-US", { timeZone: "Asia/Bangkok", hour: "2-digit", hour12: false }));
  return h >= CLIENT.hours.open && h < CLIENT.hours.close;
}

const SAVE_KEY = "keyholder-" + CLIENT.engagement;

// Anything that has been through JSON.parse is untrusted, even our own writes:
// a half-finished save, a schema change between versions, or a client with two
// tabs open all produce objects that are *almost* right. "Almost" crashes React
// on the first render and shows the family a white screen. So every field is
// coerced to its expected shape and bad data is discarded rather than trusted.
function coerceState(raw) {
  const e = emptyState();
  if (!raw || typeof raw !== "object" || Array.isArray(raw)) return e;
  const obj = v => (v && typeof v === "object" && !Array.isArray(v)) ? v : {};

  const done = {}, by = {}, at = {};
  const live = new Set(ALL_TASKS.map(t => t.id));
  const rd = obj(raw.done), rb = obj(raw.by), ra = obj(raw.at);
  // drop ticks for tasks that no longer exist — a renamed task id must not
  // linger as a phantom tick nobody can untick.
  Object.keys(rd).forEach(k => {
    if (!live.has(k) || !rd[k]) return;
    done[k] = true;
    if (typeof rb[k] === "string" && partyByName(rb[k])) by[k] = rb[k];
    const ts = Number(ra[k]);
    at[k] = (isFinite(ts) && ts > 0) ? ts : Date.now();
  });

  const notes = Array.isArray(raw.notes) ? raw.notes.filter(n =>
    n && typeof n === "object" && typeof n.text === "string" && isFinite(Number(n.at))
  ).map(n => ({
    id: String(n.id || Math.random().toString(36).slice(2, 9)),
    who: partyByName(n.who) ? n.who : "Unknown",
    text: String(n.text).slice(0, 4000),
    at: Number(n.at),
  })) : [];

  const costs = { ...e.costs };
  const rc = obj(raw.costs);
  Object.keys(costs).forEach(k => {
    const v = Number(rc[k]);
    if (isFinite(v) && v >= 0) costs[k] = Math.min(50000000, Math.round(v));
  });

  const fxN = Number(raw.fx);
  const fx = (isFinite(fxN) && fxN > 0) ? fxN : CLIENT.fxDefault;

  const seen = {};
  const rs = obj(raw.seen);
  const now = Date.now();
  Object.keys(rs).forEach(k => {
    const v = Number(rs[k]);
    // clamp future watermarks: a device with a skewed clock would otherwise
    // park its last-seen in the future and the digest would never fire again,
    // silently, forever. Better to re-show one digest than to lose them all.
    if (partyByName(k) && isFinite(v) && v > 0) seen[k] = Math.min(v, now);
  });

  return { done, by, at, notes, costs, fx, seen };
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    return coerceState(JSON.parse(raw));
  } catch (e) { return null; }
}
// Returns true on a real write. A silent failure here is the exact shape of
// the bug that ate photos in an earlier project: the UI keeps accepting work,
// the storage layer quietly drops it, and nobody finds out until reload.
function saveLocal(s) {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(s));
    return true;
  } catch (e) {
    return false;
  }
}
function emptyState() {
  // seen[party] = timestamp of that party's last visit. Drives the digest.
  return { done: {}, by: {}, at: {}, notes: [], costs: defaultCosts(), fx: CLIENT.fxDefault, seen: {} };
}

const body = "'Public Sans',system-ui,sans-serif";

// ---------- inline line-art glyphs ----------

  const paths = {
    key:    <g {...p}><circle cx="7" cy="9" r="4" /><path d="M10 12l7 7M14 16l2-2M17 19l2-2" /></g>,
    check:  <g {...p}><path d="M4 11l5 5L20 5" /></g>,

    paper:  <g {...p}><path d="M6 3h8l4 4v14H6z" /><path d="M14 3v4h4" /><path d="M9 12h6M9 16h6" /></g>,
    plane:  <g {...p}><path d="M2 13l20-7-7 20-3-8-8-3-2-2z" /></g>,
    clock:  <g {...p}><circle cx="12" cy="12" r="8" /><path d="M12 7v5l3 2" /></g>,
    coin:   <g {...p}><circle cx="12" cy="12" r="8" /><path d="M12 8v8M9.5 10h4a1.5 1.5 0 010 3h-3a1.5 1.5 0 000 3h4" /></g>,
    lock:   <g {...p}><rect x="5" y="10" width="14" height="10" rx="1.5" /><path d="M8 10V7a4 4 0 018 0v3" /></g>,
    warn:   <g {...p}><path d="M12 4l9 16H3l9-16z" /><path d="M12 10v4M12 17v.5" /></g>,
    dot:    <g {...p}><circle cx="12" cy="12" r="3.5" /></g>,
    person: <g {...p}><circle cx="12" cy="8" r="3.5" /><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" /></g>,
    note:   <g {...p}><path d="M5 4h14v16l-4-3H5z" /><path d="M9 9h6M9 13h4" /></g>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: "block", flexShrink: 0 }}>{paths[name] || paths.dot}</svg>;
}
const PHASE_ICON = { schools: "school", home: "home", paper: "paper", arrival: "plane", after: "clock" };

// ---------- the ledger rule ----------
// A thin brass line that fills as scope completes. This is the
// signature: the whole product is "you can see it happening", so
// the one ornament in the design is the thing that proves it.
function LedgerRule({ p, height = 3 }) {
  return (
    <div style={{ height, background: C.line, borderRadius: 1, overflow: "hidden", position: "relative" }}>
      <div style={{
        position: "absolute", inset: 0, width: p + "%", background: C.brass,
        transition: "width .6s cubic-bezier(.2,.7,.2,1)",

// ============================================================
// APP
// ============================================================
function App() {
  const [state, setState] = useState(() => loadLocal() || emptyState());
  const [who, setWho] = useState("Wei Ming");     // demo: swap seats
  const [tab, setTab] = useState("board");
  const [openPhase, setOpenPhase] = useState("schools");
  const [toast, setToast] = useState(null);
  const [pulse, setPulse] = useState(null);
  const toastRef = useRef(null);
  const skipSave = useRef(false);

  // The digest diffs against the reader's PREVIOUS visit, so the timestamp
  // must be frozen the moment the seat is taken and never updated while
  // they sit there. Update it live and the digest diffs against itself and
  // always shows nothing. Keyed by party so each seat has its own watermark.
  const [digestFor, setDigestFor] = useState(null);
  const [saveBroken, setSaveBroken] = useState(false);
  const seenAtMount = useRef({});
  const stateRef = useRef(state);   // always-current mirror, avoids stale closures

  // persist on every change — except the one tick right after a wipe, or the
  // erase would instantly rewrite an empty record and the storage key would
  // survive. "Erased" must mean the key is gone, not blank.
  useEffect(() => { stateRef.current = state; });

  useEffect(() => {
    if (skipSave.current) { skipSave.current = false; return; }
    const ok = saveLocal(state);
    if (!ok !== saveBroken) setSaveBroken(!ok);
  }, [state]);

  // On taking a seat: read that party's previous watermark, build their digest
  // against it, then stamp the visit — all inside one functional update so we
  // never diff against a watermark we just moved. Every seat change re-runs it,
  // which is what makes the demo swap show a real digest.
  useEffect(() => {
    const cur = stateRef.current;
    seenAtMount.current[who] = cur.seen[who] || 0;
    setDigestFor(buildDigest(cur, who));           // diff against the OLD watermark
    setState(s2 => ({ ...s2, seen: { ...s2.seen, [who]: Date.now() } }));  // then stamp
  }, [who]);

  function flash(msg) {
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 2600);
  }

  const done = state.done;
  const overall = overallReadiness(done);
  const p = pct(overall.done, overall.total);
  const split = ownerSplit(done);
  const days = daysUntil(CLIENT.moveInDate);
  const meIsConcierge = isConcierge(who);

  function toggle(task) {
    // The accountability rule, enforced in code rather than in a PDF:
    // a concierge cannot tick a task the client is accountable for,
    // and vice versa. The board cannot lie about who did what.
    const o = task.owner;
    const canTick =
      (o === "concierge" && meIsConcierge) ||
      (o === "client" && !meIsConcierge) ||
      (o === "vendor" && meIsConcierge) ||
      (o === "licensed" && !meIsConcierge);
    if (!canTick) {
      flash(o === "client" || o === "licensed"
        ? "Only " + CLIENT.familyName + " family can confirm this one."
        : "Only the concierge can confirm this one.");
      return;
    }
    const now = Date.now();
    setState(s => {
      const nd = { ...s.done }, nb = { ...s.by }, na = { ...s.at };
      if (nd[task.id]) { delete nd[task.id]; delete nb[task.id]; delete na[task.id]; }
      else { nd[task.id] = true; nb[task.id] = who; na[task.id] = now; }
      return { ...s, done: nd, by: nb, at: na };
    });
    if (!done[task.id]) { setPulse(task.id); setTimeout(() => setPulse(null), 700); }
  }

  const NOTE_MAX = 2000;
  function addNote(text) {
    const t = String(text || "").trim();
    if (!t) return;   // whitespace-only is not a note
    setState(s => ({ ...s, notes: [{ id: Math.random().toString(36).slice(2, 9), who,
      text: t.slice(0, NOTE_MAX), at: Date.now() }, ...s.notes] }));
  }

  function reset() {
    if (!confirm("Clear this demo board and start over?")) return;
    setState(emptyState());
    flash("Board reset.");
  }

  // Clause 7 in one button. The client can destroy everything this board
  // holds about them, themselves, without asking us. Not a setting buried
  // in a menu: a control they own.
  function wipe() {
    if (!confirm("Erase everything this board holds about your family, permanently?\n\nThe board, the notes, the figures. This cannot be undone.")) return;
    skipSave.current = true;
    setState(emptyState());
    try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
    // belt and braces: the effect is async, so sweep the key again after it settles.
    setTimeout(() => { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} }, 0);
    flash("Erased. Nothing about your family remains in this browser.");
  }

  return (
    <div style={{ minHeight: "100vh", background: C.ink, color: C.bone, fontFamily: body }}>
      <a href="#main" style={{ position: "absolute", left: -9999, top: 0, zIndex: 99,
        background: C.brass, color: C.ink, padding: "9px 15px", fontFamily: mono, fontSize: 12,
        borderRadius: 2, textDecoration: "none" }}
        onFocus={e => { e.target.style.left = "12px"; e.target.style.top = "12px"; }}
        onBlur={e => { e.target.style.left = "-9999px"; }}>Skip to the board</a>
      <SeatSwitcher who={who} setWho={setWho} />
      <div id="main" style={{ maxWidth: 780, margin: "0 auto", padding: "0 18px 100px" }}>
        <Masthead who={who} days={days} p={p} />
        {saveBroken && <SaveWarning />}
        <Nav tab={tab} setTab={setTab} />
        {tab === "board" && digestFor && (
          <Digest digest={digestFor} who={who} onDismiss={() => setDigestFor(null)} />
        )}
        {tab === "board" && (
          <Board done={done} by={state.by} at={state.at} who={who} meIsConcierge={meIsConcierge}
            openPhase={openPhase} setOpenPhase={setOpenPhase} onToggle={toggle} pulse={pulse}
            split={split} overall={overall} />
        )}
        {tab === "bill" && (
          <Bill costs={state.costs} fx={state.fx}
            setCosts={c => setState(s => ({ ...s, costs: c }))}
            setFx={f => setState(s => ({ ...s, fx: f }))} />
        )}
        {tab === "log" && (
          <LogTab notes={state.notes} by={state.by} at={state.at} who={who}
            onAdd={addNote} onReset={reset} />
        )}
        {tab === "terms" && <Terms overall={overall} costs={state.costs} fx={state.fx} />}
        {tab === "privacy" && <Privacy state={state} onWipe={wipe} />}
        <Footer />
      </div>
      <Toast msg={toast} />
    </div>
  );
}

// ============================================================
// THE DIGEST — what changed while you were away.
//
// This is the feature that decides whether the client opens the board
// or WhatsApps at 9pm asking how it's going. The 8-to-8 in clause 3
// only holds if the board answers the question before they ask it.
//
// Rule: it only counts the OTHER party's work. Being shown your own
// ticks reflected back is noise, and noise is how a digest dies.
// ============================================================
function buildDigest(state, who) {
  const since = state.seen[who] || 0;
  if (!since) return null;   // first visit: nothing to diff against
  const mine = isConcierge(who);

  const ticks = SCOPED_TASKS
    .filter(t => state.at[t.id] && state.at[t.id] > since && state.by[t.id] !== who)
    .map(t => ({ kind: "tick", at: state.at[t.id], who: state.by[t.id], t }));

  const notes = (state.notes || [])
    .filter(n => n && n.at > since && n.who !== who && typeof n.text === "string")
    .map(n => ({ kind: "note", at: n.at, who: isKnownParty(n.who) ? n.who : "Unknown", text: n.text }));

  const all = ticks.concat(notes).sort((a, b) => b.at - a.at);
  if (!all.length) return null;

  // what still sits with the reader. the digest should end with a nudge,
  // not a pat on the back.
  const yours = SCOPED_TASKS.filter(t => {
    const owns = mine ? (t.owner === "concierge" || t.owner === "vendor")
                      : (t.owner === "client" || t.owner === "licensed");
    return owns && !state.done[t.id];
  });

  return { items: all, since, yours };
}

function Digest({ digest, onDismiss, who }) {
  if (!digest) return null;
  const gap = Math.max(1, Math.round((Date.now() - digest.since) / 3600000));
  const gapTxt = gap < 24 ? gap + " hour" + (gap === 1 ? "" : "s")
                          : Math.round(gap / 24) + " day" + (Math.round(gap / 24) === 1 ? "" : "s");
  const n = digest.items.length;

  return (
    <div style={{ marginBottom: 22, border: "1px solid " + C.brass + "55", borderRadius: 3,
      background: C.brass + "0a", overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "13px 16px",
        borderBottom: "1px solid " + C.brass + "33" }}>
        <Glyph name="key" size={14} color={C.brass} sw={1.5} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: body, fontSize: 13, fontWeight: 600, color: C.brass }}>
            {n} thing{n === 1 ? "" : "s"} moved while you were away
          </div>
          <div style={{ fontFamily: mono, fontSize: 9, color: C.bone3, marginTop: 2 }}>
            Last here {gapTxt} ago
          </div>
        </div>
        <button onClick={onDismiss} aria-label="Dismiss digest" style={{
          background: "transparent", border: "1px solid " + C.line, borderRadius: 2,
          color: C.bone3, fontFamily: mono, fontSize: 9, letterSpacing: ".08em",
          textTransform: "uppercase", padding: "5px 9px", cursor: "pointer" }}>Got it</button>
      </div>

      <div style={{ padding: "4px 16px 6px" }}>
        {digest.items.slice(0, 6).map((e, i) => (
          <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start",
            padding: "9px 0", borderTop: i ? "1px solid " + C.line : "none" }}>
            <span style={{ width: 5, height: 5, borderRadius: 3, marginTop: 6, flexShrink: 0,
              background: partyColour(e.who) }} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: body, fontSize: 12.5, color: C.bone2, lineHeight: 1.5,
                overflowWrap: "anywhere", wordBreak: "break-word" }}>
                <span style={{ color: partyColour(e.who), fontFamily: mono, fontSize: 10.5 }}>
                  {e.who}
                </span>
                {e.kind === "tick"
                  ? <span> confirmed <span style={{ color: C.bone }}>{e.t.t}</span></span>
                  : <span> wrote: <span style={{ color: C.bone }}>{e.text}</span></span>}
              </div>
            </div>
            <span style={{ fontFamily: mono, fontSize: 9, color: C.bone3, whiteSpace: "nowrap",
              marginTop: 2 }}>
              {new Date(e.at).toLocaleDateString("en-GB", { day: "numeric", month: "short" })}
            </span>
          </div>
        ))}
        {digest.items.length > 6 && (
          <div style={{ fontFamily: mono, fontSize: 9.5, color: C.bone3, padding: "8px 0 4px",
            borderTop: "1px solid " + C.line }}>
            + {digest.items.length - 6} more in the Log
          </div>
        )}
      </div>

      {digest.yours.length > 0 && (
        <div style={{ padding: "11px 16px", borderTop: "1px solid " + C.brass + "33",
          background: C.ink + "88" }}>
          <div style={{ fontFamily: body, fontSize: 11.5, color: C.bone2, lineHeight: 1.6 }}>
            <span style={{ color: C.bone, fontWeight: 600 }}>
              {digest.yours.length} still sit{digest.yours.length === 1 ? "s" : ""} with you:
            </span>{" "}
            {digest.yours.slice(0, 3).map(t => t.t).join("; ")}
            {digest.yours.length > 3 && "; and " + (digest.yours.length - 3) + " more"}.
          </div>
        </div>
      )}
    </div>
  );
}

              {(() => {

                if (gap < 0) return "Term starts before you land. The children would miss the opening of the year, so we are pushing for a late-August start date rather than a September one.";
                if (gap <= 7) return "You land " + gap + " day" + (gap === 1 ? "" : "s") + " before term starts. That is tight but workable. Uniforms and bus routes need to be settled before you arrive, not after.";
                return "You land " + gap + " days before term starts. Comfortable, provided the places are confirmed by then.";
              })()}
            </div>
          )}

          <div style={{ marginTop: 11 }}>
            <VerStamp ver={ADMISSIONS.verified} how={ADMISSIONS.src} />
          </div>
        </div>
      </div>
    </div>
  );
}

// THE LANDING BILL — priority two. The sales asset.
// Clause 2 says third-party costs are the Client's responsibility.
// This is that clause, shown rather than asserted.
// ============================================================
function Bill({ costs, fx, setCosts, setFx }) {
  const [openGroup, setOpenGroup] = useState("Schools");

  // clamp: no negatives, no junk, and a ceiling so a stray keypress can't
  // render a nine-figure landing bill and destroy the client's afternoon.
  const CEIL = 50000000;
  function set(id, v) {
    const str = String(v);
    // a leading minus means the client typed a negative, which is meaningless
    // for a cost. Zero it rather than silently flipping the sign to positive.
    const neg = /^\s*-/.test(str);
    const raw = Math.round(Number(str.replace(/[^0-9]/g, "")) || 0);
    setCosts({ ...costs, [id]: neg ? 0 : Math.min(CEIL, Math.max(0, raw)) });
  }

  // one-off = what you pay to land. recurring = what repeats monthly.
  // annual = school fees, which are neither and catch everyone out.
  let oneOff = 0, monthly = 0, annual = 0;
  COST_GROUPS.forEach(g => g.items.forEach(it => {
    const v = Number(costs[it.id]) || 0;
    if (it.recurring) monthly += v;
    else if (it.annual) annual += v;
    else oneOff += v;
  }));
  const landing = oneOff + annual;   // year one, out the door
  const refundable = (Number(costs["sch-lev-1"]) || 0) + (Number(costs["sch-lev-2"]) || 0) + (Number(costs["hm-dep"]) || 0);

  return (
    <div>
      <Eyebrow color={C.brass}>What it costs to land</Eyebrow>
      <div style={{ fontFamily: disp, fontSize: 17, color: C.bone2, lineHeight: 1.55,
        marginBottom: 20, maxWidth: 620 }}>
        Every number here is yours to change. They are starting points from real July 2026 figures,
        not a brochure. <span style={{ color: C.bone }}>The concierge fee is one line among many,
        and it is not the biggest one.</span>
      </div>

      <Panel raised style={{ padding: "20px 20px 22px", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline",
          marginBottom: 5, flexWrap: "wrap", gap: 8 }}>
          <span style={{ fontFamily: mono, fontSize: 9.5, letterSpacing: ".16em",
            textTransform: "uppercase", color: C.brass }}>Year one, out the door</span>
        </div>
        <div style={{ fontFamily: mono, fontSize: 33, color: C.bone, letterSpacing: "-.02em",
          lineHeight: 1.1 }}>{fmtDest(landing)}</div>
        <div style={{ fontFamily: mono, fontSize: 14, color: C.bone3, marginTop: 5 }}>
          {fmtOrigin(landing, fx)}
        </div>
        <div style={{ height: 1, background: C.line, margin: "17px 0" }} />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(120px,1fr))", gap: 16 }}>
          {[["One-off setup", oneOff], ["School fees, year 1", annual], ["Monthly, ongoing", monthly]].map(([lab, v]) => (
            <div key={lab}>
              <div style={{ fontFamily: mono, fontSize: 8.5, letterSpacing: ".12em",
                textTransform: "uppercase", color: C.bone3, marginBottom: 5 }}>{lab}</div>
              <div style={{ fontFamily: mono, fontSize: 15, color: C.bone2 }}>{fmtDest(v)}</div>
              <div style={{ fontFamily: mono, fontSize: 10, color: C.bone3, marginTop: 2 }}>
                {fmtOrigin(v, fx)}</div>
            </div>
          ))}
        </div>
        {refundable > 0 && (
          <div style={{ marginTop: 17, padding: "10px 12px", background: C.sage + "10",
            border: "1px solid " + C.sage + "33", borderRadius: 3,
            fontFamily: body, fontSize: 11.5, color: C.sage, lineHeight: 1.55 }}>
            <b>{fmtDest(refundable)} of that comes back.</b> Capital levies and the housing deposit are
            refundable. Not lost money, but it ties up capital for years, so plan the cashflow around it.
          </div>
        )}
      </Panel>

      <FxRow fx={fx} setFx={setFx} />

      {COST_GROUPS.map(g => {
        const sum = g.items.reduce((a, it) => a + (Number(costs[it.id]) || 0), 0);
        const open = openGroup === g.group;
        return (
          <Panel key={g.group} style={{ marginBottom: 10, overflow: "hidden" }} raised={open}>
            <button onClick={() => setOpenGroup(open ? null : g.group)} style={{
              width: "100%", background: "none", border: "none", cursor: "pointer",
              padding: "14px 16px", display: "flex", alignItems: "center", gap: 12, textAlign: "left",
            }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <h2 style={{ fontFamily: disp, fontSize: 15.5, fontWeight: 600, color: C.bone, margin: 0 }}>
                  {g.group}
                </h2>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 3,
                  flexWrap: "wrap" }}>
                  <span style={{ fontFamily: mono, fontSize: 8.5, letterSpacing: ".12em",
                    textTransform: "uppercase", color: C.bone3 }}>{g.weight}</span>
                  {(() => {
                    const st = g.items.map(i => i.ver && freshness(i.ver).state).filter(Boolean);
                    const worst = st.includes("stale") ? "stale" : st.includes("ageing") ? "ageing" : "fresh";
                    if (!st.length) return null;
                    return (
                      <span style={{ display: "inline-flex", alignItems: "center", gap: 4,
                        fontFamily: mono, fontSize: 8, letterSpacing: ".08em", textTransform: "uppercase",
                        color: FRESH_COLOUR[worst] }}>
                        <span style={{ width: 4, height: 4, borderRadius: 2,
                          background: FRESH_COLOUR[worst] }} />
                        {worst === "fresh" ? "all current" : worst === "ageing" ? "some ageing" : "recheck due"}
                      </span>
                    );
                  })()}
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontFamily: mono, fontSize: 13.5, color: C.brass }}>{fmtDest(sum)}</div>
                <div style={{ fontFamily: mono, fontSize: 9.5, color: C.bone3, marginTop: 2 }}>
                  {fmtOrigin(sum, fx)}</div>
              </div>
              <span style={{ fontFamily: mono, fontSize: 12, color: C.bone3,
                transform: open ? "rotate(90deg)" : "none", transition: "transform .2s" }}>›</span>
            </button>
            {open && (
              <div style={{ padding: "0 16px 14px" }}>
                <div style={{ fontFamily: body, fontSize: 12, color: C.bone2, lineHeight: 1.6,
                  padding: "13px 0", borderTop: "1px solid " + C.line }}>{g.lead}</div>
                {g.items.map(it => (
                  <CostRow key={it.id} it={it} val={costs[it.id]} fx={fx} onSet={v => set(it.id, v)} />
                ))}
              </div>
            )}
          </Panel>
        );
      })}

      <div style={{ marginTop: 18, padding: "13px 15px", border: "1px solid " + C.clay + "44",
        background: C.clay + "0c", borderRadius: 3, display: "flex", gap: 10, alignItems: "flex-start" }}>
        <div style={{ marginTop: 1 }}><Glyph name="warn" size={14} color={C.clay} /></div>
        <div style={{ fontFamily: body, fontSize: 11.5, color: C.bone2, lineHeight: 1.65 }}>
          <b style={{ color: C.clay }}>These are estimates, not quotes.</b> Every figure carries the day we
          checked it and where it came from. Tap any stamp to see. School fees change annually and are
          confirmed only by the school at offer; rents move with the season and the catchment. Anything
          past {CLIENT.staleAfterDays} days shows amber and we re-check it before you rely on it. Per clause 2,
          third-party costs are billed to you directly and are your responsibility. Nothing here is a
          commitment by anyone but you.
        </div>
      </div>
    </div>
  );
}

function Privacy({ state, onWipe }) {
  const [showRaw, setShowRaw] = useState(false);
  const raw = JSON.stringify(state, null, 2);
  const bytes = new Blob([raw]).size;
  const kidNames = CLIENT.children.map(c => c.name).join(" and ");

  return (
    <div>
      <Eyebrow color={C.brass}>What this board knows about you</Eyebrow>
      <div style={{ fontFamily: disp, fontSize: 17, color: C.bone2, lineHeight: 1.55,
        marginBottom: 22, maxWidth: 620 }}>

      </div>

      {/* ---- what is true today ---- */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 11 }}>
        <Glyph name="check" size={14} color={C.sage} sw={2} />
        <span style={{ fontFamily: mono, fontSize: 10, letterSpacing: ".16em",
          textTransform: "uppercase", color: C.sage }}>True of this board, today</span>
      </div>
      <Panel style={{ padding: "4px 0", marginBottom: 26 }}>
        {PRIVACY_TRUE.map((x, i) => (
          <div key={i} style={{ padding: "13px 16px", borderTop: i ? "1px solid " + C.line : "none",
            display: "flex", gap: 11, alignItems: "flex-start" }}>
            <div style={{ marginTop: 3 }}><Glyph name="check" size={13} color={C.sage} sw={2.2} /></div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: body, fontSize: 13.5, fontWeight: 600, color: C.bone,
                marginBottom: 4 }}>{x.t}</div>
              <div style={{ fontFamily: body, fontSize: 12, color: C.bone2, lineHeight: 1.65 }}>{x.d}</div>
            </div>
          </div>
        ))}
      </Panel>

      {/* ---- see it for yourself ---- */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 11 }}>
        <Glyph name="note" size={14} color={C.bone2} sw={1.6} />
        <span style={{ fontFamily: mono, fontSize: 10, letterSpacing: ".16em",
          textTransform: "uppercase", color: C.bone2 }}>Every byte we hold</span>
      </div>
      <Panel style={{ padding: "15px 16px", marginBottom: 26 }}>
        <div style={{ fontFamily: body, fontSize: 12, color: C.bone2, lineHeight: 1.65,
          marginBottom: 12 }}>
          Not a summary. The actual, complete contents. {bytes.toLocaleString()} bytes, all of it
          on your device. If something here surprises you, that is a fault worth telling us about.
        </div>
        <button onClick={() => setShowRaw(v => !v)} aria-expanded={showRaw} style={{
          fontFamily: mono, fontSize: 10, letterSpacing: ".1em", textTransform: "uppercase",
          padding: "7px 13px", borderRadius: 2, cursor: "pointer", background: "transparent",
          border: "1px solid " + C.line, color: C.bone2 }}>
          {showRaw ? "Hide" : "Show me everything"}
        </button>
        {showRaw && (
          <pre style={{ marginTop: 13, marginBottom: 0, padding: "13px 14px", background: C.ink,
            border: "1px solid " + C.line, borderRadius: 3, overflow: "auto", maxHeight: 260,
            fontFamily: mono, fontSize: 10.5, color: C.bone2, lineHeight: 1.6 }}>{raw}</pre>
        )}
      </Panel>

      {/* ---- the honest gaps ---- */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 11 }}>
        <Glyph name="warn" size={14} color={C.clay} sw={1.6} />
        <span style={{ fontFamily: mono, fontSize: 10, letterSpacing: ".16em",
          textTransform: "uppercase", color: C.clay }}>Not built yet · before any real family</span>
      </div>
      <div style={{ fontFamily: body, fontSize: 12, color: C.bone2, lineHeight: 1.65,
        marginBottom: 13, maxWidth: 620 }}>
        A concierge who only tells you the good half is not a concierge, he is a salesman.
        These are the real gaps in this board as it stands.
      </div>
      <Panel style={{ padding: "4px 0", marginBottom: 26, borderColor: C.clay + "44" }}>
        {PRIVACY_GAPS.map((x, i) => (
          <div key={i} style={{ padding: "13px 16px", borderTop: i ? "1px solid " + C.line : "none" }}>
            <div style={{ display: "flex", gap: 11, alignItems: "flex-start" }}>
              <div style={{ marginTop: 3 }}><Glyph name="warn" size={13} color={C.clay} sw={1.8} /></div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap",
                  marginBottom: 4 }}>
                  <span style={{ fontFamily: body, fontSize: 13.5, fontWeight: 600, color: C.bone }}>
                    {x.t}</span>
                  <Tag c={C.clay}>{x.fix}</Tag>
                </div>
                <div style={{ fontFamily: body, fontSize: 12, color: C.bone2, lineHeight: 1.65 }}>
                  {x.d}</div>
              </div>
            </div>
          </div>
        ))}
      </Panel>

      {/* ---- the client's own kill switch ---- */}
      <Panel raised style={{ padding: "18px 18px 20px", border: "1px solid " + C.brass + "55" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 9 }}>
          <Glyph name="key" size={15} color={C.brass} sw={1.4} />
          <span style={{ fontFamily: disp, fontSize: 16, fontWeight: 600, color: C.bone }}>
            Your key, not ours
          </span>
        </div>
        <div style={{ fontFamily: body, fontSize: 12.5, color: C.bone2, lineHeight: 1.7,
          marginBottom: 15 }}>
          Clause 7 says we keep your family's information confidential and use it only to deliver
          the Services, and that this survives the engagement ending. A promise you cannot enforce
          is just a sentence. So this button is yours: it erases everything this board holds about
          your family, permanently, without our involvement.
        </div>
        <button onClick={onWipe} style={{
          fontFamily: mono, fontSize: 10.5, letterSpacing: ".1em", textTransform: "uppercase",
          padding: "10px 16px", borderRadius: 2, cursor: "pointer", background: "transparent",
          border: "1px solid " + C.clay, color: C.clay }}>
          Erase everything about my family
        </button>
      </Panel>

      <div style={{ marginTop: 20, fontFamily: body, fontSize: 11, color: C.bone3,
        lineHeight: 1.7, fontStyle: "italic", maxWidth: 620 }}>
        Claims on this page were verified by audit against this running page in July 2026: no fetch
        calls carrying your data, no POST bodies, no cookies, no session storage, no third-party
        analytics. Re-audit before any change to the data layer. If a future version of this board
        syncs to a server, this page must change on the same day, not after.
      </div>
    </div>
  );
}

// ============================================================
// THE LOG — the retainer's best argument. Clause 9 says unused
// hours don't roll over, which is impossible to justify to a
// client who had a quiet month. A visible record is how you show
// the month wasn't quiet.
// ============================================================
function LogTab({ notes, by, at, who, onAdd, onReset }) {
  const [draft, setDraft] = useState("");

  // the board's own history, merged with written notes, newest first
  const events = SCOPED_TASKS
    .filter(t => at[t.id])
    .map(t => ({ kind: "tick", id: t.id, at: at[t.id], who: by[t.id], t }))
    .concat(notes.map(n => ({ kind: "note", id: n.id, at: n.at, who: n.who, text: n.text })))
    .sort((a, b) => b.at - a.at);

  return (
    <div>
      <Eyebrow color={C.brass}>The record</Eyebrow>
      <div style={{ fontFamily: disp, fontSize: 17, color: C.bone2, lineHeight: 1.55,
        marginBottom: 20, maxWidth: 620 }}>
        Everything either side has done, in order, with a name against it.
        Nobody has to ask how it's going.
      </div>

      <Panel style={{ padding: "13px 15px", marginBottom: 20 }}>
        <textarea value={draft} onChange={e => setDraft(e.target.value.slice(0, 2000))}
          maxLength={2000}
          aria-label={isConcierge(who) ? "Note for the family" : "Note for the concierge"}
          placeholder={isConcierge(who)
            ? "Note for the family. What happened, what's next."
            : "Question or note for the concierge."}
          rows={2}
          style={{ width: "100%", background: C.ink, border: "1px solid " + C.line, borderRadius: 2,
            color: C.bone, fontFamily: body, fontSize: 13, padding: "9px 11px", resize: "vertical",
            lineHeight: 1.55 }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
          marginTop: 9, gap: 10 }}>
          <span style={{ fontFamily: mono, fontSize: 9.5, color: partyColour(who) }}>
            posting as {who}
            {draft.length > 1600 && (
              <span style={{ color: draft.length >= 2000 ? C.clay : C.bone3 }}>
                {" · "}{2000 - draft.length} left
              </span>
            )}
          </span>
          <button onClick={() => { onAdd(draft); setDraft(""); }} disabled={!draft.trim()}
            style={{ fontFamily: mono, fontSize: 10, letterSpacing: ".1em", textTransform: "uppercase",
              padding: "7px 14px", borderRadius: 2, cursor: draft.trim() ? "pointer" : "default",
              background: draft.trim() ? C.brass : "transparent",
              border: "1px solid " + (draft.trim() ? C.brass : C.line),
              color: draft.trim() ? C.ink : C.bone3 }}>Post</button>
        </div>
      </Panel>

      {!events.length && (
        <Panel style={{ padding: "34px 20px", textAlign: "center", borderStyle: "dashed" }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
            <Glyph name="key" size={22} color={C.bone3} sw={1.3} />
          </div>
          <div style={{ fontFamily: body, fontSize: 12.5, color: C.bone3, lineHeight: 1.6 }}>
            Nothing logged yet. Tick something on the board, or post a note.
          </div>
        </Panel>
      )}

      {events.map(e => (
        <div key={e.kind + e.id} style={{ display: "flex", gap: 13, marginBottom: 2 }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
            <div style={{ width: 7, height: 7, borderRadius: 4, marginTop: 15,
              background: partyColour(e.who) }} />
            <div style={{ flex: 1, width: 1, background: C.line }} />
          </div>
          <div style={{ flex: 1, minWidth: 0, padding: "11px 0 15px" }}>
            <div style={{ display: "flex", gap: 8, alignItems: "baseline", flexWrap: "wrap",
              marginBottom: 4 }}>
              <span style={{ fontFamily: mono, fontSize: 10.5, color: partyColour(e.who) }}>{e.who}</span>
              <span style={{ fontFamily: mono, fontSize: 9.5, color: C.bone3 }}>
                {new Date(e.at).toLocaleDateString("en-GB", { day: "numeric", month: "short" })}
                {" · "}{new Date(e.at).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })}
              </span>
              {e.kind === "tick" && <OwnerChip owner={e.t.owner} small />}
            </div>
            <div style={{ fontFamily: body, fontSize: 13, color: C.bone2, lineHeight: 1.55,
              overflowWrap: "anywhere", wordBreak: "break-word", whiteSpace: "pre-wrap" }}>
              {e.kind === "tick"
                ? <span><span style={{ color: C.bone3 }}>confirmed </span>{e.t.t}</span>
                : e.text}
            </div>
          </div>
        </div>
      ))}

      <div style={{ marginTop: 26, paddingTop: 18, borderTop: "1px solid " + C.line,
        display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12,
        flexWrap: "wrap" }}>
        <span style={{ fontFamily: body, fontSize: 11, color: C.bone3, fontStyle: "italic",
          lineHeight: 1.6, flex: 1, minWidth: 200 }}>
          Demo board. State is local to this browser; a live engagement syncs both phones.
        </span>
        <button onClick={onReset} style={{ fontFamily: mono, fontSize: 9.5, letterSpacing: ".1em",
          textTransform: "uppercase", padding: "6px 12px", borderRadius: 2, cursor: "pointer",
          background: "transparent", border: "1px solid " + C.line, color: C.bone3 }}>Reset demo</button>
      </div>
    </div>
  );
}

// A board that accepts work it cannot keep is lying to the person using it.
// Private browsing, a full disk, or a locked-down browser all land here.
function SaveWarning() {
  return (
    <div role="alert" style={{ marginBottom: 18, padding: "13px 15px",
      border: "1px solid #e06c5a66", background: "#e06c5a10", borderRadius: 3,
      display: "flex", gap: 10, alignItems: "flex-start" }}>
      <div style={{ marginTop: 1 }}><Glyph name="warn" size={14} color="#e06c5a" sw={1.7} /></div>
      <div style={{ fontFamily: body, fontSize: 12, color: C.bone2, lineHeight: 1.65 }}>
        <b style={{ color: "#e06c5a" }}>This board is not saving.</b> Your browser is refusing to
        store anything, usually private browsing mode or a full disk. Everything on screen still
        works, but it will be gone when you close the tab. Tell us before you do anything you would
        hate to repeat.
      </div>
    </div>
  );
}

// ---------- toast ----------
function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div role="status" aria-live="polite" style={{ position: "fixed", left: "50%", bottom: 26, transform: "translateX(-50%)",
      background: C.panel2, border: "1px solid " + C.brass + "66", borderRadius: 3,
      padding: "10px 16px", zIndex: 50, maxWidth: "calc(100vw - 36px)",
      boxShadow: "0 10px 30px #0008", display: "flex", alignItems: "center", gap: 9 }}>
      <Glyph name="lock" size={13} color={C.brass} />
      <span style={{ fontFamily: body, fontSize: 12.5, color: C.bone, lineHeight: 1.4 }}>{msg}</span>
    </div>
  );
}

function Footer() {
  return (
    <footer style={{ marginTop: 44, paddingTop: 20, borderTop: "1px solid " + C.line }}>
      <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 9 }}>
        <Glyph name="key" size={13} color={C.brassDim} sw={1.3} />
        <span style={{ fontFamily: mono, fontSize: 9, letterSpacing: ".2em", textTransform: "uppercase",
          color: C.brassDim }}>The Keyholder · {CLIENT.engagement}</span>
      </div>
      <div style={{ fontFamily: body, fontSize: 10.5, color: C.bone3, lineHeight: 1.7, maxWidth: 560 }}>
        Proof of concept. The Tan family is fictional; the figures are real July 2026 starting points.
        Built on the Mission Phuket engine. Concierge desk {CLIENT.hours.open}:00–{CLIENT.hours.close}:00 {CLIENT.hours.tz}.
      </div>
    </footer>
  );
}
</script>

<script>
(function () {

      '\n\nIf you are viewing this inside an app preview, open the real link in your browser instead.</div>';
  }
  function loadScript(urls, done, fail) {
    var i = 0;
    function tryNext() {
      if (i >= urls.length) { fail(); return; }
      var s = document.createElement("script");
      s.src = urls[i++]; s.crossOrigin = "anonymous";
      s.onload = function () { done(); };
      s.onerror = function () { tryNext(); };
      document.head.appendChild(s);
    }
    tryNext();
  }
  var REACT = ["https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js","https://unpkg.com/react@18.3.1/umd/react.production.min.js","https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"];
  var REACTDOM = ["https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js","https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js","https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"];
  var BABEL = ["https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js","https://unpkg.com/@babel/standalone@7.25.6/babel.min.js","https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"];
  function boot() {
    try {
      if (!window.React || !window.ReactDOM) { showError("React did not load from any CDN."); return; }
      if (!window.Babel) { showError("Babel did not load."); return; }
      var hooks = "var useState=React.useState,useMemo=React.useMemo,useEffect=React.useEffect,useRef=React.useRef;\n";
      var mount = "\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));";
      var src = document.getElementById("appsrc").textContent;
      var compiled = Babel.transform(hooks + src + mount, { presets: ["react"] }).code;
      (0, eval)(compiled);
    } catch (err) { showError((err && err.stack) || err); }
  }
  loadScript(REACT, function () {
    loadScript(REACTDOM, function () {
      loadScript(BABEL, boot, function () { showError("Could not load Babel."); });

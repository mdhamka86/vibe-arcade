              {viewer.questId && QUEST_BY_ID[viewer.questId] && (
                <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 18, color: "#1f6f8b" }}>{QUEST_BY_ID[viewer.questId].title}</div>
              )}
              <div style={{ fontFamily: monoF, fontSize: 9.5, color: "#a0846a", marginTop: 2 }}>📷 {viewer.by}{viewer.failed ? ` · ${viewer.failMsg || "upload failed"}` : viewer.uploading ? " · saving…" : ""}</div>

              {/* existing grades */}
              {viewer.grades && Object.keys(viewer.grades).length > 0 && (
                <div style={{ marginTop: 10 }}>
                  {Object.values(viewer.grades).map((gr, i) => {
                    const opt = GRADE_BY[gr.g];
                    if (!opt) return null;
                    return (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                        <span style={{ fontFamily: cond, fontWeight: 800, fontSize: 16, color: "#fff", background: opt.color, borderRadius: 7, width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center" }}>{opt.g}</span>
                        <span style={{ fontSize: 12, color: "#6a5a48" }}>"{opt.quip}" <span style={{ color: "#a0846a" }}>— {gr.by}</span></span>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* grading panel: only the OTHER person grades, and only once */}
              {!viewer.uploading && !(viewer.grades && viewer.grades[who]) && (
                <div style={{ marginTop: 14, background: "#fffdf8", border: "1px dashed #e8d6b8", borderRadius: 12, padding: "11px 12px" }}>
                  <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 14, color: "#7a5a2a" }}>Grade this shot</div>
                  <div style={{ fontSize: 10, color: "#a0846a", marginTop: 4, lineHeight: 1.5 }}>
                    Judged on: {JUDGING_RUBRIC.map((r, i) => <span key={r.cat}>{i ? " · " : ""}<b style={{ color: "#8a6a3a" }}>{r.cat}</b></span>)}. (Vibes is the only one that counts.)
                  </div>
                  <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                    {GRADE_OPTIONS.map(opt => (
                      <button key={opt.g} onClick={() => grade(viewer.id, opt.g)} className="mp-btn" style={{
                        cursor: "pointer", fontFamily: cond, fontWeight: 800, fontSize: 16, color: "#fff", background: opt.color,
                        border: "none", borderRadius: 10, width: 42, height: 38,
                      }}>{opt.g}</button>
                    ))}
                  </div>
                </div>
              )}
              {viewer.grades && viewer.grades[who] && (
                <div style={{ fontSize: 10.5, color: "#a0846a", marginTop: 10, fontStyle: "italic" }}>You've graded this one. The verdict stands.</div>
              )}

              {/* Doctor Picme TM, the AI judge */}
              {!viewer.uploading && (
                <div style={{ marginTop: 14, background: "linear-gradient(135deg,#1a1430,#2a1f4a)", borderRadius: 14, padding: "13px 14px", color: "#f3ecff" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 18 }}>🎩</span>
                    <span style={{ fontFamily: cond, fontWeight: 800, fontSize: 17, letterSpacing: ".02em", color: "#e8b3ff" }}>Doctor Picme</span>
                    <span style={{ fontFamily: monoF, fontSize: 7.5, color: "#9a7fc4", letterSpacing: ".1em", border: "1px solid #5a4a82", borderRadius: 6, padding: "2px 5px" }}>AI JUDGE</span>
                  </div>

                  {viewer.picme ? (
                    <div style={{ marginTop: 10 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
                        {(() => { const o = GRADE_BY[viewer.picme.grade] || { color: "#8a6ad0", g: viewer.picme.grade }; return (
                          <span style={{ fontFamily: cond, fontWeight: 800, fontSize: 22, color: "#fff", background: o.color, borderRadius: 9, width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{o.g}</span>
                        ); })()}
                        <span style={{ fontSize: 12.5, color: "#f3ecff", lineHeight: 1.45, fontStyle: "italic" }}>"{viewer.picme.verdict}"</span>
                      </div>
                      {Array.isArray(viewer.picme.notes) && viewer.picme.notes.length > 0 && (
                        <div style={{ marginTop: 11, borderTop: "1px solid #ffffff18", paddingTop: 9 }}>
                          {viewer.picme.notes.map((n, i) => (
                            <div key={i} style={{ marginTop: i ? 7 : 0 }}>
                              <span style={{ fontFamily: monoF, fontSize: 8.5, color: "#c9a9ff", letterSpacing: ".05em" }}>{n.cat.toUpperCase()}</span>
                              <div style={{ fontSize: 11.5, color: "#e6dcff", lineHeight: 1.4, marginTop: 1 }}>{n.line}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  ) : picmeBusy ? (
                    <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 9 }}>
                      <span style={{ display: "inline-block", width: 14, height: 14, border: "2px solid #ffffff33", borderTopColor: "#e8b3ff", borderRadius: "50%", animation: "spin 0.7s linear infinite", flexShrink: 0 }} />
                      <span style={{ fontSize: 12, color: "#e8d6ff", fontStyle: "italic" }}>{picmeQuip || "Doctor Picme is judging…"}</span>
                    </div>
                  ) : (
                    <div style={{ marginTop: 10 }}>
                      <div style={{ fontSize: 11.5, color: "#d8c9f5", lineHeight: 1.5 }}>
                        Summon the good Doctor for a brutally observant, professionally dramatic verdict on this shot.
                      </div>
                      <button onClick={() => summonPicme(viewer)} className="mp-btn" style={{
                        marginTop: 10, width: "100%", cursor: "pointer", fontFamily: cond, fontWeight: 800, fontSize: 15, color: "#1a1430",
                        background: "linear-gradient(135deg,#e8b3ff,#c98aff)", border: "none", borderRadius: 11, padding: "10px 0",
                      }}>🎩 Summon Doctor Picme</button>
                      <div style={{ fontSize: 9.5, color: "#a98fd6", marginTop: 8, lineHeight: 1.5, textAlign: "center" }}>
                        He works for real money (about half a cent a verdict). Summon freely, but maybe don't let him judge all 200 cat photos at 3am. He'll do it. He'll just bill you.
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* opt-in Bluesky share for your own uploaded photos */}
              {viewer.by === who && viewer.url && !viewer.uploading && (
                viewer.bsky && viewer.bsky.url ? (
                  <a href={viewer.bsky.url} target="_blank" rel="noopener noreferrer" style={{ display: "block", marginTop: 12, textAlign: "center", fontFamily: cond, fontWeight: 700, fontSize: 13, color: "#1185fe", textDecoration: "none", background: "#eaf3ff", border: "1px solid #bcdcff", borderRadius: 10, padding: "9px 0" }}>
                    ✈ Filed to Bluesky as log #{String(viewer.bsky.logNo || 1).padStart(3, "0")} · view
                  </a>
                ) : (
                  <div style={{ marginTop: 12 }}>
                    <button onClick={() => shareMemoryToBluesky(viewer)} disabled={bskyBusy} className="mp-btn" style={{
                      width: "100%", cursor: bskyBusy ? "default" : "pointer", opacity: bskyBusy ? 0.6 : 1,
                      fontFamily: cond, fontWeight: 800, fontSize: 14, color: "#fff",
                      background: "linear-gradient(135deg,#1185fe,#0a6ad4)", border: "none", borderRadius: 10, padding: "10px 0",
                    }}>{bskyBusy ? "Transmitting…" : "✈ File this to Bluesky"}</button>
                    <div style={{ fontSize: 9.5, color: "#9aa8bd", marginTop: 6, textAlign: "center", lineHeight: 1.4 }}>
                      Posts to your Bluesky, filed under this quest. Public, so pick your evidence wisely.
                    </div>
                  </div>
                )
              )}

              <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                <button onClick={() => setViewer(null)} className="mp-btn" style={{ flex: 1, cursor: "pointer", fontFamily: cond, fontWeight: 700, fontSize: 13, color: "#1f6f8b", background: "#eaf4f7", border: "1px solid #bcdde6", borderRadius: 10, padding: "9px 0" }}>Close</button>
                {viewer.by === who && (
                  <button onClick={() => removeMem(viewer.id)} className="mp-btn" style={{ cursor: "pointer", fontFamily: cond, fontWeight: 700, fontSize: 13, color: "#c0563d", background: "#fdeee9", border: "1px solid #f0c4b6", borderRadius: 10, padding: "9px 14px" }}>Delete</button>
                )}
              </div>
            </div>
          </div>
        </div>
      )}

      {bskyLoginFor && (
        <BskyLogin who={bskyLoginFor.by} onClose={() => setBskyLoginFor(null)}
          onSaved={(ok, handle, apppw) => {
            const mem = bskyLoginFor; setBskyLoginFor(null);
            if (ok && mem) doShareMem(mem, { handle, apppw });
            else if (!ok && flashToast) flashToast("Couldn't save login on this device", "warn");
          }} />
      )}
    </div>
  );
}

// ---------- Bluesky login popup (device-only credentials) ----------
function BskyLogin({ who, onClose, onSaved }) {
  const [handle, setHandle] = useState("");
  const [apppw, setApppw] = useState("");
  const rank = RANKS[who] || "crew";
  const canSave = handle.trim().length > 2 && apppw.trim().length > 4;
  function save() {
    if (!canSave) return;
    const ok = saveBskyCreds(who, handle.trim().replace(/^@/, ""), apppw.trim());
    onSaved(ok, handle.trim().replace(/^@/, ""), apppw.trim());
  }
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "#0009", zIndex: 60, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 18, maxWidth: 360, width: "100%", boxShadow: "0 18px 50px #0006", overflow: "hidden" }}>
        <div style={{ background: "linear-gradient(135deg,#1185fe,#0a6ad4)", padding: "16px 18px" }}>
          <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 20, color: "#fff" }}>✈ Connect Bluesky</div>
          <div style={{ fontSize: 11, color: "#dCEcff", marginTop: 3, lineHeight: 1.45 }}>{rank} {who}, log in once. This stays on YOUR phone only, never shared, never on the other device.</div>
        </div>
        <div style={{ padding: "16px 18px" }}>
          <label style={{ fontFamily: monoF, fontSize: 9, color: "#8a98ac", letterSpacing: ".06em" }}>BLUESKY HANDLE</label>
          <input value={handle} onChange={e => setHandle(e.target.value)} placeholder="you.bsky.social" autoCapitalize="none" autoCorrect="off" spellCheck={false}
            style={{ width: "100%", boxSizing: "border-box", marginTop: 4, marginBottom: 12, fontSize: 14, padding: "10px 11px", border: "1px solid #d6dde6", borderRadius: 10, fontFamily: "inherit" }} />
          <label style={{ fontFamily: monoF, fontSize: 9, color: "#8a98ac", letterSpacing: ".06em" }}>APP PASSWORD</label>
          <input value={apppw} onChange={e => setApppw(e.target.value)} placeholder="xxxx-xxxx-xxxx-xxxx" type="password" autoCapitalize="none" autoCorrect="off" spellCheck={false}
            style={{ width: "100%", boxSizing: "border-box", marginTop: 4, fontSize: 14, padding: "10px 11px", border: "1px solid #d6dde6", borderRadius: 10, fontFamily: "inherit" }} />
          <div style={{ fontSize: 10, color: "#9aa8bd", marginTop: 8, lineHeight: 1.5 }}>
            Use an <b>app password</b>, not your real one. Make one at bsky.app → Settings → App Passwords. It's revocable any time.
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button onClick={onClose} className="mp-btn" style={{ flex: 1, cursor: "pointer", fontFamily: cond, fontWeight: 700, fontSize: 13, color: "#5a6a7a", background: "#eef1f5", border: "1px solid #d6dde6", borderRadius: 10, padding: "10px 0" }}>Cancel</button>
            <button onClick={save} disabled={!canSave} className="mp-btn" style={{ flex: 1.4, cursor: canSave ? "pointer" : "default", opacity: canSave ? 1 : 0.5, fontFamily: cond, fontWeight: 800, fontSize: 13, color: "#fff", background: "linear-gradient(135deg,#1185fe,#0a6ad4)", border: "none", borderRadius: 10, padding: "10px 0" }}>Log in & post</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- The Wall of Words: a shared in-the-moment diary ----------
function WallOfWords({ diary, commit, who, flashToast, sharedCount }) {
  const entries = Array.isArray(diary) ? diary : [];
  const [draft, setDraft] = useState("");
  const [prompt] = useState(() => DIARY_PROMPTS[Math.floor(Math.random() * DIARY_PROMPTS.length)]);
  const [sharing, setSharing] = useState(null); // id currently being shared
  const [loginFor, setLoginFor] = useState(null); // entry awaiting login before share
  const taRef = useRef(null);

  const sorted = React.useMemo(
    () => entries.slice().sort((a, b) => (b.at || 0) - (a.at || 0)),
    [entries]
  );

  function post() {
    const text = draft.trim();
    if (!text) return;
    const entry = { id: `wow_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`, by: who, text: text.slice(0, 1000), at: Date.now(), reactions: {} };
    commit(s => ({ ...s, diary: [entry, ...(Array.isArray(s.diary) ? s.diary : [])] }));
    setDraft("");
    if (taRef.current) taRef.current.style.height = "auto";
    if (flashToast) flashToast("Written in ink. No take-backs.", "earn");
  }

  // tap a reaction: toggles your reaction on an entry (one per person)
  function react(entryId, emoji) {
    commit(s => ({ ...s, diary: (Array.isArray(s.diary) ? s.diary : []).map(en => {
      if (en.id !== entryId) return en;
      const r = { ...(en.reactions || {}) };
      if (r[who] === emoji) delete r[who]; else r[who] = emoji;
      return { ...en, reactions: r };
    }) }));
  }

  // opt-in: push THIS entry to the author's own Bluesky, with a flight-board
  // flourish and a running log number. Private by default; only shared on tap.
  // Uses credentials stored on THIS device; prompts login first if absent.
  function shareToBluesky(en) {
    if (!en || sharing || en.bsky) return;
    const creds = loadBskyCreds(en.by);
    if (!creds) { setLoginFor(en); return; } // pop the login, share after
    doShare(en, creds);
  }

  function doShare(en, creds) {
    const logNo = (Number(sharedCount) || 0) + 1;
    setSharing(en.id);
    if (flashToast) flashToast("Transmitting to Bluesky…", "info");
    fetch("/api/bluesky", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ who: en.by, text: en.text, logNo, handle: creds.handle, apppw: creds.apppw }),
    })
      .then(async (res) => {
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) { clearBskyCreds(en.by); throw new Error("Login expired, tap share again"); }
        if (!res.ok) throw new Error(data.detail || data.error || `Share failed ${res.status}`);
        return data;
      })
      .then((data) => {
        commit(s => ({ ...s, diary: (Array.isArray(s.diary) ? s.diary : []).map(e =>
          e.id === en.id ? { ...e, bsky: { url: data.url || "", logNo, at: Date.now() } } : e) }));
        if (flashToast) flashToast(`Posted to Bluesky as log #${String(logNo).padStart(3, "0")}`, "earn");
      })
      .catch((err) => {
        if (flashToast) flashToast(String(err.message || err).slice(0, 120), "warn");
      })
      .finally(() => setSharing(null));
  }

  function fmt(ts) {
    try {
      const d = new Date(ts);
      return d.toLocaleString([], { weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
    } catch (e) { return ""; }
  }

  const colourFor = (name) => (name === "Naddy" ? "#e0577a" : "#ff7a3d");

  return (
    <div>
      <div className="mp-card" style={{ marginBottom: 14 }}>
        <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 26, color: "#7a5cc4", lineHeight: 1 }}>The Wall of Words</div>
        <div style={{ fontSize: 12, color: "#7a6a55", lineHeight: 1.5, marginTop: 6 }}>
          Quick thoughts, in the moment, just you two. Type it, send it, it's stamped forever. The pictures live next door; this is for what they can't show.
        </div>

        {/* the box */}
        <textarea
          ref={taRef}
          value={draft}
          onChange={(e) => { setDraft(e.target.value); const t = e.target; t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 160) + "px"; }}
          placeholder={prompt}
          maxLength={1000}
          style={{
            width: "100%", marginTop: 12, boxSizing: "border-box", resize: "none", minHeight: 46,
            fontFamily: "inherit", fontSize: 14, lineHeight: 1.45, color: "#3a2e2a",
            background: "#fffdf8", border: "1px solid #e6d8c2", borderRadius: 12, padding: "11px 12px",
          }}
        />
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 8, gap: 10 }}>
          <span style={{ fontFamily: monoF, fontSize: 9, color: "#b09878" }}>posting as <b style={{ color: colourFor(who) }}>{RANKS[who] || ""} {who}</b></span>
          <button onClick={post} disabled={!draft.trim()} className="mp-btn" style={{
            cursor: draft.trim() ? "pointer" : "default", opacity: draft.trim() ? 1 : 0.45,
            fontFamily: cond, fontWeight: 800, fontSize: 14, color: "#fff",
            background: "linear-gradient(135deg,#9a7fd0,#7a5cc4)", border: "none", borderRadius: 10, padding: "9px 22px",
          }}>Send</button>
        </div>

        {/* the funny permanence disclaimer */}
        <div style={{ marginTop: 10, background: "#fef6f0", border: "1px dashed #f0cdb8", borderRadius: 10, padding: "8px 11px" }}>
          <div style={{ fontSize: 10.5, color: "#bd6a47", lineHeight: 1.5 }}>
            ⚠️ No edits, no deletes, no escape. Whatever you write is etched into the wall forever, lovingly used against you in future arguments. Choose your words like Naddy chooses a side-eye: with precision.
          </div>
        </div>
      </div>

      {/* entries */}
      {sorted.length === 0 ? (
        <div className="mp-card" style={{ textAlign: "center", padding: "26px 16px" }}>
          <div style={{ fontSize: 30 }}>✍️</div>
          <div style={{ fontSize: 12.5, color: "#a0846a", marginTop: 8, lineHeight: 1.5 }}>The wall is blank. Be the first to say something you can never take back.</div>
        </div>
      ) : (
        sorted.map(en => {
          const mine = en.by === who;
          const reacts = en.reactions || {};
          const reactList = Object.entries(reacts); // [who, emoji]
          return (
            <div key={en.id} className="mp-card" style={{ marginBottom: 10, padding: "13px 14px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontFamily: cond, fontWeight: 800, fontSize: 15, color: colourFor(en.by) }}>{en.by}</span>
                <span style={{ fontFamily: monoF, fontSize: 8, color: "#b8a589", border: "1px solid #e8dcc8", borderRadius: 5, padding: "1px 5px" }}>{RANKS[en.by] || "crew"}</span>
                <span style={{ fontFamily: monoF, fontSize: 9, color: "#b09878" }}>{fmt(en.at)}</span>
              </div>
              <div style={{ fontSize: 14, color: "#3a2e2a", lineHeight: 1.5, marginTop: 6, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{en.text}</div>

              {/* existing reactions */}
              {reactList.length > 0 && (
                <div style={{ display: "flex", gap: 6, marginTop: 9, flexWrap: "wrap" }}>
                  {reactList.map(([rwho, em]) => (
                    <span key={rwho} style={{ fontSize: 12, background: "#f4eefb", border: "1px solid #e3d5f5", borderRadius: 20, padding: "2px 9px", display: "inline-flex", alignItems: "center", gap: 4 }}>
                      <span style={{ fontSize: 13 }}>{em}</span>
                      <span style={{ fontFamily: monoF, fontSize: 8, color: "#9a86b8" }}>{rwho}</span>
                    </span>
                  ))}
                </div>
              )}

              {/* react bar: react to the OTHER person's entries */}
              {!mine && (
                <div style={{ display: "flex", gap: 4, marginTop: 10, flexWrap: "wrap", borderTop: "1px solid #f0e6d4", paddingTop: 9 }}>
                  {DIARY_REACTIONS.map(r => {
                    const active = reacts[who] === r.e;
                    return (
                      <button key={r.e} onClick={() => react(en.id, r.e)} className="mp-btn" title={r.label} style={{
                        cursor: "pointer", fontSize: 16, lineHeight: 1, padding: "5px 7px", borderRadius: 9,
                        background: active ? "#ece2fb" : "transparent",
                        border: active ? "1px solid #c9b3ef" : "1px solid transparent",
                      }}>{r.e}</button>
                    );
                  })}
                </div>
              )}

              {/* opt-in Bluesky share, only on your own entries */}
              {mine && (
                <div style={{ marginTop: 10, borderTop: "1px solid #f0e6d4", paddingTop: 9 }}>
                  {en.bsky && en.bsky.url ? (
                    <a href={en.bsky.url} target="_blank" rel="noopener noreferrer" style={{ fontFamily: monoF, fontSize: 10, color: "#1185fe", textDecoration: "none" }}>
                      ✈ shared as log #{String(en.bsky.logNo || 1).padStart(3, "0")} · view on Bluesky
                    </a>
                  ) : (
                    <button onClick={() => shareToBluesky(en)} disabled={sharing === en.id} className="mp-btn" style={{
                      cursor: sharing === en.id ? "default" : "pointer", opacity: sharing === en.id ? 0.6 : 1,
                      fontFamily: cond, fontWeight: 700, fontSize: 12, color: "#1185fe",
                      background: "#eaf3ff", border: "1px solid #bcdcff", borderRadius: 9, padding: "6px 12px",
                    }}>{sharing === en.id ? "Transmitting…" : "✈ Share to Bluesky"}</button>
                  )}
                </div>
              )}
            </div>
          );
        })
      )}

      {loginFor && (
        <BskyLogin who={loginFor.by} onClose={() => setLoginFor(null)}
          onSaved={(ok, handle, apppw) => {
            const en = loginFor; setLoginFor(null);
            if (ok && en) doShare(en, { handle, apppw });
            else if (!ok && flashToast) flashToast("Couldn't save login on this device", "warn");
          }} />
      )}
    </div>
  );
}

// ---------- Progress bar: a gate / runway meter ----------
function ProgressBar({ doneCount, earned, balance }) {
  const p = pct(doneCount, TOTAL_TASKS);
  return (
    <div className="mp-card" style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 14, padding: "13px 15px", marginBottom: 12, boxShadow: "0 6px 18px #ff9b5418" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
        <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: "#3a2e2a" }}>{doneCount} <span style={{ color: "#a0846a", fontSize: 13 }}>/ {TOTAL_TASKS} done</span></span>
        <span style={{ fontFamily: monoF, fontSize: 12, color: "#ff7a3d" }}>{p}%</span>
      </div>
      <div style={{ height: 10, background: "#fff0d6", borderRadius: 6, overflow: "hidden", border: "1px solid #ffe1b0", position: "relative" }}>
        <div style={{
          width: `${p}%`, height: "100%", borderRadius: 6,
          background: "linear-gradient(90deg,#ff7a3d,#ffb347,#ffd76a)",
          transition: "width .5s cubic-bezier(.2,.7,.2,1)",
          boxShadow: p > 0 ? "0 0 12px #ff9b5488" : "none",
        }} />
        {/* dashed runway centreline */}
        <div style={{ position: "absolute", top: "50%", left: 0, right: 0, height: 1, transform: "translateY(-.5px)",
          backgroundImage: "repeating-linear-gradient(90deg,#ffffff88 0 6px,transparent 6px 12px)", opacity: p > 4 ? .7 : 0 }} />
      </div>
      <div style={{ fontFamily: monoF, fontSize: 10.5, color: "#7a6a55", marginTop: 8, letterSpacing: ".02em" }}>
        {statusLine(doneCount, TOTAL_TASKS)}
      </div>
    </div>
  );
}

// ---------- Tabs ----------
function Tabs({ tab, setTab, ownedCount }) {
  const items = [["checklist", "Checklist"], ["store", `Rewards${ownedCount ? ` · ${ownedCount}` : ""}`], ["progress", "Progress"]];
  return (
    <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
      {items.map(([k, lab]) => (
        <button key={k} onClick={() => setTab(k)} className="mp-btn" style={{
          flex: 1, padding: "10px", borderRadius: 10, cursor: "pointer", fontFamily: cond, fontWeight: 700, fontSize: 14, letterSpacing: ".03em",
          background: tab === k ? "#ff7a3d" : "#ffffffcc",
          color: tab === k ? "#fff" : "#9a8a72",
          border: tab === k ? "none" : "1px solid #ecd9bf",
          boxShadow: tab === k ? "0 4px 12px #ff7a3d44" : "none",
        }}>{lab}</button>
      ))}
    </div>
  );
}

// ---------- Checklist ----------
function Checklist({ openSection, setOpenSection, checkedIds, lastBy, onToggle, justChecked, who }) {
  return (
    <div>
      {SECTIONS.map(sec => {
        const done = sec.tasks.filter(t => checkedIds[t.id]).length;
        const all = sec.tasks.length;
        const complete = done === all;
        const open = openSection === sec.id;
        return (
          <div key={sec.id} className="mp-card" style={{ marginBottom: 10 }}>
            <button onClick={() => setOpenSection(open ? null : sec.id)} className="mp-btn" style={{
              width: "100%", textAlign: "left", cursor: "pointer", border: "1px solid #ffe1b0",
              background: complete ? "linear-gradient(100deg,#d6f5e3,#ffffff)" : "#ffffffdd",
              borderRadius: open ? "12px 12px 0 0" : 12, padding: "13px 15px",
              borderColor: complete ? "#8fd9b0" : "#ffe1b0",
              boxShadow: "0 4px 14px #ff9b5414",
              display: "flex", alignItems: "center", gap: 12,
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 11, flex: 1, minWidth: 0 }}>
                <Glyph name={sec.icon} color={complete ? "#1f9d6b" : "#ff7a3d"} />
                <div style={{ minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontFamily: monoF, fontSize: 10, color: "#bca889" }}>{sec.no}</span>
                    <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 18, color: "#3a2e2a", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{sec.title}</span>
                  </div>
                  <div style={{ fontSize: 11, color: "#9a8a72", marginTop: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{sec.sub}</div>
                </div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 15, color: complete ? "#1f9d6b" : "#bca889" }}>{done}/{all}</div>
                <div style={{ fontSize: 14, color: "#c9b495", transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }}>▾</div>
              </div>
            </button>

            {open && (
              <div style={{ border: "1px solid #ffe1b0", borderTop: "none", borderRadius: "0 0 12px 12px", background: "#fffaf0", overflow: "hidden" }}>
                {sec.tasks.map(task => {
                  const on = !!checkedIds[task.id];
                  const flash = justChecked === task.id;
                  const by = lastBy[task.id];
                  return (
                    <div
                      key={task.id}
                      role="button"
                      tabIndex={0}
                      className="mp-tick"
                      onClick={() => onToggle(task)}
                      onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onToggle(task); } }}
                      style={{
                        display: "flex", alignItems: "flex-start", gap: 11, padding: "11px 15px",
                        borderBottom: "1px solid #f4e6cf", cursor: "pointer",
                        background: on ? "#eafaf0" : "transparent",
                        transition: "background .2s",
                      }}
                    >
                      <div style={{
                        flexShrink: 0, width: 22, height: 22, borderRadius: 6, marginTop: 1,
                        border: on ? "none" : "2px solid #e0b97f",
                        background: on ? "linear-gradient(135deg,#39b87a,#2c9e64)" : "#fff",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        animation: flash ? "pop .4s ease" : "none",
                        boxShadow: on ? "0 0 10px #39b87a55" : "none",
                      }}>
                        {on && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 6"/></svg>}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "baseline", gap: 7, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 14, color: on ? "#a89a82" : "#3a2e2a", textDecoration: on ? "line-through" : "none", lineHeight: 1.35, fontWeight: 500 }}>{task.t}</span>
                          {task.new && <span style={{ fontFamily: monoF, fontSize: 8, color: "#e6892b", background: "#fff2d6", border: "1px solid #ffd591", borderRadius: 3, padding: "1px 4px", letterSpacing: ".06em" }}>NEW</span>}
                        </div>
                        {task.note && <div style={{ fontSize: 11.5, color: "#a0846a", marginTop: 2, fontStyle: "italic" }}>{task.note}</div>}
                        {on && by && <div style={{ fontFamily: monoF, fontSize: 9.5, color: by === "Naddy" ? "#e85a9b" : "#e6892b", marginTop: 3, letterSpacing: ".04em" }}>ticked by {by}</div>}
                      </div>
                      <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 14, color: on ? "#39b87a" : "#c98a3d", flexShrink: 0, marginTop: 1 }}>+{task.p}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ---------- Store ----------
function Store({ owned, balance, onBuy, earned }) {
  const baseSets = ["Safe Travels", "Phuket", "The Squad", "House Rivalry"];
  const secretsFound = STICKERS.some(s => s.set === "Secret" && owned.includes(s.id));
  const sets = secretsFound ? [...baseSets, "Secret"] : baseSets;
  const setColor = { "Safe Travels": "#1f9fb8", "Phuket": "#1f9d6b", "The Squad": "#e0577a", "House Rivalry": "#c98a3d", "Secret": "#9a6cc4" };
  const ownedCount = owned.length;
  return (
    <div className="mp-card">
      <div style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 12, padding: "12px 15px", marginBottom: 14, boxShadow: "0 4px 14px #ff9b5414" }}>
        <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 17, color: "#3a2e2a" }}>Rewards Store</div>
        <div style={{ fontSize: 12, color: "#9a8a72", marginTop: 3, lineHeight: 1.5 }}>
          Spend banked points on stickers. {ownedCount} of {STICKERS.length} unlocked. Squad and House Rivalry are the personal ones, well worth saving for.
        </div>
      </div>

      {sets.map(setName => (
        <div key={setName} style={{ marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <span style={{ fontFamily: monoF, fontSize: 10, letterSpacing: ".18em", color: setColor[setName] || "#1f9fb8", textTransform: "uppercase" }}>{setName}</span>
            <div style={{ flex: 1, height: 1, background: "#ffe1b0" }} /></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {STICKERS.filter(s => s.set === setName).map(st => {
              const have = owned.includes(st.id);
              const afford = balance >= st.cost;
              const lockedSecret = st.secret && !have;
              if (lockedSecret) {
                return (
                  <div key={st.id} style={{
                    background: "#f4eefb", border: "1px dashed #d2bce8",
                    borderRadius: 14, padding: "14px 12px 12px", textAlign: "center", position: "relative", overflow: "hidden",
                  }}>
                    <div style={{ display: "flex", justifyContent: "center", marginBottom: 8, opacity: .5 }}>
                      <div style={{ width: 74, height: 74, borderRadius: "50%", background: "#e7daf5", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 34 }}>?</div>
                    </div>
                    <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 15, color: "#9a6cc4", lineHeight: 1.1 }}>Secret sticker</div>
                    <div style={{ fontSize: 10.5, color: "#a08ac0", marginTop: 5, lineHeight: 1.4, minHeight: 42, fontStyle: "italic" }}>Hidden somewhere in the app. Go poke around to find it.</div>
                  </div>
                );
              }
              return (
                <div key={st.id} style={{
                  background: have ? "linear-gradient(160deg,#e3faec,#ffffff)" : "#ffffffdd",
                  border: `1px solid ${have ? "#8fd9b0" : "#ffe1b0"}`,
                  borderRadius: 14, padding: "14px 12px 12px", textAlign: "center", position: "relative", overflow: "hidden",
                  boxShadow: "0 4px 14px #ff9b5414",
                }}>
                  {have && <div style={{ position: "absolute", top: 8, right: 8, fontFamily: monoF, fontSize: 8, color: "#1f9d6b", background: "#d6f5e3", border: "1px solid #8fd9b0", borderRadius: 4, padding: "2px 5px", letterSpacing: ".08em" }}>OWNED</div>}
                  <div style={{ display: "flex", justifyContent: "center", marginBottom: 8, filter: have ? "none" : "grayscale(.85) brightness(.97)", opacity: have ? 1 : .55, transition: "all .3s" }}>
                    <div style={{ animation: have ? "pop .5s ease" : "none" }}>
                      <StickerArt art={st.art} size={74} />
                    </div>
                  </div>
                  <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 15, color: "#3a2e2a", lineHeight: 1.1 }}>{st.name}</div>
                  {have ? (
                    <div style={{ fontSize: 10.5, color: "#7a9a6f", marginTop: 5, lineHeight: 1.4, fontStyle: "italic", minHeight: 42 }}>{st.blurb}</div>
                  ) : (
                    <>
                      <div style={{ fontSize: 10.5, color: "#a0846a", marginTop: 5, lineHeight: 1.4, minHeight: 42 }}>{st.blurb}</div>
                      <button onClick={() => onBuy(st)} disabled={!afford} className="mp-btn" style={{
                        width: "100%", marginTop: 8, padding: "8px", borderRadius: 8, cursor: afford ? "pointer" : "default",
                        fontFamily: cond, fontWeight: 700, fontSize: 14, letterSpacing: ".03em",
                        background: afford ? "#ff7a3d" : "#f4e6cf", color: afford ? "#fff" : "#bca889",
                        border: "none", boxShadow: afford ? "0 3px 10px #ff7a3d44" : "none",
                      }}>{afford ? `Unlock · ${st.cost}` : `${st.cost} pts`}</button>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ---------- Progress tab ----------
function ProgressTab({ save, doneCount, earned, balance, rank, onReset }) {
  const spent = save.spent || 0;
  const owned = save.owned || [];
  // per-person tick tally from lastBy
  const byTally = { Hammy: 0, Naddy: 0 };
  Object.values(save.lastBy || {}).forEach(name => { if (byTally[name] != null) byTally[name]++; });

  const stats = [
    ["Tasks done", `${doneCount} / ${TOTAL_TASKS}`, "#ff7a3d"],
    ["Points earned", `${earned}`, "#e6892b"],
    ["Points spent", `${spent}`, "#e85a9b"],
    ["Balance", `${balance}`, "#1f9d6b"],
    ["Stickers", `${owned.length} / ${STICKERS.length}`, "#1f9fb8"],
    ["Rank", rank.name, rank.color],
  ];

  return (
    <div className="mp-card">
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
        {stats.map(([l, v, c], i) => (
          <div key={i} style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 12, padding: "12px 14px", boxShadow: "0 4px 14px #ff9b5414" }}>
            <div style={{ fontFamily: monoF, fontSize: 9, color: "#a0846a", letterSpacing: ".1em", textTransform: "uppercase" }}>{l}</div>
            <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 22, color: c, marginTop: 3, lineHeight: 1 }}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 12, padding: "14px 15px", marginBottom: 14, boxShadow: "0 4px 14px #ff9b5414" }}>
        <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: "#3a2e2a", marginBottom: 10 }}>Who's pulling their weight</div>
        {["Hammy", "Naddy"].map(name => {
          const v = byTally[name];
          const total = byTally.Hammy + byTally.Naddy;
          const w = total === 0 ? 0 : Math.round((v / total) * 100);
          const col = name === "Naddy" ? "#e85a9b" : "#ff9b54";
          return (
            <div key={name} style={{ marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                <span style={{ color: col, fontWeight: 600 }}>{name}</span>
                <span style={{ color: "#9a8a72", fontFamily: monoF, fontSize: 11 }}>{v} ticks</span>
              </div>
              <div style={{ height: 7, background: "#fff0d6", borderRadius: 4, overflow: "hidden", border: "1px solid #ffe1b0" }}>
                <div style={{ width: `${w}%`, height: "100%", background: col, transition: "width .4s" }} />
              </div>
            </div>
          );
        })}
        <div style={{ fontSize: 10.5, color: "#a0846a", marginTop: 8, fontStyle: "italic", lineHeight: 1.4 }}>
          This splits live between the two of you. Tick on one phone and it shows up on the other within a few seconds.
        </div>
      </div>

      {/* milestone badges */}
      {(() => {
        const p = pct(doneCount, TOTAL_TASKS);
        const badges = [
          { id: "first", label: "First Steps", sub: "First task ticked", got: doneCount >= 1, icon: "check", col: "#ff7a3d" },
          { id: "q", label: "Wheels Turning", sub: "25% done", got: p >= 25, icon: "box", col: "#e6892b" },
          { id: "half", label: "Halfway There", sub: "50% done", got: p >= 50, icon: "bolt", col: "#1f9fb8" },
          { id: "three", label: "Final Approach", sub: "75% done", got: p >= 75, icon: "plane", col: "#1f9d6b" },
          { id: "done", label: "Touchdown", sub: "Every task done", got: p >= 100, icon: "palm", col: "#e0577a" },
          { id: "collector", label: "Sticker Hoarder", sub: "All stickers unlocked", got: owned.length >= STICKERS.length, icon: "star", col: "#c98a3d" },
        ];
        const gotCount = badges.filter(b => b.got).length;
        return (
          <div style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 12, padding: "14px 15px", marginBottom: 14, boxShadow: "0 4px 14px #ff9b5414" }}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 11 }}>
              <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: "#3a2e2a" }}>Milestone badges</span>
              <span style={{ fontFamily: monoF, fontSize: 10, color: "#a0846a" }}>{gotCount}/{badges.length}</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9 }}>
              {badges.map(b => (
                <div key={b.id} style={{
                  textAlign: "center", padding: "11px 6px", borderRadius: 11,
                  background: b.got ? `${b.col}14` : "#f7f0e4",
                  border: `1px solid ${b.got ? b.col + "55" : "#ecdcc4"}`,
                  opacity: b.got ? 1 : 0.55,
                }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", margin: "0 auto 6px", display: "flex", alignItems: "center", justifyContent: "center",
                    background: b.got ? b.col : "#d8c9b0", boxShadow: b.got ? `0 3px 9px ${b.col}55` : "none" }}>
                    <Glyph name={b.icon} size={18} color="#fff" />
                  </div>
                  <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 12.5, color: b.got ? "#3a2e2a" : "#9a8a72", lineHeight: 1.05 }}>{b.label}</div>
                  <div style={{ fontFamily: monoF, fontSize: 7.5, color: "#a0846a", marginTop: 2, lineHeight: 1.2 }}>{b.got ? b.sub : "locked"}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      <button onClick={onReset} className="mp-btn" style={{
        width: "100%", padding: "11px", borderRadius: 10, cursor: "pointer",
        background: "#fff0f3", color: "#d6486b", border: "1px solid #f5c6d4",
        fontFamily: cond, fontWeight: 700, fontSize: 14, letterSpacing: ".03em",
      }}>Reset the whole mission</button>
    </div>
  );
}

// ---------- Easter egg overlay: playful celebration popup ----------
function EggOverlay({ egg, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, egg.hold || 4200);
    return () => clearTimeout(t);
  }, [egg, onClose]);
  const confettiCount = egg.confetti === false ? 0 : 26;
  const cols = ["#ff7a3d", "#1f9fb8", "#1f9d6b", "#e0577a", "#ffce4a", "#9a6cc4"];
  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, zIndex: 60, display: "flex", alignItems: "center", justifyContent: "center",
      background: "rgba(40,28,20,0.34)", animation: "fadeUp .2s ease both", padding: 24,
    }}>
      {Array.from({ length: confettiCount }).map((_, i) => {
        const left = (i * 37) % 100;
        const delay = (i % 9) * 0.08;
        const col = cols[i % cols.length];
        const size = 6 + (i % 4) * 2;
        return (
          <span key={i} style={{
            position: "fixed", top: -16, left: `${left}%`, width: size, height: size,
            background: col, borderRadius: i % 2 ? "50%" : 2,
            animation: `eggfall ${1.6 + (i % 5) * 0.25}s ${delay}s ease-in forwards`, opacity: 0.95, pointerEvents: "none",
          }} />
        );
      })}
      <div style={{
        background: "#fffaf0", border: "2px solid #ffd59e", borderRadius: 22, padding: "26px 24px",
        maxWidth: 320, textAlign: "center", boxShadow: "0 18px 50px rgba(0,0,0,0.28)", animation: "eggpop .45s cubic-bezier(.2,1.3,.4,1) both",
      }}>
        <div style={{ fontSize: 52, lineHeight: 1, marginBottom: 8 }}>{egg.emoji || "🎉"}</div>
        <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 24, color: "#ff7a3d", lineHeight: 1.05 }}>{egg.title}</div>
        <div style={{ fontSize: 13, color: "#7a6a55", lineHeight: 1.5, marginTop: 8 }}>{egg.msg}</div>
        {egg.unlockSticker && (
          <div style={{ fontFamily: monoF, fontSize: 9.5, letterSpacing: ".1em", color: "#1f9d6b", marginTop: 12, background: "#e3faec", border: "1px solid #9bdcb8", borderRadius: 8, padding: "7px 10px" }}>
            ★ SECRET STICKER UNLOCKED ★
          </div>
        )}
        <div style={{ fontFamily: monoF, fontSize: 9, color: "#b09878", marginTop: 14 }}>tap anywhere to close</div>
      </div>
    </div>
  );
}

// ---------- Toast ----------
function Toast({ toast }) {
  const colors = {
    earn: ["#1f9d6b", "#1f9d6b", "#ffffff"],
    unlock: ["#ff7a3d", "#ff7a3d", "#ffffff"],
    warn: ["#e85a9b", "#e85a9b", "#ffffff"],
    info: ["#1f9fb8", "#1f9fb8", "#ffffff"],
  };
  const [bg, bd, fg] = colors[toast.kind] || colors.earn;
  return (
    <div style={{
      position: "fixed", left: "50%", bottom: 24, transform: "translateX(-50%)",
      background: bg, border: `1px solid ${bd}`, color: fg,
      padding: "10px 18px", borderRadius: 24, fontFamily: cond, fontWeight: 700, fontSize: 15, letterSpacing: ".03em",
      animation: "slidein .25s ease both", zIndex: 50, boxShadow: "0 8px 24px #3a2e2a33", whiteSpace: "nowrap",
    }}>{toast.msg}</div>
  );
}

// ---------- Footer ----------
function Footer() {
  return (
    <div style={{ textAlign: "center", marginTop: 24, fontFamily: monoF, fontSize: 9.5, color: "#b09a7e", letterSpacing: ".06em", lineHeight: 1.6 }}>
      <div style={{ color: "#9a8a72" }}>hammyLabs · Mission Phuket</div>
      <div style={{ color: "#bca889", marginTop: 2 }}>Built for the 1 July run. Made with love for Lil Naddy & the 5 cats.</div>
    </div>
  );
}

      if (i >= urls.length) { fail(); return; }

      s.src = urls[i++]; s.crossOrigin = "anonymous";

      s.onerror = function () { tryNext(); };
      document.head.appendChild(s);
    }
    tryNext();
  }
  var REACT = ["https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js","https://unpkg.com/react@18.3.1/umd/react.production.min.js","https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"];
  var REACTDOM = ["https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js","https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js","https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"];

  function boot() {

      var mount = "\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));";
      var src = document.getElementById("appsrc").textContent;
      var compiled = Babel.transform(hooks + src + mount, { presets: ["react"] }).code;
      (0, eval)(compiled);
    } catch (err) { showError((err && err.stack) || err); }
  }
  loadScript(REACT, function () {
    loadScript(REACTDOM, function () {
      loadScript(BABEL, boot, function () { showError("Could not load Babel."); });
    }, function () { showError("Could not load ReactDOM."); });
  }, function () { showError("Could not load React."); });

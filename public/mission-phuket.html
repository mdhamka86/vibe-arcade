// Scaffold pattern matches the established hammyLabs single-file React apps.
// ============================================================

const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
const pct = (a, b) => (b === 0 ? 0 : Math.round((a / b) * 100));

// progress survives across reloads regardless of array order.

});

const TOTAL_TASKS = ALL_TASKS.length;
const TOTAL_POINTS = ALL_TASKS.reduce((s, t) => s + t.p, 0);

// ============================================================
// PROGRESS COPY — the meter speaks to where you are in the journey.
// ============================================================
function statusLine(done, total) {
  const p = pct(done, total);
  if (p === 0) return "Pre-flight. Nothing ticked yet.";
  if (p < 20) return "Wheels still chocked. Early days.";
  if (p < 40) return "Taxiing to the runway.";
  if (p < 60) return "Climbing nicely. Keep going.";
  if (p < 80) return "Cruising altitude reached.";
  if (p < 100) return "Beginning the descent into Phuket.";
  return "Touchdown. Every box ticked. Welcome home.";
}

// rank by points banked — a little flavour ladder
function rankFor(points) {
  if (points >= TOTAL_POINTS) return { name: "Mission Commander", color: "#e6892b" };
  if (points >= TOTAL_POINTS * 0.75) return { name: "Flight Captain", color: "#1f9fb8" };
  if (points >= TOTAL_POINTS * 0.5) return { name: "First Officer", color: "#3a8ac4" };
  if (points >= TOTAL_POINTS * 0.25) return { name: "Cabin Crew", color: "#7a9a6f" };
  if (points > 0) return { name: "Ground Staff", color: "#9a8a72" };
  return { name: "Standby Passenger", color: "#a0846a" };
}

// ============================================================
// SAVE STATE — Phase 1 keeps it simple and in-memory with a localStorage
// mirror so a reload doesn't wipe progress. (Artifact sandboxes block
// storage, so every call is wrapped: it just falls back to memory there,
// and works for real on the live Vercel site.) Phase 2 swaps this whole
// layer for the shared household backend.
// ============================================================
const SAVE_KEY = "mission-phuket-v1";

function loadSave() {
  try {
    const raw = window.localStorage.getItem(SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* sandboxed or unavailable: fall through to default */ }
  return { checked: {}, spent: 0, owned: [], lastBy: {} };
}
function persist(state) {
  try { window.localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
  catch (e) { /* no-op in sandbox */ }
}

// ICONS — tiny line glyphs for section headers.
// ============================================================
function Glyph({ name, size = 20, color = "#ffb347" }) {
  const c = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "moon": return <svg {...c}><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>;
    case "paw": return <svg {...c}><circle cx="6" cy="10" r="2"/><circle cx="10.5" cy="6.5" r="2"/><circle cx="15" cy="6.5" r="2"/><circle cx="18.5" cy="10" r="2"/><path d="M8 16c0-2.2 1.8-3.5 4-3.5s4 1.3 4 3.5-1.8 4-4 4-4-1.8-4-4z"/></svg>;
    case "bag": return <svg {...c}><path d="M6 7h12l-1 13H7z"/><path d="M9 7V5a3 3 0 016 0v2"/></svg>;
    case "home": return <svg {...c}><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>;
    case "door": return <svg {...c}><path d="M5 21V4a1 1 0 011-1h9a1 1 0 011 1v17"/><path d="M5 21h14"/><circle cx="13" cy="12" r="1"/></svg>;
    case "plane": return <svg {...c}><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 00-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L11 19v-5.5z"/></svg>;
    case "palm": return <svg {...c}><path d="M12 22V11"/><path d="M12 11c-3-2-6-1-8 1M12 11c3-2 6-1 8 1M12 11c-1-3-4-5-7-5M12 11c1-3 4-5 7-5"/></svg>;
    default: return <svg {...c}><circle cx="12" cy="12" r="9"/></svg>;
  }
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [save, setSave] = useState(loadSave);
  const [tab, setTab] = useState("checklist"); // checklist | store | progress
  const [openSection, setOpenSection] = useState("night-before");
  const [who, setWho] = useState(() => {
    try { return window.localStorage.getItem("mission-phuket-who") || "Hammy"; }
    catch (e) { return "Hammy"; }
  });
  const [toast, setToast] = useState(null);
  const [justChecked, setJustChecked] = useState(null);

  // persist on every save change
  useEffect(() => { persist(save); }, [save]);
  useEffect(() => {
    try { window.localStorage.setItem("mission-phuket-who", who); } catch (e) {}
  }, [who]);

  // derived totals
  const checkedIds = save.checked || {};
  const doneTasks = ALL_TASKS.filter(t => checkedIds[t.id]);
  const doneCount = doneTasks.length;
  const earned = doneTasks.reduce((s, t) => s + t.p, 0);
  const balance = earned - (save.spent || 0);
  const rank = rankFor(earned);

  function flashToast(msg, kind) {
    setToast({ msg, kind, id: uid() });
    setTimeout(() => setToast(t => (t && t.kind === kind ? null : t)), 2600);
  }

  function toggleTask(task) {
    setSave(s => {
      const checked = { ...(s.checked || {}) };
      const lastBy = { ...(s.lastBy || {}) };
      const wasOn = !!checked[task.id];
      if (wasOn) {
        delete checked[task.id];
        delete lastBy[task.id];
      } else {
        checked[task.id] = true;
        lastBy[task.id] = who;
      }
      return { ...s, checked, lastBy };
    });
    if (!checkedIds[task.id]) {
      setJustChecked(task.id);
      setTimeout(() => setJustChecked(j => (j === task.id ? null : j)), 700);
      flashToast(`+${task.p} pts banked`, "earn");
    }
  }

  function buySticker(st) {
    if ((save.owned || []).includes(st.id)) return;
    if (balance < st.cost) { flashToast("Not enough points yet", "warn"); return; }
    setSave(s => ({ ...s, spent: (s.spent || 0) + st.cost, owned: [...(s.owned || []), st.id] }));
    flashToast(`Unlocked: ${st.name}`, "unlock");
  }

  function resetAll() {
    if (!window.confirm("Reset every tick, point, and unlocked sticker? This can't be undone.")) return;
    setSave({ checked: {}, spent: 0, owned: [], lastBy: {} });
    flashToast("Mission reset", "warn");
  }

  return (
    <Shell>
      <Header who={who} setWho={setWho} balance={balance} rank={rank} />

      <ProgressBar doneCount={doneCount} earned={earned} balance={balance} />

      <Tabs tab={tab} setTab={setTab} ownedCount={(save.owned || []).length} />

      {tab === "checklist" && (
        <Checklist
          openSection={openSection} setOpenSection={setOpenSection}
          checkedIds={checkedIds} lastBy={save.lastBy || {}}
          onToggle={toggleTask} justChecked={justChecked} who={who}
        />
      )}

      {tab === "store" && (
        <Store owned={save.owned || []} balance={balance} onBuy={buySticker} earned={earned} />
      )}

      {tab === "progress" && (
        <ProgressTab
          save={save} doneCount={doneCount} earned={earned} balance={balance}
          rank={rank} onReset={resetAll}
        />
      )}

      {toast && <Toast toast={toast} />}
      <Footer />
    </Shell>
  );
}

// ---------- Shell ----------

  const css = `
    *{box-sizing:border-box;}
    ::selection{background:#ff9b54;color:#fff;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    @keyframes pop{0%{transform:scale(.7);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
    @keyframes flip{0%{transform:rotateX(-90deg);opacity:0;}100%{transform:rotateX(0);opacity:1;}}
    @keyframes slidein{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
    @keyframes sway{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
    .mp-card{animation:fadeUp .3s ease both;}

    @media (prefers-reduced-motion:reduce){.mp-card,.mp-tick *{animation:none!important;}}
  `;
  return (
    <div style={{
      minHeight: "100vh", color: "#3a2e2a",
      fontFamily: "'Inter',system-ui,sans-serif",
      background: "linear-gradient(180deg,#7fdbff 0%,#a8e6cf 32%,#ffe9b0 64%,#ffd59e 100%)",
      backgroundAttachment: "fixed",
    }}>

    ["Tasks done", `${doneCount} / ${TOTAL_TASKS}`, "#ff7a3d"],
    ["Points earned", `${earned}`, "#e6892b"],
    ["Points spent", `${spent}`, "#e85a9b"],

    <div className="mp-card">

            <div style={{ fontFamily: monoF, fontSize: 9, color: "#a0846a", letterSpacing: ".1em", textTransform: "uppercase" }}>{l}</div>

      <div style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 12, padding: "14px 15px", marginBottom: 14, boxShadow: "0 4px 14px #ff9b5414" }}>
        <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: "#3a2e2a", marginBottom: 10 }}>Who's pulling their weight</div>

          const v = byTally[name];
          const total = byTally.Hammy + byTally.Naddy;
          const w = total === 0 ? 0 : Math.round((v / total) * 100);
          const col = name === "Naddy" ? "#e85a9b" : "#ff9b54";
          return (
            <div key={name} style={{ marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                <span style={{ color: col, fontWeight: 600 }}>{name}</span>
                <span style={{ color: "#9a8a72", fontFamily: monoF, fontSize: 11 }}>{v} ticks</span>

              <div style={{ height: 7, background: "#fff0d6", borderRadius: 4, overflow: "hidden", border: "1px solid #ffe1b0" }}>
                <div style={{ width: `${w}%`, height: "100%", background: col, transition: "width .4s" }} />
              </div>
            </div>
          );
        })}
        <div style={{ fontSize: 10.5, color: "#a0846a", marginTop: 8, fontStyle: "italic", lineHeight: 1.4 }}>
          Friendly note: once the shared backend is wired up in the next phase, this splits live between the two of you across both phones.

        width: "100%", padding: "11px", borderRadius: 10, cursor: "pointer",
        background: "#fff0f3", color: "#d6486b", border: "1px solid #f5c6d4",
        fontFamily: cond, fontWeight: 700, fontSize: 14, letterSpacing: ".03em",
      }}>Reset the whole mission</button>
    </div>
  );
}

function Toast({ toast }) {
  const colors = {
    earn: ["#1f9d6b", "#1f9d6b", "#ffffff"],
    unlock: ["#ff7a3d", "#ff7a3d", "#ffffff"],
    warn: ["#e85a9b", "#e85a9b", "#ffffff"],
  };
  const [bg, bd, fg] = colors[toast.kind] || colors.earn;
  return (
    <div style={{
      position: "fixed", left: "50%", bottom: 24, transform: "translateX(-50%)",
      background: bg, border: `1px solid ${bd}`, color: fg,
      padding: "10px 18px", borderRadius: 24, fontFamily: cond, fontWeight: 700, fontSize: 15, letterSpacing: ".03em",
      animation: "slidein .25s ease both", zIndex: 50, boxShadow: "0 8px 24px #3a2e2a33", whiteSpace: "nowrap",
    }}>{toast.msg}</div>
  );
}

<script>

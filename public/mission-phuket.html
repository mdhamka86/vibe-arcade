// ---- Bluesky login, stored ONLY on this device (never synced, never shared) ----
// Saved in localStorage keyed by person. On the live Vercel site this persists;
// inside the Claude preview localStorage is unavailable, so it simply won't
// remember there (the live site is what matters). All access is guarded.
function bskyKey(who) { return `mp_bsky_${who}`; }
function loadBskyCreds(who) {
  try {
    const raw = window.localStorage.getItem(bskyKey(who));
    if (!raw) return null;
    const c = JSON.parse(raw);
    if (c && c.handle && c.apppw) return c;
  } catch (e) {}
  return null;
}
function saveBskyCreds(who, handle, apppw) {
  try { window.localStorage.setItem(bskyKey(who), JSON.stringify({ handle, apppw })); return true; }
  catch (e) { return false; }
}
function clearBskyCreds(who) {
  try { window.localStorage.removeItem(bskyKey(who)); } catch (e) {}
}

// helper: format a THB integer with thousands separators
function fmtTHB(n) {
  const v = Math.round(Number(n) || 0);
  return "฿" + v.toLocaleString("en-US");
}
// helper: convert THB -> SGD at the given rate, formatted
function fmtSGD(thb, rate) {
  const r = Number(rate) || FX_SGD_THB_DEFAULT;
  const v = (Number(thb) || 0) / r;
  return "S$" + v.toLocaleString("en-US", { maximumFractionDigits: 0 });
}

// build the default budget blob (used first time, before any edits)
function defaultBudget() {
  // cost-of-living defaults seed from the "Comfortable" preset (index 1)
  const col = {};
  COL_LINES.forEach(l => { col[l.id] = l.vals[1]; });
  // setup defaults seed from each item's val
  const setup = {};
  SETUP_GROUPS.forEach(g => g.items.forEach(it => { setup[it.id] = it.val; }));
  return { col, colPreset: "Comfortable", setup, fx: FX_SGD_THB_DEFAULT };
}

// readiness for a checklist section, given the live checked map
function sectionReadiness(sectionId, checked) {
  const sec = SECTIONS.find(s => s.id === sectionId);
  if (!sec) return { done: 0, total: 0 };
  let done = 0;
  sec.tasks.forEach(t => { if (checked[t.id]) done++; });
  return { done, total: sec.tasks.length };
}
// combined readiness across several sections
function combinedReadiness(sectionIds, checked) {
  let done = 0, total = 0;
  (sectionIds || []).forEach(id => {
    const r = sectionReadiness(id, checked);
    done += r.done; total += r.total;
  });
  return { done, total };
}

// PROGRESS COPY — the meter speaks to where you are in the journey.

function statusLine(done, total) {
  const p = pct(done, total);
  if (p === 0) return "Pre-flight. Nothing ticked yet.";
  if (p < 20) return "Wheels still chocked. Early days.";
  if (p < 40) return "Taxiing to the runway.";
  if (p < 60) return "Climbing nicely. Keep going.";
  if (p < 80) return "Cruising altitude reached.";
  if (p < 100) return "Beginning the descent into Phuket.";
  return "Touchdown. Every box ticked. Welcome home.";
}

// rank by points banked — a little flavour ladder
function rankFor(points) {
  if (points >= TOTAL_POINTS) return { name: "Mission Commander", color: "#e6892b" };
  if (points >= TOTAL_POINTS * 0.75) return { name: "Flight Captain", color: "#1f9fb8" };
  if (points >= TOTAL_POINTS * 0.5) return { name: "First Officer", color: "#3a8ac4" };
  if (points >= TOTAL_POINTS * 0.25) return { name: "Cabin Crew", color: "#7a9a6f" };
  if (points > 0) return { name: "Ground Staff", color: "#9a8a72" };
  return { name: "Standby Passenger", color: "#a0846a" };
}

// ============================================================
// SAVE STATE — Phase 2: shared household save via the backend.
//
// The whole mission lives as ONE blob on the server (api/mission), so both
// phones share ticked boxes and a combined points pool. A localStorage mirror
// is kept purely as an offline cushion: if the signal drops at the airport,
// the app keeps working on the last known state and re-syncs when it returns.
//
// Flow:
//   - on open: pull the shared state from the server (fall back to local cache)
//   - on any change: write the full state up, and mirror it locally
//   - every few seconds: poll the server so the other phone's ticks appear
//
// "Last write wins" is fine for a two-person list: writes are near-instant and
// the poll is short, so the two phones converge within a few seconds.
// ============================================================
const SAVE_KEY = "mission-phuket-v1";   // local mirror key
const API_URL = "/api/mission";          // backend endpoint (same origin)
const POLL_MS = 2500;                    // how often to check the other phone

// Union two memory lists by id, keeping the richer copy of any shared id
// (the one with a grade wins, else the newer). Protects photos from both
// phones during near-simultaneous writes.
function mergeMemories(a, b, deleted) {
  const tomb = new Set(Array.isArray(deleted) ? deleted : []);
  const byId = {};
  (Array.isArray(a) ? a : []).forEach(m => { if (m && m.id && !tomb.has(m.id)) byId[m.id] = m; });
  (Array.isArray(b) ? b : []).forEach(m => {
    if (!m || !m.id || tomb.has(m.id)) return;
    const existing = byId[m.id];
    if (!existing) { byId[m.id] = m; return; }
    // prefer the copy that has been graded, else the more recently touched one
    const score = x => (x.grades && Object.keys(x.grades).length ? 2 : 0) + ((x.touchedAt || x.at || 0) > (existing.touchedAt || existing.at || 0) ? 1 : 0);
    byId[m.id] = score(m) >= 1 ? m : existing;
  });
  return Object.values(byId).sort((x, y) => (y.at || 0) - (x.at || 0));
}

// Diary entries are append-only and permanent (no deletes). Union both sides by
// id so a near-simultaneous post on either phone is never lost, and merge each
// entry's reactions so a reaction added on one phone survives too.
function mergeDiary(a, b) {
  const byId = {};
  (Array.isArray(a) ? a : []).forEach(en => { if (en && en.id) byId[en.id] = en; });
  (Array.isArray(b) ? b : []).forEach(en => {
    if (!en || !en.id) return;
    const existing = byId[en.id];
    if (!existing) { byId[en.id] = en; return; }
    // same entry on both sides: keep the text, union the reactions
    byId[en.id] = { ...existing, ...en, reactions: { ...(existing.reactions || {}), ...(en.reactions || {}) } };
  });
  return Object.values(byId).sort((x, y) => (y.at || 0) - (x.at || 0));
}

function emptyState() {
  return { checked: {}, spent: 0, owned: [], lastBy: {}, budget: defaultBudget(), memories: [], deletedMem: [], diary: [], updatedAt: 0 };
}

// local mirror (offline cushion only) ----------------------------------------
function loadLocal() {
  try {
    const raw = window.localStorage.getItem(SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* sandboxed or unavailable */ }
  return emptyState();
}
function saveLocal(state) {
  try { window.localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
  catch (e) { /* no-op */ }
}

// ---- photo helpers: shrink in-browser, then upload to /api/photo ----
// Resizing to ~1200px keeps every upload well under Vercel's 4.5 MB function
// limit and makes uploads fast even on weak airport wifi.
function resizeImage(file, maxDim) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      const scale = Math.min(1, maxDim / Math.max(width, height));
      width = Math.round(width * scale);
      height = Math.round(height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob(
        b => { if (b) resolve(b); else reject(new Error("Could not process image")); },
        "image/jpeg", 0.82
      );
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Could not read image")); };
    img.src = url;
  });
}

async function uploadPhoto(file) {
  const blob = await resizeImage(file, 1200);
  const res = await fetch(`/api/photo?ext=jpg`, {
    method: "POST",
    headers: { "Content-Type": "image/jpeg" },
    body: blob,
  });
  if (!res.ok) {
    let detail = "";
    try { const j = await res.json(); detail = j.detail || j.error || ""; } catch (e) {}
    throw new Error(`[${res.status}] ${detail || "upload failed"}`);
  }
  const data = await res.json();
  if (!data.url) throw new Error("No URL returned");
  return data.url;
}

// backend sync ---------------------------------------------------------------
// Returns the server state, or null if the server can't be reached.
async function fetchRemote() {
  try {
    const res = await fetch(API_URL, { method: "GET", cache: "no-store" });
    if (!res.ok) return null;
    const data = await res.json();
    return data && data.state ? data.state : null;
  } catch (e) { return null; }
}
// Pushes the full state up. Returns the saved server state, or null on failure.
async function pushRemote(state) {
  try {
    // Sanitize memories for the wire: a blob: localUrl only works on the device
    // that made it, and an in-flight (url:null) photo isn't viewable elsewhere.
    // We sync only finished photos, with their real URL, never the local preview.
    const cleanState = {
      ...state,
      memories: (Array.isArray(state.memories) ? state.memories : [])
        .filter(m => m && m.url && !m.uploading)
        .map(m => { const { localUrl, ...rest } = m; return rest; }),
    };
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ state: cleanState }),
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data && data.state ? data.state : null;
  } catch (e) { return null; }
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  // start from the local cache for an instant first paint; the server copy
  // replaces it a moment later once the mount sync completes.
  const [save, setSave] = useState(loadLocal);
  const [view, setView] = useState("home"); // home | checklist | costs | setup | explore | moveday
  const prevView = useRef("home"); // where 'back' returns to
  // navigate to a view, remembering where we came from (so back is contextual)
  function go(target) {
    if (view !== target) prevView.current = view;
    setView(target);
  }
  // back returns to the previous view (e.g. Move Day -> Big C jump -> Setup, back to Move Day)
  function goBack() {
    const dest = prevView.current && prevView.current !== view ? prevView.current : "home";
    prevView.current = "home";
    setView(dest);
  }
  const [tab, setTab] = useState("checklist"); // within the checklist tool: checklist | store | progress
  const [openSection, setOpenSection] = useState("night-before");
  const [who, setWho] = useState(() => {
    try { return window.localStorage.getItem("mission-phuket-who") || "Hammy"; }
    catch (e) { return "Hammy"; }
  });
  const [toast, setToast] = useState(null);
  const [egg, setEgg] = useState(null); // easter egg overlay
  const [justChecked, setJustChecked] = useState(null);
  const [sync, setSync] = useState("connecting"); // connecting | online | offline
  const [unlocked, setUnlocked] = useState(() => {
    try { return window.localStorage.getItem("mission-phuket-unlocked") === "yes"; }
    catch (e) { return false; }
  });
  const saveRef = useRef(save);
  saveRef.current = save;

  function unlock() {
    try { window.localStorage.setItem("mission-phuket-unlocked", "yes"); } catch (e) {}
    setUnlocked(true);
  }

  // remember the who-toggle locally (it's a per-phone preference, not shared)
  useEffect(() => {
    try { window.localStorage.setItem("mission-phuket-who", who); } catch (e) {}
  }, [who]);

  // ---- on mount: pull the shared state, then poll for the other phone ----
  useEffect(() => {
    let alive = true;
    async function syncDown() {
      const remote = await fetchRemote();
      if (!alive) return;
      if (remote) {
        setSync("online");
        // only adopt the server copy if it's newer than what we're holding,
        // so a slow poll can't clobber a tick you just made on this phone.
        setSave(local => {
          const localT = local.updatedAt || 0;
          const remoteT = remote.updatedAt || 0;
          // union deletion tombstones from both sides so deletes stick
          const tomb = Array.from(new Set([...(local.deletedMem || []), ...(remote.deletedMem || [])]));
          // Memories are special: union both sides by id so a photo added on
          // one phone is never wiped by a near-simultaneous write on the other.
          const merged = mergeMemories(local.memories, remote.memories, tomb);
          const mergedDiary = mergeDiary(local.diary, remote.diary);
          if (remoteT >= localT) {
            const adopted = { ...remote, memories: merged, deletedMem: tomb, diary: mergedDiary };
            saveLocal(adopted); return adopted;
          }
          // we're keeping our newer local copy, but still absorb any remote photos/words
          if (merged.length !== (local.memories || []).length || tomb.length !== (local.deletedMem || []).length || mergedDiary.length !== (local.diary || []).length) {
            const kept = { ...local, memories: merged, deletedMem: tomb, diary: mergedDiary };
            saveLocal(kept); return kept;
          }
          return local;
        });
      } else {
        setSync("offline");
      }
    }
    syncDown(); // immediate
    const id = setInterval(syncDown, POLL_MS);
    return () => { alive = false; clearInterval(id); };
  }, []);

  // ---- commit a new state: update screen, mirror locally, push to server ----
  // every user action routes through here so there's one clean write path.
  function commit(updater) {
    setSave(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const stamped = { ...next, updatedAt: Date.now() };
      saveLocal(stamped);
      // fire-and-forget push; flip the badge based on whether it lands
      pushRemote(stamped).then(saved => {
        setSync(saved ? "online" : "offline");
      });
      return stamped;
    });
  }

  // derived totals
  const checkedIds = save.checked || {};
  const doneTasks = ALL_TASKS.filter(t => checkedIds[t.id]);
  const doneCount = doneTasks.length;
  const earned = doneTasks.reduce((s, t) => s + t.p, 0);
  const balance = earned - (save.spent || 0);
  const rank = rankFor(earned);

  // Running Bluesky log number is shared across diary entries AND photos, so the
  // public "log #NNN" stays sequential no matter which kind you share.
  const sharedLogCount =
    (Array.isArray(save.diary) ? save.diary.filter(e => e && e.bsky && e.bsky.url).length : 0) +
    (Array.isArray(save.memories) ? save.memories.filter(m => m && m.bsky && m.bsky.url).length : 0);

  // budget always falls back to defaults, so a Phase-2 blob with no budget
  // key still works the first time the money tools are opened.
  const budget = save.budget || defaultBudget();
  // merge a partial budget change into the shared state via the one write path
  function setBudget(patch) {
    commit(s => {
      const cur = s.budget || defaultBudget();
      const next = typeof patch === "function" ? patch(cur) : { ...cur, ...patch };
      return { ...s, budget: next };
    });
  }

  function flashToast(msg, kind) {
    setToast({ msg, kind, id: uid() });
    setTimeout(() => setToast(t => (t && t.kind === kind ? null : t)), 2600);
  }

  // ---- easter egg engine: show a playful overlay, optionally unlock a secret sticker ----
  function triggerEgg(e) {
    setEgg(e);
    if (e.unlockSticker) {
      commit(s => {
        const owned = s.owned || [];
        if (owned.includes(e.unlockSticker)) return s;
        return { ...s, owned: [...owned, e.unlockSticker] };
      });
    }
  }
  function dismissEgg() { setEgg(null); }

  function toggleTask(task) {
    commit(s => {
      const checked = { ...(s.checked || {}) };
      const lastBy = { ...(s.lastBy || {}) };
      const wasOn = !!checked[task.id];
      if (wasOn) {
        delete checked[task.id];
        delete lastBy[task.id];
      } else {
        checked[task.id] = true;
        lastBy[task.id] = who;
      }
      return { ...s, checked, lastBy };
    });
    if (!checkedIds[task.id]) {
      setJustChecked(task.id);
      setTimeout(() => setJustChecked(j => (j === task.id ? null : j)), 700);
      flashToast(`+${task.p} pts banked`, "earn");
    }
  }

  function buySticker(st) {
    if ((save.owned || []).includes(st.id)) return;
    if (balance < st.cost) { flashToast("Not enough points yet", "warn"); return; }
    commit(s => ({ ...s, spent: (s.spent || 0) + st.cost, owned: [...(s.owned || []), st.id] }));
    flashToast(`Unlocked: ${st.name}`, "unlock");
  }

  function resetAll() {
    if (!window.confirm("Reset every tick, point, and unlocked sticker for BOTH of you? This clears the shared mission and can't be undone.")) return;
    commit({ checked: {}, spent: 0, owned: [], lastBy: {} });
    flashToast("Mission reset", "warn");
  }

  if (!unlocked) {
    return <Shell><LockScreen onUnlock={unlock} /></Shell>;
  }

  return (
    <Shell>
      {view === "home" && (
        <Home
          who={who} setWho={setWho} balance={balance} rank={rank} sync={sync}
          doneCount={doneCount} earned={earned}
          onOpen={go} onEgg={triggerEgg}
        />
      )}

      {view !== "home" && (
        <ToolBar title={VIEW_TITLES[view]} onBack={goBack} sync={sync} />
      )}

      {view === "checklist" && (
        <>
          <ProgressBar doneCount={doneCount} earned={earned} balance={balance} />
          <Tabs tab={tab} setTab={setTab} ownedCount={(save.owned || []).length} />
          {tab === "checklist" && (
            <Checklist
              openSection={openSection} setOpenSection={setOpenSection}
              checkedIds={checkedIds} lastBy={save.lastBy || {}}
              onToggle={toggleTask} justChecked={justChecked} who={who}
            />
          )}
          {tab === "store" && (
            <Store owned={save.owned || []} balance={balance} onBuy={buySticker} earned={earned} />
          )}
          {tab === "progress" && (
            <ProgressTab
              save={save} doneCount={doneCount} earned={earned} balance={balance}
              rank={rank} onReset={resetAll}
            />
          )}
        </>
      )}

      {view === "costs" && (
        <CostOfLiving budget={budget} setBudget={setBudget} />
      )}

      {view === "setup" && (
        <SetupCosts budget={budget} setBudget={setBudget} />
      )}

      {view === "explore" && (
        <AroundPhuket onEgg={triggerEgg} />
      )}

      {view === "moveday" && (
        <MoveDay checked={checkedIds} onGoChecklist={() => go("checklist")} onJump={go} />
      )}

      {view === "memories" && (
        <MemoryWall memories={save.memories} commit={commit} who={who} onEgg={triggerEgg} flashToast={flashToast} sharedCount={sharedLogCount} />
      )}

      {view === "words" && (
        <WallOfWords diary={save.diary} commit={commit} who={who} flashToast={flashToast} sharedCount={sharedLogCount} />
      )}

      {egg && <EggOverlay egg={egg} onClose={dismissEgg} />}
      {toast && <Toast toast={toast} />}
      <Footer />
    </Shell>
  );
}

    setBudget(cur => ({ ...cur, col: { ...(cur.col || {}), [id]: n } }));

    const v = Number(setup[it.id]) || 0;
    if (it.recurring) recurring += v; else oneOff += v;
  }));

  function setItem(id, v) {
    const n = Math.max(0, Math.round(Number(v) || 0));
    setBudget(cur => ({ ...cur, setup: { ...(cur.setup || {}), [id]: n } }));
  }
  function setFx(v) {
    const n = Number(v);
    if (n > 0) setBudget(cur => ({ ...cur, fx: n }));
  }
  function groupTotal(g) {
    return g.items.reduce((s, it) => s + (Number(setup[it.id]) || 0), 0);
  }

  return (
    <div className="mp-card">
      {/* total card */}
      <div style={{ background: "linear-gradient(160deg,#e6f7ee,#ffffff)", border: "1px solid #b5e3cb", borderRadius: 16, padding: "16px 16px", marginBottom: 14, boxShadow: "0 5px 16px #1f9d6b1a" }}>

// ---------- Around Phuket: the island explorer (Phase 4) ----------
function AroundPhuket({ onEgg }) {
  const [factIdx, setFactIdx] = useState(() => Math.floor(Math.random() * PHUKET_FACTS.length));
  const [openCat, setOpenCat] = useState(PHUKET_PLACES[0].cat);
  const catTaps = useRef(0);
  const gokuTaps = useRef(0);
  const factTaps = useRef(0);
  function nextFact() {
    setFactIdx(i => (i + 1) % PHUKET_FACTS.length);
    factTaps.current += 1;
    if (factTaps.current >= 12 && onEgg) {
      factTaps.current = 0;
      onEgg({ emoji: "🤓", title: "Certified Phuket Nerd", msg: "Twelve facts deep. You now know more island trivia than most tuk-tuk drivers. Wear it with pride.", confetti: true });
    }
  }
  function onCatTap(name) {
    if (!onEgg) return;
    catTaps.current += 1;
    const n = catTaps.current;
    const lines = {
      Smokey: "Smokey blinks slowly at you. In cat language, that is basically a love letter.",
      Rocket: "Rocket zooms off, then comes straight back. Classic Rocket.",
      Oscar: "Oscar is too dignified for this. He tolerates exactly one tap.",
      Goku: "Goku is powering up. Keep tapping him, something legendary might happen.",
      Selina: "Selina the queen demands tribute, not taps. Bold of you.",
    };
    if (name === "Goku") {
      gokuTaps.current += 1;
      if (gokuTaps.current >= 9) {
        gokuTaps.current = 0; catTaps.current = 0;
        onEgg({ emoji: "🌟", title: "THE GOLDEN GOKU", msg: "You did it. Goku has reached his final form. A legendary shiny is yours.", confetti: true, unlockSticker: "secret_goldcat" });
        return;
      }
    }
    if (n >= 7) {
      catTaps.current = 0;
      onEgg({ emoji: "😵‍💫", title: "Catnip Overload!", msg: "Seven taps and the cats are a bit dizzy now. Here's a sticker for your trouble.", confetti: true, unlockSticker: "secret_catnip" });
      return;
    }
    onEgg({ emoji: "🐱", title: name, msg: lines[name] || "Mrrp.", confetti: false, hold: 2200 });
  }
  return (
    <div className="mp-card">
      {/* hero scene */}
      <div style={{ borderRadius: 16, overflow: "hidden", marginBottom: 14, border: "1px solid #ffd59e", boxShadow: "0 6px 20px #ff9b5422" }}>
        <PhuketScene onCatTap={onCatTap} />
        <div style={{ background: "#ffffffdd", padding: "11px 14px" }}>
          <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 20, color: "#1f6f8b", lineHeight: 1 }}>Welcome to Ko Kaeo</div>
          <div style={{ fontSize: 12, color: "#9a8a72", marginTop: 3, lineHeight: 1.4 }}>The quiet northeast corner of the island. Glass-island calm, airport close, Patong chaos safely far away. Psst, try tapping the cats.</div>
        </div>
      </div>

      {/* fun fact card */}
      <button onClick={nextFact} className="mp-btn" style={{
        width: "100%", textAlign: "left", cursor: "pointer", marginBottom: 16,
        background: "linear-gradient(135deg,#fff4e0,#ffe9d0)", border: "1px solid #ffd591",
        borderRadius: 14, padding: "13px 15px", boxShadow: "0 4px 14px #ff9b5418",
      }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 5 }}>
          <span style={{ fontFamily: monoF, fontSize: 9.5, letterSpacing: ".16em", color: "#c98a3d", textTransform: "uppercase" }}>Island titbit</span>
          <span style={{ fontFamily: monoF, fontSize: 9, color: "#c98a3d" }}>tap for another ↻</span>
        </div>
        <div style={{ fontSize: 13.5, color: "#5a4a3a", lineHeight: 1.5 }} key={factIdx}>
          <span style={{ animation: "fadeUp .3s ease both", display: "inline-block" }}>{PHUKET_FACTS[factIdx]}</span>
        </div>
      </button>

      {/* place categories */}
      {PHUKET_PLACES.map(group => {
        const open = openCat === group.cat;
        return (
          <div key={group.cat} style={{ marginBottom: 10 }}>
            <button onClick={() => setOpenCat(open ? null : group.cat)} className="mp-btn" style={{
              width: "100%", textAlign: "left", cursor: "pointer", border: `1px solid ${group.accent}44`,
              background: open ? `${group.accent}12` : "#ffffffdd", borderRadius: open ? "12px 12px 0 0" : 12,
              padding: "12px 14px", display: "flex", alignItems: "center", gap: 11, boxShadow: "0 3px 12px #ff9b5410",
            }}>
              <div style={{ flexShrink: 0, width: 34, height: 34, borderRadius: 10, background: `${group.accent}1f`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Glyph name={group.icon} size={19} color={group.accent} />
              </div>
              <span style={{ flex: 1, fontFamily: cond, fontWeight: 700, fontSize: 17, color: "#3a2e2a" }}>{group.cat}</span>
              <span style={{ fontSize: 13, color: group.accent, transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }}>▾</span>
            </button>
            {open && (
              <div style={{ border: `1px solid ${group.accent}44`, borderTop: "none", borderRadius: "0 0 12px 12px", background: "#fffaf0", overflow: "hidden" }}>
                {group.spots.map((s, i) => (
                  <div key={s.name} style={{ padding: "11px 14px", borderBottom: i < group.spots.length - 1 ? "1px solid #f4e6cf" : "none" }}>
                    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}>
                      <a href={mapDir(`${s.name} Phuket`)} target="_blank" rel="noopener noreferrer"
                        style={{ fontFamily: cond, fontWeight: 700, fontSize: 15.5, color: "#1f6f8b", textDecoration: "none", borderBottom: "1.5px dotted #1f9fb8", cursor: "pointer" }}>{s.name}</a>
                      <span style={{ fontFamily: monoF, fontSize: 8.5, color: group.accent, background: `${group.accent}14`, border: `1px solid ${group.accent}33`, borderRadius: 4, padding: "2px 6px", whiteSpace: "nowrap", flexShrink: 0 }}>{s.tag}</span>
                    </div>
                    <div style={{ fontSize: 12, color: "#7a6a55", lineHeight: 1.5, marginTop: 4 }}>{s.note}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}

      <div style={{ fontSize: 10.5, color: "#a0846a", marginTop: 12, fontStyle: "italic", lineHeight: 1.45, textAlign: "center" }}>
        Tap any place name for directions from Habitown. Distances are rough from Ko Kaeo, and the island's only 48km top to bottom, so nothing's truly far.
      </div>
    </div>
  );
}

// ---------- Day of the Move: the door-to-door run sheet ----------
function MoveDay({ checked, onGoChecklist, onJump }) {
  const [openId, setOpenId] = useState(null);
  checked = checked || {};
  const allSections = [...new Set(MOVE_DAY.flatMap(s => s.sections || []))];
  const overall = combinedReadiness(allSections, checked);
  const remaining = overall.total - overall.done;
  const allDone = remaining === 0;
  return (
    <div className="mp-card">
      <div style={{ background: "linear-gradient(160deg,#efe4fb,#ffffff)", border: "1px solid #d8c4ec", borderRadius: 16, padding: "15px 16px", marginBottom: 12, boxShadow: "0 5px 16px #9a6cc41f" }}>
        <div style={{ fontFamily: monoF, fontSize: 10, letterSpacing: ".18em", color: "#9a6cc4", textTransform: "uppercase" }}>Wednesday · 01 July 2026</div>
        <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 26, color: "#5a3f7a", lineHeight: 1, marginTop: 3 }}>The big day, hour by hour</div>
        <div style={{ fontSize: 12, color: "#7a6a85", marginTop: 6, lineHeight: 1.5 }}>
          You two fly down. The cats take the scenic route by road. Everyone ends up at Habitown by the early hours. Tap any stop for the detail.
        </div>
      </div>

      {/* readiness summary banner */}
      <button onClick={onGoChecklist} className="mp-btn" style={{
        width: "100%", textAlign: "left", cursor: "pointer", marginBottom: 14,
        background: allDone ? "linear-gradient(135deg,#e3faec,#ffffff)" : "linear-gradient(135deg,#fff4e0,#fffaf0)",
        border: `1px solid ${allDone ? "#8fd9b0" : "#ffd591"}`, borderRadius: 14, padding: "13px 15px",
        boxShadow: "0 4px 14px #ff9b5414",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
          <div style={{ flexShrink: 0, width: 38, height: 38, borderRadius: "50%", background: allDone ? "#1f9d6b" : "#e6a23d", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Glyph name={allDone ? "check" : "box"} size={20} color="#fff" />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: allDone ? "#15784f" : "#a06a1a" }}>
              {allDone ? "Fully prepped, you're ready to fly" : `${remaining} thing${remaining === 1 ? "" : "s"} still to sort`}
            </div>
            <div style={{ fontSize: 11.5, color: "#8a7a6a", marginTop: 2, lineHeight: 1.4 }}>
              {allDone ? "Every checklist task tied to the move is ticked. Nice one." : `${overall.done} of ${overall.total} move-day tasks done. Tap to jump to the checklist.`}
            </div>
          </div>
          <span style={{ fontSize: 20, color: "#d8c4a4", flexShrink: 0 }}>›</span>
        </div>
      </button>

      <div style={{ display: "flex", gap: 14, marginBottom: 14, paddingLeft: 4 }}>
        <span style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: monoF, fontSize: 10, color: "#1f6f8b" }}>
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#1f6f8b", display: "inline-block" }} /> You two (air)
        </span>
        <span style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: monoF, fontSize: 10, color: "#e0577a" }}>
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#e0577a", display: "inline-block" }} /> The cats (road)
        </span>
      </div>

      <div style={{ position: "relative", paddingLeft: 6 }}>
        {MOVE_DAY.map((s, i) => {
          const open = openId === i;
          const isCat = s.track === "cats";
          const r = combinedReadiness(s.sections, checked);
          const stopReady = r.total === 0 || r.done === r.total;
          return (
            <div key={i} style={{ display: "flex", gap: 12 }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                <div style={{ width: 34, height: 34, borderRadius: "50%", background: s.accent, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: `0 3px 9px ${s.accent}55`, border: isCat ? "2px solid #e0577a" : "2px solid #ffffff", zIndex: 1 }}>
                  <Glyph name={s.icon} size={17} color="#fff" />
                </div>
                {i < MOVE_DAY.length - 1 && <div style={{ width: 3, flex: 1, minHeight: 18, background: isCat ? "repeating-linear-gradient(#e0577a 0 4px, transparent 4px 8px)" : "#e6d8c4", marginTop: 2, marginBottom: 2 }} />}
              </div>
              <button onClick={() => setOpenId(open ? null : i)} className="mp-btn" style={{
                flex: 1, textAlign: "left", cursor: "pointer", marginBottom: 8,
                background: open ? `${s.accent}10` : "#ffffffdd", border: `1px solid ${s.accent}33`,
                borderRadius: 13, padding: "11px 13px", boxShadow: "0 3px 11px #ff9b5410",
              }}>
                <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}>
                  <span style={{ fontFamily: cond, fontWeight: 800, fontSize: 16, color: s.accent }}>{s.time}</span>
                  <div style={{ display: "flex", gap: 5, alignItems: "center", flexShrink: 0 }}>
                    {s.soft && <span style={{ fontFamily: monoF, fontSize: 7.5, color: "#c98a3d", background: "#fff2d6", border: "1px solid #ffd591", borderRadius: 3, padding: "1px 5px", letterSpacing: ".04em" }}>APPROX</span>}
                    {r.total > 0 && (
                      <span style={{ fontFamily: monoF, fontSize: 7.5, letterSpacing: ".03em", borderRadius: 3, padding: "2px 6px",
                        color: stopReady ? "#15784f" : "#a06a1a",
                        background: stopReady ? "#e3faec" : "#fff2d6",
                        border: `1px solid ${stopReady ? "#9bdcb8" : "#ffd591"}` }}>
                        {stopReady ? "✓ READY" : `${r.done}/${r.total} PREP`}
                      </span>
                    )}
                  </div>
                </div>
                <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 15.5, color: "#3a2e2a", marginTop: 1 }}>{s.title}</div>
                <div style={{ fontFamily: monoF, fontSize: 9, color: isCat ? "#e0577a" : "#1f6f8b", marginTop: 2 }}>{s.who}</div>

// ---------- Memory Wall scoring (pure, cheap) ----------
// Given the memories array, work out total photo points and a per-person tally.
// Points = each quest's capture reward (once, first capture of that quest)
// + every submission's partner-grade bonus + free-memory points + full-set bonus.
function memoryScore(memories) {
  const mems = Array.isArray(memories) ? memories : [];
  const questCaptured = {};     // questId -> true once captured
  const tally = { Hammy: 0, Naddy: 0 }; // count of submissions per person
  let pts = 0;
  mems.forEach(m => {
    if (m.by && tally[m.by] != null) tally[m.by] += 1;
    if (m.questId && QUEST_BY_ID[m.questId]) {
      if (!questCaptured[m.questId]) {
        questCaptured[m.questId] = true;
        pts += QUEST_BY_ID[m.questId].pts; // capture reward, once per quest
      }
    } else {
      pts += 5; // free memory
    }
    // partner grade bonus (Phase 1: peer; later: Picme adds another grader)
    if (m.grades) {
      Object.values(m.grades).forEach(gr => {
        const opt = gr && gr.g && GRADE_BY[gr.g];
        if (opt) pts += opt.bonus;
      });
    }
  });
  const capturedCount = Object.keys(questCaptured).length;
  const fullSet = capturedCount >= ALL_QUESTS.length;
  if (fullSet) pts += FULL_SET_BONUS;
  return { pts, tally, capturedCount, total: ALL_QUESTS.length, fullSet };
}

// ---------- A single photo tile: lazy, async-decoded, stable ----------
// Pulled out and memoized so the 2.5s sync poll never re-decodes images.
const PhotoTile = React.memo(function PhotoTile({ m, onTap }) {
  const src = m.localUrl || m.url;
  return (
    <button onClick={() => onTap(m)} className="mp-btn" style={{
      padding: 0, border: "none", borderRadius: 12, overflow: "hidden", cursor: "pointer",
      position: "relative", aspectRatio: "1 / 1", background: "#f0e6d4",
    }}>
      {src ? (
        <img src={src} alt="" loading="lazy" decoding="async"
          style={{ width: "100%", height: "100%", objectFit: "cover", display: "block",
            opacity: m.uploading ? 0.6 : 1, transition: "opacity .3s" }} />
      ) : null}
      {m.uploading && (
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontFamily: monoF, fontSize: 8.5, color: "#fff", background: "#0008", borderRadius: 10, padding: "3px 8px" }}>saving…</div>
        </div>
      )}
      {m.failed && (
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "#fdeee9cc" }}>
          <div style={{ fontFamily: monoF, fontSize: 8.5, color: "#c0563d" }}>tap to retry</div>
        </div>
      )}
      {m.grades && Object.keys(m.grades).length > 0 && (() => {
        const gr = Object.values(m.grades)[0];
        const opt = gr && GRADE_BY[gr.g];
        if (!opt) return null;
        return <div style={{ position: "absolute", top: 5, right: 5, fontFamily: cond, fontWeight: 800, fontSize: 14, color: "#fff", background: opt.color, borderRadius: 8, width: 22, height: 22, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 2px 6px #0003" }}>{opt.g}</div>;
      })()}
    </button>
  );
});

// ---------- Memory Wall: photo quests + free memories, peer-graded ----------
function MemoryWall({ memories, commit, who, onEgg, flashToast, sharedCount }) {
  const mems = Array.isArray(memories) ? memories : [];
  const [viewer, setViewer] = useState(null);   // a memory being viewed/graded
  const [busyQuest, setBusyQuest] = useState(null);
  const [picmeBusy, setPicmeBusy] = useState(false); // Doctor Picme judging
  const [picmeQuip, setPicmeQuip] = useState("");     // rotating wait message
  const [bskyBusy, setBskyBusy] = useState(false);    // sharing a photo to Bluesky
  const [bskyLoginFor, setBskyLoginFor] = useState(null); // photo awaiting login
  const fileRef = useRef(null);
  const pendingQuest = useRef(null);

  // group memories by quest for the galleries, plus the free pile (cheap, memoized)
  const byQuest = React.useMemo(() => {
    const map = {};
    const free = [];
    mems.forEach(m => {
      if (m.questId && QUEST_BY_ID[m.questId]) { (map[m.questId] = map[m.questId] || []).push(m); }
      else free.push(m);
    });
    return { map, free };
  }, [mems]);

  const score = React.useMemo(() => memoryScore(mems), [mems]);

  // If the camera/picker is dismissed without choosing (no onChange fires on
  // some mobile browsers), clear the 'busy' label when focus returns so the
  // button never stays stuck on "Opening camera…".
  React.useEffect(() => {
    function onFocus() { setTimeout(() => setBusyQuest(null), 400); }
    window.addEventListener("focus", onFocus);
    return () => window.removeEventListener("focus", onFocus);
  }, []);

  // Cycle Doctor Picme's dramatic waiting lines while the AI call is in flight,
  // so the wait reads as a bit, not a dead spinner.
  React.useEffect(() => {
    if (!picmeBusy) { setPicmeQuip(""); return; }
    let i = 0;
    setPicmeQuip(PICME_WAITING[0]);
    const t = setInterval(() => {
      i = (i + 1) % PICME_WAITING.length;
      setPicmeQuip(PICME_WAITING[i]);
    }, 1600);
    return () => clearInterval(t);
  }, [picmeBusy]);

  // optimistic add: show a local preview instantly, upload in the background
  function addPhoto(file, questId) {
    if (!file) return;
    const id = `mem_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
    const localUrl = URL.createObjectURL(file);
    const base = { id, by: who, questId: questId || null, at: Date.now(), touchedAt: Date.now(), url: null, localUrl, uploading: true, failed: false, grades: {} };
    commit(s => ({ ...s, memories: [base, ...(s.memories || [])] }));
    uploadPhoto(file).then(url => {
      commit(s => ({ ...s, memories: (s.memories || []).map(m => m.id === id ? { ...m, url, localUrl: null, uploading: false, failed: false } : m) }));
      try { URL.revokeObjectURL(localUrl); } catch (e) {}
      if (questId && onEgg) {
        const q = QUEST_BY_ID[questId];
        if (q) onEgg({ emoji: "📸", title: "MEMORY CAPTURED", msg: `${q.title} (+${q.pts}). ${q.quirk}`, confetti: true });
      }
    }).catch((err) => {
      const why = (err && err.message ? String(err.message) : "upload failed").slice(0, 120);
      commit(s => ({ ...s, memories: (s.memories || []).map(m => m.id === id ? { ...m, uploading: false, failed: true, failMsg: why } : m) }));
      if (flashToast) flashToast(why, "warn");
    });
  }

  // retry a failed upload needs the original file, which we no longer hold after
  // a reload; so retry simply re-opens the picker for that quest.
  function onPick(e) {
    const file = e.target.files && e.target.files[0];
    const q = pendingQuest.current;
    pendingQuest.current = null;
    setBusyQuest(null);
    e.target.value = ""; // allow re-picking the same file
    if (file) {
      if (flashToast) flashToast("Saving your shot…", "info");
      addPhoto(file, q);
    }
  }
  function pick(questId) {
    pendingQuest.current = questId || null;
    setBusyQuest(questId || "free");
    if (flashToast) flashToast("Opening camera…", "info");
    if (fileRef.current) fileRef.current.click();
  }

  // grade a submission (peer grade now; Doctor Picme can add another later)
  function grade(memId, letter) {
    commit(s => ({ ...s, memories: (s.memories || []).map(m =>
      m.id === memId ? { ...m, touchedAt: Date.now(), grades: { ...(m.grades || {}), [who]: { g: letter, by: who, at: Date.now() } } } : m) }));
    setViewer(v => v ? { ...v, grades: { ...(v.grades || {}), [who]: { g: letter, by: who, at: Date.now() } } } : v);
    const opt = GRADE_BY[letter];
    if (flashToast && opt) flashToast(`Graded ${letter}: ${opt.quip} (+${opt.bonus})`, "earn");
  }

  // Summon Doctor Picme TM, the AI judge. Costs a fraction of a cent per call
  // (real money, from your Anthropic credit), so it's on-demand only, never
  // automatic. Async, never blocks anything. Stores his verdict on the photo.
  function summonPicme(mem) {
    if (!mem || !mem.url || picmeBusy) return;
    setPicmeBusy(true);
    if (flashToast) flashToast("Doctor Picme is judging…", "info");
    const q = mem.questId && QUEST_BY_ID[mem.questId];
    fetch("/api/picme", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: mem.url, questTitle: q ? q.title : "", quirk: q ? q.quirk : "" }),
    })
      .then(async (res) => {
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || data.error || `Picme error ${res.status}`);
        return data;
      })
      .then((data) => {
        const picme = { grade: data.grade || "B", verdict: data.verdict || "", notes: Array.isArray(data.notes) ? data.notes : [], at: Date.now() };
        commit(s => ({ ...s, memories: (s.memories || []).map(m => m.id === mem.id ? { ...m, touchedAt: Date.now(), picme } : m) }));
        setViewer(v => v && v.id === mem.id ? { ...v, picme } : v);
        if (flashToast) flashToast(`Doctor Picme says: ${picme.grade}`, "earn");
      })
      .catch((err) => {
        if (flashToast) flashToast(String(err.message || err).slice(0, 120), "warn");
      })
      .finally(() => setPicmeBusy(false));
  }

  // opt-in: share this photo to the author's Bluesky, filed under its quest
  // with a funny flight-board caption. Uses device creds; prompts login first.
  function shareMemoryToBluesky(mem) {
    if (!mem || !mem.url || bskyBusy || (mem.bsky && mem.bsky.url)) return;
    const creds = loadBskyCreds(mem.by);
    if (!creds) { setBskyLoginFor(mem); return; }
    doShareMem(mem, creds);
  }

  function doShareMem(mem, creds) {
    const logNo = (Number(sharedCount) || 0) + 1;
    const q = mem.questId && QUEST_BY_ID[mem.questId];
    setBskyBusy(true);
    if (flashToast) flashToast("Transmitting to Bluesky…", "info");
    fetch("/api/bluesky", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ who: mem.by, imageUrl: mem.url, questTitle: q ? q.title : "an unfiled moment", logNo, handle: creds.handle, apppw: creds.apppw }),
    })
      .then(async (res) => {
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) { clearBskyCreds(mem.by); throw new Error("Login expired, tap share again"); }
        if (!res.ok) throw new Error(data.detail || data.error || `Share failed ${res.status}`);
        return data;
      })
      .then((data) => {
        commit(s => ({ ...s, memories: (s.memories || []).map(m => m.id === mem.id ? { ...m, bsky: { url: data.url || "", logNo, at: Date.now() } } : m) }));
        setViewer(v => v && v.id === mem.id ? { ...v, bsky: { url: data.url || "", logNo, at: Date.now() } } : v);
        if (flashToast) flashToast(`Filed to Bluesky as log #${String(logNo).padStart(3, "0")}`, "earn");
      })
      .catch((err) => {
        if (flashToast) flashToast(String(err.message || err).slice(0, 120), "warn");
      })
      .finally(() => setBskyBusy(false));
  }

  function removeMem(memId) {
    commit(s => ({
      ...s,
      memories: (s.memories || []).filter(m => m.id !== memId),
      deletedMem: Array.from(new Set([...(s.deletedMem || []), memId])),
    }));
    setViewer(null);
  }

  return (
    <div>
      {/* hidden picker, camera-friendly on mobile */}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onPick} style={{ display: "none" }} />

      {/* header: score + tally */}
      <div className="mp-card" style={{ marginBottom: 14 }}>
        <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 26, color: "#1f6f8b", lineHeight: 1 }}>The Memory Wall</div>
        <div style={{ fontSize: 12, color: "#7a6a55", lineHeight: 1.5, marginTop: 6 }}>
          Snap the journey, earn points, grade each other. Every photo is a keepsake of the leap you took together.
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 90, background: "#eef6fb", border: "1px solid #cfe5f0", borderRadius: 12, padding: "9px 11px" }}>
            <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 22, color: "#1f9fb8", lineHeight: 1 }}>{score.pts}</div>
            <div style={{ fontFamily: monoF, fontSize: 8, color: "#7a98a4", letterSpacing: ".1em", marginTop: 2 }}>PHOTO POINTS</div>
          </div>
          <div style={{ flex: 1, minWidth: 90, background: "#fef3f7", border: "1px solid #f3cfdd", borderRadius: 12, padding: "9px 11px" }}>
            <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 22, color: "#e0577a", lineHeight: 1 }}>{score.capturedCount}/{score.total}</div>
            <div style={{ fontFamily: monoF, fontSize: 8, color: "#b87a8e", letterSpacing: ".1em", marginTop: 2 }}>QUESTS BAGGED</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 10, fontFamily: monoF, fontSize: 10, color: "#a0846a" }}>
          <span>📷 Hammy: <b style={{ color: "#ff7a3d" }}>{score.tally.Hammy}</b></span>
          <span>📷 Naddy: <b style={{ color: "#e0577a" }}>{score.tally.Naddy}</b></span>
          {score.fullSet && <span style={{ color: "#c9a227" }}>★ FULL SET +{FULL_SET_BONUS}</span>}
        </div>
      </div>

      {/* quest groups */}
      {QUEST_GROUPS.map(group => (
        <div key={group.group} style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 8, paddingLeft: 2 }}>
            <Glyph name={group.icon} size={15} color={group.accent} />
            <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: group.accent }}>{group.group}</span>
          </div>
          {group.quests.map(q => {
            const shots = byQuest.map[q.id] || [];
            const done = shots.length > 0;
            return (
              <div key={q.id} className="mp-card" style={{ marginBottom: 8, padding: "12px 13px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 15, color: "#3a2e2a" }}>{q.title}</span>
                      {done && <span style={{ fontFamily: monoF, fontSize: 8, color: "#1f9d6b" }}>✓</span>}
                    </div>
                    <div style={{ fontSize: 11.5, color: "#7a6a55", lineHeight: 1.45, marginTop: 2 }}>{q.brief}</div>
                    <div style={{ fontSize: 10, color: "#b09878", lineHeight: 1.4, marginTop: 3, fontStyle: "italic" }}>{q.quirk}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 16, color: q.accent }}>+{q.pts}</div>
                  </div>
                </div>
                {/* gallery */}
                {shots.length > 0 && (
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginTop: 10 }}>
                    {shots.map(m => <PhotoTile key={m.id} m={m} onTap={setViewer} />)}
                  </div>
                )}
                <button onClick={() => pick(q.id)} className="mp-btn" style={{
                  marginTop: 10, width: "100%", cursor: "pointer", fontFamily: cond, fontWeight: 700, fontSize: 13,
                  color: q.accent, background: `${q.accent}12`, border: `1px solid ${q.accent}33`, borderRadius: 10, padding: "8px 0",
                }}>
                  {busyQuest === q.id ? "Opening camera…" : (done ? "+ Add another" : "📸 Capture this")}
                </button>
              </div>
            );
          })}
        </div>
      ))}

      {/* free memories */}
      <div style={{ marginBottom: 16 }}>

          <Glyph name="star" size={15} color="#c98a3d" />

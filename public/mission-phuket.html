// helper: format a THB integer with thousands separators
function fmtTHB(n) {
  const v = Math.round(Number(n) || 0);
  return "฿" + v.toLocaleString("en-US");
}
// helper: convert THB -> SGD at the given rate, formatted
function fmtSGD(thb, rate) {
  const r = Number(rate) || FX_SGD_THB_DEFAULT;
  const v = (Number(thb) || 0) / r;
  return "S$" + v.toLocaleString("en-US", { maximumFractionDigits: 0 });
}

// build the default budget blob (used first time, before any edits)
function defaultBudget() {
  // cost-of-living defaults seed from the "Comfortable" preset (index 1)
  const col = {};
  COL_LINES.forEach(l => { col[l.id] = l.vals[1]; });
  // setup defaults seed from each item's val
  const setup = {};
  SETUP_GROUPS.forEach(g => g.items.forEach(it => { setup[it.id] = it.val; }));
  return { col, colPreset: "Comfortable", setup, fx: FX_SGD_THB_DEFAULT };
}

// readiness for a checklist section, given the live checked map
function sectionReadiness(sectionId, checked) {
  const sec = SECTIONS.find(s => s.id === sectionId);
  if (!sec) return { done: 0, total: 0 };
  let done = 0;
  sec.tasks.forEach(t => { if (checked[t.id]) done++; });
  return { done, total: sec.tasks.length };
}
// combined readiness across several sections
function combinedReadiness(sectionIds, checked) {
  let done = 0, total = 0;
  (sectionIds || []).forEach(id => {
    const r = sectionReadiness(id, checked);
    done += r.done; total += r.total;
  });
  return { done, total };
}

// ============================================================
// SAVE STATE — Phase 2: shared household save via the backend.
//
// The whole mission lives as ONE blob on the server (api/mission), so both
// phones share ticked boxes and a combined points pool. A localStorage mirror
// is kept purely as an offline cushion: if the signal drops at the airport,
// the app keeps working on the last known state and re-syncs when it returns.
//
// Flow:
//   - on open: pull the shared state from the server (fall back to local cache)
//   - on any change: write the full state up, and mirror it locally
//   - every few seconds: poll the server so the other phone's ticks appear
//
// "Last write wins" is fine for a two-person list: writes are near-instant and
// the poll is short, so the two phones converge within a few seconds.
// ============================================================
const SAVE_KEY = "mission-phuket-v1";   // local mirror key
const API_URL = "/api/mission";          // backend endpoint (same origin)
const POLL_MS = 4000;                    // how often to check the other phone

function emptyState() {
  return { checked: {}, spent: 0, owned: [], lastBy: {}, budget: defaultBudget(), updatedAt: 0 };
}

// local mirror (offline cushion only) ----------------------------------------
function loadLocal() {
  try {
    const raw = window.localStorage.getItem(SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* sandboxed or unavailable */ }
  return emptyState();
}
function saveLocal(state) {
  try { window.localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
  catch (e) { /* no-op */ }
}

// backend sync ---------------------------------------------------------------
// Returns the server state, or null if the server can't be reached.
async function fetchRemote() {
  try {
    const res = await fetch(API_URL, { method: "GET", cache: "no-store" });
    if (!res.ok) return null;
    const data = await res.json();
    return data && data.state ? data.state : null;
  } catch (e) { return null; }
}
// Pushes the full state up. Returns the saved server state, or null on failure.
async function pushRemote(state) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ state }),
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data && data.state ? data.state : null;
  } catch (e) { return null; }
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  // start from the local cache for an instant first paint; the server copy
  // replaces it a moment later once the mount sync completes.
  const [save, setSave] = useState(loadLocal);
  const [view, setView] = useState("home"); // home | checklist | costs | setup
  const [tab, setTab] = useState("checklist"); // within the checklist tool: checklist | store | progress
  const [openSection, setOpenSection] = useState("night-before");
  const [who, setWho] = useState(() => {
    try { return window.localStorage.getItem("mission-phuket-who") || "Hammy"; }
    catch (e) { return "Hammy"; }
  });
  const [toast, setToast] = useState(null);
  const [egg, setEgg] = useState(null); // easter egg overlay
  const [justChecked, setJustChecked] = useState(null);
  const [sync, setSync] = useState("connecting"); // connecting | online | offline
  const [unlocked, setUnlocked] = useState(() => {
    try { return window.localStorage.getItem("mission-phuket-unlocked") === "yes"; }
    catch (e) { return false; }
  });
  const saveRef = useRef(save);
  saveRef.current = save;

  function unlock() {
    try { window.localStorage.setItem("mission-phuket-unlocked", "yes"); } catch (e) {}
    setUnlocked(true);
  }

  // remember the who-toggle locally (it's a per-phone preference, not shared)
  useEffect(() => {
    try { window.localStorage.setItem("mission-phuket-who", who); } catch (e) {}
  }, [who]);

  // ---- on mount: pull the shared state, then poll for the other phone ----
  useEffect(() => {
    let alive = true;
    async function syncDown() {
      const remote = await fetchRemote();
      if (!alive) return;
      if (remote) {
        setSync("online");
        // only adopt the server copy if it's newer than what we're holding,
        // so a slow poll can't clobber a tick you just made on this phone.
        setSave(local => {
          const localT = local.updatedAt || 0;
          const remoteT = remote.updatedAt || 0;
          if (remoteT >= localT) { saveLocal(remote); return remote; }
          return local;
        });
      } else {
        setSync("offline");
      }
    }
    syncDown(); // immediate
    const id = setInterval(syncDown, POLL_MS);
    return () => { alive = false; clearInterval(id); };
  }, []);

  // ---- commit a new state: update screen, mirror locally, push to server ----
  // every user action routes through here so there's one clean write path.
  function commit(updater) {
    setSave(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const stamped = { ...next, updatedAt: Date.now() };
      saveLocal(stamped);
      // fire-and-forget push; flip the badge based on whether it lands
      pushRemote(stamped).then(saved => {
        setSync(saved ? "online" : "offline");
      });
      return stamped;
    });
  }

  // derived totals
  const checkedIds = save.checked || {};
  const doneTasks = ALL_TASKS.filter(t => checkedIds[t.id]);
  const doneCount = doneTasks.length;
  const earned = doneTasks.reduce((s, t) => s + t.p, 0);
  const balance = earned - (save.spent || 0);
  const rank = rankFor(earned);

  // budget always falls back to defaults, so a Phase-2 blob with no budget
  // key still works the first time the money tools are opened.
  const budget = save.budget || defaultBudget();
  // merge a partial budget change into the shared state via the one write path
  function setBudget(patch) {
    commit(s => {
      const cur = s.budget || defaultBudget();
      const next = typeof patch === "function" ? patch(cur) : { ...cur, ...patch };
      return { ...s, budget: next };
    });
  }

  function flashToast(msg, kind) {
    setToast({ msg, kind, id: uid() });
    setTimeout(() => setToast(t => (t && t.kind === kind ? null : t)), 2600);
  }

  // ---- easter egg engine: show a playful overlay, optionally unlock a secret sticker ----
  function triggerEgg(e) {
    setEgg(e);
    if (e.unlockSticker) {
      commit(s => {
        const owned = s.owned || [];
        if (owned.includes(e.unlockSticker)) return s;
        return { ...s, owned: [...owned, e.unlockSticker] };
      });
    }
  }
  function dismissEgg() { setEgg(null); }

  function toggleTask(task) {
    commit(s => {
      const checked = { ...(s.checked || {}) };
      const lastBy = { ...(s.lastBy || {}) };
      const wasOn = !!checked[task.id];
      if (wasOn) {
        delete checked[task.id];
        delete lastBy[task.id];
      } else {
        checked[task.id] = true;
        lastBy[task.id] = who;
      }
      return { ...s, checked, lastBy };
    });
    if (!checkedIds[task.id]) {
      setJustChecked(task.id);
      setTimeout(() => setJustChecked(j => (j === task.id ? null : j)), 700);
      flashToast(`+${task.p} pts banked`, "earn");
    }
  }

  function buySticker(st) {
    if ((save.owned || []).includes(st.id)) return;
    if (balance < st.cost) { flashToast("Not enough points yet", "warn"); return; }
    commit(s => ({ ...s, spent: (s.spent || 0) + st.cost, owned: [...(s.owned || []), st.id] }));
    flashToast(`Unlocked: ${st.name}`, "unlock");
  }

  function resetAll() {
    if (!window.confirm("Reset every tick, point, and unlocked sticker for BOTH of you? This clears the shared mission and can't be undone.")) return;
    commit({ checked: {}, spent: 0, owned: [], lastBy: {} });
    flashToast("Mission reset", "warn");
  }

  if (!unlocked) {
    return <Shell><LockScreen onUnlock={unlock} /></Shell>;
  }

  return (
    <Shell>
      {view === "home" && (
        <Home
          who={who} setWho={setWho} balance={balance} rank={rank} sync={sync}
          doneCount={doneCount} earned={earned}
          onOpen={setView} onEgg={triggerEgg}
        />
      )}

      {view !== "home" && (
        <ToolBar title={VIEW_TITLES[view]} onBack={() => setView("home")} sync={sync} />
      )}

      {view === "checklist" && (
        <>
          <ProgressBar doneCount={doneCount} earned={earned} balance={balance} />
          <Tabs tab={tab} setTab={setTab} ownedCount={(save.owned || []).length} />
          {tab === "checklist" && (
            <Checklist
              openSection={openSection} setOpenSection={setOpenSection}
              checkedIds={checkedIds} lastBy={save.lastBy || {}}
              onToggle={toggleTask} justChecked={justChecked} who={who}
            />
          )}
          {tab === "store" && (
            <Store owned={save.owned || []} balance={balance} onBuy={buySticker} earned={earned} />
          )}
          {tab === "progress" && (
            <ProgressTab
              save={save} doneCount={doneCount} earned={earned} balance={balance}
              rank={rank} onReset={resetAll}
            />
          )}
        </>
      )}

      {view === "costs" && (
        <CostOfLiving budget={budget} setBudget={setBudget} />
      )}

      {view === "setup" && (
        <SetupCosts budget={budget} setBudget={setBudget} />
      )}

      {view === "explore" && (
        <AroundPhuket onEgg={triggerEgg} />
      )}

      {view === "moveday" && (
        <MoveDay checked={checkedIds} onGoChecklist={() => setView("checklist")} />
      )}

      {egg && <EggOverlay egg={egg} onClose={dismissEgg} />}
      {toast && <Toast toast={toast} />}
      <Footer />
    </Shell>
  );
}

// ---------- Setup Costs tool ----------
function SetupCosts({ budget, setBudget }) {
  const setup = budget.setup || {};
  const fx = budget.fx || FX_SGD_THB_DEFAULT;
  const [openNote, setOpenNote] = useState(null);
  const [openGroups, setOpenGroups] = useState(() => {
    // first two groups open by default, rest collapsed to keep it tidy
    const o = {};
    SETUP_GROUPS.forEach((g, i) => { o[g.group] = i < 2; });
    return o;
  });

  // one-off total excludes the recurring car line; that's shown separately
  let oneOff = 0, recurring = 0;
  SETUP_GROUPS.forEach(g => g.items.forEach(it => {
    const v = Number(setup[it.id]) || 0;
    if (it.recurring) recurring += v; else oneOff += v;
  }));

  function setItem(id, v) {
    const n = Math.max(0, Math.round(Number(v) || 0));
    setBudget(cur => ({ ...cur, setup: { ...(cur.setup || {}), [id]: n } }));
  }
  function setFx(v) {
    const n = Number(v);
    if (n > 0) setBudget(cur => ({ ...cur, fx: n }));
  }
  function groupTotal(g) {
    return g.items.reduce((s, it) => s + (Number(setup[it.id]) || 0), 0);
  }

  return (
    <div className="mp-card">
      {/* total card */}
      <div style={{ background: "linear-gradient(160deg,#e6f7ee,#ffffff)", border: "1px solid #b5e3cb", borderRadius: 16, padding: "16px 16px", marginBottom: 14, boxShadow: "0 5px 16px #1f9d6b1a" }}>
        <div style={{ fontFamily: monoF, fontSize: 10, letterSpacing: ".14em", color: "#1f9d6b", textTransform: "uppercase" }}>One-off landing bill</div>

          <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 20, color: "#5a8a6f" }}>{fmtSGD(oneOff, fx)}</span>
        </div>
        <div style={{ fontSize: 11, color: "#5f8a72", marginTop: 6, lineHeight: 1.4 }}>

        Furniture, appliances, day-one kit and cat gear are anchored to live Big C prices (late June 2026). Promos shift, so treat them as starting points and edit freely. Tap ⓘ for the detail on any line.
      </div>

      {/* groups */}
      {SETUP_GROUPS.map(g => {
        const open = openGroups[g.group];
        return (
          <div key={g.group} style={{ marginBottom: 10 }}>
            <button onClick={() => setOpenGroups(s => ({ ...s, [g.group]: !s[g.group] }))} className="mp-btn" style={{
              width: "100%", textAlign: "left", cursor: "pointer", border: "1px solid #ffe1b0",
              background: "#ffffffdd", borderRadius: open ? "12px 12px 0 0" : 12, padding: "12px 14px",
              display: "flex", alignItems: "center", gap: 10, boxShadow: "0 3px 12px #ff9b5414",
            }}>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
                <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: "#3a2e2a", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{g.group}</span>
                {g.bigc && <span style={{ fontFamily: monoF, fontSize: 7.5, color: "#1f9d6b", background: "#dff5e8", border: "1px solid #9bdcb8", borderRadius: 3, padding: "2px 5px", letterSpacing: ".06em", flexShrink: 0 }}>BIG C</span>}
              </div>
              <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 14, color: "#15784f", flexShrink: 0 }}>{fmtTHB(groupTotal(g))}</span>
              <span style={{ fontSize: 13, color: "#c9b495", transform: open ? "rotate(180deg)" : "none", transition: "transform .2s", flexShrink: 0 }}>▾</span>
            </button>
            {open && (
              <div style={{ border: "1px solid #ffe1b0", borderTop: "none", borderRadius: "0 0 12px 12px", background: "#fffaf0", overflow: "hidden" }}>

                  <div key={it.id} style={{ borderBottom: i < g.items.length - 1 ? "1px solid #f4e6cf" : "none" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px" }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 13, color: "#3a2e2a", fontWeight: 500 }}>{it.label}</span>
                          {it.recurring && <span style={{ fontFamily: monoF, fontSize: 7.5, color: "#1f9fb8", border: "1px solid #b8e2ec", borderRadius: 3, padding: "1px 4px", letterSpacing: ".04em" }}>MONTHLY</span>}
                          <button onClick={() => setOpenNote(openNote === it.id ? null : it.id)} style={{
                            cursor: "pointer", border: "none", background: "transparent", color: "#c98a3d", fontFamily: monoF, fontSize: 11, padding: 0, lineHeight: 1 }}>ⓘ</button>
                        </div>
                        <div style={{ fontFamily: monoF, fontSize: 9, color: "#9a8a72", marginTop: 1 }}>{fmtSGD(setup[it.id] || 0, fx)}</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 3, flexShrink: 0 }}>
                        <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 14, color: "#15784f" }}>฿</span>
                        <input type="number" inputMode="numeric" value={setup[it.id] || 0}
                          onChange={e => setItem(it.id, e.target.value)} style={{
                            width: 72, textAlign: "right", fontFamily: cond, fontWeight: 700, fontSize: 15, color: "#3a2e2a",
                            border: "1px solid #ecd9bf", borderRadius: 8, padding: "5px 8px", background: "#ffffff",
                          }} />
                      </div>
                    </div>
                    {openNote === it.id && (
                      <div style={{ fontSize: 11, color: "#7a6a55", lineHeight: 1.45, padding: "0 14px 10px 14px", fontStyle: "italic" }}>{it.note}</div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}

      <div style={{ height: 4 }} />
      <FxControl fx={fx} setFx={setFx} />
    </div>
  );
}

// ---------- shared FX rate control ----------
function FxControl({ fx, setFx }) {
  return (
    <div style={{ background: "#fffaf0", border: "1px dashed #e0c79a", borderRadius: 12, padding: "11px 14px", display: "flex", alignItems: "center", gap: 10 }}>

// ---------- Around Phuket: the island explorer (Phase 4) ----------
function AroundPhuket({ onEgg }) {
  const [factIdx, setFactIdx] = useState(() => Math.floor(Math.random() * PHUKET_FACTS.length));
  const [openCat, setOpenCat] = useState(PHUKET_PLACES[0].cat);
  const catTaps = useRef(0);
  const gokuTaps = useRef(0);
  const factTaps = useRef(0);
  function nextFact() {
    setFactIdx(i => (i + 1) % PHUKET_FACTS.length);
    factTaps.current += 1;
    if (factTaps.current >= 12 && onEgg) {
      factTaps.current = 0;
      onEgg({ emoji: "🤓", title: "Certified Phuket Nerd", msg: "Twelve facts deep. You now know more island trivia than most tuk-tuk drivers. Wear it with pride.", confetti: true });
    }
  }
  function onCatTap(name) {
    if (!onEgg) return;
    catTaps.current += 1;
    const n = catTaps.current;
    const lines = {
      Smokey: "Smokey blinks slowly at you. In cat language, that is basically a love letter.",
      Rocket: "Rocket zooms off, then comes straight back. Classic Rocket.",
      Oscar: "Oscar is too dignified for this. He tolerates exactly one tap.",
      Goku: "Goku is powering up. Keep tapping him, something legendary might happen.",
      Selina: "Selina the queen demands tribute, not taps. Bold of you.",
    };
    if (name === "Goku") {
      gokuTaps.current += 1;
      if (gokuTaps.current >= 9) {
        gokuTaps.current = 0; catTaps.current = 0;
        onEgg({ emoji: "🌟", title: "THE GOLDEN GOKU", msg: "You did it. Goku has reached his final form. A legendary shiny is yours.", confetti: true, unlockSticker: "secret_goldcat" });
        return;
      }
    }
    if (n >= 7) {
      catTaps.current = 0;
      onEgg({ emoji: "😵‍💫", title: "Catnip Overload!", msg: "Seven taps and the cats are a bit dizzy now. Here's a sticker for your trouble.", confetti: true, unlockSticker: "secret_catnip" });
      return;
    }
    onEgg({ emoji: "🐱", title: name, msg: lines[name] || "Mrrp.", confetti: false, hold: 2200 });
  }
  return (
    <div className="mp-card">
      {/* hero scene */}
      <div style={{ borderRadius: 16, overflow: "hidden", marginBottom: 14, border: "1px solid #ffd59e", boxShadow: "0 6px 20px #ff9b5422" }}>
        <PhuketScene onCatTap={onCatTap} />
        <div style={{ background: "#ffffffdd", padding: "11px 14px" }}>
          <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 20, color: "#1f6f8b", lineHeight: 1 }}>Welcome to Ko Kaeo</div>
          <div style={{ fontSize: 12, color: "#9a8a72", marginTop: 3, lineHeight: 1.4 }}>The quiet northeast corner of the island. Glass-island calm, airport close, Patong chaos safely far away. Psst, try tapping the cats.</div>
        </div>
      </div>

      {/* fun fact card */}
      <button onClick={nextFact} className="mp-btn" style={{
        width: "100%", textAlign: "left", cursor: "pointer", marginBottom: 16,
        background: "linear-gradient(135deg,#fff4e0,#ffe9d0)", border: "1px solid #ffd591",
        borderRadius: 14, padding: "13px 15px", boxShadow: "0 4px 14px #ff9b5418",
      }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 5 }}>
          <span style={{ fontFamily: monoF, fontSize: 9.5, letterSpacing: ".16em", color: "#c98a3d", textTransform: "uppercase" }}>Island titbit</span>
          <span style={{ fontFamily: monoF, fontSize: 9, color: "#c98a3d" }}>tap for another ↻</span>
        </div>
        <div style={{ fontSize: 13.5, color: "#5a4a3a", lineHeight: 1.5 }} key={factIdx}>
          <span style={{ animation: "fadeUp .3s ease both", display: "inline-block" }}>{PHUKET_FACTS[factIdx]}</span>
        </div>
      </button>

      {/* place categories */}
      {PHUKET_PLACES.map(group => {
        const open = openCat === group.cat;
        return (
          <div key={group.cat} style={{ marginBottom: 10 }}>
            <button onClick={() => setOpenCat(open ? null : group.cat)} className="mp-btn" style={{
              width: "100%", textAlign: "left", cursor: "pointer", border: `1px solid ${group.accent}44`,
              background: open ? `${group.accent}12` : "#ffffffdd", borderRadius: open ? "12px 12px 0 0" : 12,
              padding: "12px 14px", display: "flex", alignItems: "center", gap: 11, boxShadow: "0 3px 12px #ff9b5410",
            }}>
              <div style={{ flexShrink: 0, width: 34, height: 34, borderRadius: 10, background: `${group.accent}1f`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Glyph name={group.icon} size={19} color={group.accent} />
              </div>
              <span style={{ flex: 1, fontFamily: cond, fontWeight: 700, fontSize: 17, color: "#3a2e2a" }}>{group.cat}</span>
              <span style={{ fontSize: 13, color: group.accent, transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }}>▾</span>
            </button>
            {open && (
              <div style={{ border: `1px solid ${group.accent}44`, borderTop: "none", borderRadius: "0 0 12px 12px", background: "#fffaf0", overflow: "hidden" }}>
                {group.spots.map((s, i) => (
                  <div key={s.name} style={{ padding: "11px 14px", borderBottom: i < group.spots.length - 1 ? "1px solid #f4e6cf" : "none" }}>
                    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}>
                      <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 15.5, color: "#1f6f8b" }}>{s.name}</span>
                      <span style={{ fontFamily: monoF, fontSize: 8.5, color: group.accent, background: `${group.accent}14`, border: `1px solid ${group.accent}33`, borderRadius: 4, padding: "2px 6px", whiteSpace: "nowrap", flexShrink: 0 }}>{s.tag}</span>
                    </div>
                    <div style={{ fontSize: 12, color: "#7a6a55", lineHeight: 1.5, marginTop: 4 }}>{s.note}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}

      <div style={{ fontSize: 10.5, color: "#a0846a", marginTop: 12, fontStyle: "italic", lineHeight: 1.45, textAlign: "center" }}>
        Distances are rough from Ko Kaeo. The island's only 48km top to bottom, so nothing's truly far.
      </div>
    </div>
  );
}

// ---------- Day of the Move: the door-to-door run sheet ----------
function MoveDay({ checked, onGoChecklist }) {
  const [openId, setOpenId] = useState(null);
  checked = checked || {};
  const allSections = [...new Set(MOVE_DAY.flatMap(s => s.sections || []))];
  const overall = combinedReadiness(allSections, checked);
  const remaining = overall.total - overall.done;
  const allDone = remaining === 0;
  return (
    <div className="mp-card">
      <div style={{ background: "linear-gradient(160deg,#efe4fb,#ffffff)", border: "1px solid #d8c4ec", borderRadius: 16, padding: "15px 16px", marginBottom: 12, boxShadow: "0 5px 16px #9a6cc41f" }}>
        <div style={{ fontFamily: monoF, fontSize: 10, letterSpacing: ".18em", color: "#9a6cc4", textTransform: "uppercase" }}>Wednesday · 01 July 2026</div>
        <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 26, color: "#5a3f7a", lineHeight: 1, marginTop: 3 }}>The big day, hour by hour</div>
        <div style={{ fontSize: 12, color: "#7a6a85", marginTop: 6, lineHeight: 1.5 }}>
          You two fly down. The cats take the scenic route by road. Everyone ends up at Habitown by the early hours. Tap any stop for the detail.
        </div>
      </div>

      {/* readiness summary banner */}
      <button onClick={onGoChecklist} className="mp-btn" style={{
        width: "100%", textAlign: "left", cursor: "pointer", marginBottom: 14,
        background: allDone ? "linear-gradient(135deg,#e3faec,#ffffff)" : "linear-gradient(135deg,#fff4e0,#fffaf0)",
        border: `1px solid ${allDone ? "#8fd9b0" : "#ffd591"}`, borderRadius: 14, padding: "13px 15px",
        boxShadow: "0 4px 14px #ff9b5414",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
          <div style={{ flexShrink: 0, width: 38, height: 38, borderRadius: "50%", background: allDone ? "#1f9d6b" : "#e6a23d", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Glyph name={allDone ? "check" : "box"} size={20} color="#fff" />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: allDone ? "#15784f" : "#a06a1a" }}>
              {allDone ? "Fully prepped, you're ready to fly" : `${remaining} thing${remaining === 1 ? "" : "s"} still to sort`}
            </div>
            <div style={{ fontSize: 11.5, color: "#8a7a6a", marginTop: 2, lineHeight: 1.4 }}>
              {allDone ? "Every checklist task tied to the move is ticked. Nice one." : `${overall.done} of ${overall.total} move-day tasks done. Tap to jump to the checklist.`}
            </div>
          </div>
          <span style={{ fontSize: 20, color: "#d8c4a4", flexShrink: 0 }}>›</span>
        </div>
      </button>

      <div style={{ display: "flex", gap: 14, marginBottom: 14, paddingLeft: 4 }}>
        <span style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: monoF, fontSize: 10, color: "#1f6f8b" }}>
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#1f6f8b", display: "inline-block" }} /> You two (air)
        </span>
        <span style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: monoF, fontSize: 10, color: "#e0577a" }}>
          <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#e0577a", display: "inline-block" }} /> The cats (road)
        </span>
      </div>

      <div style={{ position: "relative", paddingLeft: 6 }}>

          const open = openId === i;
          const isCat = s.track === "cats";
          const r = combinedReadiness(s.sections, checked);
          const stopReady = r.total === 0 || r.done === r.total;
          return (

              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>

                  <Glyph name={s.icon} size={17} color="#fff" />
                </div>
                {i < MOVE_DAY.length - 1 && <div style={{ width: 3, flex: 1, minHeight: 18, background: isCat ? "repeating-linear-gradient(#e0577a 0 4px, transparent 4px 8px)" : "#e6d8c4", marginTop: 2, marginBottom: 2 }} />}

              <button onClick={() => setOpenId(open ? null : i)} className="mp-btn" style={{
                flex: 1, textAlign: "left", cursor: "pointer", marginBottom: 8,
                background: open ? `${s.accent}10` : "#ffffffdd", border: `1px solid ${s.accent}33`,

                <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}>

                  <div style={{ display: "flex", gap: 5, alignItems: "center", flexShrink: 0 }}>

                    {r.total > 0 && (
                      <span style={{ fontFamily: monoF, fontSize: 7.5, letterSpacing: ".03em", borderRadius: 3, padding: "2px 6px",
                        color: stopReady ? "#15784f" : "#a06a1a",
                        background: stopReady ? "#e3faec" : "#fff2d6",
                        border: `1px solid ${stopReady ? "#9bdcb8" : "#ffd591"}` }}>
                        {stopReady ? "✓ READY" : `${r.done}/${r.total} PREP`}
                      </span>
                    )}

                  }}>{c.tel2 ? "Call EN" : "Call"}</a>

                    <a href={`tel:${c.tel2}`} style={{
                      fontFamily: monoF, fontSize: 10, color: "#1f6f8b", textDecoration: "none",

                    }}>Call TH</a>

          Tourist Police 1155 has English-speaking operators around the clock. Save these before you fly. Stay calm and friendly, it goes a long way here.
        </div>
      </div>

// ---------- Progress bar: a gate / runway meter ----------
function ProgressBar({ doneCount, earned, balance }) {
  const p = pct(doneCount, TOTAL_TASKS);
  return (
    <div className="mp-card" style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 14, padding: "13px 15px", marginBottom: 12, boxShadow: "0 6px 18px #ff9b5418" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
        <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: "#3a2e2a" }}>{doneCount} <span style={{ color: "#a0846a", fontSize: 13 }}>/ {TOTAL_TASKS} done</span></span>
        <span style={{ fontFamily: monoF, fontSize: 12, color: "#ff7a3d" }}>{p}%</span>

      <div style={{ height: 10, background: "#fff0d6", borderRadius: 6, overflow: "hidden", border: "1px solid #ffe1b0", position: "relative" }}>

}

// ---------- Checklist ----------
function Checklist({ openSection, setOpenSection, checkedIds, lastBy, onToggle, justChecked, who }) {
  return (
    <div>
      {SECTIONS.map(sec => {
        const done = sec.tasks.filter(t => checkedIds[t.id]).length;
        const all = sec.tasks.length;
        const complete = done === all;
        const open = openSection === sec.id;
        return (
          <div key={sec.id} className="mp-card" style={{ marginBottom: 10 }}>
            <button onClick={() => setOpenSection(open ? null : sec.id)} className="mp-btn" style={{
              width: "100%", textAlign: "left", cursor: "pointer", border: "1px solid #ffe1b0",
              background: complete ? "linear-gradient(100deg,#d6f5e3,#ffffff)" : "#ffffffdd",
              borderRadius: open ? "12px 12px 0 0" : 12, padding: "13px 15px",
              borderColor: complete ? "#8fd9b0" : "#ffe1b0",
              boxShadow: "0 4px 14px #ff9b5414",
              display: "flex", alignItems: "center", gap: 12,
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 11, flex: 1, minWidth: 0 }}>
                <Glyph name={sec.icon} color={complete ? "#1f9d6b" : "#ff7a3d"} />
                <div style={{ minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontFamily: monoF, fontSize: 10, color: "#bca889" }}>{sec.no}</span>
                    <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 18, color: "#3a2e2a", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{sec.title}</span>
                  </div>
                  <div style={{ fontSize: 11, color: "#9a8a72", marginTop: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{sec.sub}</div>
                </div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 15, color: complete ? "#1f9d6b" : "#bca889" }}>{done}/{all}</div>
                <div style={{ fontSize: 14, color: "#c9b495", transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }}>▾</div>
              </div>
            </button>

            {open && (
              <div style={{ border: "1px solid #ffe1b0", borderTop: "none", borderRadius: "0 0 12px 12px", background: "#fffaf0", overflow: "hidden" }}>
                {sec.tasks.map(task => {
                  const on = !!checkedIds[task.id];
                  const flash = justChecked === task.id;
                  const by = lastBy[task.id];
                  return (
                    <div
                      key={task.id}
                      role="button"
                      tabIndex={0}
                      className="mp-tick"
                      onClick={() => onToggle(task)}
                      onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onToggle(task); } }}
                      style={{
                        display: "flex", alignItems: "flex-start", gap: 11, padding: "11px 15px",
                        borderBottom: "1px solid #f4e6cf", cursor: "pointer",
                        background: on ? "#eafaf0" : "transparent",
                        transition: "background .2s",
                      }}
                    >
                      <div style={{
                        flexShrink: 0, width: 22, height: 22, borderRadius: 6, marginTop: 1,
                        border: on ? "none" : "2px solid #e0b97f",
                        background: on ? "linear-gradient(135deg,#39b87a,#2c9e64)" : "#fff",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        animation: flash ? "pop .4s ease" : "none",
                        boxShadow: on ? "0 0 10px #39b87a55" : "none",
                      }}>
                        {on && <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 6"/></svg>}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "baseline", gap: 7, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 14, color: on ? "#a89a82" : "#3a2e2a", textDecoration: on ? "line-through" : "none", lineHeight: 1.35, fontWeight: 500 }}>{task.t}</span>
                          {task.new && <span style={{ fontFamily: monoF, fontSize: 8, color: "#e6892b", background: "#fff2d6", border: "1px solid #ffd591", borderRadius: 3, padding: "1px 4px", letterSpacing: ".06em" }}>NEW</span>}
                        </div>
                        {task.note && <div style={{ fontSize: 11.5, color: "#a0846a", marginTop: 2, fontStyle: "italic" }}>{task.note}</div>}
                        {on && by && <div style={{ fontFamily: monoF, fontSize: 9.5, color: by === "Naddy" ? "#e85a9b" : "#e6892b", marginTop: 3, letterSpacing: ".04em" }}>ticked by {by}</div>}
                      </div>
                      <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 14, color: on ? "#39b87a" : "#c98a3d", flexShrink: 0, marginTop: 1 }}>+{task.p}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

  const ownedCount = owned.length;
  return (
    <div className="mp-card">
      <div style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 12, padding: "12px 15px", marginBottom: 14, boxShadow: "0 4px 14px #ff9b5414" }}>

        <div style={{ fontSize: 12, color: "#9a8a72", marginTop: 3, lineHeight: 1.5 }}>

                  boxShadow: "0 4px 14px #ff9b5414",

                  {have && <div style={{ position: "absolute", top: 8, right: 8, fontFamily: monoF, fontSize: 8, color: "#1f9d6b", background: "#d6f5e3", border: "1px solid #8fd9b0", borderRadius: 4, padding: "2px 5px", letterSpacing: ".08em" }}>OWNED</div>}

// ---------- Progress tab ----------
function ProgressTab({ save, doneCount, earned, balance, rank, onReset }) {
  const spent = save.spent || 0;
  const owned = save.owned || [];
  // per-person tick tally from lastBy
  const byTally = { Hammy: 0, Naddy: 0 };
  Object.values(save.lastBy || {}).forEach(name => { if (byTally[name] != null) byTally[name]++; });

  const stats = [
    ["Tasks done", `${doneCount} / ${TOTAL_TASKS}`, "#ff7a3d"],
    ["Points earned", `${earned}`, "#e6892b"],
    ["Points spent", `${spent}`, "#e85a9b"],
    ["Balance", `${balance}`, "#1f9d6b"],
    ["Stickers", `${owned.length} / ${STICKERS.length}`, "#1f9fb8"],
    ["Rank", rank.name, rank.color],
  ];

  return (
    <div className="mp-card">
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
        {stats.map(([l, v, c], i) => (
          <div key={i} style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 12, padding: "12px 14px", boxShadow: "0 4px 14px #ff9b5414" }}>
            <div style={{ fontFamily: monoF, fontSize: 9, color: "#a0846a", letterSpacing: ".1em", textTransform: "uppercase" }}>{l}</div>
            <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 22, color: c, marginTop: 3, lineHeight: 1 }}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 12, padding: "14px 15px", marginBottom: 14, boxShadow: "0 4px 14px #ff9b5414" }}>
        <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: "#3a2e2a", marginBottom: 10 }}>Who's pulling their weight</div>
        {["Hammy", "Naddy"].map(name => {
          const v = byTally[name];
          const total = byTally.Hammy + byTally.Naddy;
          const w = total === 0 ? 0 : Math.round((v / total) * 100);
          const col = name === "Naddy" ? "#e85a9b" : "#ff9b54";
          return (
            <div key={name} style={{ marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                <span style={{ color: col, fontWeight: 600 }}>{name}</span>
                <span style={{ color: "#9a8a72", fontFamily: monoF, fontSize: 11 }}>{v} ticks</span>
              </div>
              <div style={{ height: 7, background: "#fff0d6", borderRadius: 4, overflow: "hidden", border: "1px solid #ffe1b0" }}>
                <div style={{ width: `${w}%`, height: "100%", background: col, transition: "width .4s" }} />
              </div>
            </div>
          );
        })}
        <div style={{ fontSize: 10.5, color: "#a0846a", marginTop: 8, fontStyle: "italic", lineHeight: 1.4 }}>
          This splits live between the two of you. Tick on one phone and it shows up on the other within a few seconds.
        </div>
      </div>

      {/* milestone badges */}
      {(() => {
        const p = pct(doneCount, TOTAL_TASKS);
        const badges = [
          { id: "first", label: "First Steps", sub: "First task ticked", got: doneCount >= 1, icon: "check", col: "#ff7a3d" },
          { id: "q", label: "Wheels Turning", sub: "25% done", got: p >= 25, icon: "box", col: "#e6892b" },
          { id: "half", label: "Halfway There", sub: "50% done", got: p >= 50, icon: "bolt", col: "#1f9fb8" },
          { id: "three", label: "Final Approach", sub: "75% done", got: p >= 75, icon: "plane", col: "#1f9d6b" },
          { id: "done", label: "Touchdown", sub: "Every task done", got: p >= 100, icon: "palm", col: "#e0577a" },
          { id: "collector", label: "Sticker Hoarder", sub: "All stickers unlocked", got: owned.length >= STICKERS.length, icon: "star", col: "#c98a3d" },
        ];
        const gotCount = badges.filter(b => b.got).length;
        return (
          <div style={{ background: "#ffffffdd", border: "1px solid #ffe1b0", borderRadius: 12, padding: "14px 15px", marginBottom: 14, boxShadow: "0 4px 14px #ff9b5414" }}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 11 }}>
              <span style={{ fontFamily: cond, fontWeight: 700, fontSize: 16, color: "#3a2e2a" }}>Milestone badges</span>
              <span style={{ fontFamily: monoF, fontSize: 10, color: "#a0846a" }}>{gotCount}/{badges.length}</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9 }}>
              {badges.map(b => (
                <div key={b.id} style={{
                  textAlign: "center", padding: "11px 6px", borderRadius: 11,
                  background: b.got ? `${b.col}14` : "#f7f0e4",
                  border: `1px solid ${b.got ? b.col + "55" : "#ecdcc4"}`,
                  opacity: b.got ? 1 : 0.55,
                }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", margin: "0 auto 6px", display: "flex", alignItems: "center", justifyContent: "center",
                    background: b.got ? b.col : "#d8c9b0", boxShadow: b.got ? `0 3px 9px ${b.col}55` : "none" }}>
                    <Glyph name={b.icon} size={18} color="#fff" />
                  </div>
                  <div style={{ fontFamily: cond, fontWeight: 700, fontSize: 12.5, color: b.got ? "#3a2e2a" : "#9a8a72", lineHeight: 1.05 }}>{b.label}</div>
                  <div style={{ fontFamily: monoF, fontSize: 7.5, color: "#a0846a", marginTop: 2, lineHeight: 1.2 }}>{b.got ? b.sub : "locked"}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      <button onClick={onReset} className="mp-btn" style={{
        width: "100%", padding: "11px", borderRadius: 10, cursor: "pointer",
        background: "#fff0f3", color: "#d6486b", border: "1px solid #f5c6d4",
        fontFamily: cond, fontWeight: 700, fontSize: 14, letterSpacing: ".03em",
      }}>Reset the whole mission</button>
    </div>
  );
}

// ---------- Easter egg overlay: playful celebration popup ----------
function EggOverlay({ egg, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, egg.hold || 4200);
    return () => clearTimeout(t);
  }, [egg, onClose]);
  const confettiCount = egg.confetti === false ? 0 : 26;
  const cols = ["#ff7a3d", "#1f9fb8", "#1f9d6b", "#e0577a", "#ffce4a", "#9a6cc4"];
  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, zIndex: 60, display: "flex", alignItems: "center", justifyContent: "center",
      background: "rgba(40,28,20,0.34)", animation: "fadeUp .2s ease both", padding: 24,
    }}>
      {Array.from({ length: confettiCount }).map((_, i) => {
        const left = (i * 37) % 100;
        const delay = (i % 9) * 0.08;
        const col = cols[i % cols.length];
        const size = 6 + (i % 4) * 2;
        return (
          <span key={i} style={{
            position: "fixed", top: -16, left: `${left}%`, width: size, height: size,
            background: col, borderRadius: i % 2 ? "50%" : 2,
            animation: `eggfall ${1.6 + (i % 5) * 0.25}s ${delay}s ease-in forwards`, opacity: 0.95, pointerEvents: "none",
          }} />
        );
      })}
      <div style={{
        background: "#fffaf0", border: "2px solid #ffd59e", borderRadius: 22, padding: "26px 24px",
        maxWidth: 320, textAlign: "center", boxShadow: "0 18px 50px rgba(0,0,0,0.28)", animation: "eggpop .45s cubic-bezier(.2,1.3,.4,1) both",
      }}>
        <div style={{ fontSize: 52, lineHeight: 1, marginBottom: 8 }}>{egg.emoji || "🎉"}</div>
        <div style={{ fontFamily: cond, fontWeight: 800, fontSize: 24, color: "#ff7a3d", lineHeight: 1.05 }}>{egg.title}</div>
        <div style={{ fontSize: 13, color: "#7a6a55", lineHeight: 1.5, marginTop: 8 }}>{egg.msg}</div>
        {egg.unlockSticker && (
          <div style={{ fontFamily: monoF, fontSize: 9.5, letterSpacing: ".1em", color: "#1f9d6b", marginTop: 12, background: "#e3faec", border: "1px solid #9bdcb8", borderRadius: 8, padding: "7px 10px" }}>
            ★ SECRET STICKER UNLOCKED ★
          </div>
        )}
        <div style={{ fontFamily: monoF, fontSize: 9, color: "#b09878", marginTop: 14 }}>tap anywhere to close</div>
      </div>
    </div>
  );
}

// ---------- Toast ----------
function Toast({ toast }) {
  const colors = {
    earn: ["#1f9d6b", "#1f9d6b", "#ffffff"],
    unlock: ["#ff7a3d", "#ff7a3d", "#ffffff"],
    warn: ["#e85a9b", "#e85a9b", "#ffffff"],
  };
  const [bg, bd, fg] = colors[toast.kind] || colors.earn;
  return (
    <div style={{
      position: "fixed", left: "50%", bottom: 24, transform: "translateX(-50%)",
      background: bg, border: `1px solid ${bd}`, color: fg,
      padding: "10px 18px", borderRadius: 24, fontFamily: cond, fontWeight: 700, fontSize: 15, letterSpacing: ".03em",
      animation: "slidein .25s ease both", zIndex: 50, boxShadow: "0 8px 24px #3a2e2a33", whiteSpace: "nowrap",
    }}>{toast.msg}</div>
  );
}

// ---------- Footer ----------
function Footer() {
  return (
    <div style={{ textAlign: "center", marginTop: 24, fontFamily: monoF, fontSize: 9.5, color: "#b09a7e", letterSpacing: ".06em", lineHeight: 1.6 }}>
      <div style={{ color: "#9a8a72" }}>hammyLabs · Mission Phuket</div>
      <div style={{ color: "#bca889", marginTop: 2 }}>Built for the 1 July run. Made with love for Lil Naddy & the 5 cats.</div>
    </div>
  );
}

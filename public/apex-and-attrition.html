// ---------- Driver Market (the shortlist draft) ----------
function DriverMarket({ team, pool, chosen, money, onToggle, onReroll, onConfirm }) {
  const cost = chosen.reduce((s, d) => s + d.fee, 0);
  const remaining = Math.round((money - cost) * 10) / 10;
  const canConfirm = chosen.length === 2 && cost <= money;
  return (
    <div>
      <FinanceBar items={[
        { label: "Signing budget", value: `$${money}M` },
        { label: "Picked (2 needed)", value: `${chosen.length}/2` },
        { label: "Fees", value: `-$${Math.round(cost*10)/10}M`, tone: cost > 0 ? "bad" : "neutral" },
        { label: "Left", value: `$${remaining}M`, tone: remaining < 0 ? "bad" : "good" },
      ]} />
      <Eyebrow>{team.name} · Driver market</Eyebrow>
      <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 26, margin: "2px 0 4px" }}>Sign two drivers</h2>
      <p style={{ fontSize: 13, color: "#9aa0a6", lineHeight: 1.55, marginBottom: 4 }}>
        Speed wins races, but marketability brings sponsor money, and pay drivers fund your season while finishing last. Read the traits, they swing the whole year.
      </p>
      <div style={{ marginBottom: 12 }}>
        <button className="au-btn" onClick={onReroll} style={{ padding: "8px 14px", background: "#1c2029", color: "#fff", border: "1px solid #2a2f3a", borderRadius: 4, cursor: "pointer", fontSize: 12, fontFamily: mono }}>Shuffle the market</button>
      </div>

      {pool.map((d) => {
        const on = chosen.find((x) => x.id === d.id);
        const tooExpensive = !on && (cost + d.fee > money || chosen.length >= 2);
        return (
          <div key={d.id} className="au-card" onClick={() => onToggle(d)} style={{
            background: on ? "#13161d" : "#13161d",
            border: on ? "2px solid var(--accent)" : "1px solid #20242e",
            borderRadius: 6, padding: 14, marginBottom: 10, cursor: "pointer",
            opacity: tooExpensive ? 0.45 : 1,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
              <div style={{ display: "flex", gap: 11, alignItems: "center" }}>
                <OverallBadge d={d} />
                <div>
                  <div style={{ fontFamily: display, fontWeight: 800, fontSize: 18 }}>
                    {on ? "✓ " : ""}{(d.nation == null ? undefined : d.nation.flag)} {d.name}
                  </div>
                  <div style={{ fontSize: 11, color: "#9aa0a6" }}>"{d.nickname}" · {(d.nation == null ? undefined : d.nation.name)} · {d.archetype} · age {d.age}</div>
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontFamily: display, fontWeight: 800, color: "var(--accent)" }}>${d.fee}M</div>
                <div style={{ fontSize: 10, color: "#777" }}>signing fee</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 4, marginTop: 11 }}>
              <MiniStat label="Pace" val={d.pace} />
              <MiniStat label="Race" val={d.race} />
              <MiniStat label="Consist" val={d.consistency} />
              <MiniStat label="Market" val={`${d.marketability}%`} raw={d.marketability} />
            </div>
            <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <TraitChip trait={d.trait} />
              <span style={{ fontSize: 11, color: (d.trait == null ? undefined : d.trait.color) }}>{(d.trait == null ? undefined : d.trait.desc)}</span>
            </div>
            <div style={{ marginTop: 8, fontSize: 11, color: "#777", fontStyle: "italic" }}>{d.backstory} · {d.quirk}</div>
            <div style={{ marginTop: 6, fontSize: 11 }}>
              {d.isPayDriver
                ? <span style={{ color: "#1de9b6" }}>Pay driver: brings +${d.payBringsIn}M every race</span>
                : <span style={{ color: "#9aa0a6" }}>Running cost ${d.salary}M/race</span>}
            </div>
          </div>
        );
      })}
      <AccentBtn onClick={onConfirm} disabled={!canConfirm}>
        {chosen.length < 2 ? `Pick ${2 - chosen.length} more` : cost > money ? "Over budget" : "Confirm line-up →"}
      </AccentBtn>
    </div>
  );
}

// ---------- Preseason ----------
function Preseason({ team, money, tier, tierIdx, seasonNum, offers, appeal, sponsorPicks, toggleSponsor, marketingPicks, toggleMarketing, sponsorUpfront, spendable, spent, targetOptions, seasonTarget, setSeasonTarget, onStart }) {
  const remaining = Math.round((spendable - spent) * 10) / 10;
  const stars = appealStars(appeal);
  const runCost = perRaceCost({ ...team, tierIdx });
  const payIn = perRaceDriverIncome(team);
  return (
    <div>
      <FinanceBar items={[
        { label: "Bank", value: `$${money}M`, tone: money < 0 ? "bad" : "neutral" },
        { label: "+ Sponsor upfront", value: `$${sponsorUpfront}M`, tone: "good" },
        { label: "Spent", value: `-$${spent}M`, tone: spent > 0 ? "bad" : "neutral" },
        { label: "Left to spend", value: `$${remaining}M`, tone: remaining < 0 ? "bad" : "good" },
      ]} />
      <Eyebrow>{tier.name} · Season {seasonNum} · Pre-season</Eyebrow>
      <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 28, margin: "2px 0 8px" }}>{team.name}</h2>

      <Card style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: 11, color: "#9aa0a6" }}>Sponsor appeal</div>
          <StarRow stars={stars} />
          <div style={{ fontSize: 11, color: "#777", marginTop: 2 }}>{appeal}% · raise it with marketing & marketable drivers</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 11, color: "#9aa0a6" }}>Per-race running cost</div>
          <div style={{ fontFamily: display, fontWeight: 800, color: "#ff6b6b" }}>-${runCost}M</div>
          {payIn > 0 && <div style={{ fontSize: 11, color: "#1de9b6" }}>pay drivers +${payIn}M</div>}
        </div>
      </Card>

      {team.drivers.map((d) => <DriverCard key={d.id} d={d} compact />)}

      <SectionTitle n="01" t="Sponsors" sub="Pick up to 3. Upfront = cash now. Fixed = steady per race. Bonus = pays only if you hit the finish target." />
      {offers.sponsors.map((s) => {
        const on = sponsorPicks.find((x) => x.id === s.id);
        return (
          <PickRow key={s.id} on={on} onClick={() => toggleSponsor(s)} dim={s.locked}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontFamily: display, fontWeight: 700 }}>{s.name}</span>
              <StarRow stars={s.stars} locked={s.locked} />
            </div>
            <div style={{ fontSize: 12, color: on ? "#0a0c10" : "#9aa0a6", margin: "3px 0" }}>{s.desc}</div>
            {s.locked && <div style={{ fontSize: 11, color: "#ff6b6b" }}>Locked: needs higher appeal</div>}
          </PickRow>
        );
      })}

      <SectionTitle n="02" t="Marketing" sub="Spend now to lift team marketability, unlocking better sponsors this and future seasons." />
      {offers.marketing.map((m) => {
        const on = marketingPicks.find((x) => x.name === m.name);
        const afford = remaining >= m.cost || on;
        return (
          <PickRow key={m.name} on={on} onClick={() => toggleMarketing(m)} dim={!afford}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontFamily: display, fontWeight: 700 }}>{m.name}</span>
              <span style={{ color: on ? "#0a0c10" : "var(--accent)", fontWeight: 700 }}>${m.cost}M</span>
            </div>
            <div style={{ fontSize: 12, color: on ? "#0a0c10" : "#9aa0a6" }}>{m.flavor}</div>
          </PickRow>
        );
      })}

      <SectionTitle n="03" t="Chairman's target" sub="Promise the board a finish. Deliver and he's happy, fall short and his patience wears thin. Lose it entirely and you're out." />
      {targetOptions.map((o, i) => {
        const risk = o.confPenalty >= 16 ? "Heavy fallout if missed" : o.confPenalty >= 11 ? "Real fallout if missed" : "Modest fallout if missed";
        const reward = o.confReward >= 14 ? "big goodwill if met" : o.confReward >= 7 ? "solid goodwill if met" : "a little goodwill if met";
        return (
        <PickRow key={i} on={(seasonTarget == null ? undefined : seasonTarget.label) === o.label} onClick={() => setSeasonTarget(o)}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontFamily: display, fontWeight: 700 }}>{o.label}</span>
            <span style={{ color: (seasonTarget == null ? undefined : seasonTarget.label) === o.label ? "#0a0c10" : "var(--accent)", fontWeight: 700 }}>Finish P{o.pos} or better</span>
          </div>
          <div style={{ fontSize: 12, color: (seasonTarget == null ? undefined : seasonTarget.label) === o.label ? "#0a0c10" : "#9aa0a6", marginTop: 3, lineHeight: 1.5 }}>
            Prize: ${Math.round(o.payout * 10) / 10}M per place gained.<br />
            {reward.charAt(0).toUpperCase() + reward.slice(1)}, {risk.toLowerCase()}.
          </div>
        </PickRow>
        );
      })}

      <AccentBtn onClick={onStart} disabled={remaining < 0 || !seasonTarget}>
        {!seasonTarget ? "Pick a chairman target" : remaining < 0 ? "Over budget" : "Go racing →"}
      </AccentBtn>
    </div>
  );
}

function SectionTitle({ n, t, sub }) {
  return (
    <div style={{ margin: "22px 0 10px" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
        <span style={{ fontFamily: mono, color: "var(--accent)", fontSize: 13, fontWeight: 700 }}>{n}</span>
        <span style={{ fontFamily: display, fontWeight: 800, fontSize: 19 }}>{t}</span>
      </div>
      {sub && <div style={{ fontSize: 12, color: "#777", marginTop: 2, paddingLeft: 24 }}>{sub}</div>}
    </div>
  );
}
function PickRow({ children, on, onClick, dim }) {
  return (
    <div className="au-pick au-card" onClick={dim ? undefined : onClick} style={{
      background: on ? "var(--accent)" : "#13161d",
      color: on ? "#0a0c10" : "#e7e9ee",
      border: `1px solid ${on ? "var(--accent)" : "#20242e"}`,
      borderRadius: 5, padding: "11px 13px", marginBottom: 8,
      cursor: dim ? "not-allowed" : "pointer", opacity: dim ? 0.4 : 1,
    }}>{children}</div>
  );
}

// ---------- Season hub ----------
function SeasonHub({ team, aiTeams, calendar, raceIdx, tier, money, rumor, seasonNum, chairmanMsg, seasonTarget, onRace, event, onDismissEvent }) {
  const standings = [team, ...aiTeams].sort((a, b) => b.points - a.points);
  const next = calendar[raceIdx];
  const playerPos = standings.findIndex((t) => t.id === team.id) + 1;
  // driver standings across the whole field
  const driverStandings = [team, ...aiTeams]
    .flatMap((t) => t.drivers.map((d) => ({ name: d.name, flag: (d.nation == null ? undefined : d.nation.flag) || "", points: d.points || 0, color: t.color, teamName: t.name, isPlayer: t.isPlayer })))
    .sort((a, b) => b.points - a.points);
  const onTrack = seasonTarget && playerPos <= seasonTarget.pos;
  const evColor = event ? (event.kind === "good" ? "#1de9b6" : event.kind === "bad" ? "#ff6b6b" : "#9aa0a6") : null;
  return (
    <div>
      <FinanceBar items={[
        { label: "Bank", value: `$${money}M`, tone: money < 0 ? "bad" : money < 3 ? "neutral" : "good" },
        { label: "Per-race cost", value: `-$${perRaceCost({ ...team, tierIdx: tier.id })}M`, tone: "bad" },
        { label: "Target", value: seasonTarget ? `P${seasonTarget.pos}` : "-", tone: onTrack ? "good" : "bad" },
        { label: "Position", value: `P${playerPos}`, tone: onTrack ? "good" : "neutral" },
      ]} />

      <Eyebrow>{tier.name} · Season {seasonNum} · Round {raceIdx + 1} of {calendar.length}</Eyebrow>
      <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 26, margin: "2px 0 12px" }}>
        {next.flag} {next.name}
      </h2>

      {/* chairman's weekly word — the ONLY read on how secure the seat is */}
      {chairmanMsg && (
        <Card style={{ borderLeft: `3px solid ${chairmanMoodColor(chairmanMsg.mood)}`, marginBottom: 14 }}>
          <div style={{ fontSize: 10, letterSpacing: ".2em", color: chairmanMoodColor(chairmanMsg.mood), fontWeight: 700 }}>WORD FROM THE CHAIRMAN</div>
          <div style={{ fontSize: 13.5, marginTop: 5, lineHeight: 1.5, fontStyle: "italic", color: "#d7dade" }}>"{chairmanMsg.text}"</div>
        </Card>
      )}

      <Card style={{ background: `linear-gradient(135deg, var(--accent)22, #13161d)` }}>
        <div style={{ fontSize: 12, color: "#9aa0a6" }}>Up next · {next.trait} circuit</div>
        <div style={{ fontSize: 13, marginTop: 4 }}>
          {next.trait === "high-speed" && "Long straights reward raw pace. Get the power unit singing."}
          {next.trait === "technical" && "Twisty and punishing. Racecraft and car balance win here."}
          {next.trait === "street" && "Walls everywhere. Consistency keeps you out of the barriers."}
          {next.trait === "balanced" && "A bit of everything. The all-rounders thrive."}
        </div>
        {(team.nation == null ? undefined : team.nation.code) === next.country && (
          <div style={{ fontSize: 12, marginTop: 8, color: "#1de9b6", fontWeight: 700 }}>HOME RACE — crowd behind you, big performance & publicity boost.</div>
        )}
        {(team.nation == null ? undefined : team.nation.code) !== next.country && (team.nation == null ? undefined : team.nation.region) === next.region && (
          <div style={{ fontSize: 12, marginTop: 8, color: "#aed581", fontWeight: 700 }}>Home region — a small lift from the local fans.</div>
        )}
      </Card>

      {rumor && (
        <Card style={{ borderLeft: "3px solid var(--accent)" }}>
          <div style={{ fontSize: 10, letterSpacing: ".2em", color: "var(--accent)" }}>PADDOCK RUMOUR</div>
          <div style={{ fontSize: 13, marginTop: 4, fontStyle: "italic" }}>{rumor}</div>
        </Card>
      )}

      <SectionTitle n="" t="Team standings" />
      <Card style={{ padding: 0 }}>
        {standings.map((t, i) => {
          const mine = t.id === team.id;
          const promoZone = i < 2 && tier.id < 3;          // top 2 promoted
          const relZone = i >= standings.length - 2 && tier.id > 0; // bottom 2 relegated
          const zoneColor = promoZone ? "#1de9b6" : relZone ? "#ff6b6b" : null;
          return (
          <div key={t.id} style={{
            display: "flex", alignItems: "center", gap: 10, padding: "9px 13px",
            borderBottom: i < standings.length - 1 ? "1px solid #1a1d25" : "none",
            background: mine ? "var(--accent)26" : "transparent",
            boxShadow: mine ? "inset 3px 0 0 var(--accent)" : zoneColor ? `inset 3px 0 0 ${zoneColor}55` : "none",
          }}>
            <span style={{ width: 20, fontWeight: 700, color: i === 0 ? "var(--accent)" : "#777", fontSize: 13 }}>{i + 1}</span>
            <span style={{ width: 6, height: 22, background: t.color, borderRadius: 2 }} />
            <span style={{ flex: 1, fontFamily: display, fontWeight: mine ? 900 : 500, fontSize: 14, color: mine ? "var(--accent)" : "#fff" }}>
              {t.name}
            </span>
            {mine && <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".1em", color: "#0a0c10", background: "var(--accent)", padding: "2px 7px", borderRadius: 3 }}>YOU</span>}
            <span style={{ fontWeight: 700, fontSize: 14, color: mine ? "var(--accent)" : "#fff" }}>{t.points}</span>
          </div>
          );
        })}
      </Card>
      <div style={{ display: "flex", gap: 14, justifyContent: "center", fontSize: 11, color: "#777", marginTop: 6 }}>
        {tier.id < 3 && <span><span style={{ color: "#1de9b6" }}>▎</span> Top 2 promoted</span>}
        {tier.id > 0 && <span><span style={{ color: "#ff6b6b" }}>▎</span> Bottom 2 relegated</span>}
      </div>
      <div style={{ fontSize: 12, color: "#9aa0a6", textAlign: "center", marginTop: 6 }}>
        {seasonTarget ? `Chairman wants P${seasonTarget.pos} or better. You're currently P${playerPos}.` : ""}
      </div>

      <SectionTitle n="" t="Drivers' championship" />
      <Card style={{ padding: 0 }}>
        {driverStandings.slice(0, 10).map((d, i) => (
          <div key={i} style={{
            display: "flex", alignItems: "center", gap: 10, padding: "8px 13px",
            borderBottom: i < Math.min(9, driverStandings.length - 1) ? "1px solid #1a1d25" : "none",
            background: d.isPlayer ? "var(--accent)26" : "transparent",
            boxShadow: d.isPlayer ? "inset 3px 0 0 var(--accent)" : "none",
          }}>
            <span style={{ width: 20, fontWeight: 700, color: i === 0 ? "var(--accent)" : "#777", fontSize: 13 }}>{i + 1}</span>
            <span style={{ width: 5, height: 18, background: d.color, borderRadius: 2 }} />
            <span style={{ flex: 1, fontFamily: d.isPlayer ? display : mono, fontWeight: d.isPlayer ? 900 : 500, fontSize: 13, color: d.isPlayer ? "var(--accent)" : "#e7e9ee" }}>
              {d.flag} {d.name}
            </span>
            {d.isPlayer && <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: ".1em", color: "#0a0c10", background: "var(--accent)", padding: "1px 6px", borderRadius: 3 }}>YOU</span>}
            <span style={{ fontWeight: 700, fontSize: 13, color: d.isPlayer ? "var(--accent)" : "#fff" }}>{d.points}</span>
          </div>
        ))}
      </Card>

      {/* between-race paddock news from Nadine, sits just above the advance button */}
      {event && (
        <div className="au-card" style={{ background: `linear-gradient(135deg, ${evColor}22, #13161d)`, border: `1px solid ${evColor}66`, borderRadius: 8, padding: 16, marginTop: 18 }}>
          <div style={{ fontSize: 10, letterSpacing: ".2em", color: evColor }}>
            {event.beef ? "RIVALRY" : event.kind === "good" ? "GOOD NEWS" : event.kind === "bad" ? "BAD NEWS" : "PADDOCK LIFE"}
            <span style={{ color: "#777", marginLeft: 8 }}>· via Nadine Naomi</span>
          </div>
          <div style={{ fontSize: 14.5, marginTop: 6, lineHeight: 1.5, fontWeight: 600 }}>{event.text}</div>
          {event.msg && <div style={{ fontSize: 12.5, color: "#9aa0a6", marginTop: 4, fontStyle: "italic" }}>{event.msg}</div>}
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 10 }}>
            {event.money !== 0 && (
              <span style={{ fontSize: 12, fontWeight: 700, color: event.money > 0 ? "#1de9b6" : "#ff6b6b" }}>
                {event.money > 0 ? "+" : ""}{event.money}M
              </span>
            )}
            {event.effects.map((eff, i) => (
              <span key={i} style={{ fontSize: 12, fontWeight: 700, color: eff.includes("-") ? "#ff6b6b" : "#1de9b6" }}>{eff}</span>
            ))}
            {event.money === 0 && event.effects.length === 0 && (
              <span style={{ fontSize: 12, color: "#777" }}>No real effect, just paddock chatter.</span>
            )}
          </div>
          <AccentBtn ghost onClick={onDismissEvent}>Thanks, Nadine →</AccentBtn>
        </div>
      )}

      <AccentBtn onClick={onRace}>Race at {next.name} →</AccentBtn>
    </div>
  );
}

// ---------- Race result: live position board + popup highlights ----------
function RaceResult({ result, team, money, revealed, setRevealed, raceIdx, total, onNext }) {
  const timeline = result.timeline;
  const beat = Math.min(revealed, timeline.length - 1);
  const done = revealed >= timeline.length - 1;

  // current popup highlight: flags first (big moments), then player-relevant, then first
  const beatHs = (timeline[beat] == null ? undefined : timeline[beat].highlights) || [];
  const popup = beatHs.find((h) => h.type === "flag") || beatHs.find((h) => h.player) || beatHs[0] || null;

  useEffect(() => {
    if (revealed < timeline.length - 1) {
      // snappier pacing: enough to read the popup, quick when it's just flavour
      const hold = popup ? 1500 : 650;
      const t = setTimeout(() => setRevealed((r) => r + 1), hold);
      return () => clearTimeout(t);
    }
    // eslint-disable-next-line
  }, [revealed, timeline.length]);

  const board = (timeline[beat] == null ? undefined : timeline[beat].board) || result.finalBoard;
  const colorFor = (h) => h.type === "flag" ? h.flagColor : h.type === "good" ? "#1de9b6" : h.type === "bad" ? "#ff8a65" : h.type === "dnf" ? "#ff5252" : "#aab0b8";
  const iconFor = (type) => type === "good" ? "▲" : type === "bad" ? "▼" : type === "dnf" ? "✕" : type === "flag" ? "⚑" : "•";

  return (
    <div>
      <Eyebrow>{result.circuit.flag} {result.circuit.name} · Round {raceIdx + 1}/{total}{result.isWet ? " · WET" : ""}</Eyebrow>
      <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 24, margin: "2px 0 4px" }}>
        {done ? "Chequered flag" : "Live timing"}
      </h2>
      <div style={{ fontSize: 12, color: "#9aa0a6", marginBottom: 10 }}>
        {done ? "Final classification" : `Lap phase ${beat} of ${timeline.length - 1}`}
      </div>

      {/* popup highlight, one at a time */}
      <div style={{ minHeight: 64, marginBottom: 10 }}>
        {!done && popup && popup.type === "flag" && (
          <div key={`${beat}-${popup.text}`} style={{
            animation: "popIn 1.5s ease both",
            background: `${popup.flagColor}1f`,
            border: `1px solid ${popup.flagColor}`,
            borderLeft: `4px solid ${popup.flagColor}`,
            borderRadius: 6, padding: "12px 14px",
          }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: ".18em", color: popup.flagColor, marginBottom: 4 }}>⚑ {popup.flagLabel}</div>
            <div style={{ fontSize: 13.5, lineHeight: 1.45, color: "#e7e9ee" }}>{popup.text}</div>
          </div>
        )}
        {!done && popup && popup.type !== "flag" && (
          <div key={`${beat}-${popup.text}`} style={{
            animation: "popIn 1.5s ease both",
            background: popup.player ? "var(--accent)" : "#13161d",
            color: popup.player ? "#0a0c10" : "#e7e9ee",
            border: `1px solid ${popup.player ? "var(--accent)" : "#20242e"}`,
            borderRadius: 6, padding: "12px 14px", display: "flex", gap: 10, alignItems: "flex-start",
          }}>
            <span style={{ fontWeight: 700, fontSize: 13, color: popup.player ? "#0a0c10" : colorFor(popup) }}>{iconFor(popup.type)}</span>
            <span style={{ fontSize: 13.5, lineHeight: 1.45, fontWeight: popup.player ? 700 : 500 }}>{popup.text}</span>
          </div>
        )}
        {!done && !popup && (
          <div style={{ color: "#777", fontSize: 12, padding: "12px 0" }}>Cars settle into a rhythm...</div>
        )}
      </div>

      {/* live position board */}
      <Card style={{ padding: 0 }}>
        {board.map((row, i) => (
          <div key={row.driverId} style={{
            display: "flex", alignItems: "center", gap: 10, padding: "7px 12px",
            borderBottom: i < board.length - 1 ? "1px solid #1a1d25" : "none",
            background: row.isPlayer ? "var(--accent)26" : "transparent",
            boxShadow: row.isPlayer ? "inset 3px 0 0 var(--accent)" : "none",
            transition: "background .3s ease",
          }}>
            <span style={{ width: 22, fontWeight: 700, fontSize: 13, color: i === 0 ? "var(--accent)" : "#777" }}>P{row.pos}</span>
            <span style={{ width: 5, height: 20, background: row.color, borderRadius: 2 }} />
            <span style={{ flex: 1, fontSize: 13, fontWeight: row.isPlayer ? 900 : 500, fontFamily: row.isPlayer ? display : mono, color: row.dnf ? "#ff5252" : row.isPlayer ? "var(--accent)" : "#e7e9ee" }}>
              {row.name}
            </span>
            {row.isPlayer && !row.dnf && <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: ".1em", color: "#0a0c10", background: "var(--accent)", padding: "1px 6px", borderRadius: 3 }}>YOU</span>}
            {row.dnf
              ? <span style={{ fontSize: 10, color: "#ff5252", fontWeight: 700 }}>DNF</span>
              : <span style={{ fontSize: 11, color: "#666" }}>{row.teamName.length > 16 ? row.teamName.slice(0, 15) + "…" : row.teamName}</span>}
          </div>
        ))}
      </Card>

      {!done && (
        <>
          <div style={{ textAlign: "center", color: "var(--accent)", fontSize: 12, animation: "pulse 1s infinite", margin: "6px 0" }}>● live</div>
          <AccentBtn ghost onClick={() => setRevealed(timeline.length - 1)}>Skip to result</AccentBtn>
        </>
      )}

      {done && (
        <div className="au-card">
          <SectionTitle n="" t="Your race" />
          {result.playerRaceSummary.slice().sort((a, b) => a.pos - b.pos).map((p, i) => (
            <Card key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div>
                <span style={{ fontFamily: display, fontWeight: 800, fontSize: 16 }}>P{p.pos}</span>
                <span style={{ marginLeft: 10, fontSize: 14 }}>{p.driver}</span>
                {p.dnf && <span style={{ color: "#ff5252", fontSize: 11, marginLeft: 8 }}>DNF</span>}
              </div>
              <span style={{ color: "var(--accent)", fontWeight: 700 }}>+{p.pts} pts</span>
            </Card>
          ))}

          {/* race ledger */}
          <div style={{ marginTop: 8, padding: 14, background: "#0f1217", borderRadius: 6, border: "1px solid #20242e" }}>
            <div style={{ fontSize: 11, letterSpacing: ".15em", color: "#777", marginBottom: 8 }}>RACE LEDGER</div>
            {result.ledger.map((l, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "3px 0" }}>
                <span style={{ color: "#aab0b8" }}>{l.label}</span>
                <span style={{ color: l.amt >= 0 ? "#1de9b6" : "#ff6b6b", fontWeight: 700 }}>{l.amt >= 0 ? "+" : ""}{l.amt}M</span>
              </div>
            ))}
            <div style={{ borderTop: "1px solid #20242e", marginTop: 7, paddingTop: 7, display: "flex", justifyContent: "space-between", fontSize: 14, fontWeight: 800 }}>
              <span>Net this round</span>
              <span style={{ color: result.net >= 0 ? "#1de9b6" : "#ff6b6b" }}>{result.net >= 0 ? "+" : ""}{result.net}M</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#9aa0a6", marginTop: 4 }}>
              <span>Bank now</span>
              <span style={{ color: money < 0 ? "#ff6b6b" : "#fff" }}>${money}M</span>
            </div>
          </div>

          <AccentBtn onClick={onNext}>{raceIdx + 1 >= total ? "Season finale →" : "Next round →"}</AccentBtn>
        </div>
      )}
    </div>
  );
}

// ---------- Season end ----------
function SeasonEnd({ result, team, tier, seasonNum, money, onContinue }) {
  const { standings, playerPos, total, promoted, relegated, champion, prize, facts, hint,
    metTarget, target, mktDelta, newTeamMkt, confDelta, newConf, bankrupt, fired } = result;
  const banner = champion ? "WORLD CHAMPIONS" : promoted ? "PROMOTED" : relegated ? "RELEGATED" : `P${playerPos} FINISH`;
  const bannerColor = champion || promoted ? "#1de9b6" : relegated ? "#ff5252" : "var(--accent)";
  return (
    <div>
      <Eyebrow>{tier.name} · Season {seasonNum} complete</Eyebrow>
      <div className="au-card" style={{ textAlign: "center", padding: "28px 16px", borderRadius: 8, background: `linear-gradient(135deg, ${bannerColor}22, #13161d)`, border: `1px solid ${bannerColor}55`, marginBottom: 14 }}>
        <div style={{ fontFamily: display, fontWeight: 900, fontSize: 34, color: bannerColor, letterSpacing: ".02em" }}>{banner}</div>
        <div style={{ fontSize: 14, color: "#9aa0a6", marginTop: 6 }}>Finished P{playerPos} of {total} · {team.points} points · +${prize}M prize</div>
      </div>

      {/* chairman verdict */}
      <Card style={{ borderLeft: `3px solid ${metTarget ? "#1de9b6" : "#ff6b6b"}` }}>
        <div style={{ fontSize: 10, letterSpacing: ".2em", color: metTarget ? "#1de9b6" : "#ff6b6b" }}>CHAIRMAN VERDICT</div>
        <div style={{ fontSize: 14, marginTop: 5, fontWeight: 700 }}>
          {metTarget ? `Target met (P${target.pos} or better). Pleased.` : `Target missed (wanted P${target.pos}). Not happy.`}
        </div>
        <div style={{ display: "flex", gap: 18, marginTop: 10 }}>
          <div>
            <div style={{ fontSize: 10, color: "#777" }}>CHAIRMAN MOOD</div>
            <div style={{ fontWeight: 800, color: chairmanMoodColor(chairmanMood(newConf, metTarget)), textTransform: "capitalize" }}>
              {chairmanMood(newConf, metTarget)}{confDelta >= 0 ? " ↑" : " ↓"}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 10, color: "#777" }}>TEAM MARKETABILITY</div>
            <div style={{ fontWeight: 800, color: mktDelta >= 0 ? "#1de9b6" : "#ff6b6b" }}>{newTeamMkt}% ({mktDelta >= 0 ? "+" : ""}{mktDelta})</div>
          </div>
          <div>
            <div style={{ fontSize: 10, color: "#777" }}>BANK</div>
            <div style={{ fontWeight: 800, color: money < 0 ? "#ff6b6b" : "#fff" }}>${money}M</div>
          </div>
        </div>
        {(bankrupt || fired) && (
          <div style={{ marginTop: 10, fontSize: 13, color: "#ff6b6b", fontWeight: 700 }}>
            {bankrupt ? "The team has run out of money." : "The chairman has lost all confidence in you."}
          </div>
        )}
      </Card>

      <SectionTitle n="" t="Final standings" />
      <Card style={{ padding: 0 }}>
        {standings.map((t, i) => (
          <div key={t.id} style={{ display: "flex", gap: 10, padding: "8px 13px", alignItems: "center", borderBottom: i < standings.length - 1 ? "1px solid #1a1d25" : "none", background: t.id === team.id ? "var(--accent)18" : "transparent" }}>
            <span style={{ width: 18, color: i === 0 ? "var(--accent)" : "#777", fontWeight: 700, fontSize: 13 }}>{i + 1}</span>
            <span style={{ width: 6, height: 20, background: t.color, borderRadius: 2 }} />
            <span style={{ flex: 1, fontFamily: display, fontWeight: t.id === team.id ? 800 : 500, fontSize: 13 }}>{t.name}</span>
            <span style={{ fontWeight: 700 }}>{t.points}</span>
          </div>
        ))}
      </Card>

      <SectionTitle n="" t="Season titbits" />
      {facts.map((f, i) => (
        <div key={i} style={{ display: "flex", gap: 8, fontSize: 13, color: "#cbd0d8", padding: "4px 0" }}>
          <span style={{ color: "var(--accent)" }}>›</span>{f}
        </div>
      ))}

      <Card style={{ marginTop: 16, borderLeft: "3px solid var(--accent)" }}>
        <div style={{ fontSize: 10, letterSpacing: ".2em", color: "var(--accent)" }}>ENGINEER'S HINT</div>
        <div style={{ fontSize: 13, marginTop: 5, lineHeight: 1.5 }}>{hint}</div>
      </Card>

      <AccentBtn onClick={onContinue}>
        {(bankrupt || fired) ? "Face the music →" : "Awards ceremony →"}
      </AccentBtn>
    </div>
  );
}

// ---------- Postseason ----------
function Postseason({ team, money, tierIdx, appeal, gridCars, difficulty, lastUpgrade, psMarket, onOpenMarket, onSignMarket, onCloseMarket, onUpgrade, onNext }) {
  return (
    <div>
      <FinanceBar items={[
        { label: "Bank", value: `$${money}M`, tone: money < 0 ? "bad" : "good" },
        { label: "Appeal", value: `${appeal}%` },
        { label: "Tier", value: TIERS[tierIdx].name },
      ]} />
      <Eyebrow>Post-season · {TIERS[tierIdx].name}</Eyebrow>
      <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 26, margin: "2px 0 12px" }}>Rebuild & reload</h2>

      <SectionTitle n="01" t="Driver line-up" sub="Swap a seat. Browse free agents, mind the signing fee and the running cost." />
      {team.drivers.map((d, i) => (
        <Card key={d.id}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <OverallBadge d={d} />
              <div>
                <div style={{ fontFamily: display, fontWeight: 800, fontSize: 16 }}>{(d.nation == null ? undefined : d.nation.flag)} {d.name}</div>
                <div style={{ fontSize: 11, color: "#9aa0a6" }}>"{d.nickname}" · {d.archetype}</div>
              </div>
            </div>
            <TraitChip trait={d.trait} />
          </div>
          <div style={{ display: "flex", gap: 4, margin: "10px 0 8px" }}>
            <MiniStat label="Pace" val={d.pace} />
            <MiniStat label="Race" val={d.race} />
            <MiniStat label="Consist" val={d.consistency} />
            <MiniStat label="Market" val={`${d.marketability}%`} raw={d.marketability} />
          </div>
          <AccentBtn ghost onClick={() => onOpenMarket(i)}>Browse replacements for seat {i + 1}</AccentBtn>
        </Card>
      ))}

      <SectionTitle n="02" t="Car development" sub="$6M per upgrade, banked for good. See how each one moves you up the grid's pecking order." />
      {(() => {
        // build the full field of cars (player + the rivals they'll face next season)
        const field = [{ ...team, isPlayer: true }, ...gridCars.map((c) => ({ ...c, isPlayer: false }))];
        const ranked = field
          .map((c) => ({ name: c.name, color: c.color, isPlayer: c.isPlayer, idx: carIndex(c, difficulty) }))
          .sort((a, b) => b.idx - a.idx);
        const total = ranked.length;
        const myRank = ranked.findIndex((c) => c.isPlayer) + 1;
        const best = ranked[0].idx, worst = ranked[ranked.length - 1].idx;
        const span = Math.max(1, best - worst);
        const myIdx = ranked[myRank - 1].idx;

        // where would a typical upgrade (avg +4.5 to a stat) land us?
        const previewRank = (stat) => {
          const bump = stat === "reliability" ? 4.5 * 0.15 : 4.5 * 0.5;
          const newIdx = myIdx + bump;
          let r = 1;
          ranked.forEach((c) => { if (!c.isPlayer && c.idx > newIdx) r++; });
          return r;
        };
        const ordinal = (n) => {
          const s = ["th", "st", "nd", "rd"], v = n % 100;
          return n + (s[(v - 20) % 10] || s[v] || s[0]);
        };
        const pPace = previewRank("carPace"), pRace = previewRank("carRace"), pRel = previewRank("reliability");
        const canAfford = money >= 6;

        return (
          <>
            <Card style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                <span style={{ fontSize: 12, color: "#9aa0a6" }}>Your car on the grid</span>
                <span style={{ fontFamily: display, fontWeight: 900, fontSize: 16, color: ratingColor(100 - (myRank - 1) / Math.max(1, total - 1) * 100) }}>
                  {ordinal(myRank)} of {total} fastest
                </span>
              </div>
              {/* grid bar: every car as a tick, player highlighted */}
              <div style={{ position: "relative", height: 34, background: "#0a0c10", borderRadius: 6, border: "1px solid #20242e", overflow: "hidden" }}>
                <div style={{ position: "absolute", left: 8, top: 4, fontSize: 8, color: "#555", letterSpacing: ".1em" }}>SLOWER</div>
                <div style={{ position: "absolute", right: 8, top: 4, fontSize: 8, color: "#555", letterSpacing: ".1em" }}>FASTER</div>
                {ranked.map((c, i) => {
                  const pct = ((c.idx - worst) / span) * 100;
                  return (
                    <div key={i} title={c.name} style={{
                      position: "absolute", left: `${4 + pct * 0.92}%`, bottom: 5,
                      width: c.isPlayer ? 5 : 3, height: c.isPlayer ? 22 : 13,
                      background: c.isPlayer ? "var(--accent)" : c.color, opacity: c.isPlayer ? 1 : 0.6,
                      borderRadius: 2, transform: "translateX(-50%)",
                      boxShadow: c.isPlayer ? "0 0 6px var(--accent)" : "none",
                    }} />
                  );
                })}
              </div>
              <div style={{ fontSize: 11, color: "#777", marginTop: 7 }}>
                The tall glowing bar is you. Each tick is a rival's car. Upgrades shove you rightward, toward the front.
              </div>
            </Card>

            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <AccentBtn ghost onClick={() => onUpgrade("carPace")} disabled={!canAfford}>+ Pace</AccentBtn>
                <div style={{ textAlign: "center", fontSize: 10, color: canAfford ? (pPace < myRank ? "#1de9b6" : "#777") : "#555", marginTop: 4 }}>
                  {canAfford ? (pPace < myRank ? `→ up to ${ordinal(pPace)}` : "holds position") : "need $6M"}
                </div>
              </div>
              <div style={{ flex: 1 }}>
                <AccentBtn ghost onClick={() => onUpgrade("carRace")} disabled={!canAfford}>+ Racecraft</AccentBtn>
                <div style={{ textAlign: "center", fontSize: 10, color: canAfford ? (pRace < myRank ? "#1de9b6" : "#777") : "#555", marginTop: 4 }}>
                  {canAfford ? (pRace < myRank ? `→ up to ${ordinal(pRace)}` : "holds position") : "need $6M"}
                </div>
              </div>
              <div style={{ flex: 1 }}>
                <AccentBtn ghost onClick={() => onUpgrade("reliability")} disabled={!canAfford}>+ Reliability</AccentBtn>
                <div style={{ textAlign: "center", fontSize: 10, color: "#777", marginTop: 4 }}>
                  {canAfford ? "fewer DNFs" : "need $6M"}
                </div>
              </div>
            </div>

            {/* the crew reports back on the last upgrade roll */}
            {lastUpgrade && (() => {
              const tc = lastUpgrade.tone === "good" ? "#1de9b6" : lastUpgrade.tone === "bad" ? "#ff6b6b" : "#ffd54f";
              return (
                <div style={{ marginTop: 12, padding: "13px 15px", borderRadius: 8, background: `${tc}14`, border: `1px solid ${tc}55`, borderLeft: `4px solid ${tc}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <span style={{ fontSize: 10, letterSpacing: ".18em", color: tc, fontWeight: 800 }}>{lastUpgrade.headline.toUpperCase()}</span>
                    <span style={{ fontFamily: display, fontWeight: 900, fontSize: 14, color: tc }}>
                      {lastUpgrade.label} {lastUpgrade.gain > 0 ? `+${lastUpgrade.gain}` : "+0"}
                    </span>
                  </div>
                  <div style={{ fontSize: 13, marginTop: 6, lineHeight: 1.5, fontStyle: "italic", color: "#d7dade" }}>
                    "{lastUpgrade.quote}"
                  </div>
                </div>
              );
            })()}

            <Card style={{ marginTop: 14 }}>
              <div style={{ fontSize: 12, color: "#9aa0a6", marginBottom: 6 }}>Your car so far (carries over every season)</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 5, fontSize: 12.5 }}>
                <div><b style={{ color: ratingColor(50 + team.carPace * 2) }}>Pace +{team.carPace}</b> <span style={{ color: "#9aa0a6" }}>straight-line speed, shines on high-speed tracks</span></div>
                <div><b style={{ color: ratingColor(50 + team.carRace * 2) }}>Racecraft +{team.carRace}</b> <span style={{ color: "#9aa0a6" }}>cornering and wheel-to-wheel, shines on technical tracks</span></div>
                <div><b style={{ color: ratingColor(50 + team.reliability * 2) }}>Reliability {team.reliability >= 0 ? "+" : ""}{Math.round(team.reliability)}</b> <span style={{ color: "#9aa0a6" }}>fewer mechanical DNFs across the season</span></div>
              </div>
            </Card>
          </>
        );
      })()}

      <AccentBtn onClick={onNext}>Begin next season →</AccentBtn>

      {/* seat market modal */}
      {psMarket && (
        <div onClick={onCloseMarket} style={{ position: "fixed", inset: 0, background: "rgba(5,6,9,0.82)", zIndex: 50, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: 16, overflowY: "auto" }}>
          <div onClick={(e) => e.stopPropagation()} style={{ maxWidth: 560, width: "100%", marginTop: 30 }}>
            <h3 style={{ fontFamily: display, fontWeight: 900, fontSize: 22, color: "#fff" }}>Free agents · seat {psMarket.slotIdx + 1}</h3>
            <p style={{ fontSize: 12, color: "#9aa0a6", marginBottom: 10 }}>Bank ${money}M. Tap to sign, or close to keep your current driver.</p>
            {psMarket.pool.map((d) => {
              const afford = money >= d.fee;
              return (
                <div key={d.id} onClick={() => afford && onSignMarket(d)} className="au-card" style={{
                  background: "#13161d", border: "1px solid #20242e", borderRadius: 6, padding: 13, marginBottom: 9,
                  cursor: afford ? "pointer" : "not-allowed", opacity: afford ? 1 : 0.45,
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      <OverallBadge d={d} />
                      <div>
                        <span style={{ fontFamily: display, fontWeight: 800 }}>{(d.nation == null ? undefined : d.nation.flag)} {d.name}</span>
                        <div style={{ fontSize: 11, color: "#9aa0a6" }}>{d.archetype} · {d.quirk}</div>
                      </div>
                    </div>
                    <span style={{ color: "var(--accent)", fontWeight: 700 }}>${d.fee}M</span>
                  </div>
                  <div style={{ display: "flex", gap: 4, margin: "8px 0" }}>
                    <MiniStat label="Pace" val={d.pace} />
                    <MiniStat label="Race" val={d.race} />
                    <MiniStat label="Consist" val={d.consistency} />
                    <MiniStat label="Market" val={`${d.marketability}%`} raw={d.marketability} />
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <TraitChip trait={d.trait} />
                    <span style={{ fontSize: 11, color: (d.trait == null ? undefined : d.trait.color) }}>{(d.trait == null ? undefined : d.trait.desc)}</span>
                  </div>
                  <div style={{ marginTop: 6, fontSize: 11 }}>
                    {d.isPayDriver
                      ? <span style={{ color: "#1de9b6" }}>Brings +${d.payBringsIn}M/race</span>
                      : <span style={{ color: "#777" }}>Salary ${d.salary}M/race</span>}
                  </div>
                </div>
              );
            })}
            <AccentBtn ghost onClick={onCloseMarket}>Keep current driver</AccentBtn>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- Sacked (failure end) ----------
function Sacked({ result, team, history, onRestart }) {
  return (
    <div>
      <div className="au-card" style={{ textAlign: "center", padding: "44px 16px", marginTop: 24 }}>
        <div style={{ width: 48, height: 3, background: "#ff6b6b", margin: "0 auto 18px", borderRadius: 2 }} />
        <h1 style={{ fontFamily: display, fontWeight: 900, fontSize: 34, margin: "8px 0", color: "#ff6b6b", letterSpacing: ".04em" }}>
          {result.bankrupt ? "BANKRUPT" : "SACKED"}
        </h1>
        <p style={{ color: "#9aa0a6", fontSize: 14, maxWidth: 440, margin: "0 auto", lineHeight: 1.55 }}>
          {result.bankrupt
            ? `${team.name} burned through the budget and the bank pulled the plug. Money discipline matters, even a quick car can't outrun red ink.`
            : `The chairman ran out of patience after one missed target too many. ${team.name} will race on without you.`}
        </p>
      </div>
      <SectionTitle n="" t="How it went" />
      <Card style={{ padding: 0 }}>
        {history.map((h, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "9px 13px", borderBottom: i < history.length - 1 ? "1px solid #1a1d25" : "none", fontSize: 13 }}>
            <span>S{h.season} · {h.tier}</span>
            <span style={{ color: h.promoted ? "#1de9b6" : h.relegated ? "#ff5252" : "#9aa0a6" }}>
              P{h.pos} · {h.points}pts {h.promoted ? "▲" : h.relegated ? "▼" : ""}
            </span>
          </div>
        ))}
      </Card>
      <Card style={{ marginTop: 12, borderLeft: "3px solid var(--accent)" }}>
        <div style={{ fontSize: 10, letterSpacing: ".2em", color: "var(--accent)" }}>NEXT TIME</div>
        <div style={{ fontSize: 13, marginTop: 5, lineHeight: 1.5 }}>
          {result.bankrupt
            ? "Take a fixed-payment sponsor, keep a cash buffer, and don't sign two pricey drivers at once."
            : "Set a chairman target you can actually hit. Aim low early to build up first."}
        </div>
      </Card>
      <AccentBtn onClick={onRestart}>Start a new career →</AccentBtn>
    </div>
  );
}

// ---------- Offseason world news (Nadine briefs you) ----------
function Offseason({ news, comms, tierName, onContinue }) {
  const { retirements, bankruptcies, foundations, debuts, playerRetirements } = news;
  const dbs = debuts || [];
  const nothing = !retirements.length && !bankruptcies.length && !foundations.length && !playerRetirements.length && !dbs.length;
  return (
    <div>
      <Eyebrow>Off-season · paddock briefing</Eyebrow>
      <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 26, margin: "2px 0 10px" }}>While you were resting...</h2>

      <Card style={{ borderLeft: "3px solid var(--accent)", background: "var(--accent)10" }}>
        <div style={{ fontSize: 11, color: "var(--accent)", fontWeight: 700 }}>{comms.toUpperCase()} · TEAM COMMS</div>
        <div style={{ fontSize: 13.5, marginTop: 5, lineHeight: 1.5, fontStyle: "italic" }}>
          "Morning! {comms} here. Here's what shifted across the grid over the break."
        </div>
      </Card>

      {playerRetirements.length > 0 && (
        <>
          <SectionTitle n="" t="Changes in our garage" />
          {playerRetirements.map((p, i) => (
            <Card key={i} style={{ borderLeft: "3px solid #ffd200" }}>
              <div style={{ fontSize: 13 }}>
                <b>{p.was}</b> hung up the helmet. Our rookie <b style={{ color: "var(--accent)" }}>{p.now}</b> steps into the seat
                {p.sibling ? <> — sibling of <b>{p.sibling}</b>, no less!</> : "."}
              </div>
            </Card>
          ))}
        </>
      )}

      {dbs.length > 0 && (
        <>
          <SectionTitle n="" t="Family ties" />
          {dbs.slice(0, 4).map((d, i) => (
            <Card key={i} style={{ borderLeft: "3px solid #b388ff" }}>
              <div style={{ fontSize: 13 }}><b>{d.name}</b> debuts at {d.team}, sibling of <b>{d.sibling}</b>. The family rivalry begins.</div>
            </Card>
          ))}
        </>
      )}

      {retirements.length > 0 && (
        <>
          <SectionTitle n="" t="Retirements across the grid" />
          <Card>
            {retirements.slice(0, 6).map((r, i) => (
              <div key={i} style={{ fontSize: 13, padding: "3px 0", color: "#cbd0d8" }}>
                <b>{r.name}</b> retired at {r.age} ({r.team}).
              </div>
            ))}
            {retirements.length > 6 && <div style={{ fontSize: 12, color: "#777", marginTop: 4 }}>...and {retirements.length - 6} more veterans called it a day.</div>}
          </Card>
        </>
      )}

      {bankruptcies.length > 0 && (
        <>
          <SectionTitle n="" t="Gone to the wall" />
          {bankruptcies.map((b, i) => (
            <Card key={i} style={{ borderLeft: "3px solid #ff5252" }}>
              <div style={{ fontSize: 13 }}><b>{b.name}</b> ran out of money and folded ({TIERS[b.tierIdx].name}).</div>
            </Card>
          ))}
        </>
      )}

      {foundations.length > 0 && (
        <>
          <SectionTitle n="" t="New on the grid" />
          {foundations.map((f, i) => (
            <Card key={i} style={{ borderLeft: "3px solid #1de9b6" }}>
              <div style={{ fontSize: 13 }}>
                {f.kind === "sister"
                  ? <><b>{f.name}</b> founded as a sister team to <b>{f.parent}</b>.</>
                  : <><b>{f.name}</b> founded, fresh blood in {TIERS[f.tierIdx].name}.</>}
              </div>
            </Card>
          ))}
        </>
      )}

      {nothing && (
        <Card><div style={{ fontSize: 13, color: "#9aa0a6" }}>{comms}: "Quiet off-season, honestly. Nobody retired, nobody went bust. Eerie. Let's go racing."</div></Card>
      )}

      <AccentBtn onClick={onContinue}>To the post-season →</AccentBtn>
    </div>
  );
}

// ---------- Awards ceremony ----------
function Awards({ data, result, onContinue }) {
  const { real, funny, stats, lookahead, tierName, seasonNum } = data;
  return (
    <div>
      <Eyebrow>{tierName} · Season {seasonNum} · Awards night</Eyebrow>
      <h2 style={{ fontFamily: display, fontWeight: 900, fontSize: 30, margin: "2px 0 4px" }}>The Apex Awards</h2>
      <p style={{ fontSize: 13, color: "#9aa0a6", marginBottom: 14 }}>Black tie, free canapés, and a slightly tipsy pit dog handing out trophies.</p>

      <SectionTitle n="" t="The big silverware" />
      {real.map((a, i) => (
        <Card key={i} style={{ borderLeft: `3px solid ${a.isPlayer ? "var(--accent)" : a.color}`, background: a.isPlayer ? "var(--accent)14" : "#13161d" }}>
          <div style={{ fontSize: 12, color: a.isPlayer ? "var(--accent)" : "#9aa0a6", fontWeight: 700 }}>{a.title}</div>
          <div style={{ fontFamily: display, fontWeight: 800, fontSize: 18, marginTop: 3 }}>
            {a.name}{a.isPlayer ? " ◂ you" : ""}
          </div>
          <div style={{ fontSize: 12, color: "#9aa0a6" }}>{a.sub}</div>
        </Card>
      ))}

      <SectionTitle n="" t="The not-so-serious awards" />
      {funny.map((a, i) => (
        <Card key={i} style={{ background: a.isPlayer ? "var(--accent)14" : "#13161d" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "var(--accent)" }}>{a.title}</div>
          <div style={{ fontSize: 12, color: "#9aa0a6", fontStyle: "italic", margin: "2px 0 6px" }}>{a.desc}</div>
          <div style={{ fontFamily: display, fontWeight: 800, fontSize: 15 }}>
            {a.name}{a.isPlayer ? " ◂ you" : ""} <span style={{ fontSize: 12, color: "#777", fontWeight: 400 }}>({a.teamName})</span>
          </div>
        </Card>
      ))}

      <SectionTitle n="" t="Season in numbers" />
      {stats.map((s, i) => (
        <div key={i} style={{ display: "flex", gap: 8, fontSize: 13, color: "#cbd0d8", padding: "4px 0" }}>
          <span style={{ color: "var(--accent)" }}>›</span>{s}
        </div>
      ))}

      <Card style={{ marginTop: 16, borderLeft: "3px solid var(--accent)" }}>
        <div style={{ fontSize: 10, letterSpacing: ".2em", color: "var(--accent)" }}>WHAT TO EXPECT NEXT SEASON</div>
        <div style={{ fontSize: 13, marginTop: 5, lineHeight: 1.5 }}>{lookahead}</div>
      </Card>

      <AccentBtn onClick={onContinue}>
        {result.champion ? "Lift the big one →" : "Into the post-season →"}
      </AccentBtn>
    </div>
  );
}

// ---------- Game over (champion) ----------
function GameOver({ team, history, onRestart }) {
  const champs = history.filter((h) => h.champion).length;
  return (
    <div>
      <div className="au-card" style={{ textAlign: "center", padding: "48px 16px", marginTop: 30 }}>
        <div style={{ width: 48, height: 3, background: "var(--accent)", margin: "0 auto 16px", borderRadius: 2 }} />
        <div style={{ fontSize: 11, letterSpacing: ".28em", color: "var(--accent)", fontWeight: 700, marginBottom: 8 }}>CHAMPIONS</div>
        <h1 style={{ fontFamily: display, fontWeight: 900, fontSize: 38, margin: "8px 0", color: "var(--accent)", letterSpacing: ".02em" }}>APEX PRIME CHAMPIONS</h1>
        <p style={{ color: "#9aa0a6", fontSize: 14, maxWidth: 440, margin: "0 auto" }}>
          {team.name} climbed from the bottom of the ladder all the way to the summit of motorsport. The pit dog is very proud.
        </p>
        <div style={{ display: "flex", gap: 24, justifyContent: "center", marginTop: 18 }}>
          <div>
            <div style={{ fontFamily: display, fontWeight: 900, fontSize: 22, color: "var(--accent)" }}>{history.length}</div>
            <div style={{ fontSize: 10, color: "#777", letterSpacing: ".1em" }}>SEASONS</div>
          </div>
          <div>
            <div style={{ fontFamily: display, fontWeight: 900, fontSize: 22, color: "var(--accent)" }}>{champs}</div>
            <div style={{ fontSize: 10, color: "#777", letterSpacing: ".1em" }}>DIVISION TITLES</div>
          </div>
        </div>
      </div>
      <SectionTitle n="" t="Your journey" />
      <Card style={{ padding: 0 }}>
        {history.map((h, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "9px 13px", borderBottom: i < history.length - 1 ? "1px solid #1a1d25" : "none", fontSize: 13 }}>
            <span>S{h.season} · {h.tier}</span>
            <span style={{ color: h.promoted ? "#1de9b6" : h.relegated ? "#ff5252" : "#9aa0a6" }}>
              P{h.pos} · {h.points}pts {h.promoted ? "▲" : h.relegated ? "▼" : ""}
            </span>
          </div>
        ))}
      </Card>
      <AccentBtn onClick={onRestart}>Run it back →</AccentBtn>
    </div>
  );
}

// ---------- entry point ----------
function App() {
  return <Game />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>

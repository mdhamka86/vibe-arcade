function genDriverName(nation) {
  const r = Math.random();
  if (r < 0.06) return pick(DRIVER_ALLUSION);              // ~6% nod to a real driver
  if (r < 0.16) return `${pick(PUN_FIRST)} ${pick(PUN_LAST)}`; // ~10% original pun
  const bank = (nation && NAME_BANK[nation.code]) || FALLBACK_NAMES;
  return `${pick(bank.f)} ${pick(bank.l)}`;                 // ~84% realistic nation name
}
function genTeamName(usedFirstWords) {
  const tryOne = () => {
    const r = Math.random();
    if (r < 0.22) return pick(TEAM_ALLUSION); // ~22% nod to a real outfit
    if (r < 0.5) return pick(TEAM_PUN);        // ~28% original pun
    return `${pick(TEAM_PRE)} ${pick(TEAM_SUF)}`;
  };
  if (!usedFirstWords) return tryOne();
  // avoid clusters like "Momentum Dynamics" + "Momentum Performance"
  let name, guard = 0;
  do { name = tryOne(); guard++; } while (usedFirstWords.has(name.split(" ")[0]) && guard < 40);
  usedFirstWords.add(name.split(" ")[0]);
  return name;
}

// ---------- driver generator with big variance ----------
// opts.siblingOf: an existing driver this new driver is related to (shares surname,
// nationality, correlated stats). Used to seed family storylines in the world.
function genDriver(usedNames, opts = {}) {
  const sib = opts.siblingOf || null;
  // siblings share nationality; otherwise pick one (weighted toward heartlands)
  const nation = sib ? sib.nation : pickNation();
  let name;
  let guard = 0;
  if (sib) {
    const surname = sib.name.split(" ").slice(1).join(" ");
    const bank = NAME_BANK[nation.code] || FALLBACK_NAMES;
    do {
      name = `${pick(bank.f)} ${surname}`;
      guard++;
    } while (usedNames.has(name) && guard < 50);
  } else {
    do {
      name = genDriverName(nation);
      guard++;
    } while (usedNames.has(name) && guard < 50);
  }
  usedNames.add(name);

  const a = pick(ARCHETYPES);
  let pace = randInt(a.pace[0], a.pace[1]);
  let race = randInt(a.race[0], a.race[1]);
  let consistency = randInt(a.consistency[0], a.consistency[1]);
  // siblings inherit a slice of talent (correlated but distinct: family genes, own career)
  if (sib) {
    pace = Math.max(20, Math.min(98, Math.round(pace * 0.5 + sib.pace * 0.5 + randInt(-8, 8))));
    race = Math.max(20, Math.min(98, Math.round(race * 0.5 + sib.race * 0.5 + randInt(-8, 8))));
  }
  const trait = pick(TRAIT_BANK);
  const overall = (pace + race + consistency) / 3;
  const isPayDriver = a.tag === "Pay Driver";

  let marketability = randInt(15, 95);
  if (trait.tag === "Fan Favourite") marketability = Math.min(100, marketability + 25);
  if (a.tag === "Grizzled Veteran") marketability = Math.min(100, marketability + 10);
  if (sib) marketability = Math.min(100, marketability + 8); // famous family name

  const traitPrem = (trait.eff.dnf < 0 || trait.eff.wet || trait.eff.income) ? 1 : 0;
  const fee = Math.max(1, Math.round((overall - 40) / 6) + traitPrem);

  let salary = Math.round((overall / 100) * 1.4 * 10) / 10;
  let payBringsIn = 0;
  if (isPayDriver) {
    payBringsIn = Math.round((0.8 + marketability / 100) * 10) / 10;
    salary = 0.1;
  }

  const backstory = sib
    ? pick([
        `Younger sibling of ${sib.name}, out to prove they're the fast one.`,
        `Racing in the shadow of ${sib.name}, and sick of being asked about it.`,
        `${sib.name.split(" ")[0]}'s sibling. The family Christmas table is very competitive.`,
        `Followed ${sib.name} into the sport. Insists they had the better karting record.`,
      ])
    : pick(BACKSTORY_BANK);

  return {
    id: uid(),
    name,
    nickname: pick(DRIVER_NICK),
    nation,
    archetype: a.tag,
    trait,
    quirk: pick(QUIRK_BANK),
    backstory,
    siblingOf: sib ? sib.name : null,
    pace, race, consistency,
    marketability,
    isPayDriver,
    payBringsIn,
    age: randInt(18, 39),
    morale: randInt(55, 80),
    form: 0,
    fee,
    salary,
    points: 0,
    wins: 0,
    podiums: 0,
    dnfs: 0,
  };
}

// Three structures, mirroring the genre: UPFRONT (lump now, nothing later),
// FIXED (steady per-race regardless of result), BONUS (pays only if you hit a
// finishing target). Each sponsor has a star tier you can only reach with
// enough sponsor appeal (driver + team marketability).
const SPONSOR_NAMES = [
  "Vroomberg Watches", "Octane Energy", "SafeHands Insurance", "Nimbus Telecom",
  "Apex Motor Oil", "Mirage Casinos", "Glacier Cooling", "Thunderbolt Tyres",
  "Goldline Bank", "Zephyr Airlines", "Carbonix", "Redshift Cola",

  "Pirelly Tyres", "Heineckin", "Rolux Timing", "Oracle of Speed",
  "DHLol Logistics", "Shellfish Oils", "Monster Munch Energy", "Santanderish Bank",
];
const SPONSOR_TAGLINES = [
  "Precision is everything.", "Fuel the chaos.", "We've got you covered.",
  "Connecting the grid.", "Keeps it running.", "Fortune favours the bold.",
  "Stay cool out there.", "Where rubber meets glory.", "Banking on speed.",
  "Fly fast.", "Engineered to win.", "Taste the podium.",
];

function genSponsorOffers(appeal) {
  // appeal 0–100. Higher unlocks higher-star sponsors and bigger numbers.
  const maxStars = appeal >= 80 ? 5 : appeal >= 60 ? 4 : appeal >= 40 ? 3 : appeal >= 20 ? 2 : 1;
  const names = shuffle(SPONSOR_NAMES);
  const offers = [];
  const types = ["upfront", "fixed", "bonus", "upfront", "fixed", "bonus"];
  shuffle(types).slice(0, 5).forEach((type, i) => {
    const stars = Math.max(1, Math.min(maxStars, randInt(Math.max(1, maxStars - 2), maxStars)));
    const mult = stars; // bigger sponsors pay more
    let s = {
      id: uid(), name: names[i], tagline: pick(SPONSOR_TAGLINES),
      stars, type, locked: stars > maxStars,
    };
    if (type === "upfront") {
      s.upfront = Math.round((3 + mult * 2.5) * 10) / 10;
      s.perRace = 0;
      s.desc = `$${s.upfront}M now, nothing per race. Cash when you need it.`;
    } else if (type === "fixed") {
      s.upfront = Math.round(mult * 0.8 * 10) / 10;
      s.perRace = Math.round((0.3 + mult * 0.35) * 10) / 10;
      s.desc = `$${s.perRace}M every race, no matter the result. Steady money.`;
    } else { // bonus
      s.upfront = Math.round(mult * 0.5 * 10) / 10;
      // target finishing position: easier targets pay less
      const targetPos = pick([3, 5, 8, 10]);
      s.targetPos = targetPos;
      s.bonus = Math.round((1.2 + mult * (targetPos <= 3 ? 1.4 : targetPos <= 5 ? 0.9 : 0.5)) * 10) / 10;
      s.desc = `$${s.bonus}M each time a car finishes P${targetPos} or better. High risk, high reward.`;
    }
    offers.push(s);
  });
  return offers;
}

function sponsorRaceIncome(sp, playerRaceSummary) {
  if (sp.type === "fixed") return sp.perRace;
  if (sp.type === "bonus") {
    const hits = playerRaceSummary.filter((p) => !p.dnf && p.pos <= sp.targetPos).length;
    return Math.round(hits * sp.bonus * 10) / 10;
  }
  return 0; // upfront already paid
}

const UPGRADE_LABEL = { carPace: "pace", carRace: "racecraft", reliability: "reliability" };

// outcome bands: weight = how often it lands, gain = [min,max] development points.
// Reliability gains are scaled down a touch separately when applied.

    ] },

const UPGRADE_FLOP_TAG = { flop: "Barely moved", poor: "Underwhelming", solid: "Solid work", great: "Great result", breakthrough: "Breakthrough!" };

// roll an upgrade outcome for a given stat. Returns { gain, band, quote, tone, label }.
function rollUpgrade(stat) {
  const totalW = UPGRADE_BANDS.reduce((s, b) => s + b.weight, 0);
  let r = Math.random() * totalW;
  let band = UPGRADE_BANDS[UPGRADE_BANDS.length - 1];
  for (const b of UPGRADE_BANDS) { if (r < b.weight) { band = b; break; } r -= b.weight; }
  let gain = randInt(band.gain[0], band.gain[1]);
  // reliability moves on a slightly tighter scale so it doesn't outpace pace/race
  if (stat === "reliability") gain = Math.max(0, Math.round(gain * 0.8));
  return {
    gain,
    band: band.tag,
    tone: band.tone,
    headline: UPGRADE_FLOP_TAG[band.tag],
    quote: pick(band.quotes),
    label: UPGRADE_LABEL[stat] || stat,
  };
}

// pull a non-repeating event for this run
function drawEvent(usedEvents) {
  const pool = EVENT_BANK.filter((e) => !usedEvents.has(e.text));
  if (pool.length === 0) { usedEvents.clear(); return pick(EVENT_BANK); }
  const e = pick(pool);
  usedEvents.add(e.text);
  return e;
}

function teamStrength(team) {
  const d = team.drivers;
  const driverAvg = d.reduce((s, x) => s + (x.pace + x.race + x.consistency) / 3, 0) / d.length;
  return driverAvg + (team.carPace || 0) + (team.carRace || 0) * 0.5;
}

// pure CAR performance index — mirrors how the sim weights the car (pace & race
// each 0.5) plus a light reliability contribution. This is what upgrades move,
// so it's the fair yardstick for the post-season grid comparison. Higher = quicker.
function carIndex(team, biasIfAI = 0) {
  const base = (team.carPace || 0) * 0.5 + (team.carRace || 0) * 0.5 + (team.reliability || 0) * 0.15;
  return base + (team.isPlayer ? 0 : biasIfAI);
}

// sponsor appeal = avg of driver marketability + team marketability, capped 0–100
function sponsorAppeal(team) {
  if (!team.drivers.length) return team.teamMkt || 0;
  const dAvg = team.drivers.reduce((s, x) => s + (x.marketability || 0), 0) / team.drivers.length;
  return Math.round(Math.min(100, dAvg * 0.6 + (team.teamMkt || 0) * 0.4));
}
function appealStars(appeal) {
  return appeal >= 80 ? 5 : appeal >= 60 ? 4 : appeal >= 40 ? 3 : appeal >= 20 ? 2 : 1;
}
// recurring per-race cost: driver salaries + travel. Pay drivers offset it.
// Travel scales with the team's home-base logistics (remote bases cost more).
function perRaceCost(team) {
  const salaries = team.drivers.reduce((s, d) => s + (d.salary || 0), 0);
  const logistics = (team.nation == null ? undefined : team.nation.logistics) || 1;
  const travel = (0.4 + (team.tierIdx || 0) * 0.2) * logistics;
  return Math.round((salaries + travel) * 10) / 10;
}
function perRaceDriverIncome(team) {
  return Math.round(team.drivers.reduce((s, d) => s + (d.payBringsIn || 0), 0) * 10) / 10;
}

// ---------- race control: flags with realistic frequencies & effects ----------
// per-lap trigger chances (tuned so a typical 9-12 lap race sees a couple of
// incidents, occasional SC, rare red flags). Compression bunches the field by
// pulling every car's score toward the pack average (a restart concertina).
const FLAGS = {
  yellow: { label: "YELLOW FLAG", color: "#ffd54f", msg: (c) => `Yellow flag in sector ${randInt(1,3)} — no overtaking while marshals work.` },
  vsc:    { label: "VIRTUAL SAFETY CAR", color: "#ffca28", msg: () => "Virtual safety car deployed. Delta times enforced, gaps frozen." },
  sc:     { label: "SAFETY CAR", color: "#ffb300", msg: () => "Safety car is OUT. The field bunches up, the leaders' advantage is gone." },
  red:    { label: "RED FLAG", color: "#ff5252", msg: (c) => `Red flag at ${c.name}. Session stopped, the whole field resets for a restart.` },
  blue:   { label: "BLUE FLAGS", color: "#42a5f5", msg: () => "Blue flags out as lapped cars are waved aside up front." },
  black:  { label: "BLACK FLAG", color: "#e0e0e0", msg: (d) => `Black flag for ${d}, disqualified for a technical breach. Their race is done.` },
};
// compress the field toward the average score (1 = full neutralise, 0 = none)
function compressField(entrants, amount) {
  const live = entrants.filter((e) => !e.dnf);
  if (!live.length) return;
  const avg = live.reduce((s, e) => s + e.score, 0) / live.length;
  live.forEach((e) => { e.score = e.score + (avg - e.score) * amount; });
}

function simulateRace(playerTeam, aiTeams, circuit, tier, aiBias = 0) {
  const entrants = [];
  const allTeams = [playerTeam, ...aiTeams];
  const isWet = chance(0.22); // some races are wet

  allTeams.forEach((t) => {
    t.drivers.forEach((dr) => {
      const tr = (dr.trait == null ? undefined : dr.trait.eff) || {};
      let base = (dr.pace * 0.4 + dr.race * 0.4 + dr.consistency * 0.2);
      base += (t.carPace || 0) * 0.5 + (t.carRace || 0) * 0.5;
      // difficulty ramp: nudge AI cars up (harder) or down (easier) relative to player
      if (!t.isPlayer) base += aiBias;
      // circuit trait bonus
      if (circuit.trait === "high-speed") base += (dr.pace - 60) * 0.15;
      if (circuit.trait === "technical") base += (dr.race - 60) * 0.15;
      if (circuit.trait === "street") base += (dr.consistency - 60) * 0.2;
      // ---- driver TRAIT effects on starting score ----
      if (tr.gridBoost) base += tr.gridBoost;
      if (tr.steady) base += tr.steady;
      if (tr.street && circuit.trait === "street") base += tr.street;
      if (tr.wet && isWet) base += tr.wet;
      if (tr.paceBoost) base += tr.paceBoost;
      if (tr.momentum) base += (dr.form || 0) * 2; // form snowball
      // ---- HOME advantage: team home base or driver nationality matches host ----
      const teamNat = t.nation, drvNat = dr.nation;
      if ((teamNat == null ? undefined : teamNat.code) === circuit.country || (drvNat == null ? undefined : drvNat.code) === circuit.country) {
        base += 5; // true home race: crowd, familiarity, sponsor push
      } else if ((teamNat == null ? undefined : teamNat.region) === circuit.region || (drvNat == null ? undefined : drvNat.region) === circuit.region) {
        base += 2; // home region: still a lift
      }
      base += rand(-3, 3); // qualifying scatter
      entrants.push({
        team: t, driver: dr, isPlayer: t.isPlayer || false,
        score: base, dnf: false, tr,
      });
    });
  });

  const laps = randInt(9, 12); // narrative beats — more laps, more action
  const timeline = []; // ordered: { highlights:[], board:[{driverId, pos, dnf}] }
  const clashes = []; // wheel-to-wheel battles → feed the beef system

  const snapshotBoard = () => {
    const sorted = [...entrants].sort((a, b) => (b.dnf ? -1e9 : b.score) - (a.dnf ? -1e9 : a.score));
    return sorted.map((e, i) => ({
      driverId: e.driver.id, teamId: e.team.id, name: e.driver.name,
      teamName: e.team.name, color: e.team.color, isPlayer: e.isPlayer,
      pos: i + 1, dnf: e.dnf,
    }));
  };

  // opening grid snapshot
  timeline.push({ highlights: [{ type: "neutral", text: `Lights out at ${circuit.name}${isWet ? " — and it's WET out there!" : "."}`, player: false }], board: snapshotBoard() });

  for (let lap = 0; lap < laps; lap++) {
    const beatHighlights = [];
    const lateRace = lap >= laps - 2; // closing stint
    const earlyRace = lap <= 1;
    let dnfThisLap = false;

    entrants.forEach((e) => {
      if (e.dnf) return;
      const tr = e.tr;
      const vol = (e.team.volatility || 0) + 6;
      const reliability = 92 + (e.team.reliability || 0);

      // DNF check, modified by trait
      let dnfChance = Math.max(0.004, (0.05 - reliability / 2400) * (1 - e.driver.consistency / 200));
      if (tr.dnf) dnfChance += tr.dnf;
      dnfChance = Math.max(0.002, dnfChance);
      if (chance(dnfChance)) {
        e.dnf = true;
        dnfThisLap = true;
        const fn = pick(DNF_EVENTS);
        if (e.isPlayer || chance(0.3)) beatHighlights.push({ type: "dnf", text: fn(e.driver, circuit), player: e.isPlayer });
        return;
      }

      // event roll, modified by traits
      const roll = Math.random();
      const aggro = (e.team.aggression || 0) / 100 + (tr.aggro || 0);
      const skillBias = (e.driver.pace + e.driver.race) / 200;
      let goodCut = 0.34 + skillBias * 0.18 + aggro * 0.1;
      let badCut = goodCut + 0.30 - skillBias * 0.12 + (tr.aggroBad || 0);
      if (tr.clutch && e.score > 70) goodCut += tr.clutch / 100; // clutch when near front
      if (lateRace && tr.lateRace) goodCut += tr.lateRace / 100;
      if (earlyRace && tr.earlyRace) goodCut += tr.earlyRace / 100; // negative shrinks good

      if (roll < goodCut) {
        let swing = rand(2, 7) + skillBias * 4;
        if (tr.recovery) swing += tr.recovery * 0.2;
        e.score += swing;
        const fn = pick(GOOD_EVENTS);
        if (e.isPlayer || chance(0.16)) beatHighlights.push({ type: "good", text: fn(e.driver, circuit), player: e.isPlayer });
      } else if (roll < badCut) {
        let swing = rand(2, 6) + vol * 0.1;
        if (tr.recovery) swing -= tr.recovery * 0.25; // iron will limits damage
        e.score -= Math.max(1, swing);
        const fn = pick(BAD_EVENTS);
        if (e.isPlayer || chance(0.13)) beatHighlights.push({ type: "bad", text: fn(e.driver, circuit), player: e.isPlayer });
        // CLASH: sometimes the setback is a wheel-to-wheel battle with the car just ahead
        if (chance(0.4)) {
          const ahead = entrants.filter((x) => !x.dnf && x.score > e.score).sort((a, b) => a.score - b.score)[0];
          if (ahead && ahead.driver.id !== e.driver.id && ahead.team.id !== e.team.id) {
            clashes.push({ a: e.driver.name, b: ahead.driver.name, aTeam: e.team.name, bTeam: ahead.team.name });
          }
        }
      }
    });

    // ---- race control: roll for flags (realistic frequencies) ----
    // a retirement this lap sharply raises safety-car/VSC odds (debris to clear)
    let flagEvent = null;
    if (lap > 0 && lap < laps - 1) { // not lights-out or the very last lap
      const r = Math.random();
      if (dnfThisLap && r < 0.55) {
        // incident brought out neutralisation: usually SC, sometimes VSC, rarely red
        const k = Math.random();
        if (k < 0.18) { compressField(entrants, 0.9); flagEvent = { ...FLAGS.red, text: FLAGS.red.msg(circuit) }; }
        else if (k < 0.65) { compressField(entrants, 0.6); flagEvent = { ...FLAGS.sc, text: FLAGS.sc.msg() }; }
        else { compressField(entrants, 0.3); flagEvent = { ...FLAGS.vsc, text: FLAGS.vsc.msg() }; }
      } else if (r < 0.06) {
        // standalone safety car (gravel trap, debris) without a tracked retirement
        compressField(entrants, 0.5); flagEvent = { ...FLAGS.sc, text: FLAGS.sc.msg() };
      } else if (r < 0.10) {
        compressField(entrants, 0.25); flagEvent = { ...FLAGS.vsc, text: FLAGS.vsc.msg() };
      } else if (r < 0.20) {
        flagEvent = { ...FLAGS.yellow, text: FLAGS.yellow.msg(circuit) }; // local yellow, no compression
      } else if (r < 0.28) {
        flagEvent = { ...FLAGS.blue, text: FLAGS.blue.msg() }; // backmarker traffic, cosmetic
      } else if (r < 0.288) {
        // black flag: disqualify a random midfield/back AI runner (never the leader, rarely the player)
        const cand = entrants.filter((e) => !e.dnf && !e.isPlayer).sort((a, b) => a.score - b.score)[0];
        if (cand) { cand.dnf = true; flagEvent = { ...FLAGS.black, text: FLAGS.black.msg(cand.driver.name) }; }
      }
    }
    if (flagEvent) {
      beatHighlights.unshift({ type: "flag", text: flagEvent.text, player: false, flagColor: flagEvent.color, flagLabel: flagEvent.label });
    }

    if (beatHighlights.length === 0 && chance(0.6)) {
      beatHighlights.push({ type: "neutral", text: pick(NEUTRAL_FLAVOR)(circuit), player: false });
    }
    timeline.push({ highlights: beatHighlights, board: snapshotBoard() });
  }

  const finalBoard = snapshotBoard();
  // assign positions, DNFs sink to the back in finish order
  const dnfSorted = [...entrants].sort((a, b) => {
    if (a.dnf && !b.dnf) return 1;
    if (!a.dnf && b.dnf) return -1;
    return b.score - a.score;
  });
  const finishers = dnfSorted.map((e, i) => ({ ...e, pos: i + 1 }));

  return { finishers, timeline, finalBoard, circuit, laps, isWet, clashes };
}

// points like F1ish, scaled to grid
const POINTS_TABLE = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];
function pointsFor(pos) {
  return POINTS_TABLE[pos - 1] || 0;
}

// ============================================================
// PERSISTENT WORLD — all four tiers exist at once and evolve every off-season.
// Teams age, develop, decline, go bankrupt, get bought into sister teams; new
// teams are founded; drivers age, retire, and are replaced by regens.
// ============================================================
function makeAiTeam(tierIdx, rankSlot, usedNames, usedTeamNames, founded) {
  // derive used first-words so names don't cluster (e.g. two "Momentum" teams)
  const usedFirstWords = new Set([...usedTeamNames].map((n) => n.split(" ")[0]));
  let tn, g = 0;
  do { tn = genTeamName(usedFirstWords); g++; } while (usedTeamNames.has(tn) && g < 60);
  usedTeamNames.add(tn);
  const tierBase = tierIdx * 6;
  const strength = tierBase + Math.round((rankSlot - 0.5) * 14);
  const drivers = [genDriver(usedNames), genDriver(usedNames)];
  drivers.forEach((d) => {
    d.pace = Math.max(25, Math.min(98, d.pace + strength + randInt(-4, 4)));
    d.race = Math.max(25, Math.min(98, d.race + strength + randInt(-4, 4)));
  });
  return {
    id: uid(),
    name: tn,
    color: `hsl(${randInt(0, 360)}, ${randInt(45, 75)}%, ${randInt(40, 60)}%)`,
    nation: pickNation(),         // home base country
    drivers,
    isPlayer: false,
    tierIdx,
    points: 0,
    carPace: Math.round(strength * 0.7) + randInt(-3, 4),
    carRace: Math.round(strength * 0.7) + randInt(-3, 4),
    reliability: randInt(-5, 7),
    aggression: randInt(0, 14),
    volatility: randInt(0, 12),
    teamMkt: randInt(10, 60),
    funds: randInt(8, 30),        // AI war chest; can run dry → bankruptcy
    founded: founded || 0,        // season number founded
    sisterOf: null,               // name of parent team if a sister
    history: [],
  };
}

// build the full ladder once at the start of a run
function buildWorld(playerTeam, usedNames, usedTeamNames) {
  const world = []; // every AI team across all tiers
  TIERS.forEach((tier) => {
    // player occupies one slot in tier 0; AI fills the rest of every tier
    const slots = tier.id === playerTeam.tierIdx ? tier.grid - 1 : tier.grid;
    for (let i = 0; i < slots; i++) {
      const rankSlot = slots > 1 ? i / (slots - 1) : 0.5;
      world.push(makeAiTeam(tier.id, rankSlot, usedNames, usedTeamNames, 0));
    }
  });
  // realistically, a grid has maybe one racing family at a time, often none
  if (chance(0.5)) {
    const allDrivers = world.flatMap((t) => t.drivers);
    const elder = pick(allDrivers);
    const host = pick(world);
    const slot = randInt(0, host.drivers.length - 1);
    if (allDrivers.length && !host.drivers[slot].siblingOf) {
      const sib = genDriver(usedNames, { siblingOf: elder });
      const base = host.tierIdx * 5;
      sib.pace = Math.max(22, Math.min(96, sib.pace + base));
      sib.race = Math.max(22, Math.min(96, sib.race + base));
      host.drivers[slot] = sib;
    }
  }
  return world;
}

// keep only AI for a given tier
function aiInTier(world, tierIdx) {
  return world.filter((t) => t.tierIdx === tierIdx);
}

// ---- ageing & regen ----
function ageDriver(d, usedNames) {
  d.age = (d.age || 25) + 1;
  // peak around 26–31; decline after; rookies still improving
  if (d.age < 25) { d.pace = Math.min(99, d.pace + randInt(0, 3)); d.race = Math.min(99, d.race + randInt(1, 4)); }
  else if (d.age <= 31) { d.race = Math.min(99, d.race + randInt(0, 2)); }
  else if (d.age >= 34) { d.pace = Math.max(20, d.pace - randInt(1, 4)); d.race = Math.max(20, d.race - randInt(0, 3)); }
  // retirement chance climbs with age
  const retireChance = d.age >= 39 ? 0.85 : d.age >= 36 ? 0.4 : d.age >= 34 ? 0.18 : 0.03;
  return chance(retireChance);
}
// a regen inherits a slot, scaled to the team's tier; variance keeps some great,
// some rubbish. ~12% chance to debut as a sibling of an existing world driver.
function regenDriver(tierIdx, usedNames, siblingPool) {
  let siblingOf = null;
  if (siblingPool && siblingPool.length && chance(0.03)) {
    siblingOf = pick(siblingPool);
  }
  const d = genDriver(usedNames, { siblingOf });
  d.age = randInt(18, 23);
  const base = tierIdx * 5;
  d.pace = Math.max(22, Math.min(96, d.pace + base + randInt(-8, 8)));
  d.race = Math.max(22, Math.min(96, d.race + base + randInt(-8, 8)));
  d.isRegen = true;
  return d;
}

// ---- the big off-season world tick ----
// returns { world, retirements, bankruptcies, foundations, debuts }
function evolveWorld(world, usedNames, usedTeamNames, seasonNum, beef) {
  const retirements = [];
  const bankruptcies = [];
  const foundations = [];
  const debuts = []; // sibling debuts worth a news line

  let next = world.map((t) => ({ ...t, drivers: t.drivers.map((d) => ({ ...d })) }));

  // pool of current drivers that could have a sibling join the grid
  const siblingPool = next.flatMap((t) => t.drivers).filter((d) => !d.siblingOf);

  // 1) age drivers, retire & regen
  next.forEach((t) => {
    t.drivers = t.drivers.map((d) => {
      const retires = ageDriver(d, usedNames);
      if (retires) {
        retirements.push({ name: d.name, age: d.age, team: t.name });
        const regen = regenDriver(t.tierIdx, usedNames, siblingPool);
        if (regen.siblingOf) debuts.push({ name: regen.name, sibling: regen.siblingOf, team: t.name });
        return regen;
      }
      return d;
    });
  });

  // 2) team development / decline (drift their car + funds)
  next.forEach((t) => {
    const drift = randInt(-3, 4);
    t.carPace = Math.max(-5, t.carPace + drift + (t.teamMkt > 50 ? 1 : 0));
    t.carRace = Math.max(-5, t.carRace + randInt(-3, 4));
    // funds: support cushions, but remote home bases bleed cash on logistics.
    const support = (t.nation == null ? undefined : t.nation.support) || 1;
    const logistics = (t.nation == null ? undefined : t.nation.logistics) || 1;
    const travelDrag = (logistics - 1) * 4; // remote = extra annual cost
    t.funds = Math.round((t.funds + (randInt(-6, 7) + (t.teamMkt - 35) * 0.1) * support - travelDrag) * 10) / 10;
    // fanbase nudges marketability over time
    const fans = (t.nation == null ? undefined : t.nation.fans) || 1;
    t.teamMkt = Math.max(0, Math.min(100, t.teamMkt + Math.round((fans - 1) * 4)));
  });

  // 3) bankruptcies — a broke team folds; sometimes bought as a sister team
  const survivors = [];
  next.forEach((t) => {
    if (t.funds < -8 && chance(0.6)) {
      bankruptcies.push({ name: t.name, tierIdx: t.tierIdx });
      // 50/50: bought into a sister team of a rich rival, or a fresh foundation
      const richRival = next.find((r) => r.funds > 22 && r.id !== t.id && !r.sisterOf);
      if (richRival && chance(0.5)) {
        const sister = makeAiTeam(t.tierIdx, 0.4, usedNames, usedTeamNames, seasonNum);
        sister.name = `${richRival.name.split(" ")[0]} II`;
        sister.color = richRival.color;
        sister.sisterOf = richRival.name;
        sister.funds = 14;
        foundations.push({ name: sister.name, tierIdx: t.tierIdx, kind: "sister", parent: richRival.name });
        survivors.push(sister);
      } else {
        const fresh = makeAiTeam(t.tierIdx, 0.35, usedNames, usedTeamNames, seasonNum);
        foundations.push({ name: fresh.name, tierIdx: t.tierIdx, kind: "new" });
        survivors.push(fresh);
      }
    } else {
      survivors.push(t);
    }
  });
  next = survivors;

  // 4) beef decay (old grudges cool a little)
  Object.keys(beef).forEach((k) => { beef[k] = Math.max(0, beef[k] - 1); if (beef[k] === 0) delete beef[k]; });

  return { world: next, retirements, bankruptcies, foundations, debuts };
}

// beef key for two named entities (order-independent)
function beefKey(a, b) { return [a, b].sort().join(":::"); }

// ============================================================
// MAIN GAME COMPONENT
// ============================================================
function Game() {
  const [phase, setPhase] = useState("intro"); // intro, setup, preseason, season, raceResult, seasonEnd, postseason, gameover
  const [team, setTeam] = useState(null);
  const [aiTeams, setAiTeams] = useState([]);
  const [tierIdx, setTierIdx] = useState(0);
  const [seasonNum, setSeasonNum] = useState(1);
  const [calendar, setCalendar] = useState([]);
  const [raceIdx, setRaceIdx] = useState(0);
  const [lastResult, setLastResult] = useState(null);
  const [revealedHighlights, setRevealedHighlights] = useState(0);
  const [money, setMoney] = useState(20);
  const [rumor, setRumor] = useState(null);
  const [sponsorPicks, setSponsorPicks] = useState([]);
  const [seasonHistory, setSeasonHistory] = useState([]);
  const [draftPool, setDraftPool] = useState([]);
  const [chosenDrivers, setChosenDrivers] = useState([]);
  const [pendingTeam, setPendingTeam] = useState(null);
  const [marketingPicks, setMarketingPicks] = useState([]);
  const [seasonTarget, setSeasonTarget] = useState(null); // {pos, payout, label}
  const [chairmanConf, setChairmanConf] = useState(70); // 0–100, hidden from player
  const [chairmanMsg, setChairmanMsg] = useState(null);  // weekly hint shown instead
  const [difficulty, setDifficulty] = useState(0); // ramps up on promotion, eases on relegation
  const [seasonOffers, setSeasonOffers] = useState(null); // generated sponsors for this preseason
  const [pendingEvent, setPendingEvent] = useState(null); // {text, kind, outcome}
  const [startSnapshot, setStartSnapshot] = useState(null); // strength at season start for "most improved"
  const [awards, setAwards] = useState(null);
  const [worldNews, setWorldNews] = useState(null); // off-season report: retirements, bankruptcies, foundations
  const usedNames = useRef(new Set());
  const usedTeamNames = useRef(new Set());
  const usedEvents = useRef(new Set());
  const world = useRef([]);          // persistent AI ladder, all tiers
  const beef = useRef({});           // rivalry intensities keyed by beefKey
  const COMMS = "Nadine Naomi";      // team comms officer (easter egg)

  // setup form
  const [formName, setFormName] = useState("");
  const [formColor, setFormColor] = useState("#e8113c");
  const [formNation, setFormNation] = useState(nationByCode("GB"));

  const tier = TIERS[tierIdx];

  // ---- start a fresh setup ----
  function beginSetup() {
    usedNames.current = new Set();
    usedTeamNames.current = new Set();
    setFormName(genTeamName());
    setFormColor(pick(["#e8113c", "#00b8d4", "#ffd200", "#7b2ff7", "#00c853", "#ff6d00"]));
    setFormNation(pickNation());
    setPhase("setup");
  }

  // ---- confirm team identity, then open the Driver Market ----
  function confirmTeam() {
    usedTeamNames.current.add(formName);
    const t = {
      id: uid(),
      name: formName || "Unnamed Racing",
      color: formColor,
      nation: formNation,
      drivers: [],
      isPlayer: true,
      points: 0, carPace: 0, carRace: 0, reliability: 0, aggression: 0, volatility: 0,
      teamMkt: 15, // backmarker brand. grows by beating chairman targets
      tierIdx: 0,
    };
    setPendingTeam(t);
    const pool = [];
    for (let i = 0; i < 8; i++) pool.push(genDriver(usedNames.current));
    pool.sort((a, b) => a.fee - b.fee);
    setDraftPool(pool);
    setChosenDrivers([]);
    setMoney(18); // starting bank — tight
    setChairmanConf(70);
    setPhase("draft");
  }

  function toggleDraftPick(d) {
    setChosenDrivers((prev) => {
      if (prev.find((x) => x.id === d.id)) return prev.filter((x) => x.id !== d.id);
      if (prev.length >= 2) return prev;
      return [...prev, d];
    });
  }
  function rerollMarket() {
    const keep = chosenDrivers.map((d) => d.id);
    const pool = draftPool.filter((d) => keep.includes(d.id));
    while (pool.length < 8) pool.push(genDriver(usedNames.current));
    pool.sort((a, b) => a.fee - b.fee);
    setDraftPool(pool);
  }
  function confirmDraft() {
    if (chosenDrivers.length !== 2) return;
    const cost = chosenDrivers.reduce((s, d) => s + d.fee, 0);
    if (cost > money) return; // can't overspend the signing budget
    const drivers = chosenDrivers.map((d) => ({ ...d }));
    const t = { ...pendingTeam, drivers, tierIdx: 0 };
    setTeam(t);
    setMoney((m) => Math.round((m - cost) * 10) / 10);
    // build the whole living ladder once, now that the player team exists
    world.current = buildWorld(t, usedNames.current, usedTeamNames.current);
    beef.current = {};
    setSeasonOffers(genSponsorOffers(sponsorAppeal(t)));
    setSeasonTarget(null);
    setPhase("preseason");
    setSponsorPicks([]);
    setMarketingPicks([]);
  }

  // sponsor offers generated from current appeal (regenerated when entering preseason)
  const preseasonOffers = useMemo(() => {
    if (phase !== "preseason") return null;
    return {
      sponsors: seasonOffers || [],
      marketing: shuffle(MARKETING_BANK).slice(0, 3),
    };
    // eslint-disable-next-line
  }, [phase, seasonNum, seasonOffers]);

  // chairman target options based on current standing potential
  const targetOptions = useMemo(() => {
    const grid = tier.grid;
    // safe (finish near back), par (mid), ambitious (promotion zone)
    return [
      { label: "Play it safe", pos: grid - 1, payout: tier.prizeBase * 0.6, confReward: 4, confPenalty: 18 },
      { label: "Solid season", pos: Math.ceil(grid / 2), payout: tier.prizeBase * 1.0, confReward: 8, confPenalty: 12 },
      { label: "Go for promotion", pos: 2, payout: tier.prizeBase * 1.8, confReward: 16, confPenalty: 8 },
    ];
    // eslint-disable-next-line
  }, [tierIdx, phase]);

  function toggleSponsor(s) {
    if (s.locked) return;
    setSponsorPicks((prev) =>
      prev.find((x) => x.id === s.id)
        ? prev.filter((x) => x.id !== s.id)
        : prev.length >= 3 ? prev : [...prev, s]
    );
  }
  function sponsorUpfront() {
    return Math.round(sponsorPicks.reduce((s, x) => s + (x.upfront || 0), 0) * 10) / 10;
  }
  // money available to spend on parts/marketing = bank + sponsor upfront
  function spendableBudget() {
    return Math.round((money + sponsorUpfront()) * 10) / 10;
  }
  function spentOnPrep() {
    const m = marketingPicks.reduce((s, x) => s + x.cost, 0);
    return Math.round(m * 10) / 10;
  }
  function toggleMarketing(m) {
    setMarketingPicks((prev) => {
      if (prev.find((x) => x.name === m.name)) return prev.filter((x) => x.name !== m.name);
      if (spentOnPrep() + m.cost > spendableBudget()) return prev;
      return [...prev, m];
    });
  }

  // ---- launch the season ----
  function startSeason() {
    if (!seasonTarget) return; // must accept a chairman target first
    let cash = money + sponsorUpfront();
    const t = { ...team, tierIdx, drivers: team.drivers.map((d) => ({ ...d, points: 0, wins: 0, podiums: 0, dnfs: 0, form: 0 })) };
    marketingPicks.forEach((m) => {
      cash -= m.cost;
      t.teamMkt = Math.min(100, (t.teamMkt || 0) + m.mkt);
    });
    cash = Math.round(cash * 10) / 10;
    t.points = 0;
    t.sponsors = sponsorPicks;
    setTeam(t);
    setMoney(cash);

    // pull this tier's rivals from the PERSISTENT world (they carry over & age)
    const ai = aiInTier(world.current, tierIdx).map((a) => ({ ...a, points: 0, drivers: a.drivers.map((d) => ({ ...d, points: 0, wins: 0, podiums: 0, dnfs: 0, form: 0 })) }));
    setAiTeams(ai);

    // snapshot strength for the "most improved" award at season end
    const snap = [t, ...ai].map((tm) => ({ id: tm.id, strength: teamStrength(tm) }));
    setStartSnapshot(snap);

    const races = randInt(5, 6);
    const cal = shuffle(CIRCUITS).slice(0, races);
    setCalendar(cal);
    setRaceIdx(0);
    setChairmanMsg(makeChairmanMessage(chairmanConf, null));
    setPhase("season");
    if (chance(0.5)) setRumor(pick(RUMOR_BANK)({ drivers: [...t.drivers, ...ai.flatMap(x => x.drivers)] }));
    else setRumor(null);
  }

  // ---- run one race ----
  function runRace() {
    const circuit = calendar[raceIdx];
    const result = simulateRace(team, aiTeams, circuit, tierIdx, difficulty);

    // tally points + update season standings
    const newAi = aiTeams.map((a) => ({ ...a }));
    let playerRaceSummary = [];
    result.finishers.forEach((f) => {
      const pts = pointsFor(f.pos);
      if (f.isPlayer) {
        const drv = team.drivers.find((d) => d.id === f.driver.id);
        if (drv) {
          drv.points += pts;
          if (f.pos === 1) drv.wins += 1;
          if (f.pos <= 3 && !f.dnf) { drv.podiums += 1; drv.form = (drv.form || 0) + 1; }
          else drv.form = Math.max(0, (drv.form || 0) - 1);
          if (f.dnf) drv.dnfs += 1;
        }
        playerRaceSummary.push({ driver: f.driver.name, pos: f.pos, pts, dnf: f.dnf, trait: f.driver.trait });
      } else {
        const at = newAi.find((a) => a.id === f.team.id);
        if (at) {
          const adrv = at.drivers.find((d) => d.id === f.driver.id);
          if (adrv) {
            adrv.points += pts;
            if (f.pos <= 3 && !f.dnf) adrv.form = (adrv.form || 0) + 1;
          }
        }
      }
    });
    // team points = sum of driver points
    const pTeam = { ...team, points: team.drivers.reduce((s, d) => s + d.points, 0) };
    newAi.forEach((a) => (a.points = a.drivers.reduce((s, d) => s + d.points, 0)));

    // ----- RACE LEDGER -----
    const ledger = [];
    let income = 0, costs = 0;

    // sponsor income (fixed + bonus; upfront already paid at signing)
    (team.sponsors || []).forEach((sp) => {
      const amt = sponsorRaceIncome(sp, playerRaceSummary);
      if (amt > 0) { income += amt; ledger.push({ label: `${sp.name} (${sp.type})`, amt }); }
    });
    // pay-driver income
    const payIn = perRaceDriverIncome(team);
    if (payIn > 0) { income += payIn; ledger.push({ label: "Pay-driver backing", amt: payIn }); }
    // Fan Favourite trait income
    let famIn = 0;
    playerRaceSummary.forEach((p) => { if (!p.dnf && (p.trait == null ? undefined : (p.trait.eff == null ? undefined : p.trait.eff.income))) famIn += p.trait.eff.income; });
    famIn = Math.round(famIn * 10) / 10;
    if (famIn > 0) { income += famIn; ledger.push({ label: "Fan-favourite buzz", amt: famIn }); }

    // home-nation publicity: supportive countries top up sponsor income
    const support = (team.nation == null ? undefined : team.nation.support) || 1;
    if (income > 0 && support !== 1) {
      const pub = Math.round(income * (support - 1) * 10) / 10;
      if (pub !== 0) { income += pub; ledger.push({ label: `${team.nation.name} backing`, amt: pub }); }
    }
    // extra publicity windfall at a true home race
    if (circuit.country === (team.nation == null ? undefined : team.nation.code)) {
      const homeBonus = Math.round((1 + support) * 10) / 10;
      income += homeBonus; ledger.push({ label: "Home race publicity", amt: homeBonus });
    }

    // costs: salaries + travel
    const running = perRaceCost(team);
    costs += running;
    ledger.push({ label: "Salaries + travel", amt: -running });

    const net = Math.round((income - costs) * 10) / 10;

    // accumulate clashes into the persistent beef ledger (driver-level)
    (result.clashes || []).forEach((c) => {
      const k = beefKey(c.a, c.b);
      beef.current[k] = (beef.current[k] || 0) + 1;
    });

    setTeam(pTeam);
    setAiTeams(newAi);
    setMoney((m) => Math.round((m + net) * 10) / 10);
    setLastResult({ ...result, playerRaceSummary, ledger, net, income: Math.round(income * 10) / 10, costs: Math.round(costs * 10) / 10 });
    setRevealedHighlights(0);
    setPhase("raceResult");

    if (chance(0.35)) {
      setRumor(pick(RUMOR_BANK)({ drivers: [...pTeam.drivers, ...newAi.flatMap(x => x.drivers)] }));
    } else {
      setRumor(null);
    }
  }

  function nextRace() {
    if (raceIdx + 1 >= calendar.length) {
      endSeason();
    } else {
      // ~55% chance of a season event between rounds
      if (chance(0.55)) {
        fireEvent();
      }
      // refresh the chairman's weekly word, flavoured by current target status
      const standings = [team, ...aiTeams].sort((a, b) => b.points - a.points);
      const pos = standings.findIndex((t) => t.id === team.id) + 1;
      const onTrack = seasonTarget ? pos <= seasonTarget.pos : null;
      setChairmanMsg(makeChairmanMessage(chairmanConf, onTrack));
      setRaceIdx((i) => i + 1);
      setPhase("season");
    }
  }

  function fireEvent() {
    // is there a hot rivalry? prefer one involving the player's drivers
    const playerNames = team.drivers.map((d) => d.name);
    const hotBeefs = Object.entries(beef.current).filter(([, v]) => v >= 3);
    let e, playerInvolved = false;
    const t = { ...team, drivers: team.drivers.map((d) => ({ ...d })) };
    if (hotBeefs.length && chance(0.35)) {
      // a hot rivalry flares up (biased toward the player's own feuds)
      const playerBeefs = hotBeefs.filter(([k]) => playerNames.some((n) => k.includes(n)));
      const [key] = (playerBeefs.length && chance(0.7)) ? pick(playerBeefs) : pick(hotBeefs);
      const [a, b] = key.split(":::");
      playerInvolved = playerNames.includes(a) || playerNames.includes(b);
      e = makeBeefEvent(a, b, playerInvolved);
    } else if (chance(0.7)) {
      // the bulk: a freshly generated off-the-grid paddock happening
      e = drawOffGrid(t);
    } else {
      // occasional hand-written classic from the curated bank
      e = drawEvent(usedEvents.current);
    }
    const res = e.fx(t) || {};
    let moneyDelta = 0;
    if (res.money) moneyDelta += res.money;
    if (res.carPace) t.carPace += res.carPace;
    if (res.carRace) t.carRace += res.carRace;
    if (res.reliability) t.reliability += res.reliability;
    if (res.mkt) t.teamMkt = Math.max(0, Math.min(100, (t.teamMkt || 0) + res.mkt));
    moneyDelta = Math.round(moneyDelta * 10) / 10;
    setTeam(t);
    if (moneyDelta) setMoney((m) => Math.round((m + moneyDelta) * 10) / 10);
    setPendingEvent({
      text: e.text, kind: e.kind, msg: res.msg || "", beef: !!e.beef, playerInvolved,
      money: moneyDelta,
      effects: [
        res.carPace ? `Car pace ${res.carPace > 0 ? "+" : ""}${res.carPace}` : null,
        res.carRace ? `Racecraft ${res.carRace > 0 ? "+" : ""}${res.carRace}` : null,
        res.reliability ? `Reliability ${res.reliability > 0 ? "+" : ""}${res.reliability}` : null,
        res.mkt ? `Marketability ${res.mkt > 0 ? "+" : ""}${res.mkt}` : null,
      ].filter(Boolean),
    });
  }

  // ---- end of season ----
  function endSeason() {
    const standings = [team, ...aiTeams].sort((a, b) => b.points - a.points);
    const playerPos = standings.findIndex((t) => t.id === team.id) + 1;
    const total = standings.length;
    const promoted = playerPos <= 2 && tierIdx < 3;
    const relegated = playerPos >= total - 1 && tierIdx > 0;
    const champion = playerPos === 1 && tierIdx === 3;

    // chairman target outcome
    const tgt = seasonTarget;
    const metTarget = playerPos <= tgt.pos;
    const beatBy = tgt.pos - playerPos; // positive = beat it

    // team marketability moves with how you did vs the target.
    // a bigger home fanbase amplifies the upside of a good result.
    const fans = (team.nation == null ? undefined : team.nation.fans) || 1;
    let mktDelta = 0;
    if (metTarget) mktDelta = Math.round((6 + Math.max(0, beatBy) * 3) * fans);
    else mktDelta = -8 - Math.min(4, playerPos - tgt.pos) * 2;
    const newTeamMkt = Math.max(0, Math.min(100, (team.teamMkt || 0) + mktDelta));

    // chairman confidence
    let confDelta = metTarget ? tgt.confReward + Math.max(0, beatBy) * 2 : -tgt.confPenalty;
    let newConf = Math.max(0, Math.min(100, chairmanConf + confDelta));

    // prize money scaled by target ambition + finishing position
    const prize = Math.round((total - playerPos + 1) * tgt.payout * 10) / 10;
    const newMoney = Math.round((money + prize) * 10) / 10;

    // failure conditions: bankrupt (deep debt) or fired (no confidence)
    const bankrupt = newMoney < -15;
    const fired = newConf <= 0;

    setMoney(newMoney);
    setChairmanConf(newConf);
    setTeam((t) => ({ ...t, teamMkt: newTeamMkt }));

    // persist this season's AI changes (points, driver wins/dnfs) back to the world
    aiTeams.forEach((a) => {
      const w = world.current.find((x) => x.id === a.id);
      if (w) {
        w.points = a.points;
        a.drivers.forEach((ad) => {
          const wd = w.drivers.find((x) => x.id === ad.id);
          if (wd) {
            wd.wins = (wd.wins || 0) + (ad.wins || 0);
            wd.podiums = (wd.podiums || 0) + (ad.podiums || 0);
            wd.dnfs = (wd.dnfs || 0) + (ad.dnfs || 0);
          }
        });
      }
    });

    const facts = buildSeasonFacts(team, standings, playerPos, calendar);
    const hint = buildHint(playerPos, total, promoted, relegated, team);

    // awards ceremony data
    const computedAwards = buildAwards(team, aiTeams, startSnapshot, seasonNum);
    const lookahead = buildLookahead({ champion, promoted, relegated }, tierIdx);
    setAwards({ ...computedAwards, lookahead, tierName: tier.name, seasonNum });

    setSeasonHistory((h) => [...h, {
      season: seasonNum, tier: tier.name, pos: playerPos, points: team.points,
      promoted, relegated, champion,
    }]);

    setLastResult({
      standings, playerPos, total, promoted, relegated, champion, prize, facts, hint,
      metTarget, target: tgt, mktDelta, newTeamMkt, confDelta, newConf, bankrupt, fired, newMoney,
    });
    setPhase("seasonEnd");
  }

  function continueAfterSeason() {
    const r = lastResult;
    if (r.fired || r.bankrupt) { setPhase("sacked"); return; }
    // champion still sees the awards (they won them), then the legacy screen
    setPhase("awards");
  }

  function continueAfterAwards() {
    const r = lastResult;
    if (r.champion) { setPhase("gameover"); return; }

    // ---- player tier move + difficulty ramp ----
    let newTier = tierIdx;
    if (r.promoted) {
      newTier = Math.min(3, tierIdx + 1);
      setDifficulty((d) => Math.min(5, d + 1.4)); // tougher up top, but still beatable
    }
    if (r.relegated) {
      newTier = Math.max(0, tierIdx - 1);
      setDifficulty((d) => Math.max(-3, d - 1.5)); // a softer field to rebuild against
    }

    // ---- cascade AI promotion/relegation across tiers ----
    // For each AI tier, sort by season points; top 1-2 go up, bottom 1-2 come down.
    // The player's slot is accounted for so grids stay the right size.
    const w = world.current.map((t) => ({ ...t }));
    // group by tier
    for (let ti = 0; ti < 3; ti++) {
      const upPool = w.filter((t) => t.tierIdx === ti).sort((a, b) => (b.points || 0) - (a.points || 0));
      const downPool = w.filter((t) => t.tierIdx === ti + 1).sort((a, b) => (a.points || 0) - (b.points || 0));
      // one AI swaps up, one swaps down (skip slots involving the player's promotion/relegation to avoid overfill)
      const promo = upPool.find((t) => !(r.promoted && ti === tierIdx));
      const releg = downPool.find((t) => !(r.relegated && ti + 1 === tierIdx));
      if (promo && releg) {
        promo.tierIdx = ti + 1;
        releg.tierIdx = ti;
      }
    }
    world.current = w;

    // ---- age player's own drivers (they get older too; can retire) ----
    const worldPool = world.current.flatMap((t) => t.drivers).filter((d) => !d.siblingOf);
    const pDrivers = team.drivers.map((d) => {
      const dd = { ...d };
      const retires = ageDriver(dd, usedNames.current);
      if (retires) {
        // auto-replaced by a regen (sometimes a sibling of a known driver)
        const regen = regenDriver(newTier, usedNames.current, worldPool);
        regen._replaced = dd.name;
        return regen;
      }
      return dd;
    });
    const playerRetirements = pDrivers.filter((d) => d._replaced).map((d) => ({ was: d._replaced, now: d.name, sibling: d.siblingOf || null }));

    // ---- evolve the rest of the world (ageing, regens, bankruptcies, foundations) ----
    const evo = evolveWorld(world.current, usedNames.current, usedTeamNames.current, seasonNum + 1, beef.current);
    world.current = evo.world;

    setWorldNews({
      retirements: evo.retirements,
      bankruptcies: evo.bankruptcies,
      foundations: evo.foundations,
      debuts: evo.debuts || [],
      playerRetirements,
      hotBeef: topBeef(),
    });

    setTierIdx(newTier);
    setTeam((t) => ({ ...t, tierIdx: newTier, drivers: pDrivers }));
    setPhase("offseason");
  }

  // surface the hottest current rivalries for the news screen
  function topBeef() {
    return Object.entries(beef.current)
      .filter(([, v]) => v >= 2)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3)
      .map(([k, v]) => ({ pair: k.replace(":::", " vs "), heat: v }));
  }

  function startNextSeason() {
    setSeasonNum((n) => n + 1);
    // fresh points for the whole world
    world.current = world.current.map((t) => ({ ...t, points: 0, drivers: t.drivers.map((d) => ({ ...d, points: 0, wins: 0, podiums: 0, dnfs: 0, form: 0 })) }));
    setSponsorPicks([]);
    setMarketingPicks([]);
    setSeasonTarget(null);
    setPendingEvent(null);
    setWorldNews(null);
    setLastUpgrade(null);
    setSeasonOffers(genSponsorOffers(sponsorAppeal(team)));
    setPhase("preseason");
  }

  // post-season: open a market of free agents for a given seat
  const [psMarket, setPsMarket] = useState(null);
  const [lastUpgrade, setLastUpgrade] = useState(null); // flavour of the most recent car upgrade roll
  function openSeatMarket(slotIdx) {
    const pool = [];
    for (let i = 0; i < 4; i++) pool.push(genDriver(usedNames.current));
    pool.sort((a, b) => a.fee - b.fee);
    setPsMarket({ slotIdx, pool });
  }
  function signFromMarket(d) {
    if (!psMarket) return;
    if (money < d.fee) return;
    setMoney((m) => Math.round((m - d.fee) * 10) / 10);
    setTeam((t) => {
      const drivers = [...t.drivers];
      drivers[psMarket.slotIdx] = { ...d };
      return { ...t, drivers };
    });
    setPsMarket(null);
  }
  function upgradeCar(stat) {
    const cost = 6;
    if (money < cost) return;
    const roll = rollUpgrade(stat);
    setMoney((m) => Math.round((m - cost) * 10) / 10);
    setTeam((t) => ({ ...t, [stat]: (t[stat] || 0) + roll.gain }));
    setLastUpgrade(roll);
  }

  // ===================== RENDER =====================
  const appeal = team ? sponsorAppeal({ ...team, teamMkt: team.teamMkt }) : 0;
  return (
    <Shell color={team ? team.color : formColor}>
      {phase === "intro" && <Intro onStart={beginSetup} />}
      {phase === "setup" && (
        <Setup
          formName={formName} setFormName={setFormName}
          formColor={formColor} setFormColor={setFormColor}
          formNation={formNation} setFormNation={setFormNation}
          onReroll={() => setFormName(genTeamName())}
          onConfirm={confirmTeam}
        />
      )}
      {phase === "draft" && pendingTeam && (
        <DriverMarket
          team={pendingTeam} pool={draftPool} chosen={chosenDrivers}
          money={money} onToggle={toggleDraftPick} onReroll={rerollMarket}
          onConfirm={confirmDraft}
        />
      )}
      {phase === "preseason" && team && preseasonOffers && (
        <Preseason
          team={team} money={money} tier={tier} tierIdx={tierIdx} seasonNum={seasonNum}
          offers={preseasonOffers} appeal={appeal}
          sponsorPicks={sponsorPicks} toggleSponsor={toggleSponsor}
          marketingPicks={marketingPicks} toggleMarketing={toggleMarketing}
          sponsorUpfront={sponsorUpfront()} spendable={spendableBudget()} spent={spentOnPrep()}
          targetOptions={targetOptions} seasonTarget={seasonTarget} setSeasonTarget={setSeasonTarget}
          onStart={startSeason}
        />
      )}
      {phase === "season" && team && (
        <SeasonHub
          team={team} aiTeams={aiTeams} calendar={calendar} raceIdx={raceIdx}
          tier={tier} money={money} rumor={rumor} seasonNum={seasonNum}
          chairmanMsg={chairmanMsg} seasonTarget={seasonTarget} onRace={runRace}
          event={pendingEvent} onDismissEvent={() => setPendingEvent(null)}
        />
      )}
      {phase === "raceResult" && lastResult && (
        <RaceResult
          result={lastResult} team={team} money={money}
          revealed={revealedHighlights} setRevealed={setRevealedHighlights}
          raceIdx={raceIdx} total={calendar.length}
          onNext={nextRace}
        />
      )}
      {phase === "seasonEnd" && lastResult && (
        <SeasonEnd result={lastResult} team={team} tier={tier} seasonNum={seasonNum} money={money} onContinue={continueAfterSeason} />
      )}
      {phase === "awards" && awards && (
        <Awards data={awards} result={lastResult} onContinue={continueAfterAwards} />
      )}
      {phase === "offseason" && worldNews && (
        <Offseason news={worldNews} comms={COMMS} tierName={TIERS[tierIdx].name} onContinue={() => setPhase("postseason")} />
      )}
      {phase === "postseason" && team && (
        <Postseason
          team={team} money={money} tierIdx={tierIdx} appeal={appeal}
          gridCars={aiInTier(world.current, tierIdx)} difficulty={difficulty}
          lastUpgrade={lastUpgrade}
          psMarket={psMarket} onOpenMarket={openSeatMarket} onSignMarket={signFromMarket}
          onCloseMarket={() => setPsMarket(null)}
          onUpgrade={upgradeCar} onNext={startNextSeason}
        />
      )}
      {phase === "sacked" && lastResult && (
        <Sacked result={lastResult} team={team} history={seasonHistory} onRestart={fullRestart} />
      )}
      {phase === "gameover" && (
        <GameOver team={team} history={seasonHistory} onRestart={fullRestart} />
      )}
    </Shell>
  );

  function fullRestart() {
    setSeasonHistory([]); setSeasonNum(1); setTierIdx(0);
    setChairmanConf(70); setSeasonTarget(null); setDifficulty(0);
    setAwards(null); setStartSnapshot(null); setPendingEvent(null); setWorldNews(null);
    usedEvents.current = new Set();
    world.current = []; beef.current = {};
    setPhase("intro");
  }
}

// ---------- season facts + hint builders ----------
function buildSeasonFacts(team, standings, pos, calendar) {
  const facts = [];
  const topDriver = [...team.drivers].sort((a, b) => b.points - a.points)[0];
  const totalWins = team.drivers.reduce((s, d) => s + d.wins, 0);
  const totalDnf = team.drivers.reduce((s, d) => s + d.dnfs, 0);
  facts.push(`${topDriver.name} was your top scorer with ${topDriver.points} points.`);
  if (totalWins > 0) facts.push(`The team racked up ${totalWins} race win${totalWins > 1 ? "s" : ""} this year.`);
  else facts.push(`No wins this season, but every backmarker has its day coming.`);
  if (totalDnf >= 4) facts.push(`A brutal ${totalDnf} DNFs. The reliability gremlins were merciless.`);
  else if (totalDnf === 0) facts.push(`Zero DNFs all season. Bulletproof. The mechanics deserve a raise.`);
  const gap = standings[0].points - team.points;
  if (pos === 1) facts.push(`You topped the standings outright. Champions.`);
  else facts.push(`You finished ${gap} points off the title pace.`);
  facts.push(pick([
    `${topDriver.nickname ? `"${topDriver.nickname}" lived up to the name.` : "The garage stayed loud all year."}`,
    `Paddock insiders rated your pit crew middle of the road. Room to grow.`,
    `Your team mascot, a slightly confused pit dog, became a fan favourite.`,
    `Rival engineers were reportedly baffled by your tyre strategy.`,
  ]));
  return facts;
}
function buildHint(pos, total, promoted, relegated, team) {
  if (promoted) return "Promoted. Next tier's faster. Spend on car pace early.";
  if (relegated) return "Relegated. Weaker field next year, your chance to bounce back.";
  if (pos <= total / 2) return "Mid-table and climbing. One more strong driver or an aero part could swing it.";
  return "Tough year. Prioritise reliability, finishing beats flashy DNFs.";
}

// ---------- post-season AWARDS ceremony ----------
const FUNNY_AWARD_BANK = [
  { title: "The Tin Foil Trophy", desc: "Most spectacular DNF of the season", pickFrom: "dnf" },
  { title: "Scenic Route Award", desc: "Most laps spent admiring the gravel traps", pickFrom: "dnf" },
  { title: "The Pit Lane Picasso", desc: "Most creative interpretation of a racing line", pickFrom: "random" },
  { title: "Sunday Driver Medal", desc: "Took the phrase 'cruise to the finish' too literally", pickFrom: "lowPoints" },
  { title: "The Bank Manager's Nightmare", desc: "Spent like the budget was infinite", pickFrom: "random" },
  { title: "Marbles Collector of the Year", desc: "Picked up more marbles than points off-line", pickFrom: "random" },
  { title: "The Radio Silence Award", desc: "Engineer wishes they'd say something useful", pickFrom: "random" },
  { title: "Best Supporting Backmarker", desc: "A true gentleman about being lapped", pickFrom: "lowPoints" },
  { title: "The Houdini Helmet", desc: "Disappeared from contention most reliably", pickFrom: "dnf" },
  { title: "Crowd Pleaser Cup", desc: "Made the most fans gasp, for better or worse", pickFrom: "random" },
];

function buildAwards(playerTeam, aiTeams, startSnapshot, seasonNum) {
  const allTeams = [playerTeam, ...aiTeams];
  const standings = [...allTeams].sort((a, b) => b.points - a.points);

  // all drivers flat, with their team
  const allDrivers = [];
  allTeams.forEach((t) => t.drivers.forEach((d) => allDrivers.push({ ...d, teamName: t.name, teamColor: t.color, isPlayer: t.isPlayer })));

  const championTeam = standings[0];
  const driverByPoints = [...allDrivers].sort((a, b) => b.points - a.points);
  const championDriver = driverByPoints[0];

  // most improved team: compare end points-rank vs pre-season strength rank
  let mostImproved = null;
  if (startSnapshot) {
    const startRank = {};
    [...startSnapshot].sort((a, b) => b.strength - a.strength).forEach((s, i) => { startRank[s.id] = i; });
    const endRank = {};
    standings.forEach((t, i) => { endRank[t.id] = i; });
    let best = -99;
    allTeams.forEach((t) => {
      if (startRank[t.id] == null) return;
      const gain = startRank[t.id] - endRank[t.id]; // positive = climbed
      if (gain > best) { best = gain; mostImproved = { team: t, gain }; }
    });
  }

  // serious awards
  const real = [
    { title: "Division Champions", name: championTeam.name, sub: `${championTeam.points} pts`, color: championTeam.color, isPlayer: championTeam.isPlayer },
    { title: "Champion Driver", name: championDriver.name, sub: `${championDriver.teamName} · ${championDriver.points} pts`, color: championDriver.teamColor, isPlayer: championDriver.isPlayer },
  ];
  if (mostImproved && mostImproved.gain > 0) {
    real.push({ title: "Most Improved Team", name: mostImproved.team.name, sub: `climbed ${mostImproved.gain} place${mostImproved.gain > 1 ? "s" : ""}`, color: mostImproved.team.color, isPlayer: mostImproved.team.isPlayer });
  }
  const topWinner = [...allDrivers].sort((a, b) => b.wins - a.wins)[0];
  if (topWinner && topWinner.wins > 0) {
    real.push({ title: "Most Race Wins", name: topWinner.name, sub: `${topWinner.wins} win${topWinner.wins > 1 ? "s" : ""}`, color: topWinner.teamColor, isPlayer: topWinner.isPlayer });
  }

  // funny awards (2, non-overlapping picks)
  const funnyDefs = shuffle(FUNNY_AWARD_BANK).slice(0, 2);
  const funny = funnyDefs.map((f) => {
    let cand;
    if (f.pickFrom === "dnf") {
      const pool = allDrivers.filter((d) => (d.dnfs || 0) > 0);
      cand = pool.length ? pool.sort((a, b) => b.dnfs - a.dnfs)[0] : pick(allDrivers);
    } else if (f.pickFrom === "lowPoints") {
      cand = [...allDrivers].sort((a, b) => a.points - b.points)[0];
    } else {
      cand = pick(allDrivers);
    }
    return { title: f.title, desc: f.desc, name: cand.name, teamName: cand.teamName, color: cand.teamColor, isPlayer: cand.isPlayer };
  });

  // season stats
  const totalDnf = allDrivers.reduce((s, d) => s + (d.dnfs || 0), 0);
  const totalWins = allDrivers.reduce((s, d) => s + (d.wins || 0), 0);
  const playerDrivers = playerTeam.drivers;
  const stats = [
    `${allTeams.length} teams, ${allDrivers.length} drivers, one champion.`,
    `${totalWins} different race wins were shared across the grid.`,
    `${totalDnf} DNFs in total. Carbon fibre everywhere.`,
    `Your best driver: ${[...playerDrivers].sort((a,b)=>b.points-a.points)[0].name} on ${[...playerDrivers].sort((a,b)=>b.points-a.points)[0].points} pts.`,
  ];

  return { real, funny, stats, championTeam, championDriver };
}

// what to expect next season (look-ahead hint)
function buildLookahead(result, tierIdx) {
  if (result.champion) return "You've conquered the summit. The history books are written.";
  if (result.promoted) return `Next stop: ${TIERS[Math.min(3, tierIdx + 1)].name}. The grid gets faster and the bills get bigger. Bank some cash and invest in pace before round one.`;
  if (result.relegated) return `Back to ${TIERS[Math.max(0, tierIdx - 1)].name}. Softer field, your chance to dominate. Aim high with the chairman and rebuild the war chest.`;
  return `Another crack at ${TIERS[tierIdx].name}. A marketable signing or a marketing push would unlock better sponsors and ease the money squeeze.`;
}

// ---------- shared style helpers ----------
const mono = "'JetBrains Mono', 'SF Mono', 'Roboto Mono', monospace";
const display = "'Archivo', 'Arial Narrow', sans-serif";

    * { box-sizing: border-box; }

    ::-moz-selection { background: #ffffff; color: #0a0c10; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }

    @keyframes popIn { 0%{opacity:0; transform: translateY(10px) scale(.98);} 12%{opacity:1; transform:none;} 88%{opacity:1; transform:none;} 100%{opacity:0; transform: translateY(-6px);} }

// ---------- Intro ----------
function Intro({ onStart }) {
  return (
    <div className="au-card" style={{ paddingTop: 56 }}>
      <Eyebrow>A racing team roguelike</Eyebrow>
      <h1 style={{ fontFamily: display, fontWeight: 900, fontSize: 52, lineHeight: 0.92, margin: "4px 0 8px", letterSpacing: "-.02em" }}>
        APEX<span style={{ color: "var(--accent)" }}>&</span>ATTRITION
      </h1>
      <p style={{ color: "#9aa0a6", fontSize: 14, lineHeight: 1.6, maxWidth: 480 }}>
        Take a backmarker team from the bottom of the ladder to motorsport's summit. Four tiers. Punny rivals. A grid full of chaos. Every season is procedurally built, so no two runs play the same.
      </p>
      <div style={{ display: "flex", gap: 8, margin: "20px 0", flexWrap: "wrap" }}>

// ---------- driver stat chips ----------
function TraitChip({ trait }) {
  if (!trait) return null;
  return (
    <span style={{ display: "inline-block", fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 3, background: `${trait.color}22`, color: trait.color, border: `1px solid ${trait.color}55` }}>
      {trait.tag}
    </span>
  );
}
// QoL: map a 0–100 rating to a high/low colour so figures read at a glance
function ratingColor(v) {
  if (v == null || isNaN(v)) return "#fff";
  if (v >= 80) return "#1de9b6";   // elite
  if (v >= 65) return "#7bd88f";   // strong
  if (v >= 50) return "#ffd54f";   // average
  if (v >= 35) return "#ffa270";   // weak
  return "#ff6b6b";                // poor
}
// single overall rating: pace & race carry the result, consistency supports
function driverOverall(d) {
  return Math.round(d.pace * 0.38 + d.race * 0.38 + d.consistency * 0.24);
}
function OverallBadge({ d, size = "md" }) {
  const ovr = driverOverall(d);
  const c = ratingColor(ovr);
  const big = size === "lg";
  return (
    <div style={{
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      width: big ? 52 : 44, height: big ? 52 : 44, borderRadius: 8,
      background: `${c}1f`, border: `1.5px solid ${c}`, flexShrink: 0,
    }}>
      <div style={{ fontFamily: display, fontWeight: 900, fontSize: big ? 22 : 18, color: c, lineHeight: 1 }}>{ovr}</div>
      <div style={{ fontSize: 7.5, color: c, letterSpacing: ".12em", marginTop: 1 }}>OVR</div>
    </div>
  );
}
function MiniStat({ label, val, raw }) {
  const n = raw != null ? raw : (typeof val === "number" ? val : parseFloat(val));
  return (
    <div style={{ textAlign: "center", flex: 1 }}>
      <div style={{ fontFamily: display, fontWeight: 800, fontSize: 17, color: ratingColor(n) }}>{val}</div>
      <div style={{ fontSize: 9, color: "#777", letterSpacing: ".08em", textTransform: "uppercase" }}>{label}</div>
    </div>
  );
}
function DriverCard({ d, compact }) {
  return (
    <Card style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
        <div style={{ display: "flex", gap: 11, alignItems: "center" }}>
          <OverallBadge d={d} />
          <div>
            <div style={{ fontFamily: display, fontWeight: 800, fontSize: 18 }}>{(d.nation == null ? undefined : d.nation.flag)} {d.name}</div>
            <div style={{ fontSize: 11, color: "#9aa0a6" }}>"{d.nickname}" · {(d.nation == null ? undefined : d.nation.name)} · {d.archetype} · age {d.age}</div>
          </div>
        </div>
        <TraitChip trait={d.trait} />
      </div>
      <div style={{ display: "flex", gap: 4, marginTop: 12 }}>
        <MiniStat label="Pace" val={d.pace} />
        <MiniStat label="Race" val={d.race} />
        <MiniStat label="Consist" val={d.consistency} />
        <MiniStat label="Market" val={`${d.marketability}%`} raw={d.marketability} />
      </div>
      {!compact && (
        <div style={{ marginTop: 11, fontSize: 12, color: "#aab0b8", lineHeight: 1.5 }}>
          <div style={{ color: (d.trait == null ? undefined : d.trait.color) }}>{(d.trait == null ? undefined : d.trait.desc)}</div>
          <div style={{ marginTop: 4, color: "#777", fontStyle: "italic" }}>{d.backstory}</div>
          <div style={{ marginTop: 6, fontSize: 11 }}>
            {d.isPayDriver
              ? <span style={{ color: "#1de9b6" }}>Pay driver: brings +${d.payBringsIn}M/race</span>
              : <span style={{ color: "#9aa0a6" }}>Salary ${d.salary}M/race</span>}
          </div>
        </div>
      )}
    </Card>
  );
}

// ---------- Floating finance bar (always shows current impact) ----------
function FinanceBar({ items }) {
  // items: [{label, value, tone}] tone: 'good'|'bad'|'neutral'
  return (
    <div style={{
      position: "sticky", top: 0, zIndex: 20, margin: "0 -16px 14px", padding: "10px 16px",
      background: "rgba(8,10,14,0.94)", backdropFilter: "blur(8px)",
      borderBottom: "1px solid #20242e", display: "flex", gap: 14, flexWrap: "wrap",
    }}>
      {items.map((it, i) => (
        <div key={i} style={{ display: "flex", flexDirection: "column" }}>
          <span style={{ fontSize: 9, letterSpacing: ".12em", textTransform: "uppercase", color: "#777" }}>{it.label}</span>
          <span style={{ fontFamily: display, fontWeight: 800, fontSize: 16, color: it.tone === "bad" ? "#ff6b6b" : it.tone === "good" ? "#1de9b6" : "#fff" }}>{it.value}</span>
        </div>
      ))}

}

function StarRow({ stars, locked }) {
  return (
    <span style={{ letterSpacing: 1, color: locked ? "#555" : "#ffd200", fontSize: 12 }}>

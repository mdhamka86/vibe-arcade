  );
}

// A gentle "still cooking" placeholder for screens we build in later phases.
// ============================================================
// THE SCRAPBOOK — the week gathered up, judged by a furious chef.
// While the week runs, everything submitted fills in live and a certain famous
// chef is teased as "on his way". Once the week closes, he sweeps in and hands
// out his awards. Trawls EVERYTHING via gatherWeek: claims, thoughts, moments,
// dares, duels, and the quiz. Nothing submitted goes unseen.
// ============================================================
function Scrapbook({ now, wk, shared }) {
  const week = gatherWeek(wk, shared);
  const realWk = weekNumber(now);
  const closed = realWk > wk; // the week's business is done once we've moved past it
  const [roast, setRoast] = useState(() => loadRoast(wk));
  const [summoning, setSummoning] = useState(false);

  // Once the week has closed, summon the chef (real brain, demo fallback).
  useEffect(() => {
    if (!closed || roast) return;
    setSummoning(true);
    fetchRoast(wk, week, (r) => { setRoast(r); setSummoning(false); });
    // eslint-disable-next-line
  }, [closed, wk]);

  const leader = week.scores.Hammy === week.scores.Naddy ? null
    : (week.scores.Hammy > week.scores.Naddy ? "Hammy" : "Naddy");

  const sectionLabel = (txt, accent) => (
    <div style={{ fontFamily: FM, fontSize: 10, letterSpacing: ".16em", textTransform: "uppercase", color: accent || T.inkSoft, margin: "18px 0 10px" }}>
      {txt}
    </div>
  );
  const card = { background: T.card, border: "1px solid " + T.line, borderRadius: 14, padding: "13px 15px", marginBottom: 10 };
  const who = (id) => (PLAYERS[id] ? PLAYERS[id] : { name: id, colour: T.inkSoft });

  return (
    <div>
      {/* the chef header: menace while open, verdict once closed */}
      <div style={{
        background: closed ? "#2a1e1a" : T.card,
        border: "1px solid " + (closed ? "#2a1e1a" : T.peach),
        borderRadius: 18, padding: "18px 18px", marginBottom: 14, textAlign: "center",
      }}>
        <div style={{ fontSize: 30, lineHeight: 1 }}>{closed ? "\ud83d\udd25" : "\ud83d\udc68\u200d\ud83c\udf73"}</div>
        {closed ? (
          <div>
            <div style={{ fontFamily: FH, fontWeight: 800, fontSize: 19, color: "#fff", marginTop: 8 }}>
              The chef has judged Week {wk}
            </div>
            <div style={{ fontFamily: FB, fontSize: 12.5, color: "rgba(255,255,255,.75)", marginTop: 5, lineHeight: 1.5 }}>
              He's read every photo, every caption, every feeble little taunt. Brace yourselves.
            </div>
          </div>
        ) : (
          <div>
            <div style={{ fontFamily: FH, fontWeight: 800, fontSize: 18, color: T.ink, marginTop: 8 }}>
              A famous chef is on his way
            </div>
            <div style={{ fontFamily: FB, fontSize: 12.5, color: T.inkSoft, marginTop: 5, lineHeight: 1.55 }}>
              Word has it a certain furious, foul-mouthed, Michelin-starred legend will sweep in when this week closes to judge everything you two get up to. Every photo. Every caption. Every limp taunt. So make the week count, because he is watching, and he is not a patient man.
            </div>
            <div style={{ fontFamily: FM, fontSize: 10, color: T.coralDk, letterSpacing: ".08em", marginTop: 10 }}>
              {weekEndsIn(now).toUpperCase()} · UNTIL SERVICE
            </div>
          </div>
        )}
      </div>

      {/* THE ROAST, once the chef has spoken */}
      {closed && (
        <div style={{ marginBottom: 8 }}>
          {summoning && !roast ? (
            <div style={{ ...card, textAlign: "center", padding: "24px 16px" }}>
              <div style={{ fontFamily: FB, fontSize: 13, color: T.inkSoft, fontStyle: "italic", lineHeight: 1.5 }}>
                The chef is reading the week, muttering, sharpening things\u2026
              </div>
            </div>
          ) : roast ? (
            <div>
              {roast.intro ? (
                <div style={{ ...card, borderLeft: "3px solid " + T.coralDk }}>
                  <div style={{ fontFamily: FB, fontSize: 13.5, color: T.ink, lineHeight: 1.6, fontStyle: "italic" }}>"{roast.intro}"</div>
                </div>
              ) : null}
              {(roast.awards || []).map((a, i) => (
                <div key={i} style={{ ...card }}>
                  <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 13.5, color: T.coralDk }}>\ud83c\udfc6 {a.title}</div>
                  <div style={{ fontFamily: FB, fontSize: 13, color: T.ink, lineHeight: 1.6, marginTop: 5, fontStyle: "italic" }}>"{a.line}"</div>
                </div>
              ))}
              <div style={{ textAlign: "center", fontFamily: FM, fontSize: 8.5, color: T.inkSoft, marginTop: 4, marginBottom: 6 }}>
                {roast.demo ? "chef's verdict · offline reading" : "chef's verdict · Gordon Ramsay"}
              </div>
            </div>
          ) : null}
        </div>
      )}

      {/* the week's tally line */}
      <div style={{ ...card, display: "flex", justifyContent: "space-around", textAlign: "center" }}>
        {PLAYER_IDS.map((id) => (
          <div key={id}>
            <div style={{ fontFamily: FH, fontWeight: 800, fontSize: 22, color: leader === id ? who(id).colour : T.ink }}>
              {week.scores[id] || 0}
            </div>
            <div style={{ fontFamily: FM, fontSize: 9, color: T.inkSoft, letterSpacing: ".08em", marginTop: 2 }}>
              {who(id).name.toUpperCase()} · {week.counts[id] || 0} MOMENTS
            </div>
          </div>
        ))}
      </div>

      {/* empty state, if genuinely nothing yet */}
      {week.total === 0 && (
        <div style={{ ...card, textAlign: "center", padding: "24px 16px" }}>
          <div style={{ fontFamily: FB, fontSize: 13, color: T.inkSoft, lineHeight: 1.6 }}>
            Nothing in the book yet this week. Claim a task, pen a thought, snap a moment, throw a dare. It all lands here, and the chef will be reading.
          </div>
        </div>
      )}

      {/* CLAIMS: completed board tasks */}
      {week.claims.length > 0 && sectionLabel("Tasks claimed · " + week.claims.length, T.coral)}
      {week.claims.map((c, i) => (
        <div key={"c" + i} style={{ ...card, opacity: c.overturned ? 0.6 : 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 10 }}>
            <span style={{ fontFamily: FH, fontWeight: 700, fontSize: 13.5, color: T.ink }}>{c.taskTitle}</span>
            <span style={{ fontFamily: FM, fontSize: 9.5, color: who(c.by).colour, flexShrink: 0 }}>{who(c.by).name}{c.overturned ? " · OVERTURNED" : ""}</span>
          </div>
          {c.photo ? <img src={c.photo} alt="proof" style={{ width: "100%", borderRadius: 10, marginTop: 9, display: "block", maxHeight: 300, objectFit: "cover" }} /> : null}
          {c.caption ? <div style={{ fontFamily: FB, fontSize: 12.5, color: T.ink, lineHeight: 1.5, marginTop: 8 }}>{c.caption}</div> : null}
          {c.taunt ? <div style={{ fontFamily: FB, fontSize: 11.5, color: T.inkSoft, lineHeight: 1.5, marginTop: 5, fontStyle: "italic" }}>Taunt: "{c.taunt}"</div> : null}
        </div>
      ))}

      {/* MOMENTS: snapped memory-wall photos */}
      {week.moments.length > 0 && sectionLabel("Moments snapped · " + week.moments.length, T.good)}
      {week.moments.map((m, i) => (
        <div key={"m" + i} style={{ ...card }}>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 10 }}>
            <span style={{ fontFamily: FM, fontSize: 9.5, color: who(m.by).colour }}>{who(m.by).name}{m.starred ? " · \u2b50 starred" : ""}</span>
          </div>
          {m.photoUrl ? <img src={m.photoUrl} alt="moment" style={{ width: "100%", borderRadius: 10, marginTop: 8, display: "block", maxHeight: 300, objectFit: "cover" }} /> : null}
          {m.text ? <div style={{ fontFamily: FB, fontSize: 12.5, color: T.ink, lineHeight: 1.5, marginTop: 8 }}>{m.text}</div> : null}
        </div>
      ))}

      {/* THOUGHTS: penned memory-wall lines */}
      {week.thoughts.length > 0 && sectionLabel("Thoughts penned · " + week.thoughts.length, T.spurs)}
      {week.thoughts.map((t, i) => (
        <div key={"th" + i} style={{ ...card }}>
          <div style={{ fontFamily: FB, fontSize: 13, color: T.ink, lineHeight: 1.6 }}>"{t.text}"</div>
          <div style={{ fontFamily: FM, fontSize: 9, color: who(t.by).colour, marginTop: 6 }}>{who(t.by).name}{t.starred ? " · \u2b50" : ""}</div>
        </div>
      ))}

      {/* DARES: settled throw-downs and their confessions */}
      {week.dares.length > 0 && sectionLabel("Dares thrown · " + week.dares.length, T.arsenal)}
      {week.dares.map((d, i) => (
        <div key={"d" + i} style={{ ...card }}>
          <div style={{ fontFamily: FB, fontSize: 12.5, color: T.ink, lineHeight: 1.5 }}>{d.text}</div>
          <div style={{ fontFamily: FM, fontSize: 9, color: T.inkSoft, marginTop: 6 }}>
            {who(d.from).name} \u2192 {who(d.to).name} · {String(d.result || "").toUpperCase()}
          </div>
          {d.secret ? <div style={{ fontFamily: FB, fontSize: 11.5, color: T.spurs, fontStyle: "italic", lineHeight: 1.5, marginTop: 6 }}>\ud83c\udf36 Confessed: "{d.secret}"</div> : null}
        </div>
      ))}

      {/* DUELS: the two photo head-to-heads with verdicts */}
      {week.duels.length > 0 && sectionLabel("Duels judged · " + week.duels.length, T.coralDk)}
      {week.duels.map((du, i) => (
        <div key={"du" + i} style={{ ...card }}>
          <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 13, color: T.ink }}>{du.kind}{du.theme ? " · " + du.theme : ""}</div>
          <div style={{ display: "flex", gap: 8, marginTop: 9 }}>
            {du.hammyPhoto ? <img src={du.hammyPhoto} alt="Hammy" style={{ width: "50%", borderRadius: 9, display: "block" }} /> : null}
            {du.naddyPhoto ? <img src={du.naddyPhoto} alt="Naddy" style={{ width: "50%", borderRadius: 9, display: "block" }} /> : null}
          </div>
          {du.verdict && du.verdict.winner ? (
            <div style={{ fontFamily: FB, fontSize: 12, color: T.ink, lineHeight: 1.5, marginTop: 8 }}>
              <b style={{ color: who(du.verdict.winner).colour }}>{who(du.verdict.winner).name} won.</b> {du.verdict.reason ? "\u201c" + du.verdict.reason + "\u201d" : ""}
            </div>
          ) : null}
        </div>
      ))}

      {/* QUIZ: Coach Saliba's test result */}
      {week.quiz && sectionLabel("Coach Saliba's test", T.arsenal)}
      {week.quiz && (
        <div style={{ ...card }}>
          <div style={{ fontFamily: FB, fontSize: 12.5, color: T.ink, lineHeight: 1.5 }}>
            {week.quiz.hammy ? "Hammy: " + week.quiz.hammy.score : "Hammy: didn't sit it"} · {week.quiz.naddy ? "Naddy: " + week.quiz.naddy.score : "Naddy: didn't sit it"}
          </div>
          {week.quiz.winner && week.quiz.winner !== "draw" ? (
            <div style={{ fontFamily: FM, fontSize: 9.5, color: who(week.quiz.winner).colour, marginTop: 6 }}>{who(week.quiz.winner).name.toUpperCase()} TOPPED THE CLASS</div>
          ) : null}
        </div>
      )}
    </div>
  );
}

// ---------- THE GAME ROUTER ----------
function Game({ now, who, isFull, onSwitch }) {
  const spectating = isSpectator(who); // a watching guest: reads everything, writes nothing
  const [view, setView] = useState("hub");
  const [finaleDismissed, setFinaleDismissed] = useState(false); // lets a champion peek back at the game
  const wk = weekNumber(now);
  const [claims, setClaimsState] = useState(() => loadClaims(wk));
  const [dares, setDaresState] = useState(() => loadDares(wk));

  // the shared book (memory wall, season score, scrapbooks, spoils): cross-phone,
  // near-instant. Your own changes show at once; the other phone's land in seconds.
  // A spectator gets it READ-ONLY, so viewing never writes to the two-of-you book.
  const [shared, updateShared] = useSharedState(spectating);

  // VAR verdict notices: surface any that concern THIS person and they've not yet
  // seen. We remember seen ids locally so nobody gets nagged twice. Both the
  // claimant and the appealer are "concerned" parties, so both get told.
  // A spectator views the world through a neutral lens (default to Hammy's
  // vantage purely so colour and jersey lookups resolve cleanly); the `spectating`
  // flag (set at the top of Game) is what disables every action.
  const meNow = spectating ? "Hammy" : (who || "Hammy");
  const [seenVar, setSeenVar] = useState(() => {
    try { return JSON.parse(localStorage.getItem("tg_seen_var") || "[]"); }
    catch (e) { return []; }
  });
  function dismissVar(id) {
    setSeenVar((prev) => {
      const next = prev.indexOf(id) >= 0 ? prev : [...prev, id];
      try { localStorage.setItem("tg_seen_var", JSON.stringify(next.slice(-100))); } catch (e) {}
      return next;
    });
  }
  const varNotices = (shared && Array.isArray(shared.varNotices)) ? shared.varNotices : [];
  const pendingVar = varNotices.filter((n) =>
    n && (n.claimant === meNow || n.appealer === meNow) && seenVar.indexOf(n.id) < 0
  );

  // persist claims whenever they change (device-local).
  // Accepts either a plain object or an updater function (prev => next), so
  // background updates (like a photo URL landing later) compose safely.
  function setClaims(weekNo, next) {
    if (spectating) return; // a watching guest never changes the board
    setClaimsState((prev) => {
      const resolved = typeof next === "function" ? next(prev) : next;
      saveClaims(weekNo, resolved);
      return resolved;
    });
  }
  function setDares(next) {
    if (spectating) return; // a watching guest never changes the dares
    saveDares(wk, next);
    setDaresState(next);
  }

  // The week's dealt board, plus the wildcard once it's live (Thursday on).
  const { dealt } = dealtBoard(wk);
  const wild = wildcardForWeek(wk);
  const festTasks = festivalTasks(now); // special challenges, only during a festival
  let fullDealt = wild && wildcardLive(now) ? dealt.concat([wild]) : dealt;
  if (festTasks.length) fullDealt = fullDealt.concat(festTasks);

  // live scores: tasks (with doubles + VAR) plus the dare economy
  const taskScores = tallyScores(fullDealt, claims, wk);
  const dareScores = tallyDares(dares);
  const scores = {
    Hammy: taskScores.Hammy + dareScores.Hammy,
    Naddy: taskScores.Naddy + dareScores.Naddy,
  };
  // the big-one duel's marquee points, once Michael Oliver has ruled
  const duelNow = loadDuel(wk);
  if (duelNow && duelNow.verdict && duelNow.verdict.winner === "Hammy") scores.Hammy += DUEL_WIN_PTS;
  else if (duelNow && duelNow.verdict && duelNow.verdict.winner === "Naddy") scores.Naddy += DUEL_WIN_PTS;
  // the photo-theme duel's points, once judged
  const themeNow = loadThemeDuel(wk);
  if (themeNow && themeNow.verdict && themeNow.verdict.winner === "Hammy") scores.Hammy += THEME_DUEL_PTS;
  else if (themeNow && themeNow.verdict && themeNow.verdict.winner === "Naddy") scores.Naddy += THEME_DUEL_PTS;
  // Coach Saliba's quiz duel points, once decided
  const quizNowW = quizWinner(wk);
  if (quizNowW === "Hammy") scores.Hammy += QUIZ_DUEL_PTS;
  else if (quizNowW === "Naddy") scores.Naddy += QUIZ_DUEL_PTS;

  // the season's streak picture: consecutive weekly wins toward the crown, plus
  // whether anyone's actually clinched it. This is what makes the chase visible.
  const season = seasonHistory(now);

  // Seasonal memory: the moment a champion is crowned, capture a permanent
  // snapshot of that season into the shared archive, so years from now the two
  // of you can leaf back through every season you ever played. Identified by its
  // clinch week (stable and unique per season), so it captures exactly ONCE no
  // matter how often the finale re-renders. Runs as an effect (never during
  // render) so it's a safe, well-behaved state update.
  useEffect(() => {
    if (!season.champion) return;
    const seasonId = "season-clinch-wk" + season.championWeek;
    const archive = (shared && Array.isArray(shared.seasonsArchive)) ? shared.seasonsArchive : [];
    if (archive.some((s) => s && s.id === seasonId)) return; // already captured
    const record = {
      id: seasonId,
      champion: season.champion,
      championWeek: season.championWeek,
      settled: season.settled.slice(),      // the week-by-week story
      wonAt: Date.now(),
    };
    updateShared((prev) => {
      const base = prev || {};
      const list = Array.isArray(base.seasonsArchive) ? base.seasonsArchive : [];
      if (list.some((s) => s && s.id === seasonId)) return base; // race guard
      return { ...base, seasonsArchive: [record, ...list] };
    });
  }, [season.champion, season.championWeek]);

  // "you" on this device: the picked side, or Hammy when he's testing pre-launch.
  // A spectator views through Hammy's vantage purely so lookups resolve; the
  // `spectating` flag (not this) is what gates every action.
  const me = spectating ? "Hammy" : (who || "Hammy");

  // Dev-only: wipe this week's claims AND dares so everything goes back to zero.
  // Behind isFull (Hammy testing), so Naddy never sees it. A belt-and-braces tidy
  // for pre-launch testing; the fresh Monday start is already guaranteed by the
  // per-week storage keys regardless.
  function resetThisWeek() {
    saveClaims(wk, {});
    setClaimsState({});
    saveDares(wk, []);
    setDaresState([]);
    setView("hub");
  }

  // A share awaiting login: when someone taps Share but hasn't connected their
  // Bluesky yet (or their saved login just failed), we stash the pending post
  // here and open BskyLogin. On a good login we post it straightaway.
  const [bskyLoginFor, setBskyLoginFor] = useState(null); // { text, imageUrl, onShared } | null

  // The single Bluesky poster, used by both the claim share and the memory
  // share. Mirrors Mission Phuket: pass the player's stored handle + app
  // password in the body; on any auth failure clear the bad creds and re-open
  // the login so there's never a dead end; if no creds are stored yet, open the
  // login first rather than firing a doomed request. Graceful in preview.
  function postToBluesky(payload) {
    // payload: { text, imageUrl, onShared }
    if (spectating) return;
    const creds = loadBskyCreds(me);
    if (!creds) { setBskyLoginFor(payload); return; } // connect first, then post
    fetch("/api/bluesky", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        who: me, handle: creds.handle, apppw: creds.apppw,
        text: payload.text, imageUrl: payload.imageUrl || "",
      }),
    })
      .then(async (res) => {
        const data = await res.json().catch(() => ({}));
        const msg = String(data.detail || data.error || "").toLowerCase();
        const authBad = res.status === 401 ||
          msg.includes("invalid identifier") || msg.includes("password") || msg.includes("login");
        if (authBad) {
          clearBskyCreds(me);
          setBskyLoginFor(payload); // re-open the login so they can fix it on the spot
          throw new Error("auth");
        }
        if (!res.ok) throw new Error(data.detail || data.error || ("Share failed " + res.status));
        return data;
      })
      .then(() => {
        if (payload.onShared) payload.onShared();
        if (typeof window !== "undefined" && window.alert) window.alert("Shared to Bluesky.");
      })
      .catch((err) => {
        // auth errors already re-opened the login; only surface other failures
        if (err && err.message === "auth") return;
        if (typeof window !== "undefined" && window.alert) {
          window.alert("Couldn't share just now. Check your connection and try again.");
        }
      });
  }

  // Share a claim to Bluesky (its caption + public photo). Marks the claim
  // shared once it's away.
  function shareToBluesky(task, claim) {
    if (!claim) return;
    const text = (claim.caption || ("Touched some grass: " + task.title)).slice(0, 280);
    postToBluesky({
      text: text,
      imageUrl: claim.photoUrl || "",
      onShared: () => setClaims(wk, (prev) => {
        const cur = prev && prev[task.id];
        if (!cur) return prev;
        return { ...prev, [task.id]: { ...cur, shared: true } };
      }),
    });
  }

  // Share a memory-wall entry to Bluesky (penned thought + its photo).
  function shareMemoryToBluesky(mem) {
    if (!mem) return;
    const text = (mem.text || "A moment from Phuket.").slice(0, 280);
    postToBluesky({ text: text, imageUrl: mem.photoUrl || "" });
  }

  // Record a claim into the shared auditable feed, so its taunt + photo can be
  // judged in the weekly scrapbook alongside memory-wall quips and moments. The
  // heavy raw photo stays device-local (via claims storage); only the slim public
  // URL, once uploaded, and the taunt text go into the shared book. Tagged "taunt".
  function auditClaim(task, claim, photoUrl) {
    if (!claim) return;
    const entry = {
      id: "claim_" + task.id + "_" + wk,
      by: claim.by || me, at: claim.at || Date.now(),
      kind: "taunt", week: wk,
      text: claim.taunt || "",
      caption: claim.caption || "",
      taskTitle: task.title || "",
      photoUrl: photoUrl || null,
      hasPhoto: !!(claim.photo || photoUrl),
      sharedToBluesky: false, starred: false,
    };
    updateShared((prev) => {
      const list = (prev && Array.isArray(prev.memories)) ? prev.memories : [];
      // replace any existing audit for this same claim (avoid duplicates), then add
      const cleaned = list.filter((m) => m.id !== entry.id);
      return { ...prev, memories: [entry, ...cleaned] };
    });
  }

  // Record a VAR verdict into the shared book so BOTH parties are informed of the
  // outcome, whether the appeal succeeded (overturned) or failed (claim stood).
  // The appealer sees it play out live; the other party learns of it via this
  // shared notice within a heartbeat. Kept as a small capped list of notices.
  function notifyVarVerdict(task, claim, verdict) {
    if (!claim || !verdict) return;
    const claimant = claim.by;                       // whose claim it was
    const appealer = verdict.by;                      // who sent it to VAR
    const overturned = verdict.result === "overturned";
    const notice = {
      id: "var_" + task.id + "_" + wk + "_" + (verdict.judged || Date.now()),
      taskId: task.id, taskTitle: task.title || "",
      week: wk, at: verdict.judged || Date.now(),
      claimant: claimant, appealer: appealer,
      result: verdict.result,
      // a plain-English line each party can be shown
      line: overturned
        ? (appealer + "'s appeal succeeded. Michael Oliver overturned " + claimant + "'s claim on \"" + (task.title || "a task") + "\". Those points are gone.")
        : (appealer + "'s appeal failed. Michael Oliver let " + claimant + "'s claim on \"" + (task.title || "a task") + "\" stand. The appeal backfired."),
    };
    updateShared((prev) => {
      const list = (prev && Array.isArray(prev.varNotices)) ? prev.varNotices : [];
      const cleaned = list.filter((n) => n.id !== notice.id);
      return { ...prev, varNotices: [notice, ...cleaned].slice(0, 40) };
    });
  }

  // The season, won: once someone's clinched three on the bounce, the finale
  // takes over everything (until the champion taps to peek back at the game).
  // (season is already computed above, up by the scores.)
  if (season.champion && !finaleDismissed) {
    return <Finale now={now} season={season} archive={(shared && Array.isArray(shared.seasonsArchive)) ? shared.seasonsArchive : []} onNewSeason={() => setFinaleDismissed(true)} />;
  }

  // Pick the current screen. Held in a variable (rather than returned straight
  // away) so the single return below can layer the Bluesky login overlay on top,
  // no matter which screen you tapped Share from.
  let screen;
  if (view === "hub") {
    screen = <Hub now={now} scores={scores} season={season} onGo={setView} onSwitch={onSwitch}
      isFull={isFull} onResetWeek={resetThisWeek} wk={wk}
      varNotices={pendingVar} me={meNow} onDismissVar={dismissVar} spectating={spectating} />;
  } else if (view === "board") {
    screen = <Screen title={"Week " + wk + " board"} onBack={() => setView("hub")}>
      <Board now={now} who={me} claims={claims} setClaims={setClaims}
        wildcard={wild && wildcardLive(now) ? wild : null} wk={wk}
        onShare={shareToBluesky} onAudit={auditClaim} onVarVerdict={notifyVarVerdict}
        spectating={spectating} />
    </Screen>;
  } else if (view === "wall") {
    screen = <Screen title="The memory wall" onBack={() => setView("hub")}>
      <MemoryWall me={me} shared={shared} updateShared={updateShared}
        onShareToBluesky={shareMemoryToBluesky} spectating={spectating} />
    </Screen>;
  } else if (view === "dares") {
    screen = <Screen title="Throw-down dares" onBack={() => setView("hub")}>
      <DaresScreen me={me} dares={dares} setDares={setDares} spectating={spectating} myScore={scores[me] || 0} />
    </Screen>;
  } else if (view === "school") {
    screen = <Screen title="Coach Saliba's Thai school" onBack={() => setView("hub")}>
      <ThaiSchool me={me} now={now} spectating={spectating} />
    </Screen>;
  } else if (view === "farang") {
    screen = <Screen title="Pocket Farang" onBack={() => setView("hub")}>
      <PocketFarang me={me} />
    </Screen>;
  } else if (view === "steak") {
    screen = <Screen title="The Meat Sweats Society" onBack={() => setView("hub")}>
      <MeatSweats />
    </Screen>;
  } else if (view === "weather") {
    screen = <Screen title="The Forecast Desk" onBack={() => setView("hub")}>
      <ForecastDesk />
    </Screen>;
  } else {
    screen = <Screen title="The scrapbook" onBack={() => setView("hub")}>
      <Scrapbook now={now} wk={wk} shared={shared} />
    </Screen>;
  }

  return (
    <React.Fragment>
      {screen}
      {bskyLoginFor && (
        <BskyLogin
          who={me}
          onClose={() => setBskyLoginFor(null)}
          onSave={(handle, apppw) => {
            saveBskyCreds(me, handle, apppw);
            const pending = bskyLoginFor;
            setBskyLoginFor(null);
            postToBluesky(pending); // creds are saved now, so this posts (or re-prompts if still wrong)
          }}
        />
      )}
    </React.Fragment>
  );
}

// ---------- Bluesky credentials (per person, on this phone) ----------
// Mirrors the Mission Phuket flow: each player stores their own handle + app
// password (NOT their real password) on their own device. These get passed in
// the /api/bluesky body for that one post and are never stored server-side.
// App passwords are revocable any time at bsky.app/settings/app-passwords, so a
// leaked key is harmless: revoke it and the real account password is untouched.
function bskyKey(who) { return "tg_bsky_" + (who || "Hammy"); }
function loadBskyCreds(who) {
  try {
    const raw = localStorage.getItem(bskyKey(who));
    if (!raw) return null;
    const c = JSON.parse(raw);
    return (c && c.handle && c.apppw) ? c : null;
  } catch (e) { return null; }
}
function saveBskyCreds(who, handle, apppw) {
  try {
    localStorage.setItem(bskyKey(who), JSON.stringify({
      handle: String(handle || "").trim().replace(/^@/, ""),
      apppw: String(apppw || "").trim(),
    }));
  } catch (e) {}
}
function clearBskyCreds(who) { try { localStorage.removeItem(bskyKey(who)); } catch (e) {} }

// THE PASSWORD GATE — mysterious & minimal. Just the wordmark and a prompt.
// ============================================================
function Gate({ onPass }) {
  const [val, setVal] = useState("");
  const [msg, setMsg] = useState("");
  const [shake, setShake] = useState(false);
  const [wrongIdx, setWrongIdx] = useState(0);

  function submit() {
    const level = checkPassword(val);
    if (level) {
      saveGate(level);
      onPass(level);
      return;
    }
    // wrong: cheeky message + a little shake, cycle through the bank
    setMsg(WRONG_WORDS[wrongIdx % WRONG_WORDS.length]);
    setWrongIdx(wrongIdx + 1);
    setShake(true);
    setVal("");
    setTimeout(() => setShake(false), 500);
  }

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", padding: "0 28px",

          fontFamily: FM, fontSize: 10.5, letterSpacing: ".16em",
          textTransform: "uppercase", color: T.inkSoft, textAlign: "center",
          marginBottom: 14,

          value={val}
          onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
          placeholder="……………"
          autoCapitalize="none" autoCorrect="off" spellCheck="false"
          style={{
            width: "100%", textAlign: "center", fontFamily: FB, fontWeight: 700,
            fontSize: 18, color: T.ink, background: T.card,
            border: "2px solid " + T.peach, borderRadius: 16,

          <Btn onClick={submit} style={{ minWidth: 150 }}>Enter</Btn>

            color: T.coralDk, textAlign: "center", lineHeight: 1.5,

function pad2(n) { return String(n).padStart(2, "0"); }

function Teaser({ now, isFull, onReset, onEnterGame }) {
  const [tick, setTick] = useState(0);
  const [hintIdx, setHintIdx] = useState(0);
  const [taps, setTaps] = useState(0);

  // live countdown, re-render every second
  useEffect(() => {
    const t = setInterval(() => setTick((x) => x + 1), 1000);
    return () => clearInterval(t);
  }, []);
  // rotate the hints every 3.2s
  useEffect(() => {
    const t = setInterval(() => setHintIdx((i) => (i + 1) % TEASE_HINTS.length), 3200);
    return () => clearInterval(t);
  }, []);

  const ms = Math.max(0, msUntilLaunch(Date.now()));
  const days = Math.floor(ms / 86400000);
  const hrs = Math.floor((ms % 86400000) / 3600000);
  const mins = Math.floor((ms % 3600000) / 60000);
  const secs = Math.floor((ms % 60000) / 1000);

  // easter egg: tap the palm 7 times for a cheeky cat cameo
  const catEgg = taps >= 7;

  const Unit = ({ v, label }) => (
    <div style={{ textAlign: "center", minWidth: 58 }}>
      <div style={{
        fontFamily: FH, fontWeight: 700, fontSize: 38, color: T.ink,

// ============================================================
// APP ROOT — the whole flow.
//   BEFORE Monday: password gate guards the surprise.
//     - Naddy's key -> teaser (curiosity preserved)
//     - Hammy's key -> may test the game
//   ON/AFTER Monday: password retires. Open door.
//     - first open on a phone -> "pick your side" (with jersey confirm)
//     - thereafter -> straight into the game, side remembered
//     - can switch side anytime
// ============================================================
function App() {
  const [gate, setGate] = useState(loadGate());     // null | 'teaser' | 'full'
  const [who, setWho] = useState(loadWho());        // null | 'Hammy' | 'Naddy'
  const [previewGame, setPreviewGame] = useState(false); // Hammy testing pre-launch
  const now = Date.now();
  const isLaunched = launched(now);

  // ---------- POST-LAUNCH: open door, identity not password ----------
  if (isLaunched) {
    if (!who) return <PickSide onPick={setWho} />;
    return <Game now={now} who={who} isFull={true} onSwitch={() => { setWho(null); }} />;
  }

  // ---------- PRE-LAUNCH: password guards the reveal ----------
  if (!gate) return <Gate onPass={setGate} />;
  const isFull = gate === "full";

  function relock() { clearGate(); setGate(null); setPreviewGame(false); }

  // Hammy (full) can flip into the game to test it before Monday.
  if (isFull && previewGame) {
    return <Game now={now} who="Hammy" isFull={true} onSwitch={relock} />;
  }

  // Otherwise show the teaser. Hammy gets a dev button to enter the game.
  return (
    <Teaser
      now={now}
      isFull={isFull}
      onReset={relock}
      onEnterGame={isFull ? () => setPreviewGame(true) : null}
    />
  );
}

// ============================================================
// POCKET FARANG — the two-way English <-> Thai pocket interpreter.
// Two modes:
//   1. TYPED : type one language, read the other, hear it aloud.
//   2. LIVE  : rolling batches that listen, translate, speak, then resume, so
//              it feels live. Auto-detect sniffs the script that came back
//              (Thai and Latin live in separate Unicode blocks) to work out
//              which language was spoken and steer itself, no toggle needed.
// Leans on the /api/farang brain (graceful fallback in preview). Speaking uses
// the browser's own voices; listening uses browser speech recognition (English
// is heard confidently; Thai is more variable, which we surface honestly).
// ============================================================

// ---------- translate client: calls the brain, graceful in preview ----------
function farangTranslate(text, dir, speaker, onResult) {
  if (!text || !text.trim()) { onResult(null); return; }
  fetch("/api/farang", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: text.trim(), dir: dir, speaker: speaker }),
  })
    .then((r) => r.ok ? r.json() : Promise.reject())
    .then((data) => {
      if (data && data.translation) onResult(data);
      else onResult({ translation: "", romanised: "", note: "preview", preview: true });
    })
    .catch(() => onResult({ translation: "", romanised: "", note: "preview", preview: true }));
}

// ---------- speak text aloud in a given language (browser voices) ----------
function farangSpeak(text, lang) {
  try {
    if (typeof window === "undefined" || !window.speechSynthesis || !text) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = 0.9;
    const voices = window.speechSynthesis.getVoices();
    const pref = voices.find((v) => v.lang && v.lang.toLowerCase().indexOf(lang.slice(0, 2)) === 0);
    if (pref) u.voice = pref;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch (e) { /* no-op */ }
}

// is browser speech recognition available at all?
function hasRecognition() {
  return (typeof window !== "undefined") &&
    !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

// ---------- defensive mic start: survive the hardware cooldown ----------
// When you hop between voice modes, the browser tears down one recognition
// session and we build a new one. The catch is that the physical mic stays
// "warm" for a beat after stop(), so a fresh start() landing inside that window
// gets slapped with an "already started" / "not-allowed" wobble and dies
// silently. That's why the FIRST switch works but the second or third goes dead.
//
// This helper starts a session and, if the mic is still cooling, waits a short
// beat and tries again a couple of times before giving up. onFail lets the mode
// show an honest little note rather than freeze. Returns nothing; the passed rec
// is started in place. Grounded in the documented Chromium restart behaviour.
function startRecognition(rec, onFail, tries) {
  var left = (typeof tries === "number") ? tries : 3;
  function attempt() {
    try {
      rec.start();
    } catch (e) {
      // InvalidStateError etc: the mic hasn't let go yet. Wait and retry.
      left -= 1;
      if (left > 0) { setTimeout(attempt, 260); }
      else if (onFail) { onFail(e); }
    }
  }
  attempt();
}

// ---------- which language did we actually hear? a script sniffer ----------
// Thai script and the Latin alphabet live in entirely separate blocks of
// Unicode, which hands us a nearly free language detector. Rather than trust the
// label we asked the mic to listen in, we look at what actually came back and
// count real letters of each script (ignoring spaces, digits and punctuation,
// which belong to neither and would only muddy the vote).
//
// Thai occupies U+0E00 to U+0E7F. Latin we take as the basic A to Z, upper and
// lower. We return "th", "en", or "unknown" when there simply isn't enough to
// tell (a lone number, a grunt, silence), so the caller can hold its judgement
// rather than commit to a coin-flip on a single ambiguous syllable.
function sniffScript(text) {
  if (!text) return "unknown";
  var thai = 0, latin = 0;
  for (var i = 0; i < text.length; i++) {
    var c = text.charCodeAt(i);
    if (c >= 0x0E00 && c <= 0x0E7F) thai++;
    else if ((c >= 65 && c <= 90) || (c >= 97 && c <= 122)) latin++;
  }
  if (thai === 0 && latin === 0) return "unknown";
  return thai > latin ? "th" : "en";
}

// The language we EXPECT a given translation direction to have heard, so we can
// compare it against what sniffScript actually found and spot a mismatch.
function heardLangFor(dir) { return dir === "en2th" ? "en" : "th"; }

// ---------- Pocket Farang history: personal, on-device, per player ----------
// The interpreter is a private thing you each carry, not a shared board, so its
// memory lives only in this phone's own storage and is keyed by player. Naddy's
// history and yours never mingle, and nothing ever leaves the device. We keep a
// generous but bounded stretch of recent lines so it remembers your conversation
// without ever growing without limit. Follows the same tidy load/save pattern as
// the rest of the app (the Thai school, the VAR history, the claims, and so on).
function farangHistKey(who) { return "tg_farang_hist_" + (who || "Hammy"); }
function loadFarangHist(who) {
  try { return JSON.parse(localStorage.getItem(farangHistKey(who)) || "[]"); }
  catch (e) { return []; }
}
function saveFarangHist(who, lines) {
  // Cap at 40 lines: plenty to feel like a real memory, small enough to stay
  // featherlight in storage and instant to read back.
  try { localStorage.setItem(farangHistKey(who), JSON.stringify((lines || []).slice(0, 40))); } catch (e) {}
}

// ---------- a result card: the translation, romanised, hear-it ----------
function FarangResult({ result, dir }) {
  if (!result) return null;
  if (result.preview) {
    return (
      <div style={{

        borderRadius: 12, padding: "12px 14px", fontFamily: FB, fontSize: 12.5, color: T.coralDk, lineHeight: 1.55,
      }}>

      </div>

      <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 22, color: T.ink, lineHeight: 1.35 }}>
        {result.translation}

        </div>

          {result.note}
        </div>

      <button onClick={() => farangSpeak(result.translation, spokenLang)} style={{
        marginTop: 13, cursor: "pointer", background: T.peach, border: "none", borderRadius: 11,
        padding: "9px 18px", fontFamily: FH, fontWeight: 700, fontSize: 13, color: T.coralDk,

}

// ---------- direction toggle: which way are we translating ----------
function DirToggle({ dir, setDir }) {
  const left = dir === "en2th";

        fontFamily: FH, fontWeight: 700, fontSize: 13, color: !left ? "#fff" : T.inkSoft }}>
        ไทย Thai
      </div>

// ---------- MODE 1: typed translator ----------
function TypedMode({ dir, setDir, me }) {
  const [text, setText] = useState("");
  const [result, setResult] = useState(null);
  const [busy, setBusy] = useState(false);
  function go() {
    if (!text.trim()) return;
    setBusy(true); setResult(null);
    farangTranslate(text, dir, me, (r) => { setResult(r); setBusy(false); });
  }
  return (
    <div>
      <DirToggle dir={dir} setDir={setDir} />
      <textarea value={text} onChange={(e) => setText(e.target.value)} rows={3}
        placeholder={dir === "en2th" ? "Type English..." : "พิมพ์ภาษาไทย... (type Thai)"}
        style={{ width: "100%", fontFamily: FB, fontSize: 16, color: T.ink, background: T.card,
          border: "1px solid " + T.line, borderRadius: 14, padding: "13px 15px", resize: "vertical", outline: "none" }} />
      <button onClick={go} disabled={busy || !text.trim()} style={{
        marginTop: 12, width: "100%", cursor: (busy || !text.trim()) ? "default" : "pointer",
        background: text.trim() ? T.coral : T.line, border: "none", borderRadius: 13,
        padding: "13px 0", fontFamily: FH, fontWeight: 700, fontSize: 15, color: "#fff", opacity: busy ? 0.7 : 1,
      }}>{busy ? "Translating..." : "Translate"}</button>
      <FarangResult result={result} dir={dir} />
    </div>
  );
}

// ---------- MODE 3: rolling live translate (batched, feels live) ----------
// Listens continuously; when a phrase settles (a natural pause), it translates
// and speaks that batch, then resumes. Batching is the trick that makes it feel
// live, exactly as the big apps do it. Thai recognition is the weaker link, and
// we surface that honestly rather than pretend it is flawless.
function LiveMode({ dir, setDir, me }) {
  const [on, setOn] = useState(false);
  const [heard, setHeard] = useState("");
  // Start from the saved history so tabbing away and back keeps your
  // conversation. Show a tidy recent slice on screen; the fuller archive (up to
  // 40) stays safe in storage and is what gets written back as you go.
  const [lines, setLines] = useState(() => loadFarangHist(me).slice(0, 12)); // {src, out, dir}
  const [status, setStatus] = useState("idle"); // idle | warming | listening | thinking | speaking
  const [autoDetect, setAutoDetect] = useState(true); // sniff the language and steer itself
  const recRef = useRef(null);
  const onRef = useRef(false);
  const timerRef = useRef(null);   // resume timer, so we can cancel a pending restart
  const dogRef = useRef(null);     // watchdog timer: forces a restart if a pass stalls
  const dirRef = useRef(dir);      // freshest direction, readable inside the long-lived loop
  const autoRef = useRef(true);    // freshest auto-detect setting
  const retryRef = useRef(0);      // how many times we've re-listened for one phrase (guards loops)

  // Keep the refs in step with state so the loop always reads current values
  // rather than a stale snapshot captured when the component first mounted.
  useEffect(() => { dirRef.current = dir; }, [dir]);
  useEffect(() => { autoRef.current = autoDetect; }, [autoDetect]);

  // On leaving Live: kill the rolling loop flag first so no queued timer can
  // revive it, then detach the handlers (so a late onend can't re-fire the
  // loop) and hard-stop the session. This is what stops fast mode-hopping from
  // stranding an open mic that jams the next mode.
  useEffect(() => {
    return () => {
      onRef.current = false;
      if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }
      if (dogRef.current) { clearTimeout(dogRef.current); dogRef.current = null; }
      const rec = recRef.current;
      if (rec) {
        try { rec.onresult = null; rec.onerror = null; rec.onend = null; } catch (e) {}
        try { rec.stop(); } catch (e) {}
        try { rec.abort(); } catch (e) {}
        recRef.current = null;
      }
    };
  }, []);

  function begin() {
    if (!hasRecognition()) { setLines([{ src: "", out: "This phone can't do live listening. The typed mode always works." }]); return; }
    // Keep any saved history and simply carry on adding to it, rather than
    // wiping the slate. Your conversation should persist across sessions now.
    onRef.current = true; setOn(true); setHeard(""); retryRef.current = 0;
    setStatus("warming");
    loop();
  }
  function loop() {
    if (!onRef.current) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    // Read direction FRESH each cycle so a self-steer (or manual tap) between
    // phrases actually changes which language the mic listens for this pass.
    const curDir = dirRef.current;
    const recLang = curDir === "en2th" ? "en-US" : "th-TH";
    const outLang = curDir === "en2th" ? "th-TH" : "en-US";
    rec.lang = recLang; rec.interimResults = true; rec.maxAlternatives = 1;
    recRef.current = rec;
    let batch = "";

    // One safe restart per pass. Mobile Chrome's onend is famously unreliable,
    // so BOTH the normal onend path and a watchdog timer call this. The "done"
    // latch guarantees the loop turns over exactly once: never twice, never zero
    // times. This is what stops Live going silent after the first phrase.
    let done = false;
    function again(delay) {
      if (done) return;
      done = true;
      if (dogRef.current) { clearTimeout(dogRef.current); dogRef.current = null; }
      if (onRef.current) timerRef.current = setTimeout(loop, delay);
    }

    rec.onstart = () => { if (onRef.current) setStatus("listening"); };
    rec.onresult = (e) => {
      let t = "";
      for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
      batch = t; setHeard(t);
    };
    rec.onerror = () => {};
    rec.onend = () => {
      const src = batch.trim();
      if (!src) {
        // Nothing landed this pass: just breathe and listen again, no fuss.
        setHeard("");
        again(300);
        return;
      }

      // AUTO-DETECT: glance at the script that actually came back and compare it
      // to the language we were listening for. Thai and Latin are worlds apart in
      // Unicode, so this is a near-free, near-instant check with no second pass.
      if (autoRef.current) {
        const found = sniffScript(src);
        const expected = heardLangFor(curDir);
        // A confident mismatch (we listened for one script, clearly got the other)
        // means the speaker used the other language. Flip and re-listen ONCE, so
        // the mic hears them properly. retryRef guards against endless flip-flop
        // on a genuinely ambiguous scrap.
        if (found !== "unknown" && found !== expected && retryRef.current < 1) {
          retryRef.current += 1;
          const flipped = curDir === "en2th" ? "th2en" : "en2th";
          dirRef.current = flipped;
          setDir(flipped);
          setHeard("");
          again(250);
          return;
        }
      }
      retryRef.current = 0;

      // We're happy with this phrase: translate, show it, speak it back.
      setStatus("thinking");
      farangTranslate(src, curDir, me, (r) => {
        if (r && r.translation) {
          const entry = { src: src, out: r.translation, dir: curDir, at: Date.now() };
          setLines((prev) => {
            const next = [entry, ...prev];
            // Save a generous stretch to this phone (the helper caps at 40), so
            // your conversation persists across tabs and restarts. Keep the
            // on-screen list trimmed to a tidy 12 so it stays light to scroll.
            saveFarangHist(me, next);
            return next.slice(0, 12);
          });
          setStatus("speaking");
          farangSpeak(r.translation, outLang);
          // Conversation naturally alternates, so tee up the OTHER language for
          // whoever replies next. If auto-detect is off, we hold the direction.
          if (autoRef.current) {
            const flipped = curDir === "en2th" ? "th2en" : "en2th";
            dirRef.current = flipped;
            setDir(flipped);
          }
        }
        setHeard("");
        // Give speech a moment to start before we reopen the mic, so the phone
        // doesn't try to listen to its own voice. Patience beats lag here.
        again(700);
      });
    };
    // Defensive start: if the mic is still cooling from a previous mode or pass,
    // the helper waits and retries rather than dying. If it truly can't start,
    // roll the loop round again so Live keeps trying to recover.
    startRecognition(rec, () => { again(600); });

    // Watchdog backstop. Mobile Chrome sometimes never fires onend, which would
    // otherwise leave Live silent forever after one phrase. If this pass hasn't
    // turned the loop over within a generous window, we force the stuck session
    // to end (which usually triggers a normal onend) and, latch permitting, kick
    // off a fresh pass ourselves. This is the belt to onend's braces.
    if (dogRef.current) { clearTimeout(dogRef.current); }
    dogRef.current = setTimeout(() => {
      // If the user is speaking a long sentence, don't yank the mic away; only
      // step in when nothing at all has been heard this pass.
      if (!batch.trim()) {
        try { rec.stop(); } catch (e) {}
        try { rec.abort(); } catch (e) {}
        again(300);
      } else {
        // Speech is mid-flow: give it one more grace window before intervening.
        if (dogRef.current) { clearTimeout(dogRef.current); }
        dogRef.current = setTimeout(() => { try { rec.stop(); } catch (e) {} }, 4000);
      }
    }, 9000);
  }
  function end() {
    onRef.current = false; setOn(false); setStatus("idle");
    if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }
    if (dogRef.current) { clearTimeout(dogRef.current); dogRef.current = null; }
    try { if (recRef.current) recRef.current.stop(); } catch (e) {}
  }

  // A friendly, honest word for whatever the interpreter is doing right now.
  const statusLine = {
    warming: "Warming up the mic, one moment...",
    listening: autoDetect ? "Listening. Speak English or Thai, whichever suits." : "Listening...",
    thinking: "Thinking...",
    speaking: "Speaking it back...",
    idle: "",
  }[status] || "";

  return (
    <div>
      {/* auto-detect switch: on, it steers itself; off, you drive with the toggle */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 9, marginBottom: 12 }}>
        <button onClick={() => setAutoDetect((v) => !v)} style={{
          cursor: "pointer", background: autoDetect ? T.ink : T.card,
          border: "1px solid " + (autoDetect ? T.ink : T.line), borderRadius: 999,
          padding: "6px 14px", fontFamily: FH, fontWeight: 700, fontSize: 12,
          color: autoDetect ? "#fff" : T.inkSoft,
        }}>{autoDetect ? "Auto-detect: on" : "Auto-detect: off"}</button>
        <span style={{ fontFamily: FB, fontSize: 11.5, color: T.inkSoft }}>
          {autoDetect ? "It figures out the language for you" : "You pick the direction below"}
        </span>
      </div>

      {/* manual steering wheel: hidden when auto-detect is driving */}
      {!autoDetect ? <DirToggle dir={dir} setDir={setDir} /> : null}

      <div style={{ textAlign: "center" }}>
        <button onClick={on ? end : begin} style={{
          cursor: "pointer", background: on ? T.coralDk : T.coral, border: "none", borderRadius: 14,
          padding: "13px 30px", fontFamily: FH, fontWeight: 700, fontSize: 15, color: "#fff",
          animation: on ? "tgPulse 1.2s ease-in-out infinite" : "none",
        }}>{on ? "Stop live" : "Start live translate"}</button>
        <div style={{ marginTop: 10, fontFamily: FB, fontSize: 12, color: T.inkSoft, lineHeight: 1.5, minHeight: 17 }}>
          {on ? (statusLine || "Listening...")
              : "Keeps the mic open and rolls through the chat. Just talk, either language."}
        </div>
      </div>
      {heard ? (
        <div style={{ marginTop: 12, fontFamily: FB, fontSize: 13, color: T.inkSoft, textAlign: "center", fontStyle: "italic" }}>
          hearing: "{heard}"
        </div>
      ) : null}
      <div style={{ marginTop: 14 }}>
        {lines.length > 0 ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 9 }}>
            <span style={{ fontFamily: FM, fontSize: 10.5, color: T.inkSoft, letterSpacing: ".08em", textTransform: "uppercase" }}>
              Recent
            </span>
            <button onClick={() => {
              if (confirm("Clear your saved translation history on this phone? Naddy won't see any of this either way, it's just tidying your own record.")) {
                setLines([]);
                saveFarangHist(me, []);
              }
            }} style={{
              cursor: "pointer", background: "transparent", border: "none", padding: "2px 4px",
              fontFamily: FB, fontSize: 12, color: T.coralDk, textDecoration: "underline",
            }}>Clear</button>
          </div>
        ) : null}
        {lines.map((ln, i) => (
          <div key={i} style={{ background: T.card, border: "1px solid " + T.line, borderRadius: 13, padding: "11px 14px", marginBottom: 9 }}>
            {ln.src ? (
              <div style={{ fontFamily: FB, fontSize: 12, color: T.inkSoft, marginBottom: 4 }}>
                {ln.dir ? <span style={{ fontFamily: FM, fontSize: 10, color: T.coralDk, marginRight: 6 }}>{ln.dir === "en2th" ? "EN→TH" : "TH→EN"}</span> : null}
                {ln.src}
              </div>
            ) : null}
            <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 16, color: T.ink, lineHeight: 1.35 }}>{ln.out}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Format the time left in the current week (to Sunday midnight Phuket).
function weekEndsIn(now) {
  const s = startOfWeek(now);
  const end = new Date(s); end.setDate(end.getDate() + 7);
  const ms = end.getTime() - new Date(now).getTime();
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d >= 1) return d + (d === 1 ? " day" : " days") + " left";
  if (h >= 1) return h + (h === 1 ? " hour" : " hours") + " left";
  const m = Math.floor((ms % 3600000) / 60000);
  return m + " min left";
}

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
        <div style={{ fontFamily: FM, fontSize: 9, letterSpacing: ".13em", color: "#1e2a38" }}>
          MICHAEL OLIVER · VAR
        </div>
        <button onClick={() => onDismiss(notice.id)} style={{
          cursor: "pointer", background: "transparent", border: "none", padding: "2px 4px",
          fontFamily: FH, fontWeight: 700, fontSize: 13, color: T.inkSoft,
        }}>✕</button>
      </div>
      <div style={{
        marginTop: 6, fontFamily: FH, fontWeight: 700, fontSize: 15,
        color: overturned ? T.good : T.coralDk,
      }}>
        {overturned ? "Claim overturned" : "Claim stood"}
      </div>
      <div style={{ marginTop: 4, fontFamily: FB, fontSize: 13, color: T.ink, lineHeight: 1.55 }}>
        {notice.line}
      </div>
    </div>
  );
}

// ============================================================
// THE FORECAST DESK — live Ko Kaeo weather, funnily reported.
// Ported from Mission Phuket: one cached Open-Meteo call (no key), fetched only
// when this page opens. All the personality is pure local computation, so once
// the numbers land it's instant. Re-dressed here in Touch Grass's warm palette.
// ============================================================
const KOKAEO_LAT = 7.95, KOKAEO_LON = 98.39;

// module-level cache so flipping away and back doesn't refetch every time
let _wxCache = null;

// pick a random item from an array
function wxPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// map an Open-Meteo weather code to a condition bucket + label
function wxBucket(code) {
  if (code === 0) return { key: "clear", label: "Clear" };
  if (code === 1 || code === 2) return { key: "partly", label: "Partly cloudy" };
  if (code === 3) return { key: "cloudy", label: "Overcast" };
  if (code >= 45 && code <= 48) return { key: "fog", label: "Foggy" };
  if (code >= 51 && code <= 57) return { key: "drizzle", label: "Drizzle" };
  if (code >= 61 && code <= 65) return { key: "rain", label: "Rain" };
  if (code >= 66 && code <= 67) return { key: "rain", label: "Rain" };
  if (code >= 80 && code <= 82) return { key: "showers", label: "Showers" };
  if (code >= 95 && code <= 99) return { key: "storm", label: "Thunderstorm" };
  return { key: "cloudy", label: "Unsettled" };
}

// A big friendly icon per condition, so a glance tells you the day's mood.
const WX_EMOJI = {
  clear: "\u2600\ufe0f", partly: "\u26c5", cloudy: "\u2601\ufe0f", fog: "\ud83c\udf2b\ufe0f",
  drizzle: "\ud83c\udf26\ufe0f", rain: "\ud83c\udf27\ufe0f", showers: "\ud83c\udf26\ufe0f", storm: "\u26c8\ufe0f",
};
// A soft background wash per condition, so the headline card carries a little
// mood. Kept gentle and warm to sit inside the app's cream-and-coral world.
const WX_TINT = {
  clear:   "linear-gradient(135deg, #fff4e0, #ffe6c9)",
  partly:  "linear-gradient(135deg, #fff2e2, #ffe9d6)",
  cloudy:  "linear-gradient(135deg, #f4f1ee, #e9e4de)",
  fog:     "linear-gradient(135deg, #f1efec, #e6e2dd)",
  drizzle: "linear-gradient(135deg, #eef3f6, #dfeaf0)",
  rain:    "linear-gradient(135deg, #e8f0f5, #d5e6ef)",
  showers: "linear-gradient(135deg, #eef3f6, #dfeaf0)",
  storm:   "linear-gradient(135deg, #ecebf2, #dcd9ea)",
};
function wxEmoji(key) { return WX_EMOJI[key] || "\ud83c\udf24\ufe0f"; }
function wxTint(key) { return WX_TINT[key] || WX_TINT.cloudy; }

// big banks of funny one-liners per condition, assembled randomly so it rarely repeats
const WX_LINES = {
  clear: [
    "Not a cloud in sight. The sky forgot how to rain. Suspicious, but enjoy it.",
    "Blue skies and zero excuses. Go outside before the universe corrects this.",
    "Clear as Naddy's side-eye. Sun's out, sunscreen on, no negotiating.",
    "The sky is showing off. Big confident blue energy today.",
    "Cloudless. The sun has the whole stage to itself and it knows it.",
  ],
  partly: [
    "A few clouds drifting about, like commuters with nowhere urgent to be.",
    "Sun playing peekaboo behind some lazy clouds. Mostly pleasant, mildly indecisive.",
    "Half sun, half cloud, fully Phuket. The sky is keeping its options open.",
    "Scattered clouds, scattered vibes. Good odds the sun wins the day.",
    "Clouds present but not committed. The sun's still the main character.",
  ],
  cloudy: [
    "Grey lid on the island today. The sun called in sick.",
    "Overcast and brooding, like a teenager who just discovered poetry.",
    "The sky is one big soft blanket of grey. Cosy, if you squint.",
    "Cloud cover doing its full impression of a duvet. No sun cameo expected.",
    "Flat grey skies. The island is in moody black-and-white mode.",
  ],
  fog: [
    "Misty and mysterious. The island is doing its atmospheric horror-film intro.",
    "Fog rolling in. Visibility low, drama high. Drive gently.",
    "The sky exhaled and forgot to clear up. Soft, hazy, dreamlike.",
  ],
  drizzle: [
    "Light drizzle. The sky is gently misting you like a fancy supermarket vegetable.",
    "Barely-there rain. More of a vibe than a downpour. Umbrella optional, ego intact.",
    "A soft spritz from above. Annoying, not threatening. Phuket's gentlest setting.",
    "Drizzle. The kind of rain that can't decide if it's even bothering.",
  ],
  rain: [
    "Proper rain incoming. The sky has feelings and it's sharing all of them.",
    "Wet stuff falling with intent. Bring the umbrella, respect the monsoon.",
    "Rain with conviction. The island gets its daily power-wash.",
    "It's raining like it means it. The cats will judge you if you go out unprepared.",
    "Steady rain. Thailand's wet season flexing right on schedule.",
  ],
  showers: [
    "Showers blowing through, on and off, like a flaky friend's reply times.",
    "Bursts of rain between bursts of sun. The sky can't commit. Classic July.",
    "Hit-and-run showers today. Quick, wet, gone before you've found the umbrella.",
    "On-off showers. The sky's tapping the brakes every twenty minutes.",
  ],
  storm: [
    "Thunderstorm brewing. The sky is about to put on a full son et lumière show.",
    "Storms incoming. Big dramatic monsoon energy. Stay in, make tea, enjoy the rumble.",
    "Thunder and lightning likely. The island's mood: theatrical. Keep the cats comforted.",
    "A storm's loading. Expect noise, drama, and the freshest air afterwards.",
  ],
};

// feels-like commentary based on the gap to actual temp
function feelsLine(temp, feels) {
  const gap = feels - temp;
  if (gap >= 4) return wxPick([
    "The humidity has entered the chat and it's personal.",
    "Feels hotter than it is. That's the famous Phuket soup-air tax.",
    "The air is basically a warm wet hug you didn't ask for.",
    "Humidity surcharge applied. You will sweat in places you forgot existed.",
  ]);
  if (gap <= -2) return wxPick([
    "Feels cooler than the number suggests. A rare gift, accept it.",
    "The breeze is doing you a solid. Feels nicer than it reads.",
  ]);
  return wxPick([
    "Feels about right. The sky is being honest for once.",
    "What you see is what you get today. No humidity ambush.",
  ]);
}

// temperature commentary
function tempLine(t) {
  if (t >= 34) return wxPick(["Properly hot. Hydrate or evaporate.", "Scorcher. The aircon is your best friend today.", "Hot enough to fry an egg on a parked bonnet."]);
  if (t >= 31) return wxPick(["Classic Phuket warm. Shorts weather, obviously.", "Toasty and tropical. Exactly what you signed up for.", "Warm and lovely. The island's default setting."]);
  if (t >= 28) return wxPick(["Pleasantly warm. Goldilocks would approve.", "Comfortable heat. No drama, just nice.", "Mild tropical warmth. Easy living."]);
  return wxPick(["Almost cool by Phuket standards. Practically a cold snap.", "On the gentler side today. Bring a thin layer, maybe."]);
}

// sunrise / sunset captions
const SUNRISE_CAPS = [
  "the sky's daily soft launch",
  "golden hour, early edition",
  "the sun clocks in",
  "dawn does its thing",
  "the island wakes up gently",
];
const SUNSET_CAPS = [
  "golden hour, grab the camera",
  "the sky's nightly farewell tour",
  "the sun clocks out in style",
  "prime time for a beach silhouette",
  "the daily sky-painting reveal",
];

function ForecastDesk() {
  const [data, setData] = useState(_wxCache);
  const [loading, setLoading] = useState(!_wxCache);
  const [failed, setFailed] = useState(false);

  function load(force) {
    if (_wxCache && !force) { setData(_wxCache); setLoading(false); return; }
    setLoading(true); setFailed(false);
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${KOKAEO_LAT}&longitude=${KOKAEO_LON}`
      + `&current=temperature_2m,apparent_temperature,weather_code,relative_humidity_2m,wind_speed_10m`
      + `&hourly=precipitation,precipitation_probability,weather_code`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_hours,precipitation_probability_max,sunrise,sunset`
      + `&timezone=Asia%2FBangkok&forecast_days=3`;
    fetch(url)
      .then(r => { if (!r.ok) throw new Error("sky offline"); return r.json(); })
      .then(j => { _wxCache = j; setData(j); setLoading(false); })
      .catch(() => { setLoading(false); setFailed(true); });
  }

  useEffect(() => { load(false); }, []);

  // build today's rain-timing advice from the hourly data (next ~18h)
  function rainAdvice(j) {
    if (!j || !j.hourly) return null;
    const now = new Date();
    const times = j.hourly.time, precip = j.hourly.precipitation, prob = j.hourly.precipitation_probability;
    let wetHours = 0, firstWet = null, lastWet = null, maxProb = 0, totalMm = 0;
    for (let i = 0; i < times.length; i++) {
      const t = new Date(times[i]);
      const hrsAhead = (t - now) / 3600000;
      if (hrsAhead < 0 || hrsAhead > 18) continue;
      if (prob && prob[i] > maxProb) maxProb = prob[i];
      if (precip[i] >= 0.2) {
        wetHours += 1; totalMm += precip[i];
        if (firstWet === null) firstWet = t;
        lastWet = t;
      }
    }
    const fmtH = (dd) => dd ? `${String(dd.getHours()).padStart(2, "0")}:00` : "";
    if (wetHours === 0) {
      return { dry: true, text: wxPick([
        "No real rain expected in the next while. The sky is behaving. Make the most of it.",
        "Looking dry for now. A window to do the supply run without getting soaked.",
        "Next several hours look rain-free. Suspiciously civilised of the monsoon.",
      ]) };
    }
    const span = firstWet && lastWet ? `${fmtH(firstWet)}\u2013${fmtH(lastWet)}` : "later today";
    const heavy = totalMm > 10;
    return {
      dry: false,
      text: `Rain likely around ${span}, roughly ${wetHours} ${wetHours === 1 ? "hour" : "hours"} of it`
        + (maxProb ? ` (peak chance ~${maxProb}%)` : "") + ". "
        + (heavy ? wxPick(["This one means business, plan indoor things.", "Heavier band, save outdoor plans for the gaps."])
                 : wxPick(["Nothing dramatic, just keep a brolly handy.", "Manageable, dash between the drops."])),
    };
  }

  // Is it good for a swim around a given ISO time? Checks the hourly rain in a
  // ~2h window around it (Naddy & Hammy swim the Habitown pool pre-sunrise and
  // post-sunset). Returns a short verdict line.
  function swimCheck(j, centerIso) {
    if (!j || !j.hourly || !centerIso) return null;
    const center = new Date(centerIso);
    const times = j.hourly.time, precip = j.hourly.precipitation, prob = j.hourly.precipitation_probability;
    let maxP = 0, maxProb = 0, any = false;
    for (let i = 0; i < times.length; i++) {
      const diff = Math.abs(new Date(times[i]) - center) / 3600000;
      if (diff > 1.5) continue;
      any = true;
      if (precip[i] > maxP) maxP = precip[i];
      if (prob && prob[i] > maxProb) maxProb = prob[i];
    }
    if (!any) return null;
    if (maxP >= 1.5) return { ok: false, line: wxPick(["\u2614 Likely raining, maybe skip or wait it out.", "\u2614 Wet around then, the pool can wait."]) };
    if (maxProb >= 60) return { ok: false, line: wxPick(["\u26a0 Decent chance of rain, keep an eye out.", "\u26a0 Rain's a real risk, have a backup."]) };
    if (maxProb >= 35) return { ok: true, line: wxPick(["\ud83c\udf24 Should be fine, slim rain chance.", "\ud83c\udf24 Probably good, watch the sky."]) };
    return { ok: true, line: wxPick(["\ud83c\udfca Clear for a swim. Get in.", "\ud83c\udfca Good to go, lovely swim weather.", "\ud83c\udfca Swim's on. Enjoy it."]) };
  }

  // Ko Kaeo flood watch from today's total rainfall
  function floodWatch(j) {
    if (!j || !j.daily) return null;
    const todayMm = j.daily.precipitation_sum ? j.daily.precipitation_sum[0] : 0;
    if (todayMm >= 40) return { level: "high", color: "#d8483a", text: wxPick([
      "Heavy rain total today. Ko Kaeo sits low (about 8m), so low roads and soi corners can puddle up fast. Avoid the dips, give it an hour after the worst to drain.",
      "Big rainfall day. Ko Kaeo's flat low-lying streets pool quickly, watch the usual dip spots and don't gun the rental through standing water.",
    ]) };
    if (todayMm >= 15) return { level: "watch", color: "#d98a2b", text: wxPick([
      "Moderate rain. The odd Ko Kaeo soi might gather a puddle or two, nothing the Yaris can't handle if you go gently.",
      "Some accumulation likely. Minor pooling possible on the lower streets, keep an eye out but no drama.",
    ]) };
    return { level: "clear", color: T.good, text: wxPick([
      "Low rain totals, flooding not a concern today. Ko Kaeo stays dry-shod.",
      "Not enough rain to trouble the drains. The streets keep their dignity.",
    ]) };
  }

  // Compute everything ONCE per data load (random funny lines included) so the
  // text holds still instead of re-randomising on every render.
  const view = React.useMemo(() => {
    if (!data) return null;
    const cur = data.current || {};
    const bucket = wxBucket(cur.weather_code);
    const temp = Math.round(cur.temperature_2m);
    const feels = Math.round(cur.apparent_temperature);
    return {
      cur, bucket, temp, feels,
      condLine: wxPick(WX_LINES[bucket.key] || WX_LINES.cloudy),
      tLine: tempLine(temp),
      fLine: feelsLine(temp, feels),
      rain: rainAdvice(data),
      flood: floodWatch(data),
      sunriseCap: wxPick(SUNRISE_CAPS),
      sunsetCap: wxPick(SUNSET_CAPS),
      swimAM: data.daily ? swimCheck(data, data.daily.sunrise[0]) : null,
      swimPM: data.daily ? swimCheck(data, data.daily.sunset[0]) : null,
      d: data.daily,
    };
  }, [data]);

  const cardBase = { background: T.card, border: "1px solid " + T.line, borderRadius: 16, padding: "15px 16px" };

  return (
    <div>
      <div style={{ ...cardBase, marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".22em", color: T.spurs, textTransform: "uppercase" }}>Live · Ko Kaeo</div>
          <div style={{ fontFamily: FH, fontWeight: 800, fontSize: 22, color: T.ink, lineHeight: 1.1, marginTop: 2 }}>The Forecast Desk</div>
        </div>
        <button onClick={() => load(true)} title="Refresh" style={{
          cursor: "pointer", fontFamily: FM, fontSize: 10, color: T.coralDk,
          background: T.peach, border: "1px solid " + T.line, borderRadius: 10, padding: "6px 11px",
        }}>\u21bb refresh</button>
      </div>

      {loading && (
        <div style={{ ...cardBase, textAlign: "center", padding: "30px 16px", color: T.inkSoft, fontFamily: FM, fontSize: 12 }}>
          reading the sky over Ko Kaeo\u2026
        </div>
      )}

      {failed && !loading && (
        <div style={{ ...cardBase, textAlign: "center", padding: "26px 16px" }}>
          <div style={{ fontSize: 26 }}>\ud83c\udf25\ufe0f</div>
          <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 17, color: T.ink, marginTop: 8 }}>The sky's being shy</div>
          <div style={{ fontFamily: FB, fontSize: 12.5, color: T.inkSoft, marginTop: 5, lineHeight: 1.5 }}>Couldn't reach the weather service. Check your connection and give it another go.</div>
          <button onClick={() => load(true)} style={{
            cursor: "pointer", marginTop: 14, fontFamily: FH, fontWeight: 700, fontSize: 13, color: "#fff",
            background: T.coral, border: "none", borderRadius: 10, padding: "9px 22px",
          }}>Try again</button>
        </div>
      )}

      {view && !loading && !failed && (() => {
        const { cur, bucket, temp, feels, condLine, tLine, fLine, rain, flood, sunriseCap, sunsetCap, swimAM, swimPM, d } = view;
        const dayName = (iso) => { const dt = new Date(iso); return ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][dt.getDay()]; };
        const clock = (iso) => { const dt = new Date(iso); return `${String(dt.getHours()).padStart(2, "0")}:${String(dt.getMinutes()).padStart(2, "0")}`; };
        return (
          <div>
            {/* today's headline, with a big condition icon and a mood wash */}
            <div style={{ ...cardBase, marginBottom: 14, background: wxTint(bucket.key), border: "1px solid rgba(255,255,255,.5)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <div style={{ fontSize: 52, lineHeight: 1, flexShrink: 0 }}>{wxEmoji(bucket.key)}</div>
                <div style={{ fontFamily: FH, fontWeight: 800, fontSize: 54, color: T.coralDk, lineHeight: .85 }}>{temp}°</div>
                <div style={{ flex: 1, minWidth: 0, textAlign: "right" }}>
                  <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 19, color: T.ink, lineHeight: 1.1 }}>{bucket.label}</div>
                  <div style={{ fontFamily: FM, fontSize: 10, color: T.inkSoft, marginTop: 4 }}>feels like {feels}°</div>
                  <div style={{ fontFamily: FM, fontSize: 10, color: T.inkSoft, marginTop: 2 }}>{cur.relative_humidity_2m}% humidity</div>
                </div>
              </div>
              <div style={{ height: 1, background: "rgba(74,59,51,.12)", margin: "13px 0" }} />
              <div style={{ fontFamily: FB, fontSize: 13.5, color: T.ink, lineHeight: 1.6 }}>{condLine}</div>
              <div style={{ fontFamily: FB, fontSize: 12, color: T.inkSoft, lineHeight: 1.6, marginTop: 8 }}>{tLine} {fLine}</div>
            </div>

            {/* rain timing */}
            {rain && (
              <div style={{ ...cardBase, marginBottom: 14 }}>
                <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".16em", color: rain.dry ? T.good : T.spurs, textTransform: "uppercase" }}>
                  {rain.dry ? "Rain watch · all clear" : "Rain watch · next 18h"}
                </div>
                <div style={{ fontFamily: FB, fontSize: 13.5, color: T.ink, lineHeight: 1.6, marginTop: 8 }}>{rain.text}</div>
              </div>
            )}

            {/* Ko Kaeo flood watch */}
            {flood && (
              <div style={{ ...cardBase, marginBottom: 14, borderLeft: `3px solid ${flood.color}` }}>
                <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".16em", color: flood.color, textTransform: "uppercase" }}>
                  Ko Kaeo flood watch · {flood.level}
                </div>
                <div style={{ fontFamily: FB, fontSize: 13.5, color: T.ink, lineHeight: 1.6, marginTop: 8 }}>{flood.text}</div>
              </div>
            )}

            {/* sun times + swim verdict for the dawn & dusk pool swims */}
            <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
              <div style={{ ...cardBase, flex: 1, padding: "14px 14px" }}>
                <div style={{ fontFamily: FM, fontSize: 9, color: T.sun, letterSpacing: ".12em" }}>SUNRISE</div>
                <div style={{ fontFamily: FH, fontWeight: 800, fontSize: 26, color: T.ink, marginTop: 4, lineHeight: 1 }}>{clock(d.sunrise[0])}</div>
                <div style={{ fontFamily: FB, fontSize: 10, color: T.inkSoft, lineHeight: 1.45, marginTop: 5 }}>{sunriseCap}</div>
                {swimAM && (
                  <div style={{ fontFamily: FB, fontSize: 10.5, color: swimAM.ok ? T.good : T.coralDk, lineHeight: 1.45, marginTop: 8, paddingTop: 8, borderTop: "1px solid " + T.line }}>
                    <b>Pre-sunrise swim:</b><br />{swimAM.line}
                  </div>
                )}
              </div>
              <div style={{ ...cardBase, flex: 1, padding: "14px 14px" }}>
                <div style={{ fontFamily: FM, fontSize: 9, color: T.coralDk, letterSpacing: ".12em" }}>SUNSET</div>
                <div style={{ fontFamily: FH, fontWeight: 800, fontSize: 26, color: T.ink, marginTop: 4, lineHeight: 1 }}>{clock(d.sunset[0])}</div>
                <div style={{ fontFamily: FB, fontSize: 10, color: T.inkSoft, lineHeight: 1.45, marginTop: 5 }}>{sunsetCap}</div>
                {swimPM && (
                  <div style={{ fontFamily: FB, fontSize: 10.5, color: swimPM.ok ? T.good : T.coralDk, lineHeight: 1.45, marginTop: 8, paddingTop: 8, borderTop: "1px solid " + T.line }}>
                    <b>Post-sunset swim:</b><br />{swimPM.line}
                  </div>
                )}
              </div>
            </div>

            {/* 3-day strip */}
            <div style={{ ...cardBase, marginBottom: 12 }}>
              <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".16em", color: T.spurs, textTransform: "uppercase", marginBottom: 12 }}>The next three days</div>
              {d.time.map((iso, i) => {
                const b = wxBucket(d.weather_code[i]);
                const hi = Math.round(d.temperature_2m_max[i]), lo = Math.round(d.temperature_2m_min[i]);
                const pr = d.precipitation_probability_max ? d.precipitation_probability_max[i] : null;
                return (
                  <div key={iso} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderTop: i === 0 ? "none" : "1px solid " + T.line }}>
                    <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: T.ink, width: 42 }}>{i === 0 ? "Today" : dayName(iso)}</div>
                    <div style={{ fontSize: 20, width: 26, textAlign: "center", flexShrink: 0 }}>{wxEmoji(b.key)}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: FB, fontSize: 12.5, color: T.inkSoft }}>{b.label}{pr != null ? ` · ${pr}% rain` : ""}</div>
                    </div>
                    <div style={{ fontFamily: FM, fontSize: 12.5, color: T.ink }}>
                      <b>{hi}°</b> <span style={{ color: T.inkSoft }}>{lo}°</span>
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{ textAlign: "center", fontFamily: FM, fontSize: 8.5, color: T.inkSoft, marginBottom: 4 }}>
              data: open-meteo · pinned to Ko Kaeo (7.95, 98.39)
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ---------- a compact tap-through tile ----------
function HubTile({ label, sub, onClick, accent }) {
  const [down, setDown] = useState(false);
  return (
    <button onClick={onClick}
      onPointerDown={() => setDown(true)}
      onPointerUp={() => setDown(false)}
      onPointerLeave={() => setDown(false)}
      style={{
        width: "100%", textAlign: "left", cursor: "pointer",
        background: T.card, border: "1px solid " + T.line, borderLeft: "3px solid " + accent,
        borderRadius: 14, padding: "13px 15px",
        transition: "transform .08s ease", transform: down ? "scale(.98)" : "scale(1)",
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,
      }}>
      <span>
        <span style={{ display: "block", fontFamily: FH, fontWeight: 700, fontSize: 15, color: T.ink }}>{label}</span>
        <span style={{ display: "block", fontFamily: FB, fontSize: 12, color: T.inkSoft, marginTop: 1 }}>{sub}</span>
      </span>
      <span style={{ fontFamily: FH, fontSize: 20, color: T.peach, flexShrink: 0 }}>›</span>
    </button>
  );
}


// ---------- THE PRIZE, proclaimed with a wink ----------
// ---------- THE HOUSEHOLD CATS: little cameos, true to each personality ----------
// Five cats share the flat, and they deserve a walk-on part. These little lines
// rotate onto the hub by day (like the manager tips), each true to the cat: Rocket
// the anxiety-ball with the 6am alarm (Naddy's favourite), Oscar the bully and
// household favourite running his harem, Smokey the shadow-lurker, Goku the orange
// cutiepie with the half-face from old ringworm, Selina the tuxedo diva trailing
// Oscar everywhere. A warm private in-joke, nothing more, and all the better for it.
const CAT_CAMEOS = [
  { cat: "Rocket", emoji: "🐈", line: "Rocket has filed a formal complaint that the 6am alarm was not, in fact, an emergency. He is inconsolable regardless." },
  { cat: "Rocket", emoji: "🐈", line: "Rocket supports whoever fed him last, which makes him the least reliable pundit in the household. Currently backing Naddy on a technicality." },
  { cat: "Oscar", emoji: "🐈‍⬛", line: "Oscar has declared himself commissioner of this competition and demands a cut of all points. Nobody has the nerve to refuse him." },
  { cat: "Oscar", emoji: "🐈‍⬛", line: "Oscar bullied his way to the best sunbeam again and is now presiding over the household like a tiny warlord. All hail." },
  { cat: "Smokey", emoji: "🐈‍⬛", line: "Smokey is watching this week's contest from the shadows and has judged you both. She will not say what she concluded." },
  { cat: "Smokey", emoji: "🐈‍⬛", line: "Somewhere in this flat, Smokey is lurking, silent and grey, keeping her own private scoreboard nobody will ever see." },
  { cat: "Goku", emoji: "🐈", line: "Goku, the orange cutiepie, believes with his whole half-a-face that both of you are winning. He is a terrible referee and a wonderful boy." },
  { cat: "Goku", emoji: "🐈", line: "Goku has knocked something off a shelf in celebration of absolutely nothing. The orange ones simply operate on vibes." },
  { cat: "Selina", emoji: "🐈‍⬛", line: "Selina the tuxedo diva is trailing Oscar around the flat again, cheering for whichever side he's on. Loyalty, of a sort." },
  { cat: "Selina", emoji: "🐈‍⬛", line: "Selina has taken the high ground, literally, and is judging this week's scavenging from atop the wardrobe with visible disdain." },
];
function catCameoOfDay(now) {
  const shuffled = seededShuffle(CAT_CAMEOS, "cat-cameo");
  const i = ((dayIndex(now) % shuffled.length) + shuffled.length) % shuffled.length;
  return shuffled[i];
}

// The whole war is won by the first to THREE weekly wins on the bounce. That's
// the one rule worth shouting, so we do, in a fresh cheeky voice each day. Lines
// rotate by day (shuffled so the order feels lively) exactly like the manager
// tips, and stay in the app's warm, daft, Spurs-vs-Arsenal house tone. (Three,
// not five: still a proper mountain, but a summit you can actually see.)
const FIRST_TO_THREE_LINES = [
  "First to THREE weeks on the bounce lifts the trophy. Lose one, back to zero, back to the sofa of shame.",
  "The prize: three straight weekly wins. Not two. Not \"nearly.\" Three. In a row. No asterisks, no VAR mercy.",
  "Win three weeks running and it's over: a champion, a loser, and a lifetime of quiet gloating. Off you pop.",
  "Three consecutive weeks wins the whole thing. A hat-trick of weeks. Football's favourite number, fittingly.",
  "Whoever stitches together three weekly wins first is crowned. The other buys dinner. Possibly forever.",
  "The mountain: three wins, back to back to back. Slip once and the counter laughs at you and resets to zero.",
  "First to three straight weeks takes the crown. A Gooner or a Spurs fan will weep by the end. Place your bets.",
  "Three in a row ends the season. Until then, no one's safe, no lead is real, and no gloating is ever truly earned.",
  "The endgame is three consecutive weekly wins. Get there and the app becomes a shrine to your greatness. No pressure.",
  "Bank three weeks on the trot and it's yours forever. Drop a single week and you're back at square one, blinking.",
];
// Today's proclamation, shuffled then marched by day so it changes daily.
function firstToThreeLine(now) {
  const shuffled = seededShuffle(FIRST_TO_THREE_LINES, "first-to-three");
  const i = ((dayIndex(now) % shuffled.length) + shuffled.length) % shuffled.length;
  return shuffled[i];
}

// ---------- THE FINALE: the season, won ----------
// The crowning flourish. When someone strings together the three consecutive
// wins, the game stops being a weekly duel and becomes a browsable time capsule:
// a champion's page, an affectionate loser's page, the full week-by-week record,
// and a closing note on the app's own lineage. Shown only once season.champion
// is set. Warm, celebratory, and a little cheeky, in the app's house voice.
const CHAMPION_CROWINGS = [
  "Three weeks. Back to back to back. Unbroken, undisputed, and now unbearable to live with. {W} is the champion of Phuket.",
  "It's done. {W} strung together three straight and lifted the thing. History will remember. So, at great length, will {W}.",
  "The final whistle has blown on the season, and {W} stands alone at the summit. Three consecutive weeks of glory. Absolutely insufferable about it, and entitled to be.",
];
const LOSER_CONSOLATIONS = [
  "{L}, you fought like a cornered cat and it simply wasn't your season. There's no shame in it. There is, however, a lot of gloating headed your way. Chin up.",
  "{L} gave everything and came up just short. The good news: a new season can always begin. The bad news: you'll never hear the end of this one.",
  "Hard luck, {L}. You made {W} earn every single week of it. That's a defeat with your head held high, even if {W} is currently doing a lap of honour round the kitchen.",
];

function Finale({ now, season, archive, onNewSeason }) {
  const champ = season.champion;
  const loser = champ === "Hammy" ? "Naddy" : "Hammy";
  const [tab, setTab] = useState("crown"); // crown | record | past

  const rng = seededRng("finale-" + champ + "-wk" + season.championWeek);
  const crowning = CHAMPION_CROWINGS[Math.floor(rng() * CHAMPION_CROWINGS.length)].replace(/\{W\}/g, champ).replace(/\{L\}/g, loser);
  const consolation = LOSER_CONSOLATIONS[Math.floor(rng() * LOSER_CONSOLATIONS.length)].replace(/\{W\}/g, champ).replace(/\{L\}/g, loser);

  const champColour = PLAYERS[champ].colour;

  // tally of weeks won across the whole settled season, for the record page
  const tally = { Hammy: 0, Naddy: 0, draw: 0 };
  season.settled.forEach((w) => { tally[w.winner] = (tally[w.winner] || 0) + 1; });

  // past seasons: everything in the archive EXCEPT the one just won (which is
  // shown live above). Sorted newest first. Also count each player's titles for
  // a little all-time honours line.
  const thisId = "season-clinch-wk" + season.championWeek;
  const pastSeasons = (Array.isArray(archive) ? archive : [])
    .filter((s) => s && s.id !== thisId)
    .sort((a, b) => (b.wonAt || 0) - (a.wonAt || 0));
  const titles = { Hammy: 0, Naddy: 0 };
  (Array.isArray(archive) ? archive : []).forEach((s) => { if (s && titles[s.champion] != null) titles[s.champion] += 1; });
  const tabs = [["crown", "The verdict"], ["record", "The season"]];
  if (pastSeasons.length > 0) tabs.push(["past", "Past seasons"]);

  return (
    <div style={{ minHeight: "100vh", background: T.cream, padding: "20px 18px 40px" }}>
      {/* trophy header */}
      <div style={{ textAlign: "center", paddingTop: 10 }}>
        <div style={{ fontSize: 56, lineHeight: 1, animation: "tgPop .5s ease both, tgCrownGlow 2.6s ease-in-out .5s infinite" }}>🏆</div>
        <div style={{ fontFamily: FM, fontSize: 10.5, letterSpacing: ".18em", textTransform: "uppercase", color: T.inkSoft, marginTop: 12 }}>
          The season is won
        </div>
        <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 30, color: champColour, marginTop: 6, lineHeight: 1.1 }}>
          {champ} takes the crown
        </div>
        <div style={{ fontFamily: FB, fontSize: 12.5, color: T.inkSoft, marginTop: 6 }}>
          clinched in week {season.championWeek} · three weeks on the bounce
        </div>
      </div>

      {/* tab switch */}
      <div style={{ display: "flex", gap: 7, marginTop: 22 }}>
        {tabs.map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)} style={{
            flex: 1, cursor: "pointer", background: tab === id ? T.ink : T.card,
            border: "1px solid " + (tab === id ? T.ink : T.line), borderRadius: 11,
            padding: "9px 0", fontFamily: FH, fontWeight: 700, fontSize: 12.5,
            color: tab === id ? "#fff" : T.inkSoft,
          }}>{label}</button>
        ))}
      </div>

      {tab === "crown" ? (
        <div style={{ marginTop: 16 }}>
          {/* champion */}
          <div style={{ background: "rgba(46,160,90,.08)", border: "1px solid rgba(46,160,90,.3)", borderRadius: 16, padding: "16px 16px" }}>
            <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".12em", textTransform: "uppercase", color: "#2ea05a", marginBottom: 7 }}>
              The champion
            </div>
            <div style={{ fontFamily: FB, fontSize: 14, color: T.ink, lineHeight: 1.6 }}>{crowning}</div>
          </div>
          {/* loser */}
          <div style={{ background: T.card, border: "1px solid " + T.line, borderRadius: 16, padding: "16px 16px", marginTop: 12 }}>
            <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".12em", textTransform: "uppercase", color: T.inkSoft, marginBottom: 7 }}>
              The gallant runner-up
            </div>
            <div style={{ fontFamily: FB, fontSize: 14, color: T.ink, lineHeight: 1.6 }}>{consolation}</div>
          </div>
        </div>
      ) : (
        <div style={{ marginTop: 16 }}>
          {/* season tally */}
          <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
            {["Hammy", "Naddy"].map((pl) => (
              <div key={pl} style={{ flex: 1, background: T.card, border: "1px solid " + T.line, borderRadius: 13, padding: "12px 8px", textAlign: "center" }}>
                <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 13, color: PLAYERS[pl].colour }}>{pl}</div>
                <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 26, color: T.ink, marginTop: 3 }}>{tally[pl] || 0}</div>
                <div style={{ fontFamily: FM, fontSize: 9, letterSpacing: ".08em", color: T.inkSoft }}>WEEKS WON</div>
              </div>
            ))}
          </div>
          {/* week-by-week */}
          <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".12em", textTransform: "uppercase", color: T.inkSoft, marginBottom: 8 }}>
            Week by week
          </div>
          {season.settled.map((w) => (
            <div key={w.wk} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "9px 12px", background: T.card, border: "1px solid " + T.line, borderRadius: 11, marginBottom: 7 }}>
              <span style={{ fontFamily: FM, fontSize: 11, color: T.inkSoft }}>Week {w.wk}</span>
              <span style={{ fontFamily: FH, fontWeight: 700, fontSize: 13, color: w.winner === "draw" ? T.inkSoft : PLAYERS[w.winner].colour }}>
                {w.winner === "draw" ? "drawn" : w.winner + (w.wk === season.championWeek ? " 🏆" : "")}
              </span>
            </div>
          ))}
        </div>
      )}

      {tab === "past" ? (
        <div style={{ marginTop: 16 }}>
          {/* all-time honours */}
          <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
            {["Hammy", "Naddy"].map((pl) => (
              <div key={pl} style={{ flex: 1, background: T.card, border: "1px solid " + T.line, borderRadius: 13, padding: "12px 8px", textAlign: "center" }}>
                <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 13, color: PLAYERS[pl].colour }}>{pl}</div>
                <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 26, color: T.ink, marginTop: 3 }}>{titles[pl] || 0}</div>
                <div style={{ fontFamily: FM, fontSize: 9, letterSpacing: ".08em", color: T.inkSoft }}>{(titles[pl] === 1) ? "TITLE" : "TITLES"}</div>
              </div>
            ))}
          </div>
          <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".12em", textTransform: "uppercase", color: T.inkSoft, marginBottom: 8 }}>
            Seasons past
          </div>
          {pastSeasons.map((s, idx) => {
            const when = s.wonAt ? new Date(s.wonAt) : null;
            const whenLabel = when ? when.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" }) : "";
            const seasonNo = pastSeasons.length - idx; // newest gets the highest number
            return (
              <div key={s.id} style={{ background: T.card, border: "1px solid " + T.line, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <span style={{ fontFamily: FM, fontSize: 10, letterSpacing: ".08em", color: T.inkSoft }}>SEASON {seasonNo}</span>
                  <span style={{ fontFamily: FB, fontSize: 10.5, color: T.inkSoft }}>{whenLabel}</span>
                </div>
                <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 16, color: PLAYERS[s.champion] ? PLAYERS[s.champion].colour : T.ink, marginTop: 4 }}>
                  🏆 {s.champion}
                </div>
                <div style={{ fontFamily: FB, fontSize: 11.5, color: T.inkSoft, marginTop: 2 }}>
                  clinched in week {s.championWeek} · {(s.settled ? s.settled.length : 0)} weeks played
                </div>
              </div>
            );
          })}
        </div>
      ) : null}

      {/* the lineage note */}
      <div style={{ marginTop: 20, background: "rgba(255,138,92,.08)", border: "1px solid rgba(255,138,92,.25)", borderRadius: 14, padding: "14px 15px" }}>
        <div style={{ fontFamily: FB, fontSize: 12.5, color: T.coralDk, lineHeight: 1.6, fontStyle: "italic" }}>
          Just as Touch Grass HKT grew out of Mission Phuket, whatever the two of you build next should grow out of this. A season ends so a new adventure can begin. That's rather the whole point of touching grass.
        </div>
      </div>

      {onNewSeason ? (
        <button onClick={onNewSeason} style={{
          marginTop: 18, width: "100%", cursor: "pointer", background: T.coral, border: "none",
          borderRadius: 13, padding: "13px 0", fontFamily: FH, fontWeight: 700, fontSize: 14, color: "#fff",
        }}>Start a new season ›</button>
      ) : null}
    </div>
  );
}

// ---------- THE HUB: single-screen home, no scroll ----------
function Hub({ now, scores, season, onGo, onSwitch, isFull, onResetWeek, wk: wkProp, varNotices, me, onDismissVar, spectating }) {
  const wk = weekNumber(now);
  const dayIdx = dayOfWeek(now);
  const leader = (scores.Hammy || 0) === (scores.Naddy || 0) ? null
    : (scores.Hammy || 0) > (scores.Naddy || 0) ? "Hammy" : "Naddy";

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      padding: "18px 18px 20px",
      background: "linear-gradient(180deg, #fff6ee 0%, #ffefe4 100%)",
    }}>
      {/* spectator banner: a warm, clear note that this is a viewing window */}
      {spectating ? (
        <div style={{
          marginBottom: 14, background: "rgba(90,155,213,.08)", border: "1px dashed " + T.spurs,
          borderRadius: 14, padding: "11px 14px", display: "flex", alignItems: "center", gap: 10,
        }}>
          <span style={{ fontSize: 18, lineHeight: 1, flexShrink: 0 }}>👀</span>
          <span style={{ fontFamily: FB, fontSize: 12, color: T.ink, lineHeight: 1.5 }}>
            You're watching along as a guest. Have a good nose around: the scoreboard, the duels, the whole week. The playing bits are just for Hammy and Naddy, so tap away and enjoy the show.
          </span>
        </div>
      ) : null}

      {/* top bar: week + switch user */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 22, color: T.ink, lineHeight: 1 }}>
            Week <span style={{ color: T.coral }}>{wk}</span>
          </div>
          <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".1em", color: T.inkSoft, textTransform: "uppercase", marginTop: 4 }}>
            {DAY_NAMES[dayIdx]} · {weekEndsIn(now)}
          </div>
        </div>
        <button onClick={onSwitch} style={{
          background: "rgba(255,255,255,.7)", border: "1px solid " + T.line, borderRadius: 18,
          padding: "7px 12px", cursor: "pointer", fontFamily: FH, fontWeight: 600, fontSize: 12, color: T.inkSoft,
        }}>switch ›</button>
      </div>

      {/* scoreboard hero */}
      <div style={{ marginTop: 18 }}>
        <ScoreHero scores={scores} leader={leader} />
      </div>

      {/* the season streak: consecutive weeks won, filling toward the crown.
          This is where the whole first-to-three drama becomes visible. */}
      <div style={{
        marginTop: 12, background: T.card, border: "1px solid " + T.line,
        borderRadius: 14, padding: "12px 14px",
      }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 9 }}>
          <span style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".12em", textTransform: "uppercase", color: T.inkSoft }}>
            The streak · first to {WINS_TO_TAKE_THE_CROWN}
          </span>
          {season.currentWeek > 1 ? (
            <span style={{ fontFamily: FM, fontSize: 9.5, color: T.inkSoft }}>wk {season.currentWeek}</span>
          ) : (
            <span style={{ fontFamily: FM, fontSize: 9.5, color: T.inkSoft }}>season opens wk 1</span>
          )}
        </div>

        {["Hammy", "Naddy"].map((player) => {
          const s = season.streak[player] || 0;
          const isChamp = season.champion === player;
          const onTheBrink = s === WINS_TO_TAKE_THE_CROWN - 1 && !season.champion;
          return (
            <div key={player} style={{ display: "flex", alignItems: "center", gap: 10, marginTop: player === "Naddy" ? 8 : 0 }}>
              <span style={{ fontFamily: FH, fontWeight: 700, fontSize: 13, color: PLAYERS[player].colour, width: 58, flexShrink: 0 }}>
                {player}
              </span>
              <span style={{ display: "flex", gap: 5, flex: 1 }}>
                {Array.from({ length: WINS_TO_TAKE_THE_CROWN }).map((_, i) => {
                  const filled = i < s;
                  const isBrinkPip = onTheBrink && i === s - 1; // the last-won pip when one from glory
                  return (
                    <span key={i} style={{
                      width: 22, height: 10, borderRadius: 5,
                      background: filled ? PLAYERS[player].colour : "transparent",
                      border: "1px solid " + (filled ? PLAYERS[player].colour : T.line),
                      transition: "background .2s",
                      transformOrigin: "center",
                      animation: filled
                        ? ("tgPipFill .4s ease " + (i * 0.12) + "s both" + (isBrinkPip ? ", tgGlow 1.8s ease-in-out .5s infinite" : ""))
                        : "none",
                    }} />
                  );
                })}
              </span>
              <span style={{ fontFamily: FM, fontSize: 10.5, color: isChamp ? "#2ea05a" : (onTheBrink ? T.coralDk : T.inkSoft), fontWeight: onTheBrink || isChamp ? 700 : 400, flexShrink: 0, textAlign: "right", width: 74 }}>
                {isChamp ? "CHAMPION 🏆" : (onTheBrink ? "one to go!" : (s === 0 ? "—" : s + " in a row"))}
              </span>
            </div>
          );
        })}
      </div>

      {/* the prize, proclaimed with a wink: first to three weeks on the bounce */}
      <div style={{
        marginTop: 12, background: "rgba(255,138,92,.1)", border: "1px solid rgba(255,138,92,.3)",
        borderRadius: 14, padding: "11px 14px", display: "flex", alignItems: "flex-start", gap: 10,
      }}>
        <span style={{ fontSize: 17, lineHeight: 1.2, flexShrink: 0 }}>🏆</span>
        <span style={{ fontFamily: FB, fontSize: 12.5, color: T.coralDk, lineHeight: 1.5 }}>
          {firstToThreeLine(now)}
        </span>
      </div>

      {/* VAR verdict notices: informs BOTH parties of any appeal outcome */}
      {varNotices && varNotices.length > 0 ? (
        <div style={{ marginTop: 16 }}>
          {varNotices.map((n) => (
            <VarNotice key={n.id} notice={n} me={me} onDismiss={onDismissVar} />
          ))}
        </div>
      ) : null}

      {/* the tap-throughs */}
      <div style={{ marginTop: 18, display: "flex", flexDirection: "column", gap: 10 }}>
        <HubTile label="This week's board" sub="Quick wins, sign scrambles, and the big one." accent={T.coral} onClick={() => onGo("board")} />
        <HubTile label="The Forecast Desk" sub="Live Ko Kaeo weather, rain windows, swim calls." accent={T.spurs} onClick={() => onGo("weather")} />
        <HubTile label="The memory wall" sub="Pen a thought, snap a moment. Just the two of you." accent={T.good} onClick={() => onGo("wall")} />
        <HubTile label="Throw-down dares" sub="Lob a cheeky challenge at your other half." accent={T.spurs} onClick={() => onGo("dares")} />
        <HubTile label="Coach Saliba's Thai school" sub="Three words a day. Keep the streak alive." accent={T.arsenal} onClick={() => onGo("school")} />
        <HubTile label="Pocket Farang" sub="Two-way translator. Type it, speak it, live it." accent={T.spurs} onClick={() => onGo("farang")} />
        <HubTile label="The Meat Sweats Society" sub="Five temples of beef. Conquer them all." accent={T.coralDk} onClick={() => onGo("steak")} />
        <HubTile label="The scrapbook" sub="Your week so far, in photos and taunts." accent={T.sun} onClick={() => onGo("scrapbook")} />
      </div>

      {/* a daily cat cameo: a warm little household in-joke */}
      {(() => {
        const cameo = catCameoOfDay(now);
        return (
          <div style={{ marginTop: 16, display: "flex", alignItems: "flex-start", gap: 9, background: T.card, border: "1px solid " + T.line, borderRadius: 13, padding: "11px 13px" }}>
            <span style={{ fontSize: 17, lineHeight: 1.2, flexShrink: 0 }}>{cameo.emoji}</span>
            <span style={{ fontFamily: FB, fontSize: 12, color: T.inkSoft, lineHeight: 1.5, fontStyle: "italic" }}>{cameo.line}</span>
          </div>
        );
      })()}

      {/* footer whisper, pushed to bottom */}
      <div style={{ marginTop: "auto", paddingTop: 16, textAlign: "center" }}>
        <div style={{ fontFamily: FM, fontSize: 8.5, letterSpacing: ".12em", color: "#d8b8a4", textTransform: "uppercase" }}>
          Spurs vs Arsenal · the pitch is Phuket
        </div>
        {isFull && onResetWeek ? (
          <button onClick={() => {
            if (confirm("Dev reset: wipe this week's claims and set the scoreboard back to zero? (Only affects week " + (wkProp != null ? wkProp : wk) + " on this device.)")) onResetWeek();
          }} style={{
            marginTop: 12, background: "transparent", border: "1px dashed #d8b8a4", borderRadius: 10,
            padding: "5px 12px", cursor: "pointer", fontFamily: FM, fontSize: 9, letterSpacing: ".08em",
            color: "#c9a48f", textTransform: "uppercase",
          }}>reset my test data</button>
        ) : null}
      </div>
    </div>
  );
}

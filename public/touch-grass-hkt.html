<script id="appsrc" type="text/plain">

// ============================================================
// TOUCH GRASS HKT — a weekly head-to-head scavenger duel for two.
// Hammy (Spurs) vs Naddy (Arsenal), living in Ko Kaeo, Phuket.
// Get off the sofa, do real island things, snap proof, bank points,
// win the week. Rainy-season friendly: indoor-first challenges.
//
// Core loop: 25 shared tasks per week. First to claim a task locks it
// and banks the points. Photo proof + Michael Oliver VAR appeals.
// Midweek wildcard, daily double, throw-down dares. Scrapbook at week end.
//
// Scaffold pattern matches the established hammyLabs single-file React apps:
// type="text/plain" source block, triple-CDN waterfall, in-browser Babel.
// ============================================================

// ---------- tiny helpers ----------
const uid = () => Math.random().toString(36).slice(2, 9);
const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
function pick(arr, seed) {
  // deterministic pick when seed given, else random
  if (seed == null) return arr[Math.floor(Math.random() * arr.length)];
  let h = 0; const s = String(seed);
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return arr[h % arr.length];
}

// ---------- the two players ----------
// Hammy is Spurs (a soft sky blue), Naddy is Arsenal (a warm red). Their club
// allegiance drives their theme colour everywhere they appear.
const PLAYERS = {
  Hammy: { name: "Hammy", club: "Spurs",   colour: "#5b9bd5", chant: "COYS" },
  Naddy: { name: "Naddy", club: "Arsenal", colour: "#e0577a", chant: "COYG" },
};
const PLAYER_IDS = ["Hammy", "Naddy"];
function playerColour(id) { return (PLAYERS[id] && PLAYERS[id].colour) || "#9a8a72"; }

// ---------- week maths ----------
// The competition runs in Monday-to-Sunday weeks, seeded off the real date so
// both phones see the identical week number and the identical dealt board.
// Week 1 is anchored to the first Monday on/after the move-in (6 Jul 2026).
const SEASON_ANCHOR = new Date("2026-07-06T00:00:00+07:00"); // a Monday
function startOfWeek(d) {
  const x = new Date(d);
  const day = (x.getDay() + 6) % 7; // Mon=0 ... Sun=6
  x.setHours(0, 0, 0, 0);
  x.setDate(x.getDate() - day);
  return x;
}
function weekNumber(now) {
  const s = startOfWeek(now);
  const diff = Math.floor((s - startOfWeek(SEASON_ANCHOR)) / (7 * 24 * 3600 * 1000));
  return diff + 1; // 1-indexed
}
function dayOfWeek(now) { return (new Date(now).getDay() + 6) % 7; } // Mon=0


// ============================================================
// WEEKLY DEALER + SCORING ENGINE
// The dealer deterministically shuffles the bank by week number so both phones
// see the identical 25-task board. The scoring engine reads the claims log and
// produces per-player totals, honouring daily-double multipliers and the VAR
// penalty transfers from failed appeals.
// ============================================================

const TASKS_PER_WEEK = 25;
const APPEALS_PER_WEEK = 2;

// A tiny seeded shuffle (Fisher-Yates driven by a seeded PRNG) so the deal is
// deterministic for a given week but still feels well mixed.
function seededRng(seed) {
  let h = 2166136261 >>> 0;
  const s = String(seed);
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
  return function () {
    h += 0x6D2B79F5; let t = h;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, seed) {
  const a = arr.slice();
  const rng = seededRng(seed);
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// Deal this week's board: a deterministic 25 from the bank, seeded by week.
function dealWeek(wk) {
  const dealt = seededShuffle(CHALLENGE_BANK, "wk" + wk).slice(0, TASKS_PER_WEEK);
  // Which day (Mon=0..Sun=6) each task's daily-double is hot is seeded too, so
  // one task per day carries a secret x2 when claimed on its day.
  return dealt;
}

// The daily-double: for a given week, exactly one dealt task per day is secretly
// worth double IF claimed on that day. Deterministic, revealed only on claim.
function doubleTaskForDay(wk, day, dealt) {
  const rng = seededRng("dd" + wk + "-" + day);
  return dealt[Math.floor(rng() * dealt.length)].id;
}
function isDoubleClaim(wk, dealt, task) {
  if (!task || !task.claimedAt) return false;
  const day = dayOfWeek(task.claimedAt);
  return doubleTaskForDay(wk, day, dealt) === task.id;
}

// The midweek wildcard: a big-bonus bank task that only appears from Thursday
// (day index 3) onward, seeded so both phones agree, worth a juicy 40.
const WILDCARD_PTS = 40;
function wildcardForWeek(wk) {
  const rng = seededRng("wc" + wk);
  const c = CHALLENGE_BANK[Math.floor(rng() * CHALLENGE_BANK.length)];
  return { ...c, id: "wildcard_" + c.id, pts: WILDCARD_PTS, cat: "Wildcard", wildcard: true,
    title: "WILDCARD: " + c.title };
}
function wildcardLive(now) { return dayOfWeek(now) >= 3; } // Thursday onward

// Compute per-player scores from the claims map for a given week's board.
// claims: { [taskId]: { by, claimedAt, photo, caption, taunt, appeal } }
// appeal: { by, result: 'overturned'|'upheld'|'pending', judged }
function scoreWeek(wk, dealt, claims) {
  const totals = { Hammy: 0, Naddy: 0 };
  const byCat = {};
  const allTasks = dealt.concat([wildcardForWeek(wk)]);
  allTasks.forEach(task => {
    const c = claims[task.id];
    if (!c || !c.by) return;
    // A successfully overturned claim scores nobody the base points; the
    // penalty transfer is handled below.
    if (c.appeal && c.appeal.result === "overturned") return;
    let pts = task.pts;
    if (isDoubleClaim(wk, dealt, c)) pts *= 2;
    totals[c.by] += pts;
    byCat[task.cat] = byCat[task.cat] || { Hammy: 0, Naddy: 0 };
    byCat[task.cat][c.by] += pts;
  });
  // VAR penalty transfers: a FAILED appeal (upheld = claim stood) costs the
  // appealer the task's value and hands it to the wrongly-accused claimant.
  allTasks.forEach(task => {
    const c = claims[task.id];
    if (!c || !c.appeal) return;
    const ap = c.appeal;
    if (ap.result === "upheld" && ap.by) {
      const accused = c.by;
      const appealer = ap.by;
      totals[appealer] -= task.pts;
      if (accused) totals[accused] += task.pts;
    }
  });
  return { totals, byCat };
}


// ============================================================
// THE CHALLENGE LIBRARY (v2) — four pillars, seriously funny edition.
// Pillars: "body" (gentle physical), "mind" (mental/cultural/learning-by-doing),
// "soul" (spiritual/connection/stillness). The Thai-learning pillar runs on its

// Indoor-first for the monsoon; `dry:true` marks the grab-it-if-it's-sunny ones.

// ============================================================

const CHALLENGE_BANK = [
  // ===================== BODY (gentle movement, treat-yourself) =====================
  { id: "b_mallwalk", pillar: "body", cat: "Gentle wander", pts: 10, title: "Air-con mall lap",
    blurb: "Do a full loop of Central with an iced coffee. Window-shopping is cardio if you believe hard enough. No one is timing you and no one ever will." },
  { id: "b_massage", pillar: "body", cat: "Treat yourself", pts: 15, title: "Massage until boneless",
    blurb: "Book a Thai massage at Let's Relax and leave with the skeleton of a much calmer person. Proof: the photo where you look mildly concussed with happiness." },
  { id: "b_poolfloat", pillar: "body", cat: "Gentle wander", pts: 10, title: "Habitown pool bob",
    blurb: "Float in your own pool between downpours. Vertical is optional. Effort is frowned upon. This is the laziest points on the board and someone must seize them." },
  { id: "b_iceskate", pillar: "body", cat: "Big indoors", pts: 20, title: "Ice skating at Boat Lagoon",
    blurb: "Yes, there's an ice rink minutes from home, in the tropics, which is gloriously absurd. Wobble round it. Grabbing the barrier the whole way still counts as skating." },
  { id: "b_gokart", pillar: "body", cat: "Big indoors", pts: 20, title: "Formula Fun karting",
    blurb: "Electric go-karts in Ratsada. Channel your rage at the other one's driving into lap times. Photograph the leaderboard, then never let them forget it." },
  { id: "b_marketmosey", pillar: "body", cat: "Gentle wander", pts: 10, title: "Covered market mosey",
    blurb: "Amble a covered market with zero agenda and maximum snacking. Stop whenever something smells good. This is less a task, more a lifestyle you should adopt." },
  { id: "b_bowling", pillar: "body", cat: "Big indoors", pts: 15, title: "Bowling grudge match",
    blurb: "Ten-pin at the mall. The gutter is a valid strategy. Snap the score screen, loser buys the roti, winner is unbearable about it for a week." },
  { id: "b_climb", pillar: "body", cat: "Big indoors", pts: 20, title: "Indoor rock climb",
    blurb: "Rebel climbing gym. Get three metres up, decide that's plenty, come down a hero. Proof: you, clinging to a wall, questioning your life choices." },

  // ===================== MIND (culture, museums, learning-by-doing) =====================
  { id: "m_trickeye", pillar: "mind", cat: "Culture hit", pts: 15, title: "Trick Eye Museum nonsense",
    blurb: "The AR Trick Eye Museum under Central. Pretend to be eaten by a shark, dangle off a fake cliff, lose all dignity for the perfect photo. That IS the assignment." },
  { id: "m_aquaria", pillar: "mind", cat: "Big indoors", pts: 20, title: "Aquaria, the big fish",
    blurb: "The biggest aquarium in Thailand, right under Central Floresta. Get a photo in the shark tunnel. Try not to make it weird with the groupers. They can tell." },
  { id: "m_thaihua", pillar: "mind", cat: "Culture hit", pts: 15, title: "Thai Hua Museum",
    blurb: "A gorgeous old mansion telling the island's Hokkien Chinese story. Actually fascinating, actually air-conditioned. Learn one fact you can smugly deploy at dinner." },
  { id: "m_upsidedown", pillar: "mind", cat: "Culture hit", pts: 15, title: "Upside Down House",
    blurb: "An entire house built upside down, allegedly the realest one on earth, which is a wild thing to be world-class at. Get the gravity-defying shot and feel your brain slide." },
  { id: "m_baanchin", pillar: "mind", cat: "Culture hit", pts: 15, title: "Baan Chinpracha mansion",
    blurb: "A perfectly preserved 19th-century Sino-Portuguese mansion. You've seen it in Thai period dramas. Swan about pretending you own it. Touch nothing, tempt everything." },
  { id: "m_cinema", pillar: "mind", cat: "Big indoors", pts: 15, title: "Cinema recliner day",
    blurb: "SFX Cinema at Central has recliner seats that ruin normal chairs for you forever. Catch anything. Popcorn is legally mandatory. The stub is your alibi." },
  { id: "m_bookshop", pillar: "mind", cat: "Quiet win", pts: 10, title: "Lose an hour in a bookshop",
    blurb: "Find a bookshop or library corner and actually browse. Buy something you'll pretend to finish. Photograph the haul, not your ambitious unread pile at home." },
  { id: "m_escape", pillar: "mind", cat: "Big indoors", pts: 20, title: "Escape room panic",
    blurb: "Get locked in a themed room and bicker your way out against the clock. The truest test of a marriage there is. Proof: the triumphant (or defeated) group photo." },

  // ===================== SOUL (spiritual, connection, stillness) =====================
  { id: "s_watchalong", pillar: "soul", cat: "Culture hit", pts: 20, dry: true, title: "Wat Chalong, properly",
    blurb: "Phuket's grandest temple. Cover shoulders and knees, be genuinely respectful, watch the incense curl in the rain-cooled air. Capture the calm, not a cheesy pose." },
  { id: "s_someday", pillar: "soul", cat: "Cafe crawl", pts: 10, title: "Someday Cafe stillness",
    blurb: "A serene Old Town cafe where they famously never rush you out, even as it buckets down. Sit. Breathe. Look inward. Order cake. Inward-looking is easier with cake." },
  { id: "s_shrine", pillar: "soul", cat: "Quiet win", pts: 10, title: "Neighbourhood shrine detail",
    blurb: "Find a little local shrine and photograph one beautiful detail: a dragon, a bell, a curl of smoke. A small quiet moment in a loud wet week. Those count double for the heart." },
  { id: "s_datenight", pillar: "soul", cat: "Two of us", pts: 20, title: "Proper date night",
    blurb: "Neither scruffy nor rushed. Put on the nice shirt. One good photo of the pair of you. This is the entire reason this app exists, so don't you dare claim it lazily." },
  { id: "s_tunkka", pillar: "soul", cat: "Two of us", pts: 25, dry: true, title: "Tunk Ka Cafe at dusk",
    blurb: "If the sky clears, drive up Khao Rang Hill to this romantic old terrace cafe overlooking the whole town. A local legend's favourite. Worth every hairpin bend. Rare-sun jackpot." },
  { id: "s_gratitude", pillar: "soul", cat: "Quiet win", pts: 10, title: "The gratitude snap",
    blurb: "Photograph one thing today you're genuinely glad about. The cats. The rain on the window. Each other. Yes it's soppy. Soppy is allowed on the soul pillar, that's the point." },
  { id: "s_catpile", pillar: "soul", cat: "Two of us", pts: 10, title: "Assemble all five cats",
    blurb: "One photo, all five furballs, simultaneously. Rocket will bolt, Oscar will pose, Selina will panic, Goku will be Goku. Herding them IS the spiritual trial. Godspeed." },
  { id: "s_massage_together", pillar: "soul", cat: "Two of us", pts: 15, title: "Couples massage melt",
    blurb: "Get the massage side by side and emerge as two puddles who love each other. Proof: the post-bliss selfie where you both look ten years younger and slightly drunk on calm." },

  // ===================== BODY (second wave) =====================
  { id: "b_dimsum", pillar: "body", cat: "Feast quest", pts: 15, title: "Dawn dim sum raid",
    blurb: "Phuket does a serious Hokkien dim sum breakfast. Drag yourself out for the little steamer baskets before 11am. Getting up early IS the physical challenge, let's be honest." },
  { id: "b_batik", pillar: "body", cat: "Make something", pts: 20, title: "Batik workshop mess",
    blurb: "Learn to hand-paint batik fabric and produce something wonky and beloved. Wax goes everywhere. You will be terrible at it. Frame it anyway. Proof: your questionable masterpiece." },
  { id: "b_cookclass", pillar: "body", cat: "Make something", pts: 20, title: "Thai cooking class",
    blurb: "Blue Elephant if you're fancy, the Cooking Academy if you're humble. Includes a covered market run. Photograph the finished plate. The tasting at the end is the whole reward." },
  { id: "b_streetdare", pillar: "body", cat: "Feast quest", pts: 15, title: "Mystery street-food dare",
    blurb: "Buy and eat one street snack you cannot confidently name. Photograph BEFORE the first bite, coward's insurance is not permitted. Bravery is the entire point of this one." },
  { id: "b_spa_day", pillar: "body", cat: "Treat yourself", pts: 20, title: "Full spa reset",
    blurb: "Ton Mai in Rawai does a hammam, sauna, and an ice bath that requires genuine courage. Do the whole circuit. Photograph the aftermath: you, reborn, mildly hypothermic, radiant." },

  // ===================== MIND (second wave) =====================
  { id: "m_hokkienmee", pillar: "mind", cat: "Feast quest", pts: 20, title: "Hokkien mee hunt",
    blurb: "Track down proper Phuket-style Hokkien mee, the regional signature noodle. Not the Singapore one, don't start that war. Photograph the bowl in the wild, then demolish it." },
  { id: "m_oaew", pillar: "mind", cat: "Feast quest", pts: 20, title: "The o-aew quest",
    blurb: "Hunt down o-aew, Phuket's own jelly-and-shaved-ice dessert that barely exists outside the island. Finding it is a proper local badge of honour. Slurp it, snap it, feel initiated." },
  { id: "m_rumclass", pillar: "mind", cat: "Make something", pts: 20, title: "Chalong Bay rum lab",
    blurb: "Tour the copper stills at Chalong Bay Distillery, then shake up your own cocktail with the head mixologist. Educational drinking, the finest kind. Proof: your signature creation, pre-gulp." },
  { id: "m_rawaiart", pillar: "mind", cat: "Culture hit", pts: 15, dry: true, title: "Rawai Art Village",
    blurb: "A bohemian commune of art made from ocean waste: driftwood beasts, fishing-net hangings, buoys reborn as sculpture. Mostly covered. You'll leave inspired and mildly guilty about your bin." },
  { id: "m_miningmuseum", pillar: "mind", cat: "Culture hit", pts: 15, title: "Tin Mining Museum",
    blurb: "The whole island exists because of tin, and this museum tells you how, with surprising drama. Learn why Phuket Town looks the way it does. Deploy one fact smugly within 24 hours." },
  { id: "m_bookclub_cat", pillar: "mind", cat: "Cafe crawl", pts: 15, title: "B Cat Cafe infiltration",
    blurb: "A cat cafe in Phuket Town, which for you two is either a busman's holiday or heaven. Go betray your own five for an hour. Photograph the fluffiest traitor. They'll never know. Probably." },

  // ===================== SOUL (second wave) =====================
  { id: "s_cabaret", pillar: "soul", cat: "Big night", pts: 20, title: "Cabaret spectacular",
    blurb: "Simon Cabaret: sequins, showstoppers, and more charisma per square metre than anywhere on the island. Pure joy in a downpour. Photograph the dazzle (where allowed), feel your spirit lift." },
  { id: "s_jazz", pillar: "soul", cat: "Big night", pts: 15, title: "Old Town jazz nightcap",
    blurb: "The Library or a Soi Romanee bar with live jazz and a proper cocktail. Sit close, say little, let the sax do the talking. This is what grown-up date nights are supposed to feel like." },
  { id: "s_letter", pillar: "soul", cat: "Quiet win", pts: 15, title: "The unexpected note",
    blurb: "Leave the other one a little handwritten note somewhere they'll find it. Photograph it before you hide it. Wildly soppy, wildly effective. The soul pillar rewards the brave-hearted." },
  { id: "s_sunset_window", pillar: "soul", cat: "Two of us", pts: 15, dry: true, title: "Catch a clearing sky",
    blurb: "If the clouds part even for ten minutes, drop everything and get outside to catch it. A rare-sun photo in monsoon season is worth its weight in gold. The sky waits for no one." },
  { id: "s_market_gift", pillar: "soul", cat: "Two of us", pts: 15, title: "Surprise market gift",
    blurb: "At a night market, secretly buy the other one something small and daft that made you think of them. Reveal it later. Photograph the loot. Thoughtfulness for under 100 baht, unbeatable value." },
  { id: "s_newdrive", pillar: "soul", cat: "Two of us", pts: 15, lean: "driver", title: "Drive somewhere unknown",

  { id: "b_baanrai", pillar: "body", cat: "Hill cafe", pts: 20, lean: "driver", dry: true, title: "Baanrai I Talay hill cafe",

// ============================================================
// THE WEEKLY BOARD — the heart of the game.
// 25 challenges dealt per week, shown in closed groups by pillar (tap to open).
// First to claim a task locks it: banks the points, captures photo + caption +
// optional taunt. Team-up tasks score for both. Mobile-first: closed lists,
// compact, emoji only for genuine wow.
//
// This phase builds the deal, the closed groups, and the claim-with-photo flow
// (with optional Bluesky share). VAR appeals, wildcard, daily-double, dares
// follow in their own phases.
// ============================================================

// ---------- per-week claim persistence (device-local) ----------
// Stored under a per-week key so each week keeps its own board of claims.
// Shape: { [taskId]: { by, at, photo, caption, taunt } }
function claimsKey(wk) { return "tg_claims_wk" + wk; }
function loadClaims(wk) {
  try { return JSON.parse(localStorage.getItem(claimsKey(wk)) || "{}"); }
  catch (e) { return {}; }
}
function saveClaims(wk, claims) {
  try { localStorage.setItem(claimsKey(wk), JSON.stringify(claims)); } catch (e) {}
}

// ---------- deal this week's 25, grouped by pillar ----------
const PILLAR_META = {
  body: { label: "Body", sub: "gentle moves & treats", accent: "#3fae7a" },
  mind: { label: "Mind", sub: "culture, curios, learning", accent: "#5b9bd5" },
  soul: { label: "Soul", sub: "connection & stillness", accent: "#e0577a" },
};
const PILLAR_ORDER = ["body", "mind", "soul"];

// Deterministic weekly deal from the balanced library (seeded by week number),
// then grouped by pillar for the closed-list display.
function dealtBoard(wk) {
  const dealt = seededShuffle(CHALLENGE_BANK, "board-wk" + wk).slice(0, TASKS_PER_WEEK);
  const groups = { body: [], mind: [], soul: [] };
  dealt.forEach((t) => { (groups[t.pillar] || groups.mind).push(t); });
  return { dealt, groups };
}

// ---------- live score from claims (this phase: base points + team-ups) ----------
function tallyScores(dealt, claims) {
  const totals = { Hammy: 0, Naddy: 0 };
  dealt.forEach((t) => {
    const c = claims[t.id];
    if (!c || !c.by) return;
    if (t.team) { totals.Hammy += t.pts; totals.Naddy += t.pts; }
    else { totals[c.by] = (totals[c.by] || 0) + t.pts; }
  });
  return totals;
}


// ---------- auto caption + taunt banks (choose auto, or write your own) ----------
function autoCaption(task, who) {
  const opts = [
    `Just claimed "${task.title}" for the ${PLAYERS[who].club} cause. ${task.pts} points, thank you very much.`,
    `${task.title}: done. That's ${task.pts} on the board for ${who}.`,
    `Touched some grass. "${task.title}" is mine. ${PLAYERS[who].chant}.`,
    `Banked "${task.title}" (+${task.pts}). Phuket is our playground now.`,
  ];
  return pick(opts);
}
function autoTaunt(task, who) {
  const other = who === "Hammy" ? "Naddy" : "Hammy";
  const opts = [
    `Better luck next time, ${other}.`,
    `That one's off the board, ${other}. Slow hands.`,
    `${other} was still deciding. I decided.`,
    `Imagine not claiming this one, ${other}.`,
    `One for me, none for you, ${other}.`,
  ];
  return pick(opts);
}

// ---------- THE BOARD SCREEN ----------
function Board({ now, who, claims, setClaims }) {
  const wk = weekNumber(now);
  const { groups } = dealtBoard(wk);
  const [openPillar, setOpenPillar] = useState(null); // closed by default
  const [claiming, setClaiming] = useState(null);     // task being claimed

  function doClaim(task, detail) {
    const next = { ...claims, [task.id]: {
      by: who, at: Date.now(),
      photo: detail.photo, caption: detail.caption, taunt: detail.taunt,
      shared: detail.share || false,
    } };
    setClaims(wk, next);
    setClaiming(null);
    // Bluesky posting fires on the live site via the backend; in preview it's a
    // no-op. We record the intent (shared:true) either way.
  }

  return (
    <div>
      {PILLAR_ORDER.map((pillar) => (
        <div key={pillar} style={{ marginBottom: 12 }}>
          <PillarGroup
            pillar={pillar}
            tasks={groups[pillar]}
            claims={claims}
            open={openPillar === pillar}
            onToggle={() => setOpenPillar(openPillar === pillar ? null : pillar)}
            onClaim={(t) => setClaiming(t)}
          />
        </div>
      ))}

      {claiming && (
        <ClaimSheet
          task={claiming}
          who={who}
          onClose={() => setClaiming(null)}
          onDone={(detail) => doClaim(claiming, detail)}
        />
      )}
    </div>
  );
}

// Format the time left in the current week (to Sunday midnight Phuket).
function weekEndsIn(now) {
  const s = startOfWeek(now);
  const end = new Date(s); end.setDate(end.getDate() + 7);
  const ms = end.getTime() - new Date(now).getTime();
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d >= 1) return d + (d === 1 ? " day" : " days") + " left";
  if (h >= 1) return h + (h === 1 ? " hour" : " hours") + " left";
  const m = Math.floor((ms % 3600000) / 60000);
  return m + " min left";
}

// ---------- THE GAME ROUTER ----------
function Game({ now, who, isFull, onSwitch }) {
  const [view, setView] = useState("hub");
  const wk = weekNumber(now);
  const [claims, setClaimsState] = useState(() => loadClaims(wk));

  // persist claims whenever they change (device-local)
  function setClaims(weekNo, next) {
    saveClaims(weekNo, next);
    setClaimsState(next);
  }

  // live scores from the real board deal + claims
  const { dealt } = dealtBoard(wk);
  const scores = tallyScores(dealt, claims);

  // "you" on this device: the picked side, or Hammy when he's testing pre-launch
  const me = who || "Hammy";

  if (view === "hub") {
    return <Hub now={now} scores={scores} onGo={setView} onSwitch={onSwitch} />;
  }
  if (view === "board") {
    return <Screen title={"Week " + wk + " board"} onBack={() => setView("hub")}>
      <Board now={now} who={me} claims={claims} setClaims={setClaims} />
    </Screen>;
  }
  if (view === "school") {
    return <Screen title="Coach Saliba's Thai school" onBack={() => setView("hub")}>
      <ComingNext line="A new useful Thai word each day. Hear it, say it back, keep the daily streak alive. A certain Arsenal centre-half is your coach." />
    </Screen>;
  }
  return <Screen title="The scrapbook" onBack={() => setView("hub")}>
    <ComingNext line="Your week gathered up: best photos, best captions, the taunts that landed, and who led on what. Revealed in full when the week closes." />
  </Screen>;
}

const LAUNCH = new Date("2026-07-06T00:00:00+07:00");
function msUntilLaunch(now) { return LAUNCH.getTime() - new Date(now).getTime(); }

// ---------- passwords (polite lock, not Fort Knox) ----------
// "hammy"    -> full access (test everything, even pre-launch)

function checkPassword(raw) {
  const p = String(raw || "").trim().toLowerCase();

}

// A soft rounded button that presses in slightly. Reused everywhere.
function Btn({ onClick, children, style, kind }) {
  const [down, setDown] = useState(false);
  const base = {
    fontFamily: FH, fontWeight: 700, fontSize: 15, border: "none",
    borderRadius: 16, padding: "13px 20px", cursor: "pointer",

  };
  return (
    <button onClick={onClick}
      onPointerDown={() => setDown(true)}
      onPointerUp={() => setDown(false)}
      onPointerLeave={() => setDown(false)}
      style={{ ...base, ...style }}>
      {children}
    </button>
  );
}

// THE PASSWORD GATE — mysterious & minimal. Just the wordmark and a prompt.
// ============================================================
function Gate({ onPass }) {
  const [val, setVal] = useState("");
  const [msg, setMsg] = useState("");
  const [shake, setShake] = useState(false);
  const [wrongIdx, setWrongIdx] = useState(0);

  function submit() {
    const level = checkPassword(val);
    if (level) {
      saveGate(level);
      onPass(level);
      return;
    }
    // wrong: cheeky message + a little shake, cycle through the bank
    setMsg(WRONG_WORDS[wrongIdx % WRONG_WORDS.length]);
    setWrongIdx(wrongIdx + 1);
    setShake(true);
    setVal("");
    setTimeout(() => setShake(false), 500);
  }

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", padding: "0 28px",
      background: "linear-gradient(165deg, #fff6ee 0%, #ffe9db 55%, #ffdcc8 100%)",
    }}>
      <BackLink />
      <div style={{ animation: "tgFadeUp .7s ease both", transform: shake ? undefined : "none" }}>
        <div style={{ animation: shake ? "tgShake .5s" : "none" }}>
          <Wordmark size={1} />
        </div>
      </div>

      <div style={{
        marginTop: 40, width: "100%", maxWidth: 320,
        animation: "tgFadeUp .7s ease .15s both",

        <div style={{
          fontFamily: FM, fontSize: 10.5, letterSpacing: ".16em",
          textTransform: "uppercase", color: T.inkSoft, textAlign: "center",
          marginBottom: 14,
        }}>
          Say the secret word
        </div>
        <input
          value={val}
          onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
          placeholder="……………"
          autoCapitalize="none" autoCorrect="off" spellCheck="false"
          style={{
            width: "100%", textAlign: "center", fontFamily: FB, fontWeight: 700,
            fontSize: 18, color: T.ink, background: T.card,
            border: "2px solid " + T.peach, borderRadius: 16,
            padding: "14px 16px", outline: "none", letterSpacing: ".05em",
          }}
        />
        <div style={{ marginTop: 14, display: "flex", justifyContent: "center" }}>
          <Btn onClick={submit} style={{ minWidth: 150 }}>Enter</Btn>
        </div>

        {msg && (
          <div style={{
            marginTop: 18, fontFamily: FB, fontSize: 13.5, fontStyle: "italic",
            color: T.coralDk, textAlign: "center", lineHeight: 1.5,
            animation: "tgFadeUp .4s ease both",
          }}>
            {msg}
          </div>
        )}
      </div>

      <div style={{
        position: "fixed", bottom: 22, fontFamily: FM, fontSize: 9,
        letterSpacing: ".14em", color: "#d8b8a4", textTransform: "uppercase",
      }}>
        hammyLabs · HKT
      </div>
    </div>
  );
}

function pad2(n) { return String(n).padStart(2, "0"); }

function Teaser({ now, isFull, onReset, onEnterGame }) {
  const [tick, setTick] = useState(0);
  const [hintIdx, setHintIdx] = useState(0);
  const [taps, setTaps] = useState(0);

  // live countdown, re-render every second

    const t = setInterval(() => setHintIdx((i) => (i + 1) % TEASE_HINTS.length), 3200);
    return () => clearInterval(t);

  const ms = Math.max(0, msUntilLaunch(Date.now()));

      <div onClick={() => setTaps((t) => t + 1)} style={{ cursor: "pointer" }}>
        <Wordmark size={1.05} />
      </div>

      {catEgg && (
        <div style={{ fontSize: 30, marginTop: 10, animation: "tgPop .5s ease both" }}>

        <Unit v={hrs} label="hrs" />
        <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 30, color: T.peach }}>:</div>
        <Unit v={mins} label="min" />
        <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 30, color: T.peach }}>:</div>
        <Unit v={secs} label="sec" />
      </div>

      <div style={{
        marginTop: 40, maxWidth: 300, minHeight: 44,
        fontFamily: FB, fontSize: 16, fontWeight: 600, color: T.ink,

      }}>

      {isFull && (

          marginTop: 40, fontFamily: FM, fontSize: 9.5, color: T.inkSoft,

        made with love · for lil naddy
      </div>
    </div>
  );
}


// ============================================================
// APP ROOT — the whole flow.
//   BEFORE Monday: password gate guards the surprise.
//     - Naddy's key -> teaser (curiosity preserved)
//     - Hammy's key -> may test the game
//   ON/AFTER Monday: password retires. Open door.
//     - first open on a phone -> "pick your side" (with jersey confirm)
//     - thereafter -> straight into the game, side remembered
//     - can switch side anytime
// ============================================================
function App() {
  const [gate, setGate] = useState(loadGate());     // null | 'teaser' | 'full'
  const [who, setWho] = useState(loadWho());        // null | 'Hammy' | 'Naddy'
  const [previewGame, setPreviewGame] = useState(false); // Hammy testing pre-launch
  const now = Date.now();
  const isLaunched = launched(now);

  // ---------- POST-LAUNCH: open door, identity not password ----------
  if (isLaunched) {
    if (!who) return <PickSide onPick={setWho} />;
    return <Game now={now} who={who} isFull={true} onSwitch={() => { setWho(null); }} />;
  }

  // ---------- PRE-LAUNCH: password guards the reveal ----------
  if (!gate) return <Gate onPass={setGate} />;
  const isFull = gate === "full";

  function relock() { clearGate(); setGate(null); setPreviewGame(false); }

  // Hammy (full) can flip into the game to test it before Monday.
  if (isFull && previewGame) {
    return <Game now={now} who="Hammy" isFull={true} onSwitch={relock} />;
  }

  // Otherwise show the teaser. Hammy gets a dev button to enter the game.
  return (
    <Teaser
      now={now}
      isFull={isFull}
      onReset={relock}
      onEnterGame={isFull ? () => setPreviewGame(true) : null}
    />
  );
}

<script id="appsrc" type="text/plain">

// ============================================================
// TOUCH GRASS HKT — a weekly head-to-head scavenger duel for two.
// Hammy (Spurs) vs Naddy (Arsenal), living in Ko Kaeo, Phuket.
// Get off the sofa, do real island things, snap proof, bank points,
// win the week. Rainy-season friendly: indoor-first challenges.
//
// Core loop: 25 shared tasks per week. First to claim a task locks it
// and banks the points. Photo proof + Michael Oliver VAR appeals.
// Midweek wildcard, daily double, throw-down dares. Scrapbook at week end.
//
// Scaffold pattern matches the established hammyLabs single-file React apps:
// type="text/plain" source block, triple-CDN waterfall, in-browser Babel.
// ============================================================

// ---------- tiny helpers ----------
const uid = () => Math.random().toString(36).slice(2, 9);
const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
function pick(arr, seed) {
  // deterministic pick when seed given, else random
  if (seed == null) return arr[Math.floor(Math.random() * arr.length)];
  let h = 0; const s = String(seed);
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return arr[h % arr.length];
}

// ---------- the two players ----------
// Hammy is Spurs (a soft sky blue), Naddy is Arsenal (a warm red). Their club
// allegiance drives their theme colour everywhere they appear.
const PLAYERS = {
  Hammy: { name: "Hammy", club: "Spurs",   colour: "#5b9bd5", chant: "COYS" },
  Naddy: { name: "Naddy", club: "Arsenal", colour: "#e0577a", chant: "COYG" },
};
const PLAYER_IDS = ["Hammy", "Naddy"];
function playerColour(id) { return (PLAYERS[id] && PLAYERS[id].colour) || "#9a8a72"; }

// ---------- week maths ----------
// The competition runs in Monday-to-Sunday weeks, seeded off the real date so
// both phones see the identical week number and the identical dealt board.
// Week 1 is anchored to the first Monday on/after the move-in (6 Jul 2026).
const SEASON_ANCHOR = new Date("2026-07-06T00:00:00+07:00"); // a Monday
function startOfWeek(d) {
  const x = new Date(d);
  const day = (x.getDay() + 6) % 7; // Mon=0 ... Sun=6
  x.setHours(0, 0, 0, 0);
  x.setDate(x.getDate() - day);
  return x;
}
function weekNumber(now) {
  const s = startOfWeek(now);
  const diff = Math.floor((s - startOfWeek(SEASON_ANCHOR)) / (7 * 24 * 3600 * 1000));
  return diff + 1; // 1-indexed
}
function dayOfWeek(now) { return (new Date(now).getDay() + 6) % 7; } // Mon=0


// ============================================================
// SEEDED SHUFFLE — the shared deal primitive.
// The board's dealer (dealtBoard) and the victor-swings (wildcard, daily-double)
// all lean on this deterministic shuffle so both phones see the identical board
// for a given week. Kept here as the single source of truth for the primitive.
// ============================================================

// A tiny seeded shuffle (Fisher-Yates driven by a seeded PRNG) so the deal is
// deterministic for a given week but still feels well mixed.
function seededRng(seed) {
  let h = 2166136261 >>> 0;
  const s = String(seed);
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
  return function () {
    h += 0x6D2B79F5; let t = h;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, seed) {
  const a = arr.slice();
  const rng = seededRng(seed);
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}


// ============================================================

// tier:  "quick" (tiny, near-home) | "spot" (first-to-snap race) | "big" (weekly centrepiece)

// Some tasks are pattern-based (any 7-Eleven, any massage shopfront) and need

// ============================================================

const CHALLENGE_BANK = [

  { id: "q_7eleven", tier: "quick", pillar: "body", cat: "Snack quest", pts: 10,

  { id: "q_wai", tier: "quick", pillar: "soul", cat: "Local life", pts: 10, lean: "social",

  { id: "q_motorbike", tier: "quick", pillar: "mind", cat: "Local life", pts: 10,

  { id: "big_kruvit", tier: "big", pillar: "soul", cat: "Big one", pts: 30,

  // ---------------- SPOT: first-to-snap sign scrambles (Central Phuket, verified) ----------------

    blurb: "Race to snap the Aquaria aquarium entrance sign in Floresta. Big, blue, unmissable, which makes the quick-draw all the more cutthroat." },

    place: "Krispy Kreme", area: "Central Phuket",
    title: "First to the Krispy Kreme sign",
    blurb: "First to snap the glowing Krispy Kreme sign claims it. Winner is honour-bound to buy the doughnuts. Those are the rules now." },
  { id: "sp_starbucks", tier: "spot", pillar: "mind", cat: "Sign scramble", pts: 15,
    place: "Starbucks", area: "Central Phuket",

  { id: "sp_trickeye", tier: "spot", pillar: "mind", cat: "Sign scramble", pts: 15,

  { id: "sp_luxury", tier: "spot", pillar: "mind", cat: "Sign scramble", pts: 15,

// ============================================================
// VICTOR-SWINGS — the mechanics that keep a week alive to the final whistle.
// Three thrills: the midweek WILDCARD (a big bonus from Thursday on, a lifeline
// for whoever's trailing), the DAILY DOUBLE (one secret task a day scores x2,
// revealed only on claim), and THROW-DOWN DARES (lob a personal challenge at
// your other half). All seeded by week so both phones agree.
// ============================================================

// ---------- DAILY DOUBLE ----------
// One dealt task per day is secretly worth double IF claimed on that day.
// Deterministic (seeded by week+day), revealed only at the moment of claiming.
function doubleTaskForDay(wk, day, dealt) {
  if (!dealt || !dealt.length) return null;
  const rng = seededRng("dd" + wk + "-" + day);
  return dealt[Math.floor(rng() * dealt.length)].id;
}
// Was this specific claim a daily-double hit? Reads the real claim shape:
// a claim carries { by, at, ... }, where `at` is the ms timestamp.
function isDoubleClaim(wk, dealt, taskId, claim) {
  if (!claim || !claim.at) return false;
  const day = dayOfWeek(claim.at);
  return doubleTaskForDay(wk, day, dealt) === taskId;
}

// ---------- MIDWEEK WILDCARD ----------
// A big-bonus task, drawn from the everyday tiers (quick/spot) so it feels like
// a bonus round, not a second big night out. Seeded by week; live Thursday on.
const WILDCARD_PTS = 40;
function wildcardForWeek(wk) {
  const pool = CHALLENGE_BANK.filter((c) => c.tier === "quick" || c.tier === "spot");
  if (!pool.length) return null;
  const rng = seededRng("wc" + wk);
  const c = pool[Math.floor(rng() * pool.length)];
  return {
    ...c,
    id: "wildcard_" + c.id,
    pts: WILDCARD_PTS,
    tier: "wildcard",
    wildcard: true,
    title: "WILDCARD: " + c.title,
  };
}
function wildcardLive(now) { return dayOfWeek(now) >= 3; } // Thursday (idx 3) onward
function daysUntilWildcard(now) { return Math.max(0, 3 - dayOfWeek(now)); }

// ---------- THROW-DOWN DARES ----------
// One player lobs a personal challenge at the other. The dared player either
// does it (both feel the stakes) or ducks it. Stored per-week like claims.
// A landed dare is worth a cheeky bonus; a ducked dare quietly hands a point
// to the darer, so ducking has a small cost. Kept light and playful.
const DARE_PTS = 15;
const DARE_IDEAS = [
  "Order your next coffee entirely in Thai, no English rescue.",
  "Eat the spiciest thing on the menu without reaching for water.",
  "Say hello to the next three cats we pass, out loud, by made-up names.",
  "Do a lap of the shop before you're allowed to buy the thing you came for.",
  "Compliment a total stranger's outfit and mean it.",
  "Let me pick your dinner order tonight, no vetoes.",
  "Take the stairs, not the lift, and look pleased about it.",
  "Wai the next songthaew driver like they're royalty.",
];

function dareKey(wk) { return "tg_dares_wk" + wk; }
function loadDares(wk) {
  try { return JSON.parse(localStorage.getItem(dareKey(wk)) || "[]"); }
  catch (e) { return []; }
}
function saveDares(wk, dares) {
  try { localStorage.setItem(dareKey(wk), JSON.stringify(dares)); } catch (e) {}
}

// Tally the dare economy into per-player totals (added on top of task scores).
// A landed dare: the dared player banks DARE_PTS. A ducked dare: the darer
// banks a consolation point (small sting for ducking).
function tallyDares(dares) {
  const totals = { Hammy: 0, Naddy: 0 };
  (dares || []).forEach((d) => {
    if (d.result === "landed" && d.to) totals[d.to] = (totals[d.to] || 0) + DARE_PTS;
    else if (d.result === "ducked" && d.from) totals[d.from] = (totals[d.from] || 0) + 5;
  });
  return totals;
}

// ---------- THE DARES SCREEN ----------
// Lob a throw-down dare at your other half, or answer one they've lobbed at you.
// A landed dare banks DARE_PTS for the darer's victim (they were brave); a ducked
// dare hands a small consolation to the darer. Kept light, warm, and cheeky.
function DaresScreen({ me, dares, setDares }) {
  const them = me === "Hammy" ? "Naddy" : "Hammy";
  const [text, setText] = useState("");
  const [picked, setPicked] = useState("");

  const suggestion = picked || "";

  function throwDare() {
    const body = (text.trim() || suggestion).trim();
    if (!body) return;
    const d = { id: uid(), from: me, to: them, text: body, result: "pending", at: Date.now() };
    setDares([...(dares || []), d]);
    setText(""); setPicked("");
  }
  function answer(id, result) {
    setDares((dares || []).map((d) => d.id === id ? { ...d, result: result } : d));
  }

  const incoming = (dares || []).filter((d) => d.to === me && d.result === "pending");
  const outgoing = (dares || []).filter((d) => d.from === me);

  return (
    <div>
      {/* incoming dares to answer */}
      {incoming.length > 0 && (
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontFamily: FM, fontSize: 10, letterSpacing: ".12em", color: T.coralDk, marginBottom: 8 }}>
            {them.toUpperCase()} DARES YOU
          </div>
          {incoming.map((d) => (
            <div key={d.id} style={{ background: T.card, border: "1px solid " + T.peach, borderRadius: 14, padding: "13px 15px", marginBottom: 10 }}>
              <div style={{ fontFamily: FB, fontSize: 14, color: T.ink, lineHeight: 1.5 }}>{d.text}</div>
              <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
                <button onClick={() => answer(d.id, "landed")} style={{
                  flex: 1, cursor: "pointer", background: T.good, border: "none", borderRadius: 11,
                  padding: "9px 0", fontFamily: FH, fontWeight: 700, fontSize: 13, color: "#fff",
                }}>Did it! +{DARE_PTS}</button>
                <button onClick={() => answer(d.id, "ducked")} style={{
                  flex: 1, cursor: "pointer", background: "transparent", border: "1px solid " + T.line, borderRadius: 11,
                  padding: "9px 0", fontFamily: FH, fontWeight: 700, fontSize: 13, color: T.inkSoft,
                }}>Ducked it</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* throw a new dare */}
      <div style={{ background: T.card, border: "1px solid " + T.line, borderRadius: 16, padding: "15px 16px" }}>
        <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: T.ink }}>Throw down a dare</div>
        <div style={{ fontFamily: FB, fontSize: 12, color: T.inkSoft, marginTop: 2, lineHeight: 1.5 }}>
          Aim it at {them}. Write your own, or grab one of these.
        </div>
        <textarea value={text} onChange={(e) => { setText(e.target.value); setPicked(""); }} rows={2}
          placeholder="Your dare..."
          style={{ width: "100%", marginTop: 10, fontFamily: FB, fontSize: 14, color: T.ink, background: T.cream, border: "1px solid " + T.line, borderRadius: 12, padding: "11px 13px", resize: "vertical", outline: "none" }} />
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
          {DARE_IDEAS.slice(0, 4).map((idea, i) => (
            <button key={i} onClick={() => { setPicked(idea); setText(idea); }} style={{
              cursor: "pointer", background: text === idea ? T.peach : T.cream, border: "1px solid " + T.line,
              borderRadius: 10, padding: "6px 10px", fontFamily: FB, fontSize: 11, color: T.ink, textAlign: "left",
            }}>{idea.length > 34 ? idea.slice(0, 32) + "..." : idea}</button>
          ))}
        </div>
        <div style={{ marginTop: 12 }}>
          <Btn onClick={throwDare} style={{ width: "100%" }}>Send the dare to {them}</Btn>
        </div>
      </div>

      {/* your outgoing dares */}
      {outgoing.length > 0 && (
        <div style={{ marginTop: 16 }}>
          <div style={{ fontFamily: FM, fontSize: 10, letterSpacing: ".12em", color: T.inkSoft, marginBottom: 8 }}>
            YOUR DARES TO {them.toUpperCase()}
          </div>
          {outgoing.map((d) => (

                {d.result === "landed" ? "LANDED" : d.result === "ducked" ? "DUCKED" : "PENDING"}

  );
}


// ============================================================
// THE VAR BOOTH — Michael Oliver reviews the replay.
// When your opponent smells something dodgy about a claim, they can APPEAL.
// The claim's photo goes upstairs to Michael Oliver (a real AI judge on the
// live site; a graceful demo in preview). He is written with warmth as
// wonderfully neurodivergent: hyper-focused, tangent-prone, needs the details
// lined up just so, deeply fair. It's an affectionate wink, never a mock.
//
// The economy (from our design): 2 appeals per person per week. A FAILED appeal
// (VAR upholds the claim) costs the appealer the task's full value AND hands
// those points to the wrongly-accused. So appealing costs real money and can
// genuinely backfire. Warned clearly before they commit.
// ============================================================

// How many appeals each player gets per week.
const APPEALS_PER_WEEK = 2;

// Count how many appeals a player has spent this week (from the claims map).
function appealsSpent(claims, who) {
  let n = 0;
  Object.keys(claims || {}).forEach((k) => {
    const c = claims[k];
    if (c && c.appeal && c.appeal.by === who) n++;
  });
  return n;
}
function appealsLeft(claims, who) {
  return Math.max(0, APPEALS_PER_WEEK - appealsSpent(claims, who));
}

// Michael Oliver's little lines, for flavour while he "reviews". Warm, precise,
// prone to a tangent, quietly obsessive about getting it exactly right.
const MO_THINKING = [
  "Right. Give me a moment. I'm going to look at this properly.",
  "Okay. Drawing my little lines on the screen. I do love the little lines.",
  "Hold on. I need the whole picture before I say a word. That's only fair.",
  "Let me just... yes. Zooming in. Details matter. Details are everything, really.",
  "One second. I've paused it on exactly the right frame. It has to be the right frame.",
];
const MO_UPHOLD = [
  "No. That's a good claim. I've checked it three times and I'm satisfied. Play on.",
  "The evidence is clear and it's clean. Claim stands. And can I just say, tidy work.",
  "I see no offence here. None. The claim is good. I'm confident, and I'm rarely confident.",
];
const MO_OVERTURN = [
  "No. I'm sorry, but no. The evidence doesn't support it. Claim overturned.",
  "That doesn't show what it needs to show. I've looked closely. Overturned, I'm afraid.",
  "I can't allow this one. It's not there in the picture. It has to be in the picture. Overturned.",
];

// Build the prompt we'd send to the real backend judge on the live site.
function buildVarPrompt(task, claim, accuserNote) {
  return [
    "You are Michael Oliver, working the VAR booth for a playful two-person",
    "challenge game in Phuket. You are warm, fair, and wonderfully particular",
    "(hyper-focused, prone to a gentle tangent, you like details lined up just so).",
    "Judge ONLY whether the photo genuinely shows the task completed.",
    "",
    "TASK: " + task.title,
    "WHAT COUNTS: " + task.blurb,
    accuserNote ? ("THE APPEAL (opponent's doubt): " + accuserNote) : "",
    "",
    "Reply as JSON only: {\"verdict\":\"uphold\"|\"overturn\",\"line\":\"one warm, in-character sentence\"}.",
    "Uphold = the claim is good and stands. Overturn = the photo doesn't support it.",
    "Be fair and a little generous; only overturn if the photo clearly fails.",
  ].filter(Boolean).join("\n");
}


// ---------- the appeal flow: warn -> review -> verdict ----------
// Phases: "warn" (are you sure? it costs money and can backfire)
//         "review" (Michael Oliver is looking...)
//         "verdict" (upheld or overturned + consequences)
function VarSheet({ task, claim, me, onResolve, onClose }) {
  const [phase, setPhase] = useState("warn");
  const [moLine, setMoLine] = useState("");
  const [result, setResult] = useState(null); // 'upheld' | 'overturned'

  const accused = claim.by;                    // who made the claim
  const value = task.pts;

  // Run the review. On the live site this calls the backend judge; in preview
  // (no backend) it falls back to a graceful, slightly-generous demo verdict.
  function startReview() {
    setPhase("review");
    setMoLine(pick(MO_THINKING));

    const finish = (verdict, spokenLine) => {
      const upheld = verdict === "uphold";
      setResult(upheld ? "upheld" : "overturned");
      // Prefer Michael Oliver's own words from the backend; else a character line.
      setMoLine(spokenLine || pick(upheld ? MO_UPHOLD : MO_OVERTURN));
      setPhase("verdict");
    };

    // The real judge needs a public photo URL (uploaded on claim). If we have
    // one, ask Michael Oliver for real (live Vercel). Otherwise, and as a
    // fallback in preview, use the graceful demo verdict.
    let settled = false;
    const demoTimer = setTimeout(() => {
      if (settled) return;
      settled = true;
      const hasPhoto = !!(claim.photo || claim.photoUrl);
      // generous: uphold ~75% if there's a photo, ~35% if there isn't
      const upheld = Math.random() < (hasPhoto ? 0.75 : 0.35);
      finish(upheld ? "uphold" : "overturn", null);
    }, 2600);

    if (claim.photoUrl) {
      try {
        fetch("/api/oliver", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url: claim.photoUrl,
            taskTitle: task.title,
            taskBlurb: task.blurb || "",
            accuserNote: "",
          }),
        })
          .then((r) => r.ok ? r.json() : Promise.reject())
          .then((data) => {
            if (settled) return;
            settled = true;
            clearTimeout(demoTimer);
            const verdict = (data && data.verdict === "overturn") ? "overturn" : "uphold";
            const spokenLine = data && typeof data.line === "string" ? data.line : null;
            finish(verdict, spokenLine);
          })
          .catch(() => { /* demo timer handles it */ });
      } catch (e) { /* demo timer handles it */ }
    }
  }

  function applyVerdict() {
    // 'overturned' -> claim falls (points removed from accused).
    // 'upheld'     -> failed appeal: appealer loses task value, accused gains it.
    onResolve({ result: result === "upheld" ? "upheld" : "overturned", by: me });
  }

  const p = PLAYERS[me];
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 70, display: "flex", flexDirection: "column",
      justifyContent: "center", alignItems: "center", padding: 24,
      background: "rgba(30,22,18,.55)", backdropFilter: "blur(4px)", WebkitBackdropFilter: "blur(4px)",
    }}>
      <div style={{
        width: "100%", maxWidth: 340, background: T.card, borderRadius: 22,
        padding: "22px 20px 20px", animation: "tgPop .35s ease both",
        boxShadow: "0 18px 50px rgba(30,22,18,.4)",
      }}>
        {/* header */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
          <div style={{
            width: 34, height: 34, borderRadius: 10, background: "#1e2a38",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontFamily: FM, fontWeight: 700, fontSize: 13, color: "#fff",
          }}>VAR</div>
          <div>
            <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: T.ink, lineHeight: 1 }}>Michael Oliver</div>
            <div style={{ fontFamily: FM, fontSize: 9, color: T.inkSoft, letterSpacing: ".1em", marginTop: 3 }}>PITCHSIDE MONITOR</div>
          </div>
        </div>

        {phase === "warn" && (
          <div>
            <div style={{ marginTop: 14, fontFamily: FB, fontSize: 13.5, color: T.ink, lineHeight: 1.55 }}>
              You're challenging <b style={{ color: PLAYERS[accused].colour }}>{accused}</b>'s claim on
              <b> "{task.title}"</b>.
            </div>
            <div style={{
              marginTop: 12, background: "#fff3ee", border: "1px solid " + T.peach, borderRadius: 12,
              padding: "12px 14px", fontFamily: FB, fontSize: 12.5, color: T.coralDk, lineHeight: 1.55,
            }}>
              Waking the VAR booth costs real money. And it can backfire: if Michael Oliver
              rules the claim <b>good</b>, you lose <b>{value} points</b> and {accused} is handed them.
              Choose wisely, you only get {APPEALS_PER_WEEK} appeals a week.
            </div>
            <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
              <button onClick={onClose} style={{
                flex: 1, background: "transparent", border: "1px solid " + T.line, borderRadius: 14,
                padding: "11px 0", cursor: "pointer", fontFamily: FH, fontWeight: 700, fontSize: 14, color: T.inkSoft,
              }}>Let it go</button>
              <button onClick={startReview} style={{
                flex: 1, background: "#1e2a38", border: "none", borderRadius: 14,
                padding: "11px 0", cursor: "pointer", fontFamily: FH, fontWeight: 700, fontSize: 14, color: "#fff",
              }}>Send to VAR</button>
            </div>
          </div>
        )}

        {phase === "review" && (
          <div style={{ marginTop: 18, textAlign: "center", padding: "10px 0 6px" }}>
            <div style={{ fontFamily: FB, fontSize: 14, color: T.ink, lineHeight: 1.6, fontStyle: "italic" }}>
              {moLine}
            </div>
            <div style={{ marginTop: 16, fontFamily: FM, fontSize: 10, color: T.inkSoft, letterSpacing: ".14em" }}>
              REVIEWING…
            </div>
          </div>
        )}

        {phase === "verdict" && (
          <div style={{ marginTop: 16 }}>
            <div style={{
              textAlign: "center", fontFamily: FH, fontWeight: 700, fontSize: 20,
              color: result === "overturned" ? T.good : T.coralDk,
            }}>
              {result === "overturned" ? "OVERTURNED" : "CLAIM STANDS"}
            </div>
            <div style={{ marginTop: 10, fontFamily: FB, fontSize: 13.5, color: T.ink, lineHeight: 1.6, fontStyle: "italic", textAlign: "center" }}>
              "{moLine}"
            </div>
            <div style={{
              marginTop: 14, fontFamily: FB, fontSize: 12.5, lineHeight: 1.55, textAlign: "center",
              color: result === "overturned" ? T.good : T.coralDk,
            }}>
              {result === "overturned"
                ? accused + " loses the " + value + " points. Justice done."
                : "Failed appeal. You lose " + value + " points and " + accused + " is handed them. Ouch."}
            </div>
            <div style={{ marginTop: 16 }}>
              <Btn onClick={applyVerdict} style={{ width: "100%" }}>Accept the ruling</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// ============================================================
// THE WEEKLY BOARD — the heart of the game.
// 25 challenges dealt per week, shown in closed groups by pillar (tap to open).
// First to claim a task locks it: banks the points, captures photo + caption +
// optional taunt. Team-up tasks score for both. Mobile-first: closed lists,
// compact, emoji only for genuine wow.
//
// This phase builds the deal, the closed groups, and the claim-with-photo flow
// (with optional Bluesky share). VAR appeals, wildcard, daily-double, dares
// follow in their own phases.
// ============================================================

// ---------- per-week claim persistence (device-local) ----------
// Stored under a per-week key so each week keeps its own board of claims.
// Shape: { [taskId]: { by, at, photo, caption, taunt } }
function claimsKey(wk) { return "tg_claims_wk" + wk; }
function loadClaims(wk) {
  try { return JSON.parse(localStorage.getItem(claimsKey(wk)) || "{}"); }
  catch (e) { return {}; }
}
function saveClaims(wk, claims) {
  try { localStorage.setItem(claimsKey(wk), JSON.stringify(claims)); } catch (e) {}
}

// ---------- deal this week's board, grouped by TIER ----------
// The quick-win model: a pile of tiny near-home wins, a few sign-scramble races,
// and one big weekly centrepiece. Grouped by tier for the closed-list display.
const TIER_META = {
  quick: { label: "Quick wins", sub: "little local things, knock 'em off", accent: "#ff8a5c" },
  spot:  { label: "Sign scrambles", sub: "first to snap it wins", accent: "#5b9bd5" },
  big:   { label: "The big one", sub: "this week's centrepiece", accent: "#e0577a" },
};
const TIER_ORDER = ["quick", "spot", "big"];

// How many of each tier to deal per week.
const DEAL_COUNTS = { quick: 10, spot: 3, big: 1 };

// Deterministic weekly deal, drawn per-tier so the mix is always right.
// Seeded by week number, so both phones agree on the identical board.
function dealtBoard(wk) {
  const byTier = { quick: [], spot: [], big: [] };
  CHALLENGE_BANK.forEach((t) => { (byTier[t.tier] || byTier.quick).push(t); });

  const groups = { quick: [], spot: [], big: [] };
  TIER_ORDER.forEach((tier) => {
    const pool = seededShuffle(byTier[tier], "board-" + tier + "-wk" + wk);
    const want = DEAL_COUNTS[tier] || 0;
    groups[tier] = pool.slice(0, Math.min(want, pool.length));
  });
  const dealt = TIER_ORDER.reduce((acc, tier) => acc.concat(groups[tier]), []);
  return { dealt, groups };
}

// ---------- live score from claims: base points, team-ups, doubles, VAR ----------
function tallyScores(dealt, claims, wk) {
  const totals = { Hammy: 0, Naddy: 0 };
  dealt.forEach((t) => {
    const c = claims[t.id];
    if (!c || !c.by) return;

    const ap = c.appeal;
    // Overturned claim: it falls. Nobody banks the base points.
    if (ap && ap.result === "overturned") return;

    // Daily-double: if this claim landed on its secret double-day, points x2.
    let pts = t.pts;
    if (wk != null && isDoubleClaim(wk, dealt, t.id, c)) pts = pts * 2;

    // Award the points (team tasks score for both).
    if (t.team) { totals.Hammy += pts; totals.Naddy += pts; }
    else { totals[c.by] = (totals[c.by] || 0) + pts; }

    // Failed appeal (claim upheld): the appealer forfeits the task's value and
    // it's handed to the wrongly-accused claimant.
    if (ap && ap.result === "upheld" && ap.by) {
      totals[ap.by] = (totals[ap.by] || 0) - pts;
      totals[c.by] = (totals[c.by] || 0) + pts;
    }
  });
  return totals;
}


// ---------- auto caption + taunt banks (choose auto, or write your own) ----------
function autoCaption(task, who) {
  const opts = [
    `Just claimed "${task.title}" for the ${PLAYERS[who].club} cause. ${task.pts} points, thank you very much.`,
    `${task.title}: done. That's ${task.pts} on the board for ${who}.`,
    `Touched some grass. "${task.title}" is mine. ${PLAYERS[who].chant}.`,
    `Banked "${task.title}" (+${task.pts}). Phuket is our playground now.`,
  ];
  return pick(opts);
}
function autoTaunt(task, who) {
  const other = who === "Hammy" ? "Naddy" : "Hammy";
  const opts = [
    `Better luck next time, ${other}.`,
    `That one's off the board, ${other}. Slow hands.`,
    `${other} was still deciding. I decided.`,
    `Imagine not claiming this one, ${other}.`,
    `One for me, none for you, ${other}.`,
  ];
  return pick(opts);
}

// ---------- the claim sheet: photo + caption + optional taunt + share ----------
function ClaimSheet({ task, who, onDone, onClose }) {

  const [capMode, setCapMode] = useState("auto"); // 'auto' | 'own'

    const r = new FileReader();

    r.readAsDataURL(f);

    onDone({
      photo: photo || null,
      caption: caption || auto,

        {/* photo proof */}

// ---------- THE BOARD SCREEN ----------
function Board({ now, who, claims, setClaims, wildcard, wk: wkProp, onShare }) {
  const wk = wkProp != null ? wkProp : weekNumber(now);
  const { groups, dealt } = dealtBoard(wk);
  const [openTier, setOpenTier] = useState("quick"); // quick open by default; it's the everyday one
  const [claiming, setClaiming] = useState(null);     // task being claimed
  const [appealing, setAppealing] = useState(null);   // task being appealed
  const [doubleHit, setDoubleHit] = useState(null);   // {title, pts} when a double lands
  const [detailTask, setDetailTask] = useState(null); // claimed task whose detail is open

  const myAppealsLeft = appealsLeft(claims, who);

  // the pool the daily-double checks against (board + live wildcard)
  const doublePool = wildcard ? dealt.concat([wildcard]) : dealt;

  // Upload a claim's photo to a public URL (for VAR + Bluesky). Data-URL only
  // lives on the phone; the backend needs a fetchable URL. Fires in the
  // background so the claim registers instantly; the URL fills in when ready.
  // On the live site this hits /api/tg-photo; in preview it simply no-ops.
  function uploadPhotoInBackground(taskId, dataUrl) {
    if (!dataUrl || dataUrl.indexOf("data:") !== 0) return;
    try {
      const comma = dataUrl.indexOf(",");
      const meta = dataUrl.slice(5, comma);         // e.g. image/jpeg;base64
      const b64 = dataUrl.slice(comma + 1);
      const ext = meta.indexOf("png") >= 0 ? "png" : meta.indexOf("webp") >= 0 ? "webp" : "jpg";
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      fetch("/api/tg-photo?ext=" + ext, {
        method: "POST",
        headers: { "Content-Type": "application/octet-stream" },
        body: bytes,
      })
        .then((r) => r.ok ? r.json() : Promise.reject())
        .then((data) => {
          if (!data || !data.url) return;
          // stamp the public URL onto the stored claim
          setClaims(wk, (prev) => {
            const cur = prev && prev[taskId];
            if (!cur) return prev;
            return { ...prev, [taskId]: { ...cur, photoUrl: data.url } };
          });
        })
        .catch(() => { /* preview / offline: fine, VAR falls back to demo */ });
    } catch (e) { /* preview or unsupported: no-op */ }
  }

  function doClaim(task, detail) {
    const claim = {
      by: who, at: Date.now(),
      photo: detail.photo, caption: detail.caption, taunt: detail.taunt,
      shared: detail.share || false,
    };
    const next = { ...claims, [task.id]: claim };
    setClaims(wk, next);
    setClaiming(null);
    // upload the proof photo in the background (for VAR eyes + Bluesky embed)
    uploadPhotoInBackground(task.id, detail.photo);
    // Daily-double reveal: if this claim landed on its secret double-day, cheer.
    if (isDoubleClaim(wk, doublePool, task.id, claim)) {
      setDoubleHit({ title: task.title, pts: task.pts });
    }
    // Bluesky posting fires on the live site via the backend; in preview it's a
    // no-op. We record the intent (shared:true) either way.
  }

  function resolveAppeal(task, verdict) {
    const existing = claims[task.id];
    if (!existing) { setAppealing(null); return; }
    const next = { ...claims, [task.id]: {
      ...existing,
      appeal: { by: verdict.by, result: verdict.result, judged: Date.now() },
    } };
    setClaims(wk, next);
    setAppealing(null);
  }

  return (
    <div>
      {/* the live wildcard, when it's out (Thursday on): a big highlighted card */}
      {wildcard ? (
        <div style={{ marginBottom: 14 }}>
          <div style={{
            background: "linear-gradient(135deg,#ffd9c2,#ffc24d)",
            border: "1px solid " + T.sun, borderRadius: 16, padding: "14px 16px",
          }}>
            <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".14em", color: T.coralDk }}>
              MIDWEEK WILDCARD · +{wildcard.pts}
            </div>
            <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 17, color: T.ink, marginTop: 5, lineHeight: 1.25 }}>
              {wildcard.title.replace(/^WILDCARD:\s*/, "")}
            </div>
            <div style={{ fontFamily: FB, fontSize: 12, color: T.ink, opacity: .85, lineHeight: 1.5, marginTop: 4 }}>
              {wildcard.blurb}
            </div>
            {claims[wildcard.id] && claims[wildcard.id].by ? (
              <div onClick={() => setDetailTask(wildcard)} style={{ marginTop: 9, cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                {claims[wildcard.id].photo ? (
                  <div style={{ width: 34, height: 34, borderRadius: 8, overflow: "hidden", border: "1px solid rgba(255,255,255,.5)" }}>
                    <img src={claims[wildcard.id].photo} alt="proof" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                  </div>
                ) : null}
                <span style={{ fontFamily: FB, fontSize: 12, fontWeight: 700, color: PLAYERS[claims[wildcard.id].by].colour }}>
                  {claims[wildcard.id].by} grabbed the wildcard · details ›
                </span>
              </div>
            ) : (
              <button onClick={() => setClaiming(wildcard)} style={{
                marginTop: 10, cursor: "pointer", background: T.coralDk, border: "none",
                borderRadius: 11, padding: "9px 18px", fontFamily: FH, fontWeight: 700, fontSize: 13, color: "#fff",
              }}>Grab it ›</button>
            )}
          </div>
        </div>
      ) : null}

      {TIER_ORDER.map((tier) => (
        <div key={tier} style={{ marginBottom: 12 }}>
          <TierGroup
            tier={tier}
            tasks={groups[tier]}
            claims={claims}
            open={openTier === tier}
            onToggle={() => setOpenTier(openTier === tier ? null : tier)}
            onClaim={(t) => setClaiming(t)}
            me={who}
            onAppeal={(t) => setAppealing(t)}
            canAppeal={myAppealsLeft > 0}
            onOpenDetail={(t) => setDetailTask(t)}
          />
        </div>
      ))}

      {claiming && (
        <ClaimSheet
          task={claiming}
          who={who}
          onClose={() => setClaiming(null)}
          onDone={(detail) => doClaim(claiming, detail)}
        />
      )}

      {detailTask && claims[detailTask.id] && (
        <ClaimDetail
          task={detailTask}
          claim={claims[detailTask.id]}
          onClose={() => setDetailTask(null)}
          onShare={(t, c) => { if (onShare) onShare(t, c); }}
        />
      )}

      {appealing && claims[appealing.id] && (
        <VarSheet
          task={appealing}
          claim={claims[appealing.id]}
          me={who}
          onClose={() => setAppealing(null)}
          onResolve={(verdict) => resolveAppeal(appealing, verdict)}
        />
      )}

      {doubleHit && (
        <div onClick={() => setDoubleHit(null)} style={{
          position: "fixed", inset: 0, zIndex: 80, display: "flex", alignItems: "center", justifyContent: "center",
          padding: 28, background: "rgba(30,22,18,.5)", backdropFilter: "blur(4px)", WebkitBackdropFilter: "blur(4px)",
        }}>
          <div style={{
            background: T.card, borderRadius: 22, padding: "26px 24px", textAlign: "center",
            maxWidth: 320, animation: "tgPop .4s ease both", boxShadow: "0 18px 50px rgba(30,22,18,.4)",
          }}>
            <div style={{ fontFamily: FM, fontSize: 11, letterSpacing: ".18em", color: T.coral }}>DAILY DOUBLE</div>
            <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 26, color: T.ink, marginTop: 8 }}>x2 points!</div>
            <div style={{ fontFamily: FB, fontSize: 13.5, color: T.inkSoft, lineHeight: 1.55, marginTop: 8 }}>
              "{doubleHit.title}" was today's secret double. {doubleHit.pts} becomes {doubleHit.pts * 2}. Lucky you.
            </div>
            <div style={{ marginTop: 18 }}>
              <Btn onClick={() => setDoubleHit(null)} style={{ width: "100%" }}>Get in</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Format the time left in the current week (to Sunday midnight Phuket).
function weekEndsIn(now) {
  const s = startOfWeek(now);
  const end = new Date(s); end.setDate(end.getDate() + 7);
  const ms = end.getTime() - new Date(now).getTime();
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d >= 1) return d + (d === 1 ? " day" : " days") + " left";
  if (h >= 1) return h + (h === 1 ? " hour" : " hours") + " left";
  const m = Math.floor((ms % 3600000) / 60000);
  return m + " min left";
}

function Game({ now, who, isFull, onSwitch }) {
  const [view, setView] = useState("hub");
  const wk = weekNumber(now);
  const [claims, setClaimsState] = useState(() => loadClaims(wk));
  const [dares, setDaresState] = useState(() => loadDares(wk));

  // persist claims whenever they change (device-local).
  // Accepts either a plain object or an updater function (prev => next), so
  // background updates (like a photo URL landing later) compose safely.
  function setClaims(weekNo, next) {
    setClaimsState((prev) => {
      const resolved = typeof next === "function" ? next(prev) : next;
      saveClaims(weekNo, resolved);
      return resolved;
    });
  }
  function setDares(next) {
    saveDares(wk, next);
    setDaresState(next);
  }

  // The week's dealt board, plus the wildcard once it's live (Thursday on).
  const { dealt } = dealtBoard(wk);
  const wild = wildcardForWeek(wk);
  const fullDealt = wild && wildcardLive(now) ? dealt.concat([wild]) : dealt;

  // live scores: tasks (with doubles + VAR) plus the dare economy
  const taskScores = tallyScores(fullDealt, claims, wk);
  const dareScores = tallyDares(dares);
  const scores = {
    Hammy: taskScores.Hammy + dareScores.Hammy,
    Naddy: taskScores.Naddy + dareScores.Naddy,
  };

  // "you" on this device: the picked side, or Hammy when he's testing pre-launch
  const me = who || "Hammy";

  // Dev-only: wipe this week's claims AND dares so everything goes back to zero.
  // Behind isFull (Hammy testing), so Naddy never sees it. A belt-and-braces tidy
  // for pre-launch testing; the fresh Monday start is already guaranteed by the
  // per-week storage keys regardless.
  function resetThisWeek() {
    saveClaims(wk, {});
    setClaimsState({});
    saveDares(wk, []);
    setDaresState([]);
    setView("hub");
  }

  // Share a claim to Bluesky. On the live site this posts via /api/bluesky using
  // the player's saved handle + app password (set up in settings) and the claim's
  // public photo URL. In preview there's no backend, so it just acknowledges.
  function shareToBluesky(task, claim) {
    if (!claim) return;
    const text = (claim.caption || ("Touched some grass: " + task.title)).slice(0, 280);
    try {
      fetch("/api/bluesky", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ who: me, text: text, imageUrl: claim.photoUrl || "" }),
      })
        .then((r) => r.ok ? r.json() : Promise.reject())
        .then(() => {
          // mark it shared on the stored claim
          setClaims(wk, (prev) => {
            const cur = prev && prev[task.id];
            if (!cur) return prev;
            return { ...prev, [task.id]: { ...cur, shared: true } };
          });
          if (typeof window !== "undefined" && window.alert) window.alert("Shared to Bluesky.");
        })
        .catch(() => {
          if (typeof window !== "undefined" && window.alert) {
            window.alert("Sharing works on the live site once your Bluesky login is set up. (No backend in preview.)");
          }
        });
    } catch (e) { /* preview: no-op */ }
  }

  if (view === "hub") {
    return <Hub now={now} scores={scores} onGo={setView} onSwitch={onSwitch}
      isFull={isFull} onResetWeek={resetThisWeek} wk={wk} />;
  }
  if (view === "board") {
    return <Screen title={"Week " + wk + " board"} onBack={() => setView("hub")}>
      <Board now={now} who={me} claims={claims} setClaims={setClaims}
        wildcard={wild && wildcardLive(now) ? wild : null} wk={wk}
        onShare={shareToBluesky} />
    </Screen>;
  }
  if (view === "dares") {
    return <Screen title="Throw-down dares" onBack={() => setView("hub")}>
      <DaresScreen me={me} dares={dares} setDares={setDares} />
    </Screen>;
  }
  if (view === "school") {
    return <Screen title="Coach Saliba's Thai school" onBack={() => setView("hub")}>
      <ComingNext line="A new useful Thai word each day. Hear it, say it back, keep the daily streak alive. A certain Arsenal centre-half is your coach." />
    </Screen>;
  }
  return <Screen title="The scrapbook" onBack={() => setView("hub")}>
    <ComingNext line="Your week gathered up: best photos, best captions, the taunts that landed, and who led on what. Revealed in full when the week closes." />
  </Screen>;
}

// LAUNCH — the game goes live Monday 6 Jul 2026, 00:00 Phuket time.
// Before then, everyone lands on the teaser. Hammy's password is the skeleton
// key that jumps straight past it for testing.
// ============================================================
const LAUNCH = new Date("2026-07-06T00:00:00+07:00");
function msUntilLaunch(now) { return LAUNCH.getTime() - new Date(now).getTime(); }
function launched(now) { return msUntilLaunch(now) <= 0; }

// ---------- passwords (polite lock, not Fort Knox) ----------
// "hammy"    -> full access (test everything, even pre-launch)
// "bablydoo" -> teaser access (Naddy: curiosity preserved until Monday)
function checkPassword(raw) {
  const p = String(raw || "").trim().toLowerCase();
  if (p === "hammy") return "full";
  if (p === "bablydoo") return "teaser";
  return null;
}

// A soft rounded button that presses in slightly. Reused everywhere.
function Btn({ onClick, children, style, kind }) {
  const [down, setDown] = useState(false);
  const base = {
    fontFamily: FH, fontWeight: 700, fontSize: 15, border: "none",
    borderRadius: 16, padding: "13px 20px", cursor: "pointer",
    transition: "transform .08s ease, filter .15s ease",
    transform: down ? "scale(.96)" : "scale(1)",
    background: kind === "ghost" ? "transparent" : T.coral,
    color: kind === "ghost" ? T.inkSoft : "#fff",
    boxShadow: kind === "ghost" ? "none" : "0 6px 18px rgba(240,106,60,.32)",
  };
  return (
    <button onClick={onClick}
      onPointerDown={() => setDown(true)}
      onPointerUp={() => setDown(false)}
      onPointerLeave={() => setDown(false)}
      style={{ ...base, ...style }}>
      {children}
    </button>
  );
}

// The little sun/leaf wordmark lockup, used on gate + teaser.

// ============================================================
// THE PASSWORD GATE — mysterious & minimal. Just the wordmark and a prompt.
// ============================================================
function Gate({ onPass }) {
  const [val, setVal] = useState("");
  const [msg, setMsg] = useState("");
  const [shake, setShake] = useState(false);
  const [wrongIdx, setWrongIdx] = useState(0);

  function submit() {
    const level = checkPassword(val);
    if (level) {
      saveGate(level);
      onPass(level);
      return;
    }
    // wrong: cheeky message + a little shake, cycle through the bank
    setMsg(WRONG_WORDS[wrongIdx % WRONG_WORDS.length]);
    setWrongIdx(wrongIdx + 1);
    setShake(true);
    setVal("");
    setTimeout(() => setShake(false), 500);
  }

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", padding: "0 28px",
      background: "linear-gradient(165deg, #fff6ee 0%, #ffe9db 55%, #ffdcc8 100%)",
    }}>
      <BackLink />
      <div style={{ animation: "tgFadeUp .7s ease both", transform: shake ? undefined : "none" }}>
        <div style={{ animation: shake ? "tgShake .5s" : "none" }}>
          <Wordmark size={1} />
        </div>
      </div>

      <div style={{
        marginTop: 40, width: "100%", maxWidth: 320,
        animation: "tgFadeUp .7s ease .15s both",
      }}>
        <div style={{
          fontFamily: FM, fontSize: 10.5, letterSpacing: ".16em",
          textTransform: "uppercase", color: T.inkSoft, textAlign: "center",
          marginBottom: 14,
        }}>
          Say the secret word
        </div>
        <input
          value={val}
          onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
          placeholder="……………"
          autoCapitalize="none" autoCorrect="off" spellCheck="false"
          style={{
            width: "100%", textAlign: "center", fontFamily: FB, fontWeight: 700,
            fontSize: 18, color: T.ink, background: T.card,
            border: "2px solid " + T.peach, borderRadius: 16,
            padding: "14px 16px", outline: "none", letterSpacing: ".05em",
          }}
        />
        <div style={{ marginTop: 14, display: "flex", justifyContent: "center" }}>
          <Btn onClick={submit} style={{ minWidth: 150 }}>Enter</Btn>
        </div>

        {msg && (
          <div style={{
            marginTop: 18, fontFamily: FB, fontSize: 13.5, fontStyle: "italic",
            color: T.coralDk, textAlign: "center", lineHeight: 1.5,
            animation: "tgFadeUp .4s ease both",
          }}>
            {msg}
          </div>
        )}
      </div>

      <div style={{
        position: "fixed", bottom: 22, fontFamily: FM, fontSize: 9,
        letterSpacing: ".14em", color: "#d8b8a4", textTransform: "uppercase",
      }}>
        hammyLabs · HKT
      </div>
    </div>
  );
}

function pad2(n) { return String(n).padStart(2, "0"); }

function Teaser({ now, isFull, onReset, onEnterGame }) {
  const [tick, setTick] = useState(0);
  const [hintIdx, setHintIdx] = useState(0);
  const [taps, setTaps] = useState(0);

  // live countdown, re-render every second
  useEffect(() => {
    const t = setInterval(() => setTick((x) => x + 1), 1000);
    return () => clearInterval(t);
  }, []);
  // rotate the hints every 3.2s
  useEffect(() => {
    const t = setInterval(() => setHintIdx((i) => (i + 1) % TEASE_HINTS.length), 3200);
    return () => clearInterval(t);
  }, []);

  const ms = Math.max(0, msUntilLaunch(Date.now()));

//     - Hammy's key -> may test the game
//   ON/AFTER Monday: password retires. Open door.
//     - first open on a phone -> "pick your side" (with jersey confirm)
//     - thereafter -> straight into the game, side remembered
//     - can switch side anytime
// ============================================================
function App() {
  const [gate, setGate] = useState(loadGate());     // null | 'teaser' | 'full'
  const [who, setWho] = useState(loadWho());        // null | 'Hammy' | 'Naddy'
  const [previewGame, setPreviewGame] = useState(false); // Hammy testing pre-launch
  const now = Date.now();
  const isLaunched = launched(now);

  // ---------- POST-LAUNCH: open door, identity not password ----------
  if (isLaunched) {
    if (!who) return <PickSide onPick={setWho} />;
    return <Game now={now} who={who} isFull={true} onSwitch={() => { setWho(null); }} />;
  }

  // ---------- PRE-LAUNCH: password guards the reveal ----------
  if (!gate) return <Gate onPass={setGate} />;
  const isFull = gate === "full";

  function relock() { clearGate(); setGate(null); setPreviewGame(false); }

  // Hammy (full) can flip into the game to test it before Monday.
  if (isFull && previewGame) {
    return <Game now={now} who="Hammy" isFull={true} onSwitch={relock} />;
  }

  // Otherwise show the teaser. Hammy gets a dev button to enter the game.
  return (
    <Teaser
      now={now}
      isFull={isFull}
      onReset={relock}
      onEnterGame={isFull ? () => setPreviewGame(true) : null}
    />
  );
}
// (the boot loader below appends the ReactDOM mount for <App />)

  loadScript(REACT, function () {

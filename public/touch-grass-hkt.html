<html lang="en">

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #fff6ee; }
  #root { min-height: 100vh; }
  body { font-family: 'Nunito', system-ui, sans-serif; color: #4a3b33; }
  /* Belt-and-braces: a long unbroken string (a pasted URL, a Bluesky handle, a
     mashed word) can never push a container past the screen edge and force an
     ugly horizontal scroll. Protects every text container, present and future. */
  div, span, p, a, li, td, textarea, input { overflow-wrap: break-word; word-break: break-word; }
  .loading { color:#ff8a5c; font-family:'Quicksand',sans-serif; font-weight:700; text-align:center;
    padding-top:44vh; font-size:15px; letter-spacing:.24em; text-transform:uppercase; }
  .errbox { color:#c0492b; font-family:'Space Mono',monospace; font-size:12px; white-space:pre-wrap;
    padding:20px; line-height:1.55; }
  @keyframes tgFadeUp { from { opacity:0; transform:translateY(10px);} to {opacity:1; transform:none;} }
  @keyframes tgPop { 0%{transform:scale(.6);opacity:0;} 60%{transform:scale(1.08);} 100%{transform:scale(1);opacity:1;} }
  @keyframes tgFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
  @keyframes tgShake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-7px);} 40%{transform:translateX(7px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }
  @keyframes tgPipFill { 0%{transform:scale(0);opacity:0;} 55%{transform:scale(1.25);} 100%{transform:scale(1);opacity:1;} }
  @keyframes tgGlow { 0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0);} 50%{box-shadow:0 0 22px 3px rgba(255,214,102,.55);} }
  @keyframes tgCrownGlow { 0%,100%{filter:drop-shadow(0 0 6px rgba(255,196,61,.4));} 50%{filter:drop-shadow(0 0 20px rgba(255,196,61,.85));} }
  ::selection { background: #ffd9c2; }
</style>

<body>
<div id="root"><div class="loading">Touching grass…</div></div>

<script id="appsrc" type="text/plain">

// ============================================================
// TOUCH GRASS HKT — a weekly head-to-head scavenger duel for two.
// Hammy (Spurs) vs Naddy (Arsenal), living in Ko Kaeo, Phuket.
// Get off the sofa, do real island things, snap proof, bank points,
// win the week. Rainy-season friendly: indoor-first challenges.
//
// Core loop: 25 shared tasks per week. First to claim a task locks it
// and banks the points. Photo proof + Michael Oliver VAR appeals.
// Midweek wildcard, daily double, throw-down dares. Scrapbook at week end.
//
// Scaffold pattern matches the established hammyLabs single-file React apps:
// type="text/plain" source block, triple-CDN waterfall, in-browser Babel.
// ============================================================

// ---------- tiny helpers ----------
const uid = () => Math.random().toString(36).slice(2, 9);
const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));

// ---------- error boundary: never blank-screen silently again ----------
// If any component throws during render, React unmounts the whole tree and you
// get a blank page with no clue why. This catches such an error and shows it on
// screen instead, so a fault is diagnosable at a glance rather than invisible.
class Boundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err: err }; }
  componentDidCatch(err, info) { try { console.error("Touch Grass caught:", err, info); } catch (e) {} }
  render() {
    if (this.state.err) {
      const msg = (this.state.err && (this.state.err.stack || this.state.err.message)) || String(this.state.err);
      return React.createElement("div", {
        style: {
          padding: "24px 20px", fontFamily: "monospace", fontSize: 12.5, lineHeight: 1.6,
          color: "#7a1f1f", background: "#fdeaea", minHeight: "100vh", whiteSpace: "pre-wrap",
        },
      }, "Touch Grass hit a snag while rendering:\n\n" + msg);
    }
    return this.props.children;
  }
}

function pick(arr, seed) {
  // deterministic pick when seed given, else random
  if (seed == null) return arr[Math.floor(Math.random() * arr.length)];
  let h = 0; const s = String(seed);
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return arr[h % arr.length];
}

// ---------- the two players ----------
// Hammy is Spurs (a soft sky blue), Naddy is Arsenal (a warm red). Their club
// allegiance drives their theme colour everywhere they appear.
const PLAYERS = {
  Hammy: { name: "Hammy", club: "Spurs",   colour: "#5b9bd5", chant: "COYS" },
  Naddy: { name: "Naddy", club: "Arsenal", colour: "#e0577a", chant: "COYG" },
};
const PLAYER_IDS = ["Hammy", "Naddy"];
// A spectator is a visiting guest who watches the two-of-you contest without
// competing. Kept deliberately OUTSIDE PLAYER_IDS so no scoring, season, streak
// or duel logic ever mistakes them for a player. They're a viewing lens, nothing
// more, which is exactly why this stays such a light touch.
const SPECTATOR_ID = "Spectator";
function isSpectator(who) { return who === SPECTATOR_ID; }

// ---------- week maths ----------
// The competition runs in Monday-to-Sunday weeks, seeded off the real date so
// both phones see the identical week number and the identical dealt board.
// Week 1 is anchored to the first Monday on/after the move-in (6 Jul 2026).
const SEASON_ANCHOR = new Date("2026-07-06T00:00:00+07:00"); // a Monday
function startOfWeek(d) {
  const x = new Date(d);
  const day = (x.getDay() + 6) % 7; // Mon=0 ... Sun=6
  x.setHours(0, 0, 0, 0);
  x.setDate(x.getDate() - day);
  return x;
}
function weekNumber(now) {
  const s = startOfWeek(now);
  const diff = Math.floor((s - startOfWeek(SEASON_ANCHOR)) / (7 * 24 * 3600 * 1000));
  return diff + 1; // 1-indexed
}
function dayOfWeek(now) { return (new Date(now).getDay() + 6) % 7; } // Mon=0


// ============================================================
// THE VICTORY CONDITION — first to THREE weekly wins on the bounce.
// ============================================================
// We landed on three rather than five after honest reflection. Three is still a
// proper mountain (you must win, and win, and win AGAIN while the other fights
// tooth and nail to snap the run), but it's a summit you can see from base camp,
// which keeps the whole thing taut and thrilling rather than a slog. It also
// suits a certain Gooner's ADHD, who would sooner reorganise the spice rack than
// hold focus for five straight weeks. And happily, a shorter finish line means
// our deepened challenge library stretches even further across a typical season.
const WINS_TO_TAKE_THE_CROWN = 3;

// ---------- the results ledger: who won a given completed week ----------
// A streak is built entirely from the MEMORY of past results, so the true
// foundation of the whole endgame is humble bookkeeping: for any finished week,
// look at the final tallied scores and record who triumphed. We derive this
// deterministically from the shared claims so both phones always agree, with no
// manual "settle the week" button needed. Returns "Hammy", "Naddy", or "draw"
// (a dead heat banks nobody a win, and a drawn week BREAKS a running streak,
// exactly as losing one would — you have to actually WIN, not merely not-lose).
function weekWinner(wk) {
  const { dealt } = dealtBoard(wk);
  const claims = loadClaims(wk);
  const totals = tallyScores(dealt, claims, wk);
  const dares = loadDares(wk);
  const dareBonus = tallyDares(dares);
  let h = (totals.Hammy || 0) + (dareBonus.Hammy || 0);
  let n = (totals.Naddy || 0) + (dareBonus.Naddy || 0);
  // The big-one duel: once Michael Oliver has ruled, the winner banks the marquee
  // the marquee points. This gives the centrepiece real weight, but tuned (35,
  // not 60) so a strong all-round week can still beat a single duel win.
  const duel = loadDuel(wk);
  if (duel && duel.verdict && duel.verdict.winner) {
    if (duel.verdict.winner === "Hammy") h += DUEL_WIN_PTS;
    else if (duel.verdict.winner === "Naddy") n += DUEL_WIN_PTS;
  }
  // The photo-theme duel: its own separate contest, its winner banks its prize.
  const themeDuel = loadThemeDuel(wk);
  if (themeDuel && themeDuel.verdict && themeDuel.verdict.winner) {
    if (themeDuel.verdict.winner === "Hammy") h += THEME_DUEL_PTS;
    else if (themeDuel.verdict.winner === "Naddy") n += THEME_DUEL_PTS;
  }
  // Coach Saliba's quiz duel: winner (by score, ties broken on time) banks it.
  const quizW = quizWinner(wk);
  if (quizW === "Hammy") h += QUIZ_DUEL_PTS;
  else if (quizW === "Naddy") n += QUIZ_DUEL_PTS;
  if (h === n) return "draw";        // a dead heat: nobody banks the week
  return h > n ? "Hammy" : "Naddy";
}

// ---------- the streak calculator: consecutive wins, up to a given week ----------
// Walk the COMPLETED weeks in order (week 1 up to, but not including, the current
// live week, since a week in progress isn't settled yet). Each player's streak
// ticks up on a win and snaps clean back to zero the instant they fail to win a
// week — a loss OR a draw resets it. We return the current live streak for each,
// plus the record of every settled week for the time capsule to leaf through.
function seasonHistory(now) {
  const thisWk = weekNumber(now);
  const settled = [];               // { wk, winner } for each completed week
  const streak = { Hammy: 0, Naddy: 0 };
  let champion = null;              // set the moment someone reaches the crown
  let championWeek = null;
  // Guard the clock: if the device date is odd (misset clock, pre-season, a
  // timezone quirk) thisWk could be <= 1, meaning no settled weeks. The loop
  // below then simply doesn't run, which is correct and safe. We cap the start
  // at 1 explicitly so a negative week can never spin the loop the wrong way.
  const firstWk = 1;
  for (let wk = firstWk; wk < thisWk; wk++) {
    const winner = weekWinner(wk);
    settled.push({ wk: wk, winner: winner });
    if (winner === "draw") {
      streak.Hammy = 0; streak.Naddy = 0;
    } else {
      const loser = winner === "Hammy" ? "Naddy" : "Hammy";
      streak[winner] += 1;
      streak[loser] = 0;
      // The first player to reach the target locks the crown, at that moment.
      if (!champion && streak[winner] >= WINS_TO_TAKE_THE_CROWN) {
        champion = winner;
        championWeek = wk;
      }
    }
  }
  return { settled, streak, champion, championWeek, currentWeek: thisWk };
}

// ============================================================
// SEEDED SHUFFLE — the shared deal primitive.
// The board's dealer (dealtBoard) and the victor-swings (wildcard, daily-double)
// all lean on this deterministic shuffle so both phones see the identical board
// for a given week. Kept here as the single source of truth for the primitive.
// ============================================================

// A tiny seeded shuffle (Fisher-Yates driven by a seeded PRNG) so the deal is
// deterministic for a given week but still feels well mixed.
function seededRng(seed) {
  let h = 2166136261 >>> 0;
  const s = String(seed);
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
  return function () {
    h += 0x6D2B79F5; let t = h;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, seed) {
  const a = arr.slice();
  const rng = seededRng(seed);
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}


// ============================================================
// SHARED STATE PLUMBING — the client side of the shared book.
// Fetches the cross-phone state (memory wall, season score, archived scrapbooks,
// the leader's spoils) from /api/tg-state, and posts changes back. Both phones
// read and write the same blob; last write wins; frequent polling converges them.
//
// Graceful everywhere: in the Claude preview (no backend) it simply falls back
// to a local mirror so nothing breaks and you can still see the shape of things.
// The genuine cross-phone syncing comes alive only on the live Vercel site.
// ============================================================

// the shape we expect back, matching api/tg-state.js emptyState()
function emptySharedState() {
  return { memories: [], season: { Hammy: 0, Naddy: 0 }, scrapbooks: [], varNotices: [], spoils: null, seasonsArchive: [], updatedAt: 0 };
}

// a local mirror so preview (and offline moments) still show something sensible
const SHARED_MIRROR_KEY = "tg_shared_mirror";
function loadMirror() {
  try {
    const raw = localStorage.getItem(SHARED_MIRROR_KEY);
    return raw ? JSON.parse(raw) : emptySharedState();
  } catch (e) { return emptySharedState(); }
}
function saveMirror(state) {
  try { localStorage.setItem(SHARED_MIRROR_KEY, JSON.stringify(state)); } catch (e) {}
}

// Fetch the shared state from the backend. Resolves to the state, or the local
// mirror if the backend isn't reachable (preview / offline). Never throws.
function fetchSharedState() {
  return fetch("/api/tg-state", { cache: "no-store" })
    .then((r) => r.ok ? r.json() : Promise.reject())
    .then((data) => {
      const state = (data && data.state) ? data.state : emptySharedState();
      saveMirror(state); // keep the mirror fresh for offline moments
      return state;
    })
    .catch(() => loadMirror());
}

// Merge two shared-state copies so simultaneous edits from both phones don't
// clobber each other. Append-only lists (memories, scrapbooks, varNotices) are
// UNIONED by their unique id, keeping every distinct entry from both sides, with
// the local copy's version of any shared entry winning (so your own edit — a
// star, a photo url landing — isn't undone). Simple scalar fields (season,
// spoils) follow last-write-wins, taking the copy stamped more recently. This is
// the durability guard: even a truly simultaneous double-add loses nothing.
function mergeById(localList, remoteList) {
  const local = Array.isArray(localList) ? localList : [];
  const remote = Array.isArray(remoteList) ? remoteList : [];
  const byId = {};
  const order = [];
  // remote first, so local versions overwrite shared entries while keeping order
  remote.forEach((e) => { if (e && e.id != null) { if (!(e.id in byId)) order.push(e.id); byId[e.id] = e; } });
  local.forEach((e) => { if (e && e.id != null) { if (!(e.id in byId)) order.push(e.id); byId[e.id] = e; } });
  return order.map((id) => byId[id]);
}
function mergeSharedStates(local, remote) {
  if (!remote) return local;
  if (!local) return remote;
  const localNewer = (local.updatedAt || 0) >= (remote.updatedAt || 0);
  const recent = localNewer ? local : remote;   // for scalar last-write-wins
  return {
    // union the append-only lists so nothing is lost to a simultaneous add
    memories: mergeById(local.memories, remote.memories),
    scrapbooks: mergeById(local.scrapbooks, remote.scrapbooks),
    varNotices: mergeById(local.varNotices, remote.varNotices),
    seasonsArchive: mergeById(local.seasonsArchive, remote.seasonsArchive),
    // scalars: take whichever copy was stamped more recently
    season: recent.season || { Hammy: 0, Naddy: 0 },
    spoils: recent.spoils != null ? recent.spoils : (local.spoils != null ? local.spoils : remote.spoils),
    updatedAt: Math.max(local.updatedAt || 0, remote.updatedAt || 0),
  };
}

// Post the full state back to the backend. To protect against a simultaneous
// edit from the other phone, we fetch the current backend copy first and MERGE
// our change into it (unioning the append-only lists) rather than blindly
// overwriting. If the fetch fails (preview / offline), we just write our own
// copy, which is the best we can do and still correct for a single device.
function saveSharedState(state) {
  saveMirror(state); // optimistic local mirror first, so the UI feels instant
  function writeBack(finalState) {
    return fetch("/api/tg-state", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ state: finalState }),
    })
      .then((r) => r.ok ? r.json() : Promise.reject())
      .then((data) => {
        const saved = (data && data.state) ? data.state : finalState;
        saveMirror(saved);
        return saved;
      })
      .catch(() => finalState); // preview / offline: the local mirror stands in
  }
  // Fetch-merge-write: fold our change into the freshest backend copy so a
  // concurrent add from the other phone is preserved rather than trampled.
  return fetch("/api/tg-state", { cache: "no-store" })
    .then((r) => r.ok ? r.json() : Promise.reject())
    .then((data) => {
      const backend = (data && data.state) ? data.state : null;
      const merged = backend ? mergeSharedStates(state, backend) : state;
      return writeBack(merged);
    })
    .catch(() => writeBack(state)); // couldn't read backend: just write ours
}

// A tiny hook: hold the shared state, load it on mount, poll briskly, and expose
// a helper to mutate-and-save. Your own changes appear INSTANTLY (optimistic
// local update); the other phone's changes land within a few seconds via brisk
// polling. Upstash is built for exactly this rapid back-and-forth, so it stays
// snappy. For a two-person book the extra chatter is a trivial cost.
//
// IMPORTANT — why this guards against the "photo blinks then vanishes" bug:
// a naive poll can fetch the backend in the split second BEFORE your just-added
// memory has finished saving (photos are big and take a moment to upload), then
// overwrite your screen with the older backend copy, wiping your new entry. To
// prevent that, we (1) hold a ref to the freshest local state, (2) stamp a
// "quiet window" whenever you make a change and skip polls during it so an
// in-flight save can land, and (3) when a poll does return, ignore it if our
// local state is newer than what came back. Local changes are sacred; the poll
// may only bring in the OTHER person's work, never trample our own.
function useSharedState(readOnly) {
  const [shared, setShared] = useState(() => loadMirror());
  const latestRef = useRef(shared);        // always the freshest local state
  const quietUntilRef = useRef(0);          // skip polls until this timestamp
  const localStampRef = useRef(0);          // when we last made a local change

  function remember(state) { latestRef.current = state; }

  useEffect(() => {
    let alive = true;

    function pollOnce() {
      // Respect the quiet window: if we've just made a local change, let it
      // settle into the backend before we allow a fetch to replace anything.
      if (Date.now() < quietUntilRef.current) return;
      fetchSharedState().then((incoming) => {
        if (!alive || !incoming) return;
        const localTs = latestRef.current ? (latestRef.current.updatedAt || 0) : 0;
        const incomingTs = incoming.updatedAt || 0;
        const localChangedRecently = Date.now() - localStampRef.current < 8000;
        // Only accept the poll if it's genuinely newer AND we haven't just
        // changed things ourselves. Otherwise our local copy stands.
        if (incomingTs >= localTs && !localChangedRecently) {
          remember(incoming);
          setShared(incoming);
        }
      });
    }

    // first load: take whatever the backend has (nothing local to protect yet)
    fetchSharedState().then((s) => {
      if (!alive || !s) return;
      remember(s); setShared(s);
    });

    const t = setInterval(pollOnce, 3500);
    return () => { alive = false; clearInterval(t); };
  }, []);

  // apply a change: takes prev state, returns next; stamps it, saves it, and
  // protects it from being clobbered by an in-flight poll.
  function updateShared(mutator) {
    if (readOnly) return; // a spectator views the shared book but never writes to it
    setShared((prev) => {
      const base = prev || emptySharedState();
      const draft = typeof mutator === "function" ? mutator(base) : mutator;
      // stamp our own change time so polls can tell ours is the newer copy
      const next = { ...draft, updatedAt: Date.now() };
      remember(next);
      localStampRef.current = Date.now();
      quietUntilRef.current = Date.now() + 1500; // brief hush so the save can fly
      saveSharedState(next).then((saved) => {
        // once the server confirms (with its own stamp), keep our ref current so
        // later polls compare against the confirmed state, not a stale one.
        if (saved) remember(saved);
      });
      return next;
    });
  }

  return [shared, updateShared];
}


// ============================================================
// THE CHALLENGE LIBRARY (v3) — quick-win, Ko Kaeo edition.
// Built spot-by-spot: each named place is verified on the map, its hours
// checked, and a local tip (from reviews) woven into the blurb. Blurbs kept
// short and clean. Home base: Habitown, Ko Kaeo (hot; floods fast; stay close).
//
// tier:  "quick" (tiny, near-home) | "spot" (first-to-snap race) | "big" (weekly centrepiece)
// pillar: body | mind | soul   (light spread, never exertion)
// lean:  "driver" | "social"   (optional, balanced)  team: true (rare, both score)
// Some tasks are pattern-based (any 7-Eleven, any massage shopfront) and need
// no single venue. Named ones carry `place`, `hours`, and often `maps`.
// ============================================================

const CHALLENGE_BANK = [
  // ---------------- NAMED near-home spots (verified) ----------------
  { id: "v_damoreno", tier: "quick", pillar: "soul", cat: "Local eats", pts: 10,
    place: "Pizzeria Da Moreno", area: "Ko Kaeo (by the BIS / Rich Villas)",
    hours: "Tue-Sun 3-10pm, closed Mon",
    title: "Da Moreno wood-fired pizza",
    blurb: "The proper Italian pizzeria right by yours. Get a wood-fired pizza, and save room for the tiramisu (the reviews won't shut up about it). Closed Mondays." },

  { id: "v_boardwalk", tier: "quick", pillar: "soul", cat: "Local eats", pts: 10,
    place: "Boardwalk Bistro and Bar", area: "Boat Lagoon boardwalk",
    title: "Boardwalk marina dinner",
    blurb: "A cracking little bistro right on the Boat Lagoon boardwalk, minutes away. Order the seabass or the prawn gambas, the reviews swear by both. Ice-cold beers, kind owner." },

  { id: "v_lighthouse", tier: "quick", pillar: "soul", cat: "Local life", pts: 15,
    place: "Lighthouse Market", area: "Boat Lagoon boardwalk",
    hours: "Last weekend of the month, 4.30-8pm",
    title: "Lighthouse Market mooch",
    blurb: "A stylish little fair on the marina boardwalk: stones, wines, street snacks, souvenirs. Last weekend of the month only, in the cool of the evening. Grab a bite, snap the stalls." },

  // ---------------- PATTERN-BASED local dish quests (any good local stall) ----------------
  // Phuket signatures the locals themselves flag as must-tries. No single venue,
  // so always safe; the blurb carries the local tip.
  { id: "q_meehokkien", tier: "quick", pillar: "mind", cat: "Local eats", pts: 10,
    title: "Mee Hokkien hunt",
    blurb: "Track down Phuket-style Hokkien noodles, the island's own dish. Not the Singapore one. Any busy local noodle shop. Snap the bowl, then demolish it." },
  { id: "q_moohong", tier: "quick", pillar: "mind", cat: "Local eats", pts: 10,
    title: "Moo Hong, the local hero",
    blurb: "Phuket's braised pork belly, soft and sweet-savoury. A proper southern comfort dish. Find it, order it, photograph it before it vanishes." },
  { id: "q_otao", tier: "quick", pillar: "mind", cat: "Local eats", pts: 10,
    title: "O-Tao oyster omelet",
    blurb: "A Phuket street classic: crispy oyster-and-taro omelet. Messy, moreish, very local. Snap it sizzling at the stall." },
  { id: "q_somtam", tier: "quick", pillar: "body", cat: "Local eats", pts: 10,
    title: "Som Tam, mai pet edition",
    blurb: "Papaya salad from a cart with a mortar and pestle (that's the fresh sign). Say 'mai pet' unless you fancy weeping. Snap the pound-up in action." },
  { id: "q_roti", tier: "quick", pillar: "body", cat: "Snack quest", pts: 10,
    title: "Street roti, twirled fresh",
    blurb: "Hot roti with banana and condensed milk from a cart. Watch them slap and twirl the dough. Napkin count in the photo is a flex." },

// ---------- tap a place to open it in Google Maps ----------
// Naddy's instinct: tapping a spot should fling you to Maps to see where it is
// and pick your own way there. We have no stored coordinates (and many tasks are
// roving/pattern quests with no single home), so we build a clean SEARCH query
// from the place name, fold in the area for disambiguation, and always pin it to
// Phuket so a chain like 7-Eleven or Starbucks never wanders to a Bangkok branch.
// Returns a maps URL, or "" when there's genuinely nothing locatable to open.
function mapsUrlForTask(task) {
  if (!task) return "";
  // a real named venue is the strong case; fall back to the task title otherwise
  const place = (task.place || "").trim();
  const area = (task.area || "").trim();
  // skip non-place placeholders like "Roving hunt" that name no findable spot
  const vague = /^(roving hunt|any\b)/i.test(place);
  let query;
  if (place && !vague) {
    query = area ? place + ", " + area : place;
  } else if (area && !vague) {
    query = area;
  } else {
    // pattern/roving quest: search the kind of thing near home instead
    query = (task.title || "local spot");
  }
  // always anchor to Phuket unless the text already says so
  if (!/phuket/i.test(query)) query += ", Phuket";
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(query);
}
// Three thrills: the midweek WILDCARD (a big bonus from Thursday on, a lifeline

// ---------- DAILY DOUBLE ----------
// One dealt task per day is secretly worth double IF claimed on that day.
// Deterministic (seeded by week+day), revealed only at the moment of claiming.
function doubleTaskForDay(wk, day, dealt) {
  if (!dealt || !dealt.length) return null;
  const rng = seededRng("dd" + wk + "-" + day);
  return dealt[Math.floor(rng() * dealt.length)].id;
}
// Was this specific claim a daily-double hit? Reads the real claim shape:
// a claim carries { by, at, ... }, where `at` is the ms timestamp.
function isDoubleClaim(wk, dealt, taskId, claim) {
  if (!claim || !claim.at) return false;
  const day = dayOfWeek(claim.at);
  return doubleTaskForDay(wk, day, dealt) === taskId;
}

// Parse a "YYYY-MM-DD" window bound as local midnight (start) / end-of-day (end).
function festBound(dateStr, endOfDay) {
  const p = String(dateStr).split("-");
  const d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  if (endOfDay) d.setHours(23, 59, 59, 999); else d.setHours(0, 0, 0, 0);
  return d.getTime();
}
// Which festival (if any) is live right now? Returns the festival object or null.
function activeFestival(now) {
  const t = new Date(now).getTime();
  for (let i = 0; i < FESTIVALS.length; i++) {
    const f = FESTIVALS[i];
    if (t >= festBound(f.start, false) && t <= festBound(f.end, true)) return f;
  }
  return null;
}
// The active festival's special challenges, shaped like normal claimable tasks
// (tier "festival", carrying the festival's id so claims stay scoped to it).
function festivalTasks(now) {
  const f = activeFestival(now);
  if (!f) return [];
  return f.challenges.map((c) => ({
    ...c,
    tier: "festival",
    cat: f.name,
    festival: f.id,
    id: "festival_" + f.id + "_" + c.id,
  }));
}

// ============================================================
// THE BIG-ONE DUEL — a judged head-to-head, not a first-to-snap race.
// ============================================================
// The week's centrepiece is now a proper contest. Both players may submit their
// own photo of the big challenge any time before the Friday 10pm cutoff, and may
// RESUBMIT as often as they like (last photo wins, no pressure to nail it first
// go). At the cutoff the window slams shut and Michael Oliver judges both photos
// at once, crowning one with a full, honest, gleefully funny written verdict.
// A judged duel carries real weight, so the winner banks a marquee 35 points.
// (Tuned down from 60 after stress-testing showed a 60-pt duel decided ~86% of
// weeks single-handedly; 35 keeps it the biggest single prize while letting a
// strong week of everyday play genuinely outweigh a lost duel.)
//
// Design decisions (locked with Hammy): Friday 10pm cutoff (matches the week's
// competitive deadline for a proper Friday-night crescendo); 60 to the winner;
// judged all at once at the deadline; unlimited resubmits, keep the latest.
const DUEL_WIN_PTS = 35;
const DUEL_CUTOFF_DAY = 4;   // Friday (Mon=0 .. Sun=6)
const DUEL_CUTOFF_HOUR = 22; // 10pm, on a 24h clock

// The exact Friday-10pm cutoff Date for the week that contains `now`.
function duelCutoff(now) {
  const d = startOfWeek(now);              // Monday 00:00 of this week
  d.setDate(d.getDate() + DUEL_CUTOFF_DAY); // advance to Friday
  d.setHours(DUEL_CUTOFF_HOUR, 0, 0, 0);   // 10pm sharp
  return d;
}
// Is the submission window still open? (before Friday 10pm)
function duelWindowOpen(now) { return new Date(now).getTime() < duelCutoff(now).getTime(); }
// Milliseconds left in the window (0 once closed), for a live countdown.
function duelMsLeft(now) { return Math.max(0, duelCutoff(now).getTime() - new Date(now).getTime()); }
// A friendly "3d 4h left" / "48m left" string for the arena header.
function duelTimeLeftLabel(now) {
  const ms = duelMsLeft(now);
  if (ms <= 0) return "submissions closed";
  const mins = Math.floor(ms / 60000);
  const d = Math.floor(mins / 1440);
  const h = Math.floor((mins % 1440) / 60);
  const m = mins % 60;
  if (d > 0) return d + "d " + h + "h left to submit";
  if (h > 0) return h + "h " + m + "m left to submit";
  return m + "m left to submit";
}

// ---------- duel submissions: one photo per player, last write wins ----------
// Stored per-week, shape: { Hammy: {photo, photoUrl, at}, Naddy: {...}, verdict }
// where `verdict` (once judged) is { winner, reason, at }. Kept deliberately tiny
// and last-write-wins, mirroring the shared cross-phone state's own principle.
function duelKey(wk) { return "tg_duel_wk" + wk; }
function loadDuel(wk) {
  try { return JSON.parse(localStorage.getItem(duelKey(wk)) || "{}") || {}; }
  catch (e) { return {}; }
}
function saveDuel(wk, duel) {
  try { localStorage.setItem(duelKey(wk), JSON.stringify(duel || {})); } catch (e) {}
}
// Record (or replace) a player's submission. Resubmitting simply overwrites.
function submitDuelPhoto(wk, who, photo) {
  const duel = loadDuel(wk);
  duel[who] = { photo: photo, photoUrl: (duel[who] && duel[who].photoUrl) || null, at: Date.now() };
  saveDuel(wk, duel);
  return duel;
}
// Has this player got a submission in?
function hasSubmitted(duel, who) { return !!(duel && duel[who] && duel[who].photo); }

// ---------- Michael Oliver judges the duel ----------
// A DIFFERENT kind of thinking from his appeal work: rather than ruling on one
// claim, he weighs two photos against each other and crowns the better with a
// full, honest, gleefully funny reason both players get to read. Modelled on his
// proven appeal fetch: race a real /api/oliver-duel call (live Vercel only,
// needs public photo URLs) against a graceful demo verdict so it always resolves,
// preview included. onDone gets { winner, reason }.
//
// Demo fallback verdicts: deterministic per week (seeded) so a given week's demo
// judgment is stable, and written in his particular pompous-but-loveable voice.
const DUEL_DEMO_REASONS = [
  "After a lengthy consultation with the monitor, and a cup of tea, I award it to {W}. {L}'s effort was spirited, but the composition frankly wandered offside. This is the correct decision.",
  "It's {W}. On another day {L} has a case, but the lighting here does {W} an enormous favour and I am powerless against a good bit of golden hour. No further review required.",
  "A tight one, but I'm pointing to the spot for {W}. {L} will feel aggrieved. {L} is welcome to feel aggrieved. The photograph does not lie, and neither, famously, do I.",
  "I've looked at it three times and the answer is still {W}. There is an honesty to it that {L}'s attempt, for all its ambition, simply could not match. Booking {L} for dissent in advance.",
  "{W} takes it, and comfortably. {L}, I admired the confidence, but confidence is not composition. A stern word at half-time and we move on. Decision final.",
  "By the narrowest of margins, {W}. {L} produced something genuinely lovely and I want that on the record, but rules are rules and one of you had to win. Today it is not {L}.",
];
function judgeDuel(now, duel, bigTask, onDone) {
  const wk = weekNumber(now);
  const H = duel.Hammy || {}, N = duel.Naddy || {};
  // If only one player submitted, they win by walkover (honestly flagged).
  const hIn = !!(H.photo || H.photoUrl), nIn = !!(N.photo || N.photoUrl);
  if (hIn && !nIn) { onDone({ winner: "Hammy", reason: "Naddy never filed a photo, so this is a walkover. A win is a win, but Michael Oliver notes the empty net with a raised eyebrow.", walkover: true }); return; }
  if (nIn && !hIn) { onDone({ winner: "Naddy", reason: "Hammy never filed a photo, so this is a walkover. A win is a win, but Michael Oliver notes the empty net with a raised eyebrow.", walkover: true }); return; }
  if (!hIn && !nIn) { onDone({ winner: "draw", reason: "Neither of you submitted a thing. Michael Oliver has abandoned the fixture and gone home. No points, no glory, hang your heads.", noContest: true }); return; }

  let settled = false;
  function demoVerdict() {
    const rng = seededRng("duel-demo-" + wk);
    const winner = rng() < 0.5 ? "Hammy" : "Naddy";
    const loser = winner === "Hammy" ? "Naddy" : "Hammy";
    const tmpl = DUEL_DEMO_REASONS[Math.floor(rng() * DUEL_DEMO_REASONS.length)];
    return { winner: winner, reason: tmpl.replace(/\{W\}/g, winner).replace(/\{L\}/g, loser), demo: true };
  }
  // Fallback safety net: if the real judge (live site only) hasn't answered in
  // time, a demo verdict resolves things so the user never waits forever. 5s is
  // a fair window for the real call to land on a decent connection, while still
  // never leaving anyone staring at the spinner. Whichever resolves first wins,
  // guarded by `settled` so the loser bows out quietly.
  const demoTimer = setTimeout(() => {
    if (settled) return; settled = true;
    onDone(demoVerdict());
  }, 5000);

  // The real judge needs both public photo URLs (uploaded on submit).
  if (H.photoUrl && N.photoUrl) {
    try {
      fetch("/api/oliver-duel", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          hammyUrl: H.photoUrl, naddyUrl: N.photoUrl,
          taskTitle: bigTask ? bigTask.title : "the big one",
          taskBlurb: bigTask ? (bigTask.blurb || "") : "",
        }),
      })
        .then((r) => r.ok ? r.json() : Promise.reject())
        .then((data) => {
          if (settled) return; settled = true;
          clearTimeout(demoTimer);
          const winner = (data && (data.winner === "Hammy" || data.winner === "Naddy")) ? data.winner : demoVerdict().winner;
          const reason = data && typeof data.reason === "string" ? data.reason : demoVerdict().reason;
          onDone({ winner: winner, reason: reason });
        })
        .catch(() => { /* demo timer handles it */ });
    } catch (e) { /* demo timer handles it */ }
  }
}

// ============================================================
// PHOTO-THEME DUEL — a second weekly head-to-head, judged on the eye.
// ============================================================
// Where the big-one duel is anchored to a venue, THIS contest is a pure creative
// prompt: a rotating weekly theme (a colour, a mood, a subject) that you both
// interpret however you like, then Michael Oliver judges which photo best answers
// it. It exercises the artistic eye rather than the scavenging legs, and runs
// ALONGSIDE the big one as a distinct contest with its OWN storage (so the two
// never collide) and its OWN, smaller prize. Shares the duel's timing (Friday
// 10pm cutoff) and its judging brain, with an independent demo seed so the two
// contests never accidentally agree in preview.
const THEME_DUEL_PTS = 30; // a proper prize, a touch below the big one's 35

// A bank of creative themes, rotated by week (seeded so both phones agree). Kept
// deliberately broad and open to interpretation, which is where the fun lives:
// two people reading the same three words utterly differently.
const PHOTO_THEMES = [
  { id: "red", title: "Something gloriously red", blurb: "Find and frame the most striking red in Phuket. A chilli, a shrine door, a Singha crate, a sunset. Boldest, best-composed red wins the eye." },
  { id: "shadow", title: "The finest shadow", blurb: "Light tells half the story. Hunt down the most interesting shadow you can find and shoot it. Palm fronds on a wall, railings across a floor, your own long shadow at dusk." },
  { id: "tiny", title: "Something tiny, made grand", blurb: "Get close. A gecko, a flower, a bead of rain, an ant's grand adventure. Make something small feel enormous and important through the lens." },
  { id: "reflection", title: "A reflection", blurb: "Puddles, windows, a wet street after the rain, a still lake, a spoon. Catch the world folded back on itself. Cleverest reflection takes it." },
  { id: "street", title: "Phuket street life", blurb: "One honest slice of the island going about its day. A vendor, a scooter loaded impossibly high, a card game on a stoop. The most alive frame wins." },
  { id: "symmetry", title: "Perfect symmetry", blurb: "Find order in the chaos. A temple facade, a tiled floor, a row of longtails. The most satisfyingly balanced shot claims the point." },
  { id: "blue", title: "A study in blue", blurb: "The Andaman, a tiled pool, a fisherman's boat, the hour after sunset. Best, moodiest blue wins. Bonus for a blue that isn't just the obvious sea." },
  { id: "texture", title: "Irresistible texture", blurb: "Something you can almost feel through the screen. Peeling paint, woven basket, cat fur, crumbling old-town plaster. Richest texture takes it." },
  { id: "golden", title: "Golden hour", blurb: "That magic window near sunrise or sunset when everything glows. Catch the light at its most flattering. Warmest, most luminous frame wins." },
  { id: "food", title: "Food that makes you hungry", blurb: "Shoot a plate so well that the other person's stomach growls. Steam, gloss, a perfect bowl of noodles. Most mouth-watering photo takes the point." },
  { id: "one_cat", title: "A cat who isn't one of yours", blurb: "Phuket teems with street cats. Capture a stranger cat with real character. (Do NOT bring it home. The five would riot.) Best feline portrait wins." },
  { id: "movement", title: "A sense of movement", blurb: "Freeze it or blur it, but make the photo move. A leaping wave, a speeding tuk-tuk, a bird taking off, a fan mid-spin. Most dynamic frame claims it." },
];
function photoThemeForWeek(wk) {
  if (!PHOTO_THEMES.length) return null;
  const rng = seededRng("phototheme-" + wk);
  return PHOTO_THEMES[Math.floor(rng() * PHOTO_THEMES.length)];
}

// Its own storage, keyed separately so it NEVER collides with the big-one duel.
function themeDuelKey(wk) { return "tg_themeduel_wk" + wk; }
function loadThemeDuel(wk) {
  try { return JSON.parse(localStorage.getItem(themeDuelKey(wk)) || "{}") || {}; }
  catch (e) { return {}; }
}
function saveThemeDuel(wk, duel) {
  try { localStorage.setItem(themeDuelKey(wk), JSON.stringify(duel || {})); } catch (e) {}
}
function submitThemePhoto(wk, who, photo) {
  const duel = loadThemeDuel(wk);
  duel[who] = { photo: photo, photoUrl: (duel[who] && duel[who].photoUrl) || null, at: Date.now() };
  saveThemeDuel(wk, duel);
  return duel;
}

// Judge the theme duel. Mirrors judgeDuel's shape and safety net, but with an
// INDEPENDENT demo seed ("theme-demo-...") so it never mirrors the big-one duel's
// demo result, and points at the same /api/oliver-duel judge with the theme as
// the prompt. Resolves via onDone({ winner, reason }).
function judgeThemeDuel(now, duel, theme, onDone) {
  const wk = weekNumber(now);
  const H = duel.Hammy || {}, N = duel.Naddy || {};
  const hIn = !!(H.photo || H.photoUrl), nIn = !!(N.photo || N.photoUrl);
  if (hIn && !nIn) { onDone({ winner: "Hammy", reason: "Naddy never submitted for the theme, so it's a walkover. Michael Oliver accepts the win but eyes the empty frame with mild disappointment.", walkover: true }); return; }
  if (nIn && !hIn) { onDone({ winner: "Naddy", reason: "Hammy never submitted for the theme, so it's a walkover. Michael Oliver accepts the win but eyes the empty frame with mild disappointment.", walkover: true }); return; }
  if (!hIn && !nIn) { onDone({ winner: "draw", reason: "Neither of you answered the theme at all. Michael Oliver has packed up his monitor and gone for a curry. No points for this artistic no-show.", noContest: true }); return; }

  let settled = false;
  function demoVerdict() {
    const rng = seededRng("theme-demo-" + wk); // INDEPENDENT of the big-one duel
    const winner = rng() < 0.5 ? "Hammy" : "Naddy";
    const loser = winner === "Hammy" ? "Naddy" : "Hammy";
    const tmpl = DUEL_DEMO_REASONS[Math.floor(rng() * DUEL_DEMO_REASONS.length)];
    return { winner: winner, reason: tmpl.replace(/\{W\}/g, winner).replace(/\{L\}/g, loser), demo: true };
  }
  const demoTimer = setTimeout(() => {
    if (settled) return; settled = true;
    onDone(demoVerdict());
  }, 5000);

  if (H.photoUrl && N.photoUrl) {
    try {
      fetch("/api/oliver-duel", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          hammyUrl: H.photoUrl, naddyUrl: N.photoUrl,
          taskTitle: theme ? ("Photo theme: " + theme.title) : "the weekly photo theme",
          taskBlurb: theme ? (theme.blurb || "") : "",
        }),
      })
        .then((r) => r.ok ? r.json() : Promise.reject())
        .then((data) => {
          if (settled) return; settled = true;
          clearTimeout(demoTimer);
          const winner = (data && (data.winner === "Hammy" || data.winner === "Naddy")) ? data.winner : demoVerdict().winner;
          const reason = data && typeof data.reason === "string" ? data.reason : demoVerdict().reason;
          onDone({ winner: winner, reason: reason });
        })
        .catch(() => { /* demo timer handles it */ });
    } catch (e) { /* demo timer handles it */ }
  }
}

// ============================================================
// COACH SALIBA'S QUIZ DUEL — a weekly head-to-head test of your Thai.
// ============================================================
// Unlike the photo duels (judged on taste), language has right and wrong answers,
// so this is an honest QUIZ, scored on correctness: whoever knows their Thai
// better wins. It draws only from the verified vocabulary Coach Saliba already
// teaches, mixes two question styles (recognise a Thai word's meaning, and recall
// the Thai for a meaning), and is seeded per week so both phones get the identical
// quiz. Rewards genuine learning, reinforces the daily words, and fits Saliba's
// role as teacher perfectly. Its own storage (never collides with other contests).
//
// NOTE on ordering: this references THAI_WORDS, defined later in the file. That's
// safe because these functions only run at render time, long after THAI_WORDS
// exists; JS resolves a function's free variables when it's CALLED, not defined.
const QUIZ_DUEL_PTS = 25;       // a solid prize, below the two photo duels
const QUIZ_QUESTION_COUNT = 10; // a proper hard exam: ten questions per weekly test

// ---- the quiz window: teach through the week, test at the end ----
// Coach Saliba's quiz is a term-end exam, not an all-week affair. The lessons run
// Monday through Thursday, then the test OPENS on Friday morning (the school's own
// "test day") and stays open across the weekend until Sunday 10pm. This gives a
// proper learn-then-test arc, and a relaxed weekend window to actually sit it.
// Built in the same idiom as the big-one duel's cutoff, for consistency.
const QUIZ_OPEN_DAY = 4;    // Friday (Mon=0 .. Sun=6)
const QUIZ_CLOSE_DAY = 6;   // Sunday
const QUIZ_CLOSE_HOUR = 22; // 10pm sharp
// The Friday-00:00 moment the quiz opens, for the week containing `now`.
function quizOpensAt(now) {
  const d = startOfWeek(now);               // Monday 00:00 of this week
  d.setDate(d.getDate() + QUIZ_OPEN_DAY);   // advance to Friday
  d.setHours(0, 0, 0, 0);                   // from the very start of Friday
  return d;
}
// The Sunday-10pm moment the quiz closes, for the week containing `now`.
function quizClosesAt(now) {
  const d = startOfWeek(now);               // Monday 00:00 of this week
  d.setDate(d.getDate() + QUIZ_CLOSE_DAY);  // advance to Sunday
  d.setHours(QUIZ_CLOSE_HOUR, 0, 0, 0);     // 10pm sharp
  return d;
}
// Three honest states: "before" (still teaching), "open" (sit the test now),
// "closed" (window has passed for this week).
function quizPhase(now) {
  const t = new Date(now).getTime();
  if (t < quizOpensAt(now).getTime()) return "before";
  if (t < quizClosesAt(now).getTime()) return "open";
  return "closed";
}
// How many teaching days remain until the test opens (0 once it's Friday+).
function daysUntilQuiz(now) {
  const dow = dayOfWeek(now); // Mon=0
  return Math.max(0, QUIZ_OPEN_DAY - dow);
}
// A friendly "closes in 2d 4h" / "closes in 40m" label while the window's open.
function quizTimeLeftLabel(now) {
  const ms = Math.max(0, quizClosesAt(now).getTime() - new Date(now).getTime());
  if (ms <= 0) return "the test has closed";
  const mins = Math.floor(ms / 60000);
  const d = Math.floor(mins / 1440);
  const h = Math.floor((mins % 1440) / 60);
  const m = mins % 60;
  if (d > 0) return "closes in " + d + "d " + h + "h";
  if (h > 0) return "closes in " + h + "h " + m + "m";
  return "closes in " + m + "m";
}

// Build this week's quiz: a seeded, reproducible set of questions so both phones
// see exactly the same test. Alternates styles: even questions ask "what does
// this Thai word mean?" (recognition), odd ones ask "which Thai word means X?"
// (recall). Each offers 4 options: the correct answer plus 3 real decoys drawn
// from other genuine Thai words, which is what makes it a true test not a guess.
// `now` is optional: when given, the exam is drawn from the words ACTUALLY
// taught across that calendar week (three a day, Mon-Sun), so it's a true
// cumulative test of the week's lessons. Decoys are still pulled from the whole
// verified bank, which makes the wrong answers plausible and the test genuinely
// hard. Falls back to the full bank if the week's set is somehow too thin.
function quizForWeek(wk, now) {
  const bank = (typeof THAI_WORDS !== "undefined") ? THAI_WORDS : [];
  if (bank.length < 4) return [];
  // the pool to be TESTED on: this week's taught words if we can, else the bank
  let pool = (now != null && typeof wordsThisWeek === "function") ? wordsThisWeek(now) : [];
  if (!pool || pool.length < QUIZ_QUESTION_COUNT) pool = bank; // safety net
  const shuffled = seededShuffle(pool, "quizduel-wk" + wk);
  const chosen = shuffled.slice(0, Math.min(QUIZ_QUESTION_COUNT, shuffled.length));
  return chosen.map((word, idx) => {
    const recall = idx % 2 === 1; // alternate the two styles
    // three decoys drawn from the WHOLE bank (not just the week's words), so the
    // wrong answers are varied and believable rather than easy to eliminate.
    const others = seededShuffle(bank.filter((w) => w.thai !== word.thai), "decoy-" + wk + "-" + idx).slice(0, 3);
    if (recall) {
      // recall: given the MEANING, pick the right Thai word
      const opts = seededShuffle([word].concat(others), "opts-" + wk + "-" + idx).map((w) => ({ label: w.thai, say: w.say, correct: w.thai === word.thai }));
      return { style: "recall", prompt: word.mean, promptSub: "Which Thai word means this?", options: opts, answer: word.thai };
    }
    // recognition: given the THAI WORD, pick the right meaning
    const opts = seededShuffle([word].concat(others), "opts-" + wk + "-" + idx).map((w) => ({ label: w.mean, correct: w.mean === word.mean }));
    return { style: "recognise", prompt: word.thai, promptSub: word.say, options: opts, answer: word.mean };
  });
}

// Its own storage, keyed separately so it never collides with any other contest.
// Shape: { Hammy: {answers:[...], score, at}, Naddy: {...} }
function quizKey(wk) { return "tg_quizduel_wk" + wk; }
function loadQuiz(wk) {
  try { return JSON.parse(localStorage.getItem(quizKey(wk)) || "{}") || {}; }
  catch (e) { return {}; }
}
function saveQuiz(wk, data) {
  try { localStorage.setItem(quizKey(wk), JSON.stringify(data || {})); } catch (e) {}
}
// Record a player's finished quiz: their chosen answers and resulting score.
function submitQuiz(wk, who, answers, score) {
  const data = loadQuiz(wk);
  data[who] = { answers: answers, score: score, at: Date.now() };
  saveQuiz(wk, data);
  return data;
}
function quizDone(data, who) { return !!(data && data[who] && typeof data[who].score === "number"); }

// Who won the quiz? Higher score wins; a tie on score is broken by who finished
// FIRST (rewards the surer, quicker knowledge); if neither has taken it, null.
// Returns "Hammy" | "Naddy" | "draw" | null (not yet decidable).
function quizWinner(wk) {
  const data = loadQuiz(wk);
  const h = data.Hammy, n = data.Naddy;
  const hDone = h && typeof h.score === "number";
  const nDone = n && typeof n.score === "number";
  if (hDone && !nDone) return "Hammy"; // only one has taken it so far
  if (nDone && !hDone) return "Naddy";
  if (!hDone && !nDone) return null;
  if (h.score !== n.score) return h.score > n.score ? "Hammy" : "Naddy";
  // tie on score: earlier finisher takes it; exact same instant is an honest draw
  if (h.at !== n.at) return h.at < n.at ? "Hammy" : "Naddy";
  return "draw";
}

// ---------- THROW-DOWN DARES ----------
// The weekly beat of the game: one dare each per week, so casting one is a
// considered ritual, not an idle habit. The economy has real teeth now, a proper
// little contest of nerve:
//   - Casting STAKES points (DARE_STAKE): a real wager, not a free lob.
//   - If the dared one COMPLETES it, they bank the brave reward (DARE_REWARD).
//   - If they DUCK, they must key in a genuinely saucy secret. It goes upstairs
//     to Michael Oliver:
//       * a secret he judges SAUCY lets them off entirely (the confession is the
//         price paid; no points change hands),
//       * a FEEBLE secret (or no secret at all) costs them the doubled penalty
//         (DARE_PENALTY) handed to the thrower, cowardice compounded.
// There is no comfortable hiding place anywhere in it, which is rather the point.
const DARE_STAKE = 15;    // what casting a dare puts on the table
const DARE_REWARD = 30;   // the brave completer's prize
const DARE_PENALTY = 30;  // handed to the thrower on a feeble/refused duck (double the stake)
const DARE_IDEAS = [
  "Order your next coffee entirely in Thai, no English rescue.",
  "Eat the spiciest thing on the menu without reaching for water.",
  "Say hello to the next three cats we pass, out loud, by made-up names.",
  "Do a lap of the shop before you're allowed to buy the thing you came for.",
  "Compliment a total stranger's outfit and mean it.",
  "Let me pick your dinner order tonight, no vetoes.",
  "Take the stairs, not the lift, and look pleased about it.",
  "Wai the next songthaew driver like they're royalty.",
];

function dareKey(wk) { return "tg_dares_wk" + wk; }
function loadDares(wk) {
  try { return JSON.parse(localStorage.getItem(dareKey(wk)) || "[]"); }
  catch (e) { return []; }
}
function saveDares(wk, dares) {
  try { localStorage.setItem(dareKey(wk), JSON.stringify(dares)); } catch (e) {}
}

// Tally the dare economy into per-player totals (added on top of task scores).
// Reads each dare's settled outcome:
//   result "landed"    -> the dared one (d.to) banks DARE_REWARD for their nerve.
//   result "confessed" -> a saucy, Oliver-approved secret: nobody scores, the
//                         confession itself was the price.
//   result "ducked"    -> a feeble/refused duck: the thrower (d.from) banks
//                         DARE_PENALTY, cowardice punished.
// A "pending" or "judging" dare is not yet settled and scores nothing.
function tallyDares(dares) {
  const totals = { Hammy: 0, Naddy: 0 };
  (dares || []).forEach((d) => {
    if (d.result === "landed" && d.to) totals[d.to] = (totals[d.to] || 0) + DARE_REWARD;
    else if (d.result === "ducked" && d.from) totals[d.from] = (totals[d.from] || 0) + DARE_PENALTY;
    // "confessed" settles honourably with no points moving; nothing to add.
  });
  return totals;
}

// Michael Oliver judges a ducker's saucy confession. Mirrors the duel judge's
// shape: a real call to the live judging service, with a graceful demo ruling
// that steps in if it can't be reached (preview, slow line), so nobody waits
// forever. Resolves via onDone({ saucy, reason }). The great man appraises
// whether the secret is genuinely spicy enough to earn a reprieve, or too feeble
// to spare the ducker their penalty. His word, as ever, is final.
const CONFESSION_DEMO_SAUCY = [
  "Now THAT is a confession. Bold, unexpected, a little bit outrageous. Reprieve granted, and Oliver looks faintly impressed against his will.",
  "Michael Oliver raises both eyebrows at the monitor. Genuinely saucy. He waves the penalty away and pretends he didn't enjoy reading it.",
  "A proper spicy secret, freely given. Oliver rules it more than saucy enough. You're off the hook, you shameless article.",
];
const CONFESSION_DEMO_FEEBLE = [
  "Oliver has read it twice and remains entirely unmoved. Far too tame. That is not a saucy secret, that is a shopping list. Penalty stands.",
  "A limp, feeble non-confession. Michael Oliver is unimpressed and mildly insulted to have been summoned for it. The penalty is upheld.",
  "That barely qualifies as a secret, let alone a saucy one. Oliver shakes his head at the monitor. No reprieve. Pay up.",
];
function judgeConfession(secret, onDone) {
  let settled = false;
  function demoRuling() {
    // seed off the secret text so a given confession rules consistently in demo
    const rng = seededRng("confess-demo-" + (secret || "").slice(0, 40));
    // a fair-ish coin, leaning slightly generous to keep it fun
    const saucy = rng() < 0.55;
    const pool = saucy ? CONFESSION_DEMO_SAUCY : CONFESSION_DEMO_FEEBLE;
    const reason = pool[Math.floor(rng() * pool.length)];
    return { saucy: saucy, reason: reason, demo: true };
  }
  const demoTimer = setTimeout(() => {
    if (settled) return; settled = true;
    onDone(demoRuling());
  }, 5000);
  try {
    fetch("/api/oliver-confession", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret: secret }),
    })
      .then((r) => r.ok ? r.json() : Promise.reject())
      .then((data) => {
        if (settled) return; settled = true;
        clearTimeout(demoTimer);
        const saucy = !!(data && data.saucy);
        const reason = data && typeof data.reason === "string" ? data.reason : demoRuling().reason;
        onDone({ saucy: saucy, reason: reason });
      })
      .catch(() => { /* demo timer handles it */ });
  } catch (e) { /* demo timer handles it */ }
}


// ---------- THE DARES SCREEN ----------
// The weekly beat. Throw your one dare at your other half, or answer theirs.
// Completing a dare banks the brave reward. DUCKING opens a confession box: key
// in a genuinely saucy secret and Michael Oliver rules on it. A saucy secret
// lets you off entirely; a feeble or refused one hands the thrower the doubled
// penalty. Warm, cheeky, and with nowhere left to hide.
function DaresScreen({ me, dares, setDares, spectating, myScore }) {
  const them = me === "Hammy" ? "Naddy" : "Hammy";
  const [text, setText] = useState("");
  const [picked, setPicked] = useState("");
  const [confessingId, setConfessingId] = useState(null); // dare being ducked+confessed
  const [secret, setSecret] = useState("");
  const [judging, setJudging] = useState(false);
  const [mutter, setMutter] = useState("");
  const [showHelp, setShowHelp] = useState(false); // the tappable how-it-works panel

  const suggestion = picked || "";

  // the weekly beat: one thrown dare each per week.
  const myThrown = (dares || []).filter((d) => d.from === me);
  const dareSpent = myThrown.length >= 1;

  // the stake gate: a dare is a real wager, so you must actually HOLD the stake
  // to throw one. Below DARE_STAKE points and the quiver stays shut. This keeps
  // the wager honest: you can never stake points you don't have.
  const myPoints = Number.isFinite(myScore) ? myScore : 0;
  const canAffordStake = myPoints >= DARE_STAKE;

  function throwDare() {
    if (dareSpent) return;
    if (!canAffordStake) return; // can't stake what you don't hold
    const body = (text.trim() || suggestion).trim();
    if (!body) return;
    const d = { id: uid(), from: me, to: them, text: body, result: "pending", at: Date.now() };
    setDares([...(dares || []), d]);
    setText(""); setPicked("");
  }

  // Retract a still-PENDING dare. Only ever a pending one: once the opponent has
  // acted (completed, ducked, or it's gone to Oliver) the outcome is locked and
  // history can't be rewritten. Pulling a pending dare frees this week's throw
  // again, since no points have moved and it's as if it was never lobbed.
  function removeDare(id) {
    setDares((dares || []).filter((d) => !(d.id === id && d.result === "pending")));
  }
  function setResult(id, patch) {
    setDares((dares || []).map((d) => d.id === id ? { ...d, ...patch } : d));
  }
  function completeDare(id) { setResult(id, { result: "landed" }); }

  // Ducking: open the confession box for this dare.
  function startDuck(id) { setConfessingId(id); setSecret(""); }

  // Submit the saucy secret to Michael Oliver for his ruling.
  const MUTTERS = [
    "Reviewing the confession...", "Is this actually saucy...", "One moment, weighing the spice...",
    "Consulting the monitor...", "Hmm. Bold, but is it enough...", "Assessing the audacity...",
  ];
  function sendConfession(id) {
    const body = secret.trim();
    if (!body) return;
    // mark it as under judgment straight away, and stash the secret text
    setResult(id, { result: "judging", secret: body, duckedAt: Date.now() });
    setJudging(true);
    let i = 0; setMutter(MUTTERS[0]);
    const mut = setInterval(() => { i++; setMutter(MUTTERS[i % MUTTERS.length]); }, 900);
    judgeConfession(body, (ruling) => {
      clearInterval(mut);
      setJudging(false);
      setConfessingId(null);
      setSecret("");
      // saucy -> confessed (no points move); feeble -> ducked (penalty to thrower)
      setResult(id, {
        result: ruling.saucy ? "confessed" : "ducked",
        verdict: { saucy: ruling.saucy, reason: ruling.reason, at: Date.now() },
      });
    });
  }

  const incoming = (dares || []).filter((d) => d.to === me && (d.result === "pending"));
  const mineOut = (dares || []).filter((d) => d.from === me);
  const theirVerdicts = (dares || []).filter((d) => d.to === me && (d.result === "confessed" || d.result === "ducked" || d.result === "landed"));

  return (
    <div>
      {/* a tappable help marker: touchscreens have no hover, so a tap reveals
          the how-it-works. Always here, so the rules are never a mystery. */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <span style={{ fontFamily: FM, fontSize: 10, letterSpacing: ".14em", textTransform: "uppercase", color: T.inkSoft }}>
          The weekly dare
        </span>
        <button onClick={() => setShowHelp((v) => !v)} style={{
          cursor: "pointer", display: "flex", alignItems: "center", gap: 6,
          background: showHelp ? T.ink : T.card, border: "1px solid " + (showHelp ? T.ink : T.line),
          borderRadius: 20, padding: "5px 11px 5px 9px",
        }}>
          <span style={{
            width: 16, height: 16, borderRadius: 8, background: showHelp ? "#fff" : T.peach,
            color: showHelp ? T.ink : T.coralDk, fontFamily: FH, fontWeight: 700, fontSize: 11,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>?</span>
          <span style={{ fontFamily: FM, fontSize: 10, letterSpacing: ".04em", color: showHelp ? "#fff" : T.inkSoft }}>
            how it works
          </span>
        </button>
      </div>

      {showHelp ? (

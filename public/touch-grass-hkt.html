// ============================================================
// THE VAR BOOTH — Michael Oliver reviews the replay.
// When your opponent smells something dodgy about a claim, they can APPEAL.
// The claim's photo goes upstairs to Michael Oliver (a real AI judge on the
// live site; a graceful demo in preview). He is written with warmth as
// wonderfully neurodivergent: hyper-focused, tangent-prone, needs the details
// lined up just so, deeply fair. It's an affectionate wink, never a mock.
//
// The economy (from our design): 2 appeals per person per week. A FAILED appeal
// (VAR upholds the claim) costs the appealer the task's full value AND hands
// those points to the wrongly-accused. So appealing costs real money and can
// genuinely backfire. Warned clearly before they commit.
// ============================================================

// How many appeals each player gets per week.
const APPEALS_PER_WEEK = 2;

// Count how many appeals a player has spent this week (from the claims map).
function appealsSpent(claims, who) {
  let n = 0;
  Object.keys(claims || {}).forEach((k) => {
    const c = claims[k];
    if (c && c.appeal && c.appeal.by === who) n++;
  });
  return n;
}
function appealsLeft(claims, who) {
  return Math.max(0, APPEALS_PER_WEEK - appealsSpent(claims, who));
}

// Michael Oliver's little lines, for flavour while he "reviews". Warm, precise,
// prone to a tangent, quietly obsessive about getting it exactly right. He
// cycles through these while the real AI deliberates, so the wait feels like
// character rather than lag. Plenty of them, so he rarely repeats himself.
const MO_THINKING = [
  "Right. Give me a moment. I'm going to look at this properly.",
  "Okay. Drawing my little lines on the screen. I do love the little lines.",
  "Hold on. I need the whole picture before I say a word. That's only fair.",
  "Let me just... yes. Zooming in. Details matter. Details are everything, really.",
  "One second. I've paused it on exactly the right frame. It has to be the right frame.",
  "Now, I'm not going to be rushed on this. A good decision is never a fast one.",
  "Interesting. There's a lot going on in the corner here. Bear with me.",
  "I'm going to watch it once more. And possibly once more after that.",
  "Mm. The lighting's tricky, but I've seen trickier. Stay with me.",
  "Just lining up the grid. Everything's better with a grid, I find.",
  "I want to be fair to both of you. So I'm being thorough. Very thorough.",
  "Hang on, let me check the angle. Angles have undone better claims than this.",
  "Nearly there. I never call it until I'm sure. That wouldn't be right.",
  "You'd be amazed what people miss when they hurry. I never hurry.",
];
const MO_UPHOLD = [
  "No. That's a good claim. I've checked it three times and I'm satisfied. Play on.",
  "The evidence is clear and it's clean. Claim stands. And can I just say, tidy work.",
  "I see no offence here. None. The claim is good. I'm confident, and I'm rarely confident.",
];
const MO_OVERTURN = [
  "No. I'm sorry, but no. The evidence doesn't support it. Claim overturned.",
  "That doesn't show what it needs to show. I've looked closely. Overturned, I'm afraid.",
  "I can't allow this one. It's not there in the picture. It has to be in the picture. Overturned.",
];

// ---------- the appeal flow: warn -> review -> verdict ----------
// Phases: "warn" (are you sure? it costs money and can backfire)
//         "review" (Michael Oliver is looking...)
//         "verdict" (upheld or overturned + consequences)
function VarSheet({ task, claim, me, onResolve, onClose }) {
  const [phase, setPhase] = useState("warn");
  const [moLine, setMoLine] = useState("");
  const [result, setResult] = useState(null); // 'upheld' | 'overturned'

  const accused = claim.by;                    // who made the claim
  const value = task.pts;

  // Run the review. On the live site this calls the backend judge; in preview
  // (no backend) it falls back to a graceful, slightly-generous demo verdict.
  function startReview() {
    setPhase("review");
    setMoLine(pick(MO_THINKING));

    // Keep Michael Oliver muttering his particular thoughts THROUGHOUT the wait,
    // so the few seconds of genuine AI deliberation feel like character, not lag.
    // The longer he takes, the more of his charm you get. Cleared the instant he rules.
    let thinkTimer = setInterval(() => { setMoLine(pick(MO_THINKING)); }, 2100);
    const stopThinking = () => { if (thinkTimer) { clearInterval(thinkTimer); thinkTimer = null; } };

    const finish = (verdict, spokenLine) => {
      stopThinking();
      const upheld = verdict === "uphold";
      setResult(upheld ? "upheld" : "overturned");
      // Prefer Michael Oliver's own words from the backend; else a character line.
      setMoLine(spokenLine || pick(upheld ? MO_UPHOLD : MO_OVERTURN));
      setPhase("verdict");
    };

    // The real judge needs a public photo URL (uploaded on claim). If we have
    // one, ask Michael Oliver for real (live Vercel). Otherwise, and as a
    // fallback in preview, use the graceful demo verdict.
    let settled = false;
    const demoTimer = setTimeout(() => {
      if (settled) return;
      settled = true;
      const hasPhoto = !!(claim.photo || claim.photoUrl);
      // generous: uphold ~75% if there's a photo, ~35% if there isn't
      const upheld = Math.random() < (hasPhoto ? 0.75 : 0.35);
      finish(upheld ? "uphold" : "overturn", null);
    }, 2600);

    if (claim.photoUrl) {
      try {
        fetch("/api/oliver", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url: claim.photoUrl,
            taskTitle: task.title,
            taskBlurb: task.blurb || "",
            accuserNote: "",
          }),
        })
          .then((r) => r.ok ? r.json() : Promise.reject())
          .then((data) => {
            if (settled) return;
            settled = true;
            clearTimeout(demoTimer);
            const verdict = (data && data.verdict === "overturn") ? "overturn" : "uphold";
            const spokenLine = data && typeof data.line === "string" ? data.line : null;
            finish(verdict, spokenLine);
          })
          .catch(() => { /* demo timer handles it */ });
      } catch (e) { /* demo timer handles it */ }
    }
  }

  function applyVerdict() {
    // 'overturned' -> claim falls (points removed from accused).
    // 'upheld'     -> failed appeal: appealer loses task value, accused gains it.
    onResolve({ result: result === "upheld" ? "upheld" : "overturned", by: me });
  }

  const p = PLAYERS[me];
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 70, display: "flex", flexDirection: "column",
      justifyContent: "center", alignItems: "center", padding: 24,
      background: "rgba(30,22,18,.55)", backdropFilter: "blur(4px)", WebkitBackdropFilter: "blur(4px)",
    }}>
      <div style={{
        width: "100%", maxWidth: 340, background: T.card, borderRadius: 22,
        padding: "22px 20px 20px", animation: "tgPop .35s ease both",
        boxShadow: "0 18px 50px rgba(30,22,18,.4)",
      }}>
        {/* header */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
          <div style={{
            width: 34, height: 34, borderRadius: 10, background: "#1e2a38",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontFamily: FM, fontWeight: 700, fontSize: 13, color: "#fff",
          }}>VAR</div>
          <div>
            <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: T.ink, lineHeight: 1 }}>Michael Oliver</div>
            <div style={{ fontFamily: FM, fontSize: 9, color: T.inkSoft, letterSpacing: ".1em", marginTop: 3 }}>PITCHSIDE MONITOR</div>
          </div>
        </div>

        {phase === "warn" && (
          <div>
            <div style={{ marginTop: 14, fontFamily: FB, fontSize: 13.5, color: T.ink, lineHeight: 1.55 }}>
              You're challenging <b style={{ color: PLAYERS[accused].colour }}>{accused}</b>'s claim on
              <b> "{task.title}"</b>.
            </div>
            <div style={{
              marginTop: 12, background: "#fff3ee", border: "1px solid " + T.peach, borderRadius: 12,
              padding: "12px 14px", fontFamily: FB, fontSize: 12.5, color: T.coralDk, lineHeight: 1.55,
            }}>
              Waking the VAR booth costs real money. And it can backfire: if Michael Oliver
              rules the claim <b>good</b>, you lose <b>{value} points</b> and {accused} is handed them.
              Choose wisely, you only get {APPEALS_PER_WEEK} appeals a week.
            </div>
            <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
              <button onClick={onClose} style={{
                flex: 1, background: "transparent", border: "1px solid " + T.line, borderRadius: 14,
                padding: "11px 0", cursor: "pointer", fontFamily: FH, fontWeight: 700, fontSize: 14, color: T.inkSoft,
              }}>Let it go</button>
              <button onClick={startReview} style={{
                flex: 1, background: "#1e2a38", border: "none", borderRadius: 14,
                padding: "11px 0", cursor: "pointer", fontFamily: FH, fontWeight: 700, fontSize: 14, color: "#fff",
              }}>Send to VAR</button>
            </div>
          </div>
        )}

        {phase === "review" && (
          <div style={{ marginTop: 18, textAlign: "center", padding: "10px 0 6px" }}>
            <div style={{ fontFamily: FB, fontSize: 14, color: T.ink, lineHeight: 1.6, fontStyle: "italic" }}>
              {moLine}
            </div>
            <div style={{ marginTop: 16, fontFamily: FM, fontSize: 10, color: T.inkSoft, letterSpacing: ".14em" }}>
              REVIEWING…
            </div>
          </div>
        )}

        {phase === "verdict" && (
          <div style={{ marginTop: 16 }}>
            <div style={{
              textAlign: "center", fontFamily: FH, fontWeight: 700, fontSize: 20,
              color: result === "overturned" ? T.good : T.coralDk,
            }}>
              {result === "overturned" ? "OVERTURNED" : "CLAIM STANDS"}
            </div>
            <div style={{ marginTop: 10, fontFamily: FB, fontSize: 13.5, color: T.ink, lineHeight: 1.6, fontStyle: "italic", textAlign: "center" }}>
              "{moLine}"
            </div>
            <div style={{
              marginTop: 14, fontFamily: FB, fontSize: 12.5, lineHeight: 1.55, textAlign: "center",
              color: result === "overturned" ? T.good : T.coralDk,
            }}>
              {result === "overturned"
                ? accused + " loses the " + value + " points. Justice done."
                : "Failed appeal. You lose " + value + " points and " + accused + " is handed them. Ouch."}
            </div>
            <div style={{ marginTop: 16 }}>
              <Btn onClick={applyVerdict} style={{ width: "100%" }}>Accept the ruling</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// ============================================================
// THE WEEKLY BOARD — the heart of the game.
// 25 challenges dealt per week, shown in closed groups by pillar (tap to open).
// First to claim a task locks it: banks the points, captures photo + caption +
// optional taunt. Team-up tasks score for both. Mobile-first: closed lists,
// compact, emoji only for genuine wow.
//
// This phase builds the deal, the closed groups, and the claim-with-photo flow
// (with optional Bluesky share). VAR appeals, wildcard, daily-double, dares
// follow in their own phases.
// ============================================================

// ---------- per-week claim persistence (device-local) ----------
// Stored under a per-week key so each week keeps its own board of claims.
// Shape: { [taskId]: { by, at, photo, caption, taunt } }
function claimsKey(wk) { return "tg_claims_wk" + wk; }
function loadClaims(wk) {
  try { return JSON.parse(localStorage.getItem(claimsKey(wk)) || "{}"); }
  catch (e) { return {}; }
}
function saveClaims(wk, claims) {
  try { localStorage.setItem(claimsKey(wk), JSON.stringify(claims)); } catch (e) {}
}

// ---------- deal this week's board, grouped by TIER ----------
// The quick-win model: a pile of tiny near-home wins, a few sign-scramble races,
// and one big weekly centrepiece. Grouped by tier for the closed-list display.
const TIER_META = {
  quick: { label: "Quick wins", sub: "little local things, knock 'em off", accent: "#ff8a5c" },
  spot:  { label: "Sign scrambles", sub: "first to snap it wins", accent: "#5b9bd5" },
  big:   { label: "The big one", sub: "this week's centrepiece", accent: "#e0577a" },
};
const TIER_ORDER = ["quick", "spot", "big"];

// How many of each tier to deal per week.
const DEAL_COUNTS = { quick: 7, spot: 2, big: 1 };

// Deterministic weekly deal, drawn per-tier so the mix is always right.
//
// THE SHOE. Rather than reshuffle each tier every week (which lets a spot
// reappear a week or two later by pure chance), we shuffle each tier ONCE into a
// single fixed running order, then deal through it in sequence, week by week,
// like dealing cards off the top of one well-shuffled deck instead of reshuffling
// for every hand. Nothing repeats until we've dealt clean through the whole pool
// and genuinely run out of fresh cards; only then does it wrap and serve old
// favourites again. So the "fresh window" isn't a hard-coded number, it emerges
// straight from how deep each pool is: a 10-deep big tier gives 10 fresh weeks,
// deepen the pool and the window grows on its own. (This is exactly how a
// blackjack shoe works, several decks dealt in sequence before a reshuffle, so
// cards don't recur too soon and the game keeps feeling fair and fresh.)
//
// Seeded so both phones shuffle the shoe identically and agree on every week.
// Weeks are 1-indexed, so week 1 starts at the top of the shoe (offset 0).
function dealFromShoe(pool, want, wk, tier) {
  const n = pool.length;
  if (n === 0 || want <= 0) return [];
  const shoe = seededShuffle(pool, "shoe-" + tier); // one fixed order for the whole season
  const start = (Math.max(0, wk - 1) * want) % n;   // where this week's slice begins
  const out = [];
  for (let i = 0; i < Math.min(want, n); i++) {
    out.push(shoe[(start + i) % n]); // wrap round the shoe with modular arithmetic
  }
  return out;
}
function dealtBoard(wk) {
  // SETTLING-IN OVERRIDE: weeks 1 and 2 deal a gentle, homely board (5 soft
  // quick tasks, 5 easy spot races, 1 nearby big one) instead of the full
  // adventurous shoe. Both phones agree because the sets are fixed, not random.
  // From week 3 on, this is skipped entirely and the normal shoe deals as ever.
  if (wk === 1 || wk === 2) {
    const groups = wk === 1
      ? { quick: GENTLE_QUICK_WK1, spot: GENTLE_SPOT_WK1, big: [GENTLE_BIG_WK1] }
      : { quick: GENTLE_QUICK_WK2, spot: GENTLE_SPOT_WK2, big: [GENTLE_BIG_WK2] };
    const dealt = TIER_ORDER.reduce((acc, tier) => acc.concat(groups[tier] || []), []);
    return { dealt, groups };
  }

  const byTier = { quick: [], spot: [], big: [] };
  CHALLENGE_BANK.forEach((t) => { (byTier[t.tier] || byTier.quick).push(t); });

  const groups = { quick: [], spot: [], big: [] };
  TIER_ORDER.forEach((tier) => {
    const want = DEAL_COUNTS[tier] || 0;
    groups[tier] = dealFromShoe(byTier[tier], want, wk, tier);
  });
  const dealt = TIER_ORDER.reduce((acc, tier) => acc.concat(groups[tier]), []);
  return { dealt, groups };
}

// ---------- live score from claims: base points, team-ups, doubles, VAR ----------
function tallyScores(dealt, claims, wk) {
  const totals = { Hammy: 0, Naddy: 0 };
  dealt.forEach((t) => {
    const c = claims[t.id];
    if (!c || !c.by) return;

    const ap = c.appeal;
    // Overturned claim: it falls. Nobody banks the base points.
    if (ap && ap.result === "overturned") return;

    // Daily-double: if this claim landed on its secret double-day, points x2.
    let pts = t.pts;
    if (wk != null && isDoubleClaim(wk, dealt, t.id, c)) pts = pts * 2;

    // Award the points (team tasks score for both).
    if (t.team) { totals.Hammy += pts; totals.Naddy += pts; }
    else { totals[c.by] = (totals[c.by] || 0) + pts; }

    // Failed appeal (claim upheld): the appealer forfeits the task's value and
    // it's handed to the wrongly-accused claimant.
    if (ap && ap.result === "upheld" && ap.by) {
      totals[ap.by] = (totals[ap.by] || 0) - pts;
      totals[c.by] = (totals[c.by] || 0) + pts;
    }
  });
  return totals;
}


// ============================================================
// THE SCRAPBOOK TRAWLER — gather EVERYTHING a week produced.
// One honest sweep across every stream a week generates, so nothing submitted
// ever goes uncollected: board claims (photos, captions, taunts), memory-wall
// thoughts and moments, throw-down dares and their saucy confessions, the two
// photo duels with Michael Oliver's verdicts, and Coach Saliba's quiz result.
// Returns one tidy object the scrapbook screen renders and the Gordon Ramsay
// roast feeds on. Defensive throughout: a missing field or empty source is
// skipped gracefully, never a crash, never a silent whole-category drop.
// ============================================================
function gatherWeek(wk, shared) {
  const out = {
    wk: wk,
    claims: [],      // completed board tasks, with photo/caption/taunt
    thoughts: [],    // memory-wall penned thoughts
    moments: [],     // memory-wall snapped photos
    dares: [],       // settled throw-down dares (+ any confession)
    duels: [],       // the big-one duel + the photo-theme duel, with verdicts
    quiz: null,      // Coach Saliba's quiz outcome
    scores: { Hammy: 0, Naddy: 0 },
    counts: { Hammy: 0, Naddy: 0 }, // how many things each person put in
  };

  // ---- 1) board claims: the heart of the week ----
  const dealt = (dealtBoard(wk) || {}).dealt || [];
  const taskById = {};
  dealt.forEach((t) => { taskById[t.id] = t; });
  const claims = loadClaims(wk) || {};
  Object.keys(claims).forEach((taskId) => {
    const c = claims[taskId];
    if (!c || !c.by) return;
    const task = taskById[taskId] || { title: "A task", pts: 0 };
    out.claims.push({
      by: c.by, taskTitle: task.title, pts: task.pts || 0,
      photo: c.photo || null, caption: c.caption || "", taunt: c.taunt || "",
      shared: !!c.shared, at: c.at || 0,
      overturned: !!(c.appeal && c.appeal.result === "overturned"),
    });
    out.counts[c.by] = (out.counts[c.by] || 0) + 1;
  });

  // ---- 2) memory wall: thoughts and moments for THIS week ----
  const mems = (shared && Array.isArray(shared.memories)) ? shared.memories : [];
  mems.forEach((m) => {
    if (!m || m.week !== wk) return; // only this week's entries
    const entry = {
      by: m.by, text: m.text || "", photoUrl: m.photoUrl || null,
      starred: !!m.starred, at: m.at || 0,
    };
    if (m.kind === "moment" || m.hasPhoto || m.photoUrl) out.moments.push(entry);
    else out.thoughts.push(entry);
    if (m.by) out.counts[m.by] = (out.counts[m.by] || 0) + 1;
  });

  // ---- 3) throw-down dares: settled ones, with any saucy confession ----
  const dares = loadDares(wk) || [];
  dares.forEach((d) => {
    if (!d) return;
    out.dares.push({
      from: d.from, to: d.to, text: d.text || "",
      result: d.result || "pending",
      secret: d.result === "confessed" ? (d.secret || "") : "",
      verdict: d.verdict || null,
    });
  });

  // ---- 4) the two photo duels, each with its verdict ----
  const bigDuel = (typeof loadDuel === "function") ? loadDuel(wk) : null;
  if (bigDuel && (bigDuel.Hammy || bigDuel.Naddy || bigDuel.verdict)) {
    out.duels.push({
      kind: "The big one",
      hammyPhoto: (bigDuel.Hammy && (bigDuel.Hammy.photo || bigDuel.Hammy.photoUrl)) || null,
      naddyPhoto: (bigDuel.Naddy && (bigDuel.Naddy.photo || bigDuel.Naddy.photoUrl)) || null,
      verdict: bigDuel.verdict || null,
    });
  }
  const themeDuel = (typeof loadThemeDuel === "function") ? loadThemeDuel(wk) : null;
  if (themeDuel && (themeDuel.Hammy || themeDuel.Naddy || themeDuel.verdict)) {
    out.duels.push({
      kind: "The photo theme",
      theme: themeDuel.theme || themeDuel.title || "",
      hammyPhoto: (themeDuel.Hammy && (themeDuel.Hammy.photo || themeDuel.Hammy.photoUrl)) || null,
      naddyPhoto: (themeDuel.Naddy && (themeDuel.Naddy.photo || themeDuel.Naddy.photoUrl)) || null,
      verdict: themeDuel.verdict || null,
    });
  }

  // ---- 5) Coach Saliba's quiz result ----
  const quizData = (typeof loadQuiz === "function") ? loadQuiz(wk) : null;
  if (quizData && (quizData.Hammy || quizData.Naddy)) {
    out.quiz = {
      hammy: quizData.Hammy ? { score: quizData.Hammy.score } : null,
      naddy: quizData.Naddy ? { score: quizData.Naddy.score } : null,
      winner: (typeof quizWinner === "function") ? quizWinner(wk) : null,
    };
  }

  // ---- 6) the week's live scores, so the page can crown a leader ----
  out.scores = tallyScores(dealt, claims, wk);
  const dareBonus = (typeof tallyDares === "function") ? tallyDares(dares) : { Hammy: 0, Naddy: 0 };
  out.scores.Hammy = (out.scores.Hammy || 0) + (dareBonus.Hammy || 0);
  out.scores.Naddy = (out.scores.Naddy || 0) + (dareBonus.Naddy || 0);

  // total tally: how much stuff the week holds, for empty-state checks
  out.total = out.claims.length + out.thoughts.length + out.moments.length +
    out.dares.length + out.duels.length + (out.quiz ? 1 : 0);
  return out;
}


// ============================================================
// THE SCRAPBOOK ROAST — Chef Gordon Ramsay judges the week.
// Once a week closes, the famous (and famously furious) chef sweeps in, reads
// the whole gathered week, and hands out awards in full sweary glory. On the
// live site a real brain at /api/tg-ramsay does the judging; in preview or on a
// dead line a generous demo roast steps in, so the ceremony NEVER fails to land.
// Same proven race-a-real-call-against-a-demo-timer shape as the Oliver duels.
// ============================================================

// Compact the trawled week into a slim, judge-ready summary (no heavy photo
// blobs, just the words and the tallies the chef roasts on).
function roastSummary(week) {
  const slimClaims = (week.claims || []).map((c) => ({
    by: c.by, task: c.taskTitle, caption: c.caption, taunt: c.taunt,
    hasPhoto: !!c.photo, overturned: !!c.overturned,
  }));
  const slimMoments = (week.moments || []).map((m) => ({ by: m.by, hasPhoto: !!m.photoUrl, starred: !!m.starred, text: m.text }));
  const slimThoughts = (week.thoughts || []).map((t) => ({ by: t.by, text: t.text, starred: !!t.starred }));
  const slimDares = (week.dares || []).map((d) => ({ from: d.from, to: d.to, text: d.text, result: d.result, secret: d.secret }));
  return {
    wk: week.wk,
    claims: slimClaims, moments: slimMoments, thoughts: slimThoughts, dares: slimDares,
    duels: week.duels || [], quiz: week.quiz || null, scores: week.scores || {},
    counts: week.counts || {},
  };
}

// A generous bank of demo awards in Ramsay's voice: savage, sweary-ish (kept
// this side of the line), with the rare tender flip he's known for. Seeded by
// week so a given week always rolls the same demo roast on both phones.
const RAMSAY_AWARDS_DEMO = [
  { title: "Best Photo", line: "Right, THIS one. Finally. A photo with actual composition, actual light, actual effort. It's not a disaster. I'm genuinely, painfully proud. Don't let it go to your head." },
  { title: "Worst Quip", line: "That caption. THAT caption. I've read shopping lists with more wit. It's dry, it's limp, it's beige. My nan taunts harder than that, and she's been gone twelve years." },
  { title: "Laziest Effort of the Week", line: "You call that a claim? A blurry thumb over a signboard? I've seen more effort from a microwave. Absolutely pathetic. Do it again and mean it next time." },
  { title: "The Bottler's Medal", line: "Handed a dare and you FOLDED. Ducked it like a coward and mumbled some feeble little secret. Michael Oliver wasn't impressed and neither am I. Spineless. Beautiful, but spineless." },
  { title: "Chef's Kiss (rare, savour it)", line: "I don't say this often, so listen. That moment, that little snapshot of the two of you settling into a new life on the other side of the world? That's lovely. Genuinely. Now get out of my kitchen before I get emotional." },
  { title: "Most Deluded Taunt", line: "The confidence. The sheer, unearned confidence in that taunt. You're losing, mate. You're behind. And still you're chirping like you've won the treble. Extraordinary." },
  { title: "The Empty Plate Award", line: "A whole week and THIS is what you brought me? Barely a claim, barely a word. It's like ordering a tasting menu and being served a cream cracker. Fill the plate next week or don't bother." },
  { title: "Sizzle of the Week", line: "Okay. OKAY. That was actually good. Quick thinking, sharp snap, proper cheek in the caption. You've got a bit of fire in you after all. I hate that I'm impressed." },
];

// Seeded pick so a week's demo roast is stable on both phones.
function demoRoast(wk, week) {
  const seed = "ramsay-wk" + wk;
  const pool = seededShuffle(RAMSAY_AWARDS_DEMO, seed);
  const n = Math.min(pool.length, Math.max(3, Math.min(5, (week && week.total) ? Math.ceil(week.total / 2) : 4)));
  const leader = (week && week.scores)
    ? (week.scores.Hammy === week.scores.Naddy ? "draw" : (week.scores.Hammy > week.scores.Naddy ? "Hammy" : "Naddy"))
    : "draw";
  const intro = leader === "draw"
    ? "Right, you two. Dead level this week. A DRAW. Nobody wins, nobody loses, everybody disappoints me equally. Let's get into it."
    : leader + " edged it this week, and don't they know it. But leading isn't the same as impressing me, so wipe that grin off. Awards. Now.";
  return { chef: "Gordon Ramsay", demo: true, intro: intro, awards: pool.slice(0, n) };
}

// Its own storage so a week's roast is computed ONCE and remembered, never
// re-rolled each time the scrapbook opens. Cross-phone via the same shared book.
function roastKey(wk) { return "tg_roast_wk" + wk; }
function loadRoast(wk) {
  try { const r = JSON.parse(localStorage.getItem(roastKey(wk)) || "null"); return r || null; }
  catch (e) { return null; }
}
function saveRoast(wk, roast) {
  try { localStorage.setItem(roastKey(wk), JSON.stringify(roast || null)); } catch (e) {}
}

// Fetch (or generate) the week's roast. Real brain on the live site, demo
// fallback otherwise, cached once settled. Resolves via onDone(roast).
function fetchRoast(wk, week, onDone) {
  const cached = loadRoast(wk);
  if (cached) { onDone(cached); return; }

  let settled = false;
  function finish(roast) {
    if (settled) return; settled = true;
    saveRoast(wk, roast);
    onDone(roast);
  }
  // demo safety net: if the real chef hasn't answered in 6s, serve the demo.
  const demoTimer = setTimeout(() => finish(demoRoast(wk, week)), 6000);

  try {
    fetch("/api/tg-ramsay", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(roastSummary(week)),
    })
      .then((r) => r.ok ? r.json() : Promise.reject())
      .then((data) => {
        clearTimeout(demoTimer);
        if (data && Array.isArray(data.awards) && data.awards.length) {
          finish({ chef: "Gordon Ramsay", demo: false, intro: data.intro || "", awards: data.awards });
        } else {
          finish(demoRoast(wk, week));
        }
      })
      .catch(() => { /* demo timer handles it */ });
  } catch (e) { /* demo timer handles it */ }
}


// ---------- auto taunt bank (an optional cheeky jab, auto if left blank) ----------
function autoTaunt(task, who) {
  const other = who === "Hammy" ? "Naddy" : "Hammy";
  const opts = [
    `Better luck next time, ${other}.`,
    `That one's off the board, ${other}. Slow hands.`,
    `${other} was still deciding. I decided.`,
    `Imagine not claiming this one, ${other}.`,
    `One for me, none for you, ${other}.`,
  ];
  return pick(opts);
}

// ---------- the claim sheet: photo + caption + optional taunt + share ----------
function ClaimSheet({ task, who, onDone, onClose }) {
  const [photo, setPhoto] = useState(null);   // data URL preview (device-local)
  const [ownCap, setOwnCap] = useState("");
  const [taunt, setTaunt] = useState("");
  const fileRef = useRef(null);

  // Writing your own caption is the whole point now. If someone dashes off a
  // claim and leaves it blank, a quiet neutral line stands in so the scrapbook
  // entry is never wordless, but it never gets in the way of your own words.
  const fallbackCap = task.title + ": done. +" + task.pts + " for " + PLAYERS[who].name + ".";
  const caption = ownCap.trim() || fallbackCap;

  function onFile(e) {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => setPhoto(String(r.result));
    r.readAsDataURL(f);
  }

  function confirm(share) {
    onDone({
      photo: photo || null,
      caption: caption,
      taunt: taunt.trim() || autoTaunt(task, who),
      share: !!share,
    });
  }

  const p = PLAYERS[who];
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 60, display: "flex", flexDirection: "column",
      justifyContent: "flex-end", background: "rgba(74,59,51,.4)",
      backdropFilter: "blur(3px)", WebkitBackdropFilter: "blur(3px)",
    }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: T.cream, borderTopLeftRadius: 26, borderTopRightRadius: 26,
        padding: "20px 20px 26px", maxHeight: "92vh", overflowY: "auto",
        animation: "tgFadeUp .3s ease both", boxShadow: "0 -12px 40px rgba(74,59,51,.22)",
      }}>
        <div style={{ width: 40, height: 4, borderRadius: 2, background: T.peach, margin: "0 auto 16px" }} />

        <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".14em", textTransform: "uppercase", color: p.colour }}>
          {p.name} claims · +{task.pts}{task.team ? " (both score)" : ""}
        </div>
        <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 20, color: T.ink, lineHeight: 1.25, marginTop: 6 }}>
          {task.title}
        </div>

        {/* photo proof */}
        <div style={{ marginTop: 16 }}>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onFile} style={{ display: "none" }} />
          {photo ? (
            <div onClick={() => fileRef.current && fileRef.current.click()} style={{
              borderRadius: 16, overflow: "hidden", border: "2px solid " + T.line, cursor: "pointer",
            }}>
              <img src={photo} alt="proof" style={{ width: "100%", display: "block", maxHeight: 260, objectFit: "cover" }} />
            </div>
          ) : (
            <button onClick={() => fileRef.current && fileRef.current.click()} style={{
              width: "100%", border: "2px dashed " + T.peach, background: T.card, borderRadius: 16,
              padding: "26px 16px", cursor: "pointer", fontFamily: FH, fontWeight: 700, fontSize: 15, color: T.inkSoft,
            }}>
              Snap the proof
              <span style={{ display: "block", fontFamily: FB, fontWeight: 600, fontSize: 12, color: T.inkSoft, marginTop: 4 }}>
                Photo evidence, or the VAR booth may come calling.
              </span>
            </button>
          )}
        </div>

        {/* your caption, in your own words */}
        <div style={{ marginTop: 18 }}>
          <div style={{ fontFamily: FM, fontSize: 9.5, letterSpacing: ".12em", textTransform: "uppercase", color: T.inkSoft, marginBottom: 8 }}>
            Your caption
          </div>
          <textarea value={ownCap} onChange={(e) => setOwnCap(e.target.value)} rows={3}
            placeholder="Your own words. Make them count, the chef is watching."
            style={{ width: "100%", fontFamily: FB, fontSize: 14, color: T.ink, background: T.card, border: "1px solid " + T.line, borderRadius: 12, padding: "12px 14px", resize: "vertical", outline: "none" }} />
        </div>

        {/* optional taunt */}
        <div style={{ marginTop: 14 }}>
          <input value={taunt} onChange={(e) => setTaunt(e.target.value)}
            placeholder="Optional taunt (or we'll auto-generate one)"
            style={{ width: "100%", fontFamily: FB, fontSize: 13, color: T.ink, background: T.card, border: "1px solid " + T.line, borderRadius: 12, padding: "11px 14px", outline: "none" }} />
        </div>

        {/* actions */}
        <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 10 }}>
          <Btn onClick={() => confirm(false)} style={{ width: "100%" }}>
            Claim it{task.team ? " (both score)" : " · +" + task.pts}
          </Btn>
          <button onClick={() => confirm(true)} style={{
            width: "100%", cursor: "pointer", background: "#0a7aff", border: "none", borderRadius: 16,
            padding: "13px 0", fontFamily: FH, fontWeight: 700, fontSize: 14, color: "#fff",
          }}>Claim & share to Bluesky</button>
          <button onClick={onClose} style={{
            width: "100%", cursor: "pointer", background: "transparent", border: "none",
            padding: "6px 0", fontFamily: FH, fontWeight: 700, fontSize: 13, color: T.inkSoft,
          }}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

            <div style={{ marginTop: 5, fontFamily: FB, fontSize: 12.5, color: T.ink, lineHeight: 1.55 }}>
              {ap.by ? (PLAYERS[ap.by] ? PLAYERS[ap.by].name : ap.by) + " sent it upstairs. " : ""}
              {ap.result === "overturned"
                ? "The evidence didn't hold up, so the claim fell."
                : "The claim was good, so the appeal backfired."}
            </div>
          </div>
        ) : null}

        {/* actions */}
        <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 10 }}>
          <button onClick={() => onShare && onShare(task, claim)} style={{
            width: "100%", cursor: "pointer", background: "#0a7aff", border: "none", borderRadius: 16,

            padding: "6px 0", fontFamily: FH, fontWeight: 700, fontSize: 13, color: T.inkSoft,
          }}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ---------- THE DUEL ARENA: the big one, as a judged head-to-head ----------
// Replaces the ordinary big-tier card. Both players submit a photo (resubmit as
// often as they like, latest wins) before Friday 10pm. At the cutoff, Michael
// Oliver judges both at once and crowns a winner with a funny written verdict.
function DuelArena({ now, wk, bigTask, who, onUploadPhoto, onVerdictBanked, spectating }) {
  const [duel, setDuel] = useState(() => loadDuel(wk));
  const [judging, setJudging] = useState(false);
  const [mutter, setMutter] = useState("");
  const fileRef = useRef(null);

  const open = duelWindowOpen(now);
  const closed = !open;
  const meIn = hasSubmitted(duel, who);
  const other = who === "Hammy" ? "Naddy" : "Hammy";
  const otherIn = hasSubmitted(duel, other);
  const verdict = duel.verdict || null;

  // A little live countdown, refreshed each minute while the window's open.
  const [, tick] = useState(0);
  useEffect(() => {
    if (!open) return;
    const t = setInterval(() => tick((n) => n + 1), 60000);
    return () => clearInterval(t);
  }, [open]);

  function onFile(e) {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      const dataUrl = String(r.result);
      const next = submitDuelPhoto(wk, who, dataUrl);
      setDuel({ ...next });
      if (onUploadPhoto) onUploadPhoto(wk, who, dataUrl); // stamp a public URL for the judge
    };
    r.readAsDataURL(f);
  }

  // Michael Oliver's deliberation mutters, for the judging beat.
  const MUTTERS = [
    "Consulting the monitor...", "Checking the angles...", "One moment, please...",
    "A fine margin, this...", "Reviewing the footage...", "Hmm. Interesting choices...",
  ];
  function runJudgment() {
    if (judging || verdict) return;
    setJudging(true);
    let i = 0;
    setMutter(MUTTERS[0]);
    const mut = setInterval(() => { i++; setMutter(MUTTERS[i % MUTTERS.length]); }, 900);
    judgeDuel(now, duel, bigTask, (result) => {
      clearInterval(mut);
      const banked = { ...loadDuel(wk), verdict: { ...result, at: Date.now() } };
      saveDuel(wk, banked);
      setDuel(banked);
      setJudging(false);
      // Bank the win into the weekly tally / audit so scoring + streaks see it.
      if (onVerdictBanked) onVerdictBanked({ wk: wk, winner: result.winner, reason: result.reason, task: bigTask });
    });
  }

  const accent = "#d6336c"; // the big-tier pink
  const p = PLAYERS[who];

  return (
    <div style={{ background: T.card, border: "1px solid " + T.line, borderRadius: 16, overflow: "hidden" }}>
      {/* header */}
      <div style={{ borderLeft: "4px solid " + accent, padding: "14px 15px 12px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <span>
            <span style={{ display: "block", fontFamily: FH, fontWeight: 700, fontSize: 16, color: T.ink }}>The big one · a duel</span>
            <span style={{ display: "block", fontFamily: FB, fontSize: 11.5, color: T.inkSoft, marginTop: 1 }}>
              both submit a photo · Michael Oliver judges · winner takes {DUEL_WIN_PTS}
            </span>
          </span>
        </div>

        {/* the venue this week — the whole box opens it in Maps */}
        {bigTask ? (
          <div
            onClick={() => { const u = mapsUrlForTask(bigTask); if (u && typeof window !== "undefined") window.open(u, "_blank", "noopener"); }}
            style={{ marginTop: 11, background: "rgba(214,51,108,.06)", border: "1px solid rgba(214,51,108,.18)", borderRadius: 12, padding: "10px 12px", cursor: bigTask.place ? "pointer" : "default" }}
            title={bigTask.place ? "Open in Google Maps" : undefined}>
            <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 14.5, color: T.ink }}>{bigTask.title}</div>
            <div style={{ fontFamily: FB, fontSize: 12, color: T.ink, opacity: .85, lineHeight: 1.5, marginTop: 3 }}>{bigTask.blurb}</div>
            {bigTask.place ? (
              <div style={{ fontFamily: FM, fontSize: 10.5, color: accent, marginTop: 7, textDecoration: "underline", textDecorationColor: "rgba(214,51,108,.35)", textUnderlineOffset: 2 }}>📍 {bigTask.place}{bigTask.area ? " · " + bigTask.area : ""}</div>
            ) : null}
          </div>
        ) : null}

        {/* countdown / status line */}
        <div style={{ marginTop: 11, fontFamily: FM, fontSize: 11, letterSpacing: ".04em", color: open ? accent : T.inkSoft }}>
          {open ? "⏱ " + duelTimeLeftLabel(now) : "⏱ submissions closed (Friday 10pm)"}
        </div>
      </div>

      {/* the two submission slots */}
      <div style={{ padding: "4px 15px 14px", display: "flex", gap: 10 }}>
        {["Hammy", "Naddy"].map((player) => {
          const inYet = hasSubmitted(duel, player);
          const isWinner = verdict && verdict.winner === player;
          const isMe = player === who;
          return (
            <div key={player} style={{
              flex: 1, borderRadius: 12, padding: "11px 10px", textAlign: "center",
              background: isWinner ? "rgba(46,160,90,.1)" : T.cream,
              border: "1px solid " + (isWinner ? "rgba(46,160,90,.5)" : T.line),
            }}>
              <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 13, color: PLAYERS[player].colour }}>{player}</div>
              <div style={{ marginTop: 6, height: 44, display: "flex", alignItems: "center", justifyContent: "center" }}>
                {duel[player] && duel[player].photo ? (
                  <div style={{ width: 44, height: 44, borderRadius: 8, overflow: "hidden", border: "1px solid " + T.line }}>
                    <img src={duel[player].photo} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                  </div>
                ) : (
                  <span style={{ fontFamily: FB, fontSize: 11, color: T.inkSoft, fontStyle: "italic" }}>no photo yet</span>
                )}
              </div>
              <div style={{ marginTop: 5, fontFamily: FM, fontSize: 9.5, letterSpacing: ".06em", color: isWinner ? "#2ea05a" : (inYet ? T.inkSoft : "#c99") }}>
                {isWinner ? "WINNER 🏆" : (inYet ? "SUBMITTED" : "WAITING")}
              </div>
            </div>
          );
        })}
      </div>

      {/* action area: submit (while open) / verdict (once judged) */}
      <div style={{ padding: "0 15px 16px" }}>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onFile} style={{ display: "none" }} />

        {open && !verdict && spectating ? (
          <div style={{
            width: "100%", borderRadius: 12, padding: "12px 0", textAlign: "center",
            background: T.cream, border: "1px dashed " + T.line,
            fontFamily: FB, fontSize: 11.5, color: T.inkSoft, lineHeight: 1.5,
          }}>
            👀 The players submit their photos here · you're watching
          </div>
        ) : open && !verdict ? (
          <div>
            <button onClick={() => fileRef.current && fileRef.current.click()} style={{
              width: "100%", cursor: "pointer", background: meIn ? T.cream : accent,
              border: "1px solid " + accent, borderRadius: 12, padding: "12px 0",
              fontFamily: FH, fontWeight: 700, fontSize: 14, color: meIn ? accent : "#fff",
            }}>
              {meIn ? "Resubmit your photo ›" : "Submit your photo ›"}
            </button>
            <div style={{ marginTop: 8, fontFamily: FB, fontSize: 11.5, color: T.inkSoft, textAlign: "center", lineHeight: 1.5 }}>
              {meIn
                ? "Yours is in. Change it as many times as you like before Friday 10pm — the latest one is what gets judged."
                : "Snap the big one and submit. You can resubmit a better shot any time before Friday 10pm."}
            </div>
          </div>
        ) : null}

        {closed && !verdict && !judging && spectating ? (
          <div style={{
            width: "100%", borderRadius: 12, padding: "13px 0", textAlign: "center",
            background: T.cream, border: "1px dashed " + T.line,
            fontFamily: FB, fontSize: 11.5, color: T.inkSoft, lineHeight: 1.5,
          }}>
            👀 The window's shut · the players will summon the verdict
          </div>
        ) : closed && !verdict && !judging ? (
          <div>
            <button onClick={runJudgment} style={{
              width: "100%", cursor: "pointer", background: "#1e2a38", border: "none",
              borderRadius: 12, padding: "13px 0", fontFamily: FH, fontWeight: 700, fontSize: 14, color: "#fff",
            }}>
              Summon Michael Oliver ⚖️
            </button>
            <div style={{ marginTop: 8, fontFamily: FB, fontSize: 11.5, color: T.inkSoft, textAlign: "center", lineHeight: 1.5 }}>
              The window's shut. Let the man look at the monitor and settle it.
            </div>
          </div>
        ) : null}

        {judging ? (
          <div style={{ textAlign: "center", padding: "6px 0" }}>
            <div style={{
              width: 40, height: 40, borderRadius: 11, background: "#1e2a38", margin: "0 auto",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: FM, fontWeight: 700, fontSize: 14, color: "#fff", animation: "tgPulse 1.1s ease-in-out infinite",
            }}>VAR</div>
            <div style={{ marginTop: 10, fontFamily: FB, fontSize: 13, color: T.ink, fontStyle: "italic" }}>{mutter}</div>
          </div>
        ) : null}

        {verdict ? (
          <div style={{ background: "#1e2a38", borderRadius: 14, padding: "15px 15px 16px", animation: "tgPop .5s ease both" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 9 }}>
              <div style={{ width: 30, height: 30, borderRadius: 8, background: "#0f1720", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FM, fontWeight: 700, fontSize: 11, color: "#fff" }}>VAR</div>
              <div>
                <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 13.5, color: "#fff", lineHeight: 1 }}>Michael Oliver's verdict</div>
                <div style={{ fontFamily: FM, fontSize: 8.5, color: "rgba(255,255,255,.5)", letterSpacing: ".1em", marginTop: 3 }}>THE DECISION IS FINAL</div>
              </div>
            </div>
            {verdict.winner !== "draw" ? (
              <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: "#fff", marginBottom: 7, borderRadius: 8, padding: "6px 8px", animation: "tgGlow 2.2s ease-in-out .4s 2" }}>
                🏆 {verdict.winner} takes the big one · +{DUEL_WIN_PTS}
              </div>
            ) : (
              <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: "#fff", marginBottom: 7 }}>No contest</div>
            )}
            <div style={{ fontFamily: FB, fontSize: 13, color: "rgba(255,255,255,.9)", lineHeight: 1.55, fontStyle: "italic" }}>
              "{verdict.reason}"
            </div>
            {verdict.demo ? (
              <div style={{ marginTop: 9, fontFamily: FM, fontSize: 9.5, color: "rgba(255,255,255,.4)" }}>
                (demo verdict — the real judging runs on the live site)
              </div>
            ) : null}
          </div>
        ) : null}
      </div>
    </div>
  );
}

            👀 The players answer the theme here · you're watching

            </button>
            <div style={{ marginTop: 8, fontFamily: FB, fontSize: 11.5, color: T.inkSoft, textAlign: "center", lineHeight: 1.5 }}>
              {meIn
                ? "Yours is in. Reinterpret the theme as many times as you like before Friday 10pm; the latest shot is what gets judged."
                : "Answer the theme however you see it and submit. You can resubmit a better idea any time before Friday 10pm."}
            </div>

        {closed && !verdict && !judging && spectating ? (

            width: "100%", borderRadius: 12, padding: "13px 0", textAlign: "center",

            <button onClick={runJudgment} style={{
              width: "100%", cursor: "pointer", background: "#1e2a38", border: "none",
              borderRadius: 12, padding: "13px 0", fontFamily: FH, fontWeight: 700, fontSize: 14, color: "#fff",
            }}>
              Summon Michael Oliver ⚖️
            </button>
            <div style={{ marginTop: 8, fontFamily: FB, fontSize: 11.5, color: T.inkSoft, textAlign: "center", lineHeight: 1.5 }}>

        {judging ? (
          <div style={{ textAlign: "center", padding: "6px 0" }}>

              width: 40, height: 40, borderRadius: 11, background: "#1e2a38", margin: "0 auto",

        {verdict ? (

            <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 9 }}>

              <div>
                <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 13.5, color: "#fff", lineHeight: 1 }}>Michael Oliver's verdict</div>
                <div style={{ fontFamily: FM, fontSize: 8.5, color: "rgba(255,255,255,.5)", letterSpacing: ".1em", marginTop: 3 }}>ON THE THEME</div>

                🏆 {verdict.winner} wins the theme · +{THEME_DUEL_PTS}

              <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: "#fff", marginBottom: 7 }}>No contest</div>
            )}
            <div style={{ fontFamily: FB, fontSize: 13, color: "rgba(255,255,255,.9)", lineHeight: 1.55, fontStyle: "italic" }}>

            </div>
            {verdict.demo ? (
              <div style={{ marginTop: 9, fontFamily: FM, fontSize: 9.5, color: "rgba(255,255,255,.4)" }}>
                (demo verdict; the real judging runs on the live site)

          </div>
        ) : null}
      </div>
    </div>
  );
}

// ---------- THE QUIZ ARENA: Coach Saliba's weekly Thai quiz duel ----------
// An honest test of who knows their Thai better. Each player takes the same
// seeded quiz independently; higher score wins. Unlike the photo duels there's
// no judging, because language has right answers. Coach Saliba (Arsenal red)
// presides. A player who's already taken it sees their result and waits for the
// other; once both are in, the winner is shown.
function QuizArena({ now, wk, who, spectating }) {
  const [data, setData] = useState(() => loadQuiz(wk));
  const quiz = quizForWeek(wk, now);
  const meDone = quizDone(data, who);
  const other = who === "Hammy" ? "Naddy" : "Hammy";
  const otherDone = quizDone(data, other);

  const phase = quizPhase(now); // "before" | "open" | "closed"

  // in-progress quiz state (only used while actually taking it)
  const [taking, setTaking] = useState(false);
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [picked, setPicked] = useState(null); // the option index tapped, pre-confirm

  const accent = PLAYERS[who].club === "Arsenal" ? "#e0577a" : "#c1373f"; // Saliba red-ish
  const salibaRed = "#c1373f";

  function startQuiz() {
    setTaking(true); setQIdx(0); setAnswers([]); setPicked(null);
  }
  function choose(optIdx) { setPicked(optIdx); }
  function confirmAnswer() {
    if (picked == null) return;
    const q = quiz[qIdx];
    const correct = !!(q.options[picked] && q.options[picked].correct);
    const nextAnswers = answers.concat([{ picked: picked, correct: correct }]);
    setAnswers(nextAnswers);
    setPicked(null);
    if (qIdx + 1 < quiz.length) {
      setQIdx(qIdx + 1);
    } else {
      // finished: tally and bank
      const score = nextAnswers.filter((a) => a.correct).length;
      const nextData = submitQuiz(wk, who, nextAnswers, score);
      setData({ ...nextData });
      setTaking(false);
    }
  }

  // ---- header (always shown) ----
  const headerSub =
    phase === "before" ? ("test day is Friday · " + (daysUntilQuiz(now) === 1 ? "1 day to go" : daysUntilQuiz(now) + " days to go"))
    : phase === "open" ? ("five questions · higher score wins · " + quizTimeLeftLabel(now))
    : "this week's test has closed";
  const header = (
    <div style={{ borderLeft: "4px solid " + salibaRed, padding: "14px 15px 12px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ width: 30, height: 30, borderRadius: 8, background: salibaRed, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FH, fontWeight: 700, fontSize: 13, color: "#fff", flexShrink: 0 }}>ก</div>
        <span>
          <span style={{ display: "block", fontFamily: FH, fontWeight: 700, fontSize: 16, color: T.ink }}>Coach Saliba's quiz duel</span>
          <span style={{ display: "block", fontFamily: FB, fontSize: 11.5, color: T.inkSoft, marginTop: 1 }}>
            {headerSub}
          </span>
        </span>
      </div>
    </div>
  );

  // ---- the quiz-taking view (only valid while the window is open) ----
  if (taking && phase === "open" && quiz.length) {
    const q = quiz[qIdx];
    return (
      <div style={{ background: T.card, border: "1px solid " + T.line, borderRadius: 16, overflow: "hidden" }}>
        {header}
        <div style={{ padding: "6px 15px 16px" }}>
          <div style={{ fontFamily: FM, fontSize: 10, letterSpacing: ".1em", color: T.inkSoft, marginBottom: 8 }}>
            QUESTION {qIdx + 1} OF {quiz.length}
          </div>
          <div style={{ background: "rgba(193,55,63,.05)", border: "1px solid rgba(193,55,63,.15)", borderRadius: 12, padding: "14px 14px", textAlign: "center", marginBottom: 4 }}>
            <div style={{ fontFamily: FB, fontSize: 11.5, color: T.inkSoft, marginBottom: 6 }}>
              {q.style === "recall" ? "Which Thai word means:" : "What does this mean?"}
            </div>
            <div style={{ fontFamily: FH, fontWeight: 700, fontSize: q.style === "recall" ? 22 : 26, color: T.ink, lineHeight: 1.2 }}>{q.prompt}</div>
            {q.promptSub ? (
              <div style={{ fontFamily: FM, fontSize: 12, color: salibaRed, marginTop: 4 }}>{q.promptSub}</div>
            ) : null}
          </div>
          <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 8 }}>
            {q.options.map((opt, oi) => (
              <button key={oi} onClick={() => choose(oi)} style={{
                cursor: "pointer", textAlign: "left", padding: "12px 14px", borderRadius: 11,
                background: picked === oi ? salibaRed : T.cream,
                border: "1px solid " + (picked === oi ? salibaRed : T.line),
                fontFamily: q.style === "recall" ? FH : FB, fontWeight: q.style === "recall" ? 700 : 400,
                fontSize: q.style === "recall" ? 17 : 14, color: picked === oi ? "#fff" : T.ink,
              }}>
                {opt.label}{opt.say && picked === oi ? "  (" + opt.say + ")" : ""}
              </button>
            ))}
          </div>
          <button onClick={confirmAnswer} disabled={picked == null} style={{
            marginTop: 14, width: "100%", cursor: picked == null ? "default" : "pointer",
            background: picked == null ? T.line : salibaRed, border: "none", borderRadius: 12,
            padding: "12px 0", fontFamily: FH, fontWeight: 700, fontSize: 14, color: "#fff", opacity: picked == null ? 0.6 : 1,
          }}>
            {qIdx + 1 < quiz.length ? "Next question ›" : "Finish quiz ›"}
          </button>
        </div>
      </div>
    );
  }

  // ---- the resting view (not currently taking) ----
  const winner = (meDone && otherDone) ? quizWinner(wk) : null;
  const myScore = meDone ? data[who].score : null;
  const theirScore = otherDone ? data[other].score : null;

  // ---- BEFORE test day: lessons still running, quiz not yet open ----
  if (phase === "before") {
    const dtg = daysUntilQuiz(now);
    return (
      <div style={{ background: T.card, border: "1px solid " + T.line, borderRadius: 16, overflow: "hidden" }}>
        {header}
        <div style={{ padding: "6px 15px 16px", textAlign: "center" }}>
          <div style={{ fontSize: 30, lineHeight: 1, marginBottom: 8 }}>📚</div>
          <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: T.ink, marginBottom: 6 }}>
            Class is still in session
          </div>
          <div style={{ fontFamily: FB, fontSize: 12.5, color: T.inkSoft, lineHeight: 1.6 }}>
            Coach Saliba sets the weekly test on <strong style={{ color: salibaRed }}>Friday</strong>, drawn from the words you learn this week, and it stays open until <strong style={{ color: salibaRed }}>Sunday 10pm</strong>. {dtg === 1 ? "Just one more day of lessons" : dtg + " more days of lessons"} to go, so keep your daily streak alive and study hard. The winner banks {QUIZ_DUEL_PTS} toward the week.
          </div>
        </div>
      </div>
    );
  }

  // ---- CLOSED: the window has passed for this week ----
  if (phase === "closed") {
    const anyTook = meDone || otherDone;
    return (
      <div style={{ background: T.card, border: "1px solid " + T.line, borderRadius: 16, overflow: "hidden" }}>
        {header}
        <div style={{ padding: "6px 15px 16px" }}>
          {(meDone && otherDone) ? (
            // both took it: show the final result even though the window's shut
            <div>
              <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
                {["Hammy", "Naddy"].map((player) => {
                  const done = quizDone(data, player);
                  const isWinner = winner && winner === player;
                  const sc = done ? data[player].score : null;
                  return (
                    <div key={player} style={{
                      flex: 1, borderRadius: 12, padding: "11px 10px", textAlign: "center",
                      background: isWinner ? "rgba(46,160,90,.1)" : T.cream,
                      border: "1px solid " + (isWinner ? "rgba(46,160,90,.5)" : T.line),
                    }}>
                      <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 13, color: PLAYERS[player].colour }}>{player}</div>
                      <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 22, color: T.ink, marginTop: 4 }}>{sc + "/" + quiz.length}</div>
                      <div style={{ fontFamily: FM, fontSize: 9, letterSpacing: ".06em", color: isWinner ? "#2ea05a" : T.inkSoft, marginTop: 2 }}>
                        {isWinner ? "WINNER 🏆" : "DONE"}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ fontFamily: FB, fontSize: 12, color: T.inkSoft, textAlign: "center", lineHeight: 1.55 }}>
                The test has closed for this week. {winner === "draw" ? "A dead heat, honours even." : winner + " took the points. See you at next week's class."}
              </div>
            </div>
          ) : (
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 30, lineHeight: 1, marginBottom: 8 }}>🔒</div>
              <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: T.ink, marginBottom: 6 }}>
                The test has closed
              </div>
              <div style={{ fontFamily: FB, fontSize: 12.5, color: T.inkSoft, lineHeight: 1.6 }}>
                {anyTook
                  ? "Only one of you sat this week's test before the Sunday 10pm deadline, so Coach Saliba is holding the result over. He'll say no more about it. Fresh words and a fresh test next week."
                  : "Neither of you made it to Coach Saliba's test before the Sunday 10pm deadline this week. No harm done, but no points either. He'll ring the bell again next Friday."}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ---- OPEN: it's Friday-through-Sunday, sit the test now ----
  return (
    <div style={{ background: T.card, border: "1px solid " + T.line, borderRadius: 16, overflow: "hidden" }}>
      {header}
      <div style={{ padding: "4px 15px 16px" }}>
        {/* both players' status */}
        <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
          {["Hammy", "Naddy"].map((player) => {
            const done = quizDone(data, player);
            const isWinner = winner && winner === player;
            const sc = done ? data[player].score : null;
            return (
              <div key={player} style={{
                flex: 1, borderRadius: 12, padding: "11px 10px", textAlign: "center",
                background: isWinner ? "rgba(46,160,90,.1)" : T.cream,
                border: "1px solid " + (isWinner ? "rgba(46,160,90,.5)" : T.line),
              }}>
                <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 13, color: PLAYERS[player].colour }}>{player}</div>
                <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 22, color: T.ink, marginTop: 4 }}>
                  {done ? sc + "/" + quiz.length : "–"}
                </div>
                <div style={{ fontFamily: FM, fontSize: 9, letterSpacing: ".06em", color: isWinner ? "#2ea05a" : T.inkSoft, marginTop: 2 }}>
                  {isWinner ? "WINNER 🏆" : (done ? "DONE" : "NOT YET")}
                </div>
              </div>
            );
          })}
        </div>

        {!meDone && spectating ? (
          <div style={{
            width: "100%", borderRadius: 12, padding: "13px 0", textAlign: "center",
            background: T.cream, border: "1px dashed " + T.line,
            fontFamily: FB, fontSize: 11.5, color: T.inkSoft, lineHeight: 1.5,
          }}>
            👀 Coach Saliba's test is for Hammy and Naddy · you're watching
          </div>
        ) : !meDone ? (
          <div>
            <button onClick={startQuiz} style={{
              width: "100%", cursor: "pointer", background: salibaRed, border: "none",
              borderRadius: 12, padding: "13px 0", fontFamily: FH, fontWeight: 700, fontSize: 14, color: "#fff",
            }}>
              Take this week's quiz ›
            </button>
            <div style={{ marginTop: 8, fontFamily: FB, fontSize: 11.5, color: T.inkSoft, textAlign: "center", lineHeight: 1.5 }}>
              Coach Saliba's set ten from this week's words, and he's not gone easy. No peeking at the school notes, now.
            </div>
          </div>
        ) : !otherDone ? (
          <div style={{ textAlign: "center", fontFamily: FB, fontSize: 12.5, color: T.inkSoft, lineHeight: 1.55, padding: "4px 4px 2px" }}>
            You scored <strong style={{ color: T.ink }}>{myScore}/{quiz.length}</strong>. Now we wait for {other} to take it. Coach Saliba is brewing tea.
          </div>
        ) : (
          <div style={{ background: "#1e2a38", borderRadius: 14, padding: "14px 15px", animation: "tgPop .5s ease both" }}>
            <div style={{ fontFamily: FM, fontSize: 8.5, letterSpacing: ".14em", color: "rgba(255,255,255,.5)", marginBottom: 6 }}>COACH SALIBA'S RULING</div>
            {winner !== "draw" ? (
              <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: "#fff", marginBottom: 6 }}>
                🏆 {winner} wins the quiz · +{QUIZ_DUEL_PTS}
              </div>
            ) : (
              <div style={{ fontFamily: FH, fontWeight: 700, fontSize: 15, color: "#fff", marginBottom: 6 }}>A dead heat! Honours even.</div>
            )}
            <div style={{ fontFamily: FB, fontSize: 12.5, color: "rgba(255,255,255,.85)", lineHeight: 1.55 }}>
              {winner === "draw"
                ? "Identical scores, identical timing. Coach Saliba is quietly delighted you've both been paying attention."
                : (myScore === theirScore
                    ? winner + " edged it on the clock, level on score. Coach Saliba admires a quick, sure answer."
                    : winner + " simply knew more Thai this week. " + (winner === who ? "Well studied." : "Time to hit the school notes."))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- THE BOARD SCREEN ----------
function Board({ now, who, claims, setClaims, wildcard, wk: wkProp, onShare, onAudit, onVarVerdict, spectating }) {
  const wk = wkProp != null ? wkProp : weekNumber(now);
  const { groups, dealt } = dealtBoard(wk);
  const festival = activeFestival(now);        // the live festival, if any
  const festTasks = festivalTasks(now);        // its special claimable challenges
  const [openTier, setOpenTier] = useState("quick"); // quick open by default; it's the everyday one
  const [claiming, setClaiming] = useState(null);     // task being claimed
  const [appealing, setAppealing] = useState(null);   // task being appealed
  const [doubleHit, setDoubleHit] = useState(null);   // {title, pts} when a double lands
  const [detailTask, setDetailTask] = useState(null); // claimed task whose detail is open
  const [guestNote, setGuestNote] = useState(false);  // gentle "you're just watching" nudge

  // Guest-aware claim opener: a real player opens the claim sheet as normal; a
  // watching guest gets a warm little note instead. A single chokepoint, so every
  // claim button across the board routes through this one gentle guard.
  function tryClaim(task) {
    if (spectating) { setGuestNote(true); return; }
    setClaiming(task);
  }

  const myAppealsLeft = appealsLeft(claims, who);

  // the pool the daily-double checks against (board + live wildcard)
  const doublePool = wildcard ? dealt.concat([wildcard]) : dealt;

  // Upload a claim's photo to a public URL (for VAR + Bluesky). Data-URL only
  // lives on the phone; the backend needs a fetchable URL. Fires in the
  // background so the claim registers instantly; the URL fills in when ready.
  // On the live site this hits /api/tg-photo; in preview it simply no-ops.
  function uploadPhotoInBackground(taskObj, dataUrl) {
    const taskId = taskObj && taskObj.id ? taskObj.id : taskObj;
    if (!dataUrl || dataUrl.indexOf("data:") !== 0) return;
    try {
      const comma = dataUrl.indexOf(",");
      const meta = dataUrl.slice(5, comma);         // e.g. image/jpeg;base64
      const b64 = dataUrl.slice(comma + 1);
      const ext = meta.indexOf("png") >= 0 ? "png" : meta.indexOf("webp") >= 0 ? "webp" : "jpg";
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      fetch("/api/tg-photo?ext=" + ext, {
        method: "POST",
        headers: { "Content-Type": "application/octet-stream" },
        body: bytes,
      })
        .then((r) => r.ok ? r.json() : Promise.reject())
        .then((data) => {
          if (!data || !data.url) return;
          // stamp the public URL onto the stored claim
          setClaims(wk, (prev) => {
            const cur = prev && prev[taskId];
            if (!cur) return prev;
            const updated = { ...cur, photoUrl: data.url };
            // also update the shared audit entry with the public photo URL
            if (onAudit) {
              const t = (typeof taskObj === "object" && taskObj) ? taskObj : { id: taskId, title: "" };
              onAudit(t, updated, data.url);
            }
            return { ...prev, [taskId]: updated };
          });
        })
        .catch(() => { /* preview / offline: fine, VAR falls back to demo */ });
    } catch (e) { /* preview or unsupported: no-op */ }
  }

  // Upload a duel submission's photo to a public URL, then stamp that URL onto
  // the stored duel entry so Michael Oliver can actually fetch and judge it.
  // Same tg-photo endpoint as claims; no-ops gracefully in preview.
  function uploadDuelPhotoInBackground(duelWk, player, dataUrl) {
    if (!dataUrl || dataUrl.indexOf("data:") !== 0) return;
    try {
      const comma = dataUrl.indexOf(",");
      const meta = dataUrl.slice(5, comma);
      const b64 = dataUrl.slice(comma + 1);
      const ext = meta.indexOf("png") >= 0 ? "png" : meta.indexOf("webp") >= 0 ? "webp" : "jpg";
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      fetch("/api/tg-photo?ext=" + ext, {
        method: "POST",
        headers: { "Content-Type": "application/octet-stream" },
        body: bytes,
      })
        .then((r) => r.ok ? r.json() : Promise.reject())
        .then((data) => {
          if (!data || !data.url) return;
          const duel = loadDuel(duelWk);
          if (duel[player]) { duel[player].photoUrl = data.url; saveDuel(duelWk, duel); }
        })
        .catch(() => { /* preview / offline: fine, judge falls back to demo */ });
    } catch (e) { /* preview or unsupported: no-op */ }
  }

  // Sibling uploader for the photo-theme duel: identical, but stamps the public
  // URL onto the THEME storage so its judge can reach the photo on the live site.
  function uploadThemePhotoInBackground(duelWk, player, dataUrl) {
    if (!dataUrl || dataUrl.indexOf("data:") !== 0) return;
    try {
      const comma = dataUrl.indexOf(",");
      const meta = dataUrl.slice(5, comma);
      const b64 = dataUrl.slice(comma + 1);
      const ext = meta.indexOf("png") >= 0 ? "png" : meta.indexOf("webp") >= 0 ? "webp" : "jpg";
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      fetch("/api/tg-photo?ext=" + ext, {
        method: "POST",
        headers: { "Content-Type": "application/octet-stream" },
        body: bytes,
      })
        .then((r) => r.ok ? r.json() : Promise.reject())
        .then((data) => {
          if (!data || !data.url) return;
          const duel = loadThemeDuel(duelWk);

// ============================================================
// THE MEMORY WALL — the app's quiet, reflective heart.
// A shared space, apart from the competitive board, where either of you can pen
// an in-the-moment thought or snap a free (point-free) photo. Every entry flows
// into the shared book (via updateShared), so whatever one of you adds, the
// other sees within a heartbeat. Each can be shared to Bluesky, and each can be
// starred so the best of them are curated into the week's scrapbook later.
//
// A memory entry:
//   { id, by, at, text, photo?, photoUrl?, sharedToBluesky?, starred? }
// ============================================================

// gently turn a data-URL photo into a public URL in the background (reuses the
// same tg-photo uploader the claims use). Stamps photoUrl onto the entry when
// it lands, so Bluesky sharing and cross-phone viewing work on the live site.
function uploadMemoryPhoto(dataUrl, onUrl) {
  if (!dataUrl || dataUrl.indexOf("data:") !== 0) return;
  try {
    const comma = dataUrl.indexOf(",");
    const meta = dataUrl.slice(5, comma);
    const b64 = dataUrl.slice(comma + 1);
    const ext = meta.indexOf("png") >= 0 ? "png" : meta.indexOf("webp") >= 0 ? "webp" : "jpg";
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    fetch("/api/tg-photo?ext=" + ext, {
      method: "POST",
      headers: { "Content-Type": "application/octet-stream" },
      body: bytes,
    })
      .then((r) => r.ok ? r.json() : Promise.reject())
      .then((data) => { if (data && data.url && onUrl) onUrl(data.url); })
      .catch(() => { /* preview / offline: fine, the local photo still shows */ });
  } catch (e) { /* preview or unsupported: no-op */ }
}

// shrink a picked image to ~1200px and hand back a data-URL (keeps uploads light)
function readMemoryPhoto(file, cb) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const max = 1200;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w >= h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      try { cb(canvas.toDataURL("image/jpeg", 0.82)); }
      catch (e) { cb(reader.result); }
    };
    img.onerror = () => cb(reader.result);
    img.src = reader.result;
  };
  reader.onerror = () => cb(null);
  reader.readAsDataURL(file);
}

function timeAgo(then) {
  const s = Math.floor((Date.now() - then) / 1000);
  if (s < 60) return "just now";
  const m = Math.floor(s / 60);
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  const d = Math.floor(h / 24);
  if (d < 7) return d + "d ago";
  return new Date(then).toLocaleDateString();
}

// ---------- THE MEMORY WALL SCREEN ----------
function MemoryWall({ me, shared, updateShared, onShareToBluesky, spectating }) {
  const memories = (shared && Array.isArray(shared.memories)) ? shared.memories : [];
  const sorted = memories.slice().sort((a, b) => b.at - a.at);

  // Raw photos (big data-URLs) are kept LOCAL to this device, keyed by memory id,
  // purely for instant display. They are NEVER written into the shared book,
  // because that book is fetched every few seconds by both phones and must stay
  // small and fast. Only the slim public photoUrl ever enters the shared state.
  // This is the real cure for "photo posts then vanishes": we were shovelling
  // multi-megabyte image strings into shared state, so saves choked and the next
  // poll wiped the entry. Now the shared payload is tiny.
  const [localPhotos, setLocalPhotos] = useState({});

  function postMemory({ text, photo }) {
    const id = uid();
    const mem = {
      id: id, by: me, at: Date.now(),
      // kind tags the entry for the weekly audit: "thought" (penned) or "moment"
      // (a snapped photo). Claims add "taunt" entries from the board. One unified,
      // judgeable feed for the scrapbook's award ceremony.
      kind: photo ? "moment" : "thought",
      week: weekNumber(Date.now()),
      text: text || "", photoUrl: null,
      // a flag so every device knows a photo is coming, even before its URL lands
      hasPhoto: !!photo,
      sharedToBluesky: false, starred: false,
    };
    // stash the raw image locally for instant display on THIS device only
    if (photo) setLocalPhotos((prev) => ({ ...prev, [id]: photo }));
    // write the slim memory (no heavy data) into the shared book
    updateShared((prev) => {
      const list = (prev && Array.isArray(prev.memories)) ? prev.memories : [];
      return { ...prev, memories: [mem, ...list] };
    });
    // upload the photo to blob storage; when its short URL returns, stamp ONLY
    // that tiny URL into the shared state (never the raw bytes)
    if (photo) {
      uploadMemoryPhoto(photo, (url) => {
        updateShared((prev) => {
          const list = (prev && Array.isArray(prev.memories)) ? prev.memories : [];
          return { ...prev, memories: list.map((m) => m.id === id ? { ...m, photoUrl: url } : m) };
        });
      });
    }
  }

  function toggleStar(mem) {
    updateShared((prev) => {
      const list = (prev && Array.isArray(prev.memories)) ? prev.memories : [];
      return { ...prev, memories: list.map((m) => m.id === mem.id ? { ...m, starred: !m.starred } : m) };
    });
  }

  function removeMemory(mem) {
    updateShared((prev) => {
      const list = (prev && Array.isArray(prev.memories)) ? prev.memories : [];
      return { ...prev, memories: list.filter((m) => m.id !== mem.id) };
    });
  }

  function shareMemory(mem) {
    if (onShareToBluesky) onShareToBluesky(mem);
    updateShared((prev) => {
      const list = (prev && Array.isArray(prev.memories)) ? prev.memories : [];
      return { ...prev, memories: list.map((m) => m.id === mem.id ? { ...m, sharedToBluesky: true } : m) };
    });
  }

  return (
    <div>
      <div style={{ fontFamily: FB, fontSize: 13, color: T.inkSoft, lineHeight: 1.6, marginBottom: 16 }}>
        Your shared wall. Pen a thought or snap a moment, no points, just the two of you.
        Star the good ones and they'll find their way into this week's scrapbook.
      </div>

      <MemoryComposer me={me} onPost={postMemory} spectating={spectating} />

      {sorted.length === 0 ? (
        <div style={{ textAlign: "center", padding: "30px 20px", fontFamily: FB, fontSize: 13.5, color: T.inkSoft, lineHeight: 1.6 }}>
          Nothing on the wall yet. Be the first to pen something, or snap the cats being ridiculous.
        </div>
      ) : (
        sorted.map((mem) => (
          <MemoryCard key={mem.id} mem={mem} me={me}
            photoSrc={localPhotos[mem.id] || mem.photoUrl || null}
            onStar={toggleStar} onShare={shareMemory} onDelete={removeMemory} />
        ))
      )}
    </div>
  );
}

function wordsForToday(now) {

  const seen = {}; const out = [];
  for (let dayAdd = 0; dayAdd < 7; dayAdd++) {
    const d = new Date(monday); d.setDate(d.getDate() + dayAdd);

// ---------- the day's HARDEST word, for the say-it-back challenge ----------
// Coach sets the toughest of the day's three as the one you must say back, so
// the speaking test has real bite. Difficulty is scored honestly from the
// romanisation: more syllables, more tone marks, and greater length all make a
// word harder for a farang tongue. Ties break toward the later word in the day.
function wordDifficulty(w) {
  if (!w || !w.say) return 0;
  const say = w.say;
  const syllables = say.split(/[-\s]/).filter(Boolean).length;
  // tone-marked vowels (the à â á ǎ family) are the real difficulty in Thai
  const toneMarks = (say.match(/[àâáǎèêéěìîíǐòôóǒùûúǔ]/gi) || []).length;
  const length = say.replace(/[-\s]/g, "").length;
  return syllables * 3 + toneMarks * 2 + length * 0.3;
}
function hardestOfDay(words) {
  if (!words || !words.length) return null;
  let best = words[0], bestScore = -1;
  words.forEach((w, i) => {
    const s = wordDifficulty(w) + i * 0.01; // tiny nudge so ties favour the later word
    if (s >= bestScore) { bestScore = s; best = w; }
  });
  return best;
}

// Did the browser's transcript plausibly match the target word? A forgiving
// check: browser speech recognition on Thai from a phone mic is variable and
// cannot truly grade tones, so we reward a genuine, recognisable attempt rather
// than demanding perfection. Matches on the Thai script OR a loose romanised
// resemblance (strip tone marks, compare bare syllables).
function bareRoman(s) {
  return String(s || "").toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // strip combining tone marks
    .replace(/[^a-z]/g, "");
}
function attemptMatches(heard, target) {
  if (!heard || !target) return false;
  const h = String(heard).trim();
  // 1) direct Thai-script hit: the transcript contains the target Thai word
  if (target.thai && h.indexOf(target.thai) !== -1) return true;
  // 2) romanised resemblance: bare syllables overlap meaningfully. BOTH sides
  // must be non-empty first, else an empty bare string (e.g. the browser heard
  // a DIFFERENT Thai word, which strips to nothing) would falsely match.
  const hb = bareRoman(h), tb = bareRoman(target.say);
  if (!tb || hb.length < 2) return false; // nothing romanised to compare against
  if (hb.indexOf(tb) !== -1 || tb.indexOf(hb) !== -1) return true;
  // 3) partial: share a decent run of characters (handles near-misses)
  const shorter = hb.length < tb.length ? hb : tb;
  const longer = hb.length < tb.length ? tb : hb;
  if (shorter.length >= 3) {
    for (let len = shorter.length; len >= 3; len--) {
      for (let i = 0; i + len <= shorter.length; i++) {
        if (longer.indexOf(shorter.substr(i, len)) !== -1) return true;
      }
    }
  }
  return false;
}

  const data = loadSchool(who);
  data.done = data.done || {};
  if (data.done[idx]) return data; // already done today
  data.done[idx] = true;
  // streak: if yesterday was done, extend; else reset to 1
  const yesterday = idx - 1;
  const had = data.lastDay != null && data.lastDay === yesterday;
  data.streak = had ? (data.streak || 0) + 1 : 1;
  data.best = Math.max(data.best || 0, data.streak);
  data.lastDay = idx;
  saveSchool(who, data);
  return data;
}
function doneToday(who, now) {
  const data = loadSchool(who);
  return !!(data.done && data.done[dayIndex(now)]);
}
// Streak is "live" only if the last practised day was today or yesterday.
function liveStreak(who, now) {
  const data = loadSchool(who);
  if (data.lastDay == null) return 0;
  const idx = dayIndex(now);
  if (data.lastDay === idx || data.lastDay === idx - 1) return data.streak || 0;
  return 0;
}

// ---------- speak a Thai word aloud (browser speech synthesis) ----------
// Tries a Thai voice if the phone has one; falls back to default. Live-site and
// most modern phones support this; a graceful no-op otherwise.
function speakThai(text) {
  try {
    if (typeof window === "undefined" || !window.speechSynthesis) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "th-TH";
    u.rate = 0.85;
    const voices = window.speechSynthesis.getVoices();
    const thv = voices.find((v) => v.lang && v.lang.toLowerCase().indexOf("th") === 0);
    if (thv) u.voice = thv;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch (e) { /* no-op */ }
}

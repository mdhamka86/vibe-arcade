<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Tincture Time Apothecary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f2ea;         /* warm cream */
    --surface:#ffffff;    /* clean card */
    --surface2:#efece1;   /* subtle raised */
    --line:#e3ddcd;       /* hairline */
    --line2:#d6cfba;
    --sage:#6f8a6a;       /* brand green */
    --sageDeep:#42583d;   /* headings/deep */
    --sageSoft:#9db396;
    --amber:#c1863a;      /* single warm accent (the maceration) */
    --amberSoft:#e8dcc4;
    --oil:#c2a63f;
    --canna:#5f8a78;
    --ink:#2f342a;        /* text */
    --muted:#7f8574;      /* secondary */
    --danger:#b05a45;
    --r:14px;             /* one restrained radius, not over-rounded */
    --rs:10px;
    --pad:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  #root{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .app{display:flex;flex-direction:column;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;}
  a{color:var(--sageDeep);text-decoration:none;}
  .ic{flex-shrink:0;display:block;}

  /* header: quiet, editorial */
  .hdr{padding:20px var(--pad) 12px;text-align:left;}
  .wordmark{font-family:'Dancing Script',cursive;font-weight:700;font-size:30px;color:var(--sageDeep);line-height:1;}
  .kicker{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--sageSoft);margin-top:4px;}

  /* main scroll area, leaves room for tab bar */
  .main{flex:1;overflow-y:auto;padding-bottom:88px;}
  .screen{padding:4px var(--pad) 16px;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.screen{animation:none;}}

  .screenHead{display:flex;align-items:center;justify-content:space-between;margin:8px 0 18px;}
  h1{font-size:24px;font-weight:700;color:var(--sageDeep);letter-spacing:-.3px;}
  h2{font-size:19px;font-weight:600;color:var(--sageDeep);margin-bottom:16px;display:flex;align-items:center;letter-spacing:-.2px;}
  .lead{color:var(--muted);font-size:14px;margin:-8px 0 16px;}

  /* buttons */
  .btn{border:none;border-radius:var(--rs);font-weight:600;font-size:14px;transition:transform .08s ease,background .15s ease,opacity .15s ease;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .btn:active{transform:scale(.97);}
  .btn.isLocked{opacity:.55;}
  .btn.primary{background:var(--sage);color:#fff;padding:12px 18px;}
  .btn.primary:disabled{background:var(--line2);color:var(--muted);}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line2);padding:11px 16px;}
  .btn.danger{color:var(--danger);border-color:transparent;}
  .btn.sm{padding:9px 13px;font-size:13px;}
  .btn.big{width:100%;padding:15px;font-size:15px;}
  .fab{background:var(--sage);color:#fff;border:none;border-radius:var(--rs);padding:10px 15px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:6px;}
  .fab:active{transform:scale(.97);}
  .iconBtn{background:transparent;border:none;color:var(--sageDeep);padding:6px;display:flex;border-radius:8px;}
  .iconBtn:active{background:var(--surface2);}

  /* cards: flat, hairline border, restrained radius, NO left-stripe, NO gradient */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:var(--pad);}
  .list{display:flex;flex-direction:column;gap:10px;}

  .muted{color:var(--muted);}
  .small{font-size:13px;}
  .tiny{font-size:11.5px;}

  /* empty state */
  .empty{text-align:center;padding:56px 24px;color:var(--muted);}
  .emptyIc{margin:0 auto 14px;color:var(--sageSoft);}
  .empty p{margin:2px 0;}

  /* chips */
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:5px 0;}
  .chip{font-size:11px;font-weight:600;letter-spacing:.3px;padding:2px 9px;border-radius:20px;background:var(--surface2);color:var(--muted);}
  .chip.spirit{background:var(--amberSoft);color:#8a5a1f;}
  .chip.oil{background:#eee6c4;color:#7d6a1c;}
  .chip.test{background:#d9e7e0;color:#3f6857;}

  /* jar grid */
  .jarGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .jarCard{display:flex;flex-direction:column;gap:10px;}
  .jarCard.ready{border-color:var(--amber);}
  .jarTop{display:flex;gap:11px;align-items:flex-start;}
  .jarVis{width:34px;height:46px;border:1.5px solid var(--line2);border-radius:5px 5px 9px 9px;overflow:hidden;position:relative;flex-shrink:0;background:var(--surface2);}
  .fill{position:absolute;left:0;right:0;bottom:0;background:var(--amber);transition:height 1s linear;opacity:.9;}
  .fill.oil{background:var(--oil);}
  .fill.canna{background:var(--canna);}
  .jarText{min-width:0;flex:1;}
  .jarName{font-weight:600;font-size:14.5px;color:var(--sageDeep);line-height:1.2;}
  .jarSpec{font-size:12px;margin-top:2px;}
  .jarClock{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink);}
  .jarClock.done{color:var(--amber);}
  .hint{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
  .cardBtns{display:flex;gap:7px;}
  .cardBtns .btn{flex:1;}

  /* wizard */
  .wizard{display:flex;flex-direction:column;min-height:calc(100vh - 0px);padding-bottom:0;}
  .wizTop{display:flex;align-items:center;gap:12px;padding:8px 4px 18px;}
  .steps{display:flex;gap:6px;flex:1;}
  .stepDot{height:4px;flex:1;border-radius:2px;background:var(--line2);transition:background .2s;}
  .stepDot.on{background:var(--sage);}
  .stepDot.done{background:var(--sageSoft);}
  .stepLbl{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}
  .wizBody{flex:1;}
  .wizFoot{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(245,242,234,0),var(--bg) 30%);padding:16px 0 22px;}

  .step{animation:fade .2s ease;}
  @media (prefers-reduced-motion:reduce){.step{animation:none;}}

  /* big choice tiles */
  .bigChoices{display:flex;flex-direction:column;gap:12px;}
  .bigChoice{display:flex;flex-direction:column;align-items:flex-start;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;color:var(--sageDeep);transition:border-color .15s,transform .08s;}
  .bigChoice:active{transform:scale(.99);}
  .bigChoice.on{border-color:var(--sage);border-width:1.5px;}
  .bcName{font-size:18px;font-weight:700;}
  .bcSub{font-size:13px;color:var(--muted);font-weight:400;}

  /* botanical grid */
  .botGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .botBtn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:var(--rs);padding:11px 10px;color:var(--sageDeep);transition:border-color .15s,transform .08s;text-align:left;}
  .botBtn:active{transform:scale(.97);}
  .botBtn.on{border-color:var(--sage);border-width:1.5px;background:#fbfaf5;}
  .botBtn.canna{border-style:dashed;}
  .botBtn.canna.on{border-color:var(--canna);}
  .botName{font-size:13.5px;font-weight:600;line-height:1.15;}
  .botType{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
  .noteRow{margin-top:14px;padding:12px 14px;background:var(--surface2);border-radius:var(--rs);font-size:13.5px;color:var(--ink);line-height:1.45;}

  /* fields */
  .fieldRow{margin-bottom:16px;}
  .fieldRow>label{display:flex;align-items:center;font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .seg{display:flex;gap:8px;}
  .segBtn{flex:1;background:var(--surface);border:1px solid var(--line2);border-radius:var(--rs);padding:12px 8px;font-size:13.5px;font-weight:500;color:var(--muted);transition:border-color .15s,color .15s;}
  .segBtn.on{border-color:var(--sage);border-width:1.5px;color:var(--sageDeep);font-weight:600;}
  .inp{width:100%;background:var(--surface);border:1px solid var(--line2);border-radius:var(--rs);padding:12px 14px;font-size:15px;color:var(--ink);}
  .inp:focus{outline:none;border-color:var(--sage);}
  .inpSm{width:96px;background:var(--surface);border:1px solid var(--line2);border-radius:var(--rs);padding:10px 12px;font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums;}
  .inpSm:focus{outline:none;border-color:var(--sage);}

  .okRow{display:flex;align-items:center;gap:8px;background:#e7efe4;color:#3f6042;border-radius:var(--rs);padding:11px 14px;font-size:13.5px;margin-bottom:16px;}

  /* THC maker tips panel */
  .thcTips{border:1px solid var(--line2);border-radius:var(--r);margin-bottom:16px;overflow:hidden;}
  .thcTipsHd{width:100%;display:flex;align-items:center;gap:9px;background:var(--surface2);border:none;padding:13px 14px;color:var(--sageDeep);font-size:14px;font-weight:600;text-align:left;}
  .thcTipsHd:active{background:#e8e4d7;}
  .thcTipsTitle{flex:1;}
  .thcTipsToggle{font-size:12px;font-weight:600;color:var(--muted);}
  .thcTipsHd .rot{transform:rotate(90deg);}
  .thcTipsBody{padding:14px;border-top:1px solid var(--line);}
  .thcIntro{font-size:13px;margin-bottom:14px;line-height:1.45;}
  .tipGroup{margin-bottom:16px;}
  .tipGroup:last-of-type{margin-bottom:12px;}
  .tipHd{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--sageDeep);margin-bottom:8px;}
  .tipIc{color:var(--sage);flex-shrink:0;}
  .tipList{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:7px;}
  .tipList li{position:relative;padding-left:16px;font-size:13px;line-height:1.5;color:var(--ink-soft,#57544d);}
  .tipList li:before{content:"";position:absolute;left:3px;top:8px;width:4px;height:4px;border-radius:50%;background:var(--sageSoft);}
  .yieldRow{background:var(--surface2);border-radius:var(--rs);padding:12px 14px;font-size:13.5px;line-height:1.5;margin-bottom:16px;}
  .yieldRow b{color:#8a5a1f;}

  .bathRow{display:flex;gap:10px;}
  .bathRow.tight{margin-top:2px;}
  .bathStat{flex:1;background:var(--surface2);border-radius:var(--rs);padding:12px;text-align:center;}
  .bathNum{display:block;font-size:19px;font-weight:700;color:#8a5a1f;font-variant-numeric:tabular-nums;letter-spacing:-.3px;}
  .bathNum.warn{color:var(--danger);}
  .bathLbl{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}

  /* decarb note: bordered card, no stripe */
  .decarbCard{border:1px solid #e2c4bb;background:#faf1ee;border-radius:var(--r);padding:14px;margin-bottom:16px;}
  .decarbHd{display:flex;align-items:center;gap:7px;font-weight:600;font-size:14px;color:var(--danger);margin-bottom:12px;}
  .decarbCard p{margin:10px 0;line-height:1.45;}

  /* review */
  .reviewCard{margin-bottom:14px;}
  .rvName{font-size:18px;font-weight:700;color:var(--sageDeep);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .rvGrid{display:flex;gap:10px;margin-bottom:14px;}
  .rvGrid>div{flex:1;background:var(--surface2);border-radius:var(--rs);padding:14px;text-align:center;}
  .rvNum{display:block;font-size:21px;font-weight:700;color:var(--sageDeep);font-variant-numeric:tabular-nums;}
  .rvLbl{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:3px;}
  .reviewCard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;}
  .overrides{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .sealCard{background:var(--surface2);border-radius:var(--r);padding:14px;}
  .sealHd{display:flex;align-items:center;gap:7px;font-weight:600;font-size:13.5px;color:var(--sageDeep);margin-bottom:8px;}
  .sealCard p{font-size:13px;line-height:1.5;margin-bottom:10px;}

  /* link rows */
  .linkRow{display:flex;align-items:center;gap:8px;color:var(--sageDeep);font-size:13.5px;font-weight:500;padding:4px 0;}
  .linkRow:active{opacity:.6;}

  /* cellar rows */
  .cellarRow{display:flex;flex-direction:column;gap:0;}
  .cellarRow.proven{border-color:var(--amber);}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .rowName{font-weight:600;font-size:15px;color:var(--sageDeep);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .rowMeta{font-size:12.5px;margin-top:3px;}
  .starBtn{background:transparent;border:none;color:var(--line2);padding:4px;display:flex;transition:transform .1s;}
  .starBtn:active{transform:scale(1.2);}
  .starBtn.on{color:var(--amber);}

  /* rating chip in the name row */
  .chip.rate{border:1px solid transparent;}
  .chip.rate.off{background:#f2e3df;color:#a6543f;}
  .chip.rate.good{background:#e7efe4;color:#40663f;}
  .chip.rate.great{background:var(--amberSoft);color:#8a5a1f;}

  /* quick rating capture */
  .rateRow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .rateLbl{font-size:13px;color:var(--muted);font-weight:500;}
  .rateBtns{display:flex;gap:6px;}
  .rateBtn{border:1px solid var(--line2);background:var(--surface);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);transition:border-color .15s,color .15s,background .15s;}
  .rateBtn:active{transform:scale(.96);}
  .rateBtn.off:hover,.rateBtn.off:focus{border-color:#c98a78;color:#a6543f;}
  .rateBtn.good:hover,.rateBtn.good:focus{border-color:var(--sageSoft);color:#40663f;}
  .rateBtn.great:hover,.rateBtn.great:focus{border-color:var(--amber);color:#8a5a1f;}

  /* saved note */
  .savedNote{display:flex;gap:8px;align-items:flex-start;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:13px;color:var(--ink-soft,#57544d);line-height:1.45;}
  .savedNote .ic{color:var(--sageSoft);margin-top:2px;flex-shrink:0;}

  /* note editor */
  .noteEditor{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .noteEditor .inp{flex:1;}
  .noteEditor .btn{flex-shrink:0;}

  /* row actions: mini buttons */
  .rowActions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);}
  .miniBtn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line2);border-radius:var(--rs);padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--sageDeep);transition:border-color .15s,background .15s;}
  .miniBtn:active{transform:scale(.97);}
  .miniBtn:hover{border-color:var(--sage);background:#fbfaf5;}

  /* guides */
  .guideCard{display:flex;flex-direction:column;gap:12px;}
  .guideHd{display:flex;gap:11px;align-items:flex-start;}
  .guideIc{color:var(--sage);margin-top:2px;}
  .guideStage{font-weight:600;font-size:15px;color:var(--sageDeep);}
  .guideBlurb{font-size:13px;line-height:1.4;margin-top:2px;}
  .guideLinks{display:flex;flex-direction:column;gap:2px;border-top:1px solid var(--line);padding-top:8px;}

  /* kit */
  .kitSec{margin-bottom:22px;}
  .kitLbl{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .kitRow{display:flex;gap:12px;align-items:flex-start;}
  .kitTick{color:var(--sage);display:flex;margin-top:1px;flex-shrink:0;}
  .kitName{font-weight:600;font-size:14.5px;color:var(--sageDeep);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .kitBody{flex:1;min-width:0;}
  .checkBox{width:22px;height:22px;flex-shrink:0;border:1.5px solid var(--line2);border-radius:6px;background:var(--surface);color:var(--sage);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:border-color .15s;}
  .checkBox.on{border-color:var(--sage);background:#eef3ec;}
  .kitRow.got .kitName{color:var(--muted);text-decoration:line-through;}
  .urg{font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:20px;}
  .urg.now{background:var(--amberSoft);color:#8a5a1f;}
  .urg.later{background:var(--surface2);color:var(--muted);}

  /* tooltip */
  .infoWrap{position:relative;display:inline-flex;margin-left:6px;vertical-align:middle;}
  .infoDot{width:18px;height:18px;border:none;background:transparent;color:var(--sageSoft);display:flex;align-items:center;justify-content:center;padding:0;}
  .infoPop{position:absolute;top:24px;left:50%;transform:translateX(-50%);width:220px;z-index:50;background:var(--sageDeep);color:#f3f0e6;font-size:12.5px;font-weight:400;line-height:1.5;letter-spacing:0;text-transform:none;padding:11px 13px;border-radius:10px;box-shadow:0 8px 24px -8px rgba(47,52,42,.4);}
  .infoPop:before{content:"";position:absolute;top:-5px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:var(--sageDeep);}

  /* bottom tab bar */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;display:flex;background:var(--surface);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:30;}
  .tab{flex:1;background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted);font-size:10.5px;font-weight:500;transition:color .15s;}
  .tab.on{color:var(--sage);}
  .tab span{letter-spacing:.1px;white-space:nowrap;}

  /* sous weed topic cards */
  .testBanner{display:flex;align-items:center;gap:7px;background:#faf1ee;border:1px solid #e2c4bb;color:#a6543f;border-radius:var(--rs);padding:9px 13px;font-size:12.5px;font-weight:500;margin-bottom:14px;}
  .topicCard{padding:0;overflow:hidden;}
  .topicHd{width:100%;display:flex;align-items:center;gap:11px;background:transparent;border:none;padding:15px var(--pad);color:var(--sageDeep);font-size:14.5px;font-weight:600;text-align:left;}
  .topicHd:active{background:var(--surface2);}
  .topicIc{color:var(--sage);flex-shrink:0;}
  .topicTitle{flex:1;}
  .topicHd .rot{transform:rotate(90deg);}
  .topicBody{padding:2px var(--pad) 16px;border-top:1px solid var(--line);}
  .topicIntro{font-size:13px;line-height:1.5;margin:12px 0 12px;}

  .sourceRow{display:flex;flex-direction:column;gap:4px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);}

  /* potency calculator */
  .calc{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:var(--pad);margin-bottom:14px;}
  .calc.embedded{background:var(--surface2);margin-bottom:16px;}
  .calcHd{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--sageDeep);margin-bottom:13px;}
  .calcIc{color:var(--sage);}
  .calcInputs{display:flex;gap:8px;}
  .calcField{flex:1;min-width:0;}
  .calcField label{display:block;font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .calcField .inp{padding:10px 10px;font-size:15px;text-align:center;}
  .calcResult{display:flex;gap:8px;margin-top:14px;}
  .calcStat{flex:1;background:var(--surface2);border-radius:var(--rs);padding:12px 8px;text-align:center;}
  .calc.embedded .calcStat{background:var(--surface);}
  .calcStat.big{background:var(--amberSoft);}
  .calcNum{display:block;font-size:20px;font-weight:700;color:var(--sageDeep);font-variant-numeric:tabular-nums;letter-spacing:-.3px;}
  .calcStat.big .calcNum{color:#8a5a1f;}
  .calcLbl{display:block;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:3px;line-height:1.3;}
  .calcHint{margin-top:14px;font-size:13px;text-align:center;padding:10px;}
  .calcNote{margin-top:12px;font-size:11.5px;line-height:1.45;}

  /* carrier selector */
  .calcField.full{margin-bottom:12px;}

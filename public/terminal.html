<script>
/* ---- DIAGNOSTIC CONSOLE v1.1 — paints errors on screen so no failure is silent ---- */
(function(){
  var logs=[];
  function paint(){
    var el=document.getElementById('diag');
    if(!el){
      el=document.createElement('div'); el.id='diag';
      el.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#2A0F0C;color:#FFB3AD;font:11px/1.5 monospace;padding:8px 10px;white-space:pre-wrap;border-bottom:1px solid #FF4B3E;max-height:45vh;overflow:auto';
      document.body.appendChild(el);
    }
    el.textContent=logs.join('\n');
  }
  window.__diag=function(m){
    logs.push(m);
    if(document.body) paint();
    else document.addEventListener('DOMContentLoaded',paint);
  };
  window.addEventListener('error',function(e){
    if(e.target && e.target.tagName==='SCRIPT'){ __diag('SCRIPT FAILED TO LOAD: '+(e.target.src||'inline')); }
    else { __diag('ERROR: '+(e.message||e.type)+(e.filename?' @ '+e.filename.split('/').pop()+':'+e.lineno:'')); }
  },true);
  window.addEventListener('unhandledrejection',function(e){
    __diag('PROMISE ERROR: '+((e.reason&&e.reason.message)||e.reason));
  });
  __diag('THE TERMINAL v2.2 · boot '+new Date().toTimeString().slice(0,8)+' · if you can read this, the new file arrived');
  setTimeout(function(){
    if(window.__terminalMounted) return;
    __diag('MOUNT FAILED after 6s. Library check — React: '+(!!window.React)+' · ReactDOM: '+(!!window.ReactDOM)+' · Babel: '+(!!window.Babel));
    __diag(!window.React||!window.Babel
      ? 'VERDICT: the CDN scripts did not load. Connection or unpkg issue, not a code issue.'
      : 'VERDICT: libraries loaded but the app did not mount. Screenshot this box and send it to the mechanic.');
  },6000);
})();
</script>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;
const API_NEWS='/api/terminal-news', API_ENG='/api/terminal-engine';

// ---------- line-art icon set (consistent monoline family, drawn inline) ----------
const ICONS={
  desk:'M3 4h18v12H3z M3 20h18 M8 16v4 M16 16v4',           // monitor / trading screen
  book:'M4 4h13a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2z M8 4v14 M11 9h5 M11 12h5',
  aar:'M12 3a9 9 0 1 0 9 9 M12 3v9l6-3 M3.5 8.5l3 1',       // review dial
  vitals:'M3 12h4l2-6 3 12 2-6h5',                            // pulse line
  guide:'M12 3a9 9 0 1 0 9 9A9 9 0 0 0 12 3z M12 8h.01 M11 12h1v4h1', // info
  scale:'M12 3v18 M7 7l-4 7h8z M17 7l-4 7h8z M5 21h14',      // scales / margin
  pulse:'M3 12h4l2-6 3 12 2-6h5',
  target:'M12 3a9 9 0 1 0 9 9 M12 7a5 5 0 1 0 5 5 M12 11a1 1 0 1 0 1 1',
  brain:'M9 3a3 3 0 0 0-3 3 3 3 0 0 0-2 5 3 3 0 0 0 2 5 3 3 0 0 0 3 3V3z M15 3a3 3 0 0 1 3 3 3 3 0 0 1 2 5 3 3 0 0 1-2 5 3 3 0 0 1-3 3V3z',
  spark:'M13 2L4 14h7l-1 8 9-12h-7z',                        // idea / lightning
  clock:'M12 3a9 9 0 1 0 9 9 9 9 0 0 0-9-9z M12 7v5l3 2',
};
function Ic({n}){
  const d=ICONS[n]||'';
  return <svg className="ic" viewBox="0 0 24 24" aria-hidden="true">{d.split(' M').map((seg,i)=><path key={i} d={(i?'M':'')+seg}/>)}</svg>;
}

// ---------- helpers ----------
async function eng(action,payload={}){
  const r=await fetch(API_ENG,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...payload})});
  const j=await r.json();
  if(j.error) throw new Error(j.error);
  return j;
}
function compressImage(file,maxW=1400){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',0.82).split(',')[1]);
    };
    img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}
function ago(ts){
  if(!ts) return '';
  const m=Math.round((Date.now()-ts)/60000);
  if(m<60) return m+'m ago';
  const h=Math.round(m/60);
  if(h<24) return h+'h ago';
  return Math.round(h/24)+'d ago';
}
function copy(text,setMsg){
  navigator.clipboard.writeText(text).then(()=>{setMsg('Copied'); setTimeout(()=>setMsg(''),1500)}).catch(()=>setMsg('Copy failed'));
}
function fxMarketOpen(){
  // FX week: Mon 04:00 BKK (Sydney open) to Sat 04:00 BKK (NY close), close enough
  const d=new Date(); const bkk=new Date(d.toLocaleString('en-US',{timeZone:'Asia/Bangkok'}));
  const day=bkk.getDay(), h=bkk.getHours();
  if(day===0) return false;
  if(day===6) return h<4;
  if(day===1) return h>=4;
  return true;
}
// Honest, hour-appropriate greeting drawn from the engine clock (falls back to local BKK).
function dayPhase(clock){
  let h;
  if(clock && typeof clock.hour==='number') h=clock.hour;
  else { const bkk=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Bangkok'})); h=bkk.getHours(); }
  if(h>=5&&h<11) return {key:'morning',label:'Morning',greet:'Good morning'};
  if(h>=11&&h<17) return {key:'day',label:'Daytime',greet:'Good afternoon'};
  if(h>=17&&h<22) return {key:'evening',label:'Evening',greet:'Good evening'};
  return {key:'night',label:'Late',greet:'Late one'};
}
function clockStr(clock){
  if(clock && typeof clock.hour==='number') return String(clock.hour).padStart(2,'0')+':'+String(clock.minute).padStart(2,'0')+' BKK';
  const bkk=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Bangkok'}));
  return String(bkk.getHours()).padStart(2,'0')+':'+String(bkk.getMinutes()).padStart(2,'0')+' BKK';
}

// ---------- shot picker button ----------
function ShotButton({label,onImage,onImages,primary,disabled,multiple}){
  const ref=useRef();
  const [busy,setBusy]=useState(false);
  return (<>
    <input ref={ref} type="file" accept="image/*" multiple={!!multiple} style={{display:'none'}}
      onChange={async e=>{
        const files=[...e.target.files]; if(!files.length) return;
        setBusy(true);
        try{
          if(onImages){ const all=await Promise.all(files.map(f=>compressImage(f))); await onImages(all); }
          else { const b64=await compressImage(files[0]); await onImage(b64); }
        }
        catch(err){ alert(err.message); }
        setBusy(false); e.target.value='';
      }}/>
    <button className={primary?'pri':''} disabled={busy||disabled} onClick={()=>ref.current.click()}>
      {busy? <span className="spin">◐</span> : label}
    </button>
  </>);
}

// ---------- ticker tape ----------
// Ever-changing desk-humour ticker. Blends live rates with a rotating cast of dry
// trading-desk one-liners, shuffled so you rarely see the same quip twice in a session.
const TICKER_QUIPS = [
  "Reminder: the market can stay irrational longer than you can stay awake",
  "Your stop loss is not a suggestion, no matter how much you argue with it",
  "The trend is your friend until the exact bar you enter",
  "Somewhere a central banker just changed one word and moved a billion dollars",
  "Buy the rumour, sell the news, question your life choices at 3am",
  "The chart looked so clean five minutes before it wasn't",
  "Fun fact: 'it'll come back' is not a documented trading strategy",
  "Risk management is boring right up until the moment it saves you",
  "The yen does what it wants and apologises to no one",
  "Every red candle is a lesson you paid full price for",
  "Patience is a position too, and it never gets a margin call",
  "The dollar smiled today; nobody knows exactly why, as usual",
  "One-day trades: because holding overnight is a personality flaw you're working on",
  "Nothing humbles a man faster than a leveraged position and a coffee",
  "The pros aren't smarter, they just close losers faster than you do",
  "Cable moved 40 pips while you were reading this. Or it didn't. Check.",
  "Discipline is choosing what you want most over what you want now",
  "A good trade you didn't take beats a bad trade you did",
  "The market rewards the patient and bills the impatient",
  "Franc pairs: quiet, quiet, quiet, then absolute chaos",
  "Your best trades will feel boring; your worst will feel exciting",
  "Somewhere in Phuket a cat is more disciplined than most traders",
  "The economic calendar is just a list of appointments with volatility",
  "Green on the screen, calm in the chair; that's the whole game",
  "Overtrading is just gambling wearing a nice suit",
  "The pip you chase is rarely the pip you catch",
  "Sitting on your hands is an underrated alpha strategy",
  "If the setup needs a paragraph to justify, it's probably not a setup",
];
function shuffle(a){const arr=Array.isArray(a)?a.slice():[];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function Tape(){
  const [rates,setRates]=useState(null);
  const [line,setLine]=useState(0);
  const deck=useRef(shuffle(TICKER_QUIPS));
  const idx=useRef(0);
  useEffect(()=>{
    fetch('https://api.frankfurter.dev/v1/latest?base=USD&symbols=EUR,GBP,JPY,CHF,AUD,NZD')
      .then(r=>r.json())
      .then(j=>{
        const inv=x=>(1/x).toFixed(4);
        setRates({EURUSD:inv(j.rates.EUR),GBPUSD:inv(j.rates.GBP),USDJPY:j.rates.JPY.toFixed(2),
                  USDCHF:j.rates.CHF.toFixed(4),AUDUSD:inv(j.rates.AUD),NZDUSD:inv(j.rates.NZD)});
      }).catch(()=>{});
  },[]);
  // advance the quip after each scroll cycle; reshuffle when the deck is exhausted so nothing repeats until all are seen
  useEffect(()=>{
    const t=setInterval(()=>{
      idx.current++;
      if(idx.current>=(deck.current?deck.current.length:0)){ deck.current=shuffle(TICKER_QUIPS); idx.current=0; }
      setLine(l=>l+1);
    },22000);
    return ()=>clearInterval(t);
  },[]);
  if(!rates) return <div className="tape"><div style={{padding:'7px 14px'}} className="dim">warming up the wire…</div></div>;
  const quip=deck.current[idx.current];
  // pick a couple of live rates to fold in, rotating which ones
  const keys=Object.keys(rates);
  const k1=keys[line%keys.length], k2=keys[(line+3)%keys.length];
  const content=<span><b>{k1}</b> {rates[k1]} &nbsp;·&nbsp; {quip} &nbsp;·&nbsp; <b>{k2}</b> {rates[k2]} &nbsp;·&nbsp; </span>;
  return <div className="tape"><div className="tape-inner" key={line}>{content}{React.cloneElement(content,{key:'dup'})}</div></div>;
}

// ---------- DESK (ideas) ----------
function IdeaCard({idea,rec,onTaken,onPassed}){
  const [done,setDone]=useState(rec?.status && rec.status!=='offered' ? rec.status : null);
  return (
    <div className="card" style={idea.level_warning?{borderColor:'var(--red)'}:{}}>
      {idea.level_warning && <div className="alertbox a-red" style={{marginBottom:10}}>⚠ {idea.level_warning}</div>}
      <div className="row" style={{justifyContent:'space-between'}}>
        <span className="hl" style={{fontSize:20}}>{idea.pair}</span>
        <span className={'badge '+(idea.direction==='BUY'?'b-buy':'b-sell')}>{idea.direction}</span>
      </div>
      <div className="grid2">
        <div className="kv"><div className="k">ENTRY ZONE</div><div className="v">{idea.entry_zone}</div></div>
        <div className="kv"><div className="k">LOTS</div><div className="v">{idea.lots}</div></div>
        <div className="kv"><div className="k">TAKE PROFIT</div><div className="v green">{idea.tp}</div></div>
        <div className="kv"><div className="k">STOP LOSS</div><div className="v red">{idea.sl}</div></div>
      </div>
      <div className="meta">
        <span>HORIZON {idea.horizon}</span>
        {idea.rr!=null && <span className={idea.rr>=1.5?'green':'ambr'}>R:R {idea.rr}</span>}
        {idea.slPips!=null && <span className="dim">SL {idea.slPips}p{idea.tpPips!=null?' · TP '+idea.tpPips+'p':''}</span>}
        <span className={'conv-'+(idea.conviction||'').replace(/[^A-Z]/gi,'')}>CONVICTION {idea.conviction}</span>
      </div>
      <div className="thesis">{idea.thesis}</div>
      {Array.isArray(idea.sources) && idea.sources.length>0 && <div className="note" style={{marginTop:8}}>
        <span className="steel">SOURCES{idea.sourceConvergence?` · ${idea.sourceConvergence}`:''}</span> {idea.sources.map((s,i)=>`${s.outlet}: ${s.point}`).join('  ·  ')}
      </div>}
      {Array.isArray(idea.evidence) && idea.evidence.length>0 && <div className="note" style={{marginTop:4}}>
        <span className="steel">VERIFIED WIRE</span> {idea.evidence.map((e,i)=>`${e.outlet} (${e.strength||'match'}, ${e.age}): ${e.headline}`).join('  ·  ')}
      </div>}
      {idea.conviction_note && <div className="note" style={{marginTop:4}}><span className="ambr">⚠ CONVICTION</span> {idea.conviction_note}</div>}
      <div className="note" style={{marginTop:8}}><span className="red">RISKS</span> {idea.risks}</div>
      {(idea.sizing_note||idea.margin_note) && <div className="note" style={{marginTop:4}}><span className="ambr">SIZING</span> {idea.sizing_note||idea.margin_note}</div>}
      {idea.correlation_note && idea.correlation_note.toLowerCase()!=='none' &&
        <div className="note" style={{marginTop:4}}><span className="steel">CORRELATION</span> {idea.correlation_note}</div>}
      <div className="row" style={{marginTop:10}}>
        {done
          ? <span className={'badge '+(done==='taken'?'b-ok':'b-note')}>{done.toUpperCase()}</span>
          : <>
              <ShotButton primary label="TAKEN — upload fill" onImage={async b64=>{await onTaken(b64,rec?.id); setDone('taken');}} />
              <button className="ghost" onClick={async()=>{await onPassed(rec?.id); setDone('passed');}}>Pass</button>
            </>}
      </div>
    </div>
  );
}
function Desk({state,refresh}){
  const [busy,setBusy]=useState(false);
  const [ideas,setIdeas]=useState(state?.ideasToday||null);
  const [weekend,setWeekend]=useState(false);
  const [slip,setSlip]=useState(null);
  const [showAll,setShowAll]=useState(false);
  useEffect(()=>{ setIdeas(state?.ideasToday||null); },[state]);
  const clock=state?.clock;
  const phase=dayPhase(clock);
  // A gentle, non-blocking heads-up: generating in the Asian afternoon lull, before the
  // big US releases settle (roughly 19:00-20:30 BKK), can give a read that shifts later.
  const preUSData = clock && clock.hour>=19 && (clock.hour<20 || (clock.hour===20 && clock.minute<30));
  const gen=async(force)=>{
    setBusy(true);
    try{
      const r=await eng('ideas',{force});
      if(r.weekend){ setWeekend(true); }
      else setIdeas(r.ideas);
      refresh();
    }catch(e){ alert(e.message); }
    setBusy(false);
  };
  const onTaken=async(b64,ideaLedgerId)=>{
    const r=await eng('fill',{image:b64,ideaLedgerId});
    if(r.slippage!=null) setSlip(r.slippage);
    refresh();
  };
  const onPassed=async(id)=>{ if(id) await eng('pass',{ideaLedgerId:id}); refresh(); };
  const recFor=(idea)=> (state?.ledger||[]).slice().reverse().find(r=>r.idea && r.idea.pair===idea.pair && r.idea.thesis===idea.thesis);
  const ideaAge = ideas && ideas.generatedAt ? Date.now()-Date.parse(ideas.generatedAt) : null;
  const ideasStale = ideaAge!=null && ideaAge > 8*3600e3;
  return (
    <div className="wrap">
      <div className="card">
        <div className="eyebrow"><Ic n="spark"/>The desk · {phase.label} · {clockStr(clock)}</div>
        <div className="note">Ask for ideas whenever you like, morning, day or evening. The engine trawls the forex wire, your live book, account vitals and the lessons archive, and reads the market as it stands right now.</div>
        <div className="row" style={{marginTop:10}}>
          <button className="pri" disabled={busy} onClick={()=>gen(ideas?true:false)}>
            {busy? <span className="spin">◐</span> : (ideas? 'Generate fresh ideas' : 'Generate ideas')}
          </button>
        </div>
        {preUSData && <div className="note steel" style={{marginTop:8}}>Heads-up: big US releases are still settling around now. A read taken before ~20:30 BKK may shift once the data lands. Perfectly fine to generate anyway, just hold your conviction loosely.</div>}
        {ideasStale && <div className="note" style={{marginTop:8}}>The read below is over 8 hours old. Tap generate for a fresh take on the current market.</div>}
      </div>
      {weekend && <div className="alertbox a-green">Market is shut for the weekend. The desk stands down; the AAR archive remains open. See you when trading resumes.</div>}
      {slip!=null && <div className="alertbox a-amber">Fill logged. Slippage vs idea entry: {slip>0?'+':''}{slip}. Real levels now govern the book.</div>}
      {ideas && <>
        {ideas.stand_down && <div className="alertbox a-amber">STAND DOWN advisory: the engine rates this session poor. Only genuinely strong setups are worth taking; treat anything shown with extra scepticism.</div>}
        <div className="card"><div className="eyebrow"><Ic n="brain"/>Desk note{ideas.session?' · '+ideas.session:''}</div><div className="note" style={{color:'var(--ink2)'}}>{ideas.desk_note}</div>
          <div className="meta"><span>generated {ideas.generatedAt? ago(Date.parse(ideas.generatedAt)):''}</span></div>
        </div>
        {(() => {
          const all = ideas.ideas || [];
          const qualifies = (i) => i.qualifies!==undefined ? i.qualifies : ['MED-HIGH','HIGH'].includes((i.conviction||'').toUpperCase());
          const strong = all.filter(qualifies);
          const weak = all.filter(i => !qualifies(i));
          if (strong.length === 0) {
            return <>
              <div className="card" style={{borderColor:'var(--amber-dim)'}}>
                <div className="hl" style={{fontSize:16}}>No high-conviction ideas this session</div>
                <div className="note" style={{marginTop:6}}>Nothing cleared the MED-HIGH bar. That is an honest read, not a fault: a quiet session with no strong setup is a perfectly good reason to sit on your hands. The engine looked and found nothing worth your margin right now.</div>
              </div>
              {weak.length>0 && <div className="row" style={{marginTop:4}}>
                <button className="ghost" onClick={()=>setShowAll(v=>!v)}>{showAll?'Hide':'Show'} the {weak.length} lower-conviction candidate{weak.length>1?'s':''} anyway</button>
              </div>}
              {showAll && weak.map((idea,i)=><IdeaCard key={i} idea={idea} rec={recFor(idea)} onTaken={onTaken} onPassed={onPassed} />)}
            </>;
          }
          return <>
            {strong.map((idea,i)=><IdeaCard key={i} idea={idea} rec={recFor(idea)} onTaken={onTaken} onPassed={onPassed} />)}
            {weak.length>0 && <div className="row" style={{marginTop:4}}>
              <button className="ghost" onClick={()=>setShowAll(v=>!v)}>{showAll?'Hide':'Show'} {weak.length} lower-conviction candidate{weak.length>1?'s':''}</button>
            </div>}
            {showAll && weak.map((idea,i)=><IdeaCard key={'w'+i} idea={idea} rec={recFor(idea)} onTaken={onTaken} onPassed={onPassed} />)}
          </>;
        })()}
      </>}
      {!ideas && !weekend && <div className="note" style={{marginTop:6}}>No ideas on the desk yet today.</div>}
    </div>
  );
}

// ---------- BOOK (positions, sync, AAR pipeline) ----------
function Book({state,refresh}){
  const [posImgs,setPosImgs]=useState([]);
  const [syncing,setSyncing]=useState(false);
  const [report,setReport]=useState(null);
  const [morning,setMorning]=useState(null);
  const [aarBusy,setAarBusy]=useState(null);
  const [aarOut,setAarOut]=useState(null);
  const [rfBusy,setRfBusy]=useState(null);
  const [rfOut,setRfOut]=useState(null);
  const [horBusy,setHorBusy]=useState(null);
  const [msg,setMsg]=useState('');
  const book=state?.book;

  const addImgs=(arr)=>setPosImgs(prev=>[...prev,...arr]);

  const [syncErr,setSyncErr]=useState(null);
  const runSync=async(historyB64)=>{
    if(!posImgs.length) return;
    setSyncing(true); setSyncErr(null);
    try{
      const r=await eng('sync',{positionsImages:posImgs,historyImage:historyB64||null});
      setReport(r&&r.report?r.report:null);
      setMorning(r&&r.morningNote?r.morningNote:null);
      setPosImgs([]);
      // The sync response ALREADY contains the freshly-reconciled, freshly-saved book.
      // Apply it directly as the source of truth. A separate get() here can race the write
      // (read-after-write) and return a stale/empty book, which is exactly what was blanking
      // the positions after a successful sync. So we trust the sync response.
      if(r&&r.book){ refresh({...(state||{}), clock:r.clock||state?.clock, book:r.book}); }
      else { await refresh(); }
    }catch(e){
      setSyncErr((e&&e.message||String(e))+(e&&e.stack?'\n'+e.stack.split('\n').slice(0,4).join('\n'):''));
    }
    setSyncing(false);
  };
  const runAAR=async(closureId,histB64)=>{
    setAarBusy(closureId);
    try{
      const r=await eng('aar',{closureId,historyImage:histB64||null});
      if(r.needsHistory){ alert('The engine needs the MT5 history screenshot to see the exit. Upload it on the closure card.'); }
      else setAarOut(r);
      refresh();
    }catch(e){ alert(e.message); }
    setAarBusy(null);
  };
  const dismissClosure=async(closureId)=>{
    setAarBusy(closureId||'all');
    try{ await eng('dismissclosure',{closureId:closureId||'all'}); refresh(); }
    catch(e){ alert(e.message); }
    setAarBusy(null);
  };
  const runRF=async(positionId)=>{
    setRfBusy(positionId);
    try{ const r=await eng('redflag',{positionId}); setRfOut(r); refresh(); }
    catch(e){ alert(e.message); }
    setRfBusy(null);
  };
  const toggleHorizon=async(positionId,longTerm)=>{
    setHorBusy(positionId);
    try{ await eng('horizon',{positionId,longTerm}); refresh(); }
    catch(e){ alert(e.message); }
    setHorBusy(null);
  };
  const flagCls={OK:'b-ok',NOTE:'b-note',AMBER:'b-amber',RED:'b-red'};

  return (
    <div className="wrap">
      <div className="card">
        <div className="eyebrow"><Ic n="book"/>Sync book · {clockStr(state?.clock)}</div>
        <div className="note">Sync whenever you sit down, any hour. Step 1: upload the MT5 open-positions screen. On mobile the app shows only part of your book per screen, so add as many screenshots as you need — they'll be merged into one book. Step 2 (if anything closed): upload history. The engine diffs the book, detects closures, adopts orphans, reads vitals and flags aging.</div>
        <div className="row" style={{marginTop:10,flexWrap:'wrap',gap:8}}>
          <ShotButton primary={!posImgs.length} multiple label={posImgs.length?`+ Add another (${posImgs.length} loaded)`:'1 · Positions screenshot(s)'} onImages={addImgs} />
          <ShotButton label="2 · History (optional)" disabled={!posImgs.length||syncing} onImage={async b=>runSync(b)} />
          <button className="pri" disabled={!posImgs.length||syncing} onClick={()=>runSync(null)}>{syncing? <span className="spin">◐</span>:`Run sync${posImgs.length>1?` (${posImgs.length} shots)`:''}`}</button>
          {posImgs.length>0 && !syncing && <button className="ghost" onClick={()=>setPosImgs([])}>Clear</button>}
        </div>
        {posImgs.length>1 && <div className="note" style={{marginTop:8}}><span className="green">{posImgs.length} screenshots loaded</span> — read together and merged into one book on sync.</div>}
        {syncErr && <div className="alertbox a-red" style={{marginTop:10}}>
          <div style={{fontWeight:700,marginBottom:4}}>Sync error — copy this and send it over:</div>
          <div style={{fontFamily:"monospace",fontSize:11,whiteSpace:'pre-wrap',maxHeight:200,overflow:'auto',background:'rgba(0,0,0,0.25)',padding:8,borderRadius:6}}>{syncErr}</div>
          <button className="pri" style={{marginTop:8}} onClick={()=>{ try{navigator.clipboard.writeText(syncErr);}catch(e){} }}>Copy the error</button>
        </div>}
      </div>

      {report && report.aborted && <div className="alertbox a-amber"><div style={{fontWeight:700}}>Sync not applied</div><div style={{marginTop:3}}>{report.note}</div></div>}
      {report && !report.aborted && <>
        {report.vitalsAlert && <div className={'alertbox '+(report.vitalsAlert.level==='RED'?'a-red':'a-amber')}>MARGIN {report.vitalsAlert.level}: {report.vitalsAlert.msg}</div>}
        <div className="alertbox a-green">Sync complete{report.shotsRead>1?` from ${report.shotsRead} screenshots`:''}. {report.updated||0} updated · {(report.closedDetected||[]).length} closure(s) detected · {(report.orphansAdded||[]).length} orphan(s) adopted.</div>
        {report.partialShotNote && <div className="alertbox a-amber"><div style={{fontWeight:700,marginBottom:4}}>Partial screenshot — positions kept, not closed</div><div>{report.partialShotNote}</div></div>}
        {report.signFlags?.length>0 && <div className="alertbox a-amber">
          <div style={{fontWeight:700,marginBottom:4}}>{report.signFlags.length} P/L sign{report.signFlags.length>1?'s':''} to double-check (price relationship looked unusual):</div>
          {report.signFlags.map((f,i)=><div key={i} style={{marginTop:2}}>· {f.note}</div>)}
          <div style={{marginTop:5}} className="dim">These kept the value MT5's colour showed. Verify on your platform if unsure.</div>
        </div>}
        {/* pairFixes carries TWO different claims and they must never share a count: auto:true
            means the engine rewrote the pair, auto:false means it deliberately did NOT and
            wants you to check. Counting them together let a sync that changed nothing announce
            "Corrected 1 misread pair" above a bullet reading "NOT changed" — the guard's whole
            safety property is that it doesn't silently rewrite, so the banner was undoing it. */}
        {(() => {
          const fixes = report.pairFixes || [];
          const auto = fixes.filter(f=>f.auto), flagged = fixes.filter(f=>!f.auto);
          return <>
            {auto.length>0 && <div className="alertbox a-amber">
              <div style={{fontWeight:700,marginBottom:4}}>Corrected {auto.length} misread pair{auto.length>1?'s':''} (entry price didn't fit the pair):</div>
              {auto.map((f,i)=><div key={i} style={{marginTop:2}}>· {f.note}</div>)}
              <div style={{marginTop:5}} className="dim">If any looks wrong, re-sync a clearer screenshot.</div>
            </div>}
            {flagged.length>0 && <div className="alertbox a-amber">
              <div style={{fontWeight:700,marginBottom:4}}>{flagged.length} pair{flagged.length>1?'s':''} to verify — nothing was changed:</div>
              {flagged.map((f,i)=><div key={i} style={{marginTop:2}}>· {f.note}</div>)}
              <div style={{marginTop:5}} className="dim">The entry price sits outside this pair's usual range. Check it on your platform; if the pair is right, no action is needed.</div>
            </div>}
          </>;
        })()}
      </>}

      {(() => {
        const brief = morning || book?.morningNote;
        if (!brief) return null;
        return (
          <div className="card">
            <div className="eyebrow"><Ic n="pulse"/>Position briefing{brief.at ? ' · ' + ago(Date.parse(brief.at)) : ''}</div>
            <div className="hl">{brief.headline}</div>
            {(brief.lines || []).map((l, i) => {
              const st = (l.status||'').toUpperCase();
              const stCls = st==='HOLDING'?'green':st==='WOBBLING'?'ambr':st==='BROKEN'?'red':'dim';
              return (
                <div key={i} className="note" style={{marginTop: 7}}>
                  <span className="ambr">{l.pair}</span>
                  {l.status && <span className={stCls} style={{marginLeft:6,fontSize:10,letterSpacing:'.08em'}}>{st}</span>}
                  <span style={{marginLeft:6}}>{l.read}</span>
                  {(l.sources||[]).length>0 && <div className="dim" style={{marginTop:2,fontSize:11,marginLeft:6}}>◆ {(l.sources||[]).join('  ·  ')}</div>}
                </div>
              );
            })}
            {(brief.calendar || []).length > 0 && (
              <div style={{marginTop: 12}}>
                <div className="eyebrow">Calendar</div>
                {brief.calendar.map((c, i) => (
                  <div key={i} className="note" style={{marginTop: 5}}>
                    <span className="ambr">{c.when}</span> {c.what} <span className="dim">· {c.why}</span>
                  </div>
                ))}
              </div>
            )}
            {brief.calendar_watch && <div className="note" style={{marginTop: 8}}><span className="red">CALENDAR</span> {brief.calendar_watch}</div>}
            {brief.overall && <div className="thesis">{brief.overall}</div>}
          </div>
        );
      })()}

      {(book?.pendingAAR||[]).length>0 && <>
        <div className="row" style={{justifyContent:'space-between',alignItems:'center',marginTop:18,marginBottom:4}}>
          <h3 className="sec" style={{margin:0}}>Closures awaiting AAR</h3>
          <button className="ghost" disabled={aarBusy==='all'} onClick={()=>{ if(confirm('Clear all '+(book.pendingAAR||[]).length+' pending closures? Real AAR review for future genuine closures is unaffected.')) dismissClosure(); }} style={{fontSize:12,padding:'4px 10px'}}>{aarBusy==='all'?<span className="spin">◐</span>:'Clear all'}</button>
        </div>
        {book.pendingAAR.filter(c=>c&&c.position).map(c=>(
          <div key={c.id} className="card" style={{borderColor:'var(--amber-dim)'}}>
            <div className="row" style={{justifyContent:'space-between'}}>
              <span className="hl">{c.position.pair} <span className="dim">{c.position.direction} {c.position.lots}</span></span>
              {c.close
                ? <span className={'badge '+(c.close.profit>=0?'b-ok':'b-red')}>{c.close.profit>=0?'+':''}{c.close.profit}</span>
                : <span className="badge b-note">EXIT UNKNOWN</span>}
            </div>
            <div className="row" style={{marginTop:10,gap:8}}>
              {c.close
                ? <button className="pri" disabled={aarBusy===c.id} onClick={()=>runAAR(c.id)}>{aarBusy===c.id? <span className="spin">◐</span>:'Run AAR'}</button>
                : <ShotButton primary label="Upload history to AAR" onImage={async b=>runAAR(c.id,b)} />}
              <button className="ghost" disabled={aarBusy===c.id} onClick={()=>dismissClosure(c.id)} style={{fontSize:12}}>Dismiss</button>
            </div>
          </div>
        ))}
      </>}

      {aarOut && aarOut.aar && <div className="card" style={{borderColor:'var(--steel-dim)'}}>
        <div className="eyebrow">AAR verdict</div>
        <div className="row" style={{justifyContent:'space-between'}}>
          <span className={'badge '+((aarOut.aar.bucket||'').includes('GOOD')?'b-ok':'b-red')}>{(aarOut.aar.bucket||'').replace(/_/g,' ')}</span>
        </div>
        <div className="hl" style={{marginTop:8}}>{aarOut.aar.headline}</div>
        <div className="note" style={{marginTop:8}}><span className="ambr">SUPPOSED</span> {aarOut.aar.supposed}</div>
        <div className="note" style={{marginTop:4}}><span className="ambr">ACTUAL</span> {aarOut.aar.actual}</div>
        <div className="note" style={{marginTop:4}}><span className="ambr">WHY</span> {aarOut.aar.why_different}</div>
        <div className="note" style={{marginTop:4}}><span className="ambr">NEXT TIME</span> {aarOut.aar.next_time}</div>
        <div className="note" style={{marginTop:4}}><span className="ambr">EXIT READ</span> {aarOut.aar.exit_read}</div>
        {aarOut.aar.lesson!=='NONE' && <div className="lesson" style={{marginTop:10}}>LESSON BANKED: {aarOut.aar.lesson}</div>}
        <div className="paste">{aarOut.pasteRow}</div>
        <div className="row" style={{marginTop:8}}>
          <button onClick={()=>copy(aarOut.pasteRow,setMsg)}>Copy journal row</button>
          <span className="note green">{msg}</span>
        </div>
      </div>}

      <h3 className="sec">Open book</h3>
      {(book?.positions||[]).length===0 && <div className="note">Book is flat. All equity free, all options open.</div>}
      {(book?.positions||[]).map(p=>(
        <div key={p.id} className="card">
          <div className="row" style={{justifyContent:'space-between'}}>
            <span className="hl">{p.pair} <span className="dim">{p.direction} {p.lots} @ {p.entry}</span></span>
            {p.longTerm
              ? <span className="badge b-etf">LONG-TERM</span>
              : <span className={'badge '+flagCls[p.ageFlag]}>{p.hoursHeld!=null&&p.hoursHeld<24?`${p.hoursHeld<1?Math.round(p.hoursHeld*60)+'m':p.hoursHeld.toFixed(1)+'h'}`:`${p.ageDays}D`} {p.ageFlag!=='OK'?p.ageFlag:''}</span>}
          </div>
          <div className="meta">
            <span>SL {p.sl??'—'}</span><span>TP {p.tp??'—'}</span>
            <span className={p.floating>=0?'green':'red'}>float {p.floating??'?'}</span>
            {p.orphan && <span className="ambr">OFF-BOOK</span>}
            {p.ageResetAt && !p.longTerm && <span className="dim">re-underwritten</span>}
          </div>
          {/* precise held duration with reliability of the open-time anchor */}
          {p.hoursHeld!=null && <div className="meta" style={{marginTop:4}}>
            <span className="steel">HELD</span>
            <span>{p.hoursHeld<24?(p.hoursHeld<1?`${Math.round(p.hoursHeld*60)} min`:`${p.hoursHeld.toFixed(1)} hours`):`${p.ageDays} day${p.ageDays===1?'':'s'}`}</span>
            {p.openTimeReliable
              ? <span className="dim">· from platform open time</span>
              : <span className="ambr">· est. since first seen (sync a shot showing open time for exact)</span>}
          </div>}
          {p.longTerm
            ? <div className="note" style={{marginTop:6}}><span className="dim">HORIZON</span> long-term hold, held {p.ageDays} day{p.ageDays===1?'':'s'} <span className="steel">· judged on the long-term thesis, not the one-day clock</span></div>
            : p.proposedHorizon && <div className="note" style={{marginTop:6}}><span className="dim">HORIZON</span> proposed {p.proposedHorizon}, held {p.ageDays} day{p.ageDays===1?'':'s'}{p.ageDays>=1?<span className="ambr"> · past its intended life</span>:''}</div>}
          {p.thesis && <div className="thesis">{p.thesis}</div>}
          {p.lastReview && <>
            <div className="note" style={{marginTop:6}}><span className={p.lastReview.verdict==='CLOSE'?'red':'green'}>REVIEW {p.lastReview.verdict}</span> {p.lastReview.reason} <span className="dim">· {ago(Date.parse(p.lastReview.at))}</span></div>
            {(p.lastReview.sources||[]).length>0 && <div className="note" style={{marginTop:4}}><span className="steel">SOURCES{p.lastReview.source_convergence?` (${p.lastReview.source_convergence})`:''}</span> {(p.lastReview.sources||[]).join('  ·  ')}</div>}
            {p.lastReview.levels_check && <div className="note" style={{marginTop:4}}><span className="dim">LEVELS</span> {p.lastReview.levels_check}</div>}
            {p.lastReview.hold_duration && <div className="note" style={{marginTop:4}}><span className="steel">HOLD</span> {p.lastReview.hold_duration}</div>}
          </>}
          <div className="row" style={{marginTop:10,gap:8}}>
            {(p.ageFlag==='RED' || p.longTerm) &&
              <button className="pri" disabled={rfBusy===p.id} onClick={()=>runRF(p.id)}>{rfBusy===p.id? <span className="spin">◐</span>:(p.longTerm?'Review this hold':'RED FLAG — keep or close?')}</button>}
            <button className="ghost" disabled={horBusy===p.id} onClick={()=>toggleHorizon(p.id,!p.longTerm)}>{horBusy===p.id?<span className="spin">◐</span>:(p.longTerm?'Make short-term':'Mark long-term')}</button>
          </div>
          {p.ageFlag==='AMBER' && !p.longTerm && <div className="note" style={{marginTop:8,color:'var(--amber)'}}>Day {p.ageDays}: is the original thesis alive, or are you holding hope? Red flag review unlocks at day 3.</div>}
        </div>
      ))}

      {rfOut && <div className="card" style={{borderColor: rfOut.verdict.verdict==='CLOSE'?'var(--red)':'var(--green)'}}>
        <div className="eyebrow">Red flag review — {rfOut.verdict.verdict==='CLOSE'?'burden of proof not met':'thesis re-underwritten'}</div>
        <div className="hl">{rfOut.verdict.verdict}: {rfOut.position.pair}</div>
        <div className="note" style={{marginTop:8}}>{rfOut.verdict.reason}</div>
        {(rfOut.verdict.evidence||[]).map((e,i)=><div key={i} className="note" style={{marginTop:4}}>• {e}</div>)}
        {(rfOut.verdict.sources||[]).length>0 && <div className="card" style={{marginTop:8,background:'var(--panel2, rgba(255,255,255,0.03))',padding:10}}>
          <div className="eyebrow" style={{marginBottom:6}}>Validated against {rfOut.verdict.source_convergence?`· ${rfOut.verdict.source_convergence} convergence`:'the wire'}</div>
          {(rfOut.verdict.sources||[]).map((sc,i)=><div key={i} className="note" style={{marginTop:i?4:0}}><span className="steel">◆</span> {sc}</div>)}
        </div>}
        {rfOut.verdict.new_thesis && <div className="thesis">NEW THESIS: {rfOut.verdict.new_thesis} <span className="dim">({rfOut.verdict.new_horizon})</span></div>}
        {rfOut.verdict.suggested_levels && <div className="note" style={{marginTop:6}}><span className="ambr">LEVELS</span> {rfOut.verdict.suggested_levels}</div>}
        {rfOut.verdict.margin_note && <div className="note" style={{marginTop:4}}><span className="ambr">MARGIN</span> {rfOut.verdict.margin_note}</div>}
        <div className="note dim" style={{marginTop:8}}>The verdict is logged and will itself be graded at AAR. The reviewer gets reviewed.</div>
      </div>}
    </div>
  );
}

// ---------- AAR archive ----------
function Archive({state}){
  const [msg,setMsg]=useState('');
  const lessons=state?.lessons||[];
  const aars=(state?.ledger||[]).filter(r=>r.aar).reverse();
  const passed=(state?.ledger||[]).filter(r=>r.status==='passed').reverse().slice(0,10);
  return (
    <div className="wrap">
      <h3 className="sec">Scar tissue — lessons archive</h3>
      {lessons.length===0 && <div className="note">No lessons banked yet. The archive fills itself as your trades close and their AARs run, and as the desk distils durable principles from the market news it reads each day.</div>}
      {lessons.length>0 && (()=>{
        const personal=lessons.filter(l=>l.source!=='market').length;
        const market=lessons.filter(l=>l.source==='market').length;
        return <div className="note" style={{marginBottom:12}}>{personal} lesson{personal===1?'':'s'} earned from your own closed trades, {market} principle{market===1?'':'s'} drawn from watching the market. Both feed every idea the desk generates.</div>;
      })()}
      {lessons.slice().reverse().map((l,i)=>{
        const isMkt=l.source==='market';
        return (
          <div key={i} className={'lesson'+(isMkt?' market':'')}>
            <span className={'lesson-tag '+(isMkt?'market':'personal')}>{isMkt?'MARKET':'YOURS'}</span>
            {l.text}
            <div className="dim" style={{fontSize:10,marginTop:4}}>
              {isMkt ? (l.trigger?('prompted by: '+l.trigger+' · '):'')+l.date : (l.pair?l.pair+' · ':'')+l.date}
            </div>
          </div>
        );
      })}
      <h3 className="sec">Completed AARs</h3>
      {aars.length===0 && <div className="note">No AARs yet.</div>}
      {aars.map((r,i)=>(
        <div key={i} className="card">
          <div className="row" style={{justifyContent:'space-between'}}>
            <span className="hl">{r.idea?.pair||r.close?.pair} <span className="dim">{r.date}</span></span>
            <span className={'badge '+(r.aar.bucket.includes('GOOD')?'b-ok':'b-red')}>{r.aar.bucket.replace(/_/g,' ')}</span>
          </div>
          <div className="note" style={{marginTop:6}}>{r.aar.headline}</div>
          {r.close && <div className="meta"><span className={r.close.profit>=0?'green':'red'}>realised {r.close.profit>=0?'+':''}{r.close.profit}</span></div>}
          {r.pasteRow && <>
            <div className="paste">{r.pasteRow}</div>
            <div className="row" style={{marginTop:6}}><button onClick={()=>copy(r.pasteRow,setMsg)}>Copy journal row</button><span className="note green">{msg}</span></div>
          </>}
        </div>
      ))}
      <h3 className="sec">What the desk has learned</h3>
      {(() => {
        const guidance = state?.guidance || [];
        const meta = state?.guidanceMeta;
        if (guidance.length === 0) {
          return <div className="note">Not yet. Once at least 6 passed ideas have resolved over their 3-day windows, the desk studies its own hits and misses and distils guidance here, which then shapes every future idea it proposes.</div>;
        }
        return <>
          {meta && <div className="note" style={{marginBottom:10}}>
            From {meta.sample} resolved ideas: <span className="green">{meta.wins} wins</span>, <span className="red">{meta.losses} losses</span>{meta.soft?', '+meta.soft+' soft calls':''}.
            {meta.hitrate_note?' '+meta.hitrate_note:''}
            {meta.at?<span className="dim"> · refreshed {ago(Date.parse(meta.at))}</span>:''}
          </div>}
          {guidance.map((g,i)=>(
            <div key={i} className="guide-note">
              {g.text}
              {g.basis && <div className="guide-basis">basis: {g.basis}</div>}
            </div>
          ))}
        </>;
      })()}

      <h3 className="sec">Passed ideas — shadow book</h3>
      {passed.length===0 && <div className="note">Nothing passed yet. Every idea you decline is tracked to its outcome over 3 days, so the desk learns whether your filter beats the engine, or the engine beats your filter.</div>}
      {passed.map((r,i)=>{
        const sv=r.shadowVerdict;
        const g=sv?.grade;
        const badge = !sv ? ['b-note','TRACKING…']
          : g==='WIN' ? ['b-ok','WOULD WIN']
          : g==='SOFT_WIN' ? ['b-ok','SOFT WIN']
          : g==='LOSS' ? ['b-red','WOULD LOSE']
          : g==='SOFT_LOSS' ? ['b-red','SOFT LOSS']
          : g==='AMBIGUOUS' ? ['b-note','AMBIGUOUS']
          : ['b-note',(g||'').replace(/_/g,' ')];
        return (
          <div key={i} className="card">
            <div className="row" style={{justifyContent:'space-between'}}>
              <span className="hl">{r.idea.pair} <span className="dim">{r.idea.direction} · passed {r.date}</span></span>
              <span className={'badge '+badge[0]}>{badge[1]}</span>
            </div>
            {sv && <div className="meta"><span className="dim">{sv.note}</span>{sv.resolvedOn && <span className="dim">resolved {sv.resolvedOn}</span>}</div>}
            {!sv && r.shadowTrail && r.shadowTrail.length>0 && <div className="meta"><span className="dim">tracking day {r.shadowTrail.length} of 3</span></div>}
          </div>
        );
      })}
    </div>
  );
}

// ---------- VITALS ----------
function Vitals({state}){
  const v=state?.book?.vitals;
  const hist=(state?.book?.vitalsHistory||[]).filter(h=>h.marginLevel);
  const ml=v?.marginLevel;

  // previous checkpoint for delta comparison
  const prev = hist.length>=2 ? hist[hist.length-2] : null;
  const delta = (cur,was)=> (cur!=null&&was!=null) ? +(cur-was).toFixed(2) : null;
  const mlDelta = prev ? delta(ml, prev.marginLevel) : null;
  const eqDelta = prev ? delta(v?.equity, prev.equity) : null;

  // equity vs balance gap = open floating P/L laid bare
  const floatGap = (v?.equity!=null && v?.balance!=null) ? +(v.equity - v.balance).toFixed(2) : null;
  // committed vs free firepower
  const committedPct = (v?.margin!=null && v?.equity) ? +(v.margin/v.equity*100).toFixed(0) : null;

  const light = ml==null?null : ml>=400?['GREEN','a-green','All clear, plenty of sea room.'] : ml>=250?['GREEN','a-green','Healthy, keep your sizing honest.'] : ml>=150?['AMBER','a-amber','Thin for correlated positions; a couple of bad candles moves this quickly.'] : ['RED','a-red','Stop-out territory approaches, reduce exposure now.'];

  // readable margin gauge: baselines at 150 (floor), 250 (comfort), 400 (ample)
  const gauge=()=>{
    if(ml==null) return null;
    const lo=100, hi=Math.max(450, ml+30);
    const pct=(x)=>Math.max(0,Math.min(100,(x-lo)/(hi-lo)*100));
    const marks=[[150,'floor','var(--red)'],[250,'comfort','var(--amber)'],[400,'ample','var(--green)']];
    return (
      <div style={{margin:'10px 0 4px'}}>
        <div style={{position:'relative',height:26,background:'var(--panel2)',borderRadius:4,border:'1px solid var(--line)',overflow:'hidden'}}>
          <div style={{position:'absolute',left:0,top:0,bottom:0,width:pct(ml)+'%',background:ml>=250?'var(--green)':ml>=150?'var(--amber)':'var(--red)',opacity:.28}}/>
          {marks.map(([val,,col],i)=> val>lo&&val<hi ? <div key={i} style={{position:'absolute',left:pct(val)+'%',top:0,bottom:0,width:1,background:col,opacity:.6}}/> : null)}
          <div style={{position:'absolute',left:'calc('+pct(ml)+'% - 1px)',top:0,bottom:0,width:2,background:'var(--ink)'}}/>
        </div>
        <div style={{position:'relative',height:14,marginTop:2}}>
          {marks.map(([val,label],i)=> val>lo&&val<hi ? <span key={i} style={{position:'absolute',left:pct(val)+'%',transform:'translateX(-50%)',fontSize:8.5,color:'var(--dim)',letterSpacing:'.04em'}}>{val} {label}</span> : null)}
        </div>
      </div>
    );
  };

  const spark=()=>{
    const pts=hist.slice(-30);
    if(pts.length<2) return null;
    const vals=pts.map(p=>p.marginLevel);
    const min=Math.min(...vals,150), max=Math.max(...vals), rng=(max-min)||1;
    const W=320,H=46;
    const d=vals.map((val,i)=>`${i===0?'M':'L'}${(i/(vals.length-1)*W).toFixed(1)},${(H-4-((val-min)/rng)*(H-8)).toFixed(1)}`).join(' ');
    const floorY=(H-4-((150-min)/rng)*(H-8)).toFixed(1);
    return <svg className="spark" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      <line x1="0" y1={floorY} x2={W} y2={floorY} stroke="var(--red)" strokeWidth="0.75" strokeDasharray="3 3" opacity="0.5"/>
      <path d={d} fill="none" stroke="var(--amber)" strokeWidth="1.5"/>
    </svg>;
  };

  // plain-language read of the whole picture
  const insight=()=>{
    if(!v) return null;
    const bits=[];
    if(floatGap!=null){
      if(floatGap<0) bits.push(`Your equity sits ${Math.abs(floatGap).toFixed(2)} below balance, so the open book is currently ${Math.abs(floatGap).toFixed(2)} in the red. That is unrealised; it only becomes real when you close.`);
      else if(floatGap>0) bits.push(`Your equity is ${floatGap.toFixed(2)} above balance, so the open book is ${floatGap.toFixed(2)} in the green on paper right now.`);
      else bits.push(`Equity and balance are level, so the open book is roughly flat.`);
    }
    if(committedPct!=null) bits.push(`You have ${committedPct}% of your equity committed as margin, leaving ${100-committedPct}% as free firepower.`);
    if(mlDelta!=null){
      if(mlDelta<-5) bits.push(`Margin level has fallen ${Math.abs(mlDelta)} points since your last check, so the account is drifting toward the edge; worth watching.`);
      else if(mlDelta>5) bits.push(`Margin level has climbed ${mlDelta} points since your last check, so the account is walking back to safety.`);
      else bits.push(`Margin level is broadly steady since your last check, no meaningful drift.`);
    }
    return bits.join(' ');
  };

  return (
    <div className="wrap">
      {!v && <div className="note">No vitals yet. They flow in automatically from every positions screenshot at sync and fill time.</div>}
      {v && <>
        {light && <div className={'alertbox '+light[1]}>MARGIN {light[0]} · level {ml}%{mlDelta!=null?` (${mlDelta>=0?'+':''}${mlDelta} since last)`:''} — {light[2]}</div>}

        <div className="grid2">
          <div className="kv"><div className="k">BALANCE</div><div className="v">{v.balance}</div></div>
          <div className="kv"><div className="k">EQUITY</div><div className="v">{v.equity}{eqDelta!=null&&<span className={'note '+(eqDelta>=0?'green':'red')} style={{fontSize:10,marginLeft:5}}>{eqDelta>=0?'+':''}{eqDelta}</span>}</div></div>
          <div className="kv"><div className="k">MARGIN USED</div><div className="v">{v.margin??'—'}</div></div>
          <div className="kv"><div className="k">FREE MARGIN</div><div className="v">{v.freeMargin??'—'}</div></div>
        </div>

        <div className="card">
          <div className="eyebrow">Margin level — where you stand</div>
          <div className="row" style={{justifyContent:'space-between',alignItems:'baseline'}}>
            <span className={'hl '+(ml>=250?'green':ml>=150?'ambr':'red')} style={{fontSize:26}}>{ml}%</span>
            {mlDelta!=null && <span className={mlDelta>=0?'green':'red'} style={{fontSize:12}}>{mlDelta>=0?'▲':'▼'} {Math.abs(mlDelta)} since last check</span>}
          </div>
          {gauge()}
          <div className="note" style={{marginTop:8}}>Baselines: 150% is the danger floor where a couple of bad candles threaten a stop-out, 250% is comfortable working room, 400% and above is ample. Your marker sits where you are now.</div>
        </div>

        {floatGap!=null && <div className="card">
          <div className="eyebrow">Open floating P/L</div>
          <div className={'hl '+(floatGap>=0?'green':'red')} style={{fontSize:22}}>{floatGap>=0?'+':''}{floatGap.toFixed(2)}</div>
          <div className="note" style={{marginTop:6}}>The gap between your equity and your balance. This is what the open book is worth on paper right now, unrealised until you close.</div>
        </div>}

        <div className="card">
          <div className="eyebrow">The read</div>
          <div className="thesis">{insight()}</div>
        </div>

        {hist.length>=2 && <div className="card">
          <div className="eyebrow">Margin level drift — last {Math.min(hist.length,30)} reads</div>
          {spark()}
          <div className="note" style={{marginTop:6}}>The dashed red line marks the 150% danger floor. P/L flatters and deceives day to day; this line tells you which way the whole operation is walking, and how close it stands to the edge.</div>
        </div>}

        <div className="meta"><span>last read {v.ts? ago(Date.parse(v.ts)):''}</span>{prev&&<span>prior read {prev.ts?ago(Date.parse(prev.ts)):''}</span>}</div>
      </>}
    </div>
  );
}

// ---------- App shell ----------
function App(){
  const [tab,setTab]=useState('desk');
  const [state,setState]=useState(null);
  const [engineErr,setEngineErr]=useState(null);
  const refresh=useCallback(async(prefetched)=>{
    try{
      if(prefetched){ setState(prefetched); setEngineErr(null); return; }
      setState(await eng('get')); setEngineErr(null);
    }
    catch(e){ setEngineErr(e.message); }
  },[]);
  useEffect(()=>{
    window.__terminalMounted=true;
    const d=document.getElementById('diag'); if(d) d.remove();
    refresh();
  },[]);
  const open=fxMarketOpen();
  return (<>
    <div className="topbar">
      <div className="brand disp"><span className="dot"></span>THE TERMINAL<small>hammyLabs · forex desk</small></div>
      <span className={'pill '+(open?'open':'shut')}><span className="dot"></span>{open?'MARKET OPEN':'MARKET SHUT'}</span>
    </div>
    <Tape/>
    {engineErr && <div className="wrap" style={{paddingBottom:0}}><div className="alertbox a-red">Engine offline: {engineErr}. Check ANTHROPIC_API_KEY and the Upstash variables in Vercel, then reload.</div></div>}
    {tab==='desk' && <Desk state={state} refresh={refresh}/>}
    {tab==='book' && <Book state={state} refresh={refresh}/>}
    {tab==='aar' && <Archive state={state}/>}
    {tab==='vitals' && <Vitals state={state}/>}
    <nav className="tabs">
      {[['desk','Desk','desk'],['book','Book','book'],['aar','Review','aar'],['vitals','Vitals','vitals']].map(([k,l,ic])=>
        <button key={k} className={tab===k?'on':''} onClick={()=>setTab(k)}><Ic n={ic}/>{l}</button>)}
    </nav>
  </>);
}
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(err,info){
    this.setState({stack:(info&&info.componentStack)||'', jsStack:(err&&err.stack)||''});
    // also surface into the pre-React diag banner if it's still around
    try{ if(window.__diag) window.__diag('RENDER ERROR: '+(err&&err.message)); }catch(e){}
  }
  render(){
    if(this.state.err){
      const full = 'MESSAGE: '+String(this.state.err&&this.state.err.message||this.state.err)
        + '\n\nCOMPONENT TRACE:'+(this.state.stack||' (none)')
        + '\n\nJS STACK:\n'+((this.state.jsStack||'').split('\n').slice(0,5).join('\n')||' (none)');
      return <div className="wrap"><div className="alertbox a-red" style={{marginTop:20}}>
        <div style={{fontWeight:700,marginBottom:6}}>The desk hit a render error. Copy this and send it over — it names the exact spot.</div>
        <div style={{fontFamily:"monospace",fontSize:11,whiteSpace:'pre-wrap',maxHeight:280,overflow:'auto',background:'rgba(0,0,0,0.25)',padding:10,borderRadius:8}}>{full}</div>
        <div className="row" style={{marginTop:10,gap:8}}>
          <button className="pri" onClick={()=>{ try{navigator.clipboard.writeText(full);}catch(e){} }}>Copy the error</button>
          <button className="ghost" onClick={()=>{ try{location.reload();}catch(e){} }}>Reload</button>
        </div>
      </div></div>;
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>

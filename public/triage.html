<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>SP Race Triage</title>
<style>
  :root {
    --bg: #0e1116;
    --card: #171b22;
    --line: #262b34;
    --ink: #e9edf2;
    --muted: #8b94a3;
    --accent: #2ecc71;
    --accent2: #1f9e57;
    --warn: #e6a23c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px; max-width: 640px; margin: 0 auto;
  }
  h1 { font-size: 20px; margin: 4px 0 2px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  select, button {
    font-size: 16px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); padding: 12px 14px;
  }
  select { flex: 1; }
  button.go {
    background: var(--accent); color: #04210f; font-weight: 700; border: none;
    width: 100%; padding: 16px; font-size: 17px; border-radius: 14px;
  }
  button.go:active { background: var(--accent2); }
  button.copy {
    background: var(--card); color: var(--accent); border: 1px solid var(--accent2);
    width: 100%; padding: 14px; font-weight: 600; margin: 12px 0;
  }
  .status { color: var(--muted); font-size: 13px; margin: 12px 2px; min-height: 18px; }
  .meet {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px; margin-bottom: 12px;
  }
  .meet h2 { margin: 0 0 8px; font-size: 17px; }
  .meet .hdr { font-size: 13px; color: var(--muted); margin-bottom: 10px; line-height: 1.45; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .pill {
    font-size: 13px; padding: 5px 10px; border-radius: 999px;
    background: #11161c; border: 1px solid var(--line); color: var(--ink);
  }
  .pill.big { border-color: var(--accent2); color: var(--accent); }
  .docs a {
    display: inline-block; font-size: 13px; color: #6db8ff; text-decoration: none;
    margin: 2px 10px 2px 0;
  }
  .docs .none { color: var(--muted); font-size: 13px; }
  .err { color: var(--warn); font-size: 13px; }
  footer { color: var(--muted); font-size: 12px; margin-top: 20px; line-height: 1.5; }
</style>
</head>
<body>
  <h1>SP Race Card Triage</h1>
  <div class="sub">Tap to pull every meet for the day. Field size = meat on the bone.</div>

  <div class="row">
    <select id="dateSel"><option value="">Loading dates…</option></select>
  </div>
  <button class="go" id="goBtn">Pull triage</button>

  <div class="status" id="status"></div>
  <button class="copy" id="copyBtn" style="display:none">Copy all (paste to Claude)</button>
  <div id="out"></div>

  <footer>
    Reads singaporepools.com.sg server-side. Field-size and prize parsing depend on
    SP's page layout; if numbers look off, the parser may need a tweak.
  </footer>

<script>
const API = "/api/triage";
const dateSel = document.getElementById("dateSel");
const goBtn = document.getElementById("goBtn");
const copyBtn = document.getElementById("copyBtn");
const statusEl = document.getElementById("status");
const out = document.getElementById("out");
let lastText = "";

function setStatus(s){ statusEl.textContent = s || ""; }

async function loadDates(){
  try {
    const r = await fetch(API + "?list=1");
    const j = await r.json();
    if (j.dates && j.dates.length){
      dateSel.innerHTML = j.dates.map((d,i)=>
        '<option value="'+d+'"'+(i===0?' selected':'')+'>'+d+'</option>').join("");
    } else {
      dateSel.innerHTML = '<option value="">No dates found</option>';
    }
  } catch(e){
    dateSel.innerHTML = '<option value="">Failed to load dates</option>';
  }
}

function esc(s){ return (s||"").replace(/[&<>]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }

function render(data){
  out.innerHTML = "";
  const lines = [];
  lines.push("SP RACE CARD TRIAGE  -  " + data.date);
  lines.push("Meets running: " + data.count);
  lines.push("========================================");

  data.meets.forEach((m, i) => {
    const div = document.createElement("div");
    div.className = "meet";
    if (m.error){
      div.innerHTML = '<h2>'+esc(m.venue)+'</h2><div class="err">Failed to fetch this meet.</div>';
      lines.push("\n"+(i+1)+". "+m.venue+"\n   (failed to fetch)");
    } else {
      const docs = [];
      if (m.pdfs.card) docs.push('<a href="'+m.pdfs.card+'" target="_blank">Integrated card</a>');
      if (m.pdfs.tips) docs.push('<a href="'+m.pdfs.tips+'" target="_blank">Media selections</a>');
      if (m.pdfs.analysis) docs.push('<a href="'+m.pdfs.analysis+'" target="_blank">Race analysis</a>');
      div.innerHTML =
        '<h2>'+(i+1)+'. '+esc(m.venue)+'</h2>'+
        '<div class="hdr">'+esc(m.header)+'</div>'+
        '<div class="pills">'+
          '<span class="pill big">'+esc(m.field)+' runners</span>'+
          '<span class="pill">'+esc(m.distance)+'</span>'+
          '<span class="pill">'+esc(m.prize)+'</span>'+
        '</div>'+
        '<div class="docs">'+(docs.length? docs.join("") : '<span class="none">No analysis docs listed</span>')+'</div>';

      lines.push("\n"+(i+1)+". "+m.venue);
      lines.push("   R1: "+m.header);
      lines.push("   Distance: "+m.distance+"  |  Prize: "+m.prize+"  |  Field size: "+m.field+" runners");
      if (docs.length){
        lines.push("   Analysis docs:");
        if (m.pdfs.card) lines.push("     - Integrated card: "+m.pdfs.card);
        if (m.pdfs.tips) lines.push("     - Media selections: "+m.pdfs.tips);
        if (m.pdfs.analysis) lines.push("     - Race analysis: "+m.pdfs.analysis);
      } else {
        lines.push("   Analysis docs: none listed");
      }
      lines.push("   Card URL: "+m.url);
    }
    out.appendChild(div);
  });

  lastText = lines.join("\n");
  copyBtn.style.display = "block";
}

async function pull(){
  goBtn.disabled = true;
  copyBtn.style.display = "none";
  out.innerHTML = "";
  setStatus("Fetching meets… (a few seconds)");
  try {
    const d = dateSel.value;
    const r = await fetch(API + (d ? "?date="+encodeURIComponent(d) : ""));
    const j = await r.json();
    if (j.error){ setStatus("Error: "+j.error); }
    else { render(j); setStatus("Done. "+j.count+" meets for "+j.date+"."); }
  } catch(e){
    setStatus("Request failed: "+e);
  } finally {
    goBtn.disabled = false;
  }
}

copyBtn.addEventListener("click", async ()=>{
  try {
    await navigator.clipboard.writeText(lastText);
    copyBtn.textContent = "Copied!";
    setTimeout(()=> copyBtn.textContent = "Copy all (paste to Claude)", 1500);
  } catch(e){
    // fallback: select via a temp textarea
    const ta = document.createElement("textarea");
    ta.value = lastText; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    copyBtn.textContent = "Copied!";
    setTimeout(()=> copyBtn.textContent = "Copy all (paste to Claude)", 1500);
  }
});

goBtn.addEventListener("click", pull);
loadDates();
</script>
</body>
</html>

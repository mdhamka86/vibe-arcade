// Assemble the available classifieds for the current era: evergreen + era set.
function policiesForYear(year) {
  const era = eraFor(year);
  const eraSet = ERA_POLICIES[era.yr] || [];
  return [...eraSet, ...EVERGREEN_POLICIES];
}

  { yr: 1965, tag: "Year One", note: "Independent and unsure. No hinterland, no resources, water piped from across the strait." },

  { yr: 1980, tag: "Take-Off", note: "The port booms. The skyline begins to bite at the clouds." },
  { yr: 1990, tag: "Tiger Economy", note: "An Asian tiger now. Reserves swelling, ambitions swelling faster." },
  { yr: 2000, tag: "Globalising", note: "Banks, biotech and a casino debate. The island goes global." },
  { yr: 2010, tag: "Crowded Success", note: "Rich and dense. The grumbles now are space, pace and prices." },
  { yr: 2020, tag: "Greying Dot", note: "World-class and worried. The pyramid is inverting, the cradles quiet." },
  { yr: 2030, tag: "Beyond", note: "Uncharted. Can a rich, old, tiny nation keep renewing itself?" },
];
function eraFor(year) {
  let e = ERAS[0];
  for (const er of ERAS) { if (year >= er.yr) e = er; }
  return e;
}

// ============================================================
// PIXEL ART: tiny CSS sprites built from box-shadow pixel grids. Crisp at
// any scale, zero external assets. Each returns a React element. Used as
// little newspaper "engravings" beside headlines where they earn their place.
// A compact 2D string map: each char is a colour key, space is transparent.
// ============================================================
function pixelSprite(map, palette, scale) {
  const p = scale || 4;
  const rows = map;
  const cells = [];
  rows.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const ch = row[x];
      if (ch === " " || !palette[ch]) continue;
      cells.push(React.createElement("i", {
        key: x + "_" + y,
        style: { left: x * p, top: y * p, width: p, height: p, background: palette[ch], position: "absolute" },
      }));
    }
  });
  const w = Math.max(...rows.map(r => r.length)) * p;
  const h = rows.length * p;
  return React.createElement("span", { className: "sprite", style: { width: w, height: h, position: "relative", display: "inline-block" } }, cells);
}

// ============================================================
// APPLY EFFECTS
// ============================================================
function applyEff(state, eff) {
  if (!eff) return;
  for (const k of Object.keys(eff)) {
    if (state.pillars[k] !== undefined) state.pillars[k] = clamp(state.pillars[k] + eff[k], 0, 100);
  }
  if (eff.momentumGreen) state.greenMomentum += 1;
}

function applyPolicy(state, pol) {
  applyEff(state, pol.eff);
  state.firedPolicies.add(pol.id);
  if (pol.banksReserve) state.bankedReserves += pol.banksReserve;
  if (pol.immigrationWave) state.immigrationWaves += 1;
  if (pol.momentumGreen) state.greenMomentum += 1;
  if (pol.migrantCare) state.migrantCareActions += 1;
  if (pol.stopAtTwo) state.stopAtTwoActive = true;
  if (pol.undoStopAtTwo) state.stopAtTwoActive = false;
  state.communities.forEach(c => {
    if (pol.commAttain) {
      const tilt = pol.tiltLowIncome ? (70 - c.income) / 20 : 1;
      c.attainment = clamp(c.attainment + pol.commAttain * clamp(tilt, 0.6, 1.8), 0, 100);
    }
    if (pol.commIncome) c.income = clamp(c.income + pol.commIncome, 0, 100);
    if (pol.commContent) c.content = clamp(c.content + pol.commContent, 0, 100);
  });
  if (pol.immigrationWave) {
    state.communities.forEach(c => {
      if (c.id === "chinese" || c.id === "indian" || c.id === "others") c.share += rand(0.1, 0.5);
      if (c.id === "malay") c.share = Math.max(8, c.share - rand(0.1, 0.4));
    });
  }
}

// also handle event-level flags (migrant care, green) when an option is chosen
function applyEventOption(state, opt) {
  applyEff(state, opt.eff);
  if (opt.migrantCare) state.migrantCareActions += 1;
  if (opt.momentumGreen) state.greenMomentum += 1;
}

// ============================================================
// END-OF-TURN TICK: the relentless pressures, à la a rival you can't see.
// ============================================================
function endOfTurnTick(state) {
  const notes = [];
  const fertilityDrift = -rand(1.5, 3.5);
  state.pillars.fertility = clamp(state.pillars.fertility + fertilityDrift, 0, 100);
  if (state.pillars.fertility < 40) {
    state.pillars.prosperity = clamp(state.pillars.prosperity - rand(1, 3), 0, 100);
    notes.push("The quiet cradles are beginning to weigh on the workforce outlook.");
  }
  if (state.greenMomentum > 0) {
    state.pillars.health = clamp(state.pillars.health + state.greenMomentum * 0.8, 0, 100);
    state.pillars.harmony = clamp(state.pillars.harmony + state.greenMomentum * 0.5, 0, 100);
  }
  const contents = state.communities.map(c => c.content);
  const spread = Math.max(...contents) - Math.min(...contents);
  if (spread > 22) {
    state.pillars.harmony = clamp(state.pillars.harmony - rand(2, 4), 0, 100);
    notes.push("A widening gap between communities is straining the national mood.");
  }
  state.communities.forEach(c => {
    const target = (c.income * 0.4 + c.attainment * 0.3 + state.pillars.harmony * 0.3);
    c.content = clamp(c.content + (target - c.content) * 0.3, 0, 100);
  });
  const income = Math.round(8 + state.pillars.prosperity * 0.12 + (state.bankedReserves > 0 ? 2 : 0));
  state.reserves += income;
  notes.push("Annual revenue of " + income + " added to the treasury.");
  return notes;
}

// ============================================================
// EVENT SELECTION
// ============================================================
function rollEvent(state) {
  const pool = EVENTS.filter(e => !state.usedEvents.has(e.id) && (!e.minYear || state.year >= e.minYear));
  if (pool.length === 0) return null;
  const weighted = pool.flatMap(e => Array(e.weight || 1).fill(e));
  const ev = pick(weighted);
  state.usedEvents.add(ev.id);
  // freshen election headline/subhead each time it appears
  if (ev.isElection) {
    state._electionHeadline = pick(ELECTION_HEADLINES);
    state._electionSubhead = pick(ELECTION_SUBHEADS);
  }
  return ev;
}

// ============================================================
// STORYLINE DETECTION
// ============================================================
function detectStorylines(state) {
  // state-gated arcs that have unlocked and not yet fired this run
  const gated = STORYLINE_BANK.filter(sl =>
    !state.storylines.find(x => x.id === sl.id) && sl.test(state));
  // Most editions surface a story. Prefer a meaningful gated arc when one is
  // newly available; otherwise reach for a real-quirk blurb so heavy replayers
  // still see something fresh and funny nearly every turn.
  if (!chance(0.82)) return null;
  let built, slId;
  if (gated.length && chance(0.6)) {
    const sl = pick(gated);
    built = sl.gen(); slId = sl.id;
  } else {
    // avoid repeating a quirk blurb already shown this run by text key
    const usedTexts = new Set(state.storylines.map(s => s.qkey).filter(Boolean));
    const fresh = QUIRK_BLURBS.filter((_, i) => !usedTexts.has("q" + i));
    const pool = fresh.length ? fresh : QUIRK_BLURBS;
    const idx = QUIRK_BLURBS.indexOf(pick(pool));
    built = QUIRK_BLURBS[idx](); slId = "q" + idx; built.qkey = "q" + idx;
  }
  state.storylines.push({ id: slId, ...built, year: state.year });
  return built;
}

// ============================================================
// SCORING
// ============================================================
function nationScore(state) {
  const p = state.pillars;
  const base = (p.harmony * 1.3 + p.prosperity + p.housing + p.education + p.health + p.fertility * 1.1) / 6.4;
  const contents = state.communities.map(c => c.content);
  const minContent = Math.min(...contents);
  const equityBonus = minContent >= 55 ? 8 : minContent >= 45 ? 3 : -6;
  const reserveBonus = Math.min(6, (state.reserves + state.bankedReserves) / 40);
  return clamp(Math.round(base + equityBonus + reserveBonus), 0, 100);
}

function verdictFor(score, state) {
  const minContent = Math.min(...state.communities.map(c => c.content));
  if (score >= 82 && minContent >= 55) return { tag: "THE SHINING RED DOT", color: "#1f6f4a",
    line: "Against every odd of size and resource, you built a thriving, cohesive nation that punches a thousand times its weight. Improbable. Magnificent." };
  if (score >= 72) return { tag: "AN IMPROBABLE SUCCESS", color: "#1f6f4a",
    line: "Prosperous, stable and broadly fair. The little dot is the envy of nations many times its size. A few cracks, but a genuine triumph." };
  if (score >= 60) return { tag: "STEADY AS SHE GOES", color: "#9a6b1f",
    line: "A solid, functioning nation with real achievements and real unfinished business. The work, as ever on this island, continues." };
  if (score >= 46) return { tag: "MUDDLING THROUGH", color: "#9a6b1f",
    line: "You kept the lights on and the peace mostly held, but the strain shows in the gaps between communities and in the empty cradles." };
  if (score >= 32) return { tag: "FRAYING AT THE EDGES", color: "#b3271e",
    line: "Cohesion is wobbling and the demographics are unforgiving. The next planner inherits a decidedly tough brief." };
  return { tag: "THE EXPERIMENT FALTERS", color: "#b3271e",
    line: "Too many communities left behind, too many empty cradles, too little trust banked. A cautionary tale for the history textbooks." };
}

// ============================================================
// GAME
// ============================================================
function Game() {
  const [state, setState] = useState(null);
  const [phase, setPhase] = useState("intro");
  const [picks, setPicks] = useState([]);
  const [curEvent, setCurEvent] = useState(null);
  const [eventResult, setEventResult] = useState(null);
  const [turnNotes, setTurnNotes] = useState([]);
  const [newStory, setNewStory] = useState(null);

  function start() {
    const s = freshState();
    setState(s); setPicks([]); setPhase("policy");
    setCurEvent(null); setEventResult(null); setTurnNotes([]); setNewStory(null);
  }
  const budget = 3;

  function clone(s) {
    return { ...s, pillars: { ...s.pillars }, communities: s.communities.map(c => ({ ...c })),
      firedPolicies: new Set(s.firedPolicies), usedEvents: new Set(s.usedEvents), storylines: [...s.storylines],
      history: [...s.history] };
  }

  function togglePick(pol) {
    if (picks.find(p => p.id === pol.id)) { setPicks(picks.filter(p => p.id !== pol.id)); return; }
    if (picks.length >= budget) return;
    const spent = picks.reduce((s, p) => s + p.cost, 0);
    if (spent + pol.cost > state.reserves) return;
    setPicks([...picks, pol]);
  }

  function confirmPolicies() {
    const s = clone(state);
    let spent = 0;
    picks.forEach(p => { applyPolicy(s, p); spent += p.cost; });
    s.reserves -= spent;
    setState(s);
    const ev = rollEvent(s);
    if (ev) { setCurEvent(ev); setPhase("event"); }
    else { resolveTurn(s); }
  }

  function chooseEventOption(opt) {
    const s = clone(state);
    applyEventOption(s, opt);
    setEventResult(opt.msg);
    setState(s);
    setTimeout(() => resolveTurn(s), 0);
  }

  function resolveTurn(sIn) {
    const s = clone(sIn);
    const notes = endOfTurnTick(s);
    const story = detectStorylines(s);
    setNewStory(story);
    s.history = [...s.history, { turn: s.turn, year: s.year, score: nationScore(s),
      harmony: s.pillars.harmony, prosperity: s.pillars.prosperity, fertility: s.pillars.fertility }];
    setTurnNotes(notes);
    setState(s);
    setPhase("summary");
  }

  function nextTurn() {
    if (state.turn >= state.totalTurns) { setPhase("end"); return; }
    const s = clone(state);
    s.turn += 1; s.year += 5;
    setState(s);
    setPicks([]); setCurEvent(null); setEventResult(null);
    setPhase("policy");
  }

  const shell = (inner) => (
    <div style={{ maxWidth: 480, margin: "0 auto", minHeight: "100vh", background: C.paper, color: C.ink,
      fontFamily: serif, padding: "16px 16px 40px",
      backgroundImage: "radial-gradient(" + C.stain + "22 1px, transparent 1px)", backgroundSize: "4px 4px" }}>{inner}</div>
  );

  if (phase === "intro" || !state) {
    return shell(
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", fontFamily: typewriter, fontSize: 9.5, color: C.faded }}>
          <span>FOUNDING EDITION</span><span>PRICE 10¢</span>
        </div>
        <DoubleRule />
        <div style={{ textAlign: "center" }}>
          <div style={{ fontFamily: headline, fontWeight: 900, fontSize: 46, lineHeight: .88, color: C.ink }}>The Daily Dot</div>
          <div style={{ fontFamily: typewriter, fontSize: 9.5, color: C.faded, marginTop: 6, letterSpacing: ".1em" }}>"ALL THE NEWS A SMALL ISLAND CAN HOLD"</div>
        </div>
        <DoubleRule />
        <div style={{ textAlign: "center", margin: "10px 0" }}><Sprite name="skyline" /></div>
        <Kicker>A Nation-Building Roguelite</Kicker>
        <h1 style={{ fontFamily: headline, fontWeight: 900, fontSize: 30, lineHeight: 1.04, margin: "4px 0 8px" }}>
          One Tiny Island. Four Decades. No Resources But Its People.
        </h1>
        <p style={{ fontFamily: serif, fontSize: 14.5, lineHeight: 1.62, color: C.ink2, margin: 0 }}>
          You are the unseen hand on the nation's budget, and this newspaper is how you will govern. Each edition you read the front page, weigh the day's crisis as reported by your formidable chief editor, and fund three policies from a slim treasury.
        </p>
        <p style={{ fontFamily: serif, fontSize: 14.5, lineHeight: 1.62, color: C.ink2, marginTop: 10 }}>
          The catch, and it is the whole game, is this: keep every community thriving, not merely the headline figures. An ageing population and a collapsing birth rate work against you the entire way. Leave anyone behind and the island knows it.
        </p>
        <Rule />
        <Kicker color={C.ink2}>From the Archives</Kicker>
        <p style={{ fontFamily: serif, fontSize: 13, lineHeight: 1.58, color: C.faded, marginTop: 4, fontStyle: "italic" }}>
          The nation is seeded from Singapore's real 2020 census, the 74.3 / 13.5 / 9.0 ethnic mix, fertility by community, graduate shares and more. Genuine Singapore truths surface as you play and on the final back page. Figures real; nation fictional. Source: Singapore Department of Statistics.
        </p>
        <PaperBtn primary onClick={start}>Print the First Edition</PaperBtn>
        <p style={{ textAlign: "center", color: C.faded, fontSize: 10.5, marginTop: 10, fontFamily: typewriter }}>
          Every run sets a different front page.
        </p>
      </div>
    );
  }

  const era = eraFor(state.year);
  const spent = picks.reduce((s, p) => s + p.cost, 0);
  const score = nationScore(state);
  const eraPolicies = policiesForYear(state.year);

  if (phase === "policy") {
    return shell(
      <div>
        <Masthead state={state} era={era} />
        <Kicker>Front Page · {state.year}</Kicker>
        <h1 style={{ fontFamily: headline, fontWeight: 900, fontSize: 26, lineHeight: 1.05, margin: "3px 0 6px" }}>
          {era.tag}: The State of the Nation
        </h1>
        <p style={{ fontFamily: serif, fontStyle: "italic", fontSize: 13.5, color: C.ink2, lineHeight: 1.55, margin: 0 }}>{era.note}</p>
        <Rule />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "2px 16px" }}>
          {PILLAR_DEFS.map(pd => <IndexBar key={pd.id} label={pd.label} val={state.pillars[pd.id]} color={pd.color} />)}
        </div>
        <Rule thick />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <Kicker>The Classifieds · Fund 3</Kicker>
          <span style={{ fontFamily: typewriter, fontSize: 11, color: spent > state.reserves ? C.red : C.ink2 }}>
            {picks.length}/3 · {fmtMoney(spent)}/{fmtMoney(state.reserves)}
          </span>
        </div>
        {eraPolicies.map(pol => {
          const on = !!picks.find(p => p.id === pol.id);
          const afford = spent + pol.cost <= state.reserves || on;
          const full = picks.length >= budget && !on;
          const disabled = (!afford || full);
          return (
            <div key={pol.id} onClick={() => togglePick(pol)} style={{
              borderTop: "1px solid " + C.ink2, padding: "9px 0", opacity: disabled ? 0.4 : 1,
              cursor: disabled ? "not-allowed" : "pointer", background: on ? C.paper2 : "transparent" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <span style={{ fontFamily: headline, fontWeight: 700, fontSize: 15.5, color: C.ink }}>
                  {on ? "■ " : "□ "}{pol.name}
                </span>
                <span style={{ fontFamily: typewriter, fontSize: 11, color: pol.cost === 0 ? C.redink : C.ink2, whiteSpace: "nowrap", paddingLeft: 8 }}>
                  {pol.cost === 0 ? "FREE" : fmtMoney(pol.cost)}
                </span>
              </div>
              <div style={{ fontFamily: serif, fontSize: 12.5, color: C.ink2, marginTop: 3, lineHeight: 1.45 }}>{pol.blurb}</div>
            </div>
          );
        })}
        <PaperBtn primary onClick={confirmPolicies} disabled={picks.length === 0}>
          Go to Press &amp; Advance to {state.year + 5}
        </PaperBtn>
      </div>
    );
  }

  if (phase === "event" && curEvent) {
    const title = curEvent.isElection ? (state._electionHeadline || curEvent.title) : curEvent.title;
    const sub = curEvent.isElection ? state._electionSubhead : null;
    const toneColor = curEvent.tone === "grave" ? C.ink : curEvent.tone === "satire" ? C.redink : C.red;
    const sprite = spriteForEvent(curEvent);
    return shell(
      <div>
        <Masthead state={state} era={era} />
        <Kicker color={toneColor}>{curEvent.tone === "grave" ? "From the Editor's Desk" : curEvent.tone === "satire" ? "The Lighter Side" : "Breaking News"} · {state.year}</Kicker>
        <h1 style={{ fontFamily: headline, fontWeight: 900, fontSize: 27, lineHeight: 1.04, margin: "4px 0 4px", color: C.ink }}>{title}</h1>
        {sub && <p style={{ fontFamily: serif, fontStyle: "italic", fontSize: 13, color: C.ink2, margin: "0 0 6px" }}>{sub}</p>}
        {sprite && <div style={{ float: "right", margin: "0 0 6px 10px" }}><Sprite name={sprite} /></div>}
        <p style={{ fontFamily: serif, fontSize: 14, lineHeight: 1.62, color: C.ink, margin: "6px 0 0",
          textIndent: "1.4em" }}>{curEvent.flavour}</p>
        <div style={{ clear: "both" }} />
        <Rule />
        <Kicker color={C.ink2}>The Chief Editor Awaits Your Ruling</Kicker>
        {curEvent.options.map((opt, i) => (
          <div key={i} onClick={() => chooseEventOption(opt)} style={{
            borderTop: "1px solid " + C.ink2, padding: "11px 0", cursor: "pointer" }}>
            <span style={{ fontFamily: headline, fontWeight: 700, fontSize: 15.5, color: C.ink }}>▸ {opt.label}</span>
          </div>
        ))}
      </div>
    );
  }

  if (phase === "summary") {
    return shell(
      <div>
        <Masthead state={state} era={era} />
        {eventResult && (
          <div>
            <Kicker color={C.ink2}>How It Played Out</Kicker>
            <p style={{ fontFamily: serif, fontSize: 14, lineHeight: 1.6, color: C.ink, margin: "4px 0 0", textIndent: "1.4em" }}>{eventResult}</p>
            <Rule />
          </div>
        )}
        <Kicker>The Indices · {state.year}</Kicker>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "2px 16px", marginTop: 4 }}>
          {PILLAR_DEFS.map(pd => <IndexBar key={pd.id} label={pd.label} val={state.pillars[pd.id]} color={pd.color} />)}
        </div>
        <Rule />
        <Kicker color={C.ink2}>The Communities Report</Kicker>
        {state.communities.map(c => (
          <div key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", borderTop: "1px solid " + C.stain, padding: "5px 0" }}>
            <span style={{ fontFamily: serif, fontSize: 13.5, color: C.ink }}>
              <span style={{ color: c.color, fontWeight: 700 }}>{c.glyph}</span> {c.name}
            </span>
            <span style={{ fontFamily: typewriter, fontSize: 10.5, color: c.content >= 55 ? C.ink2 : c.content >= 45 ? C.redink : C.red }}>
              content {Math.round(c.content)} · {c.share.toFixed(1)}%
            </span>
          </div>
        ))}
        {newStory && (
          <div>
            <Rule />
            <Kicker color={C.redink}>A Life on the Dot</Kicker>
            <p style={{ fontFamily: serif, fontSize: 13.5, lineHeight: 1.58, color: C.ink, margin: "4px 0 0" }}>
              <b>{newStory.who}</b> {newStory.text}
            </p>
          </div>
        )}
        <Rule />
        <div style={{ fontFamily: typewriter, fontSize: 11, color: C.faded, lineHeight: 1.6 }}>
          {turnNotes.map((n, i) => <div key={i}>· {n}</div>)}
        </div>
        <PaperBtn primary onClick={nextTurn}>
          {state.turn >= state.totalTurns ? "Print the Final Back Page" : "File the Next Edition · " + (state.year + 5)}
        </PaperBtn>
      </div>
    );
  }

  if (phase === "end") return shell(<RunEnd state={state} onRestart={start} />);
  return shell(<div />);
}


// ============================================================
// THE BACK PAGE: screenshot-bait final retrospective, newspaper styled.
// ============================================================
function RunEnd({ state, onRestart }) {
  const score = nationScore(state);
  const v = verdictFor(score, state);
  const hist = state.history;
  const avgScore = round1(hist.reduce((s, h) => s + h.score, 0) / Math.max(1, hist.length));
  const peak = Math.max(...hist.map(h => h.score));
  const best = hist.reduce((b, h) => h.score > (b ? b.score : 0) ? h : b, null);
  const startYear = state.year - state.totalTurns * 5 + 5;

  const comms = [...state.communities].sort((a, b) => b.content - a.content);
  const topComm = comms[0], bottomComm = comms[comms.length - 1];
  const equityGap = Math.round(topComm.content - bottomComm.content);
  const p = state.pillars;
  const strongest = PILLAR_DEFS.reduce((b, pd) => p[pd.id] > p[b.id] ? pd : b, PILLAR_DEFS[0]);
  const weakest = PILLAR_DEFS.reduce((b, pd) => p[pd.id] < p[b.id] ? pd : b, PILLAR_DEFS[0]);
  const realNote = pick(REAL_NOTES);

  const titbits = [
    "The nation averaged a Thriving Index of " + avgScore + " across " + state.totalTurns + " editions, peaking at " + peak + ".",
    "Strongest pillar: " + strongest.label + " at " + Math.round(p[strongest.id]) + ". Weakest: " + weakest.label + " at " + Math.round(p[weakest.id]) + ".",
    equityGap <= 12 ? "Remarkably even: a mere " + equityGap + " points separated the most and least content communities." :
      "A " + equityGap + "-point contentment gap split " + topComm.name + " from " + bottomComm.name + ", the unfinished business of any nation.",
    state.migrantCareActions > 0 ? "You chose, more than once, to treat the men who built the city as people. The quiet decency the headlines rarely record." :
      "The migrant hands that built the towers stayed largely invisible in the record. History tends to notice that, eventually.",
    state.immigrationWaves > 0 ? "You opened the immigration lane " + state.immigrationWaves + " time" + (state.immigrationWaves > 1 ? "s" : "") + ", reshaping the dot's makeup much as real history did." :
      "You grew the nation almost entirely from within, a rare and difficult path for so small a place.",
  ];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: typewriter, fontSize: 9.5, color: C.faded }}>
        <span>THE BACK PAGE</span><span>RETROSPECTIVE · {startYear}–{state.year}</span>
      </div>
      <DoubleRule />
      <div style={{ textAlign: "center" }}>
        <Kicker>The Verdict of History on {capitalise(state.nationName)}</Kicker>
        <div style={{ fontFamily: headline, fontWeight: 900, fontSize: 34, lineHeight: .98, color: v.color, margin: "6px 0" }}>{v.tag}</div>
        <div style={{ fontFamily: headline, fontWeight: 700, fontSize: 22, color: C.ink }}>Thriving Index {score}</div>
        <div style={{ fontFamily: typewriter, fontSize: 10, color: C.faded, marginTop: 2 }}>
          Planner {state.leaderName} · {state.totalTurns} editions · Chief Editor {state.editorName}
        </div>
      </div>
      <Rule thick />
      <p style={{ fontFamily: serif, fontSize: 14, lineHeight: 1.62, color: C.ink, margin: 0, textIndent: "1.4em" }}>{v.line}</p>

      <Rule />
      <Kicker color={C.ink2}>The Shape of the Nation</Kicker>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 56, marginTop: 8, borderBottom: "1px solid " + C.ink2, paddingBottom: 2 }}>
        {hist.map((h, i) => (
          <div key={i} title={"Ed. " + h.turn + ": " + h.score} style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "flex-end", height: "100%" }}>
            <div style={{ width: "100%", height: h.score + "%", background: C.ink, minHeight: 3 }} />
          </div>
        ))}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: typewriter, fontSize: 9, color: C.faded, marginTop: 3 }}>
        <span>{startYear}</span><span>{state.year}</span>
      </div>

      <Rule />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, textAlign: "center" }}>
        <BackStat label="Final Index" val={score} color={v.color} />
        <BackStat label="Best Edition" val={best ? best.score : "-"} color={C.ink} />
        <BackStat label="Treasury" val={fmtMoney(state.reserves + state.bankedReserves)} color={C.ink} />
      </div>

      <Rule />
      <Kicker color={C.redink}>The Final Communities Report</Kicker>
      {comms.map(c => (
        <div key={c.id} style={{ borderTop: "1px solid " + C.stain, padding: "5px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
            <span style={{ fontFamily: serif, fontSize: 13.5, fontWeight: 600, color: C.ink }}>
              <span style={{ color: c.color, fontWeight: 700 }}>{c.glyph}</span> {c.name}
            </span>
            <span style={{ fontFamily: typewriter, fontSize: 10, color: c.content >= 55 ? C.ink2 : c.content >= 45 ? C.redink : C.red }}>
              {Math.round(c.content)} content
            </span>
          </div>
          <div style={{ fontFamily: typewriter, fontSize: 9.5, color: C.faded, marginTop: 2 }}>
            share {c.share.toFixed(1)}% · income {Math.round(c.income)} · attainment {Math.round(c.attainment)}
          </div>
        </div>
      ))}

      {state.storylines.length > 0 && (
        <div>
          <Rule />
          <Kicker color={C.ink2}>Lives That Defined the Era</Kicker>
          {state.storylines.slice(0, 5).map((sl, i) => (
            <p key={i} style={{ fontFamily: serif, fontSize: 12.5, lineHeight: 1.5, color: C.ink, margin: "5px 0 0" }}>
              <b>{sl.who}</b> <span style={{ color: C.faded, fontFamily: typewriter, fontSize: 9.5 }}>({sl.year})</span> {sl.text}
            </p>
          ))}
        </div>
      )}

      <Rule />
      <Kicker color={C.ink2}>Editor's Notes</Kicker>
      <div style={{ fontFamily: serif, fontSize: 12.5, color: C.ink2, lineHeight: 1.55, marginTop: 4 }}>
        {titbits.map((t, i) => <div key={i} style={{ padding: "2px 0" }}>· {t}</div>)}
      </div>

      <Rule thick />
      <Kicker color={C.redink}>From the Real Archives</Kicker>
      <p style={{ fontFamily: serif, fontSize: 13, lineHeight: 1.56, color: C.ink, margin: "4px 0 0", fontStyle: "italic" }}>{realNote}</p>
      <div style={{ fontFamily: typewriter, fontSize: 9, color: C.faded, marginTop: 8, lineHeight: 1.4 }}>
        Seeded from Singapore Census of Population 2020, Department of Statistics. Figures real; nation fictional.
      </div>

      <PaperBtn primary onClick={onRestart}>Set a New Front Page · Run It Back</PaperBtn>

      <Rule />
      <p style={{ fontFamily: typewriter, fontSize: 10, color: C.faded, textAlign: "center", lineHeight: 1.7, marginTop: 8 }}>
        A small game about a small island and the people who fill it.<br />
        Made by the thoughts of a Singaporean.<br />
        <span style={{ color: C.redink, fontFamily: headline, fontWeight: 700, fontSize: 14, fontStyle: "italic" }}>Majulah Singapura.</span>
      </p>
    </div>
  );
}

function BackStat({ label, val, color }) {
  return (
    <div style={{ border: "1px solid " + C.ink2, padding: "8px 6px" }}>
      <div style={{ fontFamily: typewriter, fontSize: 8.5, color: C.faded, letterSpacing: ".05em" }}>{String(label).toUpperCase()}</div>
      <div style={{ fontFamily: headline, fontWeight: 900, fontSize: 19, color: color || C.ink, marginTop: 2 }}>{val}</div>
    </div>
  );
}

// ---------- entry point ----------
function App() { return <Game />; }
</script>

<script>
(function () {
  var ROOT = document.getElementById("root");
  function showError(msg) {
    ROOT.innerHTML = '<div class="errbox"><b>Something went wrong loading the game.</b>\n\n' +
      String(msg).replace(/</g, "&lt;") +
      '\n\nIf you are viewing this inside an app preview, open the real website link in your browser instead.</div>';
  }
  function loadScript(urls, done, fail) {
    var i = 0;
    function tryNext() {
      if (i >= urls.length) { fail(); return; }
      var s = document.createElement("script");
      s.src = urls[i++]; s.crossOrigin = "anonymous";
      s.onload = function () { done(); };
      s.onerror = function () { tryNext(); };
      document.head.appendChild(s);
    }
    tryNext();
  }
  var REACT = ["https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js","https://unpkg.com/react@18.3.1/umd/react.production.min.js","https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"];
  var REACTDOM = ["https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js","https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js","https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"];
  var BABEL = ["https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js","https://unpkg.com/@babel/standalone@7.25.6/babel.min.js","https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"];
  function boot() {
    try {
      if (!window.React || !window.ReactDOM) { showError("React did not load from any CDN."); return; }
      if (!window.Babel) { showError("Babel did not load."); return; }
      var hooks = "var useState=React.useState,useMemo=React.useMemo,useEffect=React.useEffect,useRef=React.useRef;\n";
      var mount = "\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));";
      var src = document.getElementById("appsrc").textContent;
      var compiled = Babel.transform(hooks + src + mount, { presets: ["react"] }).code;
      (0, eval)(compiled);
    } catch (err) { showError((err && err.stack) || err); }
  }
  loadScript(REACT, function () {
    loadScript(REACTDOM, function () {
      loadScript(BABEL, boot, function () { showError("Could not load Babel."); });
    }, function () { showError("Could not load ReactDOM."); });
  }, function () { showError("Could not load React."); });
})();
</script>

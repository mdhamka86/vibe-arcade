const DECK_MIN=8, DECK_MAX=12;
function Deckbuilder({owned,initialDeck,onStart,onBack}){
  const ownedCards=ROSTER.filter(c=>owned.includes(c.id));
  const [picked,setPicked]=useState(initialDeck&&initialDeck.length?initialDeck:ownedCards.slice(0,Math.min(DECK_MAX,ownedCards.length)).map(c=>c.id));
  const [capHit,setCapHit]=useState(false);
  function toggle(id){
    const has=picked.includes(id);
    if(has){ SFX.tap(); setPicked(p=>p.filter(x=>x!==id)); return; }
    if(picked.length>=DECK_MAX){
      SFX.deny();
      setCapHit(true); setTimeout(()=>setCapHit(false),450);
      return;
    }
    SFX.tap();
    setPicked(p=>p.includes(id)?p:[...p,id]);
  }
  const count=picked.length;
  const ok=count>=DECK_MIN&&count<=DECK_MAX;
  // mana curve of picked
  const curve=[1,2,3,4,5];
  const counts=curve.map(c=>picked.map(id=>BY_ID[id]).filter(x=>x&&(c<5?x.cost===c:x.cost>=5)).length);
  const maxC=Math.max(1,...counts);
  return (
    <div>
      <div className="topbar">
        <button className="btn ghost" onClick={onBack}><Icon name="arrowL" size={14}/> Menu</button>
        <h2>Build Your Deck</h2>
        <span/>
      </div>
      <div className={`deck-bar ${capHit?'cap-hit':''}`}>
        <div>
          <div className={`deck-count ${ok?'':'bad'}`}>Deck: <b>{count}</b> / {DECK_MAX}</div>
          <div style={{fontSize:11,color:capHit?'#e98a7a':'var(--ink-dim)'}}>{capHit?'Deck is full — remove one first':count<DECK_MIN?`Pick at least ${DECK_MIN}`:count>=DECK_MAX?'Deck full':'Ready to march'}</div>
        </div>
        <div className="curve">
          {curve.map((c,i)=>(
            <div key={c} className="bar" style={{height:(counts[i]/maxC*30+3)+'px'}}>
              <span>{counts[i]||''}</span><i>{c<5?c:'5+'}</i>
            </div>
          ))}
        </div>
        <button className="btn gold" disabled={!ok} onClick={()=>onStart(picked)}>March to Battle <Icon name="sword" size={14}/></button>
      </div>
      <p className="collect-hint">Tap cards to add or remove them. A tight curve of cheap and costly cats wins more than a pile of legendaries. Between {DECK_MIN} and {DECK_MAX} cards.</p>
      <div className="help-panel">
        <h4><Icon name="paw" size={14}/> Deckbuilding tips</h4>
        <ul>
          <li>Include a few <b>cheap cats</b> (cost 1-2) so you always have something to play early.</li>
          <li>Mix <b>roles</b>: a Guardian to soak hits, a Cleric to heal, an Assassin to finish.</li>
          <li>The little bars above show your <b>cost curve</b> — avoid stacking too many expensive cats.</li>
        </ul>
      </div>
      <div className="grid">
        {ownedCards.map(c=>{
          const idx=picked.indexOf(c.id);
          return (
            <div key={c.id} className="deckpick" style={{position:'relative'}}>
              {idx>=0 && <span className="pickbadge">{idx+1}</span>}
              <Card card={c} className={`pickable ${idx>=0?'picked':''}`} onClick={()=>toggle(c.id)}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- THE ASCENT: the legend heckles you from the throne ---------- */
function LegendWatch({legendId,rung}){
  const c=BY_ID[legendId];
  const photo=(typeof BOSS_PHOTOS!=='undefined'&&BOSS_PHOTOS[legendId])||(c&&c.photo)||null;
  const lines=LEGEND_WATCH[legendId]||[];
  const text=lines[Math.min(rung,lines.length-1)]||'';
  const [typed,setTyped]=useState('');
  const boxRef=useRef(null);
  // heat 0..1 — the closer you get, the more the panel glows
  const heat=Math.min(1,rung/6);

  useEffect(()=>{
    const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(reduce){ setTyped(text); return; }
    setTyped('');
    let i=0;
    const iv=setInterval(()=>{
      i++; setTyped(text.slice(0,i));
      if(i>=text.length) clearInterval(iv);
    },22);
    if(boxRef.current) gsap.fromTo(boxRef.current,{y:8,opacity:0},{y:0,opacity:1,duration:.4,ease:'power2.out'});
    return ()=>clearInterval(iv);
  },[text]);

  return (
    <div ref={boxRef} className="watch" style={{'--heat':heat}}>
      <div className="watch-face">
        {photo
          ? <img src={photo} alt={c?c.name:''}
              style={{objectPosition:(typeof BOSS_FRAME!=='undefined'&&c&&BOSS_FRAME[c.id])||'50% 30%'}}/>
          : <div className="watch-eyes"><i/><i/></div>}
        <span className="watch-scan"/>
      </div>
      <div className="watch-body">
        <span className="watch-who">
          {c?c.name:'The Throne'} <em>watches from the throne</em>
        </span>
        <p>{text?<>"{typed}"</>:null}</p>
      </div>
    </div>
  );
}

  const [typed,setTyped]=useState('');
  const [full,setFull]=useState(false);
  const cardRef=useRef(null), vsRef=useRef(null), lineRef=useRef(null);

  // opening slam
  useEffect(()=>{
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(reduce){ setPhase('talk'); return; }
    const t=setTimeout(()=>setPhase('talk'),1150);
    if(vsRef.current) gsap.fromTo(vsRef.current,{scale:3.2,opacity:0,rotation:-14},
      {scale:1,opacity:1,rotation:-6,duration:.5,ease:'back.out(2)'});
    if(cardRef.current) gsap.fromTo(cardRef.current,{x:90,opacity:0},
      {x:0,opacity:1,duration:.55,ease:'power3.out',delay:.15});
    SFX.throne();
    setTimeout(()=>{ try{ SFX.slam(); screenShake(); impactFlash(); }catch(e){} },420);
    return ()=>clearTimeout(t);
  },[]);

  // typewriter for the current beat
  useEffect(()=>{
    if(phase!=='talk')return;
    const line=script[beat];
    if(!line)return;
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(reduce){ setTyped(line.text); setFull(true); return; }
    setTyped(''); setFull(false);
    let i=0;
    const speed=line.who==='legend'?26:18;
    const iv=setInterval(()=>{
      i++; setTyped(line.text.slice(0,i));
      if(i%2===0) SFX.blip();
      if(i>=line.text.length){ clearInterval(iv); setFull(true); }
    },speed);
    if(lineRef.current) gsap.fromTo(lineRef.current,{y:10,opacity:0},{y:0,opacity:1,duration:.28,ease:'power2.out'});
    return ()=>clearInterval(iv);
  },[beat,phase]);

  function advance(){
    if(phase!=='talk')return;
    const line=script[beat];
    if(!full){ setTyped(line.text); setFull(true); return; }   // tap to skip typing
    if(beat+1<script.length){ setBeat(b=>b+1); }
    else { setPhase('ready'); }
  }

  const line=script[beat];
  return (
    <div className="vs-screen" onClick={advance}>
      <div className="vs-rays"/>
      <div className="vs-top">
        <div ref={vsRef} className="vs-mark">VS</div>
      </div>

      <div ref={cardRef} className="vs-card">
        <Card card={c}/>
      </div>

      <div className="vs-name">
        <b>{c.name}</b>
        <i>{c.title}</i>
      </div>

      {phase==='talk' && line && (
        <div ref={lineRef} className={`vs-line ${line.who}`}>
          <span className="vs-who">{line.who==='legend'?c.name:'You'}</span>
          <p>{typed}{!full && <em className="caret">|</em>}</p>
          {full && <span className="vs-next">tap to continue</span>}
        </div>
      )}

      {phase==='ready' && (
        <div className="vs-go">
          <button className="btn gold big-throne" onClick={(e)=>{e.stopPropagation();onGo();}}>Fight</button>
          <span className="vs-hint">Nine lives got you here. One fight decides it.</span>
        </div>
      )}

      <div className="vs-dots">
        {script.map((_,i)=>(
          <i key={i} className={i<=beat&&phase!=='slam'?'on':''}/>
        ))}
      </div>
    </div>
  );
}

/* ---------- THE ASCENT: run summary ---------- */
function RunEnd({run,won,onDone}){
  const legend=run.legendId?BY_ID[run.legendId]:null;
  const photo=legend&&((typeof BOSS_PHOTOS!=='undefined'&&BOSS_PHOTOS[legend.id])||legend.photo);
  return (
    <div className="modal-bg">
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3 style={{textAlign:'center'}}>
          {won? <><Icon name="trophy" size={20} style={{marginRight:6}}/>The Ascent Complete</>
              : <><Icon name="skull" size={18} style={{marginRight:6}}/>The Run Ends</>}
        </h3>
        {photo && (won || run.rung===6) && (
          <div className={`end-portrait ${won?'won':'lost'}`}>
            <img src={photo} alt={legend.name}
              style={{objectPosition:(typeof BOSS_FRAME!=='undefined'&&BOSS_FRAME[legend.id])||'50% 30%'}}/>
          </div>
        )}
        {won && legend && <p className="throne-line" style={{marginTop:10}}>{LEGEND_DEFEAT[run.legendId]}</p>}
        {!won && legend && run.rung===6 && <p className="throne-line" style={{marginTop:10,color:'#e98a7a'}}>{LEGEND_WIN[run.legendId]}</p>}
        {!won && <p style={{textAlign:'center',color:'var(--ink-dim)',fontSize:13,marginTop:10}}>
          Nine lives spent on the way to {RUNGS[run.rung]?RUNGS[run.rung].name:'the top'}. The house keeps what it takes.
        </p>}
        <div className="run-stats">
          <span className="statchip"><Icon name="paw" size={12}/> reached rung {Math.min(run.rung+1,7)}/7</span>
          <span className="statchip"><Icon name="heart" size={12}/> {run.lives} lives left</span>
          <span className="statchip"><Icon name="fish" size={12}/> {run.fish} fish banked</span>
        </div>
        <div style={{textAlign:'center',marginTop:16}}>
          <button className="btn gold" onClick={onDone}>Back to the Guildhall</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const saved = loadSave();
  const [screen,setScreen]=useState('title');
  const [owned,setOwned]=useState(saved?saved.owned:STARTER_OWNED);
  const [coins,setCoins]=useState(saved?saved.coins:50);
  const [tier,setTier]=useState(saved?saved.tier:1);
  const [wins,setWins]=useState(saved?saved.wins:0);
  const [toast,setToast]=useState(null);
  const [reveal,setReveal]=useState(null);
  const [deck,setDeck]=useState(saved&&saved.deck?saved.deck:[]);
  const [seenCoach,setSeenCoach]=useState(saved?!!saved.seenCoach:false);
  const [saveOn,setSaveOn]=useState(false);
  // ---- THE ASCENT run state ----
  const [run,setRun]=useState(null);
  const [rewards,setRewards]=useState(null);
  const [throne,setThrone]=useState(false);
  const [runEnd,setRunEnd]=useState(null);
  const [bestRung,setBestRung]=useState(saved&&saved.bestRung?saved.bestRung:0);
  const [legendsBeaten,setLegendsBeaten]=useState(saved&&saved.legendsBeaten?saved.legendsBeaten:[]);

  // persist whenever core progression changes
  useEffect(()=>{
    const ok=writeSave({owned,coins,tier,wins,deck,seenCoach,bestRung,legendsBeaten});
    setSaveOn(ok);
  },[owned,coins,tier,wins,deck,seenCoach,bestRung,legendsBeaten]);

  function showToast(t){setToast(t);setTimeout(()=>setToast(null),2600);}

  /* ---------- THE ASCENT lifecycle ---------- */
  // guards against a transition firing twice (double-invoked effects, rapid HP drops)
  const transitionRef=useRef(false);

  function startRun(runDeck){
    // the legend at the top: first unbeaten in BOSS_ORDER, else random
    const nextLegend=BOSS_ORDER.find(id=>!legendsBeaten.includes(id))
                  || BOSS_ORDER[Math.floor(Math.random()*BOSS_ORDER.length)];
    transitionRef.current=false;
    setRun({lives:RUN_LIVES,rung:0,deck:runDeck,buffs:{},fish:0,legendId:nextLegend});
    setScreen('runmap');
  }

  function fightRung(){
    if(!run)return;
    transitionRef.current=false;
    if(RUNGS[run.rung].boss){ setThrone(true); return; }
    setScreen('battle');
  }

  function onRungWin(){
    if(!run||transitionRef.current)return;
    transitionRef.current=true;
    const r=run;
    const isBoss=RUNGS[r.rung].boss;
    if(isBoss){
      const reward=200;
      setCoins(c=>c+reward+r.fish);
      setWins(w=>w+1);
      setLegendsBeaten(l=>l.includes(r.legendId)?l:[...l,r.legendId]);
      setOwned(o=>o.includes(r.legendId)?o:[...o,r.legendId]);
      setBestRung(b=>Math.max(b,7));
      setScreen('runmap');
      SFX.fanfare();
      setTimeout(()=>setRunEnd({run:r,won:true}),400);
      return;
    }
    const nr={...r,rung:r.rung+1,fish:r.fish+30};
    setRun(nr);
    setBestRung(b=>Math.max(b,nr.rung));
    setWins(w=>w+1);
    setScreen('runmap');
    setTimeout(()=>setRewards(rollRewards(nr.deck,owned,nr.lives)),350);
  }

  function onRungLose(){
    if(!run||transitionRef.current)return;
    transitionRef.current=true;
    const r=run;
    const lives=r.lives-1;
    if(lives<=0){
      setCoins(c=>c+r.fish);
      setRun({...r,lives:0});
      setScreen('runmap');
      setTimeout(()=>setRunEnd({run:{...r,lives:0},won:false}),400);
      return;
    }
    setRun({...r,lives});
    setScreen('runmap');
    showToast('A life spent. '+lives+' left.');
  }

  function takeReward(r){
    SFX.reward();
    setRewards(null);
    setRun(prev=>{
      if(!prev)return prev;
      if(r.kind==='recruit') return {...prev,deck:[...prev.deck,r.card.id]};
      if(r.kind==='upgrade'){
        const b={...prev.buffs};
        const cur=b[r.cardId]||{atk:0,hp:0};
        b[r.cardId]= r.mode==='atk'?{...cur,atk:cur.atk+1}:{...cur,hp:cur.hp+2};
        return {...prev,buffs:b};
      }
      if(r.kind==='life') return {...prev,lives:Math.min(RUN_LIVES,prev.lives+1)};
      if(r.kind==='fish') return {...prev,fish:prev.fish+r.amount};
      return prev;
    });
  }

  function abandonRun(){
    if(run) setCoins(c=>c+run.fish);
    setRun(null);setRewards(null);setThrone(false);
    setScreen('collection');
    showToast('Run abandoned. Fish banked.');
  }

  function finishRun(){
    const won=runEnd&&runEnd.won;
    const lid=runEnd&&runEnd.run&&runEnd.run.legendId;
    setRunEnd(null);setRun(null);setThrone(false);
    setScreen('collection');
    if(won&&lid) setReveal({card:BY_ID[lid],kind:'boss'});
  }


  function unlock(card,cost){
    setCoins(c=>c-cost);
    setOwned(o=>[...o,card.id]);
    setReveal({card,kind:'card'});
  }

  function resetProgress(){
    clearSave();
    setOwned(STARTER_OWNED);setCoins(50);setTier(1);setWins(0);setDeck([]);
    showToast('Progress reset. Fresh start!');
  }

  return (
    <div>
      {screen==='title' && (
        <div className="title-wrap">
          <h1 className="game-logo"><span className="l1">Whisker</span><span className="l2">Warriors</span></h1>
          <p className="tagline">A card battler of chibi cat champions. Collect the breeds, master the field, and unlock five very real legendary bosses.</p>
          <div className="menu-col">
            <button className="btn gold" onClick={()=>setScreen('collection')}>Enter the Guildhall</button>
            <button className="btn" onClick={()=>setScreen('howto')}>How to Play</button>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginTop:10}}>
            <p style={{color:'var(--ink-dim)',fontSize:11}}>a hammyLabs joint</p>
            <SoundBtn/>
          </div>
        </div>
      )}

      {screen==='howto' && (
        <div>
          <div className="topbar"><button className="btn ghost" onClick={()=>setScreen('title')}><Icon name="arrowL" size={14}/> Back</button><h2>How to Play</h2><span/></div>
          <div className="modal" style={{margin:'0 auto'}}>
            <h3>Reading a Card</h3>
            <p style={{marginBottom:10}}>Every card shows four numbers: <b>COST</b> (gold circle, top-right) is the energy to play it. <b>SPD</b> (blue, top-left) is speed — higher strikes first. <b>ATK</b> (red) is attack damage and <b>HP</b> (green) is health, both in the box at the bottom-right.</p>
            <h3>The Basics</h3>
            <p style={{marginBottom:10}}>Each turn you get energy (the gold pips). Tap a card in your hand to play that cat onto your field if you can afford its COST.</p>
            <h3>Combat</h3>
            <p style={{marginBottom:10}}>Tap one of your cats to select it (it glows gold), then tap an enemy cat to attack. Enemies glowing red are valid targets. If no enemy cats block, a "Strike Enemy Hero" button appears — reduce the enemy hero to 0 to win.</p>
            <h3>Keywords</h3>
            <p style={{marginBottom:10}}><Icon name="shield" size={13}/> <b>Taunt</b> (Maine Coon, Oscar) must be attacked first. <Icon name="moon" size={13}/> <b>Stealth</b> (Russian Blue, Smokey) can't be targeted until it strikes. <Icon name="sparkle" size={13}/> <b>Shield</b> absorbs damage. Clerics like Ragdoll and Goku heal your team.</p>
            <h3>The Ascent</h3>
            <p style={{marginBottom:10}}>A run is seven rungs, from <b>The Alley</b> up to <b>The Throne</b>. You carry <b>nine lives</b>: lose a fight and you spend one, then retry the same rung. Spend all nine and the run ends.</p>
            <h3>Rewards</h3>
            <p style={{marginBottom:10}}>Clear a rung and you pick <b>one of three</b> spoils: <b>Recruit</b> a new cat into the run, <b>Train</b> a cat you already have (+1 ATK or +2 HP), <b>Rest</b> to recover a life, or <b>Forage</b> for fish. The others are gone, so choose well. Training and recruits last for that run only.</p>
            <h3>The Throne</h3>
            <p style={{marginBottom:10}}>One of the five legends waits at the top. Beat them and they join your roster <b>permanently</b>. Lose and the whole climb ends. Fish you banked along the way are yours either way.</p>
            <p style={{marginTop:12,fontSize:11,opacity:.7}}>Breed photos sourced from Wikimedia Commons (freely licensed). The five legendary bosses are Hammy and Naddy's own cats: Oscar, Rocket, Smokey, Goku and Selina.</p>
            <div style={{textAlign:'center',marginTop:16}}><button className="btn gold" onClick={()=>setScreen('collection')}>Got it — let's go</button></div>
          </div>
        </div>
      )}

      {screen==='collection' && (
        <Collection owned={owned} coins={coins} wins={wins} saveOn={saveOn} bestRung={bestRung} legendsBeaten={legendsBeaten} onBattle={()=>setScreen('deckbuilder')} onBack={()=>setScreen('title')} onUnlock={unlock} onReset={()=>{if(confirm('Reset all progress and unlocked cards? This cannot be undone.'))resetProgress();}}/>
      )}

      {screen==='deckbuilder' && (
        <Deckbuilder owned={owned} initialDeck={deck} onBack={()=>setScreen('collection')} onStart={(d)=>{setDeck(d);startRun(d);}}/>
      )}

      {screen==='runmap' && run && (
        <RunMap run={run} onFight={fightRung} onAbandon={()=>{if(confirm('Abandon the run? You keep the fish you have earned.'))abandonRun();}}/>
      )}

      {screen==='battle' && run && (
        <Battle
          key={'r'+run.rung+'-'+run.lives}
          owned={owned}
          tier={RUNGS[run.rung].tier}
          deck={run.deck}
          buffs={run.buffs}
          eHeroStart={RUNGS[run.rung].eHero}
          bossId={RUNGS[run.rung].boss?run.legendId:null}
          rung={RUNGS[run.rung]}
          lives={run.lives}
          showCoach={!seenCoach} onCoachDone={()=>setSeenCoach(true)}
          onWin={onRungWin} onLose={onRungLose} onQuit={onRungLose}/>
      )}

      {rewards && <RewardPick rewards={rewards} onPick={takeReward}/>}
      {throne && run && <ThroneIntro legendId={run.legendId} onGo={()=>{setThrone(false);setScreen('battle');}}/>}
      {runEnd && <RunEnd run={runEnd.run} won={runEnd.won} onDone={finishRun}/>}

      {toast && <div className="toast">{toast}</div>}

      {reveal && (
        <div className="modal-bg" onClick={()=>setReveal(null)}>
          <div className="modal reveal-modal" onClick={e=>e.stopPropagation()}>
            <h3>{reveal.kind==='boss'?<><Icon name="star" size={20} style={{marginRight:6}}/>Legendary Boss Unlocked!</>:<><Icon name="sparkle" size={18} style={{marginRight:6}}/>New Card Unlocked!</>}</h3>
            <div className="reveal-card reveal-pop"><Card card={reveal.card}/></div>
            <p style={{textAlign:'center',fontStyle:'italic'}}>{(typeof CAPTIONS!=='undefined'&&CAPTIONS[reveal.card.id])||reveal.card.flavor}</p>
            {reveal.kind==='boss' && (
              <div className="swap-hint">
                <Icon name="star" size={13}/> <b>{reveal.card.name} joins your roster.</b> One of the five legends of the house, in the fur.
              </div>
            )}
            <div style={{textAlign:'center',marginTop:14}}><button className="btn gold" onClick={()=>setReveal(null)}>Add to Roster</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(err,info){ console.log('REACT_CRASH: '+(err&&err.message)+' | '+(err&&err.stack||'').split('\n').slice(0,4).join(' <<< ')); }
  render(){
    if(this.state.err) return <div style={{padding:20,color:'#ffd0d0',fontFamily:'monospace',fontSize:12}}>
      <b>Something broke.</b><br/>{String(this.state.err&&this.state.err.message)}<br/><br/>
      <button className="btn gold" onClick={()=>location.reload()}>Reload</button></div>;
    return this.props.children;
  }
}
// Browsers block audio until the user interacts. Unlock on the first gesture.
['pointerdown','keydown','touchstart'].forEach(ev=>
  window.addEventListener(ev, ()=>SFX.unlock(), {once:false, passive:true}));

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Whisker Warriors</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
<style>
  :root{
    --bg:#211812; --panel:#2f2418; --panel2:#3a2d1e; --ink:#f3e9d8;
    --ink-dim:#b7a488; --line:#4a3a26; --gold:#d8b64a; --gold-dim:#9a7f33;
    --blood:#b8483a; --leaf:#5b8a4a; --sky:#5a86b0; --violet:#7a5f9e;
    --spurs:#132257; --arsenal:#c2185b;
    --common:#8a7a5c; --rare:#5a86b0; --epic:#9a6fc0; --legendary:#d8b64a;
    --shadow:0 8px 24px rgba(0,0,0,.45);
    --font-d:'Georgia','Times New Roman',serif;
    --font-b:'Trebuchet MS','Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#140f0a;color:var(--ink);font-family:var(--font-b);overflow-x:hidden}
  body{min-height:100vh;
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, rgba(216,182,74,.10), transparent 55%),
      radial-gradient(ellipse 100% 60% at 50% 110%, rgba(122,95,158,.08), transparent 55%),
      radial-gradient(ellipse 140% 100% at 50% 50%, #241a10 0%, #17110b 60%, #0d0a06 100%);
    position:relative}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.025) 3px),
      radial-gradient(circle at 50% 40%, transparent 60%, rgba(0,0,0,.5) 100%);
    mix-blend-mode:multiply}
  #root{position:relative;z-index:1}
  .ico{display:inline-block;flex:0 0 auto}
  #root{max-width:1100px;margin:0 auto;padding:12px}
  h1,h2,h3{font-family:var(--font-d);margin:0}
  button{font-family:var(--font-b);cursor:pointer;border:none;background:none;color:inherit}
  .btn{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:10px;padding:11px 18px;color:var(--ink);font-weight:700;font-size:15px;transition:transform .1s,box-shadow .2s;box-shadow:var(--shadow)}
  .btn:active{transform:translateY(2px)}
  .btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#2a1e08;border-color:var(--gold)}
  .btn.ghost{background:transparent;box-shadow:none;border-color:var(--line)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .hidden{display:none!important}
  /* ===== Title screen ===== */
  .title-wrap{min-height:88vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px}
  .game-logo{font-size:clamp(38px,9vw,74px);line-height:.9;letter-spacing:1px;text-shadow:0 3px 0 #000,0 0 30px rgba(216,182,74,.3)}
  .game-logo .l1{color:var(--gold);display:block}
  .game-logo .l2{color:var(--ink);display:block;font-size:.62em}
  .tagline{color:var(--ink-dim);font-style:italic;font-size:clamp(14px,3.4vw,18px);max-width:460px}
  .menu-col{display:flex;flex-direction:column;gap:12px;width:min(300px,84vw)}
  /* ===== Card ===== */
  /* ===== MTG-style card frame ===== */
  .card{position:relative;border-radius:11px;overflow:hidden;user-select:none;
    background:linear-gradient(160deg,#3a2c1b,#241a10);
    border:1px solid #000;
    padding:5px;
    display:flex;flex-direction:column;height:100%;
    container-type:inline-size;
    box-shadow:var(--shadow),inset 0 0 0 1px rgba(216,182,74,.12)}
  /* rarity frame tints */
  .card.common{background:linear-gradient(160deg,#3c3020,#241c12);}
  .card.rare{background:linear-gradient(160deg,#2c3646,#161d28);}
  .card.epic{background:linear-gradient(160deg,#3a2c4a,#20152c);}
  .card.legendary{background:linear-gradient(160deg,#5a4620,#2c2010);}
  /* title bar */
  .card .titlebar{display:flex;align-items:center;justify-content:space-between;gap:4px;
    background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(0,0,0,.25));
    border:1px solid rgba(0,0,0,.5);border-radius:6px 6px 3px 3px;padding:3px 6px;margin-bottom:4px}
  .card .cname{font-family:var(--font-d);font-weight:700;font-size:clamp(8px,2.2cqw + 3.4px,10.5px);line-height:1.1;color:#f6eeda;text-shadow:0 1px 1px #000;letter-spacing:0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;hyphens:auto}
  .card .cost{flex:0 0 auto;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:900;font-size:12px;color:#2a1e08;background:radial-gradient(circle at 38% 30%,#fff2c4,var(--gold) 70%,#a8842a);box-shadow:inset 0 -2px 3px rgba(0,0,0,.35),inset 0 1px 1px rgba(255,255,255,.6),0 1px 2px rgba(0,0,0,.5);border:1px solid #8a6f22}
  /* art window */
  .card .art{position:relative;width:100%;aspect-ratio:1.15/1;overflow:hidden;border:1px solid #000;border-radius:3px;background:#1a130c;box-shadow:inset 0 0 8px rgba(0,0,0,.6)}
  .card .art::after{content:'';position:absolute;inset:0;border-radius:3px;box-shadow:inset 0 0 0 1px rgba(216,182,74,.18);pointer-events:none}
  .card .art svg{width:100%;height:100%;display:block}
  .card .art img{width:100%;height:100%;object-fit:cover;display:block}
  .card .art img.bossimg{object-fit:cover}
  .card .boss-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--gold);text-align:center;background:repeating-linear-gradient(45deg,#2a2015,#2a2015 8px,#31261a 8px,#31261a 16px)}
  .card .boss-ph .pi{font-size:30px}
  .card .boss-ph .pt{font-size:9px;color:var(--ink-dim);letter-spacing:.5px;padding:0 8px}
  /* type line */
  .card .typeline{display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(0,0,0,.22));
    border:1px solid rgba(0,0,0,.5);border-radius:3px;padding:2px 6px;margin:4px 0}
  .card .typeline .tt{font-family:var(--font-d);font-size:clamp(7px,3.2cqw + 2px,10px);font-weight:700;color:#e8dcc4;text-transform:uppercase;letter-spacing:.2px;min-width:0;flex:1 1 auto;line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;word-break:normal;overflow-wrap:normal}
  .card .typeline .rargem{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 3px currentColor)}
  .rargem.common{color:#cbb48a}.rargem.rare{color:#8fbce8}.rargem.epic{color:#c79fe8}.rargem.legendary{color:#ffdd77}
  /* text box: ability + flavor */
  .card .textbox{background:linear-gradient(180deg,#efe6d0,#e2d6bb);border:1px solid #000;border-radius:3px;padding:5px 6px 34px;color:#2a2114;min-height:52px;position:relative;flex:1 1 auto}
  .card .rules{font-size:9px;line-height:1.28;font-weight:600}
  .card .rules b{color:#6a3d12}
  .card .flavdiv{height:1px;background:linear-gradient(90deg,transparent,rgba(0,0,0,.35),transparent);margin:4px 2px}
  .card .flavor{font-size:8.5px;line-height:1.3;font-style:italic;color:#4a4030}
  /* power / toughness box (bottom-right, over textbox) */
  .card .ptbox{position:absolute;right:5px;bottom:4px;
    background:linear-gradient(180deg,#3a2c1a,#1c130a);
    border:1.5px solid var(--gold-dim);border-radius:6px;
    padding:2px 7px;display:flex;gap:8px;align-items:flex-end;
    box-shadow:0 2px 5px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,235,170,.25);z-index:3}
  .card .ptbox .ptcell{display:flex;flex-direction:column;align-items:center;line-height:1}
  .card .ptbox .ptlbl{font-family:var(--font-b);font-size:6px;font-weight:800;font-style:normal;letter-spacing:.5px;margin-bottom:1px;opacity:.85}
  .card .ptbox .ptlbl.atk{color:#ff9b88}
  .card .ptbox .ptlbl.hp{color:#8fe89f}
  .card .ptbox .p{font-family:var(--font-d);font-weight:900;font-size:15px;line-height:1;
    -webkit-text-stroke:.4px rgba(0,0,0,.6)}
  .card .ptbox .atkv{color:#ff6b52;text-shadow:0 0 6px rgba(255,80,58,.45),0 1px 1px #000}
  .card .ptbox .hpv{color:#4fd06a;text-shadow:0 0 6px rgba(60,200,90,.4),0 1px 1px #000}
  /* cost label beside the gem */
  .card .costwrap{display:flex;align-items:center;gap:2px;flex:0 0 auto}
  .card .costwrap .minilbl{font-family:var(--font-b);font-size:clamp(5px,1.6cqw + 2px,6.5px);font-weight:800;font-style:normal;letter-spacing:.3px;color:var(--gold);opacity:.85}
  .card .cost{position:relative;flex:0 0 auto;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:900;font-size:12px;color:#2a1e08;background:radial-gradient(circle at 38% 30%,#fff2c4,var(--gold) 70%,#a8842a);box-shadow:inset 0 -2px 3px rgba(0,0,0,.35),inset 0 1px 1px rgba(255,255,255,.6),0 1px 2px rgba(0,0,0,.5);border:1px solid #8a6f22}
  /* speed pip with label */
  .card .spdpip{position:absolute;top:5px;left:5px;z-index:3;
    background:linear-gradient(180deg,#26364a,#111a26);
    border:1.5px solid #4a86c0;border-radius:11px;padding:1px 7px 1px 6px;
    font-family:var(--font-d);font-size:12px;font-weight:900;color:#7fd0ff;
    text-shadow:0 0 5px rgba(90,160,255,.5),0 1px 1px #000;
    box-shadow:0 2px 4px rgba(0,0,0,.5),inset 0 1px 0 rgba(160,210,255,.25);
    display:flex;align-items:center;gap:2px}
  .card .spdpip .pip-lbl{font-family:var(--font-b);font-size:6px;font-weight:800;font-style:normal;letter-spacing:.5px;color:#9fd0f0;opacity:.85;margin-left:1px}
  .card.legendary{border-color:var(--gold)}
  /* ===== Collection grid ===== */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .topbar h2{font-size:22px;color:var(--gold)}
  .coin{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(180deg,#332617,#211810);border:1px solid rgba(216,182,74,.3);border-radius:20px;padding:6px 14px;font-weight:800;color:var(--gold);box-shadow:inset 0 1px 0 rgba(216,182,74,.12)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;grid-auto-rows:1fr;align-items:stretch}
  .deckpick{display:flex;height:100%}
  .deckpick>.card{width:100%}
  .card.locked{filter:grayscale(1) brightness(.4)}
  .card.locked .art::after{content:'?';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;font-family:var(--font-d);color:var(--gold);opacity:.6}
  .collect-hint{color:var(--ink-dim);font-size:13px;margin:2px 0 14px}
  /* ===== Battle ===== */
  .battle{display:flex;flex-direction:column;gap:10px;min-height:90vh}
  .side-label{font-family:var(--font-d);font-size:11px;color:var(--gold-dim);letter-spacing:2px;text-transform:uppercase;margin:2px 4px;display:flex;align-items:center;gap:8px}
  .side-label::before,.side-label::after{content:'';height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(216,182,74,.3),transparent)}
  .board-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;min-height:132px;padding:12px 10px;border-radius:6px;position:relative;
    background:
      linear-gradient(180deg, rgba(0,0,0,.32), rgba(0,0,0,.12)),
      radial-gradient(ellipse 90% 120% at 50% 50%, rgba(216,182,74,.05), transparent 70%);
    border:1px solid rgba(216,182,74,.16);
    box-shadow:inset 0 0 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(216,182,74,.1)}
  .board-row::before,.board-row::after{content:'';position:absolute;top:6px;bottom:6px;width:10px;pointer-events:none;
    background:linear-gradient(180deg, transparent, rgba(216,182,74,.22), transparent)}
  .board-row::before{left:4px}.board-row::after{right:4px}
  .board-row.enemy{border-color:rgba(184,72,58,.3);
    background:linear-gradient(180deg, rgba(70,26,26,.4), rgba(0,0,0,.12)), radial-gradient(ellipse 90% 120% at 50% 50%, rgba(184,72,58,.06), transparent 70%)}
  .board-row.mine{border-color:rgba(91,138,74,.3);
    background:linear-gradient(180deg, rgba(0,0,0,.12), rgba(30,54,34,.4)), radial-gradient(ellipse 90% 120% at 50% 50%, rgba(91,138,74,.06), transparent 70%)}
  .mini{width:96px;flex:0 0 auto;position:relative;border-radius:10px;overflow:hidden;background:var(--panel);border:2px solid var(--line);transition:transform .12s}
  .mini.legendary{border-color:var(--gold)}
  .mini .art{aspect-ratio:1/1;overflow:hidden;background:radial-gradient(circle at 50% 35%,#4a3a26,#2a2015)}
  .mini .art svg,.mini .art img{width:100%;height:100%;object-fit:cover}
  .mini .nm{font-size:9px;padding:2px 4px 0;font-family:var(--font-d);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .mstats{display:flex;justify-content:space-between;padding:1px 4px 3px;font-size:10px;font-weight:800}
  .mini .ma{color:#e98a7a}.mini .mh{color:#7ac07a}
  .mini.targetable{cursor:crosshair;border-color:var(--blood);box-shadow:0 0 12px rgba(184,72,58,.6)}
  .mini.selected{border-color:var(--gold);box-shadow:0 0 14px rgba(216,182,74,.7)}
  .mini.dead{opacity:.25;filter:grayscale(1)}
  @keyframes puff{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.6) rotate(8deg)}}
  .turn-tag{font-family:var(--font-d);font-size:12px;color:var(--gold-dim);letter-spacing:1px}
  .mini .hpbar{height:4px;background:#3a1a1a}
  .mini .hpbar>i{display:block;height:100%;background:var(--leaf);transition:width .3s}
  .mini .taunt{position:absolute;top:2px;left:2px;font-size:11px}
  .mini .status{position:absolute;top:2px;right:2px;font-size:11px}
  .hand{display:flex;gap:8px;overflow-x:auto;padding:10px 4px;scroll-snap-type:x mandatory;align-items:stretch}
  .hand .card{width:132px;flex:0 0 auto;height:auto;align-self:stretch;scroll-snap-align:center;cursor:pointer;transition:transform .15s}
  .hand .card.playable:active{transform:translateY(-6px)}
  .hand .card.unplayable{opacity:.5}
  .battle-hud{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:linear-gradient(180deg,#332617,#211810);
    border:1px solid rgba(216,182,74,.2);border-radius:8px;padding:9px 13px;flex-wrap:wrap;
    box-shadow:var(--shadow),inset 0 1px 0 rgba(216,182,74,.1)}
  .energy{display:flex;gap:3px}
  .energy .pip{width:14px;height:14px;border-radius:50%;background:#3a2d1e;border:1px solid var(--line)}
  .energy .pip.on{background:radial-gradient(circle at 40% 30%,#ffe27a,var(--gold));border-color:var(--gold)}
  .log{font-size:11px;color:var(--ink-dim);min-height:16px;text-align:center;font-style:italic}
  .hero-hp{display:flex;align-items:center;gap:8px;font-weight:800}
  .hero-hp .bar{width:120px;height:12px;background:#3a1a1a;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .hero-hp .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--blood),#d86a5a)}
  .banner{position:fixed;inset:0;background:rgba(20,14,8,.9);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:50;text-align:center;padding:20px}
  .banner h2{font-size:clamp(34px,10vw,68px);color:var(--gold)}
  .fx-layer{position:fixed;inset:0;pointer-events:none;z-index:40}
  .float-num{position:absolute;font-weight:900;font-size:22px;font-family:var(--font-d);text-shadow:0 2px 4px #000}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold);border-radius:10px;padding:10px 18px;font-weight:700;z-index:60;box-shadow:var(--shadow)}
  .modal-bg{position:fixed;inset:0;background:rgba(10,7,4,.8);display:flex;align-items:center;justify-content:center;z-index:70;padding:16px}
  .modal{background:var(--panel);border:2px solid var(--gold);border-radius:16px;max-width:420px;width:100%;padding:20px;box-shadow:var(--shadow);max-height:88vh;overflow:auto}
  .modal h3{color:var(--gold);font-size:20px;margin-bottom:8px}
  .modal p{font-size:14px;line-height:1.5;color:var(--ink-dim)}
  .reveal-card{display:flex;justify-content:center;margin:14px 0}
  .reveal-card .card{width:180px}
  .swap-hint{background:rgba(0,0,0,.25);border:1px dashed var(--gold-dim);border-radius:8px;padding:8px 10px;font-size:11px;color:var(--ink-dim);margin-top:10px}
  .swap-hint code{color:var(--gold);font-size:11px}
  /* ===== THE ASCENT ===== */
  .lives-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(184,72,58,.16);border:1px solid #b8483a;
    color:#e98a7a;border-radius:999px;padding:5px 11px;font-family:var(--font-d);font-weight:700;font-size:14px}
  .ladder{display:flex;flex-direction:column;gap:6px;margin:12px 0}
  .rung{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;
    border:1px solid var(--line);background:rgba(0,0,0,.15);opacity:.5;transition:all .25s}
  .rung.done{opacity:.75;border-color:var(--gold-dim)}
  .rung.done .rung-dot{background:var(--gold-dim);color:#1a1208;border-color:var(--gold-dim)}
  .rung.here{opacity:1;border-color:var(--gold);background:rgba(216,182,74,.10);
    box-shadow:0 0 0 1px var(--gold-dim),0 4px 18px rgba(216,182,74,.15)}
  .rung.here .rung-dot{background:var(--gold);color:#1a1208;border-color:var(--gold)}
  .rung.boss{border-style:dashed}
  .rung.boss.here{border-style:solid;border-color:#b8483a;background:rgba(184,72,58,.12);
    box-shadow:0 0 0 1px #b8483a,0 4px 22px rgba(184,72,58,.22)}
  .rung.boss.here .rung-dot{background:#b8483a;color:#fff;border-color:#b8483a}
  .rung-dot{flex:none;width:26px;height:26px;border-radius:50%;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:700;font-size:12px;color:var(--ink-dim)}
  .rung-body{flex:1;min-width:0}
  .rung-name{font-family:var(--font-d);font-weight:700;font-size:14px;color:var(--ink)}
  .rung.here .rung-name{color:var(--gold)}
  .rung.boss.here .rung-name{color:#e98a7a}
  .rung-sub{font-size:11px;color:var(--ink-dim);margin-top:1px}
  .rung-tag{flex:none;font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--gold);
    border:1px solid var(--gold-dim);border-radius:4px;padding:2px 5px}
  .rung.boss.here .rung-tag{color:#e98a7a;border-color:#b8483a}
  .run-deck-strip{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:10px 0 4px}
  .throne-warn{font-size:11px;color:#e98a7a;margin-top:8px;font-style:italic}
  .btn.big-throne{background:linear-gradient(180deg,#c25446,#8f3628);border-color:#b8483a;color:#fff;
    font-size:16px;padding:13px 22px;animation:thronePulse 2.2s ease-in-out infinite}
  @keyframes thronePulse{0%,100%{box-shadow:0 0 0 0 rgba(184,72,58,.5)}50%{box-shadow:0 0 26px 4px rgba(184,72,58,.45)}}
  .reward-row{display:flex;gap:8px;flex-wrap:wrap}
  .reward-card{flex:1;min-width:100px;display:flex;flex-direction:column;align-items:center;gap:6px;
    background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:12px;padding:14px 9px;
    cursor:pointer;transition:all .18s;color:var(--ink);font-family:inherit;text-align:center}
  .reward-card:hover,.reward-card:focus{border-color:var(--gold);background:rgba(216,182,74,.12);transform:translateY(-3px)}
  .reward-card b{font-family:var(--font-d);font-size:14px;color:var(--gold)}
  .reward-card span{font-size:11px;color:var(--ink-dim);line-height:1.35}
  .throne-line{text-align:center;font-style:italic;font-size:14px;color:#e9c8a0;
    line-height:1.5;padding:0 6px}
  /* ===== THE THRONE: versus screen ===== */

  .run-stats{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:14px}
  .rung-banner{display:flex;flex-direction:column;align-items:center;gap:1px;margin:2px 0 6px}
  .rung-banner span{font-family:var(--font-d);font-weight:700;font-size:15px;color:var(--gold)}
  .rung-banner span.rb-boss{color:#e98a7a;font-size:16px;text-shadow:0 0 16px rgba(184,72,58,.5)}
  .rung-banner i{font-size:10px;letter-spacing:.1em;color:var(--ink-dim);font-style:normal;text-transform:uppercase}
  .hero-hp.wide{width:100%;margin-bottom:6px}
  /* ===== card flight (Flip) ===== */

  /* ===== THE ASCENT: legend faces ===== */
  .rung-face{flex:none;width:34px;height:34px;border-radius:50%;overflow:hidden;

  .watch-face{flex:none;width:52px;height:52px;border-radius:10px;overflow:hidden;

  .end-portrait.lost{border-color:#b8483a;box-shadow:0 8px 24px rgba(0,0,0,.55),0 0 22px rgba(184,72,58,.45)}

  @keyframes endPop{0%{opacity:0;transform:scale(.5) rotate(-6deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
  /* ===== sound toggle ===== */
  .snd-btn{flex:0 0 auto;width:30px;height:30px;border-radius:50%;

    cursor:pointer;transition:all .18s;padding:0}
  .snd-btn:hover{border-color:var(--gold);background:rgba(216,182,74,.2)}

  /* ===== THE ASCENT: legend watching panel ===== */
  .watch{--heat:0;display:flex;gap:11px;align-items:flex-start;margin:18px 0 6px;padding:12px 13px;
    border-radius:12px;position:relative;overflow:hidden;
    border:1px solid rgba(184,72,58,calc(.22 + var(--heat)*.55));
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(184,72,58,calc(.05 + var(--heat)*.16)), transparent 70%),
      rgba(10,7,4,.42);
    box-shadow:0 0 calc(var(--heat)*26px) rgba(184,72,58,calc(var(--heat)*.30))}
  .watch::before{content:'';position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(90deg,transparent 0 3px,rgba(0,0,0,.16) 3px 4px);
    opacity:calc(.25 + var(--heat)*.3)}
  .watch-eyes{flex:none;display:flex;gap:6px;padding-top:3px;position:relative;z-index:1}
  .watch-eyes i{width:9px;height:9px;border-radius:50%;display:block;

    box-shadow:0 0 calc(5px + var(--heat)*9px) rgba(233,138,122,calc(.55 + var(--heat)*.45));
    animation:watchBlink 4.4s infinite}
  .watch-eyes i:last-child{animation-delay:.09s}
  @keyframes watchBlink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.08)}}
  .watch-body{flex:1;min-width:0;position:relative;z-index:1}
  .watch-who{font-family:var(--font-d);font-weight:700;font-size:10px;letter-spacing:.09em;

  .watch-who em{font-style:normal;color:var(--ink-dim);letter-spacing:.05em;opacity:.75;font-weight:400}
  .watch-body p{font-size:13.5px;line-height:1.5;color:#e9c8a0;font-style:italic;
    margin-top:4px;min-height:20px}
  /* ===== Deckbuilder ===== */
  .deck-bar.cap-hit{animation:capShake .4s ease-out;border-color:#b8483a}
  @keyframes capShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .deck-bar{position:sticky;top:0;z-index:20;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;box-shadow:var(--shadow)}
  .deck-count{font-family:var(--font-d);font-size:16px;font-weight:700}
  .deck-count b{color:var(--gold)}
  .deck-count.bad b{color:var(--blood)}
  .card.picked{outline:3px solid var(--gold);outline-offset:-1px}
  .card .pickbadge{position:absolute;top:7px;left:7px;width:24px;height:24px;border-radius:50%;background:var(--gold);color:#2a1e08;font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:3}
  .card.pickable{cursor:pointer;transition:transform .12s}
  .card.pickable:active{transform:scale(.97)}
  .curve{display:flex;gap:3px;align-items:flex-end;height:34px}
  .curve .bar{width:16px;background:var(--gold-dim);border-radius:3px 3px 0 0;position:relative;min-height:3px}
  .curve .bar span{position:absolute;top:-14px;left:0;right:0;text-align:center;font-size:9px;color:var(--ink-dim)}
  .curve .bar i{position:absolute;bottom:-14px;left:0;right:0;text-align:center;font-size:9px;color:var(--ink-dim);font-style:normal}
  @media (max-width:520px){
    .mini{width:84px}.hand .card{width:104px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  /* ===== HELP SYSTEM ===== */
  .coach{background:linear-gradient(180deg,#2f2416,#211810);border:1px solid rgba(216,182,74,.35);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;box-shadow:var(--shadow),inset 0 1px 0 rgba(216,182,74,.12);position:relative;animation:coachIn .4s ease-out}
  @keyframes coachIn{0%{opacity:0;transform:translateY(-8px)}100%{opacity:1;transform:translateY(0)}}
  .coach .cico{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:rgba(216,182,74,.14);display:flex;align-items:center;justify-content:center;color:var(--gold)}
  .coach .ctext{flex:1;font-size:12.5px;line-height:1.4;color:var(--ink)}
  .coach .ctext b{color:var(--gold)}
  .coach .cx{flex:0 0 auto;background:none;border:none;color:var(--ink-dim);font-size:18px;line-height:1;padding:0 2px;cursor:pointer}
  .coach .cx:active{color:var(--ink)}
  .coach-steps{display:flex;gap:4px;margin-top:8px}
  .coach-dot{width:6px;height:6px;border-radius:50%;background:var(--line)}
  .coach-dot.on{background:var(--gold)}
  .coach-next{background:var(--gold);color:#2a1e08;border:none;border-radius:7px;padding:5px 12px;font-weight:800;font-size:12px;cursor:pointer;margin-left:auto}
  /* keyword glossary strip on battle */
  .keys-strip{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 4px}
  .key-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:12px;padding:3px 9px;font-size:10.5px;font-weight:700;color:var(--ink-dim);cursor:help}
  .key-chip .ico{color:var(--gold)}
  /* tooltip popover */
  .tip-pop{position:fixed;z-index:80;max-width:240px;background:linear-gradient(180deg,#3a2c1b,#241a10);border:1px solid var(--gold);border-radius:10px;padding:10px 12px;box-shadow:var(--shadow);font-size:12px;line-height:1.4;color:var(--ink)}
  .tip-pop b{color:var(--gold)}
  .tip-pop .tphead{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-family:var(--font-d);font-weight:700;color:var(--gold)}
  .help-panel{background:linear-gradient(180deg,#2c2116,#1c150d);border:1px solid rgba(216,182,74,.25);border-radius:10px;padding:12px 14px;margin-bottom:12px}
  .help-panel h4{font-family:var(--font-d);color:var(--gold);font-size:14px;margin:0 0 6px;display:flex;align-items:center;gap:6px}
  .help-panel ul{margin:0;padding-left:16px;font-size:12.5px;line-height:1.5;color:var(--ink-dim)}
  .help-panel li{margin-bottom:3px}
  .help-panel li b{color:var(--ink)}
  /* ===== ANIMATION LAYER 2: the fun stuff ===== */
  /* slash mark across a struck target */
  .slash{position:absolute;pointer-events:none;z-index:47;height:3px;border-radius:2px;
    background:linear-gradient(90deg,transparent,#fff,#ffd0a0,transparent);
    box-shadow:0 0 12px #fff,0 0 24px #ffb060;transform-origin:center}
  @keyframes slashIn{0%{opacity:0;transform:scaleX(0) rotate(var(--ang))}30%{opacity:1;transform:scaleX(1.15) rotate(var(--ang))}100%{opacity:0;transform:scaleX(1) rotate(var(--ang))}}
  /* shockwave ring on heavy hits */
  .ring{position:absolute;pointer-events:none;z-index:44;border-radius:50%;border:2px solid rgba(255,190,120,.9)}
  @keyframes ringOut{0%{opacity:.9;transform:scale(.2)}100%{opacity:0;transform:scale(2.6)}}
  /* CRIT text */
  .crit-txt{position:absolute;z-index:48;pointer-events:none;font-family:var(--font-d);font-weight:900;
    color:#fff36a;text-shadow:0 0 10px #ff9a3c,0 0 22px #ff6a2c,0 2px 3px #000;letter-spacing:1px}
  @keyframes critPop{0%{opacity:0;transform:scale(.3) rotate(-14deg)}45%{opacity:1;transform:scale(1.35) rotate(4deg)}70%{transform:scale(1.05) rotate(-2deg)}100%{opacity:0;transform:scale(1.15) translateY(-26px)}}
  /* card hover/press feel */
  .hand .card{transition:transform .18s cubic-bezier(.2,1.2,.4,1),filter .18s}
  .hand .card.playable:hover{transform:translateY(-10px) scale(1.04);filter:brightness(1.12) drop-shadow(0 8px 18px rgba(0,0,0,.6))}
  .hand .card.playable:active{transform:translateY(-4px) scale(.99)}
  .hand .card.unplayable{filter:grayscale(.55) brightness(.7)}
  /* collection card idle float + hover lift */
  .grid .card{transition:transform .22s cubic-bezier(.2,1.1,.4,1),box-shadow .22s}
  .grid .card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 14px 26px rgba(0,0,0,.6),inset 0 0 0 1px rgba(216,182,74,.3);z-index:5}
  /* legendary cards get a slow shimmer sweep */
  .card.legendary{position:relative}
  .card.legendary::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:6;
    background:linear-gradient(115deg,transparent 30%,rgba(255,235,150,.16) 46%,rgba(255,255,255,.28) 50%,rgba(255,235,150,.16) 54%,transparent 70%);
    background-size:280% 100%;animation:shimmerSweep 4.5s ease-in-out infinite}
  @keyframes shimmerSweep{0%{background-position:180% 0}55%,100%{background-position:-80% 0}}
  /* boss art breathing aura */
  .card.legendary .art{position:relative}
  .card.legendary .art::before{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 18px rgba(255,200,90,.28);animation:auraPulse 3.2s ease-in-out infinite}
  @keyframes auraPulse{0%,100%{opacity:.45}50%{opacity:1}}
  /* mini idle bob so the board feels alive (applied to art only, so tap targets stay stable) */
  @keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .mini:not(.dying):not(.dead) .art{animation:idleBob 3.4s ease-in-out infinite}
  .mini:nth-child(2n) .art{animation-delay:.5s}
  .mini:nth-child(3n) .art{animation-delay:1.1s}
  .mini:nth-child(4n) .art{animation-delay:1.7s}
  /* taunt badge throb */
  @keyframes tauntThrob{0%,100%{transform:scale(1);filter:drop-shadow(0 0 2px rgba(216,182,74,.5))}50%{transform:scale(1.18);filter:drop-shadow(0 0 8px rgba(216,182,74,1))}}
  .mini .taunt{animation:tauntThrob 1.8s ease-in-out infinite}
  /* stealth shimmer */
  @keyframes stealthFade{0%,100%{opacity:.55;filter:blur(.4px)}50%{opacity:.9;filter:blur(0)}}
  .mini.stealthed{animation:stealthFade 2.2s ease-in-out infinite}
  /* targetable enemies pulse invitingly */
  @keyframes targetPulse{0%,100%{box-shadow:0 0 0 1px rgba(224,122,90,.7),0 0 8px rgba(224,122,90,.35)}50%{box-shadow:0 0 0 2px rgba(255,150,110,1),0 0 20px rgba(255,120,80,.75)}}
  .mini.targetable{animation:targetPulse 1.15s ease-in-out infinite}
  .mini.targetable:hover .art{filter:brightness(1.15)}
  /* energy pip fill sweep */
  @keyframes pipFill{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
  .energy .pip.on{animation:pipFill .35s ease-out}
  /* turn banner sweep */
  .turn-sweep{position:fixed;left:0;right:0;top:38%;z-index:60;pointer-events:none;text-align:center;
    font-family:var(--font-d);font-weight:900;font-size:34px;letter-spacing:3px;text-transform:uppercase;
    text-shadow:0 3px 0 #000,0 0 30px currentColor}
  @keyframes sweepIn{0%{opacity:0;transform:translateX(-60px) skewX(-12deg)}20%{opacity:1;transform:translateX(0) skewX(-12deg)}75%{opacity:1;transform:translateX(0) skewX(-12deg)}100%{opacity:0;transform:translateX(60px) skewX(-12deg)}}
  .turn-sweep{animation:sweepIn 1.15s ease-out forwards}
  .turn-sweep::before{content:'';position:absolute;left:0;right:0;top:50%;height:2px;transform:translateY(-50%);
    background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:.5}
  /* hero bar damage flash */
  @keyframes barFlash{0%{filter:brightness(3) saturate(2)}100%{filter:brightness(1)}}
  .hero-hp .bar.flash{animation:barFlash .45s}
  /* hero portrait shake */
  @keyframes heroShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,2px)}40%{transform:translate(6px,-2px)}60%{transform:translate(-4px,1px)}80%{transform:translate(4px,-1px)}}
  .hero-hp.hurt{animation:heroShake .4s}
  /* log line slide */
  @keyframes logIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
  .log{animation:logIn .3s ease-out}
  /* button press juice */
  .btn{transition:transform .12s cubic-bezier(.2,1.3,.4,1),filter .12s,box-shadow .12s}
  .btn:active{transform:scale(.95)}
  .btn.gold:hover{filter:brightness(1.12);box-shadow:0 0 18px rgba(216,182,74,.5)}
  /* victory banner extras */
  @keyframes bannerRays{to{transform:rotate(360deg)}}
  .banner.win::before{content:'';position:absolute;top:50%;left:50%;width:180vmax;height:180vmax;
    transform:translate(-50%,-50%);pointer-events:none;z-index:-1;
    background:conic-gradient(from 0deg,transparent 0deg,rgba(216,182,74,.13) 12deg,transparent 24deg,transparent 36deg,rgba(216,182,74,.13) 48deg,transparent 60deg);
    animation:bannerRays 14s linear infinite}
  /* defeat desaturate */
  @keyframes defeatFade{0%{filter:grayscale(0)}100%{filter:grayscale(.75) brightness(.75)}}
  .battle.lost{animation:defeatFade 1s forwards}
  /* screen impact flash */
  .impact-flash{position:fixed;inset:0;z-index:55;pointer-events:none;background:rgba(255,220,160,.5)}
  @keyframes impactFade{0%{opacity:.75}100%{opacity:0}}
  /* ===== ANIMATION LAYER ===== */
  .statchip{background:linear-gradient(180deg,#2c2116,#1c150d);border:1px solid rgba(216,182,74,.18);border-radius:16px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--ink-dim);display:inline-flex;align-items:center;gap:5px}
  /* smooth hp bars everywhere */
  .mini .hpbar>i{transition:width .45s cubic-bezier(.4,0,.2,1),background .3s}

  .mini .hpbar>i.low{background:linear-gradient(90deg,#b8483a,#e07a5a)}
  .mini .hpbar>i.mid{background:linear-gradient(90deg,#c9a227,#e8d174)}
  /* attack lunge */
  @keyframes lungeUp{0%{transform:translateY(0)}40%{transform:translateY(-16px) scale(1.08)}100%{transform:translateY(0)}}
  @keyframes lungeDown{0%{transform:translateY(0)}40%{transform:translateY(16px) scale(1.08)}100%{transform:translateY(0)}}
  .mini.lunge-up{animation:lungeUp .42s ease-out}
  .mini.lunge-down{animation:lungeDown .42s ease-out}
  /* hit reaction */
  @keyframes hitShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px) rotate(-2deg)}40%{transform:translateX(5px) rotate(2deg)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
  .mini.hit{animation:hitShake .4s}
  @keyframes hitFlash{0%{filter:brightness(2.4) saturate(.4)}100%{filter:brightness(1)}}
  .mini.flash{animation:hitFlash .35s}
  /* death */
  @keyframes deathSpin{0%{opacity:1;transform:scale(1) rotate(0)}100%{opacity:0;transform:scale(.3) rotate(180deg) translateY(20px)}}
  .mini.dying{animation:deathSpin .5s ease-in forwards;pointer-events:none}
  /* play spawn */
  @keyframes spawnIn{0%{opacity:0;transform:scale(.3) translateY(-30px)}70%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
  .mini.spawn{animation:spawnIn .5s cubic-bezier(.2,1.3,.4,1)}
  /* energy pip pulse */
  @keyframes pipPulse{0%{transform:scale(1)}50%{transform:scale(1.35);box-shadow:0 0 8px var(--gold)}100%{transform:scale(1)}}
  .energy .pip.pulse{animation:pipPulse .4s}
  /* card draw slide */
  @keyframes drawIn{0%{opacity:0;transform:translateX(40px) scale(.9)}100%{opacity:1;transform:translateX(0) scale(1)}}
  .hand .card.drawn{animation:drawIn .4s ease-out}
  /* selected pulse */
  @keyframes selGlow{0%,100%{box-shadow:0 0 10px rgba(216,182,74,.6)}50%{box-shadow:0 0 20px rgba(216,182,74,1)}}
  .mini.selected{animation:selGlow 1s ease-in-out infinite}
  /* reveal card pop */
  @keyframes revealPop{0%{opacity:0;transform:scale(.4) rotateY(90deg)}60%{transform:scale(1.08) rotateY(-8deg)}100%{opacity:1;transform:scale(1) rotateY(0)}}
  .reveal-pop{animation:revealPop .7s cubic-bezier(.2,1.2,.4,1)}
  .reveal-modal{position:relative;overflow:hidden}
  .reveal-modal::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
    background:conic-gradient(from 0deg,transparent,rgba(216,182,74,.14),transparent,rgba(216,182,74,.14),transparent);
    animation:spinRays 6s linear infinite;pointer-events:none}
  @keyframes spinRays{to{transform:rotate(360deg)}}
  /* victory / defeat sequence */
  @keyframes bannerZoom{0%{opacity:0;transform:scale(.3)}60%{transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}
  .banner h2{animation:bannerZoom .8s cubic-bezier(.2,1.3,.4,1)}
  @keyframes bannerGlow{0%,100%{text-shadow:0 0 20px rgba(216,182,74,.4)}50%{text-shadow:0 0 40px rgba(216,182,74,.9),0 0 60px rgba(216,182,74,.5)}}
  .banner.win h2{animation:bannerZoom .8s cubic-bezier(.2,1.3,.4,1),bannerGlow 2s ease-in-out .8s infinite}
  .banner-sub{animation:fadeUp .6s ease-out .4s both}
  @keyframes fadeUp{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
  /* confetti/sparkle particles */
  .particle{position:absolute;pointer-events:none;z-index:45;border-radius:2px}
  /* floating combat number, richer */
  .float-num{position:absolute;font-weight:900;font-family:var(--font-d);text-shadow:0 2px 6px #000,0 0 12px currentColor;z-index:46;pointer-events:none}
  /* screen shake */
  @keyframes screenShake{0%,100%{transform:translate(0,0)}25%{transform:translate(-4px,3px)}50%{transform:translate(4px,-3px)}75%{transform:translate(-3px,-2px)}}
  .shake-screen{animation:screenShake .35s}
  /* hero portrait damage pulse */
  @keyframes heroHurt{0%{background:var(--panel)}30%{background:#5a2020}100%{background:var(--panel)}}
  .battle-hud.hurt{animation:heroHurt .5s}
</style>

/* ============================================================
   FX helpers (GSAP)
   ============================================================ */
function floatNum(x,y,text,color,big){
  const el=document.createElement('div');el.className='float-num';el.textContent=text;el.style.color=color;
  el.style.left=x+'px';el.style.top=y+'px';el.style.fontSize=(big?34:22)+'px';
  document.getElementById('fx').appendChild(el);
  gsap.fromTo(el,{y:0,opacity:1,scale:.5},{y:-52,opacity:0,scale:big?1.7:1.3,duration:1,ease:'power2.out',onComplete:()=>el.remove()});
}
function shakeEl(node){ if(!node)return; gsap.fromTo(node,{x:-6},{x:0,duration:.4,ease:'elastic.out(1,0.3)'}); }
function flashEl(node,color){ if(!node)return; gsap.fromTo(node,{boxShadow:`0 0 0 3px ${color}`},{boxShadow:'0 0 0 0 transparent',duration:.5}); }
// add a css animation class briefly
function pulse(node,cls,ms){ if(!node)return; node.classList.remove(cls); void node.offsetWidth; node.classList.add(cls); setTimeout(()=>node.classList.remove(cls), ms||500); }
// burst of colored particles at a point
function burst(x,y,colors,count){
  const fx=document.getElementById('fx');
  for(let i=0;i<(count||14);i++){
    const p=document.createElement('div');p.className='particle';
    const s=4+Math.random()*6;p.style.width=s+'px';p.style.height=s+'px';
    p.style.left=x+'px';p.style.top=y+'px';
    p.style.background=colors[i%colors.length];
    fx.appendChild(p);
    const ang=Math.random()*Math.PI*2, dist=40+Math.random()*90;
    gsap.to(p,{x:Math.cos(ang)*dist,y:Math.sin(ang)*dist+30,opacity:0,rotation:Math.random()*360,duration:.7+Math.random()*.5,ease:'power2.out',onComplete:()=>p.remove()});
  }
}
// confetti rain from top
function confetti(){
  const fx=document.getElementById('fx');const cols=['#d8b64a','#5a86b0','#9a6fc0','#5b8a4a','#e07a5a','#f6eeda'];
  for(let i=0;i<70;i++){
    const p=document.createElement('div');p.className='particle';
    const s=6+Math.random()*8;p.style.width=s+'px';p.style.height=(s*1.6)+'px';
    p.style.left=(Math.random()*100)+'vw';p.style.top='-20px';
    p.style.background=cols[i%cols.length];
    fx.appendChild(p);
    gsap.to(p,{y:window.innerHeight+40,x:(Math.random()-.5)*120,rotation:Math.random()*720,opacity:.9,duration:1.6+Math.random()*1.4,ease:'power1.in',delay:Math.random()*.6,onComplete:()=>p.remove()});
  }
}
function screenShake(){ const r=document.getElementById('root'); if(r) pulse(r,'shake-screen',360); }

/* ============================================================
   SOUND — synthesised via Web Audio. No files, no CDN, no loading.
   Every sound is built from oscillators + noise at call time.
   ============================================================ */
const SFX=(()=>{
  let ctx=null, master=null, muted=false;
  try{ muted = localStorage.getItem('ww_muted')==='1'; }catch(e){}

  function boot(){
    if(ctx)return ctx;
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return null;
    ctx=new AC();
    master=ctx.createGain();
    master.gain.value=muted?0:0.32;
    master.connect(ctx.destination);
    return ctx;
  }
  // browsers block audio until a user gesture; resume on first interaction
  function unlock(){
    const c=boot(); if(!c)return;
    if(c.state==='suspended') c.resume();
  }
  function setMuted(m){
    muted=m;
    try{ localStorage.setItem('ww_muted', m?'1':'0'); }catch(e){}
    if(master) master.gain.setTargetAtTime(m?0:0.32, ctx.currentTime, 0.01);
  }
  function isMuted(){ return muted; }

  // ---- primitives ----
  function tone({freq=440,dur=0.15,type='sine',vol=0.3,slideTo=null,delay=0,attack=0.005,decay=null}){
    const c=boot(); if(!c||muted)return;
    const t0=c.currentTime+delay;
    const o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t0);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol, t0+attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+(decay||dur));
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0+dur+0.05);
  }
  function noise({dur=0.12,vol=0.3,delay=0,lp=2200,hp=200,slideLp=null}){
    const c=boot(); if(!c||muted)return;
    const t0=c.currentTime+delay;
    const n=Math.floor(c.sampleRate*dur);
    const buf=c.createBuffer(1,n,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const src=c.createBufferSource(); src.buffer=buf;
    const lpf=c.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.setValueAtTime(lp,t0);
    if(slideLp) lpf.frequency.exponentialRampToValueAtTime(Math.max(60,slideLp), t0+dur);
    const hpf=c.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=hp;
    const g=c.createGain();
    g.gain.setValueAtTime(vol,t0);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    src.connect(hpf); hpf.connect(lpf); lpf.connect(g); g.connect(master);
    src.start(t0); src.stop(t0+dur+0.02);
  }

  // ---- the palette ----
  const S={
    unlock,setMuted,isMuted,
    tap(){ tone({freq:520,dur:0.05,type:'triangle',vol:0.16}); },
    // wet, soft: a paw landing
    play(){ tone({freq:300,slideTo:520,dur:0.13,type:'sine',vol:0.26});
            noise({dur:0.07,vol:0.10,lp:1400}); },
    // claw: sharp noise sweep

           tone({freq:180,slideTo:70,dur:0.10,type:'square',vol:0.14}); },
    // crit: hit + a nasty overtone
    crit(){ noise({dur:0.15,vol:0.42,lp:7000,slideLp:500,hp:800});
            tone({freq:240,slideTo:60,dur:0.18,type:'sawtooth',vol:0.20});
            tone({freq:900,slideTo:300,dur:0.12,type:'square',vol:0.10,delay:0.02}); },
    // a cat losing: descending mrow
    death(){ tone({freq:420,slideTo:110,dur:0.34,type:'sawtooth',vol:0.16});
             noise({dur:0.18,vol:0.10,lp:900,delay:0.04}); },
    // hero struck: low thud
    heroHit(){ tone({freq:110,slideTo:44,dur:0.24,type:'sine',vol:0.34});
               noise({dur:0.12,vol:0.20,lp:500}); },
    heal(){ tone({freq:520,slideTo:780,dur:0.22,type:'sine',vol:0.20});
            tone({freq:780,slideTo:1040,dur:0.18,type:'sine',vol:0.12,delay:0.07}); },
    draw(){ noise({dur:0.06,vol:0.13,lp:3800,hp:1400}); },
    select(){ tone({freq:680,dur:0.06,type:'triangle',vol:0.16}); },
    deny(){ tone({freq:160,dur:0.10,type:'square',vol:0.18});
            tone({freq:120,dur:0.10,type:'square',vol:0.14,delay:0.07}); },
    turn(){ tone({freq:440,slideTo:660,dur:0.16,type:'triangle',vol:0.16});
            tone({freq:660,dur:0.14,type:'sine',vol:0.10,delay:0.10}); },
    // rung cleared: little rising arpeggio
    win(){ [523,659,784,1047].forEach((f,i)=>
             tone({freq:f,dur:0.30,type:'triangle',vol:0.22,delay:i*0.09})); },
    lose(){ [392,330,262,196].forEach((f,i)=>
              tone({freq:f,dur:0.34,type:'sine',vol:0.20,delay:i*0.11})); },
    reward(){ tone({freq:880,dur:0.10,type:'sine',vol:0.18});
              tone({freq:1320,dur:0.16,type:'sine',vol:0.14,delay:0.07}); },
    // THE THRONE: low menacing swell
    throne(){ tone({freq:70,slideTo:52,dur:1.5,type:'sawtooth',vol:0.22});
              tone({freq:105,slideTo:78,dur:1.5,type:'sine',vol:0.14,delay:0.05});
              noise({dur:1.0,vol:0.07,lp:340,delay:0.1}); },
    // VS slam
    slam(){ noise({dur:0.30,vol:0.44,lp:2400,slideLp:180});
            tone({freq:150,slideTo:40,dur:0.34,type:'square',vol:0.30}); },
    // dialogue blip

                 tone({freq:f,dur:0.5,type:'triangle',vol:0.24,delay:i*0.12}));
               tone({freq:1047,dur:0.9,type:'sine',vol:0.18,delay:0.62}); },

  return S;
})();

/* ============================================================
   FLIP — cards physically fly from hand to board.
   Guarded: if the CDN fails, everything falls back to the old pop-in.
   ============================================================ */
const HAS_FLIP = (typeof Flip!=='undefined' && typeof gsap!=='undefined');
if(HAS_FLIP){ try{ gsap.registerPlugin(Flip); }catch(e){} }

function reduceMotion(){
  return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches);
}

// Fly a ghost of the played card from its hand slot to the unit that spawned on board.
// We use a clone so React is free to unmount the real card immediately.
function flyCardToBoard(fromRect,uid){
  if(!fromRect||reduceMotion())return;
  const target=document.querySelector(`[data-uid="${uid}"]`);
  if(!target)return;
  const to=target.getBoundingClientRect();
  const ghost=document.createElement('div');
  ghost.className='fly-ghost';
  ghost.style.left=fromRect.left+'px';
  ghost.style.top=fromRect.top+'px';
  ghost.style.width=fromRect.width+'px';
  ghost.style.height=fromRect.height+'px';
  document.body.appendChild(ghost);
  const dx=(to.left+to.width/2)-(fromRect.left+fromRect.width/2);
  const dy=(to.top+to.height/2)-(fromRect.top+fromRect.height/2);
  gsap.timeline({onComplete:()=>ghost.remove()})
    .to(ghost,{x:dx,y:dy,scale:to.width/Math.max(1,fromRect.width),
               rotation:(Math.random()*16-8),duration:.34,ease:'power3.inOut'})
    .to(ghost,{opacity:0,duration:.10},'-=0.08');
}

// When a cat dies the survivors reflow. Flip animates them sliding to their
// new slots instead of teleporting. Call captureBoard() before the state
// change, then playBoard() after React has painted.
let _flipState=null;
function captureBoard(){
  if(!HAS_FLIP||reduceMotion())return;
  const els=document.querySelectorAll('.board-row .mini');
  if(!els.length){_flipState=null;return;}
  try{ _flipState=Flip.getState(els); }catch(e){ _flipState=null; }
}
function playBoard(){
  if(!HAS_FLIP||!_flipState)return;
  try{
    Flip.from(_flipState,{duration:.4,ease:'power2.out',absolute:true,
      onEnter:el=>gsap.fromTo(el,{opacity:0,scale:.6},{opacity:1,scale:1,duration:.3}),
      onLeave:el=>gsap.to(el,{opacity:0,scale:.5,duration:.25})});
  }catch(e){}
  _flipState=null;
}

// diagonal slash across a point
function slashFx(x,y,size){
  const fx=document.getElementById('fx'); if(!fx)return;
  const n=2+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++){
    const el=document.createElement('div'); el.className='slash';
    const ang=(-35+Math.random()*70);
    const w=(size||70)*(0.9+Math.random()*0.5);
    el.style.width=w+'px'; el.style.left=(x-w/2)+'px'; el.style.top=(y+(i*7-6))+'px';
    el.style.setProperty('--ang',ang+'deg');
    el.style.animation=`slashIn .34s ease-out ${i*70}ms forwards`;
    fx.appendChild(el); setTimeout(()=>el.remove(),600+i*70);
  }
}
// expanding shockwave ring
function ringFx(x,y,color){
  const fx=document.getElementById('fx'); if(!fx)return;

function CardArt({card}){

}

/* ============================================================
   BATTLE ENGINE
   free-for-all targeting: play cats to your board, tap your cat
   then tap an enemy to attack. energy each turn. taunt/stealth/heal.
   ============================================================ */
let UNIT_SEQ=1;
function makeUnit(card,side){
  return {uid:'u'+(UNIT_SEQ++),card,side,atk:card.atk,hp:card.hp,maxhp:card.hp,spd:card.spd,
    hasAttacked:false, taunt:['mcoon','oscar'].includes(card.id),
    stealth:['russ','smokey'].includes(card.id), stealthTurns:['russ','smokey'].includes(card.id)?1:0,
    stunned:false, shield:0, armor:card.id==='bsh'?1:0, dodge:card.id==='devon'?0.4:0};
}
function drawStarterDeck(owned){
  // build a reasonable 10-card deck from owned cards, weighted by rarity spread
  const pool=ROSTER.filter(c=>owned.includes(c.id));
  const deck=[];
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  for(let i=0;i<10;i++){ deck.push(shuffled[i%shuffled.length]); }
  return deck.sort(()=>Math.random()-.5);
}
function enemyDeck(tier){
  // AI opponent scales with tier
  const commons=ROSTER.filter(c=>c.rarity==='common');
  const rares=ROSTER.filter(c=>c.rarity==='rare');
  const epics=ROSTER.filter(c=>c.rarity==='epic');
  let pool=[...commons];
  if(tier>=2)pool=pool.concat(rares);
  if(tier>=3)pool=pool.concat(rares,epics);
  const deck=[];const sh=[...pool].sort(()=>Math.random()-.5);
  for(let i=0;i<10;i++)deck.push(sh[i%sh.length]);
  return deck.sort(()=>Math.random()-.5);
}

function Battle({owned,tier,deck,buffs,eHeroStart,bossId,rung,lives,showCoach,onCoachDone,onWin,onLose,onQuit}){
  const BUFFS=buffs||{};
  const [pEnergy,setPEnergy]=useState(3);
  const [pMax,setPMax]=useState(3);
  const [pHero,setPHero]=useState(24);
  const [eHero,setEHero]=useState(eHeroStart||20);
  const [pHand,setPHand]=useState([]);
  const [pBoard,setPBoard]=useState([]);
  const [eBoard,setEBoard]=useState([]);
  const [turn,setTurn]=useState('player');
  const [sel,setSel]=useState(null);
  const [log,setLog]=useState('Your move. Play a cat or attack.');
  const [tip,setTip]=useState(null);
  const [tipPos,setTipPos]=useState({x:0,y:0});
  const [coachOpen,setCoachOpen]=useState(!!showCoach);
  function showTip(kw,e){ const r=e.currentTarget.getBoundingClientRect(); setTipPos({x:r.left,y:r.bottom}); setTip(tip&&tip.id===kw.id?null:kw); }
  const [ended,setEnded]=useState(null);
  const [turnNo,setTurnNo]=useState(1);
  const [justDrawn,setJustDrawn]=useState(null);
  const deckRef=useRef([]);
  const eDeckRef=useRef([]);
  const eEnergyRef=useRef(3);
  // live mirrors of state to avoid stale closures inside timed enemy-turn sequences
  const pBoardRef=useRef([]); const eBoardRef=useRef([]); const endedRef=useRef(null);
  const pHeroRef=useRef(20); const eHeroRef=useRef(20);
  // Flip: capture board geometry before React paints a board change, then
  // animate survivors into their new slots after. useLayoutEffect runs after
  // DOM mutation but before the browser paints, which is exactly the window
  // Flip needs to avoid a visible jump.
  const boardSigRef=useRef('');
  useLayoutEffect(()=>{
    const sig=pBoard.map(u=>u.uid).join(',')+'|'+eBoard.map(u=>u.uid).join(',');
    if(boardSigRef.current && boardSigRef.current!==sig) playBoard();
    boardSigRef.current=sig;
  },[pBoard,eBoard]);

  useEffect(()=>{pBoardRef.current=pBoard;},[pBoard]);
  useEffect(()=>{eBoardRef.current=eBoard;},[eBoard]);
  useEffect(()=>{endedRef.current=ended;},[ended]);
  useEffect(()=>{pHeroRef.current=pHero;},[pHero]);
  useEffect(()=>{eHeroRef.current=eHero;},[eHero]);

  useEffect(()=>{
    // use the chosen deck (array of card ids) if given, else random
    let d;
    if(deck&&deck.length){ d=deck.map(id=>BY_ID[id]).filter(Boolean).map(c=>buffedCard(c,BUFFS)).sort(()=>Math.random()-.5); }
    else { d=drawStarterDeck(owned); }
    // stamp a unique instance id so React keys stay stable even with duplicate breeds
    d=d.map(c=>({...c,_iid:'c'+(UNIT_SEQ++)}));
    setPHand(d.slice(0,4)); deckRef.current=d.slice(4);
    // boss rung: the legend leads, backed by a tier-3 court
    if(bossId && BY_ID[bossId]){
      const court=enemyDeck(3).slice(0,8);
      eDeckRef.current=[BY_ID[bossId],...court];
    } else {
      eDeckRef.current=enemyDeck(tier);
    }
  },[]);

  const nodeRef=(uid)=>document.querySelector(`[data-uid="${uid}"]`);

  // reliable win/loss watcher: fires exactly once when either hero hits 0.
  // uses a ref guard because setEnded is async — two rapid HP drops could
  // otherwise re-enter this effect before `ended` has re-rendered.
  const settledRef=useRef(false);
  useEffect(()=>{
    if(ended||settledRef.current)return;
    if(eHero<=0){
      settledRef.current=true;
      setEnded('win');
      SFX.win();
      impactFlash(); screenShake();
      turnSweep('Victory!','#ffd76a');
      confetti();
      setTimeout(()=>confetti(),500);
      setTimeout(()=>confetti(),1100);
      const c={x:window.innerWidth/2,y:window.innerHeight/2};
      setTimeout(()=>{ringFx(c.x,c.y,'rgba(255,215,110,.9)');burst(c.x,c.y,['#ffd76a','#fff','#d8b64a'],30);},250);
      setTimeout(()=>onWin(),2900);
    }
    else if(pHero<=0){
      settledRef.current=true;
      setEnded('lose');
      SFX.lose();
      screenShake(); impactFlash();
      turnSweep('Defeat','#b8483a');
      setTimeout(()=>onLose(),2400);
    }
  },[pHero,eHero,ended]);

  function pushLog(t){setLog(t);}

  function playCard(idx){
    if(turn!=='player'||ended)return;
    const card=pHand[idx];
    if(card.cost>pEnergy){SFX.deny();pushLog('Not enough energy for '+card.name+'.');return;}
    if(pBoard.length>=5){SFX.deny();pushLog('Your board is full.');return;}
    SFX.play();
    setPEnergy(e=>e-card.cost);
    const unit=makeUnit(card,'player');
    setPBoard(b=>[...b,unit]);
    // capture where the card sits in hand BEFORE React unmounts it
    const handEl=document.querySelector(`.hand .card[data-iid="${card._iid}"]`);
    const fromRect=handEl?handEl.getBoundingClientRect():null;
    setPHand(h=>h.filter((_,i)=>i!==idx));
    pushLog(card.name+' takes the field. '+card.ability.name+'!');
    setTimeout(()=>applyOnPlay(unit),60);
    setTimeout(()=>{
      const n=nodeRef(unit.uid);
      if(n){
        flyCardToBoard(fromRect,unit.uid);
        pulse(n,'spawn',500);
        const r=n.getBoundingClientRect();
        const cx=r.left+r.width/2, cy=r.top+r.height/2;
        if(card.rarity==='legendary'){
          // legendary entrance: rings, gold burst, name shout, screen punch
          critFx(cx, r.top-4, card.name.toUpperCase(), '#ffe36a');
          ringFx(cx,cy,'rgba(255,215,110,.95)');
          setTimeout(()=>ringFx(cx,cy,'rgba(255,235,150,.7)'),140);
          burst(cx,cy,['#ffd76a','#fff','#d8b64a','#ffb04a'],26);
          impactFlash(); screenShake();
        } else {
          burst(cx,cy,['#d8b64a','#ffe89a','#ffffff'],12);
          ringFx(cx,cy,'rgba(216,182,74,.55)');
        }
      }
    },40);
  }

  // green heal numbers + sparkle over a unit
  function healFx(uid,amount){
    SFX.heal();
    const n=nodeRef(uid); if(!n)return;
    const r=n.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height*0.4;
    floatNum(cx,cy,'+'+amount,'#7ce07c');
    burst(cx,r.top+r.height/2,['#7ce07c','#c8ffc8','#ffffff'],12);
    ringFx(cx,r.top+r.height/2,'rgba(110,230,120,.85)');
  }

  function applyOnPlay(unit){
    const c=unit.card;
    if(c.id==='amsh'){setPHero(h=>Math.min(20,h+1));pushLog('Cuddliness heals your hero +1.');}
    if(c.id==='rag'){setPBoard(b=>b.map(u=>u.side==='player'?{...u,hp:Math.min(u.maxhp,u.hp+2)}:u));pushLog('Ragdoll heals the whole team +2.');setTimeout(()=>pBoard.forEach(u=>u.side==='player'&&healFx(u.uid,2)),100);}
    if(c.id==='goku'){setPBoard(b=>b.map(u=>u.side==='player'?{...u,hp:u.maxhp,shield:u.shield+3}:u));pushLog('Goku fully heals and shields the team!');setTimeout(()=>pBoard.forEach(u=>u.side==='player'&&healFx(u.uid,'MAX')),100);}
    if(c.id==='sphy'||c.id==='pers'){setPBoard(b=>{const allies=b.filter(u=>u.side==='player');if(!allies.length)return b;const weak=allies.reduce((a,u)=>u.hp<a.hp?u:a);return b.map(u=>u.uid===weak.uid?{...u,shield:u.shield+3}:u);});}
    if(c.id==='tonk'&&deckRef.current.length){setPHand(h=>[...h,deckRef.current.shift()]);pushLog('Tonkinese draws a card.');}
    if(c.id==='bur'||c.id==='scot'){setPBoard(b=>{const others=b.filter(u=>u.side==='player'&&u.uid!==unit.uid);if(!others.length)return b;const t=others[0];return b.map(u=>u.uid===t.uid?{...u,atk:u.atk+1}:u);});}
    // ---- BOSS on-play ----
    if(c.id==='oscar'){
      // Alpha Presence: +1 ATK per other ally, and he's already a taunt (set in makeUnit)
      setPBoard(b=>{const allies=b.filter(u=>u.side==='player'&&u.uid!==unit.uid).length;return b.map(u=>u.uid===unit.uid?{...u,atk:u.atk+allies,taunt:true}:u);});
      pushLog('Alpha Presence! Oscar taunts the enemy and swells with his harem.');
    }
    if(c.id==='pers'){pushLog('Aristocrat: your cats take no damage this turn.');setPBoard(b=>b.map(u=>u.side==='player'?{...u,shield:Math.max(u.shield,99),_aristocrat:true}:u));}
    // recompute Selina after any play
    setTimeout(recomputeSelina,80);
  }

  // Selina's Clingy: +3 ATK while Oscar or Smokey stands, -2 (from base) when alone with neither.
  function recomputeSelina(){
    setPBoard(b=>{
      const hasAnchor=b.some(u=>u.side==='player'&&(u.card.id==='oscar'||u.card.id==='smokey')&&u.hp>0);
      return b.map(u=>{
        if(u.card.id!=='selina')return u;
        const base=u.card.atk; // 4
        const target=hasAnchor?base+3:Math.max(1,base-2);
        return {...u,atk:target};
      });
    });
  }

  function selectAttacker(u){
    SFX.select();
    if(turn!=='player'||ended)return;
    if(u.side!=='player'){return;}
    if(u.hasAttacked){pushLog(u.card.name+' already attacked this turn.');return;}
    if(u.stunned){pushLog(u.card.name+' is stunned.');return;}
    setSel(u.uid===sel?null:u.uid);
  }

  function enemyTaunts(){return eBoard.filter(u=>u.taunt&&u.hp>0);}

  function attackTarget(target){
    if(turn!=='player'||ended||!sel)return;
    const attacker=pBoard.find(u=>u.uid===sel);
    if(!attacker)return;
    // stealth guard
    if(target.stealth&&target.stealthTurns>0){pushLog(target.card.name+' is hidden and cannot be targeted.');return;}
    // taunt guard
    const taunts=enemyTaunts();
    if(taunts.length&&!target.taunt){pushLog('You must attack the Taunt first ('+taunts[0].card.name+').');return;}
    resolveCombat(attacker,target);
    setSel(null);
  }

  function dealDamage(unit,dmg,setBoard,boardSide){
    let d=dmg;
    if(unit.dodge&&Math.random()<unit.dodge){
      SFX.draw();
      const n=nodeRef(unit.uid); if(n){const r=n.getBoundingClientRect();floatNum(r.left+r.width/2,r.top,'DODGE!','#7ab0e0');pulse(n,'lunge-'+(unit.side==='player'?'up':'down'),420);}
      pushLog(unit.card.name+' dodged!');
      return unit;
    }
    if(unit.armor)d=Math.max(0,d-unit.armor);
    if(unit.shield>0){const absorbed=Math.min(unit.shield,d);d-=absorbed;unit.shield-=absorbed;}
    unit.hp-=d;
    if(unit.card&&unit.card.id==='lykoi'&&d>0)unit._wounded=true;
    if(d>=6) SFX.crit(); else if(d>0) SFX.hit();
    if(unit.hp<=0) setTimeout(()=>SFX.death(),90);
    const n=nodeRef(unit.uid);
    if(n){
      const r=n.getBoundingClientRect();
      const cx=r.left+r.width/2, cy=r.top+r.height*0.4;
      floatNum(cx,cy,'-'+d,'#ff8a7a',d>=6);
      pulse(n,'hit',400); pulse(n,'flash',350);
      slashFx(cx,cy,r.width*0.9);
      burst(cx,cy,['#ff8a7a','#ffcf6a','#ffffff'],d>=6?18:10);
      if(d>=6){ screenShake(); ringFx(cx,cy); impactFlash(); critFx(cx,cy-18,'CRIT!'); }
      else if(d>=4){ ringFx(cx,cy); }
    }
    return unit;
  }

  function resolveCombat(attacker,target){
    // attacker lunges toward the fight
    const an=nodeRef(attacker.uid); if(an) pulse(an,'lunge-'+(attacker.side==='player'?'up':'down'),420);
    let pb=pBoard.map(u=>({...u})), eb=eBoard.map(u=>({...u}));
    let atk=(attacker.side==='player'?pb:eb).find(u=>u.uid===attacker.uid);
    let tgt=(target.side==='player'?pb:eb).find(u=>u.uid===target.uid);
    let dmg=atk.atk;
    let note='';
    let shout=null;
    // ---- signature attack hooks ----
    if(atk.card.id==='beng'&&tgt.hp<tgt.maxhp){dmg+=2;note=' Leopard Blood tears the wounded!';shout='LEOPARD BLOOD';}
    if(atk.card.id==='smokey'&&atk.stealth){dmg*=3;note=' Smokey strikes from the dark for TRIPLE!';shout='FROM THE DARK';}
    if(atk.card.id==='bomb'&&!atk.hasAttacked){dmg*=2;note=' Mini Panther pounces for double!';shout='PANTHER POUNCE';}
    if(atk.card.id==='lykoi'&&atk._wounded){dmg+=3;note=' Werewolf fury!';shout='WEREWOLF FURY';atk._wounded=false;}
    if(shout){
      const an2=nodeRef(attacker.uid);
      if(an2){const r=an2.getBoundingClientRect();
        critFx(r.left+r.width/2, r.top-6, shout, '#ffe36a');
        burst(r.left+r.width/2,r.top+r.height/2,['#ffe36a','#fff','#ff9a3c'],20);
        impactFlash(); screenShake();}
    }
    setTimeout(()=>dealDamage(tgt,dmg,null,target.side),180);
    // stun effects on the target
    if(atk.card.id==='rocket'&&Math.random()<0.5){tgt.stunned=true;note=' 6AM Yeller stuns '+tgt.card.name+'!';}
    if(atk.card.id==='scot'){tgt.stunned=true;note=' Owl Gaze stuns '+tgt.card.name+'!';}
    if(atk.stealth){atk.stealthTurns=0;atk.stealth=false;}
    if(tgt.hp>0 && !['Mage'].includes(atk.card.role)){
      const retal=Math.max(0,Math.floor(tgt.atk*0.6));
      if(retal>0)setTimeout(()=>dealDamage(atk,retal,null,attacker.side),260);
    }
    if(atk.card.id==='savan'&&atk.hp>0&&tgt.hp>0&&atk.spd>tgt.spd){
      dealDamage(tgt,atk.card.atk,null,target.side);note=' Serval Leap strikes twice!';
    }
    atk.hasAttacked=true;
    const targetDied=tgt.hp<=0, attackerDied=atk.hp<=0;
    // rich death animation before removal
    [ [tgt,target.uid], [atk,attacker.uid] ].forEach(([u,uid])=>{
      if(u.hp<=0){ const dn=nodeRef(uid); if(dn){ dn.classList.add('dying'); const r=dn.getBoundingClientRect(); burst(r.left+r.width/2,r.top+r.height/2,['#888','#bbb','#e98a7a'],16);} }
    });
    pb=pb.filter(u=>u.hp>0); eb=eb.filter(u=>u.hp>0);
    setTimeout(()=>{ captureBoard(); setPBoard(pb); setEBoard(eb); recomputeSelina(); },520);
    let msg=atk.card.name+' strikes '+tgt.card.name+' for '+dmg+'!'+note;
    if(targetDied)msg+=' '+tgt.card.name+' falls.';
    pushLog(msg);
  }

  function attackHero(){
    if(turn!=='player'||ended||!sel)return;
    if(enemyTaunts().length){pushLog('Break through the Taunt first.');return;}
    const attacker=pBoard.find(u=>u.uid===sel);
    if(!attacker||attacker.hasAttacked)return;
    const dmg=attacker.atk;
    setEHero(h=>{const nh=h-dmg;return nh;});
    const an=nodeRef(attacker.uid); if(an) pulse(an,'lunge-up',420);
    heroHitFx('ehero',dmg);
    setPBoard(b=>b.map(u=>u.uid===attacker.uid?{...u,hasAttacked:true}:u));
    pushLog(attacker.card.name+' hits the enemy hero for '+dmg+'!');
    setSel(null);
    setTimeout(()=>checkEnd(pBoard,eBoard,pHero,eHero-dmg),50);
  }

  function checkEnd(pb,eb,ph,eh){
    if(eh<=0){setEnded('win');setTimeout(()=>onWin(),1400);return true;}
    if(ph<=0){setEnded('lose');setTimeout(()=>onLose(),1400);return true;}
    return false;
  }

  function endTurn(){
    if(turn!=='player'||ended)return;
    setSel(null);
    // strip temporary Aristocrat shields (only lasted the player's turn)
    setPBoard(b=>b.map(u=>u._aristocrat?{...u,shield:0,_aristocrat:false}:u));
    setTurn('enemy');
    turnSweep('Enemy Turn','#e07a5a');
    pushLog('The enemy takes the field...');
    setTimeout(runEnemyTurn,650);
  }

  // helper: flash a damage number over a unit node by uid (after render)
  function popDamage(uid,amount,color){
    if(amount>=6) SFX.crit(); else if(amount>0) SFX.hit();
    setTimeout(()=>{
      const n=nodeRef(uid);
      if(n){const r=n.getBoundingClientRect();floatNum(r.left+r.width/2,r.top+10,(amount>0?'-'+amount:'0'),color||'#e98a7a');shakeEl(n);flashEl(n,'#b8483a');}
    },20);
  }

  // Enemy turn now plays out as a visible sequence of timed beats.
  function runEnemyTurn(){
    let eb=(eBoardRef.current||[]).map(u=>({...u}));
    let energy=pMax;
    // early-game board cap so the enemy does not snowball a full board before the player can develop
    const boardCap = turnNo<3 ? 2 : turnNo<5 ? 3 : 5;
    // decide plays up front
    const plays=[];
    let guard=0;
    while(energy>0 && eb.length+plays.length<boardCap && eDeckRef.current.length && guard<8){
      guard++;
      const playable=eDeckRef.current.filter(c=>c.cost<=energy);
      if(!playable.length)break;
      // the legend always takes the field first when affordable
      const legendInHand=playable.find(c=>c.boss);
      const pick=legendInHand||playable.sort((a,b)=>b.cost-a.cost)[0];
      eDeckRef.current.splice(eDeckRef.current.indexOf(pick),1);
      energy-=pick.cost;
      plays.push(pick);
    }
    // sequence: each play is a beat, then each attack is a beat, then hand off.
    const beats=[];
    plays.forEach(card=>beats.push({type:'play',card}));
    beats.push({type:'attacks'});
    beats.push({type:'handoff'});

    let bi=0;
    const step=()=>{
      if(endedRef.current)return;
      if(bi>=beats.length)return;
      const beat=beats[bi++];
      if(beat.type==='play'){
        const u=makeUnit(beat.card,'enemy');
        if(beat.card.id==='rag'||beat.card.id==='goku'){
          const ne=[...(eBoardRef.current||[]).map(x=>({...x,hp:x.maxhp})),u];
          eBoardRef.current=ne; setEBoard(ne);
        } else {
          const ne=[...(eBoardRef.current||[]),u];
          eBoardRef.current=ne; setEBoard(ne);
        }
        pushLog('Enemy plays '+beat.card.name+'. '+beat.card.ability.name+'!');
        setTimeout(()=>{const n=nodeRef(u.uid);if(n)gsap.fromTo(n,{scale:.2,y:-24},{scale:1,y:0,duration:.45,ease:'back.out(1.6)'});},40);
        setTimeout(step,720);
      }
      else if(beat.type==='attacks'){
        runEnemyAttacks(step);
      }
      else if(beat.type==='handoff'){
        // start player turn
        setPBoard(b=>b.map(x=>({...x,hasAttacked:false,stealthTurns:Math.max(0,x.stealthTurns-1),stunned:false})));
        const nm=Math.min(10,pMax+1); setPMax(nm); setPEnergy(nm);
        if(deckRef.current.length){
          const c=deckRef.current.shift();
          setPHand(h=>h.length<7?[...h,c]:h);
          SFX.draw();
          setJustDrawn(c._iid);
          setTimeout(()=>setJustDrawn(null),500);
        }
        setTurn('player');
        turnSweep('Your Turn','#d8b64a');
        setTurnNo(t=>{
          const nextTurn=t+1;
          // FATIGUE: after turn 7, a growing storm damages both heroes so games always end
          if(nextTurn>=8){
            const fatigue=nextTurn-7;
            setPHero(h=>h-fatigue);
            setEHero(h=>h-fatigue);
            pushLog('The Long Winter bites! Both heroes take '+fatigue+' damage.');
          } else {
            pushLog('Your move.');
          }
          return nextTurn;
        });
      }
    };
    step();
  }

  // Each living enemy attacks one player unit (taunt first) or the hero, as a timed beat.
  function runEnemyAttacks(done){
    const attackers = (eBoardRef.current||[]).filter(u=>u.hp>0).map(u=>u.uid);
    let ai=0;
    const nextAttack=()=>{
      if(endedRef.current){done&&done();return;}
      if(ai>=attackers.length){
        captureBoard();
        setPBoard(b=>b.filter(x=>x.hp>0));
        setEBoard(b=>b.filter(x=>x.hp>0));
        setTimeout(()=>done&&done(),240);
        return;
      }
      const atkUid=attackers[ai++];
      // read fresh boards from refs (no nested setState)
      const eb=eBoardRef.current||[];
      const pb=pBoardRef.current||[];
      const attacker=eb.find(u=>u.uid===atkUid);
      if(!attacker||attacker.hp<=0){setTimeout(nextAttack,110);return;}
      if(attacker.stunned){
        pushLog(attacker.card.name+' is stunned and cannot attack.');
        const ne=eb.map(u=>u.uid===atkUid?{...u,stunned:false}:u);
        eBoardRef.current=ne; setEBoard(ne);
        setTimeout(nextAttack,280);return;
      }
      const taunts=pb.filter(x=>x.taunt&&x.hp>0);
      const validTargets=pb.filter(x=>x.hp>0&&!(x.stealth&&x.stealthTurns>0));
      const dmgTo=(t)=>{let d=attacker.atk;if(t.armor)d=Math.max(0,d-t.armor);if(t.shield>0)d=Math.max(0,d-t.shield);return d;};
      const retalFrom=(t)=>Math.max(0,Math.floor(t.atk*0.6));
      // decide target: taunt first (forced); else a GOOD trade; else go face.
      let target=null;
      if(taunts.length){
        const k=taunts.filter(t=>dmgTo(t)>=t.hp);
        target=(k.length?k:taunts).slice().sort((a,b)=>a.hp-b.hp)[0];
      } else {
        const killable=validTargets.filter(t=>dmgTo(t)>=t.hp);
        const cleanKills=killable.filter(t=>retalFrom(t)<attacker.hp);
        if(cleanKills.length){
          target=cleanKills.slice().sort((a,b)=>b.atk-a.atk||a.hp-b.hp)[0];
        } else if(killable.length && attacker.hp>attacker.maxhp*0.6){
          target=killable.slice().sort((a,b)=>b.atk-a.atk)[0];
        } else if(validTargets.length && turnNo<4){
          // early game: trade into the biggest threat rather than rushing face,
          // so a learning player isn't raced down before they can develop
          const threats=validTargets.filter(t=>t.atk>=attacker.atk);
          if(threats.length) target=threats.slice().sort((a,b)=>b.atk-a.atk)[0];
          else target=null;
        } else {
          target=null;
        }
      }
      if(target){
        let dmg=attacker.atk;
        if(target.armor)dmg=Math.max(0,dmg-target.armor);
        let shieldLeft=target.shield;
        if(shieldLeft>0){const ab=Math.min(shieldLeft,dmg);dmg-=ab;shieldLeft-=ab;}
        let newPb=pb.map(x=>x.uid===target.uid?{...x,hp:x.hp-dmg,shield:shieldLeft}:x);
        popDamage(target.uid,dmg,'#e98a7a');
        pushLog(attacker.card.name+' strikes your '+target.card.name+' for '+dmg+'.');
        const survivor=newPb.find(x=>x.uid===target.uid);
        let newEb=eb;
        if(survivor && survivor.hp>0){
          const retal=retalFrom(target);
          if(retal>0){newEb=eb.map(x=>x.uid===attacker.uid?{...x,hp:x.hp-retal}:x);popDamage(attacker.uid,retal,'#7ac07a');}
        } else {
          pushLog('Your '+target.card.name+' was defeated.');
        }
        captureBoard();
        newPb=newPb.filter(x=>x.hp>0); newEb=newEb.filter(x=>x.hp>0);
        pBoardRef.current=newPb; eBoardRef.current=newEb;
        setPBoard(newPb); setEBoard(newEb);
        setTimeout(nextAttack,520);
      } else {
        // go face
        const an=nodeRef(atkUid); if(an) pulse(an,'lunge-down',420);
        heroHitFx('phero',attacker.atk);
        setPHero(h=>h-attacker.atk);
        pushLog(attacker.card.name+' strikes YOU for '+attacker.atk+'!');
        setTimeout(nextAttack,520);
      }
    };
    nextAttack();
  }

  const canHitHero = sel && !enemyTaunts().length;

  return (
    <div className={`battle ${ended==='lose'?'lost':''}`}>
      <div className="topbar">
        <button className="btn ghost" onClick={()=>{
          if(ended)return;
          const msg = (typeof lives==='number' && lives<=1)
            ? 'Retreat? This is your last life — the run will end here.'
            : 'Retreat costs a life'+(typeof lives==='number'?' ('+(lives-1)+' would remain)':'')+'. Fall back?';
          if(confirm(msg)) onQuit&&onQuit();
        }}><Icon name="arrowL" size={14}/> Retreat</button>
        <span className="turn-tag">Turn {turnNo}</span>
        {typeof lives==='number' && <span className="lives-chip" style={{fontSize:12,padding:'4px 9px'}}><Icon name="heart" size={12}/> {lives}</span>}
      </div>
      {rung && <div className="rung-banner">
        <span className={bossId?'rb-boss':''}>{bossId&&BY_ID[bossId]?BY_ID[bossId].name+' · '+BY_ID[bossId].title:rung.name}</span>
        <i>{bossId?'The Throne':'Rung '+rung.n+' of 7'}</i>
      </div>}
      <div className="hero-hp wide" id="ehero"><span>{bossId&&BY_ID[bossId]?BY_ID[bossId].name:'Enemy'}</span><div className="bar"><i style={{width:Math.max(0,eHero/(eHeroStart||20)*100)+'%'}}/></div><span>{Math.max(0,eHero)}</span></div>

      {coachOpen && (
        <Coach onDone={()=>{setCoachOpen(false);onCoachDone&&onCoachDone();}} steps={[
          {icon:'paw', title:'Welcome to the battle!', text:'Each turn you spend energy (the pips near your health) to play cats from your hand onto the field.'},
          {icon:'sword', title:'To attack:', text:'Tap one of your cats to select it, then tap an enemy cat (glowing red) to strike. Clear their cats and hit their hero to win.'},
          {icon:'shield', title:'Keywords matter.', text:'Tap the keyword chips below the fields any time to learn what Taunt, Stealth and Shield do. Now go win!'},
        ]}/>
      )}

      <div className="keys-strip">
        {KEYWORDS.map(k=><KeyChip key={k.id} kw={k} onShow={showTip}/>)}
      </div>

      <div className="side-label">Enemy Field {enemyTaunts().length?'· Taunt active':''}</div>
      <div className="board-row enemy" onClick={()=>{}}>
        {eBoard.length===0 && <span style={{color:'#6a5a44',fontSize:12}}>no cats deployed</span>}
        {eBoard.filter(u=>u&&u.card).map(u=>(
          <div key={u.uid} data-uid={u.uid}
            className={`mini ${u.card.rarity} ${sel&&(!enemyTaunts().length||u.taunt)&&!(u.stealth&&u.stealthTurns>0)?'targetable':''} ${u.stealth&&u.stealthTurns>0?'stealthed':''} ${u.hp<=0?'dead':''}`}
            onClick={()=>attackTarget(u)}>
            {u.taunt&&<span className="taunt"><Icon name="shield" size={13}/></span>}
            {u.stealth&&u.stealthTurns>0&&<span className="status"><Icon name="moon" size={12}/></span>}
            <div className="art"><CardArt card={u.card}/></div>
            <div className="hpbar"><i className={u.hp/u.maxhp<=0.3?"low":u.hp/u.maxhp<=0.6?"mid":""} style={{width:(u.hp/u.maxhp*100)+"%"}}/></div>
            <div className="nm">{u.card.name}</div>
            <div className="mstats"><span className="ma">{u.atk}</span><span className="mh">{u.hp}</span></div>
          </div>
        ))}
      </div>

      {canHitHero && <button className="btn gold" style={{alignSelf:'center'}} onClick={attackHero}><Icon name="sword" size={15}/> Strike Enemy Hero</button>}

      <div className="side-label">Your Field</div>
      <div className="board-row mine">
        {pBoard.length===0 && <span style={{color:'#6a5a44',fontSize:12}}>play a cat from your hand</span>}
        {pBoard.filter(u=>u&&u.card).map(u=>(
          <div key={u.uid} data-uid={u.uid}
            className={`mini ${u.card.rarity} ${sel===u.uid?'selected':''} ${u.stealth&&u.stealthTurns>0?'stealthed':''} ${u.hasAttacked?'dead':''}`}
            onClick={()=>selectAttacker(u)}>
            {u.taunt&&<span className="taunt"><Icon name="shield" size={13}/></span>}
            {u.shield>0&&<span className="status"><Icon name="sparkle" size={12}/></span>}
            {u.stealth&&u.stealthTurns>0&&<span className="status"><Icon name="moon" size={12}/></span>}
            <div className="art"><CardArt card={u.card}/></div>
            <div className="hpbar"><i className={u.hp/u.maxhp<=0.3?"low":u.hp/u.maxhp<=0.6?"mid":""} style={{width:(u.hp/u.maxhp*100)+"%"}}/></div>
            <div className="nm">{u.card.name}</div>
            <div className="mstats"><span className="ma">{u.atk}</span><span className="mh">{u.hp}</span></div>
          </div>
        ))}
      </div>

      <div className="battle-hud">
        <div className="hero-hp" id="phero"><span>You</span><div className="bar"><i style={{width:Math.max(0,pHero/24*100)+'%'}}/></div><span>{Math.max(0,pHero)}</span></div>
        <div className="energy">{Array.from({length:pMax}).map((_,i)=><span key={i} className={`pip ${i<pEnergy?'on':''}`}/>)}</div>
        <button className="btn gold" onClick={endTurn} disabled={turn!=='player'}>End Turn</button>
      </div>
      <div className="log">{log}</div>
      <TipPop tip={tip} pos={tipPos} onClose={()=>setTip(null)}/>

      <div className="hand">
        {pHand.map((c,i)=> c&&c.ability ? (
          <Card key={c._iid||('h'+i)} card={c}
            className={`${c.cost<=pEnergy&&turn==='player'?'playable':'unplayable'} ${c._iid===justDrawn?'drawn':''}`}
            onClick={()=>playCard(i)}/>
        ) : null)}
      </div>

      {ended && (
        <div className={`banner ${ended}`}>
          <h2>{ended==='win'
            ? (bossId&&BY_ID[bossId] ? <><Icon name="trophy" size={44} style={{marginRight:12}}/>The Throne Falls</> : <><Icon name="trophy" size={44} style={{marginRight:12}}/>Victory!</>)
            : <><Icon name="skull" size={40} style={{marginRight:12}}/>Defeat</>}</h2>
          <p className="banner-sub" style={{color:'var(--ink-dim)'}}>{
            ended==='win'
              ? (bossId&&BY_ID[bossId] ? BY_ID[bossId].name+' yields. The house is yours.' : 'The rung is cleared. Choose your spoils.')
              : (typeof lives==='number'
                  ? (lives-1>0 ? 'A life spent. '+(lives-1)+' remain.' : 'The last life. The Ascent ends here.')
                  : 'Your cats retreat to fight again.')
          }</p>
        </div>
      )}
    </div>
  );
}

// reward pool offered after each won rung
function rollRewards(runDeck,owned,lives){
  const out=[];
  // 1) recruit a card into the run deck (not permanent)
  const pool=ROSTER.filter(c=>!c.boss&&!runDeck.includes(c.id));
  if(pool.length){
    const pick=pool[Math.floor(Math.random()*pool.length)];
    out.push({kind:'recruit',card:pick,title:'Recruit',
      desc:pick.name+' joins this run.',icon:'paw'});
  }
  // 2) upgrade a card already in the deck
  if(runDeck.length){
    const id=runDeck[Math.floor(Math.random()*runDeck.length)];
    const c=BY_ID[id];
    const mode=Math.random()<0.5?'atk':'hp';
    out.push({kind:'upgrade',cardId:id,mode,title:'Train',
      desc:c.name+' gains '+(mode==='atk'?'+1 ATK':'+2 HP')+' for this run.',icon:'swords'});
  }
  // 3) heal / gain a life
  if(lives<RUN_LIVES){
    out.push({kind:'life',title:'Rest',desc:'Recover 1 life.',icon:'heart'});
  } else {
    out.push({kind:'fish',amount:40,title:'Forage',desc:'+40 fish.',icon:'fish'});
  }
  // 4) always a fish option as fallback variety
  if(out.length<3) out.push({kind:'fish',amount:60,title:'Forage',desc:'+60 fish.',icon:'fish'});
  return out.slice(0,3);
}

// apply run-scoped stat buffs on top of a base card
function buffedCard(card,buffs){
  const b=buffs[card.id];
  if(!b)return card;
  return {...card, atk:card.atk+(b.atk||0), hp:card.hp+(b.hp||0), _buffed:true};
}

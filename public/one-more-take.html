function RemoteImage({asset,className='',style={},alt='',imgStyle={},crop,scale,filter}){
  const sources=asset?(asset.urls||(asset.url?[asset.url]:[])):[];

const OMT_ENGINE=(()=>{
const SAVE_VERSION = 2;
const BUILD_ID = '0.5-living-studio';

function clamp(n, a = 0, b = 100) {
  return Math.max(a, Math.min(b, Number(n) || 0));
}

function hashSeed(str) {
  let h = 2166136261;
  const input = String(str ?? '');
  for (let i = 0; i < input.length; i += 1) {
    h ^= input.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function seeded(seed, n = 0) {
  let x = ((Number(seed) || 0) + n * 2654435761) >>> 0;
  x ^= x << 13;
  x ^= x >>> 17;
  x ^= x << 5;
  return (x >>> 0) / 4294967295;
}

function createGameState(name = 'Hammy Pictures', now = new Date().toISOString()) {
  const safeName = String(name || 'Hammy Pictures').trim().slice(0, 28) || 'Hammy Pictures';
  return {
    saveVersion: SAVE_VERSION,
    build: BUILD_ID,
    meta: { createdAt: now, updatedAt: now },
    studio: {
      name: safeName,
      cash: 250000,
      reputation: 12,
      trust: 50,
      prestige: 5,
      year: 1,
      quarter: 1,
    },
    archive: [],
    current: null,
    franchises: {},
    history: [],
    scriptSlate: null,
    lastRejectedSlateIds: [],
    relationships: {},
    rngSeed: hashSeed(`${safeName}|${now}`),
    settings: { sound: true },
    sound: true,
  };
}

function createProject(script, game, nowMs = Date.now()) {
  if (!script?.id) throw new Error('createProject requires a script');
  const year = game?.studio?.year || 1;
  const quarter = game?.studio?.quarter || 1;
  const baseSeed = game?.rngSeed || hashSeed(game?.studio?.name || 'studio');
  const ordinal = Array.isArray(game?.history) ? game.history.length : 0;
  const seed = hashSeed(`${baseSeed}|${script.id}|${year}|${quarter}|${ordinal}`);
  return {
    projectId: `film-${year}q${quarter}-${script.id}-${seed.toString(36)}`,
    seed,
    status: 'DEVELOPMENT',
    scriptId: script.id,
    title: script.title,
    cast: { leadId: null, supportId: null, directorId: null },
    budget: {
      levels: { cast: 2, sets: 2, stunts: 2, effects: 2, post: 2 },
      approved: Number(script.base) || 0,
    },
    posture: 'balanced',
    sceneIndex: 0,
    scenes: [],
    incidents: [],
    relationshipsChanged: [],
    injuries: [],
    spend: 0,
    postBonus: 0,
    createdAt: new Date(nowMs).toISOString(),
  };
}

function ensureStudio(studio, fallbackName = 'Hammy Pictures') {
  return {
    name: String(studio?.name || fallbackName).slice(0, 28),
    cash: Number.isFinite(Number(studio?.cash)) ? Number(studio.cash) : 250000,
    reputation: clamp(studio?.reputation ?? 12),
    trust: clamp(studio?.trust ?? 50),
    prestige: clamp(studio?.prestige ?? 5),
    year: Math.max(1, Math.floor(Number(studio?.year) || 1)),
    quarter: clamp(Math.floor(Number(studio?.quarter) || 1), 1, 4),
  };
}

function normalizeProject(project) {
  if (!project || typeof project !== 'object') return null;
  return {
    ...project,
    projectId: String(project.projectId || `film-migrated-${hashSeed(JSON.stringify(project))}`),
    seed: Number(project.seed) >>> 0,
    status: String(project.status || 'DEVELOPMENT'),
    cast: {
      leadId: project.cast?.leadId || null,
      supportId: project.cast?.supportId || null,
      directorId: project.cast?.directorId || null,
    },
    budget: {
      ...project.budget,
      levels: {
        cast: clamp(project.budget?.levels?.cast ?? 2, 0, 4),
        sets: clamp(project.budget?.levels?.sets ?? 2, 0, 4),
        stunts: clamp(project.budget?.levels?.stunts ?? 2, 0, 4),
        effects: clamp(project.budget?.levels?.effects ?? 2, 0, 4),
        post: clamp(project.budget?.levels?.post ?? 2, 0, 4),
      },
      approved: Number(project.budget?.approved) || 0,
    },
    posture: project.posture || 'balanced',
    sceneIndex: Math.max(0, Math.floor(Number(project.sceneIndex) || 0)),
    scenes: Array.isArray(project.scenes) ? project.scenes : [],
    incidents: Array.isArray(project.incidents) ? project.incidents : [],
    relationshipsChanged: Array.isArray(project.relationshipsChanged) ? project.relationshipsChanged : [],
    injuries: Array.isArray(project.injuries) ? project.injuries : [],
    spend: Number(project.spend) || 0,
    postBonus: Number(project.postBonus) || 0,
  };
}

function migrateSave(raw, now = new Date().toISOString()) {
  if (!raw || typeof raw !== 'object') return null;
  if (raw.saveVersion === SAVE_VERSION) {
    return {
      ...createGameState(raw.studio?.name || 'Hammy Pictures', raw.meta?.createdAt || raw.createdAt || now),
      ...raw,
      saveVersion: SAVE_VERSION,
      build: BUILD_ID,
      meta: {
        createdAt: raw.meta?.createdAt || raw.createdAt || now,
        updatedAt: now,
      },
      studio: ensureStudio(raw.studio),
      archive: Array.isArray(raw.archive) ? raw.archive : [],
      current: normalizeProject(raw.current),
      franchises: raw.franchises && typeof raw.franchises === 'object' ? raw.franchises : {},
      history: Array.isArray(raw.history) ? raw.history : [],
      scriptSlate: raw.scriptSlate && typeof raw.scriptSlate === 'object' ? raw.scriptSlate : null,
      lastRejectedSlateIds: Array.isArray(raw.lastRejectedSlateIds) ? raw.lastRejectedSlateIds : [],
      relationships: raw.relationships && typeof raw.relationships === 'object' ? raw.relationships : {},
      rngSeed: Number(raw.rngSeed) >>> 0 || hashSeed(`${raw.studio?.name || 'studio'}|${raw.createdAt || now}`),
      settings: { sound: raw.settings?.sound ?? raw.sound ?? true },
      sound: raw.settings?.sound ?? raw.sound ?? true,
    };
  }
  if (raw.saveVersion === 1 && raw.studio) {
    return {
      saveVersion: SAVE_VERSION,
      build: BUILD_ID,
      meta: { createdAt: raw.createdAt || now, updatedAt: now, migratedFrom: 1 },
      studio: ensureStudio(raw.studio),
      archive: Array.isArray(raw.archive) ? raw.archive : [],
      current: normalizeProject(raw.current),
      franchises: {},
      history: [{ type: 'SAVE_MIGRATED', from: 1, at: now }],
      scriptSlate: null,
      lastRejectedSlateIds: [],
      relationships: {},
      rngSeed: hashSeed(`${raw.studio.name}|${raw.createdAt || now}`),
      settings: { sound: raw.sound !== false },
      sound: raw.sound !== false,
    };
  }
  return null;
}

function validateSave(raw) {
  const errors = [];
  if (!raw || typeof raw !== 'object') errors.push('Save must be an object');
  if (raw?.saveVersion !== SAVE_VERSION) errors.push(`Expected saveVersion ${SAVE_VERSION}`);
  if (!raw?.studio || typeof raw.studio !== 'object') errors.push('Missing studio');
  if (!raw?.studio?.name || typeof raw.studio.name !== 'string') errors.push('Missing studio name');
  if (!Number.isFinite(Number(raw?.studio?.cash))) errors.push('Invalid studio cash');
  if (!Array.isArray(raw?.archive)) errors.push('Archive must be an array');
  if (!Array.isArray(raw?.history)) errors.push('History must be an array');
  if (raw?.scriptSlate && !Array.isArray(raw.scriptSlate.ids)) errors.push('Script slate ids must be an array');
  if (!raw?.relationships || typeof raw.relationships !== 'object') errors.push('Relationships must be an object');
  if (raw?.current && !raw.current.projectId) errors.push('Current project missing projectId');
  return { valid: errors.length === 0, errors };
}

function relationshipKey(aId, bId) {
  if (!aId || !bId || aId === bId) return null;
  return [String(aId), String(bId)].sort().join('|');
}

function getRelationshipScore(relationships, aId, bId) {
  const key = relationshipKey(aId, bId);
  return key ? Number(relationships?.[key] || 0) : 0;
}

function generateScriptSlate(game, scripts = [], count = 3) {
  const year = Number(game?.studio?.year) || 1;
  const quarter = Number(game?.studio?.quarter) || 1;
  const current = game?.scriptSlate;
  const validIds = new Set(scripts.map((s) => s.id));
  if (current?.year === year && current?.quarter === quarter && Array.isArray(current.ids) && current.ids.length === count && current.ids.every((id) => validIds.has(id))) return current;
  const excluded = new Set(Array.isArray(game?.lastRejectedSlateIds) ? game.lastRejectedSlateIds : []);
  let pool = scripts.filter((script) => !excluded.has(script.id));
  if (pool.length < count) pool = [...scripts];
  pool = [...pool].sort((a, b) => a.id.localeCompare(b.id));
  const seed = hashSeed(`${game?.rngSeed || 0}|slate|${year}|${quarter}|${(game?.history || []).length}`);
  for (let i = pool.length - 1; i > 0; i -= 1) {
    const j = Math.floor(seeded(seed, i * 13 + 7) * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return { year, quarter, seed, ids: pool.slice(0, count).map((script) => script.id) };
}

function prepareScriptSlate(game, scripts = [], count = 3) {
  const slate = generateScriptSlate(game, scripts, count);
  return game?.scriptSlate === slate ? game : { ...game, current: null, scriptSlate: slate };
}

function calculateChemistry(a, b, context = {}) {
  if (!a || !b || a.id === b.id) return 0;
  let score = 50;
  const traitsA = new Set(a.traits || []);
  const traitsB = new Set(b.traits || []);
  if (traitsA.has('Chemistry Magnet') || traitsB.has('Chemistry Magnet')) score += 12;
  if (traitsA.has('Quiet Professional') || traitsB.has('Quiet Professional')) score += 4;
  if (traitsA.has('Improviser') && traitsB.has('Improviser')) score += 6;
  if (traitsA.has('Hates Sequels') && context.sequelNumber > 0) score -= 8;
  score += Math.max(-18, Math.min(18, Number(context.relationshipScore || 0) * 0.22));
  const reliabilityA = Number(a.skills?.Reliability ?? a.skills?.Control ?? 50);
  const reliabilityB = Number(b.skills?.Reliability ?? b.skills?.Control ?? 50);
  score -= Math.min(10, Math.abs(reliabilityA - reliabilityB) / 8);
  const stableNoise = seeded(hashSeed([a.id, b.id].sort().join('|')), 3) * 12 - 6;
  return Math.round(clamp(score + stableNoise));
}

function calculateSceneOutcome({ project, script, scene, choiceIndex, lead, support, director, relationships = {}, budgetLevels = [0.65, 0.85, 1, 1.25, 1.55], postures = [] }) {
  if (!project || !script || !scene || !lead || !support || !director) {
    throw new Error('calculateSceneOutcome received incomplete context');
  }
  const posture = postures.find((p) => p.id === project.posture) || { variance: 10, bonus: 0 };
  const relevant = (Number(lead.skills?.Acting || 0) + Number(support.skills?.Acting || 0) + Number(director.skills?.Vision || 0)) / 3;
  const chemistry = calculateChemistry(lead, support, { genre: script.genre, relationshipScore: getRelationshipScore(relationships, lead.id, support.id) });
  const levels = Object.values(project.budget?.levels || { cast: 2, sets: 2, stunts: 2, effects: 2, post: 2 });
  const budgetAverage = levels.reduce((sum, level) => sum + Number(level || 0), 0) / Math.max(1, levels.length);
  const choiceProfiles = [
    { label: 'SAFE', bonus: 1, variance: 0.55 },
    { label: 'RISK', bonus: 3, variance: 1.25 },
    { label: 'CREATIVE', bonus: 2, variance: 0.9 },
  ];
  const profile = choiceProfiles[choiceIndex] || choiceProfiles[0];
  const roll = (seeded(project.seed, project.sceneIndex * 17 + choiceIndex * 5 + 1) * 2 - 1) * posture.variance * profile.variance;
  const quality = Math.round(clamp(
    36
      + relevant * 0.34
      + (chemistry - 50) * 0.12
      + budgetAverage * 4
      + Number(posture.bonus || 0)
      + profile.bonus
      + roll
      - Number(script.difficulty || 50) * 0.16,
  ));
  const band = quality >= 90 ? 'ICONIC' : quality >= 75 ? 'EXCEPTIONAL' : quality >= 60 ? 'STRONG' : quality >= 42 ? 'USABLE' : quality >= 24 ? 'ROUGH' : 'CATASTROPHIC';
  const textPools = quality >= 60
    ? ['The crew briefly remembers why they entered the industry.', 'The take lands. Even the boom operator looks emotional.', 'Somehow, this is cinema.']
    : quality < 40
      ? ['The set falls silent in the specific way that means money has died.', 'Nobody says “cut” because nobody wishes to accept responsibility.', 'The footage exists. That is the kindest available description.']
      : ['It will cut together. Probably. With music.', 'Competent enough to survive the edit.', 'Nobody celebrates, but nobody calls legal.'];
  const text = textPools[Math.floor(seeded(project.seed, 700 + project.sceneIndex * 11 + choiceIndex) * textPools.length)];
  return {
    choice: scene.choices?.[choiceIndex]?.[0] || `Choice ${choiceIndex + 1}`,
    quality,
    band,
    text,
    modifiers: {
      relevantSkill: Math.round(relevant),
      chemistry,
      budgetAverage: Number(budgetAverage.toFixed(2)),
      posture: project.posture,
      choiceProfile: profile.label,
      roll: Number(roll.toFixed(2)),
    },
  };
}

function calculateFilmScores(project, script, cast = {}, relationships = {}) {
  const scenes = Array.isArray(project?.scenes) ? project.scenes : [];
  const average = scenes.length ? scenes.reduce((sum, s) => sum + Number(s.quality || 0), 0) / scenes.length : 0;
  const spread = scenes.length ? Math.max(...scenes.map((s) => s.quality)) - Math.min(...scenes.map((s) => s.quality)) : 0;
  const lead = cast.lead;
  const support = cast.support;
  const director = cast.director;
  const chemistry = calculateChemistry(lead, support, { genre: script?.genre, relationshipScore: getRelationshipScore(relationships, lead?.id, support?.id) });
  return {
    average: Math.round(average),
    performance: Math.round(clamp(average * 0.55 + (lead?.skills?.Acting || 50) * 0.25 + (support?.skills?.Acting || 50) * 0.12 + chemistry * 0.08)),
    direction: Math.round(clamp(average * 0.6 + (director?.skills?.Vision || 50) * 0.25 + (director?.skills?.Control || 50) * 0.15)),
    craft: Math.round(clamp(average + Number(project?.postBonus || 0) - spread * 0.08)),
    spectacle: Math.round(clamp(average * 0.7 + (project?.budget?.levels?.stunts || 0) * 4 + (project?.budget?.levels?.effects || 0) * 4)),
    coherence: Math.round(clamp(average + Number(project?.postBonus || 0) - spread * 0.35)),
    originality: Math.round(clamp(average * 0.72 + Number(script?.prestige || 0) * 0.2 + (project?.posture === 'cook' ? 8 : project?.posture === 'full' ? 5 : 0))),
    chemistry,
  };
}

function calculateRelease({ project, script, lead, support, director, relationships = {}, campaignIndex = 0, spendIndex = 1, marketingAmounts = [10000, 25000, 50000], studio }) {
  const scores = calculateFilmScores(project, script, { lead, support, director }, relationships);
  const marketing = Number(marketingAmounts[spendIndex] || marketingAmounts[0] || 0);
  const campaignCriticBonus = campaignIndex === 2 ? 4 : 0;
  const campaignAudienceBonus = campaignIndex === 1 ? 4 : campaignIndex === 0 ? 2 : 0;
  const critic = Math.round(clamp(scores.performance * 0.25 + scores.direction * 0.25 + scores.coherence * 0.3 + scores.originality * 0.2 + campaignCriticBonus + (seeded(project.seed, 200) * 10 - 5)));
  const audience = Math.round(clamp(scores.average * 0.35 + scores.spectacle * 0.22 + scores.chemistry * 0.12 + Number(script.commercial || 0) * 0.2 + Number(lead?.fame || 0) * 0.11 + campaignAudienceBonus + (seeded(project.seed, 201) * 12 - 6)));
  const gross = Math.round((45000 + Number(script.commercial || 0) * 1400 + audience * 2100 + Number(lead?.fame || 0) * 600 + Number(studio?.reputation || 0) * 450) * (1 + spendIndex * 0.28) * (campaignIndex === 0 ? 1.06 : 1));
  const productionSpend = Number(project.spend || 0);
  const profit = Math.round(gross * 0.62 - productionSpend - marketing);
  const review = critic >= 80
    ? 'A baffling, beautiful catastrophe that somehow becomes cinema.'
    : critic >= 65
      ? 'Uneven, energetic and saved by one genuinely terrific sequence.'
      : critic >= 45
        ? 'The footage exists. Several performances do too.'
        : 'An expensive hostage situation involving a camera.';
  return { critic, audience, gross, profit, marketing, scores, review };
}

function calculateCastingFit({ lead, support, director, script, relationships = {} }) {
  if (!lead || !support || !director || !script) return null;
  const priorLeadSupport = getRelationshipScore(relationships, lead.id, support.id);
  const priorLeadDirector = getRelationshipScore(relationships, lead.id, director.id);
  const priorSupportDirector = getRelationshipScore(relationships, support.id, director.id);
  const actorChemistry = calculateChemistry(lead, support, { genre: script.genre, relationshipScore: priorLeadSupport });
  const directorLead = calculateChemistry(lead, director, { genre: script.genre, relationshipScore: priorLeadDirector });
  const directorSupport = calculateChemistry(support, director, { genre: script.genre, relationshipScore: priorSupportDirector });
  const genreFit = Math.round((Number(lead.skills?.Genre || 50) + Number(support.skills?.Genre || 50)) / 2);
  const directorFit = Math.round((Number(director.skills?.Actors || 50) * 0.6) + (Number(director.skills?.Control || 50) * 0.4));
  const overall = Math.round(clamp(actorChemistry * 0.42 + genreFit * 0.28 + directorFit * 0.2 + ((directorLead + directorSupport) / 2) * 0.1));
  const notes = [];
  notes.push(actorChemistry >= 72 ? `${lead.name} and ${support.name} have immediate screen electricity.` : actorChemistry >= 55 ? `${lead.name} and ${support.name} should work comfortably together.` : `${lead.name} and ${support.name} may need careful direction.`);
  notes.push(genreFit >= 72 ? `Both actors fit ${script.genre} naturally.` : genreFit >= 55 ? `The genre fit is workable, not automatic.` : `The cast is playing against type.`);
  notes.push(directorFit >= 72 ? `${director.name} should keep the production under control.` : directorFit >= 55 ? `${director.name} can manage this cast with some friction.` : `${director.name} may struggle to contain the room.`);
  if (priorLeadSupport >= 25) notes.push(`They already trust each other from earlier work.`);
  if (priorLeadSupport <= -25) notes.push(`A previous feud is still in the room.`);
  return { overall, actorChemistry, genreFit, directorFit, priorLeadSupport, notes };
}

function applyRelationshipChanges(game, film) {
  const relationships = { ...(game?.relationships || {}) };
  const changes = [];
  const average = Number(film?.scores?.average || 0);
  const chemistry = Number(film?.scores?.chemistry || 50);
  const direction = Number(film?.scores?.direction || 50);
  const qualityDelta = Math.round((average - 50) / 14);
  const pairs = [
    [film?.cast?.leadId, film?.cast?.supportId, Math.round((chemistry - 50) / 10) + qualityDelta, 'co-stars'],
    [film?.cast?.leadId, film?.cast?.directorId, Math.round((direction - 50) / 14) + qualityDelta, 'actor/director'],
    [film?.cast?.supportId, film?.cast?.directorId, Math.round((direction - 50) / 16) + qualityDelta, 'actor/director'],
  ];
  for (const [aId, bId, rawDelta, reason] of pairs) {
    const key = relationshipKey(aId, bId);
    if (!key) continue;
    let delta = Math.max(-8, Math.min(8, rawDelta));
    if (delta === 0) delta = average >= 58 ? 1 : average <= 42 ? -1 : 0;
    if (!delta) continue;
    const before = Number(relationships[key] || 0);
    const after = Math.max(-100, Math.min(100, before + delta));
    relationships[key] = after;
    changes.push({ aId, bId, delta: after - before, before, after, reason });
  }
  return { relationships, changes };
}

function advanceQuarter(studio) {
  const quarter = Number(studio?.quarter) || 1;
  return {
    ...studio,
    quarter: quarter === 4 ? 1 : quarter + 1,
    year: quarter === 4 ? (Number(studio?.year) || 1) + 1 : Number(studio?.year) || 1,
  };
}

function rejectScriptSlate(game, now = new Date().toISOString()) {
  const oldYear = Number(game?.studio?.year) || 1;
  const oldQuarter = Number(game?.studio?.quarter) || 1;
  const rejectedIds = Array.isArray(game?.scriptSlate?.ids) ? [...game.scriptSlate.ids] : [];
  return {
    ...game,
    studio: advanceQuarter(game.studio),
    current: null,
    scriptSlate: null,
    lastRejectedSlateIds: rejectedIds,
    history: [...(game.history || []), { type: 'SCRIPT_SLATE_REJECTED', scriptIds: rejectedIds, year: oldYear, quarter: oldQuarter, at: now }],
    meta: { ...(game.meta || {}), updatedAt: now },
  };
}

function finalizePremiere(game, film, now = new Date().toISOString()) {
  const advanced = advanceQuarter(game.studio);
  const relationshipResult = applyRelationshipChanges(game, film);
  const archivedFilm = { ...film, relationshipChanges: relationshipResult.changes };
  const studio = {
    ...advanced,
    cash: Number(game.studio.cash || 0) + Number(film.gross || 0) * 0.62,
    reputation: clamp(Number(game.studio.reputation || 0) + Math.round((Number(film.audience || 0) - 50) / 12)),
    trust: clamp(Number(game.studio.trust || 0) + Math.round((Number(film.audience || 0) - Number(film.critic || 0)) / 18)),
    prestige: clamp(Number(game.studio.prestige || 0) + Math.round((Number(film.critic || 0) - 55) / 15)),
  };
  return {
    ...game,
    studio,
    archive: [...(game.archive || []), archivedFilm],
    current: null,
    scriptSlate: null,
    lastRejectedSlateIds: [],
    relationships: relationshipResult.relationships,
    history: [...(game.history || []), { type: 'FILM_RELEASED', filmId: film.id, relationshipChanges: relationshipResult.changes, at: now }],
    meta: { ...(game.meta || {}), updatedAt: now },
  };
}

function ScriptDesk({game,setGame,setScreen,sound,setSound,setToast}){const slate=generateScriptSlate(game,SCRIPTS);const slateScripts=slate.ids.map(id=>SCRIPTS.find(s=>s.id===id)).filter(Boolean);const selected=game.current?.scriptId;const nextQuarter=advanceQuarter(game.studio);useEffect(()=>{if(game.scriptSlate?.year!==slate.year||game.scriptSlate?.quarter!==slate.quarter||JSON.stringify(game.scriptSlate?.ids)!==JSON.stringify(slate.ids))setGame(g=>({...g,scriptSlate:slate}))},[slate.year,slate.quarter,slate.ids.join('|')]);function choose(s){SFX.tap();setGame(g=>({...g,scriptSlate:slate,current:createProject(s,g)}))}function rejectAll(){if(!window.confirm(`Reject all three pitches and advance to Y${nextQuarter.year} · Q${nextQuarter.quarter}?`))return;setGame(rejectScriptSlate({...game,scriptSlate:slate}));SFX.tap();setToast?.(`Slate rejected. Welcome to Y${nextQuarter.year} · Q${nextQuarter.quarter}.`);setScreen('office')}return <div className="screen"><Topbar title="The Script Desk" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/><div className="section-head"><div><span className="slate-label">Y{game.studio.year} · Q{game.studio.quarter} screenplay market</span><h2>Three pitches. One production slot.</h2><p>Every quarter draws a fresh slate. Rejecting all three burns the quarter and the same slate will not return immediately.</p></div></div><div className="script-grid">{slateScripts.map(s=><div key={s.id} className={`paper-card clickable ${selected===s.id?'selected':''}`} onClick={()=>choose(s)}><RemoteImage asset={s.asset} className="script-photo" alt={`${s.title} atmosphere`} crop={s.asset.cardCrop}/><div className="paper-inner"><span className="genre">{s.genre} · {s.tone}</span><h3>{s.title}</h3><p>{s.premise}</p><div className="chips"><span className="chip">Budget {cash(s.base)}</span><span className="chip">Commercial {s.commercial}</span><span className="chip">Prestige {s.prestige}</span></div></div></div>)}</div><div className={`script-decision-bar ${selected?'':'single'}`}>{selected&&<button className="btn gold wide" onClick={()=>{SFX.good();setScreen('casting')}}><Icon name="people"/>Take It to Casting</button>}<button className="btn reject wide" onClick={rejectAll}>Reject All Three · Advance Quarter</button></div></div>}

function TalentCard({person,selected,onClick}){return <div className={`card talent-card clickable ${selected?'selected':''}`} onClick={onClick}><RemoteImage asset={person.asset} className="portrait" alt={person.name} crop={person.asset.cardCrop}/><div className="card-body"><div className="talent-meta"><div><span className="kicker">{person.role} · age {person.age}</span><h3>{person.name}</h3></div><span className="salary">{cash(person.salary)}</span></div><p>{person.flavor}</p><div className="bars">{Object.entries(person.skills).map(([k,v])=><div className="barrow" key={k}><span>{k}</span><div className="bar"><i style={{width:v+'%'}}/></div><b>{v}</b></div>)}</div><div className="chips">{person.traits.slice(0,3).map(t=><span className="chip gold" key={t}>{t}</span>)}</div></div></div>}
function MiniPick({label,person}){return <div className="pick"><div className="mini-face">{person?<RemoteImage asset={person.asset} alt={person.name} crop={person.asset.cardCrop}/>:<FallbackArt type="camera"/>}</div><div style={{minWidth:0}}><label>{label}</label><b>{person?.name||'Not selected'}</b></div></div>}
function Casting({game,setGame,setScreen,sound,setSound}){const [tab,setTab]=useState('lead'),c=game.current.cast;const script=SCRIPTS.find(s=>s.id===game.current.scriptId),lead=PEOPLE.find(x=>x.id===c.leadId),support=PEOPLE.find(x=>x.id===c.supportId),director=DIRECTORS.find(x=>x.id===c.directorId);const roster=tab==='director'?DIRECTORS:PEOPLE.filter(x=>tab!=='support'||x.id!==c.leadId);function select(id){SFX.tap();setGame(g=>({...g,current:{...g.current,cast:{...g.current.cast,[tab==='director'?'directorId':tab+'Id']:id}}}))}const ok=lead&&support&&director;const fit=ok?calculateCastingFit({lead,support,director,script,relationships:game.relationships}):null;return <div className="screen"><Topbar title="Casting Room" onBack={()=>setScreen('scripts')} sound={sound} setSound={setSound}/><div className="selection-strip"><MiniPick label="Lead" person={lead}/><MiniPick label="Co-lead" person={support}/><MiniPick label="Director" person={director}/></div>{fit&&<div className="chemistry-panel"><div className="chemistry-top"><div><span className="eyebrow">Casting forecast · {script.genre}</span><h3>{lead.name} + {support.name}</h3></div><div className="chemistry-score">{fit.overall}<small>overall fit</small></div></div><div className="chemistry-grid"><div className="chemistry-metric"><label>Screen chemistry</label><b>{fit.actorChemistry}</b></div><div className="chemistry-metric"><label>Genre fit</label><b>{fit.genreFit}</b></div><div className="chemistry-metric"><label>Director control</label><b>{fit.directorFit}</b></div></div><div className="chemistry-notes">{fit.notes.map(note=><span key={note}>• {note}</span>)}</div></div>}<div className="tabs"><button className={`tab ${tab==='lead'?'on':''}`} onClick={()=>setTab('lead')}>Lead Actor</button><button className={`tab ${tab==='support'?'on':''}`} onClick={()=>setTab('support')}>Co-lead</button><button className={`tab ${tab==='director'?'on':''}`} onClick={()=>setTab('director')}>Director</button></div><div className="grid">{roster.map(p=><TalentCard key={p.id} person={p} selected={(tab==='lead'?c.leadId:tab==='support'?c.supportId:c.directorId)===p.id} onClick={()=>select(p.id)}/>)}</div>{ok&&<div style={{position:'sticky',bottom:8,marginTop:15}}><button className="btn gold wide" onClick={()=>{SFX.good();setScreen('plan')}}><Icon name="money"/>Build the Production Plan</button></div>}</div>}

function ProductionPlan({game,setGame,setScreen,sound,setSound}){const script=SCRIPTS.find(s=>s.id===game.current.scriptId),levels=game.current.budget.levels,posture=game.current.posture;const depts=[['cast','Cast'],['sets','Sets & Costumes'],['stunts','Stunts'],['effects','Effects'],['post','Post-production']];const total=Math.round(script.base*(.2*BUDGET_LEVELS[levels.cast]+.2*BUDGET_LEVELS[levels.sets]+.18*BUDGET_LEVELS[levels.stunts]+.18*BUDGET_LEVELS[levels.effects]+.24*BUDGET_LEVELS[levels.post]));function setLevel(k,v){SFX.tap();setGame(g=>({...g,current:{...g.current,budget:{...g.current.budget,levels:{...g.current.budget.levels,[k]:v},approved:total}}}))}function begin(){setGame(g=>({...g,current:{...g.current,status:'SHOOTING',spend:total,sceneIndex:0,scenes:[]},studio:{...g.studio,cash:g.studio.cash-total}}));SFX.good();setScreen('production')}return <div className="screen"><Topbar title="Production Plan" onBack={()=>setScreen('casting')} sound={sound} setSound={setSound}/><div className="plan-grid"><div className="panel"><h3>Department Budget</h3><p>Spending helps, with diminishing returns. Reckless remains an adjective, not financial advice.</p>{depts.map(([k,label])=><div className="budget-row" key={k}><b>{label}</b><span>{BUDGET_NAMES[levels[k]]}</span><div className="tier-buttons">{BUDGET_NAMES.map((n,i)=><button key={n} className={`tier ${levels[k]===i?'on':''}`} onClick={()=>setLevel(k,i)}>{n}</button>)}</div></div>)}</div><div><div className="panel"><h3>Production Posture</h3><p>How much chaos are we inviting onto the set?</p><div className="postures">{POSTURES.map(p=><button key={p.id} className={`posture ${posture===p.id?'on':''}`} onClick={()=>{SFX.tap();setGame(g=>({...g,current:{...g.current,posture:p.id}}))}}><b>{p.name}</b><span>{p.desc}</span></button>)}</div></div><div className="panel" style={{marginTop:12}}><h3>Approval</h3><p>{script.title}</p><div className="stats" style={{gridTemplateColumns:'1fr 1fr'}}><div className="stat gold"><label>Projected Spend</label><b>{cash(total)}</b></div><div className={`stat ${total>game.studio.cash?'red':'green'}`}><label>Cash After</label><b>{cash(game.studio.cash-total)}</b></div></div><button className="btn gold wide" disabled={total>game.studio.cash} onClick={begin}><Icon name="camera"/>Begin Production</button></div></div></div></div>}

function Production({game,setGame,setScreen,sound,setSound,setToast}){const project=game.current,script=SCRIPTS.find(s=>s.id===project.scriptId),scene=script.scenes[project.sceneIndex],outcome=project.pendingOutcome;function choose(choiceIndex){if(outcome)return;const lead=PEOPLE.find(p=>p.id===project.cast.leadId),support=PEOPLE.find(p=>p.id===project.cast.supportId),director=DIRECTORS.find(p=>p.id===project.cast.directorId);const result=calculateSceneOutcome({project,script,scene,choiceIndex,lead,support,director,relationships:game.relationships,budgetLevels:BUDGET_LEVELS,postures:POSTURES});SFX[result.quality>=60?'good':result.quality<40?'bad':'tap']();setGame(g=>({...g,current:{...g.current,pendingOutcome:result}}))}
function next(){const result=project.pendingOutcome;const savedScene={name:scene.name,type:scene.type,...result,asset:script.asset.id};if(project.sceneIndex<script.scenes.length-1){setGame(g=>({...g,current:{...g.current,scenes:[...g.current.scenes,savedScene],sceneIndex:g.current.sceneIndex+1,pendingOutcome:null}}));SFX.tap()}else{setGame(g=>({...g,current:{...g.current,scenes:[...g.current.scenes,savedScene],status:'POST',pendingOutcome:null}}));SFX.good();setScreen('post')}}return <div className="screen soundstage"><Topbar title="Soundstage" sound={sound} setSound={setSound} right={<span className="chip gold">Scene {project.sceneIndex+1}/{script.scenes.length}</span>}/><div className="production-hero"><RemoteImage asset={script.asset} style={{position:'absolute',inset:0}} alt="Production scene" crop={script.asset.backdropCrop}/><div className="scene-title"><span className="eyebrow">{scene.type}</span><h2>{scene.name}</h2></div></div><div className="progress">{script.scenes.map((_,i)=><i key={i} className={i<project.sceneIndex?'done':i===project.sceneIndex?'now':''}/>)}</div><div className="event-box"><h3>Production Crisis</h3><p>{scene.event}</p><div className="choices">{scene.choices.map((c,i)=><button className="choice" disabled={!!outcome} key={c[0]} onClick={()=>choose(i)}><b>{c[0]}</b><span>{c[1]}</span><em>{i===0?'SAFE-ish':i===1?'HIGH VARIANCE':'CREATIVE ESCAPE'}</em></button>)}</div>{outcome&&<div className={`outcome ${outcome.quality>=60?'good':outcome.quality<40?'bad':''}`}><b>{outcome.band} · Scene quality {outcome.quality}</b><p>{outcome.text}</p></div>}{outcome&&<button className="btn gold wide" style={{marginTop:12}} onClick={next}>{project.sceneIndex<script.scenes.length-1?'Next Scene':'Wrap Production'} <Icon name="play" size={14}/></button>}</div><AssetCredit asset={script.asset}/></div>}

function Post({game,setGame,setScreen,sound,setSound}){const [choice,setChoice]=useState(null);const options=[['Tighten the edit','Raises coherence and trims the weakest scene.',5],['Add an enormous score','Raises spectacle. Subtlety leaves the building.',4],['Hide the worst take','Raises the lowest scene quality.',6],['Release the beautiful mess','No cost. Originality and risk rise.',2]];function proceed(){const bonus=options[choice][2];setGame(g=>({...g,current:{...g.current,status:'MARKETING',postChoice:options[choice][0],postBonus:bonus}}));SFX.good();setScreen('release')}return <div className="screen"><Topbar title="Editing Room" onBack={null} sound={sound} setSound={setSound}/><div className="hero"><RemoteImage asset={ASSETS.camera} className="hero-art" alt="Cinema camera" crop={ASSETS.camera.heroCrop}/><div className="hero-copy"><span className="eyebrow">The footage is technically all here</span><h2>Save it in post.</h2><p className="subcopy">You have enough time and money for one decisive intervention.</p></div></div><div className="choices">{options.map((o,i)=><button key={o[0]} className={`choice ${choice===i?'selected':''}`} style={choice===i?{borderColor:'var(--gold)',background:'rgba(229,185,77,.08)'}:{}} onClick={()=>{SFX.tap();setChoice(i)}}><b>{o[0]}</b><span>{o[1]}</span></button>)}</div>{choice!==null&&<button className="btn gold wide" style={{marginTop:12}} onClick={proceed}>Lock the Cut <Icon name="check" size={15}/></button>}<AssetCredit asset={ASSETS.camera}/></div>}

function Release({game,setGame,setScreen,sound,setSound}){const [campaign,setCampaign]=useState(null),[spend,setSpend]=useState(1);const campaigns=[['Sell the Star','Fame drives the opening weekend.'],['Sell the Spectacle','The trailer contains every explosion.'],['Mystery Teaser','Nobody knows what the film is, including the cast.']];const amounts=[10000,25000,50000];function release(){const p=game.current,script=SCRIPTS.find(s=>s.id===p.scriptId),lead=PEOPLE.find(x=>x.id===p.cast.leadId),support=PEOPLE.find(x=>x.id===p.cast.supportId),director=DIRECTORS.find(x=>x.id===p.cast.directorId);const result=calculateRelease({project:p,script,lead,support,director,relationships:game.relationships,campaignIndex:campaign,spendIndex:spend,marketingAmounts:amounts,studio:game.studio});const film={id:p.projectId,title:script.title,genre:script.genre,tagline:script.tagline,assetId:script.asset.id,critic:result.critic,audience:result.audience,gross:result.gross,profit:result.profit,review:result.review,scores:result.scores,cast:p.cast,scenes:p.scenes,year:game.studio.year,quarter:game.studio.quarter};setGame(g=>({...g,current:{...g.current,status:'PREMIERE',release:film,marketing:result.marketing},studio:{...g.studio,cash:g.studio.cash-result.marketing}}));SFX.premiere();setScreen('premiere')}return <div className="screen"><Topbar title="Release Office" sound={sound} setSound={setSound}/><div className="panel"><h3>Campaign Angle</h3><p>How aggressively are we going to describe what happened?</p><div className="choices">{campaigns.map((c,i)=><button key={c[0]} className="choice" style={campaign===i?{borderColor:'var(--gold)',background:'rgba(229,185,77,.08)'}:{}} onClick={()=>{SFX.tap();setCampaign(i)}}><b>{c[0]}</b><span>{c[1]}</span></button>)}</div></div><div className="panel" style={{marginTop:12}}><h3>Marketing Spend</h3><p>Cash left: {cash(game.studio.cash)}</p><div className="tier-buttons">{amounts.map((a,i)=><button key={a} className={`tier ${spend===i?'on':''}`} onClick={()=>setSpend(i)}>{cash(a)}</button>)}</div></div>{campaign!==null&&<button className="btn gold wide" style={{marginTop:12}} disabled={amounts[spend]>game.studio.cash} onClick={release}><Icon name="star"/>Book the Premiere</button>}</div>}

function Premiere({game,setGame,setScreen}){const film=game.current.release,script=SCRIPTS.find(s=>s.id===game.current.scriptId);const [beat,setBeat]=useState(0);const beats=useMemo(()=>[
 {small:`${game.studio.name.toUpperCase()} PRESENTS`,big:film.title,line:film.tagline},
 ...film.scenes.map((s,i)=>({small:`SCENE ${i+1}`,big:s.name,line:s.quality>=70?'THIS WAS NOT IN THE INSURANCE FORM.':s.quality<40?'THE EDITOR HAS REQUESTED AN ALIAS.':s.choice.toUpperCase()})),
 {small:'CRITICS HAVE SPOKEN',big:`${film.critic}%`,line:film.review},
 {small:'AUDIENCES HAVE SPOKEN LOUDER',big:`${film.audience}%`,line:`Opening soon. Regrets already available.`}
],[]);useEffect(()=>{const t=setInterval(()=>setBeat(b=>{if(b>=beats.length-1){clearInterval(t);return b}return b+1}),1800);return()=>clearInterval(t)},[]);function finish(){setGame(g=>finalizePremiere(g,film));setScreen('results')}const b=beats[beat];return <div className="premiere film-bars"><RemoteImage asset={script.asset} className="premiere-bg" alt="Film trailer backdrop" crop={script.asset.backdropCrop}/><button className="btn ghost small trailer-skip" onClick={finish}>Skip / Results</button><div className="trailer-copy" key={beat}><div className="present">{b.small}</div><h1>{b.big}</h1><p>{b.line}</p>{beat===beats.length-1&&<button className="btn gold" onClick={finish}>See the Numbers</button>}</div></div>}

function Results({game,setScreen,sound,setSound}){const film=game.archive[game.archive.length-1],asset=SCRIPTS.find(s=>s.title===film.title)?.asset||ASSETS.heroSet;const peopleById=Object.fromEntries([...PEOPLE,...DIRECTORS].map(p=>[p.id,p]));return <div className="screen"><Topbar title="Premiere Night" sound={sound} setSound={setSound}/><div className="result-hero"><div className="result-poster"><RemoteImage asset={asset} style={{position:'absolute',inset:0}} crop={asset.posterCrop}/><div className="poster-copy"><small>{film.genre.toUpperCase()}</small><h2>{film.title}</h2><p>{film.tagline}</p></div></div><div className="scores"><div className="score"><b>{film.critic}%</b><span>Critics</span></div><div className="score"><b>{film.audience}%</b><span>Audience</span></div><div className="score"><b style={{color:film.profit>=0?'#8ed5a9':'#ef837a'}}>{film.profit>=0?'+':''}{cash(film.profit)}</b><span>Profit</span></div></div><div className="review">“{film.review}”</div>{film.relationshipChanges?.length>0&&<div className="panel relationship-summary"><h3>What the production did to the cast</h3>{film.relationshipChanges.map((change,i)=><div className="relationship-change" key={`${change.aId}-${change.bId}-${i}`}><span>{peopleById[change.aId]?.name||change.aId} ↔ {peopleById[change.bId]?.name||change.bId}</span><b className={change.delta>0?'good':'bad'}>{change.delta>0?'+':''}{change.delta}</b></div>)}</div>}<button className="btn gold wide" style={{marginTop:14}} onClick={()=>setScreen('office')}>Back to the Studio</button></div></div>}

function Roster({game,setScreen,sound,setSound}){const relationshipCount=Object.values(game.relationships||{}).filter(v=>Math.abs(Number(v))>=10).length;return <div className="screen"><Topbar title="Talent Roster" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/><div className="section-head"><div><h2>The people making this possible</h2><p>“Possible” remains under review. {relationshipCount?`${relationshipCount} meaningful relationship${relationshipCount===1?'':'s'} now persist across productions.`:'No lasting alliances or feuds yet.'}</p></div></div><div className="grid">{[...PEOPLE,...DIRECTORS].map(p=><TalentCard key={p.id} person={p}/>)}</div></div>}
function Archive({game,setGame,setScreen,sound,setSound}){function readScripts(){setGame(g=>prepareScriptSlate({...g,current:null},SCRIPTS));setScreen('scripts')}return <div className="screen"><Topbar title="Movie Archive" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/>{!game.archive.length?<div className="panel" style={{textAlign:'center',padding:30}}><Icon name="archive" size={46}/><h3 style={{marginTop:12}}>No films. No scandals. No legacy.</h3><p>Start a production and make history or at least content.</p><button className="btn gold" onClick={readScripts}>Read Scripts</button></div>:<div className="archive-grid">{game.archive.map(f=>{const asset=SCRIPTS.find(s=>s.title===f.title)?.asset||ASSETS.heroSet;return <div className="archive-poster" key={f.id}><RemoteImage asset={asset} style={{position:'absolute',inset:0}} crop={asset.posterCrop}/><div className="copy"><small>Y{f.year} · Q{f.quarter} · {f.genre}</small><h3>{f.title}</h3><p>{f.audience}% audience · {f.profit>=0?'+':''}{cash(f.profit)}</p></div></div>})}</div>}</div>}

function NewStudioModal({onClose,onCreate}){const [name,setName]=useState('Hammy Pictures');return <div className="modal-bg"><div className="modal"><h2>Name Your Studio</h2><p>Future award speeches, lawsuits and unnecessary sequels will use this name.</p><div className="field"><label>Studio name</label><input value={name} maxLength={28} onChange={e=>setName(e.target.value)}/></div><div style={{display:'flex',gap:8,marginTop:14}}><button className="btn ghost" onClick={onClose}>Cancel</button><button className="btn gold" style={{flex:1}} disabled={!name.trim()} onClick={()=>onCreate(name.trim())}>Open the Gates</button></div></div></div>}

function gameReducer(state,action){
 if(action.type==='REPLACE')return migrateSave(action.state)||state;
 if(action.type==='UPDATE'){const next=typeof action.updater==='function'?action.updater(state):action.updater;return next||state}
 return state;
}
function App(){
 const initial=loadSave();
 const [game,dispatch]=useReducer(gameReducer,initial||freshStudio());
 const [hasSave,setHasSave]=useState(!!initial);
 const [screen,setScreen]=useState('title');
 const [newModal,setNewModal]=useState(false);
 const [toast,setToast]=useState(null);
 const setGame=updater=>dispatch({type:'UPDATE',updater});
 const replaceGame=state=>dispatch({type:'REPLACE',state});
 const sound=game.settings?.sound??game.sound!==false;
 function setSound(v){SFX.on=v;setGame(g=>({...g,sound:v,settings:{...(g.settings||{}),sound:v}}))}
 useEffect(()=>{SFX.on=sound;if(screen!=='title'){persist(game);setHasSave(true)}},[game,screen]);
 function showToast(t){setToast(t);setTimeout(()=>setToast(null),2200)}
 function create(name){const ng=freshStudio(name);replaceGame(ng);setNewModal(false);setScreen('office');persist(ng);setHasSave(true);SFX.good()}
 function newFilm(){setGame(g=>prepareScriptSlate({...g,current:null},SCRIPTS));setScreen('scripts');SFX.tap()}

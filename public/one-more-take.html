function RemoteImage({asset,className='',style={},alt='',imgStyle={},crop,scale,filter}){
  const sources=asset?(asset.urls||(asset.url?[asset.url]:[])):[];
  const [index,setIndex]=useState(0);
  useEffect(()=>setIndex(0),[asset?.id]);
  const src=index<sources.length?sources[index]:null;
  return <div className={`remote-wrap ${className}`} style={style}>
    <div className="fallback" aria-hidden="true"><FallbackArt type={asset?.fallback}/></div>
    {src&&<img key={src} src={src} alt={alt} referrerPolicy="no-referrer" loading="lazy" decoding="async" onError={()=>setIndex(i=>Math.min(i+1,sources.length))} style={{objectFit:'cover',objectPosition:crop||asset?.crop||'50% 50%',transform:(scale??asset?.scale)?`scale(${scale??asset?.scale})`:undefined,filter:filter??asset?.filter,...imgStyle}}/>}
  </div>
}

function clamp(n, a = 0, b = 100) {
  return Math.max(a, Math.min(b, Number(n) || 0));

function hashSeed(str) {
  let h = 2166136261;
  const input = String(str ?? '');
  for (let i = 0; i < input.length; i += 1) {
    h ^= input.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function seeded(seed, n = 0) {
  let x = ((Number(seed) || 0) + n * 2654435761) >>> 0;
  x ^= x << 13;
  x ^= x >>> 17;
  x ^= x << 5;
  return (x >>> 0) / 4294967295;
}

function normalizeTalentCareers(value) {
  if (!value || typeof value !== 'object') return {};
  const result = {};
  for (const [id, record] of Object.entries(value)) {
    result[id] = {
      fameDelta: Number(record?.fameDelta) || 0,
      films: Array.isArray(record?.films) ? [...new Set(record.films.map(String))] : [],
      awards: Array.isArray(record?.awards) ? record.awards : [],
      nominations: Array.isArray(record?.nominations) ? record.nominations : [],
    };
  }
  return result;
}

function normalizeAwards(value) {
  return Array.isArray(value) ? value.filter((item) => item && Number(item.year) >= 1).map((item) => ({
    ...item,
    year: Math.floor(Number(item.year)),
    categories: Array.isArray(item.categories) ? item.categories : [],
    prestigeGain: Number(item.prestigeGain) || 0,
  })) : [];
}

const AWARD_CATEGORIES = [
  { id: 'BEST_PICTURE', name: 'Best Picture', kind: 'film', prestige: 5 },
  { id: 'BEST_DIRECTOR', name: 'Best Director', kind: 'person', prestige: 3 },
  { id: 'BEST_PERFORMANCE', name: 'Best Performance', kind: 'person', prestige: 3 },
  { id: 'BEST_STUNT', name: 'Best Stunt', kind: 'film', prestige: 1 },
  { id: 'BEST_EFFECTS', name: 'Best Effects', kind: 'film', prestige: 1 },
  { id: 'BIGGEST_FLOP', name: 'Biggest Flop', kind: 'film', prestige: 0, satire: true },
  { id: 'QUESTIONABLE_DECISION', name: 'Most Questionable Creative Decision', kind: 'film', prestige: 0, satire: true },
];

function rankAwardCandidates(candidates, seed, categoryId, limit = 3) {
  return candidates.map((candidate) => ({
    ...candidate,
    score: Number(candidate.score) || 0,
    tie: seeded(seed, hashSeed(`${categoryId}|${candidate.filmId || ''}|${candidate.personId || ''}`) % 100000),
  })).sort((a, b) => b.score - a.score || b.tie - a.tie).slice(0, limit).map(({ tie, ...candidate }) => candidate);
}

function generateAwards(game, year, now = new Date().toISOString()) {
  const eligibleFilms = (game?.archive || []).map(normalizeFilm).filter(Boolean).filter((film) => film.year === Number(year));
  const seed = hashSeed(`${game?.rngSeed || 0}|awards|${year}|${eligibleFilms.map((film) => film.id).sort().join('|')}`);
  const categoryResults = [];
  const add = (definition, candidates) => {
    const nominees = rankAwardCandidates(candidates, seed, definition.id, 3);
    categoryResults.push({ ...definition, nominees, winner: nominees[0] || null });
  };
  const filmCandidate = (film, score) => ({ filmId: film.id, score: Math.round(score * 100) / 100 });
  add(AWARD_CATEGORIES[0], eligibleFilms.map((film) => filmCandidate(film, film.critic * .34 + film.audience * .24 + film.scores.direction * .15 + film.scores.performance * .15 + film.scores.originality * .12)));
  add(AWARD_CATEGORIES[1], eligibleFilms.filter((film) => film.cast.directorId).map((film) => ({ filmId: film.id, personId: film.cast.directorId, role: 'Director', score: film.scores.direction * .65 + film.critic * .22 + film.scores.coherence * .13 })));
  const performances = [];
  for (const film of eligibleFilms) {
    if (film.cast.leadId) performances.push({ filmId: film.id, personId: film.cast.leadId, role: 'Lead', score: film.scores.performance * .64 + film.audience * .14 + film.scores.chemistry * .12 + film.critic * .10 + 1 });
    if (film.cast.supportId) performances.push({ filmId: film.id, personId: film.cast.supportId, role: 'Co-lead', score: film.scores.performance * .61 + film.audience * .13 + film.scores.chemistry * .16 + film.critic * .10 });
  }
  add(AWARD_CATEGORIES[2], performances);
  add(AWARD_CATEGORIES[3], eligibleFilms.map((film) => {
    const stuntScenes = film.scenes.filter((scene) => /stunt|chase|action|disaster|finale/i.test(`${scene.type || ''} ${scene.name || ''}`));
    const bestScene = stuntScenes.length ? Math.max(...stuntScenes.map((scene) => Number(scene.quality) || 0)) : film.scores.average;
    return filmCandidate(film, film.scores.spectacle * .68 + bestScene * .32);
  }));
  add(AWARD_CATEGORIES[4], eligibleFilms.map((film) => filmCandidate(film, film.scores.craft * .45 + film.scores.spectacle * .35 + Number(film.production.departmentLevels?.effects || 0) * 5)));
  add(AWARD_CATEGORIES[5], eligibleFilms.map((film) => filmCandidate(film, (-film.profit / 1000) + (100 - film.audience) * .22)));
  add(AWARD_CATEGORIES[6], eligibleFilms.map((film) => {
    const qualities = film.scenes.map((scene) => Number(scene.quality) || 0);
    const spread = qualities.length ? Math.max(...qualities) - Math.min(...qualities) : 0;
    return filmCandidate(film, (100 - film.scores.coherence) * .55 + film.scores.originality * .25 + spread * .20);
  }));
  const prestigeGain = categoryResults.reduce((sum, category) => sum + (category.winner ? Number(category.prestige || 0) : 0), 0);
  return {
    id: `awards-y${year}-${seed.toString(36)}`,
    year: Number(year),
    createdAt: now,
    eligibleFilmIds: eligibleFilms.map((film) => film.id),
    categories: categoryResults,
    prestigeGain,
  };
}

function updateCareer(careers, personId, updater) {
  if (!personId) return careers;
  const current = careers[personId] || { fameDelta: 0, films: [], awards: [], nominations: [] };
  careers[personId] = updater({ ...current, films: [...current.films], awards: [...current.awards], nominations: [...current.nominations] });
  return careers;
}

function recordFilmCareers(talentCareers, film) {
  const careers = normalizeTalentCareers(talentCareers);
  const ids = [film?.cast?.leadId, film?.cast?.supportId, film?.cast?.directorId].filter(Boolean);
  for (const id of ids) updateCareer(careers, id, (record) => {
    if (!record.films.includes(film.id)) record.films.push(film.id);
    const isDirector = id === film.cast.directorId;
    const delta = Math.max(-2, Math.min(4, Math.round(((isDirector ? film.critic : film.audience) - 52) / 18)));
    record.fameDelta += delta;
    return record;
  });
  return careers;
}

function applyAwards(game, ceremony) {
  if (!ceremony || (game?.awards || []).some((item) => Number(item.year) === Number(ceremony.year))) return game;
  const careers = normalizeTalentCareers(game?.talentCareers);
  const filmAwards = {};
  for (const category of ceremony.categories || []) {
    for (const nominee of category.nominees || []) {
      if (nominee.personId) updateCareer(careers, nominee.personId, (record) => {
        record.nominations.push({ year: ceremony.year, categoryId: category.id, filmId: nominee.filmId });
        return record;
      });
    }
    const winner = category.winner;
    if (!winner) continue;
    filmAwards[winner.filmId] = [...(filmAwards[winner.filmId] || []), { year: ceremony.year, categoryId: category.id, name: category.name }];
    const fameAwards = [];
    if (category.id === 'BEST_PICTURE') {
      const film = (game.archive || []).find((item) => item.id === winner.filmId);
      fameAwards.push([film?.cast?.leadId, 3], [film?.cast?.supportId, 3], [film?.cast?.directorId, 4]);
    } else if (category.id === 'BEST_DIRECTOR') fameAwards.push([winner.personId, 7]);
    else if (category.id === 'BEST_PERFORMANCE') fameAwards.push([winner.personId, 8]);
    else if (category.id === 'BEST_STUNT') {
      const film = (game.archive || []).find((item) => item.id === winner.filmId);
      fameAwards.push([film?.cast?.leadId, 2], [film?.cast?.supportId, 2], [film?.cast?.directorId, 1]);
    } else if (category.id === 'BEST_EFFECTS') {
      const film = (game.archive || []).find((item) => item.id === winner.filmId);
      fameAwards.push([film?.cast?.directorId, 2]);
    }
    for (const [personId, delta] of fameAwards) if (personId) updateCareer(careers, personId, (record) => {
      record.fameDelta += delta;
      record.awards.push({ year: ceremony.year, categoryId: category.id, filmId: winner.filmId });
      return record;
    });
  }
  return {
    ...game,
    studio: { ...game.studio, prestige: clamp(Number(game.studio?.prestige || 0) + Number(ceremony.prestigeGain || 0)) },
    archive: (game.archive || []).map((film) => ({ ...normalizeFilm(film), awards: [...(film.awards || []), ...(filmAwards[film.id] || [])] })),
    awards: [...(game.awards || []), ceremony],
    pendingAwardsYear: ceremony.year,
    talentCareers: careers,
    history: [...(game.history || []), { type: 'AWARDS_COMPLETED', year: ceremony.year, ceremonyId: ceremony.id, at: ceremony.createdAt }],
  };
}

function ensureYearEndAwards(game, year, now = new Date().toISOString()) {
  if ((game?.awards || []).some((item) => Number(item.year) === Number(year))) return game;
  return applyAwards(game, generateAwards(game, year, now));
}

function acknowledgeAwards(game) {
  return { ...game, pendingAwardsYear: null };
}

function getEffectiveFame(game, person) {
  return clamp(Number(person?.fame || 0) + Number(game?.talentCareers?.[person?.id]?.fameDelta || 0));
}

      relationships: raw.relationships && typeof raw.relationships === 'object' ? raw.relationships : {},
      awards: normalizeAwards(raw.awards),
      pendingAwardsYear: raw.pendingAwardsYear == null ? null : Number(raw.pendingAwardsYear),
      talentCareers: normalizeTalentCareers(raw.talentCareers),
      rngSeed: Number(raw.rngSeed) >>> 0 || hashSeed(`${raw.studio?.name || 'studio'}|${raw.createdAt || now}`),
      settings: { sound: raw.settings?.sound ?? raw.sound ?? true },
      sound: raw.settings?.sound ?? raw.sound ?? true,
    };
  }
  if (raw.saveVersion === 1 && raw.studio) {
    return {
      saveVersion: SAVE_VERSION,
      build: BUILD_ID,
      meta: { createdAt: raw.createdAt || now, updatedAt: now, migratedFrom: 1 },
      studio: ensureStudio(raw.studio),
      archive: Array.isArray(raw.archive) ? raw.archive.map(normalizeFilm).filter(Boolean) : [],
      current: normalizeProject(raw.current),

      scriptSlate: null,
      lastRejectedSlateIds: [],
      relationships: {},
      awards: [],
      pendingAwardsYear: null,
      talentCareers: {},
      rngSeed: hashSeed(`${raw.studio.name}|${raw.createdAt || now}`),
      settings: { sound: raw.sound !== false },
      sound: raw.sound !== false,
    };
  }
  return null;
}

function validateSave(raw) {
  const errors = [];
  if (!raw || typeof raw !== 'object') errors.push('Save must be an object');
  if (raw?.saveVersion !== SAVE_VERSION) errors.push(`Expected saveVersion ${SAVE_VERSION}`);
  if (!raw?.studio || typeof raw.studio !== 'object') errors.push('Missing studio');
  if (!raw?.studio?.name || typeof raw.studio.name !== 'string') errors.push('Missing studio name');
  if (!Number.isFinite(Number(raw?.studio?.cash))) errors.push('Invalid studio cash');
  if (!Number.isFinite(Number(raw?.studio?.debt))) errors.push('Invalid studio debt');
  if (!Array.isArray(raw?.studio?.upgrades)) errors.push('Studio upgrades must be an array');
  if (!Array.isArray(raw?.archive)) errors.push('Archive must be an array');
  if (!Array.isArray(raw?.history)) errors.push('History must be an array');
  if (raw?.scriptSlate && !Array.isArray(raw.scriptSlate.ids)) errors.push('Script slate ids must be an array');
  if (!raw?.relationships || typeof raw.relationships !== 'object') errors.push('Relationships must be an object');
  if (!Array.isArray(raw?.awards)) errors.push('Awards must be an array');
  if (!raw?.talentCareers || typeof raw.talentCareers !== 'object') errors.push('Talent careers must be an object');
  if (raw?.current && !raw.current.projectId) errors.push('Current project missing projectId');
  return { valid: errors.length === 0, errors };
}

function getTierConfig(studio) {
  return STUDIO_TIERS.find((tier)=>tier.id===Number(studio?.tier||1)) || STUDIO_TIERS[0];
}

function calculateFacilityBonuses(studio) {
  const owned=new Set(Array.isArray(studio?.upgrades)?studio.upgrades:[]);
  return {
    sceneQuality:(owned.has('soundstage-b')?3:0)+(owned.has('effects-yard')?1:0),
    chemistry:owned.has('talent-lounge')?5:0,
    post:owned.has('post-suite')?6:0,
    spectacle:owned.has('effects-yard')?7:0,
    marketing:owned.has('marketing-wing')?4:0,
    grossMultiplier:owned.has('marketing-wing')?1.08:1,
    overheadMultiplier:owned.has('accounting-office')?.8:1,
  };
}

function getMarketTrend(game) {
  const year=Number(game?.studio?.year)||1;
  const quarter=Number(game?.studio?.quarter)||1;
  const seed=Number(game?.rngSeed)||hashSeed(game?.studio?.name||'studio');
  const index=Math.floor(seeded(seed,year*101+quarter*29)*MARKET_TRENDS.length)%MARKET_TRENDS.length;
  return MARKET_TRENDS[index];
}

function calculateQuarterlyCosts(studio) {
  const tier=getTierConfig(studio);
  const facilities=calculateFacilityBonuses(studio);
  const overhead=Math.round(Number(tier.overhead||0)*facilities.overheadMultiplier);
  const interest=Math.round(Math.max(0,Number(studio?.debt)||0)*.025);
  return {overhead,interest,total:overhead+interest,tier:tier.id,tierName:tier.name};
}

function settleQuarterEconomy(studio) {
  const costs=calculateQuarterlyCosts(studio);
  const cashAfter=Number(studio?.cash||0)-costs.total;
  const previousStrikes=Math.max(0,Number(studio?.insolvencyStrikes)||0);
  const insolvencyStrikes=cashAfter<0?previousStrikes+1:Math.max(0,previousStrikes-1);
  const status=cashAfter<-150000||insolvencyStrikes>=3?'INSOLVENT':cashAfter<0?'DISTRESSED':'ACTIVE';
  return {
    studio:{...advanceQuarter(studio),cash:cashAfter,insolvencyStrikes,status,lastQuarterlyCosts:{...costs,year:Number(studio?.year)||1,quarter:Number(studio?.quarter)||1}},
    costs,
  };
}

function getPromotionStatus(game) {
  const current=getTierConfig(game?.studio);
  const next=STUDIO_TIERS.find((tier)=>tier.id===current.id+1);
  if(!next)return {maxed:true,eligible:false,current,next:null,reasons:['Maximum studio tier reached.']};
  const reasons=[];
  if(Number(game?.studio?.reputation||0)<next.minReputation)reasons.push(`Reputation ${next.minReputation} required`);
  if(Number(game?.studio?.prestige||0)<next.minPrestige)reasons.push(`Prestige ${next.minPrestige} required`);
  if(Number(game?.studio?.cash||0)<next.promotionCost)reasons.push(`${next.promotionCost.toLocaleString()} cash required`);
  return {maxed:false,eligible:reasons.length===0,current,next,reasons};
}

function promoteStudio(game, now=new Date().toISOString()) {
  const check=getPromotionStatus(game);
  if(!check.eligible||!check.next)return game;
  return {...game,studio:{...game.studio,tier:check.next.id,cash:Number(game.studio.cash)-check.next.promotionCost,status:'ACTIVE'},history:[...(game.history||[]),{type:'STUDIO_PROMOTED',tier:check.next.id,cost:check.next.promotionCost,at:now}],meta:{...(game.meta||{}),updatedAt:now}};
}

function purchaseStudioUpgrade(game, upgradeId, now=new Date().toISOString()) {
  const upgrade=STUDIO_UPGRADES.find((item)=>item.id===upgradeId);
  if(!upgrade)return game;
  const owned=new Set(game?.studio?.upgrades||[]);
  if(owned.has(upgrade.id)||Number(game?.studio?.tier||1)<upgrade.tier||Number(game?.studio?.cash||0)<upgrade.cost)return game;
  return {...game,studio:{...game.studio,cash:Number(game.studio.cash)-upgrade.cost,upgrades:[...owned,upgrade.id]},history:[...(game.history||[]),{type:'STUDIO_UPGRADE_PURCHASED',upgradeId:upgrade.id,cost:upgrade.cost,at:now}],meta:{...(game.meta||{}),updatedAt:now}};
}

function takeStudioLoan(game, principal, now=new Date().toISOString()) {
  const amount=Number(principal)||0;
  const owed=amount===100000?115000:amount===250000?300000:0;
  if(!owed||Number(game?.studio?.debt||0)+owed>700000)return game;
  return {...game,studio:{...game.studio,cash:Number(game.studio.cash||0)+amount,debt:Number(game.studio.debt||0)+owed,trust:clamp(Number(game.studio.trust||0)-(amount===250000?3:1)),status:Number(game.studio.cash||0)+amount>=0?'ACTIVE':game.studio.status},history:[...(game.history||[]),{type:'STUDIO_LOAN_TAKEN',principal:amount,owed,at:now}],meta:{...(game.meta||{}),updatedAt:now}};
}

function repayStudioDebt(game, amount, now=new Date().toISOString()) {
  const payment=Math.min(Math.max(0,Number(amount)||0),Math.max(0,Number(game?.studio?.debt)||0),Math.max(0,Number(game?.studio?.cash)||0));
  if(payment<=0)return game;
  const debt=Math.max(0,Number(game.studio.debt)-payment);
  return {...game,studio:{...game.studio,cash:Number(game.studio.cash)-payment,debt,trust:clamp(Number(game.studio.trust||0)+(payment>=100000?2:1))},history:[...(game.history||[]),{type:'STUDIO_DEBT_REPAID',payment,at:now}],meta:{...(game.meta||{}),updatedAt:now}};
}

function takeRescueFinancing(game, now=new Date().toISOString()) {
  const year=Number(game?.studio?.year)||1;
  if(Number(game?.studio?.cash||0)>=75000||Number(game?.studio?.lastRescueYear)===year)return game;
  return {...game,studio:{...game.studio,cash:Number(game.studio.cash||0)+125000,debt:Number(game.studio.debt||0)+165000,reputation:clamp(Number(game.studio.reputation||0)-6),trust:clamp(Number(game.studio.trust||0)-8),prestige:clamp(Number(game.studio.prestige||0)-4),rescues:Number(game.studio.rescues||0)+1,lastRescueYear:year,status:'ACTIVE',insolvencyStrikes:0},history:[...(game.history||[]),{type:'HUMILIATING_RESCUE',year,at:now}],meta:{...(game.meta||{}),updatedAt:now}};
}

function generateContractOffers(game, count=3) {
  const year=Number(game?.studio?.year)||1;
  const quarter=Number(game?.studio?.quarter)||1;
  const seed=Number(game?.rngSeed)||hashSeed(game?.studio?.name||'studio');
  return [...CONTRACT_JOBS].sort((a,b)=>seeded(seed,year*313+quarter*47+hashSeed(a.id))-seeded(seed,year*313+quarter*47+hashSeed(b.id))).slice(0,count);
}

function completeContractJob(game, jobId, now=new Date().toISOString()) {
  const job=generateContractOffers(game).find((item)=>item.id===jobId);
  if(!job)return game;
  const oldYear=Number(game?.studio?.year)||1;
  const oldQuarter=Number(game?.studio?.quarter)||1;
  const paidStudio={...game.studio,cash:Number(game.studio.cash||0)+job.reward,reputation:clamp(Number(game.studio.reputation||0)+job.reputation),trust:clamp(Number(game.studio.trust||0)+job.trust),prestige:clamp(Number(game.studio.prestige||0)+job.prestige)};
  const settlement=settleQuarterEconomy(paidStudio);
  let next={...game,studio:settlement.studio,current:null,scriptSlate:null,lastRejectedSlateIds:[],history:[...(game.history||[]),{type:'CONTRACT_COMPLETED',jobId:job.id,reward:job.reward,year:oldYear,quarter:oldQuarter,at:now},{type:'QUARTERLY_COSTS',reason:'CONTRACT',...settlement.costs,year:oldYear,quarter:oldQuarter,at:now}],meta:{...(game.meta||{}),updatedAt:now}};
  if(oldQuarter===4)next=ensureYearEndAwards(next,oldYear,now);
  return next;
}

function relationshipKey(aId, bId) {
  if (!aId || !bId || aId === bId) return null;
  return [String(aId), String(bId)].sort().join('|');
}

function getRelationshipScore(relationships, aId, bId) {
  const key = relationshipKey(aId, bId);
  return key ? Number(relationships?.[key] || 0) : 0;
}

function generateScriptSlate(game, scripts = [], count = 3) {
  const year = Number(game?.studio?.year) || 1;
  const quarter = Number(game?.studio?.quarter) || 1;
  const current = game?.scriptSlate;
  const validIds = new Set(scripts.map((s) => s.id));
  if (current?.year === year && current?.quarter === quarter && Array.isArray(current.ids) && current.ids.length === count && current.ids.every((id) => validIds.has(id))) return current;
  const excluded = new Set(Array.isArray(game?.lastRejectedSlateIds) ? game.lastRejectedSlateIds : []);
  let pool = scripts.filter((script) => !excluded.has(script.id));
  if (pool.length < count) pool = [...scripts];
  pool = [...pool].sort((a, b) => a.id.localeCompare(b.id));
  const seed = hashSeed(`${game?.rngSeed || 0}|slate|${year}|${quarter}|${(game?.history || []).length}`);
  for (let i = pool.length - 1; i > 0; i -= 1) {
    const j = Math.floor(seeded(seed, i * 13 + 7) * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return { year, quarter, seed, ids: pool.slice(0, count).map((script) => script.id) };
}

function prepareScriptSlate(game, scripts = [], count = 3) {
  const slate = generateScriptSlate(game, scripts, count);
  return game?.scriptSlate === slate ? game : { ...game, current: null, scriptSlate: slate };
}

function calculateChemistry(a, b, context = {}) {
  if (!a || !b || a.id === b.id) return 0;
  let score = 50;
  const traitsA = new Set(a.traits || []);
  const traitsB = new Set(b.traits || []);
  if (traitsA.has('Chemistry Magnet') || traitsB.has('Chemistry Magnet')) score += 12;
  if (traitsA.has('Quiet Professional') || traitsB.has('Quiet Professional')) score += 4;
  if (traitsA.has('Improviser') && traitsB.has('Improviser')) score += 6;
  if (traitsA.has('Hates Sequels') && context.sequelNumber > 0) score -= 8;
  score += Math.max(-18, Math.min(18, Number(context.relationshipScore || 0) * 0.22));
  const reliabilityA = Number(a.skills?.Reliability ?? a.skills?.Control ?? 50);
  const reliabilityB = Number(b.skills?.Reliability ?? b.skills?.Control ?? 50);
  score -= Math.min(10, Math.abs(reliabilityA - reliabilityB) / 8);
  const stableNoise = seeded(hashSeed([a.id, b.id].sort().join('|')), 3) * 12 - 6;
  return Math.round(clamp(score + stableNoise + Number(context.facilityBonus||0)));
}

function calculateSceneOutcome({ project, script, scene, choiceIndex, lead, support, director, relationships = {}, budgetLevels = [0.65, 0.85, 1, 1.25, 1.55], postures = [] }) {
  if (!project || !script || !scene || !lead || !support || !director) {
    throw new Error('calculateSceneOutcome received incomplete context');
  }
  const posture = postures.find((p) => p.id === project.posture) || { variance: 10, bonus: 0 };
  const relevant = (Number(lead.skills?.Acting || 0) + Number(support.skills?.Acting || 0) + Number(director.skills?.Vision || 0)) / 3;
  const chemistry = calculateChemistry(lead, support, { genre: script.genre, relationshipScore: getRelationshipScore(relationships, lead.id, support.id) });
  const levels = Object.values(project.budget?.levels || { cast: 2, sets: 2, stunts: 2, effects: 2, post: 2 });
  const budgetAverage = levels.reduce((sum, level) => sum + Number(level || 0), 0) / Math.max(1, levels.length);
  const choiceProfiles = [
    { label: 'SAFE', bonus: 1, variance: 0.55 },
    { label: 'RISK', bonus: 3, variance: 1.25 },
    { label: 'CREATIVE', bonus: 2, variance: 0.9 },
  ];
  const profile = choiceProfiles[choiceIndex] || choiceProfiles[0];
  const roll = (seeded(project.seed, project.sceneIndex * 17 + choiceIndex * 5 + 1) * 2 - 1) * posture.variance * profile.variance;
  const quality = Math.round(clamp(
    36
      + relevant * 0.34
      + (chemistry - 50) * 0.12
      + budgetAverage * 4
      + Number(posture.bonus || 0)
      + profile.bonus
      + Number(project?.facilityBonuses?.sceneQuality||0)
      + roll
      - Number(script.difficulty || 50) * 0.16,
  ));
  const band = quality >= 90 ? 'ICONIC' : quality >= 75 ? 'EXCEPTIONAL' : quality >= 60 ? 'STRONG' : quality >= 42 ? 'USABLE' : quality >= 24 ? 'ROUGH' : 'CATASTROPHIC';
  const textPools = quality >= 60
    ? ['The crew briefly remembers why they entered the industry.', 'The take lands. Even the boom operator looks emotional.', 'Somehow, this is cinema.']
    : quality < 40
      ? ['The set falls silent in the specific way that means money has died.', 'Nobody says “cut” because nobody wishes to accept responsibility.', 'The footage exists. That is the kindest available description.']
      : ['It will cut together. Probably. With music.', 'Competent enough to survive the edit.', 'Nobody celebrates, but nobody calls legal.'];
  const text = textPools[Math.floor(seeded(project.seed, 700 + project.sceneIndex * 11 + choiceIndex) * textPools.length)];
  return {
    choice: scene.choices?.[choiceIndex]?.[0] || `Choice ${choiceIndex + 1}`,
    quality,
    band,
    text,
    modifiers: {
      relevantSkill: Math.round(relevant),
      chemistry,
      budgetAverage: Number(budgetAverage.toFixed(2)),
      posture: project.posture,
      choiceProfile: profile.label,
      roll: Number(roll.toFixed(2)),
    },
  };
}

function calculateFilmScores(project, script, cast = {}, relationships = {}) {
  const scenes = Array.isArray(project?.scenes) ? project.scenes : [];
  const average = scenes.length ? scenes.reduce((sum, s) => sum + Number(s.quality || 0), 0) / scenes.length : 0;
  const spread = scenes.length ? Math.max(...scenes.map((s) => s.quality)) - Math.min(...scenes.map((s) => s.quality)) : 0;
  const lead = cast.lead;
  const support = cast.support;
  const director = cast.director;
  const facility=project?.facilityBonuses||{};
  const chemistry = calculateChemistry(lead, support, { genre: script?.genre, relationshipScore: getRelationshipScore(relationships, lead?.id, support?.id),facilityBonus:Number(facility.chemistry||0) });
  return {
    average: Math.round(average),
    performance: Math.round(clamp(average * 0.55 + (lead?.skills?.Acting || 50) * 0.25 + (support?.skills?.Acting || 50) * 0.12 + chemistry * 0.08)),
    direction: Math.round(clamp(average * 0.6 + (director?.skills?.Vision || 50) * 0.25 + (director?.skills?.Control || 50) * 0.15)),
    craft: Math.round(clamp(average + Number(project?.postBonus || 0) + Number(facility.post||0) - spread * 0.08)),
    spectacle: Math.round(clamp(average * 0.7 + (project?.budget?.levels?.stunts || 0) * 4 + (project?.budget?.levels?.effects || 0) * 4 + Number(facility.spectacle||0))),
    coherence: Math.round(clamp(average + Number(project?.postBonus || 0) + Number(facility.post||0) - spread * 0.35)),
    originality: Math.round(clamp(average * 0.72 + Number(script?.prestige || 0) * 0.2 + (project?.posture === 'cook' ? 8 : project?.posture === 'full' ? 5 : 0))),
    chemistry,
  };
}

function calculateRelease({ project, script, lead, support, director, relationships = {}, campaignIndex = 0, spendIndex = 1, marketingAmounts = [10000, 25000, 50000], studio, marketTrend = null }) {
  const scores = calculateFilmScores(project, script, { lead, support, director }, relationships);
  const marketing = Number(marketingAmounts[spendIndex] || marketingAmounts[0] || 0);
  const facilities=calculateFacilityBonuses(studio);
  const trendHit=marketTrend?.genre===script?.genre;
  const campaignCriticBonus = campaignIndex === 2 ? 4 : 0;
  const campaignAudienceBonus = campaignIndex === 1 ? 4 : campaignIndex === 0 ? 2 : 0;
  const critic = Math.round(clamp(scores.performance * 0.25 + scores.direction * 0.25 + scores.coherence * 0.3 + scores.originality * 0.2 + campaignCriticBonus + (seeded(project.seed, 200) * 10 - 5)));
  const audience = Math.round(clamp(scores.average * 0.35 + scores.spectacle * 0.22 + scores.chemistry * 0.12 + Number(script.commercial || 0) * 0.2 + Number(lead?.fame || 0) * 0.11 + campaignAudienceBonus + Number(facilities.marketing||0) + (trendHit?Number(marketTrend.audienceBonus||0):0) + (seeded(project.seed, 201) * 12 - 6)));
  const gross = Math.round((45000 + Number(script.commercial || 0) * 1400 + audience * 2100 + Number(lead?.fame || 0) * 600 + Number(studio?.reputation || 0) * 450) * (1 + spendIndex * 0.28) * (campaignIndex === 0 ? 1.06 : 1) * Number(facilities.grossMultiplier||1) * (trendHit?Number(marketTrend.grossMultiplier||1):1));
  const productionSpend = Number(project.spend || 0);
  const profit = Math.round(gross * 0.62 - productionSpend - marketing);
  const review = critic >= 80
    ? 'A baffling, beautiful catastrophe that somehow becomes cinema.'
    : critic >= 65
      ? 'Uneven, energetic and saved by one genuinely terrific sequence.'
      : critic >= 45
        ? 'The footage exists. Several performances do too.'
        : 'An expensive hostage situation involving a camera.';
  return { critic, audience, gross, profit, marketing, scores, review, trendHit, trendLabel:trendHit?marketTrend?.label:null };
}

function calculateCastingFit({ lead, support, director, script, relationships = {}, studio = null }) {
  if (!lead || !support || !director || !script) return null;
  const priorLeadSupport = getRelationshipScore(relationships, lead.id, support.id);
  const priorLeadDirector = getRelationshipScore(relationships, lead.id, director.id);
  const priorSupportDirector = getRelationshipScore(relationships, support.id, director.id);
  const facilities=calculateFacilityBonuses(studio);
  const actorChemistry = calculateChemistry(lead, support, { genre: script.genre, relationshipScore: priorLeadSupport,facilityBonus:Number(facilities.chemistry||0) });
  const directorLead = calculateChemistry(lead, director, { genre: script.genre, relationshipScore: priorLeadDirector });
  const directorSupport = calculateChemistry(support, director, { genre: script.genre, relationshipScore: priorSupportDirector });
  const genreFit = Math.round((Number(lead.skills?.Genre || 50) + Number(support.skills?.Genre || 50)) / 2);
  const directorFit = Math.round((Number(director.skills?.Actors || 50) * 0.6) + (Number(director.skills?.Control || 50) * 0.4));
  const overall = Math.round(clamp(actorChemistry * 0.42 + genreFit * 0.28 + directorFit * 0.2 + ((directorLead + directorSupport) / 2) * 0.1));
  const notes = [];
  notes.push(actorChemistry >= 72 ? `${lead.name} and ${support.name} have immediate screen electricity.` : actorChemistry >= 55 ? `${lead.name} and ${support.name} should work comfortably together.` : `${lead.name} and ${support.name} may need careful direction.`);
  notes.push(genreFit >= 72 ? `Both actors fit ${script.genre} naturally.` : genreFit >= 55 ? `The genre fit is workable, not automatic.` : `The cast is playing against type.`);
  notes.push(directorFit >= 72 ? `${director.name} should keep the production under control.` : directorFit >= 55 ? `${director.name} can manage this cast with some friction.` : `${director.name} may struggle to contain the room.`);
  if (priorLeadSupport >= 25) notes.push(`They already trust each other from earlier work.`);
  if (priorLeadSupport <= -25) notes.push(`A previous feud is still in the room.`);
  if(Number(facilities.chemistry||0)>0)notes.push(`The Talent Lounge adds a small chemistry buffer.`);
  return { overall, actorChemistry, genreFit, directorFit, priorLeadSupport, notes };
}

function applyRelationshipChanges(game, film) {
  const relationships = { ...(game?.relationships || {}) };
  const changes = [];
  const average = Number(film?.scores?.average || 0);
  const chemistry = Number(film?.scores?.chemistry || 50);
  const direction = Number(film?.scores?.direction || 50);
  const qualityDelta = Math.round((average - 50) / 14);
  const pairs = [
    [film?.cast?.leadId, film?.cast?.supportId, Math.round((chemistry - 50) / 10) + qualityDelta, 'co-stars'],
    [film?.cast?.leadId, film?.cast?.directorId, Math.round((direction - 50) / 14) + qualityDelta, 'actor/director'],
    [film?.cast?.supportId, film?.cast?.directorId, Math.round((direction - 50) / 16) + qualityDelta, 'actor/director'],
  ];
  for (const [aId, bId, rawDelta, reason] of pairs) {
    const key = relationshipKey(aId, bId);
    if (!key) continue;
    let delta = Math.max(-8, Math.min(8, rawDelta));
    if (delta === 0) delta = average >= 58 ? 1 : average <= 42 ? -1 : 0;
    if (!delta) continue;
    const before = Number(relationships[key] || 0);
    const after = Math.max(-100, Math.min(100, before + delta));
    relationships[key] = after;
    changes.push({ aId, bId, delta: after - before, before, after, reason });
  }
  return { relationships, changes };
}

function advanceQuarter(studio) {
  const quarter = Number(studio?.quarter) || 1;
  return {
    ...studio,
    quarter: quarter === 4 ? 1 : quarter + 1,
    year: quarter === 4 ? (Number(studio?.year) || 1) + 1 : Number(studio?.year) || 1,
  };
}

function rejectScriptSlate(game, now = new Date().toISOString()) {
  const oldYear = Number(game?.studio?.year) || 1;
  const oldQuarter = Number(game?.studio?.quarter) || 1;
  const rejectedIds = Array.isArray(game?.scriptSlate?.ids) ? [...game.scriptSlate.ids] : [];
  const settlement=settleQuarterEconomy(game.studio);
  let next = {
    ...game,
    studio: settlement.studio,
    current: null,
    scriptSlate: null,
    lastRejectedSlateIds: rejectedIds,
    history: [...(game.history || []), { type: 'SCRIPT_SLATE_REJECTED', scriptIds: rejectedIds, year: oldYear, quarter: oldQuarter, at: now },{type:'QUARTERLY_COSTS',reason:'REJECTED_SLATE',...settlement.costs,year:oldYear,quarter:oldQuarter,at:now}],
    meta: { ...(game.meta || {}), updatedAt: now },
  };
  if (oldQuarter === 4) next = ensureYearEndAwards(next, oldYear, now);
  return next;
}

function finalizePremiere(game, film, now = new Date().toISOString()) {
  const oldYear = Number(game?.studio?.year) || 1;
  const oldQuarter = Number(game?.studio?.quarter) || 1;
  const relationshipResult = applyRelationshipChanges(game, film);
  const preSettlementStudio = {
    ...game.studio,
    cash: Number(game.studio.cash || 0) + Number(film.gross || 0) * 0.62,
    reputation: clamp(Number(game.studio.reputation || 0) + Math.round((Number(film.audience || 0) - 50) / 12)),
    trust: clamp(Number(game.studio.trust || 0) + Math.round((Number(film.audience || 0) - Number(film.critic || 0)) / 18)),
    prestige: clamp(Number(game.studio.prestige || 0) + Math.round((Number(film.critic || 0) - 55) / 15)),
  };
  const settlement=settleQuarterEconomy(preSettlementStudio);
  const archivedFilm = normalizeFilm({ ...film, relationshipChanges: relationshipResult.changes,production:{...(film.production||{}),quarterlyCosts:settlement.costs} });
  const studio = settlement.studio;
  let next = {
    ...game,
    studio,
    archive: [...(game.archive || []).map(normalizeFilm).filter(Boolean), archivedFilm],
    current: null,
    scriptSlate: null,

function MiniPick({label,person}){return <div className="pick"><div className="mini-face">{person?<RemoteImage asset={person.asset} alt={person.name} crop={person.asset.cardCrop}/>:<FallbackArt type="camera"/>}</div><div style={{minWidth:0}}><label>{label}</label><b>{person?.name||'Not selected'}</b></div></div>}
function Casting({game,setGame,setScreen,sound,setSound}){const [tab,setTab]=useState('lead'),c=game.current.cast;const script=SCRIPTS.find(s=>s.id===game.current.scriptId),lead=findPerson(game,c.leadId),support=findPerson(game,c.supportId),director=findPerson(game,c.directorId);const roster=(tab==='director'?DIRECTORS:PEOPLE.filter(x=>tab!=='support'||x.id!==c.leadId)).map(person=>personForGame(game,person));function select(id){SFX.tap();setGame(g=>({...g,current:{...g.current,cast:{...g.current.cast,[tab==='director'?'directorId':tab+'Id']:id}}}))}const ok=lead&&support&&director;const fit=ok?calculateCastingFit({lead,support,director,script,relationships:game.relationships,studio:game.studio}):null;return <div className="screen"><Topbar title="Casting Room" onBack={()=>setScreen('scripts')} sound={sound} setSound={setSound}/><div className="selection-strip"><MiniPick label="Lead" person={lead}/><MiniPick label="Co-lead" person={support}/><MiniPick label="Director" person={director}/></div>{fit&&<div className="chemistry-panel"><div className="chemistry-top"><div><span className="eyebrow">Casting forecast · {script.genre}</span><h3>{lead.name} + {support.name}</h3></div><div className="chemistry-score">{fit.overall}<small>overall fit</small></div></div><div className="chemistry-grid"><div className="chemistry-metric"><label>Screen chemistry</label><b>{fit.actorChemistry}</b></div><div className="chemistry-metric"><label>Genre fit</label><b>{fit.genreFit}</b></div><div className="chemistry-metric"><label>Director control</label><b>{fit.directorFit}</b></div></div><div className="chemistry-notes">{fit.notes.map(note=><span key={note}>• {note}</span>)}</div></div>}<div className="tabs"><button className={`tab ${tab==='lead'?'on':''}`} onClick={()=>setTab('lead')}>Lead Actor</button><button className={`tab ${tab==='support'?'on':''}`} onClick={()=>setTab('support')}>Co-lead</button><button className={`tab ${tab==='director'?'on':''}`} onClick={()=>setTab('director')}>Director</button></div><div className="grid">{roster.map(p=><TalentCard key={p.id} person={p} selected={(tab==='lead'?c.leadId:tab==='support'?c.supportId:c.directorId)===p.id} onClick={()=>select(p.id)}/>)}</div>{ok&&<div style={{position:'sticky',bottom:8,marginTop:15}}><button className="btn gold wide" onClick={()=>{SFX.good();setScreen('plan')}}><Icon name="money"/>Build the Production Plan</button></div>}</div>}

function ProductionPlan({game,setGame,setScreen,sound,setSound}){const script=SCRIPTS.find(s=>s.id===game.current.scriptId),levels=game.current.budget.levels,posture=game.current.posture;const depts=[['cast','Cast'],['sets','Sets & Costumes'],['stunts','Stunts'],['effects','Effects'],['post','Post-production']];const total=Math.round(script.base*(.2*BUDGET_LEVELS[levels.cast]+.2*BUDGET_LEVELS[levels.sets]+.18*BUDGET_LEVELS[levels.stunts]+.18*BUDGET_LEVELS[levels.effects]+.24*BUDGET_LEVELS[levels.post]));function setLevel(k,v){SFX.tap();setGame(g=>({...g,current:{...g.current,budget:{...g.current.budget,levels:{...g.current.budget.levels,[k]:v},approved:total}}}))}function begin(){setGame(g=>({...g,current:{...g.current,status:'SHOOTING',spend:total,sceneIndex:0,scenes:[],facilityBonuses:calculateFacilityBonuses(g.studio)},studio:{...g.studio,cash:g.studio.cash-total}}));SFX.good();setScreen('production')}return <div className="screen"><Topbar title="Production Plan" onBack={()=>setScreen('casting')} sound={sound} setSound={setSound}/><div className="plan-grid"><div className="panel"><h3>Department Budget</h3><p>Spending helps, with diminishing returns. Reckless remains an adjective, not financial advice.</p>{depts.map(([k,label])=><div className="budget-row" key={k}><b>{label}</b><span>{BUDGET_NAMES[levels[k]]}</span><div className="tier-buttons">{BUDGET_NAMES.map((n,i)=><button key={n} className={`tier ${levels[k]===i?'on':''}`} onClick={()=>setLevel(k,i)}>{n}</button>)}</div></div>)}</div><div><div className="panel"><h3>Production Posture</h3><p>How much chaos are we inviting onto the set?</p><div className="postures">{POSTURES.map(p=><button key={p.id} className={`posture ${posture===p.id?'on':''}`} onClick={()=>{SFX.tap();setGame(g=>({...g,current:{...g.current,posture:p.id}}))}}><b>{p.name}</b><span>{p.desc}</span></button>)}</div></div><div className="panel" style={{marginTop:12}}><h3>Approval</h3><p>{script.title}</p><div className="chips" style={{marginBottom:10}}>{Object.entries(calculateFacilityBonuses(game.studio)).filter(([key,value])=>key!=='grossMultiplier'&&key!=='overheadMultiplier'&&Number(value)>0).map(([key,value])=><span className="chip green" key={key}>{key} +{value}</span>)}</div><div className="stats" style={{gridTemplateColumns:'1fr 1fr'}}><div className="stat gold"><label>Projected Spend</label><b>{cash(total)}</b></div><div className={`stat ${total>game.studio.cash?'red':'green'}`}><label>Cash After</label><b>{cash(game.studio.cash-total)}</b></div></div><button className="btn gold wide" disabled={total>game.studio.cash} onClick={begin}><Icon name="camera"/>Begin Production</button></div></div></div></div>}

function Production({game,setGame,setScreen,sound,setSound,setToast}){const project=game.current,script=SCRIPTS.find(s=>s.id===project.scriptId),scene=script.scenes[project.sceneIndex],outcome=project.pendingOutcome;function choose(choiceIndex){if(outcome)return;const lead=findPerson(game,project.cast.leadId),support=findPerson(game,project.cast.supportId),director=findPerson(game,project.cast.directorId);const result=calculateSceneOutcome({project,script,scene,choiceIndex,lead,support,director,relationships:game.relationships,budgetLevels:BUDGET_LEVELS,postures:POSTURES});SFX[result.quality>=60?'good':result.quality<40?'bad':'tap']();setGame(g=>({...g,current:{...g.current,pendingOutcome:result}}))}
function next(){const result=project.pendingOutcome;const savedScene={name:scene.name,type:scene.type,...result,asset:script.asset.id};if(project.sceneIndex<script.scenes.length-1){setGame(g=>({...g,current:{...g.current,scenes:[...g.current.scenes,savedScene],sceneIndex:g.current.sceneIndex+1,pendingOutcome:null}}));SFX.tap()}else{setGame(g=>({...g,current:{...g.current,scenes:[...g.current.scenes,savedScene],status:'POST',pendingOutcome:null}}));SFX.good();setScreen('post')}}return <div className="screen soundstage"><Topbar title="Soundstage" sound={sound} setSound={setSound} right={<span className="chip gold">Scene {project.sceneIndex+1}/{script.scenes.length}</span>}/><div className="production-hero"><RemoteImage asset={script.asset} style={{position:'absolute',inset:0}} alt="Production scene" crop={script.asset.backdropCrop}/><div className="scene-title"><span className="eyebrow">{scene.type}</span><h2>{scene.name}</h2></div></div><div className="progress">{script.scenes.map((_,i)=><i key={i} className={i<project.sceneIndex?'done':i===project.sceneIndex?'now':''}/>)}</div><div className="event-box"><h3>Production Crisis</h3><p>{scene.event}</p><div className="choices">{scene.choices.map((c,i)=><button className="choice" disabled={!!outcome} key={c[0]} onClick={()=>choose(i)}><b>{c[0]}</b><span>{c[1]}</span><em>{i===0?'SAFE-ish':i===1?'HIGH VARIANCE':'CREATIVE ESCAPE'}</em></button>)}</div>{outcome&&<div className={`outcome ${outcome.quality>=60?'good':outcome.quality<40?'bad':''}`}><b>{outcome.band} · Scene quality {outcome.quality}</b><p>{outcome.text}</p></div>}{outcome&&<button className="btn gold wide" style={{marginTop:12}} onClick={next}>{project.sceneIndex<script.scenes.length-1?'Next Scene':'Wrap Production'} <Icon name="play" size={14}/></button>}</div><AssetCredit asset={script.asset}/></div>}

function Post({game,setGame,setScreen,sound,setSound}){const [choice,setChoice]=useState(null);const options=[['Tighten the edit','Raises coherence and trims the weakest scene.',5],['Add an enormous score','Raises spectacle. Subtlety leaves the building.',4],['Hide the worst take','Raises the lowest scene quality.',6],['Release the beautiful mess','No cost. Originality and risk rise.',2]];function proceed(){const bonus=options[choice][2];setGame(g=>({...g,current:{...g.current,status:'MARKETING',postChoice:options[choice][0],postBonus:bonus}}));SFX.good();setScreen('release')}return <div className="screen"><Topbar title="Editing Room" onBack={null} sound={sound} setSound={setSound}/><div className="hero"><RemoteImage asset={ASSETS.camera} className="hero-art" alt="Cinema camera" crop={ASSETS.camera.heroCrop}/><div className="hero-copy"><span className="eyebrow">The footage is technically all here</span><h2>Save it in post.</h2><p className="subcopy">You have enough time and money for one decisive intervention.</p></div></div><div className="choices">{options.map((o,i)=><button key={o[0]} className={`choice ${choice===i?'selected':''}`} style={choice===i?{borderColor:'var(--gold)',background:'rgba(229,185,77,.08)'}:{}} onClick={()=>{SFX.tap();setChoice(i)}}><b>{o[0]}</b><span>{o[1]}</span></button>)}</div>{choice!==null&&<button className="btn gold wide" style={{marginTop:12}} onClick={proceed}>Lock the Cut <Icon name="check" size={15}/></button>}<AssetCredit asset={ASSETS.camera}/></div>}

function Release({game,setGame,setScreen,sound,setSound}){const [campaign,setCampaign]=useState(null),[spend,setSpend]=useState(1);const campaigns=[['Sell the Star','Fame drives the opening weekend.'],['Sell the Spectacle','The trailer contains every explosion.'],['Mystery Teaser','Nobody knows what the film is, including the cast.']];const amounts=[10000,25000,50000];function release(){const p=game.current,script=SCRIPTS.find(s=>s.id===p.scriptId),lead=findPerson(game,p.cast.leadId),support=findPerson(game,p.cast.supportId),director=findPerson(game,p.cast.directorId);const result=calculateRelease({project:p,script,lead,support,director,relationships:game.relationships,campaignIndex:campaign,spendIndex:spend,marketingAmounts:amounts,studio:game.studio,marketTrend:getMarketTrend(game)});const film={id:p.projectId,title:script.title,genre:script.genre,tagline:script.tagline,assetId:script.asset.id,critic:result.critic,audience:result.audience,gross:result.gross,profit:result.profit,review:result.review,scores:result.scores,cast:p.cast,scenes:p.scenes,incidents:[...(p.incidents||[]),...p.scenes.filter(scene=>scene.quality>=80||scene.quality<40).map(scene=>({scene:scene.name,type:scene.quality>=80?'BREAKTHROUGH':'DISASTER',text:scene.text,quality:scene.quality}))],production:{approvedBudget:p.budget?.approved||script.base,departmentLevels:{...(p.budget?.levels||{})},posture:p.posture,spend:p.spend,marketing:result.marketing,campaign:campaigns[campaign]?.[0]||'',postChoice:p.postChoice||'',marketTrend:result.trendLabel||'',studioTier:game.studio.tier||1,upgrades:[...(game.studio.upgrades||[])]},year:game.studio.year,quarter:game.studio.quarter};setGame(g=>({...g,current:{...g.current,status:'PREMIERE',release:film,marketing:result.marketing},studio:{...g.studio,cash:g.studio.cash-result.marketing}}));SFX.premiere();setScreen('premiere')}return <div className="screen"><Topbar title="Release Office" sound={sound} setSound={setSound}/><div className="ribbon"><Icon name="bolt" size={16}/><span><strong>{getMarketTrend(game).label}:</strong> {getMarketTrend(game).genre} releases receive a market bonus this quarter.</span></div><div className="panel"><h3>Campaign Angle</h3><p>How aggressively are we going to describe what happened?</p><div className="choices">{campaigns.map((c,i)=><button key={c[0]} className="choice" style={campaign===i?{borderColor:'var(--gold)',background:'rgba(229,185,77,.08)'}:{}} onClick={()=>{SFX.tap();setCampaign(i)}}><b>{c[0]}</b><span>{c[1]}</span></button>)}</div></div><div className="panel" style={{marginTop:12}}><h3>Marketing Spend</h3><p>Cash left: {cash(game.studio.cash)}</p><div className="tier-buttons">{amounts.map((a,i)=><button key={a} className={`tier ${spend===i?'on':''}`} onClick={()=>setSpend(i)}>{cash(a)}</button>)}</div></div>{campaign!==null&&<button className="btn gold wide" style={{marginTop:12}} disabled={amounts[spend]>game.studio.cash} onClick={release}><Icon name="star"/>Book the Premiere</button>}</div>}

function Premiere({game,setGame,setScreen}){const film=game.current.release,script=SCRIPTS.find(s=>s.id===game.current.scriptId);const [beat,setBeat]=useState(0);const beats=useMemo(()=>[
 {small:`${game.studio.name.toUpperCase()} PRESENTS`,big:film.title,line:film.tagline},
 ...film.scenes.map((s,i)=>({small:`SCENE ${i+1}`,big:s.name,line:s.quality>=70?'THIS WAS NOT IN THE INSURANCE FORM.':s.quality<40?'THE EDITOR HAS REQUESTED AN ALIAS.':s.choice.toUpperCase()})),
 {small:'CRITICS HAVE SPOKEN',big:`${film.critic}%`,line:film.review},
 {small:'AUDIENCES HAVE SPOKEN LOUDER',big:`${film.audience}%`,line:`Opening soon. Regrets already available.`}
],[]);useEffect(()=>{const t=setInterval(()=>setBeat(b=>{if(b>=beats.length-1){clearInterval(t);return b}return b+1}),1800);return()=>clearInterval(t)},[]);function finish(){setGame(g=>finalizePremiere(g,film));setScreen('results')}const b=beats[beat];return <div className="premiere film-bars"><RemoteImage asset={script.asset} className="premiere-bg" alt="Film trailer backdrop" crop={script.asset.backdropCrop}/><button className="btn ghost small trailer-skip" onClick={finish}>Skip / Results</button><div className="trailer-copy" key={beat}><div className="present">{b.small}</div><h1>{b.big}</h1><p>{b.line}</p>{beat===beats.length-1&&<button className="btn gold" onClick={finish}>See the Numbers</button>}</div></div>}

function Results({game,setScreen,sound,setSound}){const film=game.archive[game.archive.length-1],asset=SCRIPTS.find(s=>s.title===film.title)?.asset||ASSETS.heroSet;const peopleById=Object.fromEntries([...PEOPLE,...DIRECTORS].map(p=>[p.id,p]));return <div className="screen"><Topbar title="Premiere Night" sound={sound} setSound={setSound}/><div className="result-hero"><div className="result-poster"><RemoteImage asset={asset} style={{position:'absolute',inset:0}} crop={asset.posterCrop}/><div className="poster-copy"><small>{film.genre.toUpperCase()}</small><h2>{film.title}</h2><p>{film.tagline}</p></div></div><div className="scores"><div className="score"><b>{film.critic}%</b><span>Critics</span></div><div className="score"><b>{film.audience}%</b><span>Audience</span></div><div className="score"><b style={{color:film.profit>=0?'#8ed5a9':'#ef837a'}}>{film.profit>=0?'+':''}{cash(film.profit)}</b><span>Profit</span></div></div><div className="review">“{film.review}”</div>{film.production?.quarterlyCosts&&<div className="panel" style={{marginTop:12,textAlign:'left'}}><h3>Quarter Closed</h3><div className="money-line"><span>Studio overhead</span><b>-{cash(film.production.quarterlyCosts.overhead)}</b></div><div className="money-line"><span>Debt interest</span><b>-{cash(film.production.quarterlyCosts.interest)}</b></div></div>}{film.relationshipChanges?.length>0&&<div className="panel relationship-summary"><h3>What the production did to the cast</h3>{film.relationshipChanges.map((change,i)=><div className="relationship-change" key={`${change.aId}-${change.bId}-${i}`}><span>{peopleById[change.aId]?.name||change.aId} ↔ {peopleById[change.bId]?.name||change.bId}</span><b className={change.delta>0?'good':'bad'}>{change.delta>0?'+':''}{change.delta}</b></div>)}</div>}<button className="btn gold wide" style={{marginTop:14}} onClick={()=>setScreen(game.pendingAwardsYear?'awards':'office')}>{game.pendingAwardsYear?`Attend the Year ${game.pendingAwardsYear} Awards`:'Back to the Studio'}</button></div></div>}

function Awards({game,setGame,setScreen,sound,setSound}){const year=game.pendingAwardsYear??game.awards?.[game.awards.length-1]?.year;const ceremony=game.awards?.find(item=>Number(item.year)===Number(year));const films=Object.fromEntries((game.archive||[]).map(film=>[film.id,film]));const people=Object.fromEntries([...PEOPLE,...DIRECTORS].map(person=>[person.id,person]));function label(candidate){if(!candidate)return 'No eligible winner';const film=films[candidate.filmId];return candidate.personId?`${people[candidate.personId]?.name||candidate.personId}`:(film?.title||candidate.filmId)}function filmLabel(candidate){if(!candidate)return '';const film=films[candidate.filmId];return candidate.personId?(film?.title||'Unknown film'):''}function leave(){setGame(g=>acknowledgeAwards(g));setScreen('office');SFX.good()}return <div className="screen"><Topbar title={`Year ${year||''} Awards`} sound={sound} setSound={setSound}/><div className="awards-hero"><RemoteImage asset={ASSETS.blueCamera} alt="Awards night cinema" crop="50% 50%"/><div className="awards-copy"><span className="eyebrow">The Golden Backlot Awards</span><h1>Year {year}</h1><p>{ceremony?.eligibleFilmIds?.length?`${ceremony.eligibleFilmIds.length} eligible release${ceremony.eligibleFilmIds.length===1?'':'s'}. The envelopes are sealed and several acceptance speeches are already too long.`:'The studio released nothing eligible this year. The catering still arrived.'}</p><div className="awards-summary"><span className="chip gold">Prestige +{ceremony?.prestigeGain||0}</span><span className="chip">{ceremony?.categories?.filter(category=>category.winner).length||0} awards decided</span></div></div></div>{!ceremony?<div className="panel award-empty">No ceremony is available.</div>:<div className="awards-grid">{ceremony.categories.map(category=><div className={`award-card ${category.satire?'satire':''}`} key={category.id}><div className="award-category">{category.name}</div><div className="award-winner">{label(category.winner)}</div>{filmLabel(category.winner)&&<div className="award-film">{filmLabel(category.winner)}</div>}<div className="award-score">{category.winner?`Winning score ${Math.round(category.winner.score)}`:'No eligible nominees'}</div>{category.nominees?.length>0&&<div className="award-nominees">{category.nominees.map((nominee,index)=><div className="award-nominee" key={`${category.id}-${nominee.filmId}-${nominee.personId||index}`}><span>{index+1}. {label(nominee)}{filmLabel(nominee)?` · ${filmLabel(nominee)}`:''}</span><b>{Math.round(nominee.score)}</b></div>)}</div>}</div>)}</div>}<button className="btn gold wide" style={{marginTop:14}} onClick={leave}><Icon name="trophy"/>Return to the Studio</button></div>}

function FilmDetail({game,filmId,onBack,sound,setSound}){const film=normalizeFilm((game.archive||[]).find(item=>item.id===filmId));if(!film)return <div className="screen"><Topbar title="Film Archive" onBack={onBack} sound={sound} setSound={setSound}/><div className="panel">Film record unavailable.</div></div>;const script=SCRIPTS.find(item=>item.id===film.assetId||item.title===film.title);const asset=script?.asset||ASSETS.heroSet;const people=Object.fromEntries([...PEOPLE,...DIRECTORS].map(person=>[person.id,person]));const production=film.production||{};return <div className="screen"><Topbar title="Film Record" onBack={onBack} sound={sound} setSound={setSound}/><div className="archive-detail-hero"><div className="detail-poster"><RemoteImage asset={asset} style={{position:'absolute',inset:0}} crop={asset.posterCrop}/><div className="poster-copy"><small>{film.genre.toUpperCase()}</small><h2>{film.title}</h2><p>{film.tagline}</p></div></div><div className="detail-copy"><span className="eyebrow">Released Y{film.year} · Q{film.quarter}</span><h1>{film.title}</h1><p>“{film.review}”</p><div className="detail-stats"><div className="detail-stat"><label>Critics</label><b>{film.critic}%</b></div><div className="detail-stat"><label>Audience</label><b>{film.audience}%</b></div><div className="detail-stat"><label>Gross</label><b>{cash(film.gross)}</b></div><div className="detail-stat"><label>Profit</label><b style={{color:film.profit>=0?'#8ed5a9':'#ef837a'}}>{film.profit>=0?'+':''}{cash(film.profit)}</b></div></div>{film.awards?.length>0&&<div>{film.awards.map(award=><span className="award-chip" key={`${award.year}-${award.categoryId}`}><Icon name="trophy" size={13}/>{award.name}</span>)}</div>}</div></div><div className="detail-section"><h3>Cast & Director</h3><div className="people-lines"><div className="person-line"><label>Lead</label><b>{people[film.cast.leadId]?.name||'Unknown'}</b></div><div className="person-line"><label>Co-lead</label><b>{people[film.cast.supportId]?.name||'Unknown'}</b></div><div className="person-line"><label>Director</label><b>{people[film.cast.directorId]?.name||'Unknown'}</b></div></div></div><div className="detail-section"><h3>Production Ledger</h3><div className="people-lines"><div className="person-line"><label>Approved budget</label><b>{cash(production.approvedBudget)}</b></div><div className="person-line"><label>Production spend</label><b>{cash(production.spend)}</b></div><div className="person-line"><label>Marketing</label><b>{cash(production.marketing)}</b></div><div className="person-line"><label>Posture</label><b>{String(production.posture||'balanced').replace(/^./,c=>c.toUpperCase())}</b></div><div className="person-line"><label>Campaign</label><b>{production.campaign||'Not recorded'}</b></div><div className="person-line"><label>Post decision</label><b>{production.postChoice||'Not recorded'}</b></div><div className="person-line"><label>Market trend</label><b>{production.marketTrend||'No trend bonus'}</b></div><div className="person-line"><label>Studio tier</label><b>{production.studioTier||1}</b></div><div className="person-line"><label>Owned upgrades</label><b>{production.upgrades?.length||0}</b></div></div></div><div className="detail-section"><h3>Scene Ledger</h3><div className="scene-ledger">{film.scenes.length?film.scenes.map((scene,index)=><div className="scene-row" key={`${scene.name}-${index}`}><div><b>{index+1}. {scene.name}</b><span>{scene.type} · {scene.choice||'Decision unavailable'} — {scene.text||''}</span></div><div className="scene-quality">{scene.quality}</div></div>):<p className="subcopy">No scene data was recorded for this legacy release.</p>}</div></div><div className="detail-section"><h3>Production Incidents</h3>{film.incidents.length?<div className="history-list">{film.incidents.map((incident,index)=><div className="history-item" key={index}><b>{incident.type||'INCIDENT'}:</b> {incident.scene?`${incident.scene} — `:''}{incident.text||String(incident)}</div>)}</div>:<p className="subcopy">Nothing made the insurance report. Suspiciously clean.</p>}</div>{film.relationshipChanges?.length>0&&<div className="detail-section"><h3>Relationship Fallout</h3>{film.relationshipChanges.map((change,index)=><div className="relationship-change" key={index}><span>{people[change.aId]?.name||change.aId} ↔ {people[change.bId]?.name||change.bId}</span><b className={change.delta>0?'good':'bad'}>{change.delta>0?'+':''}{change.delta}</b></div>)}</div>}</div>}

function Roster({game,setScreen,sound,setSound}){const relationshipCount=Object.values(game.relationships||{}).filter(v=>Math.abs(Number(v))>=10).length;return <div className="screen"><Topbar title="Talent Roster" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/><div className="section-head"><div><h2>The people making this possible</h2><p>“Possible” remains under review. {relationshipCount?`${relationshipCount} meaningful relationship${relationshipCount===1?'':'s'} now persist across productions.`:'No lasting alliances or feuds yet.'}</p></div></div><div className="grid">{allPeopleForGame(game).map(p=><TalentCard key={p.id} person={p}/>)}</div></div>}
function Archive({game,setGame,setScreen,setSelectedFilmId,sound,setSound}){function readScripts(){setGame(g=>prepareScriptSlate({...g,current:null},SCRIPTS));setScreen('scripts')}function openFilm(id){setSelectedFilmId(id);setScreen('filmDetail');SFX.tap()}return <div className="screen"><Topbar title="Movie Archive" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/>{!game.archive.length?<div className="panel" style={{textAlign:'center',padding:30}}><Icon name="archive" size={46}/><h3 style={{marginTop:12}}>No films. No scandals. No legacy.</h3><p>Start a production and make history or at least content.</p><button className="btn gold" onClick={readScripts}>Read Scripts</button></div>:<div className="archive-grid">{game.archive.map(f=>{const asset=SCRIPTS.find(s=>s.title===f.title)?.asset||ASSETS.heroSet;return <button className="archive-poster" key={f.id} onClick={()=>openFilm(f.id)}><RemoteImage asset={asset} style={{position:'absolute',inset:0}} crop={asset.posterCrop}/><div className="copy"><small>Y{f.year} · Q{f.quarter} · {f.genre}</small><h3>{f.title}</h3><p>{f.audience}% audience · {f.profit>=0?'+':''}{cash(f.profit)}</p>{f.awards?.length>0&&<p style={{color:'var(--gold)'}}>★ {f.awards.length} award{f.awards.length===1?'':'s'}</p>}</div></button>})}</div>}</div>}

function StudioProgression({game,setGame,setScreen,sound,setSound}){const tier=getTierConfig(game.studio),promotion=getPromotionStatus(game),costs=calculateQuarterlyCosts(game.studio),bonuses=calculateFacilityBonuses(game.studio),owned=new Set(game.studio.upgrades||[]);const act=(fn)=>{setGame(g=>fn(g));SFX.good()};return <div className="screen"><Topbar title="Studio & Finance" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/><div className="hero"><RemoteImage asset={ASSETS.blueCamera} className="hero-art" alt="Studio lot" crop="50% 48%"/><div className="hero-copy"><span className="eyebrow">Studio Tier {tier.id}</span><h2>{tier.name}</h2><p className="subcopy">{tier.summary}</p></div></div><Stats studio={game.studio}/><div className="panel"><div className="section-head" style={{marginTop:0}}><div><h2>Tier Progression</h2><p>Growth creates opportunity and overhead in roughly equal quantities.</p></div></div>{promotion.maxed?<div className="economy-banner"><div><b>Maximum tier reached</b><span>You are now one expensive mistake away from a memoir.</span></div></div>:<div className="economy-banner"><div><b>{promotion.next.name}</b><span>Requires reputation {promotion.next.minReputation}, prestige {promotion.next.minPrestige}, and {cash(promotion.next.promotionCost)}.</span>{promotion.reasons.length>0&&<span>{promotion.reasons.join(' · ')}</span>}</div><button className="btn gold" disabled={!promotion.eligible} onClick={()=>act(promoteStudio)}>Promote Studio</button></div>}</div><div className="section-head"><div><h2>Lot Upgrades</h2><p>Permanent facilities with permanent maintenance implications already included in tier overhead.</p></div></div><div className="progression-grid">{STUDIO_UPGRADES.map(upgrade=>{const isOwned=owned.has(upgrade.id),locked=game.studio.tier<upgrade.tier,poor=game.studio.cash<upgrade.cost;return <div className={`upgrade-card ${isOwned?'owned':''} ${locked?'locked':''}`} key={upgrade.id}><span className="eyebrow">Tier {upgrade.tier} facility</span><h3>{upgrade.name}</h3><p>{upgrade.desc}</p><div className="benefit-list">{upgrade.benefits.map(item=><span key={item}>✓ {item}</span>)}</div><div className="upgrade-cost">{isOwned?'OWNED':cash(upgrade.cost)}</div><button className={`btn ${isOwned?'ghost':'gold'} wide`} disabled={isOwned||locked||poor} onClick={()=>act(g=>purchaseStudioUpgrade(g,upgrade.id))}>{isOwned?'Installed':locked?`Requires Tier ${upgrade.tier}`:poor?'Insufficient Cash':'Build Upgrade'}</button></div>})}</div><div className="section-head"><div><h2>Quarterly Economics</h2><p>These costs hit after every film, rejection or contract.</p></div></div><div className="panel"><div className="money-line"><span>Base overhead · {tier.name}</span><b>{cash(costs.overhead)}</b></div><div className="money-line"><span>Debt interest · 2.5%</span><b>{cash(costs.interest)}</b></div><div className="money-line"><span>Current total</span><b>{cash(costs.total)}</b></div><div className="chips">{Object.entries(bonuses).filter(([key,value])=>Number(value)>0&&key!=='grossMultiplier'&&key!=='overheadMultiplier').map(([key,value])=><span className="chip green" key={key}>{key} +{value}</span>)}</div></div><div className="section-head"><div><h2>Financing</h2><p>Borrowing solves today and auditions tomorrow’s problem.</p></div></div><div className="finance-grid"><div className="finance-card"><h4>Small Production Loan</h4><p>Receive {cash(100000)}. Add {cash(115000)} to studio debt.</p><button className="btn wide" disabled={game.studio.debt+115000>700000} onClick={()=>act(g=>takeStudioLoan(g,100000))}>Borrow {cash(100000)}</button></div><div className="finance-card"><h4>Expansion Facility</h4><p>Receive {cash(250000)}. Add {cash(300000)} to studio debt.</p><button className="btn wide" disabled={game.studio.debt+300000>700000} onClick={()=>act(g=>takeStudioLoan(g,250000))}>Borrow {cash(250000)}</button></div><div className="finance-card"><h4>Debt Repayment</h4><p>Reduce interest and recover a little audience trust.</p><div style={{display:'flex',gap:6}}><button className="btn small" disabled={game.studio.debt<=0||game.studio.cash<25000} onClick={()=>act(g=>repayStudioDebt(g,25000))}>Pay {cash(25000)}</button><button className="btn small" disabled={game.studio.debt<=0||game.studio.cash<100000} onClick={()=>act(g=>repayStudioDebt(g,100000))}>Pay {cash(100000)}</button></div></div></div><div className={`economy-banner ${game.studio.cash<75000?'warn':''}`}><div><b>Humiliating Rescue Package</b><span>{game.studio.lastRescueYear===game.studio.year?'Already used this year.':'Available below $75,000 cash. Receive $125,000, owe $165,000 and lose standing.'}</span></div><button className="btn red" disabled={game.studio.cash>=75000||game.studio.lastRescueYear===game.studio.year} onClick={()=>act(takeRescueFinancing)}>Call the Financiers</button></div></div>}

function ContractBoard({game,setGame,setScreen,sound,setSound}){const offers=generateContractOffers(game);const trend=getMarketTrend(game);function take(job){if(!confirm(`Take ${job.name} for ${cash(job.reward)}? This uses the quarter.`))return;setGame(g=>completeContractJob(g,job.id));SFX.good();setScreen('office')}return <div className="screen"><Topbar title="Contract Board" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/><div className="section-head"><div><h2>Reliable money. Limited glory.</h2><p>Completing a contract consumes this quarter and still triggers overhead and debt interest.</p></div></div><div className="ribbon"><Icon name="bolt" size={16}/><span><strong>Market context:</strong> {trend.label}. Your clients do not care, but their marketing departments absolutely do.</span></div><div className="contract-grid">{offers.map(job=><div className="contract-card" key={job.id}><span className="eyebrow">Quarterly contract</span><h3>{job.name}</h3><p>{job.desc}</p><div className="chips"><span className={`chip ${job.reputation>=0?'green':'red'}`}>Reputation {job.reputation>=0?'+':''}{job.reputation}</span><span className={`chip ${job.trust>=0?'green':'red'}`}>Trust {job.trust>=0?'+':''}{job.trust}</span><span className={`chip ${job.prestige>=0?'gold':'red'}`}>Prestige {job.prestige>=0?'+':''}{job.prestige}</span></div><div className="contract-reward">{cash(job.reward)}</div><button className="btn gold wide" onClick={()=>take(job)}>Accept Contract</button></div>)}</div></div>}

function NewStudioModal({onClose,onCreate}){const [name,setName]=useState('Hammy Pictures');return <div className="modal-bg"><div className="modal"><h2>Name Your Studio</h2><p>Future award speeches, lawsuits and unnecessary sequels will use this name.</p><div className="field"><label>Studio name</label><input value={name} maxLength={28} onChange={e=>setName(e.target.value)}/></div><div style={{display:'flex',gap:8,marginTop:14}}><button className="btn ghost" onClick={onClose}>Cancel</button><button className="btn gold" style={{flex:1}} disabled={!name.trim()} onClick={()=>onCreate(name.trim())}>Open the Gates</button></div></div></div>}

function gameReducer(state,action){
 if(action.type==='REPLACE')return migrateSave(action.state)||state;
 if(action.type==='UPDATE'){const next=typeof action.updater==='function'?action.updater(state):action.updater;return next||state}
 return state;
}
function App(){
 const initial=loadSave();
 const [game,dispatch]=useReducer(gameReducer,initial||freshStudio());
 const [hasSave,setHasSave]=useState(!!initial);
 const [screen,setScreen]=useState('title');
 const [newModal,setNewModal]=useState(false);
 const [toast,setToast]=useState(null);
 const [selectedFilmId,setSelectedFilmId]=useState(null);
 const setGame=updater=>dispatch({type:'UPDATE',updater});
 const replaceGame=state=>dispatch({type:'REPLACE',state});
 const sound=game.settings?.sound??game.sound!==false;
 function setSound(v){SFX.on=v;setGame(g=>({...g,sound:v,settings:{...(g.settings||{}),sound:v}}))}
 useEffect(()=>{SFX.on=sound;if(screen!=='title'){persist(game);setHasSave(true)}},[game,screen]);
 function showToast(t){setToast(t);setTimeout(()=>setToast(null),2200)}
 function create(name){const ng=freshStudio(name);replaceGame(ng);setNewModal(false);setScreen('office');persist(ng);setHasSave(true);SFX.good()}
 function newFilm(){setGame(g=>prepareScriptSlate({...g,current:null},SCRIPTS));setScreen('scripts');SFX.tap()}
 return <>{screen==='title'&&<Title saved={hasSave?loadSave():null} onNew={()=>setNewModal(true)} onContinue={()=>{const s=loadSave();if(s){replaceGame(s);setScreen('office');SFX.good()}}} sound={sound} setSound={setSound}/>} {screen==='office'&&<Office game={game} setScreen={setScreen} sound={sound} setSound={setSound} newFilm={newFilm}/>} {screen==='progression'&&<StudioProgression game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='contracts'&&<ContractBoard game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='scripts'&&<ScriptDesk game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound} setToast={showToast}/>} {screen==='casting'&&<Casting game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='plan'&&<ProductionPlan game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='production'&&<Production game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound} setToast={showToast}/>} {screen==='post'&&<Post game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='release'&&<Release game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='premiere'&&<Premiere game={game} setGame={setGame} setScreen={setScreen}/>} {screen==='results'&&<Results game={game} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='awards'&&<Awards game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='talent'&&<Roster game={game} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='archive'&&<Archive game={game} setGame={setGame} setScreen={setScreen} setSelectedFilmId={setSelectedFilmId} sound={sound} setSound={setSound}/>} {screen==='filmDetail'&&<FilmDetail game={game} filmId={selectedFilmId} onBack={()=>setScreen('archive')} sound={sound} setSound={setSound}/>} {newModal&&<NewStudioModal onClose={()=>setNewModal(false)} onCreate={create}/>} {toast&&<div className="toast">{toast}</div>}</>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

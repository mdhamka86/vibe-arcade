function RemoteImage({asset,className='',style={},alt='',imgStyle={},crop,scale,filter}){
  const sources=asset?(asset.urls||(asset.url?[asset.url]:[])):[];
  const [index,setIndex]=useState(0);
  useEffect(()=>setIndex(0),[asset?.id]);
  const src=index<sources.length?sources[index]:null;
  return <div className={`remote-wrap ${className}`} style={style}>
    <div className="fallback" aria-hidden="true"><FallbackArt type={asset?.fallback}/></div>
    {src&&<img key={src} src={src} alt={alt} referrerPolicy="no-referrer" loading="lazy" decoding="async" onError={()=>setIndex(i=>Math.min(i+1,sources.length))} style={{objectFit:'cover',objectPosition:crop||asset?.crop||'50% 50%',transform:(scale??asset?.scale)?`scale(${scale??asset?.scale})`:undefined,filter:filter??asset?.filter,...imgStyle}}/>}

function clamp(n, a = 0, b = 100) {
  return Math.max(a, Math.min(b, Number(n) || 0));
}

function hashSeed(str) {
  let h = 2166136261;
  const input = String(str ?? '');
  for (let i = 0; i < input.length; i += 1) {
    h ^= input.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function seeded(seed, n = 0) {
  let x = ((Number(seed) || 0) + n * 2654435761) >>> 0;
  x ^= x << 13;
  x ^= x >>> 17;
  x ^= x << 5;
  return (x >>> 0) / 4294967295;
}

function normalizeTalentCareers(value) {

      films: Array.isArray(record?.films) ? [...new Set(record.films.map(String))] : [],
      awards: Array.isArray(record?.awards) ? record.awards : [],
      nominations: Array.isArray(record?.nominations) ? record.nominations : [],
      ageDelta:Math.max(0,Math.floor(Number(record?.ageDelta)||0)),
      morale:clamp(record?.morale??65),
      loyalty:clamp(record?.loyalty??58),
      momentum:clamp(record?.momentum??50),
      skillGrowth:record?.skillGrowth&&typeof record.skillGrowth==='object'?Object.fromEntries(Object.entries(record.skillGrowth).map(([key,val])=>[key,clamp(val,0,20)])):{},
      specializations:record?.specializations&&typeof record.specializations==='object'?record.specializations:{},
      goal:String(record?.goal||''),
      status:['ACTIVE','SABBATICAL','RETIRED'].includes(record?.status)?record.status:'ACTIVE',
      retirementRisk:clamp(record?.retirementRisk||0),
      hits:Math.max(0,Math.floor(Number(record?.hits)||0)),

      injuries:Math.max(0,Math.floor(Number(record?.injuries)||0)),

      collaborators:record?.collaborators&&typeof record.collaborators==='object'?record.collaborators:{},

}

const AWARD_CATEGORIES = [
  { id: 'BEST_PICTURE', name: 'Best Picture', kind: 'film', prestige: 5 },
  { id: 'BEST_DIRECTOR', name: 'Best Director', kind: 'person', prestige: 3 },
  { id: 'BEST_PERFORMANCE', name: 'Best Performance', kind: 'person', prestige: 3 },
  { id: 'BEST_STUNT', name: 'Best Stunt', kind: 'film', prestige: 1 },
  { id: 'BEST_EFFECTS', name: 'Best Effects', kind: 'film', prestige: 1 },
  { id: 'BIGGEST_FLOP', name: 'Biggest Flop', kind: 'film', prestige: 0, satire: true },
  { id: 'QUESTIONABLE_DECISION', name: 'Most Questionable Creative Decision', kind: 'film', prestige: 0, satire: true },
];

function rankAwardCandidates(candidates, seed, categoryId, limit = 3) {
  return candidates.map((candidate) => ({
    ...candidate,
    score: Number(candidate.score) || 0,
    tie: seeded(seed, hashSeed(`${categoryId}|${candidate.filmId || ''}|${candidate.personId || ''}`) % 100000),
  })).sort((a, b) => b.score - a.score || b.tie - a.tie).slice(0, limit).map(({ tie, ...candidate }) => candidate);
}

function generateAwards(game, year, now = new Date().toISOString()) {
  const eligibleFilms = (game?.archive || []).map(normalizeFilm).filter(Boolean).filter((film) => film.year === Number(year));
  const seed = hashSeed(`${game?.rngSeed || 0}|awards|${year}|${eligibleFilms.map((film) => film.id).sort().join('|')}`);
  const categoryResults = [];
  const add = (definition, candidates) => {
    const nominees = rankAwardCandidates(candidates, seed, definition.id, 3);
    categoryResults.push({ ...definition, nominees, winner: nominees[0] || null });
  };
  const filmCandidate = (film, score) => ({ filmId: film.id, score: Math.round(score * 100) / 100 });
  add(AWARD_CATEGORIES[0], eligibleFilms.map((film) => filmCandidate(film, film.critic * .34 + film.audience * .24 + film.scores.direction * .15 + film.scores.performance * .15 + film.scores.originality * .12)));
  add(AWARD_CATEGORIES[1], eligibleFilms.filter((film) => film.cast.directorId).map((film) => ({ filmId: film.id, personId: film.cast.directorId, role: 'Director', score: film.scores.direction * .65 + film.critic * .22 + film.scores.coherence * .13 })));
  const performances = [];
  for (const film of eligibleFilms) {
    if (film.cast.leadId) performances.push({ filmId: film.id, personId: film.cast.leadId, role: 'Lead', score: film.scores.performance * .64 + film.audience * .14 + film.scores.chemistry * .12 + film.critic * .10 + 1 });
    if (film.cast.supportId) performances.push({ filmId: film.id, personId: film.cast.supportId, role: 'Co-lead', score: film.scores.performance * .61 + film.audience * .13 + film.scores.chemistry * .16 + film.critic * .10 });
  }
  add(AWARD_CATEGORIES[2], performances);
  add(AWARD_CATEGORIES[3], eligibleFilms.map((film) => {
    const stuntScenes = film.scenes.filter((scene) => /stunt|chase|action|disaster|finale/i.test(`${scene.type || ''} ${scene.name || ''}`));
    const bestScene = stuntScenes.length ? Math.max(...stuntScenes.map((scene) => Number(scene.quality) || 0)) : film.scores.average;
    return filmCandidate(film, film.scores.spectacle * .68 + bestScene * .32);
  }));
  add(AWARD_CATEGORIES[4], eligibleFilms.map((film) => filmCandidate(film, film.scores.craft * .45 + film.scores.spectacle * .35 + Number(film.production.departmentLevels?.effects || 0) * 5)));
  add(AWARD_CATEGORIES[5], eligibleFilms.map((film) => filmCandidate(film, (-film.profit / 1000) + (100 - film.audience) * .22)));
  add(AWARD_CATEGORIES[6], eligibleFilms.map((film) => {
    const qualities = film.scenes.map((scene) => Number(scene.quality) || 0);
    const spread = qualities.length ? Math.max(...qualities) - Math.min(...qualities) : 0;
    return filmCandidate(film, (100 - film.scores.coherence) * .55 + film.scores.originality * .25 + spread * .20);
  }));
  const prestigeGain = categoryResults.reduce((sum, category) => sum + (category.winner ? Number(category.prestige || 0) : 0), 0);
  return {
    id: `awards-y${year}-${seed.toString(36)}`,
    year: Number(year),
    createdAt: now,
    eligibleFilmIds: eligibleFilms.map((film) => film.id),
    categories: categoryResults,
    prestigeGain,
  };
}

function updateCareer(careers, personId, updater) {
  if (!personId) return careers;
  const current = normalizeTalentCareers({[personId]:careers[personId]||{}})[personId];
  careers[personId] = updater({ ...current, films: [...current.films], awards: [...current.awards], nominations: [...current.nominations],signatureRoles:[...current.signatureRoles],collaborators:{...current.collaborators},scandals:[...current.scandals],demandsHistory:[...current.demandsHistory],skillGrowth:{...current.skillGrowth},specializations:{...current.specializations} });
  return careers;
}

function recordFilmCareers(talentCareers, film) {
  const careers = normalizeTalentCareers(talentCareers);
  const ids = [film?.cast?.leadId, film?.cast?.supportId, film?.cast?.directorId].filter(Boolean);
  for (const id of ids) updateCareer(careers, id, (record) => {
    if (!record.films.includes(film.id)) record.films.push(film.id);
    const isDirector = id === film.cast.directorId;

  if (!raw?.talentCareers || typeof raw.talentCareers !== 'object') errors.push('Talent careers must be an object');
  if (!raw?.talentStatus || typeof raw.talentStatus !== 'object') errors.push('Talent status must be an object');
  if (!Array.isArray(raw?.injuryHistory)) errors.push('Injury history must be an array');

function generateScriptSlate(game, scripts = [], count = 3) {
  const year = Number(game?.studio?.year) || 1;
  const quarter = Number(game?.studio?.quarter) || 1;
  const current = game?.scriptSlate;
  const validIds = new Set(scripts.map((s) => s.id));
  if (current?.year === year && current?.quarter === quarter && Array.isArray(current.ids) && current.ids.length === count && current.ids.every((id) => validIds.has(id))) return current;
  const excluded = new Set(Array.isArray(game?.lastRejectedSlateIds) ? game.lastRejectedSlateIds : []);
  let pool = scripts.filter((script) => !excluded.has(script.id));
  if (pool.length < count) pool = [...scripts];
  pool = [...pool].sort((a, b) => a.id.localeCompare(b.id));
  const seed = hashSeed(`${game?.rngSeed || 0}|slate|${year}|${quarter}|${(game?.history || []).length}`);
  for (let i = pool.length - 1; i > 0; i -= 1) {
    const j = Math.floor(seeded(seed, i * 13 + 7) * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];

  return { year, quarter, seed, ids: pool.slice(0, count).map((script) => script.id) };
}

function calculateChemistry(a, b, context = {}) {

  let score = 50;
  const traitsA = new Set(a.traits || []);
  const traitsB = new Set(b.traits || []);
  if (traitsA.has('Chemistry Magnet') || traitsB.has('Chemistry Magnet')) score += 12;
  if (traitsA.has('Quiet Professional') || traitsB.has('Quiet Professional')) score += 4;
  if (traitsA.has('Improviser') && traitsB.has('Improviser')) score += 6;
  if (traitsA.has('Hates Sequels') && context.sequelNumber > 0) score -= 8;
  score += Math.max(-18, Math.min(18, Number(context.relationshipScore || 0) * 0.22));

  const reliabilityB = Number(b.skills?.Reliability ?? b.skills?.Control ?? 50);
  score -= Math.min(10, Math.abs(reliabilityA - reliabilityB) / 8);

function calculateCastingFit({ lead, support, director, script, relationships = {}, studio = null }) {

function applyRelationshipChanges(game, film) {
  const relationships = { ...(game?.relationships || {}) };
  const changes = [];
  const average = Number(film?.scores?.average || 0);
  const chemistry = Number(film?.scores?.chemistry || 50);
  const direction = Number(film?.scores?.direction || 50);
  const qualityDelta = Math.round((average - 50) / 14);
  const pairs = [
    [film?.cast?.leadId, film?.cast?.supportId, Math.round((chemistry - 50) / 10) + qualityDelta, 'co-stars'],
    [film?.cast?.leadId, film?.cast?.directorId, Math.round((direction - 50) / 14) + qualityDelta, 'actor/director'],
    [film?.cast?.supportId, film?.cast?.directorId, Math.round((direction - 50) / 16) + qualityDelta, 'actor/director'],
  ];
  for (const [aId, bId, rawDelta, reason] of pairs) {
    const key = relationshipKey(aId, bId);
    if (!key) continue;
    let delta = Math.max(-8, Math.min(8, rawDelta));
    if (delta === 0) delta = average >= 58 ? 1 : average <= 42 ? -1 : 0;
    if (!delta) continue;
    const before = Number(relationships[key] || 0);
    const after = Math.max(-100, Math.min(100, before + delta));
    relationships[key] = after;
    const a=[...PEOPLE,...DIRECTORS].find((item)=>item.id===aId),b=[...PEOPLE,...DIRECTORS].find((item)=>item.id===bId);
    changes.push({ aId, bId, delta: after - before, before, after, reason,label:getRelationshipLabel(after,a?.role,b?.role,aId,bId) });
  }
  return { relationships, changes };
}

const SFX={ctx:null,on:true,tone(freq=440,dur=.07,type='sine',gain=.035){if(!this.on)return;try{this.ctx=this.ctx||new(window.AudioContext||window.webkitAudioContext)();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,this.ctx.currentTime+dur);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+dur)}catch{}},tap(){this.tone(520,.05)},good(){this.tone(520,.08,'triangle');setTimeout(()=>this.tone(780,.12,'triangle'),70)},bad(){this.tone(180,.15,'sawtooth')},premiere(){this.tone(220,.14,'triangle');setTimeout(()=>this.tone(440,.16,'triangle'),120);setTimeout(()=>this.tone(660,.22,'triangle'),240)}};

function ProductionPlanLegacy({game,setGame,setScreen,sound,setSound}){const script=SCRIPTS.find(s=>s.id===game.current.scriptId),levels=game.current.budget.levels,posture=game.current.posture;const depts=[['cast','Cast'],['sets','Sets & Costumes'],['stunts','Stunts'],['effects','Effects'],['post','Post-production']];const total=Math.round(script.base*(.2*BUDGET_LEVELS[levels.cast]+.2*BUDGET_LEVELS[levels.sets]+.18*BUDGET_LEVELS[levels.stunts]+.18*BUDGET_LEVELS[levels.effects]+.24*BUDGET_LEVELS[levels.post]));function setLevel(k,v){SFX.tap();setGame(g=>({...g,current:{...g.current,budget:{...g.current.budget,levels:{...g.current.budget.levels,[k]:v},approved:total}}}))}function begin(){setGame(g=>({...g,current:{...g.current,status:'SHOOTING',spend:total,sceneIndex:0,scenes:[],facilityBonuses:calculateFacilityBonuses(g.studio)},studio:{...g.studio,cash:g.studio.cash-total}}));SFX.good();setScreen('production')}return <div className="screen"><Topbar title="Production Plan" onBack={()=>setScreen('casting')} sound={sound} setSound={setSound}/><div className="plan-grid"><div className="panel"><h3>Department Budget</h3><p>Spending helps, with diminishing returns. Reckless remains an adjective, not financial advice.</p>{depts.map(([k,label])=><div className="budget-row" key={k}><b>{label}</b><span>{BUDGET_NAMES[levels[k]]}</span><div className="tier-buttons">{BUDGET_NAMES.map((n,i)=><button key={n} className={`tier ${levels[k]===i?'on':''}`} onClick={()=>setLevel(k,i)}>{n}</button>)}</div></div>)}</div><div><div className="panel"><h3>Production Posture</h3><p>How much chaos are we inviting onto the set?</p><div className="postures">{POSTURES.map(p=><button key={p.id} className={`posture ${posture===p.id?'on':''}`} onClick={()=>{SFX.tap();setGame(g=>({...g,current:{...g.current,posture:p.id}}))}}><b>{p.name}</b><span>{p.desc}</span></button>)}</div></div><div className="panel" style={{marginTop:12}}><h3>Approval</h3><p>{script.title}</p><div className="chips" style={{marginBottom:10}}>{Object.entries(calculateFacilityBonuses(game.studio)).filter(([key,value])=>key!=='grossMultiplier'&&key!=='overheadMultiplier'&&Number(value)>0).map(([key,value])=><span className="chip green" key={key}>{key} +{value}</span>)}</div><div className="stats" style={{gridTemplateColumns:'1fr 1fr'}}><div className="stat gold"><label>Projected Spend</label><b>{cash(total)}</b></div><div className={`stat ${total>game.studio.cash?'red':'green'}`}><label>Cash After</label><b>{cash(game.studio.cash-total)}</b></div></div><button className="btn gold wide" disabled={total>game.studio.cash} onClick={begin}><Icon name="camera"/>Begin Production</button></div></div></div></div>}

function ProductionLegacy({game,setGame,setScreen,sound,setSound,setToast}){const project=game.current,script=SCRIPTS.find(s=>s.id===project.scriptId),scene=script.scenes[project.sceneIndex],outcome=project.pendingOutcome;function choose(choiceIndex){if(outcome)return;const lead=findPerson(game,project.cast.leadId),support=findPerson(game,project.cast.supportId),director=findPerson(game,project.cast.directorId);const result=calculateSceneOutcome({project,script,scene,choiceIndex,lead,support,director,relationships:game.relationships,budgetLevels:BUDGET_LEVELS,postures:POSTURES});SFX[result.quality>=60?'good':result.quality<40?'bad':'tap']();setGame(g=>({...g,current:{...g.current,pendingOutcome:result}}))}
function next(){const result=project.pendingOutcome;const savedScene={name:scene.name,type:scene.type,...result,asset:script.asset.id};if(project.sceneIndex<script.scenes.length-1){setGame(g=>({...g,current:{...g.current,scenes:[...g.current.scenes,savedScene],sceneIndex:g.current.sceneIndex+1,pendingOutcome:null}}));SFX.tap()}else{setGame(g=>({...g,current:{...g.current,scenes:[...g.current.scenes,savedScene],status:'POST',pendingOutcome:null}}));SFX.good();setScreen('post')}}return <div className="screen soundstage"><Topbar title="Soundstage" sound={sound} setSound={setSound} right={<span className="chip gold">Scene {project.sceneIndex+1}/{script.scenes.length}</span>}/><div className="production-hero"><RemoteImage asset={script.asset} style={{position:'absolute',inset:0}} alt="Production scene" crop={script.asset.backdropCrop}/><div className="scene-title"><span className="eyebrow">{scene.type}</span><h2>{scene.name}</h2></div></div><div className="progress">{script.scenes.map((_,i)=><i key={i} className={i<project.sceneIndex?'done':i===project.sceneIndex?'now':''}/>)}</div><div className="event-box"><h3>Production Crisis</h3><p>{scene.event}</p><div className="choices">{scene.choices.map((c,i)=><button className="choice" disabled={!!outcome} key={c[0]} onClick={()=>choose(i)}><b>{c[0]}</b><span>{c[1]}</span><em>{i===0?'SAFE-ish':i===1?'HIGH VARIANCE':'CREATIVE ESCAPE'}</em></button>)}</div>{outcome&&<div className={`outcome ${outcome.quality>=60?'good':outcome.quality<40?'bad':''}`}><b>{outcome.band} · Scene quality {outcome.quality}</b><p>{outcome.text}</p></div>}{outcome&&<button className="btn gold wide" style={{marginTop:12}} onClick={next}>{project.sceneIndex<script.scenes.length-1?'Next Scene':'Wrap Production'} <Icon name="play" size={14}/></button>}</div><AssetCredit asset={script.asset}/></div>}

function Post({game,setGame,setScreen,sound,setSound}){const [choice,setChoice]=useState(null);const options=[['Tighten the edit','Raises coherence and trims the weakest scene.',5],['Add an enormous score','Raises spectacle. Subtlety leaves the building.',4],['Hide the worst take','Raises the lowest scene quality.',6],['Release the beautiful mess','No cost. Originality and risk rise.',2]];function proceed(){const bonus=options[choice][2];setGame(g=>({...g,current:{...g.current,status:'MARKETING',postChoice:options[choice][0],postBonus:bonus}}));SFX.good();setScreen('release')}return <div className="screen"><Topbar title="Editing Room" onBack={null} sound={sound} setSound={setSound}/><div className="hero"><RemoteImage asset={ASSETS.camera} className="hero-art" alt="Cinema camera" crop={ASSETS.camera.heroCrop}/><div className="hero-copy"><span className="eyebrow">The footage is technically all here</span><h2>Save it in post.</h2><p className="subcopy">You have enough time and money for one decisive intervention.</p></div></div><div className="choices">{options.map((o,i)=><button key={o[0]} className={`choice ${choice===i?'selected':''}`} style={choice===i?{borderColor:'var(--gold)',background:'rgba(229,185,77,.08)'}:{}} onClick={()=>{SFX.tap();setChoice(i)}}><b>{o[0]}</b><span>{o[1]}</span></button>)}</div>{choice!==null&&<button className="btn gold wide" style={{marginTop:12}} onClick={proceed}>Lock the Cut <Icon name="check" size={15}/></button>}<AssetCredit asset={ASSETS.camera}/></div>}

function ReleaseLegacy({game,setGame,setScreen,sound,setSound}){const [campaign,setCampaign]=useState(null),[spend,setSpend]=useState(1);const campaigns=[['Sell the Star','Fame drives the opening weekend.'],['Sell the Spectacle','The trailer contains every explosion.'],['Mystery Teaser','Nobody knows what the film is, including the cast.']];const amounts=[10000,25000,50000];function release(){const p=game.current,script=SCRIPTS.find(s=>s.id===p.scriptId),lead=findPerson(game,p.cast.leadId),support=findPerson(game,p.cast.supportId),director=findPerson(game,p.cast.directorId);const result=calculateRelease({project:p,script,lead,support,director,relationships:game.relationships,campaignIndex:campaign,spendIndex:spend,marketingAmounts:amounts,studio:game.studio,marketTrend:getMarketTrend(game)});const film={id:p.projectId,title:script.title,genre:script.genre,tagline:script.tagline,assetId:script.asset.id,critic:result.critic,audience:result.audience,gross:result.gross,profit:result.profit,review:result.review,scores:result.scores,cast:p.cast,scenes:p.scenes,incidents:[...(p.incidents||[]),...p.scenes.filter(scene=>scene.quality>=80||scene.quality<40).map(scene=>({scene:scene.name,type:scene.quality>=80?'BREAKTHROUGH':'DISASTER',text:scene.text,quality:scene.quality}))],production:{approvedBudget:p.budget?.approved||script.base,departmentLevels:{...(p.budget?.levels||{})},posture:p.posture,spend:p.spend,marketing:result.marketing,campaign:campaigns[campaign]?.[0]||'',postChoice:p.postChoice||'',marketTrend:result.trendLabel||'',studioTier:game.studio.tier||1,upgrades:[...(game.studio.upgrades||[])]},year:game.studio.year,quarter:game.studio.quarter};setGame(g=>({...g,current:{...g.current,status:'PREMIERE',release:film,marketing:result.marketing},studio:{...g.studio,cash:g.studio.cash-result.marketing}}));SFX.premiere();setScreen('premiere')}return <div className="screen"><Topbar title="Release Office" sound={sound} setSound={setSound}/><div className="ribbon"><Icon name="bolt" size={16}/><span><strong>{getMarketTrend(game).label}:</strong> {getMarketTrend(game).genre} releases receive a market bonus this quarter.</span></div><div className="panel"><h3>Campaign Angle</h3><p>How aggressively are we going to describe what happened?</p><div className="choices">{campaigns.map((c,i)=><button key={c[0]} className="choice" style={campaign===i?{borderColor:'var(--gold)',background:'rgba(229,185,77,.08)'}:{}} onClick={()=>{SFX.tap();setCampaign(i)}}><b>{c[0]}</b><span>{c[1]}</span></button>)}</div></div><div className="panel" style={{marginTop:12}}><h3>Marketing Spend</h3><p>Cash left: {cash(game.studio.cash)}</p><div className="tier-buttons">{amounts.map((a,i)=><button key={a} className={`tier ${spend===i?'on':''}`} onClick={()=>setSpend(i)}>{cash(a)}</button>)}</div></div>{campaign!==null&&<button className="btn gold wide" style={{marginTop:12}} disabled={amounts[spend]>game.studio.cash} onClick={release}><Icon name="star"/>Book the Premiere</button>}</div>}

function PremiereLegacy({game,setGame,setScreen}){const film=game.current.release,script=SCRIPTS.find(s=>s.id===game.current.scriptId);const [beat,setBeat]=useState(0);const beats=useMemo(()=>[

 ...film.scenes.map((s,i)=>({small:`SCENE ${i+1}`,big:s.name,line:s.quality>=70?'THIS WAS NOT IN THE INSURANCE FORM.':s.quality<40?'THE EDITOR HAS REQUESTED AN ALIAS.':s.choice.toUpperCase()})),

],[]);useEffect(()=>{const t=setInterval(()=>setBeat(b=>{if(b>=beats.length-1){clearInterval(t);return b}return b+1}),1800);return()=>clearInterval(t)},[]);function finish(){setGame(g=>finalizePremiere(g,film));setScreen('results')}const b=beats[beat];return <div className="premiere film-bars"><RemoteImage asset={script.asset} className="premiere-bg" alt="Film trailer backdrop" crop={script.asset.backdropCrop}/><button className="btn ghost small trailer-skip" onClick={finish}>Skip / Results</button><div className="trailer-copy" key={beat}><div className="present">{b.small}</div><h1>{b.big}</h1><p>{b.line}</p>{beat===beats.length-1&&<button className="btn gold" onClick={finish}>See the Numbers</button>}</div></div>}

function ResultsLegacy({game,setScreen,sound,setSound}){const film=game.archive[game.archive.length-1],asset=SCRIPTS.find(s=>s.title===film.title)?.asset||ASSETS.heroSet;const peopleById=Object.fromEntries([...PEOPLE,...DIRECTORS].map(p=>[p.id,p]));return <div className="screen"><Topbar title="Premiere Night" sound={sound} setSound={setSound}/><div className="result-hero"><div className="result-poster"><RemoteImage asset={asset} style={{position:'absolute',inset:0}} crop={asset.posterCrop}/><div className="poster-copy"><small>{film.genre.toUpperCase()}</small><h2>{film.title}</h2><p>{film.tagline}</p></div></div><div className="scores"><div className="score"><b>{film.critic}%</b><span>Critics</span></div><div className="score"><b>{film.audience}%</b><span>Audience</span></div><div className="score"><b style={{color:film.profit>=0?'#8ed5a9':'#ef837a'}}>{film.profit>=0?'+':''}{cash(film.profit)}</b><span>Profit</span></div></div><div className="review">“{film.review}”</div>{film.production?.quarterlyCosts&&<div className="panel" style={{marginTop:12,textAlign:'left'}}><h3>Quarter Closed</h3><div className="money-line"><span>Studio overhead</span><b>-{cash(film.production.quarterlyCosts.overhead)}</b></div><div className="money-line"><span>Debt interest</span><b>-{cash(film.production.quarterlyCosts.interest)}</b></div></div>}{film.relationshipChanges?.length>0&&<div className="panel relationship-summary"><h3>What the production did to the cast</h3>{film.relationshipChanges.map((change,i)=><div className="relationship-change" key={`${change.aId}-${change.bId}-${i}`}><span>{peopleById[change.aId]?.name||change.aId} ↔ {peopleById[change.bId]?.name||change.bId}</span><b className={change.delta>0?'good':'bad'}>{change.delta>0?'+':''}{change.delta}</b></div>)}</div>}<button className="btn gold wide" style={{marginTop:14}} onClick={()=>setScreen(game.pendingAwardsYear?'awards':'office')}>{game.pendingAwardsYear?`Attend the Year ${game.pendingAwardsYear} Awards`:'Back to the function Awards({game,setGame,setScreen,sound,setSound}){const year=game.pendingAwardsYear??game.awards?.[game.awards.length-1]?.year;const ceremony=game.awards?.find(item=>Number(item.year)===Number(year));const films=Object.fromEntries((game.archive||[]).map(film=>[film.id,film]));const people=Object.fromEntries([...PEOPLE,...DIRECTORS].map(person=>[person.id,person]));function label(candidate){if(!candidate)return 'No eligible winner';const film=films[candidate.filmId];return candidate.personId?`${people[candidate.personId]?.name||candidate.personId}`:(film?.title||candidate.filmId)}function filmLabel(candidate){if(!candidate)return '';const film=films[candidate.filmId];return candidate.personId?(film?.title||'Unknown film'):''}function leave(){setGame(g=>acknowledgeAwards(g));setScreen('office');SFX.good()}return <div className="screen"><Topbar title={`Year ${year||''} Awards`} sound={sound} setSound={setSound}/><div className="awards-hero"><RemoteImage asset={ASSETS.blueCamera} alt="Awards night cinema" crop="50% 50%"/><div className="awards-copy"><span className="eyebrow">The Golden Backlot Awards</span><h1>Year {year}</h1><p>{ceremony?.eligibleFilmIds?.length?`${ceremony.eligibleFilmIds.length} eligible release${ceremony.eligibleFilmIds.length===1?'':'s'}. The envelopes are sealed and several acceptance speeches are already too long.`:'The studio released nothing eligible this year. The catering still arrived.'}</p><div className="awards-summary"><span className="chip gold">Prestige +{ceremony?.prestigeGain||0}</span><span className="chip">{ceremony?.categories?.filter(category=>category.winner).length||0} awards decided</span></div></div></div>{!ceremony?<div className="panel award-empty">No ceremony is available.</div>:<div className="awards-grid">{ceremony.categories.map(category=><div className={`award-card ${category.satire?'satire':''}`} key={category.id}><div className="award-category">{category.name}</div><div className="award-winner">{label(category.winner)}</div>{filmLabel(category.winner)&&<div className="award-film">{filmLabel(category.winner)}</div>}<div className="award-score">{category.winner?`Winning score ${Math.round(category.winner.score)}`:'No eligible nominees'}</div>{category.nominees?.length>0&&<div className="award-nominees">{category.nominees.map((nominee,index)=><div className="award-nominee" key={`${category.id}-${nominee.filmId}-${nominee.personId||index}`}><span>{index+1}. {label(nominee)}{filmLabel(nominee)?` · ${filmLabel(nominee)}`:''}</span><b>{Math.round(nominee.score)}</b></div>)}</div>}</div>)}</div>}<button className="btn gold wide" style={{marginTop:14}} onClick={leave}><Icon name="trophy"/>Return to the Studio</button></div>}

function FilmDetailLegacy({game,filmId,onBack,sound,setSound}){const film=normalizeFilm((game.archive||[]).find(item=>item.id===filmId));if(!film)return <div className="screen"><Topbar title="Film Archive" onBack={onBack} sound={sound} setSound={setSound}/><div className="panel">Film record unavailable.</div></div>;const script=SCRIPTS.find(item=>item.id===film.assetId||item.title===film.title);const asset=script?.asset||ASSETS.heroSet;const people=Object.fromEntries([...PEOPLE,...DIRECTORS].map(person=>[person.id,person]));const production=film.production||{};return <div className="screen"><Topbar title="Film Record" onBack={onBack} sound={sound} setSound={setSound}/><div className="archive-detail-hero"><div className="detail-poster"><RemoteImage asset={asset} style={{position:'absolute',inset:0}} crop={asset.posterCrop}/><div className="poster-copy"><small>{film.genre.toUpperCase()}</small><h2>{film.title}</h2><p>{film.tagline}</p></div></div><div className="detail-copy"><span className="eyebrow">Released Y{film.year} · Q{film.quarter}</span><h1>{film.title}</h1><p>“{film.review}”</p><div className="detail-stats"><div className="detail-stat"><label>Critics</label><b>{film.critic}%</b></div><div className="detail-stat"><label>Audience</label><b>{film.audience}%</b></div><div className="detail-stat"><label>Gross</label><b>{cash(film.gross)}</b></div><div className="detail-stat"><label>Profit</label><b style={{color:film.profit>=0?'#8ed5a9':'#ef837a'}}>{film.profit>=0?'+':''}{cash(film.profit)}</b></div></div>{film.awards?.length>0&&<div>{film.awards.map(award=><span className="award-chip" key={`${award.year}-${award.categoryId}`}><Icon name="trophy" size={13}/>{award.name}</span>)}</div>}</div></div><div className="detail-section"><h3>Cast & Director</h3><div className="people-lines"><div className="person-line"><label>Lead</label><b>{people[film.cast.leadId]?.name||'Unknown'}</b></div><div className="person-line"><label>Co-lead</label><b>{people[film.cast.supportId function ArchiveV09({game,setGame,setScreen,setSelectedFilmId,sound,setSound}){function readScripts(){setGame(g=>prepareScriptSlate({...g,current:null},SCRIPTS));setScreen('scripts')}function openFilm(id){setSelectedFilmId(id);setScreen('filmDetail');SFX.tap()}return <div className="screen"><Topbar title="Movie Archive" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/>{!game.archive.length?<div className="panel" style={{textAlign:'center',padding:30}}><Icon name="archive" size={46}/><h3 style={{marginTop:12}}>No films. No scandals. No legacy.</h3><p>Start a production and make history or at least content.</p><button className="btn gold" onClick={readScripts}>Read Scripts</button></div>:<div className="archive-grid">{game.archive.map(f=>{const asset=SCRIPTS.find(s=>s.title===f.title)?.asset||ASSETS.heroSet;return <button className="archive-poster" key={f.id} onClick={()=>openFilm(f.id)}><RemoteImage asset={asset} style={{position:'absolute',inset:0}} crop={asset.posterCrop}/><div className="copy"><small>Y{f.year} · Q{f.quarter} · {f.genre}</small><h3>{f.title}</h3><p>{f.audience}% audience · {f.profit>=0?'+':''}{cash(f.profit)}</p>{f.awards?.length>0&&<p style={{color:'var(--gold)'}}>★ {f.awards.length} award{f.awards.length===1?'':'s'}</p>}</div></button>})}</div>}</div>}

function StudioProgression({game,setGame,setScreen,sound,setSound}){const tier=getTierConfig(game.studio),promotion=getPromotionStatus(game),costs=calculateQuarterlyCosts(game.studio),runway=calculateFinancialRunway(game.studio),bonuses=calculateFacilityBonuses(game.studio),owned=new Set(game.studio.upgrades||[]);const act=(fn)=>{setGame(g=>fn(g));SFX.good()};return <div className="screen"><Topbar title="Studio & Finance" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/><div className="hero"><RemoteImage asset={ASSETS.blueCamera} className="hero-art" alt="Studio lot" crop="50% 48%"/><div className="hero-copy"><span className="eyebrow">Studio Tier {tier.id}</span><h2>{tier.name}</h2><p className="subcopy">{tier.summary}</p></div></div><Stats studio={game.studio}/><div className="panel"><div className="section-head" style={{marginTop:0}}><div><h2>Tier Progression</h2><p>Growth creates opportunity and overhead in roughly equal quantities.</p></div></div>{promotion.maxed?<div className="economy-banner"><div><b>Maximum tier reached</b><span>You are now one expensive mistake away from a memoir.</span></div></div>:<div className="economy-banner"><div><b>{promotion.next.name}</b><span>Requires reputation {promotion.next.minReputation}, prestige {promotion.next.minPrestige}, and {cash(promotion.next.promotionCost)}.</span>{promotion.reasons.length>0&&<span>{promotion.reasons.join(' · ')}</span>}</div><button className="btn gold" disabled={!promotion.eligible} onClick={()=>act(promoteStudio)}>Promote Studio</button></div>}</div><div className="section-head"><div><h2>Lot Upgrades</h2><p>Permanent facilities with permanent maintenance implications already included in tier overhead.</p></div></div><div className="progression-grid">{STUDIO_UPGRADES.map(upgrade=>{const isOwned=owned.has(upgrade.id),locked=game.studio.tier<upgrade.tier,poor=game.studio.cash<upgrade.cost;return <div className={`upgrade-card ${isOwned?'owned':''} ${locked?'locked':''}`} key={upgrad )} to studio debt.</p><button className="btn wide" disabled={game.studio.debt+300000>700000} onClick={()=>act(g=>takeStudioLoan(g,250000))}>Borrow {cash(250000)}</button></div><div className="finance-card"><h4>Debt Repayment</h4><p>Reduce interest and recover a little audience trust.</p><div style={{display:'flex',gap:6}}><button className="btn small" disabled={game.studio.debt<=0||game.studio.cash<25000} onClick={()=>act(g=>repayStudioDebt(g,25000))}>Pay {cash(25000)}</button><button className="btn small" disabled={game.studio.debt<=0||game.studio.cash<100000} onClick={()=>act(g=>repayStudioDebt(g,100000))}>Pay {cash(100000)}</button></div></div></div><div className={`economy-banner ${game.studio.cash<75000?'warn':''}`}><div><b>Humiliating Rescue Package</b><span>{game.studio.lastRescueYear===game.studio.year?'Already used this year.':'Available below $75,000 cash. Receive $125,000, owe $165,000 and lose standing.'}</span></div><button className="btn red" disabled={game.studio.cash>=75000||game.studio.lastRescueYear===game.studio.year} onClick={()=>act(takeRescueFinancing)}>Call the Financiers</button></div></div>}

function ContractBoard({game,setGame,setScreen,sound,setSound}){const offers=generateContractOffers(game);const trend=getMarketTrend(game),streak=Number(game.studio.contractStreak||0);function take(job){const terms=getContractTerms(game,job);if(!confirm(`Take ${job.name} for ${cash(terms.reward)}? After quarterly costs, projected net is ${cash(terms.net)}. This uses the quarter.`))return;setGame(g=>completeContractJob(g,job.id));SFX.good();setScreen('office')}return <div className="screen"><Topbar title="Contract Board" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/><div className="section-head"><div><h2>Reliable money. Diminishing dignity.</h2><p>Repeated contract quarters reduce fees and professional standing. Making a film breaks the fatigue streak.</p></div></div><div className="ribbon"><Icon name="bolt" size={16}/><span><strong>Contract fatigue: {streak} quarter{streak===1?'':'s'}.</strong> {streak?`Current fee multiplier: ${Math.round(getContractTerms(game,offers[0]).effectiveMultiplier*100)}%.`:'Full fees are currently available.'} Market context: {trend.label}.</span></div><div className="contract-grid">{offers.map(job=>{const terms=getContractTerms(game,job);return <div className="contract-card" key={job.id}><span className="eyebrow">Quarterly contract</span><h3>{job.name}</h3><p>{job.desc}</p><div className="chips"><span className={`chip ${terms.reputation>=0?'green':'red'}`}>Reputation {terms.reputation>=0?'+':''}{terms.reputation}</span><span className={`chip ${terms.trust>=0?'green':'red'}`}>Trust {terms.trust>=0?'+':''}{terms.trust}</span><span className={`chip ${terms.prestige>=0?'gold':'red'}`}>Prestige {terms.prestige>=0?'+':''}{terms.prestige}</span></div><div className="contract-reward">{cash(terms.reward)}</div><div className="asset-note">Projected net after overhead and interest: {cash(terms.net)}</div><button className="btn gold wide" onClick={()=>take(job)}>Accept Contract</button></div>})}</div></div>}

function CastingV09({game,setGame,setScreen,sound,setSound}){const [tab,setTab]=useState('lead'),c=game.current.cast;const script=SCRIPTS.find(s=>s.id===game.current.scriptId),lead=findPerson(game,c.leadId),support=findPerson(game,c.supportId),director=findPerson(game,c.directorId);const roster=(tab==='director'?DIRECTORS:PEOPLE.filter(x=>tab!=='support'||x.id!==c.leadId)).map(person=>personForGame(game,person));function select(person){if(person.availability?.unavailable)return;SFX.tap();setGame(g=>({...g,current:{...g.current,cast:{...g.current.cast,[tab==='director'?'directorId':tab+'Id']:person.id}}}))}const ok=lead&&support&&director&&!lead.availability?.unavailable&&!support.availability?.unavailable;const fit=ok?calculateCastingFit({lead,support,director,script,relationships:game.relationships,studio:game.studio}):null;return <div className="screen"><Topbar title="Casting Room" onBack={()=>setScreen('scripts')} sound={sound} setSound={setSound}/><div className="selection-strip"><MiniPick label="Lead" person={lead}/><MiniPick label="Co-lead" person={support}/><MiniPick label="Director" person={director}/></div>{fit&&<div className="chemistry-panel"><div className="chemistry-top"><div><span className="eyebrow">Casting forecast · {script.genre}</span><h3>{lead.name} + {support.name}</h3></div><div className="chemistry-score">{fit.overall}<small>overall fit</small></div></div><div className="chemistry-grid"><div className="chemistry-metric"><label>Screen chemistry</label><b>{fit.actorChemistry}</b></div><div className="chemistry-metric"><label>Genre fit</label><b>{fit.genreFit}</b></div><div className="chemistry-metric"><label>Director control</label><b>{fit.directorFit}</b></div></div><div className="chemistry-notes">{fit.notes.map(note=><span key={note}>• {note}</span>)}</div></div>}<div className="tabs"><button className={`tab ${tab==='lead'?'on':''}`} onClick={()=>setTab('lead')}>Lead Actor</button><button className={`tab ${tab==='support'?'on':''}`} onClick={ function ProductionPlan({game,setGame,setScreen,sound,setSound}){const script=SCRIPTS.find(s=>s.id===game.current.scriptId),levels=game.current.budget.levels,posture=game.current.posture,effectsId=game.current.effectsApproach||'hybrid',specialistIds=game.current.specialistIds||[];const depts=[['cast','Cast'],['sets','Sets & Costumes'],['stunts','Stunts'],['effects','Effects'],['post','Post-production']];const departmentTotal=Math.round(script.base*(.2*BUDGET_LEVELS[levels.cast]+.2*BUDGET_LEVELS[levels.sets]+.18*BUDGET_LEVELS[levels.stunts]+.18*BUDGET_LEVELS[levels.effects]+.24*BUDGET_LEVELS[levels.post])),effects=EFFECTS_APPROACHES.find(item=>item.id===effectsId)||EFFECTS_APPROACHES[2],specialists=specialistIds.map(id=>SPECIALISTS.find(item=>item.id===id)).filter(Boolean),total=departmentTotal+effects.cost+specialists.reduce((sum,item)=>sum+item.fee,0)+Number(game.current.demandCosts||0),director=findPerson(game,game.current.cast.directorId);function setLevel(k,v){SFX.tap();setGame(g=>({...g,current:{...g.current,budget:{...g.current.budget,levels:{...g.current.budget.levels,[k]:v}}}}))}function toggleSpecialist(id){setGame(g=>{const ids=g.current.specialistIds||[],has=ids.includes(id);if(!has&&ids.length>=2)return g;return {...g,current:{...g.current,specialistIds:has?ids.filter(x=>x!==id):[...ids,id]}}});SFX.tap()}function begin(){const fatigueByTalent={};for(const id of [game.current.cast.leadId,game.current.cast.supportId])fatigueByTalent[id]=Number(game.talentStatus?.[id]?.fatigue||0);setGame(g=>({...g,current:{...g.current,status:'SHOOTING',spend:total,sceneIndex:0,scenes:[],incidents:[],injuries:[],signatures:[],delays:0,fatigueByTalent,facilityBonuses:calculateFacilityBonuses(g.studio),studioUpgrades:[...(g.studio.upgrades||[])],marketGenre:getMarketTrend(g).genre,budget:{...g.current.budget,approved:total}},studio:{...g.studio,cash:g.studio.cash-total}}));SFX.good();setScreen('production')}return <div className="screen"><Topbar title="Production Plan" onBack={()=>setScreen('casting')} sound={sound} setSound={setSound}/><div className="plan-grid"><div><div className="panel"><h3>Department Budget</h3><p>Stunt and effects spending now directly change reliability, spectacle and injury risk.</p>{depts.map(([k,label])=><div className="budget-row" key={k}><b>{label}</b><span>{BUDGET_NAMES[levels[k]]}</span><div className="tier-buttons">{BUDGET_NAMES.map((n,i)=><button key={n} className={`tier ${levels[k]===i?'on':''}`} onClick={()=>setLevel(k,i)}>{n}</button>)}</div></div>)}</div><div className="panel" style={{marginTop:12}}><h3>Effects Approach</h3><p>Choose the production's visual-effects philosophy. Genre fit and funding both matter.</p><div className="approach-grid">{EFFECTS_APPROACHES.map(item=><button key={item.id} className={`approach-card ${effectsId===item.id?'on':''}`} onClick={()=>{SFX.tap();setGame(g=>({...g,current:{...g.current,effectsApproach:item.id}}))}}><b>{item.name}</b><span>{item.desc}</span><em>{cash(item.cost)} · spectacle +{item.spectacle} · reliability +{item.reliability}</em></button>)}</div></div><div className="panel" style={{marginTop:12}}><h3>Hire Specialists</h3><p>Hire up to two. Compatibility changes how much of their skill reaches the set.</p><div className="specialist-grid">{SPECIALISTS.map(item=>{const on=specialistIds.includes(item.id),locked=!on&&specialistIds.length>=2,compat=specialistCompatibility(item,director);return <button key={item.id} disabled={locked} className={`specialist-card ${on?'on':''}`} onClick={()=>toggleSpecialist(item.id)}><b>{item.name} · {item.type.replaceAll('_',' ')}</b><span>{item.desc}</span><em>{cash(item.fee)} · skill {item.skill} · director {compat>=0?'+':''}{compat}</em></button>})}</div></div></div><div><div className="panel"><h3>Production Posture</h3><p>Posture now alters accident risk as well as creative variance.</p><div className="postures">{POSTURES.map(p=><button key={p.id} className={`posture ${posture===p.id?'on':''}`} onClick={()=>{SFX.tap();setG function Production({game,setGame,setScreen,sound,setSound}){const project=game.current,script=SCRIPTS.find(s=>s.id===project.scriptId),scene=script.scenes[project.sceneIndex],outcome=project.pendingOutcome,stunt=isStuntScene(scene),lead=findPerson(game,project.cast.leadId),support=findPerson(game,project.cast.supportId),director=findPerson(game,project.cast.directorId);function choose(choiceIndex,stuntApproachId=null){if(outcome)return;const result=calculateProductionOutcome({project,script,scene,choiceIndex,stuntApproachId,lead,support,director,relationships:game.relationships,talentStatus:game.talentStatus,marketTrend:getMarketTrend(game),budgetLevels:BUDGET_LEVELS,postures:POSTURES});SFX[result.injury?'bad':result.quality>=60?'good':result.quality<40?'bad':'tap']();setGame(g=>({...g,current:{...g.current,pendingOutcome:result}}))}function next(){const result=project.pendingOutcome,savedScene={name:scene.name,type:scene.type,...result,asset:script.asset.id},leadId=project.cast.leadId,fatigue={...(project.fatigueByTalent||{}),[leadId]:clamp(Number(project.fatigueByTalent?.[leadId]||0)+Number(result.fatigueDelta||0))};const nextCurrent={...project,scenes:[...project.scenes,savedScene],pendingOutcome:null,incidents:[...(project.incidents||[]),...(result.incident?[result.incident]:[])],injuries:[...(project.injuries||[]),...(result.injury?[result.injury]:[])],signatures:[...(project.signatures||[]),...(result.signatureScene?[result.signatureScene]:[])],delays:Number(project.delays||0)+Number(result.delayDays||0),fatigueByTalent:fatigue};if(project.sceneIndex<script.scenes.length-1){setGame(g=>({...g,current:{...nextCurrent,sceneIndex:project.sceneIndex+1}}));SFX.tap()}else{setGame(g=>({...g,current:{...nextCurrent,status:'POST'}}));SFX.good();setScreen('post')}}return <div className="screen soundstage"><Topbar title="Soundstage" sound={sound} setSound={setSound} right={<span className="chip gold">Scene {project.sceneIndex+1}/{script.scenes.length}</span>}/><div class function NewStudioModal({onClose,onCreate}){const [name,setName]=useState('Hammy Pictures');function submit(event){event.preventDefault();onCreate(name)}return <div className="modal-bg" role="dialog" aria-modal="true"><form className="modal" onSubmit={submit}><span className="eyebrow">New campaign</span><h2>Name the Studio</h2><p>This becomes the company on every poster, award and humiliating loan document.</p><div className="field"><label htmlFor="studio-name">Studio name</label><input id="studio-name" value={name} maxLength="28" autoFocus onChange={event=>setName(event.target.value)}/></div><div className="demand-actions" style={{marginTop:14}}><button className="btn gold" type="submit" disabled={!name.trim()}>Open the Lot</button><button className="btn ghost" type="button" onClick={onClose}>Cancel</button></div></form></div>}

function gameReducer(state,action){if(action?.type==='REPLACE')return migrateSave(action.state)||state;if(action?.type==='UPDATE')return typeof action.updater==='function'?action.updater(state):action.updater||state;return state}

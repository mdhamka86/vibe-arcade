const SAVE_KEY='oneMoreTake_save_v1',BACKUP_KEY='oneMoreTake_save_v1_backup';
const freshStudio=(name='Hammy Pictures')=>({saveVersion:1,studio:{name,cash:250000,reputation:12,trust:50,prestige:5,year:1,quarter:1},archive:[],current:null,sound:true,createdAt:new Date().toISOString()});
function loadSave(){try{const s=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');return s&&s.saveVersion===1&&s.studio?s:null}catch{return null}}
function persist(s){try{const old=localStorage.getItem(SAVE_KEY);if(old)localStorage.setItem(BACKUP_KEY,old);localStorage.setItem(SAVE_KEY,JSON.stringify(s));return true}catch{return false}}
function hashSeed(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function seeded(seed,n){let x=(seed+n*2654435761)>>>0;x^=x<<13;x^=x>>>17;x^=x<<5;return (x>>>0)/4294967295}
function cash(n){return '$'+Math.round(n).toLocaleString()}
function clamp(n,a=0,b=100){return Math.max(a,Math.min(b,n))}

const SFX={ctx:null,on:true,tone(freq=440,dur=.07,type='sine',gain=.035){if(!this.on)return;try{this.ctx=this.ctx||new(window.AudioContext||window.webkitAudioContext)();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,this.ctx.currentTime+dur);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+dur)}catch{}},tap(){this.tone(520,.05)},good(){this.tone(520,.08,'triangle');setTimeout(()=>this.tone(780,.12,'triangle'),70)},bad(){this.tone(180,.15,'sawtooth')},premiere(){this.tone(220,.14,'triangle');setTimeout(()=>this.tone(440,.16,'triangle'),120);setTimeout(()=>this.tone(660,.22,'triangle'),240)}};

yle={{fontFamily:'var(--font-display)',fontSize:27,color:'var(--gold)'}}>{last.audience}</b><small style={{display:'block',color:'var(--muted)'}}>AUDIENCE</small></div></div></div></>}<div className="footer-note">ONE MORE TAKE! · vertical slice v0.1</div></div>}

function ScriptDesk({game,setGame,setScreen,sound,setSound}){const selected=game.current?.scriptId;function choose(s){SFX.tap();setGame(g=>({...g,current:{projectId:`film-${Date.now()}`,seed:hashSeed(s.id+Date.now()),status:'DEVELOPMENT',scriptId:s.id,title:s.title,cast:{leadId:null,supportId:null,directorId:null},budget:{levels:{cast:2,sets:2,stunts:2,effects:2,post:2},approved:s.base},posture:'balanced',sceneIndex:0,scenes:[],spend:0}}))}return <div className="screen"><Topbar title="The Script Desk" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/><div className="section-head"><div><h2>Three pitches. One production slot.</h2><p>Rejecting all three costs nothing except another quarter of your life.</p></div></div><div className="script-grid">{SCRIPTS.map(s=><div key={s.id} className={`paper-card clickable ${selected===s.id?'selected':''}`} onClick={()=>choose(s)}><RemoteImage asset={s.asset} className="script-photo" alt="Film production atmosphere"/><div className="paper-inner"><span className="genre">{s.genre} · {s.tone}</span><h3>{s.title}</h3><p>{s.premise}</p><div className="chips"><span className="chip">Budget {cash(s.base)}</span><span className="chip">Commercial {s.commercial}</span><span className="chip">Prestige {s.prestige}</span></div></div></div>)}</div>{selected&&<div style={{position:'sticky',bottom:8,marginTop:15}}><button className="btn gold wide" onClick={()=>{SFX.good();setScreen('casting')}}><Icon name="people"/>Take It to Casting</button></div>}</div>}

function TalentCard({person,selected,onClick}){return <div className={`card talent-card clickable ${selected?'selected':''}`} onClick={onClick}><div className="portrait"><Portrait person={person}/></div><div className="card-body"><div className="talent-meta"><div><span className="kicker">{person.role} · age {person.age}</span><h3>{person.name}</h3></div><span className="salary">{cash(person.salary)}</span></div><p>{person.flavor}</p><div className="bars">{Object.entries(person.skills).map(([k,v])=><div className="barrow" key={k}><span>{k}</span><div className="bar"><i style={{width:v+'%'}}/></div><b>{v}</b></div>)}</div><div className="chips">{person.traits.slice(0,3).map(t=><span className="chip gold" key={t}>{t}</span>)}</div></div></div>}
function MiniPick({label,person}){return <div className="pick"><div className="mini-face">{person?<Portrait person={person} mini/>:<FallbackArt type="camera"/>}</div><div style={{minWidth:0}}><label>{label}</label><b>{person?.name||'Not selected'}</b></div></div>}
function Casting({game,setGame,setScreen,sound,setSound}){const [tab,setTab]=useState('lead'),c=game.current.cast;const lead=PEOPLE.find(x=>x.id===c.leadId),support=PEOPLE.find(x=>x.id===c.supportId),director=DIRECTORS.find(x=>x.id===c.directorId);const roster=tab==='director'?DIRECTORS:PEOPLE.filter(x=>tab!=='support'||x.id!==c.leadId);function select(id){SFX.tap();setGame(g=>({...g,current:{...g.current,cast:{...g.current.cast,[tab==='director'?'directorId':tab+'Id']:id}}}))}const ok=lead&&support&&director;return <div className="screen"><Topbar title="Casting Room" onBack={()=>setScreen('scripts')} sound={sound} setSound={setSound}/><div className="selection-strip"><MiniPick label="Lead" person={lead}/><MiniPick label="Co-lead" person={support}/><MiniPick label="Director" person={director}/></div><div className="tabs"><button className={`tab ${tab==='lead'?'on':''}`} onClick={()=>setTab('lead')}>Lead Actor</button><button className={`tab ${tab==='support'?'on':''}`} onClick={()=>setTab('support')}>Co-lead</button><button className={`tab ${tab==='director'?'on':''}`} onClick={()=>setTab('director')}>Director</button></div><div className="grid">{roster.map(p=><TalentCard key={p.id} person={p} selected={(tab==='lead'?c.leadId:tab==='support'?c.supportId:c.directorId)===p.id} onClick={()=>select(p.id)}/>)}</div>{ok&&<div style={{position:'sticky',bottom:8,marginTop:15}}><button className="btn gold wide" onClick={()=>{SFX.good();setScreen('plan')}}><Icon name="money"/>Build the Production Plan</button></div>}</div>}

function ProductionPlan({game,setGame,setScreen,sound,setSound}){const script=SCRIPTS.find(s=>s.id===game.current.scriptId),levels=game.current.budget.levels,posture=game.current.posture;const depts=[['cast','Cast'],['sets','Sets & Costumes'],['stunts','Stunts'],['effects','Effects'],['post','Post-production']];const total=Math.round(script.base*(.2*BUDGET_LEVELS[levels.cast]+.2*BUDGET_LEVELS[levels.sets]+.18*BUDGET_LEVELS[levels.stunts]+.18*BUDGET_LEVELS[levels.effects]+.24*BUDGET_LEVELS[levels.post]));function setLevel(k,v){SFX.tap();setGame(g=>({...g,current:{...g.current,budget:{...g.current.budget,levels:{...g.current.budget.levels,[k]:v},approved:total}}}))}function begin(){setGame(g=>({...g,current:{...g.current,status:'SHOOTING',spend:total,sceneIndex:0,scenes:[]},studio:{...g.studio,cash:g.studio.cash-total}}));SFX.good();setScreen('production')}return <div className="screen"><Topbar title="Production Plan" onBack={()=>setScreen('casting')} sound={sound} setSound={setSound}/><div className="plan-grid"><div className="panel"><h3>Department Budget</h3><p>Spending helps, with diminishing returns. Reckless remains an adjective, not financial advice.</p>{depts.map(([k,label])=><div className="budget-row" key={k}><b>{label}</b><span>{BUDGET_NAMES[levels[k]]}</span><div className="tier-buttons">{BUDGET_NAMES.map((n,i)=><button key={n} className={`tier ${levels[k]===i?'on':''}`} onClick={()=>setLevel(k,i)}>{n}</button>)}</div></div>)}</div><div><div className="panel"><h3>Production Posture</h3><p>How much chaos are we inviting onto the set?</p><div className="postures">{POSTURES.map(p=><button key={p.id} className={`posture ${posture===p.id?'on':''}`} onClick={()=>{SFX.tap();setGame(g=>({...g,current:{...g.current,posture:p.id}}))}}><b>{p.name}</b><span>{p.desc}</span></button>)}</div></div><div className="panel" style={{marginTop:12}}><h3>Approval</h3><p>{script.title}</p><div className="stats" style={{gridTemplateColumns:'1fr 1fr'}}><div className="stat gold"><label>Projected Spend</label><b>{cash(total)}</b></div><div className={`stat ${total>game.studio.cash?'red':'green'}`}><label>Cash After</label><b>{cash(game.studio.cash-total)}</b></div></div><button className="btn gold wide" disabled={total>game.studio.cash} onClick={begin}><Icon name="camera"/>Begin Production</button></div></div></div></div>}

function Production({game,setGame,setScreen,sound,setSound,setToast}){const project=game.current,script=SCRIPTS.find(s=>s.id===project.scriptId),scene=script.scenes[project.sceneIndex],outcome=project.pendingOutcome;const posture=POSTURES.find(p=>p.id===project.posture);function choose(choiceIndex){if(outcome)return;const lead=PEOPLE.find(p=>p.id===project.cast.leadId),support=PEOPLE.find(p=>p.id===project.cast.supportId),director=DIRECTORS.find(p=>p.id===project.cast.directorId);const relevant=(lead.skills.Acting+support.skills.Acting+director.skills.Vision)/3;const budgetAvg=Object.values(project.budget.levels).reduce((a,b)=>a+b,0)/5;const roll=seeded(project.seed,project.sceneIndex*7+choiceIndex)*posture.variance*2-posture.variance;let quality=clamp(Math.round(42+relevant*.34+budgetAvg*4+posture.bonus+choiceIndex*(choiceIndex===1?2:-1)+roll-script.difficulty*.18));const band=quality>=78?'ICONIC':quality>=64?'STRONG':quality>=46?'USABLE':quality>=30?'ROUGH':'CATASTROPHIC';const good=quality>=60,bad=quality<40;const texts=good?['The crew briefly remembers why they entered the industry.','The take lands. Even the boom operator looks emotional.','Somehow, this is cinema.']:bad?['The set falls silent in the specific way that means money has died.','Nobody says “cut” because nobody wishes to accept responsibility.','The footage exists. That is the kindest available description.']:['It will cut together. Probably. With music.'];const result={choice:scene.choices[choiceIndex][0],quality,band,text:texts[Math.floor(seeded(project.seed,99+project.sceneIndex)*texts.length)]};SFX[good?'good':bad?'bad':'tap']();setGame(g=>({...g,current:{...g.current,pendingOutcome:result}}))}
function next(){const result=project.pendingOutcome;const savedScene={name:scene.name,type:scene.type,...result,asset:script.asset.id};if(project.sceneIndex<script.scenes.length-1){setGame(g=>({...g,current:{...g.current,scenes:[...g.current.scenes,savedScene],sceneIndex:g.current.sceneIndex+1,pendingOutcome:null}}));SFX.tap()}else{setGame(g=>({...g,current:{...g.current,scenes:[...g.current.scenes,savedScene],status:'POST',pendingOutcome:null}}));SFX.good();setScreen('post')}}return <div className="screen soundstage"><Topbar title="Soundstage" sound={sound} setSound={setSound} right={<span className="chip gold">Scene {project.sceneIndex+1}/{script.scenes.length}</span>}/><div className="production-hero"><RemoteImage asset={script.asset} style={{position:'absolute',inset:0}} alt="Production scene"/><div className="scene-title"><span className="eyebrow">{scene.type}</span><h2>{scene.name}</h2></div></div><div className="progress">{script.scenes.map((_,i)=><i key={i} className={i<project.sceneIndex?'done':i===project.sceneIndex?'now':''}/>)}</div><div className="event-box"><h3>Production Crisis</h3><p>{scene.event}</p><div className="choices">{scene.choices.map((c,i)=><button className="choice" disabled={!!outcome} key={c[0]} onClick={()=>choose(i)}><b>{c[0]}</b><span>{c[1]}</span><em>{i===0?'SAFE-ish':i===1?'HIGH VARIANCE':'CREATIVE ESCAPE'}</em></button>)}</div>{outcome&&<div className={`outcome ${outcome.quality>=60?'good':outcome.quality<40?'bad':''}`}><b>{outcome.band} · Scene quality {outcome.quality}</b><p>{outcome.text}</p></div>}{outcome&&<button className="btn gold wide" style={{marginTop:12}} onClick={next}>{project.sceneIndex<script.scenes.length-1?'Next Scene':'Wrap Production'} <Icon name="play" size={14}/></button>}</div><AssetCredit asset={script.asset}/></div>}

function Post({game,setGame,setScreen,sound,setSound}){const [choice,setChoice]=useState(null);const options=[['Tighten the edit','Raises coherence and trims the weakest scene.',5],['Add an enormous score','Raises spectacle. Subtlety leaves the building.',4],['Hide the worst take','Raises the lowest scene quality.',6],['Release the beautiful mess','No cost. Originality and risk rise.',2]];function proceed(){const bonus=options[choice][2];setGame(g=>({...g,current:{...g.current,status:'MARKETING',postChoice:options[choice][0],postBonus:bonus}}));SFX.good();setScreen('release')}return <div className="screen"><Topbar title="Editing Room" onBack={null} sound={sound} setSound={setSound}/><div className="hero"><RemoteImage asset={ASSETS.camera} className="hero-art" alt="Cinema camera"/><div className="hero-copy"><span className="eyebrow">The footage is technically all here</span><h2>Save it in post.</h2><p className="subcopy">You have enough time and money for one decisive intervention.</p></div></div><div className="choices">{options.map((o,i)=><button key={o[0]} className={`choice ${choice===i?'selected':''}`} style={choice===i?{borderColor:'var(--gold)',background:'rgba(229,185,77,.08)'}:{}} onClick={()=>{SFX.tap();setChoice(i)}}><b>{o[0]}</b><span>{o[1]}</span></button>)}</div>{choice!==null&&<button className="btn gold wide" style={{marginTop:12}} onClick={proceed}>Lock the Cut <Icon name="check" size={15}/></button>}<AssetCredit asset={ASSETS.camera}/></div>}

function Release({game,setGame,setScreen,sound,setSound}){const [campaign,setCampaign]=useState(null),[spend,setSpend]=useState(1);const campaigns=[['Sell the Star','Fame drives the opening weekend.'],['Sell the Spectacle','The trailer contains every explosion.'],['Mystery Teaser','Nobody knows what the film is, including the cast.']];const amounts=[10000,25000,50000];function release(){const p=game.current,script=SCRIPTS.find(s=>s.id===p.scriptId),lead=PEOPLE.find(x=>x.id===p.cast.leadId),avg=p.scenes.reduce((a,s)=>a+s.quality,0)/p.scenes.length+p.postBonus;const critic=clamp(Math.round(avg*.72+script.prestige*.22+(campaign===2?4:0)+(seeded(p.seed,200)*12-6)));const audience=clamp(Math.round(avg*.63+script.commercial*.27+lead.fame*.1+(campaign===1?4:0)+(seeded(p.seed,201)*14-7)));const marketing=amounts[spend],gross=Math.round((45000+script.commercial*1400+audience*2100+lead.fame*600)*(1+spend*.28)*(campaign===0?1.06:1));const profit=Math.round(gross*.62-p.spend-marketing);const review=critic>=80?'A baffling, beautiful catastrophe that somehow becomes cinema.':critic>=65?'Uneven, energetic and saved by one genuinely terrific sequence.':critic>=45?'The footage exists. Several performances do too.':'An expensive hostage situation involving a camera.';const film={id:p.projectId,title:script.title,genre:script.genre,tagline:script.tagline,assetId:script.asset.id,critic,audience,gross,profit,review,cast:p.cast,scenes:p.scenes,year:game.studio.year,quarter:game.studio.quarter};setGame(g=>({...g,current:{...g.current,status:'PREMIERE',release:film,marketing},studio:{...g.studio,cash:g.studio.cash-marketing},}));SFX.premiere();setScreen('premiere')}return <div className="screen"><Topbar title="Release Office" sound={sound} setSound={setSound}/><div className="panel"><h3>Campaign Angle</h3><p>How aggressively are we going to describe what happened?</p><div className="choices">{campaigns.map((c,i)=><button key={c[0]} className="choice" style={campaign===i?{borderColor:'var(--gold)',background:'rgba(229,185,77,.08)'}:{}} onClick={()=>{SFX.tap();setCampaign(i)}}><b>{c[0]}</b><span>{c[1]}</span></button>)}</div></div><div className="panel" style={{marginTop:12}}><h3>Marketing Spend</h3><p>Cash left: {cash(game.studio.cash)}</p><div className="tier-buttons">{amounts.map((a,i)=><button key={a} className={`tier ${spend===i?'on':''}`} onClick={()=>setSpend(i)}>{cash(a)}</button>)}</div></div>{campaign!==null&&<button className="btn gold wide" style={{marginTop:12}} disabled={amounts[spend]>game.studio.cash} onClick={release}><Icon name="star"/>Book the Premiere</button>}</div>}

function Premiere({game,setGame,setScreen}){const film=game.current.release,script=SCRIPTS.find(s=>s.id===game.current.scriptId);const [beat,setBeat]=useState(0);const beats=useMemo(()=>[
 {small:`${game.studio.name.toUpperCase()} PRESENTS`,big:film.title,line:film.tagline},
 ...film.scenes.map((s,i)=>({small:`SCENE ${i+1}`,big:s.name,line:s.quality>=70?'THIS WAS NOT IN THE INSURANCE FORM.':s.quality<40?'THE EDITOR HAS REQUESTED AN ALIAS.':s.choice.toUpperCase()})),
 {small:'CRITICS HAVE SPOKEN',big:`${film.critic}%`,line:film.review},
 {small:'AUDIENCES HAVE SPOKEN LOUDER',big:`${film.audience}%`,line:`Opening soon. Regrets already available.`}
],[]);useEffect(()=>{const t=setInterval(()=>setBeat(b=>{if(b>=beats.length-1){clearInterval(t);return b}return b+1}),1800);return()=>clearInterval(t)},[]);function finish(){const profit=film.profit;const nextQ=game.studio.quarter===4?1:game.studio.quarter+1,nextY=game.studio.quarter===4?game.studio.year+1:game.studio.year;setGame(g=>{const ng={...g,archive:[...g.archive,film],current:null,studio:{...g.studio,cash:g.studio.cash+film.gross*.62,reputation:clamp(g.studio.reputation+Math.round((film.audience-50)/12)),trust:clamp(g.studio.trust+Math.round((film.audience-film.critic)/18)),prestige:clamp(g.studio.prestige+Math.round((film.critic-55)/15)),quarter:nextQ,year:nextY}};return ng});setScreen('results')}const b=beats[beat];return <div className="premiere film-bars"><RemoteImage asset={script.asset} className="premiere-bg" alt="Film trailer backdrop"/><button className="btn ghost small trailer-skip" onClick={finish}>Skip / Results</button><div className="trailer-copy" key={beat}><div className="present">{b.small}</div><h1>{b.big}</h1><p>{b.line}</p>{beat===beats.length-1&&<button className="btn gold" onClick={finish}>See the Numbers</button>}</div></div>}

function Results({game,setScreen,sound,setSound}){const film=game.archive[game.archive.length-1],asset=SCRIPTS.find(s=>s.title===film.title)?.asset||ASSETS.heroSet;return <div className="screen"><Topbar title="Premiere Night" sound={sound} setSound={setSound}/><div className="result-hero"><div className="result-poster"><RemoteImage asset={asset} style={{position:'absolute',inset:0}}/><div className="poster-copy"><small>{film.genre.toUpperCase()}</small><h2>{film.title}</h2><p>{film.tagline}</p></div></div><div className="scores"><div className="score"><b>{film.critic}%</b><span>Critics</span></div><div className="score"><b>{film.audience}%</b><span>Audience</span></div><div className="score"><b style={{color:film.profit>=0?'#8ed5a9':'#ef837a'}}>{film.profit>=0?'+':''}{cash(film.profit)}</b><span>Profit</span></div></div><div className="review">“{film.review}”</div><button className="btn gold wide" style={{marginTop:14}} onClick={()=>setScreen('office')}>Back to the Studio</button></div></div>}

function Roster({setScreen,sound,setSound}){return <div className="screen"><Topbar title="Talent Roster" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/><div className="section-head"><div><h2>The people making this possible</h2><p>“Possible” remains under review.</p></div></div><div className="grid">{[...PEOPLE,...DIRECTORS].map(p=><TalentCard key={p.id} person={p}/>)}</div></div>}
function Archive({game,setScreen,sound,setSound}){return <div className="screen"><Topbar title="Movie Archive" onBack={()=>setScreen('office')} sound={sound} setSound={setSound}/>{!game.archive.length?<div className="panel" style={{textAlign:'center',padding:30}}><Icon name="archive" size={46}/><h3 style={{marginTop:12}}>No films. No scandals. No legacy.</h3><p>Start a production and make history or at least content.</p><button className="btn gold" onClick={()=>setScreen('scripts')}>Read Scripts</button></div>:<div className="archive-grid">{game.archive.map(f=>{const asset=SCRIPTS.find(s=>s.title===f.title)?.asset||ASSETS.heroSet;return <div className="archive-poster" key={f.id}><RemoteImage asset={asset} style={{position:'absolute',inset:0}}/><div className="copy"><small>Y{f.year} · Q{f.quarter} · {f.genre}</small><h3>{f.title}</h3><p>{f.audience}% audience · {f.profit>=0?'+':''}{cash(f.profit)}</p></div></div>})}</div>}</div>}

function NewStudioModal({onClose,onCreate}){const [name,setName]=useState('Hammy Pictures');return <div className="modal-bg"><div className="modal"><h2>Name Your Studio</h2><p>Future award speeches, lawsuits and unnecessary sequels will use this name.</p><div className="field"><label>Studio name</label><input value={name} maxLength={28} onChange={e=>setName(e.target.value)}/></div><div style={{display:'flex',gap:8,marginTop:14}}><button className="btn ghost" onClick={onClose}>Cancel</button><button className="btn gold" style={{flex:1}} disabled={!name.trim()} onClick={()=>onCreate(name.trim())}>Open the Gates</button></div></div></div>}

function App(){
 const initial=loadSave();
 const [game,setGameRaw]=useState(initial||freshStudio());
 const [hasSave,setHasSave]=useState(!!initial);
 const [screen,setScreen]=useState('title');
 const [newModal,setNewModal]=useState(false);
 const [toast,setToast]=useState(null);
 const setGame=updater=>setGameRaw(prev=>typeof updater==='function'?updater(prev):updater);
 const sound=game.sound!==false;
 function setSound(v){SFX.on=v;setGame(g=>({...g,sound:v}))}
 useEffect(()=>{SFX.on=sound;if(screen!=='title'){persist(game);setHasSave(true)}},[game,screen]);
 function showToast(t){setToast(t);setTimeout(()=>setToast(null),2200)}
 function create(name){const ng=freshStudio(name);setGameRaw(ng);setNewModal(false);setScreen('office');persist(ng);setHasSave(true);SFX.good()}
 function newFilm(){setGame(g=>({...g,current:null}));setScreen('scripts');SFX.tap()}
 return <>{screen==='title'&&<Title saved={hasSave?loadSave():null} onNew={()=>setNewModal(true)} onContinue={()=>{const s=loadSave();if(s){setGameRaw(s);setScreen('office');SFX.good()}}} sound={sound} setSound={setSound}/>} {screen==='office'&&<Office game={game} setScreen={setScreen} sound={sound} setSound={setSound} newFilm={newFilm}/>} {screen==='scripts'&&<ScriptDesk game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='casting'&&<Casting game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='plan'&&<ProductionPlan game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='production'&&<Production game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound} setToast={showToast}/>} {screen==='post'&&<Post game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='release'&&<Release game={game} setGame={setGame} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='premiere'&&<Premiere game={game} setGame={setGame} setScreen={setScreen}/>} {screen==='results'&&<Results game={game} setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='talent'&&<Roster setScreen={setScreen} sound={sound} setSound={setSound}/>} {screen==='archive'&&<Archive game={game} setScreen={setScreen} sound={sound} setSound={setSound}/>} {newModal&&<NewStudioModal onClose={()=>setNewModal(false)} onCreate={create}/>} {toast&&<div className="toast">{toast}</div>}</>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

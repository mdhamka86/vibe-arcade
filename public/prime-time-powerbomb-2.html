  const d = new Date(ts), now = new Date();
  const time = d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });

  return `${date}, ${time}`;

  { key:"stamina",    label:"Conditioning", short:"CND", icon:"heart",  desc:"Gas tank for long matches and tours.",    colour:"#6ee7a8" },
];
const SKILL_KEYS = SKILL_DEFS.map(s => s.key);
const skillDef = (k) => SKILL_DEFS.find(s => s.key === k);

function styleLabel(s) {
  const top = [...SKILL_DEFS].sort((a,b)=>s[b.key]-s[a.key])[0].key;
  return { tech:"Technical wizard", highflying:"High-flyer", strength:"Powerhouse",
    charisma:"Natural star", promo:"Mic general", stamina:"Iron horse" }[top];
}
function overallFor(skills, promo) {
  const w = promo ? promo.rewards : {};
  let num = 0, den = 0;
  for (const k of SKILL_KEYS) { const wt = (w[k] || 1); num += skills[k] * wt; den += wt; }
  return num / den;
}

function buildRoster(promoId) {
  const p = promoById(promoId);
  const seeds = ROSTER_SEED[promoId];
  return seeds.map((sd, i) => {
    const base = 30 + p.tier * 12 - i * 3; // roster ranked strongest first
    const skills = {};
    for (const k of SKILL_KEYS) skills[k] = clamp(Math.round(base + rand(-8, 12)), 12, 97);
    const wins = randInt(3, 40), losses = randInt(2, 30);
    return {
      id: promoId + "-" + i,
      name: sd[0], nick: sd[1] || null,
      align: sd[2] || pick(["face","heel","tweener"]),
      hometown: sd[3] || "parts unknown",
      age: (typeof sd[4] === "number" && sd[4] > 0) ? sd[4] : randInt(24, 42),
      blurb: sd[5] || "A road-hardened veteran of this circuit who lets the work do the talking.",
      skills, over: clamp(Math.round(base + rand(-4, 10)), 15, 96),
      hue: HUES[(i + p.tier) % HUES.length],
      wins, losses,
      // leaderboard points: seeded from record + overall, then updated weekly
      points: Math.round(wins * 3 - losses * 1.5 + base),
      form: [], // last few results, "W"/"L", newest first
    };
  }).sort((a,b)=> (b.points||0) - (a.points||0));
}

// ============================================================
// THE ARSENAL — every wrestler owns a set of named signature moves (one per spot
// type) and a finisher. The match play-by-play calls them by name, so the ring
// work becomes personal: "Hammy connects with the Lion City Lariat!" These pools
// seed a fresh wrestler; the player can rename any of them from the Career tab.
// ============================================================
const FINISHER_NAMES = [
  "the Merlion Driver","the Skyline Slam","the Final Verse","the Last Call","the Neon Cutter",
  "the Overdrive Bomb","the Blackout","the Signature","the Exclamation Point","the Curtain Call",
  "the Prime Time Powerbomb","the Knockout Piledriver","the Reverse Gravity","the Headline Hook",
  "the Sledgehammer Lariat","the Ascension","the Full Stop","the Main Event","the Lights Out",
];
const MOVE_POOLS = {
  chain:   ["the Grapevine","a crisp arm-drag","the Cravate","a textbook takedown","the Chain Sequence","a slick hammerlock"],
  strike:  ["a thunderous chop","the Machine-Gun Jabs","a spinning back-fist","the Rolling Elbow","a stiff forearm","the Knife-Edge"],
  fly:     ["a picture-perfect moonsault","the Corkscrew Plancha","a springboard crossbody","the Shooting Star","a Fosbury flop","the 450 Splash"],
  mic:     ["a defiant taunt","the Crowd Callout","a mocking pose","the Signature Strut","a hush-the-crowd gesture","the Air Guitar"],
  rest:    ["a grounded headlock","the Chinlock","a measured breather","the Cravate hold","a tactical rest","the Body Scissors"],
  highspot:["the Dive Through the Table","a top-rope dive to the floor","the Suicide Dive","a moonsault to the ramp","the Coast-to-Coast","a balcony leap"],
};
function seedArsenal(seedStr) {
  // deterministic-ish pick per wrestler so their moveset is stable
  const h = (s) => { let x = 0; for (let i = 0; i < s.length; i++) x = (x * 31 + s.charCodeAt(i)) >>> 0; return x; };
  const moves = {};
  for (const k of Object.keys(MOVE_POOLS)) {
    const pool = MOVE_POOLS[k];
    moves[k] = pool[h(seedStr + k) % pool.length];
  }
  return moves;
}
function seedFinisher(seedStr) {
  const h = (s) => { let x = 0; for (let i = 0; i < s.length; i++) x = (x * 31 + s.charCodeAt(i)) >>> 0; return x; };
  return FINISHER_NAMES[h(seedStr + "fin") % FINISHER_NAMES.length];
}

function beatOutcome(state, spot, wr, promo) {
  const g = gimmickById(wr.gimmick);
  const skill = wr.skills[spot.skill];
  const cultureW = promo.rewards[spot.skill] || 1;
  const fatiguePenalty = state.fatigue > 60 ? (state.fatigue - 60) * 0.35 : 0;
  const roll = skill * cultureW + rand(-14, 14) - fatiguePenalty;
  let injuryRisk = spot.risk;
  if (g.eff.injury) injuryRisk *= g.eff.injury;
  if (wr.traits.includes("injuryProne")) injuryRisk *= 1.4;
  if (wr.traits.includes("ironMan")) injuryRisk *= 0.5;
  if (g.eff.highspot && (spot.id === "fly" || spot.id === "highspot")) injuryRisk *= 1.15;
  let botchChance = 0.05 + (spot.risk * 0.6) + fatiguePenalty * 0.004;
  if (g.eff.botch) botchChance *= g.eff.botch;
  if (wr.traits.includes("botchy")) botchChance *= 1.6;
  if (wr.traits.includes("ringGeneral")) botchChance *= 0.6;
  const botched = chance(clamp(botchChance, 0, 0.6)) && roll < skill * cultureW;
  const injured = chance(clamp(injuryRisk, 0, 0.4));
  let quality = spot.quality * (0.6 + (roll / 120));
  let heat = spot.heat;
  if (botched) { quality *= 0.35; heat -= 8; }
  if (g.eff.read && spot.id === "mic") heat *= g.eff.read;
  if (g.eff.techUp && spot.skill === "tech") quality *= g.eff.techUp;
  return { quality: round1(clamp(quality, 0, 30)), heat, gas: Number(spot.gas) || 0, botched, injured, roll: Math.round(roll) };
}

function makeNews(worlds) {

function newAngle(roster) {
  if (!roster || roster.length < 2) return null;
  const arc = pick(ANGLE_ARCS);
  const n = roster.length;
  const champ = roster[0];                         // strongest = champion
  const topHalf = roster.slice(0, Math.max(2, Math.ceil(n / 2)));
  const botHalf = roster.slice(Math.max(1, Math.ceil(n / 2)));
  const mid = roster.slice(1, n - 1).length ? roster.slice(1, n - 1) : roster.slice(1);
  const distinct = (x, y) => x && y && x.name !== y.name;
  // pick from `pool`, avoiding `avoid`; fall back to the pool head, then roster
  const pickFrom = (pool, avoid) => {
    const opts = pool.filter(w => w && (!avoid || w.name !== avoid.name));
    return opts.length ? pick(opts) : (pool[0] || roster.find(w => !avoid || w.name !== avoid.name));
  };
  let a, b;

  if (arc.id === "titlechase") {
    a = champ;                                       // reigning champion, chased
    b = pickFrom(topHalf.slice(1).length ? topHalf.slice(1) : roster.slice(1), a);
  } else if (arc.id === "mentor") {
    a = pick(topHalf);                               // established veteran
    b = pickFrom(botHalf, a);                        // rookie from lower card
  } else if (arc.id === "stable") {
    a = pick(roster.slice(0, Math.min(3, n)));       // powerful faction leader (top 3)
    b = pickFrom(mid, a);                            // credible lone challenger
  } else if (arc.id === "respect") {
    const pool = shuffle(topHalf.length >= 2 ? topHalf : roster);
    a = pool[0]; b = pool[1];                        // two upper-card equals
  } else if (arc.id === "invasion") {
    a = pick(roster.slice(0, Math.min(4, n)));       // invasion leader (upper card)
    b = pickFrom(topHalf, a);                        // the roster's rallying hero
  } else if (arc.id === "monster") {
    a = pick(roster.slice(0, Math.min(3, n)));       // the dominant monster
    b = pickFrom(mid, a);                            // the challenger who topples him
  } else if (arc.id === "comeback") {
    a = pick(topHalf);                               // the aggressor who caused the injury
    b = pickFrom(roster, a);                         // the returning avenger
  } else if (arc.id === "tournament" || arc.id === "dreammatch") {
    const pool = shuffle(topHalf.length >= 2 ? topHalf : roster);
    a = pool[0]; b = pool[1];                        // two marquee names
  } else if (arc.id === "stakes") {
    const pool = shuffle(roster);                    // any two credible rivals
    a = pool[0]; b = pool[1];
  } else { // tagsplit: two mid-card peers
    const peers = shuffle(mid.length >= 2 ? mid : roster);
    a = peers[0]; b = peers[1];
  }

  // final guarantee: two distinct wrestlers, preserving `a`'s role
  if (!distinct(a, b)) b = pickFrom(roster, a);
  if (!distinct(a, b)) { const cast = shuffle(roster).slice(0, 2); a = cast[0]; b = cast[1]; }
  return { arc: arc.id, name: arc.name, a: a.name, b: b.name, stage: 0 };
}
function angleLine(angle) {
  const arc = ANGLE_ARCS.find(x => x.id === angle.arc);
  if (!arc) return "";
  const st = arc.stages[Math.min(angle.stage, arc.stages.length - 1)];
  return st(angle.a, angle.b);
}
// Pick a believable NPC tag-champion pair for the leaderboard display. This must
// NOT reuse people the world is currently telling a conflicting story about:
// - the singles champion (roster[0]) holds the individual belt, not the tag straps
// - the two principals of the running angle may be FEUDING each other, so a
//   "unified tag team" of those two would contradict the storyline on screen.
// Deterministic (index-based) so it doesn't flicker as the board re-sorts.
function displayTagChamps(roster, angle) {
  if (!roster || roster.length < 3) return null;
  const blocked = new Set();
  if (roster[0]) blocked.add(roster[0].name);          // singles champ
  if (angle) { if (angle.a) blocked.add(angle.a); if (angle.b) blocked.add(angle.b); } // active feud principals
  const pool = roster.filter(w => w && !blocked.has(w.name));
  if (pool.length >= 2) return [pool[0], pool[1]];
  // not enough clean names: fall back to the strongest two who at least aren't
  // feuding each other in the current angle
  const noFeud = roster.filter(w => w && !(angle && (w.name === angle.a || w.name === angle.b)));
  if (noFeud.length >= 2) return [noFeud[0], noFeud[1]];
  return null; // nothing coherent to show; caller omits the tag row
}
// Build a short undercard: 2-3 quick results between roster members, plus the
// current angle beat. Records are nudged so the world's W-L actually shifts.
function buildCardReport(roster, angle) {
  const pool = shuffle(roster.filter(r => r.name !== (angle && angle.a) && r.name !== (angle && angle.b)));
  const rankOf = (w) => roster.findIndex(r => r.name === w.name); // lower index = stronger
  const results = [];
  for (let i = 0; i + 1 < pool.length && results.length < 2; i += 2) {
    const win = pool[i], lose = pool[i + 1];
    const upset = rankOf(win) > rankOf(lose) + 1; // a clearly lower-ranked wrestler won
    const evenStyles = ["put on a clinic", "won clean after a war", "hit the finish out of nowhere", "survived a late comeback", "edged a barnburner"];
    const upsetStyles = ["pulled off a shock upset", "stunned the favourite", "stole one with a handful of tights", "scored the upset of the night"];
    results.push(`${win.name} ${pick(upset ? upsetStyles : evenStyles)} over ${lose.name}.`);
  }
  return results;
}

// Simulate a full week of the promotion's OWN shows: pair the roster up, decide
// results weighted by overall (stronger tends to win, upsets happen), and let a
// few wrestlers cut a hot or cold promo. Everything feeds the points standing so
// the leaderboard genuinely moves week to week. Returns { roster, feed }.
function simulateWeek(roster, playerResult) {
  if (!roster || !roster.length) return { roster, feed: [] };
  const next = roster.map(w => ({ ...w, form: (w.form || []).slice() }));
  const feed = [];
  const idx = shuffle(next.map((_, i) => i));
  for (let i = 0; i + 1 < idx.length; i += 2) {
    const A = next[idx[i]], B = next[idx[i + 1]];
    const pA = 1 / (1 + Math.pow(10, ((B.over || 40) - (A.over || 40)) / 22));
    const aWins = Math.random() < pA;
    const win = aWins ? A : B, lose = aWins ? B : A;
    const upset = (win.over || 40) < (lose.over || 40) - 6;
    win.wins += 1; win.points += upset ? 5 : 3; win.form.unshift("W");
    lose.losses += 1; lose.points -= upset ? 1 : 2; lose.form.unshift("L");
    win.form = win.form.slice(0, 5); lose.form = lose.form.slice(0, 5);
    if (upset) feed.push(`${win.name} shocked ${lose.name} in an upset.`);
  }
  const talkers = shuffle(next).slice(0, 3);
  talkers.forEach(w => {
    const promoSkill = (w.skills && w.skills.charisma) || 40;
    const good = Math.random() < (0.4 + promoSkill / 200);
    if (good) { w.points += 2; if (chance(0.4)) feed.push(`${w.name} cut a promo that brought the house down.`); }
    else { w.points -= 2; if (chance(0.3)) feed.push(`${w.name} lost the crowd with a flat promo.`); }
  });
  if (playerResult && playerResult.name) {
    const me = next.find(w => w.name === playerResult.name);
    if (me) {
      if (playerResult.won) { me.wins += 1; me.points += 4; me.form.unshift("W"); }
      else { me.losses += 1; me.points -= 2; me.form.unshift("L"); }
      me.form = me.form.slice(0, 5);
    }
  }
  next.sort((a, b) => (b.points || 0) - (a.points || 0));
  return { roster: next, feed: feed.slice(0, 3) };
}

// THE PLAYER'S FEUD — the spine of a career. A rival from your promotion targets
// you (or you target them), and the feud builds over weeks through beats you
// choose: promos, sneak attacks, costing them matches. A heat meter tracks how
// hot the rivalry is; when it peaks you get a marquee blow-off with real stakes.
// Stages: 0 spark -> 1 build -> 2 escalation -> 3 signed (ready for blow-off).
// ============================================================
const FEUD_SPARKS = [

// The player chooses how to advance each week. Each move shifts heat and can
// carry a consequence. skill = which stat helps it land.
const FEUD_MOVES = [
  { id:"promo",  label:"Cut a promo on them",    icon:"mic",    skill:"charisma", heat:14, desc:"Get on the mic and make it personal. Lands harder with charisma." },
  { id:"attack", label:"Jump them after a match",icon:"bolt",   skill:"strength", heat:20, desc:"A statement beatdown. Big heat, but they'll want revenge." },
  { id:"cost",   label:"Cost them a match",      icon:"shield", skill:"tech",     heat:16, desc:"Interfere and cost your rival a win. Cheap, effective, personal." },
  { id:"mind",   label:"Play mind games",        icon:"swords", skill:"promo",    heat:11, desc:"Get in their head. Lower risk, steady build." },

function feudSparkLine(rivalName) { return pick(FEUD_SPARKS)(rivalName); }
// Apply a chosen move: returns { heat, note, backfired }.
function resolveFeudMove(move, wr, rival) {
  const skillVal = (wr.skills && wr.skills[move.skill]) || 40;
  const rivalStr = (rival && rival.over) || 45;
  // higher skill = better chance the move lands cleanly; a strong rival can turn it around
  const landChance = clamp(0.45 + skillVal/160 - rivalStr/300, 0.15, 0.92);
  const landed = Math.random() < landChance;
  let heat = move.heat;
  let note, backfired = false;
  if (move.id === "respect") {
    note = `You cool the feud a touch. ${rival.name} gives you a grudging nod. It'll mean more when it reignites.`;
  } else if (landed) {
    const lines = {
      promo:  `You cut a scorching promo on ${rival.name}. The crowd is eating out of your hand.`,
      attack: `You blindside ${rival.name} and stand tall. The building is buzzing.`,
      cost:   `You cost ${rival.name} his match. He's furious, and everyone saw it.`,
      mind:   `Your mind games rattle ${rival.name}. He's not thinking straight.`,
    };
    note = lines[move.id];
    heat = Math.round(heat * 1.15);
  } else {
    backfired = true;
    heat = Math.round(heat * 0.4);
    const lines = {
      promo:  `${rival.name} out-talks you and turns the crowd. That one stung.`,
      attack: `${rival.name} sees the attack coming and drops you instead. Bad look.`,
      cost:   `Your interference backfires; ${rival.name} adapts and wins anyway.`,
      mind:   `${rival.name} shrugs off your mind games and smirks. He's unbothered.`,
    };
    note = lines[move.id];
  }
  return { heat, note, backfired };
}

// Resolve one promo beat: skill vs the line's demand decides how hot it lands.
function resolvePromoLine(line, wr) {
  const skillVal = (wr.skills && wr.skills[line.skill]) || 40;
  const roll = skillVal + rand(-18, 18);

  return { landed, heat, note: line.line + (landed ? "" : " ...but it doesn't quite land.") };

// fetches into it on open, and every save writes through to it so the UI stays
// instant. null means "empty or not yet loaded".
let SAVE_STORE = [null, null, null];

// ---------- persistent save backend (Vercel + Upstash via /api/saves) ----------
// A stable per-device id so saves follow one player across sessions. Stored in
// localStorage so it survives fully closing and reopening the app (the URL hash
// does NOT survive that). Falls back to the hash, then a guest id, if storage
// is blocked, so the id is always defined.
const UID_KEY = "ptp2:uid";
function getUserId() {
  // 1) localStorage: the durable home for the id
  try {
    const saved = window.localStorage.getItem(UID_KEY);
    if (saved) return saved;
  } catch (e) {}
  // 2) an id already in the URL hash (e.g. a shared link) — reuse it
  let id = null;
  try {
    const m = (window.location.hash || "").match(/u=([a-zA-Z0-9_-]{6,})/);
    if (m) id = m[1];
  } catch (e) {}
  // 3) otherwise mint a fresh one
  if (!id) id = "p" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
  // persist it everywhere we can for next time
  try { window.localStorage.setItem(UID_KEY, id); } catch (e) {}
  try {
    if (!/u=[a-zA-Z0-9_-]{6,}/.test(window.location.hash || "")) {
      window.location.hash = (window.location.hash ? window.location.hash + "&" : "") + "u=" + id;
    }
  } catch (e) {}
  return id;
}
const USER_ID = getUserId();

// Thin client over the serverless endpoint. Every call is wrapped so a network
// failure surfaces as a handled error, never an unhandled rejection.
// Local persistence fallback. The server (/api/saves) is the primary store when
// it works, but we ALWAYS mirror to localStorage so a missing or misbehaving
// endpoint never leaves the player unable to save. Keyed per user + slot.
// Two keys per slot: one namespaced to the user id, and one device-stable key
// that never changes. We write both and read whichever exists, so a save can
// never be orphaned by an id change between sessions.
const LS_KEY = (slot) => `ptp2:${USER_ID}:save:${slot}`;
const LS_KEY_STABLE = (slot) => `ptp2:device:save:${slot}`;
const LocalSave = {
  read(slot) {
    try {
      const v = window.localStorage.getItem(LS_KEY(slot)) || window.localStorage.getItem(LS_KEY_STABLE(slot));
      return v ? JSON.parse(v) : null;
    } catch (e) { return null; }
  },
  write(slot, payload) {
    let ok = false;
    try { window.localStorage.setItem(LS_KEY(slot), JSON.stringify(payload)); ok = true; } catch (e) {}
    try { window.localStorage.setItem(LS_KEY_STABLE(slot), JSON.stringify(payload)); ok = true; } catch (e) {}
    return ok;
  },
  remove(slot) {
    try { window.localStorage.removeItem(LS_KEY(slot)); } catch (e) {}
    try { window.localStorage.removeItem(LS_KEY_STABLE(slot)); } catch (e) {}
    return true;
  },
};

const SaveAPI = {
  // Try the server; whatever happens, localStorage is the source of truth the
  // player can always rely on. Returns { ok, server } so callers can message.
  async load(slot) {
    const local = LocalSave.read(slot);
    try {
      const r = await fetch(`/api/saves?user=${USER_ID}&slot=${slot}`);
      if (r.ok) { const data = await r.json(); if (data && data.save) return data.save; }
    } catch (e) { /* offline or no endpoint: fall back to local */ }
    return local;
  },
  async save(slot, payload) {
    const localOk = LocalSave.write(slot, payload);
    let serverOk = false;
    try {
      const r = await fetch(`/api/saves?user=${USER_ID}&slot=${slot}`, {
        method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload),
      });
      serverOk = r.ok;
    } catch (e) { /* server unavailable, local write still succeeded */ }
    return { ok: localOk || serverOk, server: serverOk };
  },
  async remove(slot) {
    LocalSave.remove(slot);
    try { await fetch(`/api/saves?user=${USER_ID}&slot=${slot}`, { method: "DELETE" }); } catch (e) {}
    return true;
  },
};

  }, [match]);

  useEffect(() => {

  // ---------- ensure a roster exists for a promotion ----------
  function ensureWorld(id) {
    setWorlds(w => w[id] ? w : { ...w, [id]: buildRoster(id) });
  }

  // ---------- SAVE / LOAD ----------
  function gatherState() {
    return { wr, cash, rep, morale, health, week, promoId, titles, tagTitles, prestige, history, feuds, settledRivals, allies, worlds, news, angle, feud, ally, betrayalWatch };
  }
  // Pull all three slots from the server into the local cache. Called when the
  // Saves screen opens so previews render from the cache without per-slot waits.
  async function fetchAllSlots() {
    setSlotsLoading(true);
    try {
      const results = await Promise.all([0,1,2].map(i =>
        SaveAPI.load(i).catch(() => SAVE_STORE[i]) // keep cached value if one slot fails
      ));
      SAVE_STORE = results;
    } finally {
      setSlotsLoading(false);
      setSaveTick(t => t + 1);
    }
  }

  async function saveToSlot(i) {
    if (slotBusy !== null) return;
    setSlotBusy(i);
    const payload = serializeState(gatherState());
    try {
      const res = await SaveAPI.save(i, payload);
      SAVE_STORE[i] = payload;               // write through to the cache
      setSaveTick(t => t + 1);
      if (res.ok) setMsg({ tone:"mint", text:`Career saved to slot ${i + 1}.${res.server ? "" : " (Saved on this device.)"}` });
      else setMsg({ tone:"pink", text:"Could not save. Your browser may be blocking storage." });
    } catch (e) {
      setMsg({ tone:"pink", text:"Something went wrong saving. Try again." });
    } finally {
      setSlotBusy(null);
    }
  }

  async function loadFromSlot(i) {
    if (slotBusy !== null) return;
    setSlotBusy(i);
    let s;
    try {
      s = await SaveAPI.load(i);
      SAVE_STORE[i] = s;
    } catch (e) {
      setSlotBusy(null);
      setMsg({ tone:"pink", text:"Could not reach the save server. Check your connection and try again." });
      return;
    }
    setSlotBusy(null);
    // Validate the essential shape. A save missing its wrestler or skills is
    // unusable, so we refuse rather than crash. Every other field is coerced
    // to a safe default, which keeps older or partial saves loadable.
    if (!s || !s.wr || !s.wr.skills) {
      setMsg({ tone:"pink", text:"That save is empty or damaged and cannot be loaded." });
      return;
    }
    const num = (v, d) => (typeof v === "number" && isFinite(v)) ? v : d;
    const arr = (v) => Array.isArray(v) ? v : [];
    const validPromo = promoById(s.promoId) ? s.promoId : "backyard";
    // heal older careers that predate the arsenal feature
    const healedWr = s.wr ? { ...s.wr,
      finisher: s.wr.finisher || seedFinisher(s.wr.name || "debut"),
      moves: s.wr.moves || seedArsenal((s.wr.name || "debut") + (s.wr.gimmick || "")) } : s.wr;
    setWr(healedWr);
    setCash(num(s.cash, 200));
    setRep(num(s.rep, 0));
    setMorale(clamp(num(s.morale, 70), 0, 100));
    setHealth(clamp(num(s.health, 100), 0, 100));
    setWeek(clamp(num(s.week, 1), 1, maxWeeks));
    setPromoId(validPromo);
    setTitles(arr(s.titles));
    setTagTitles(arr(s.tagTitles));
    setPrestige(num(s.prestige, 0));
    setHistory(arr(s.history));
    setFeuds(arr(s.feuds));
    setSettledRivals(arr(s.settledRivals));
    setAllies(num(s.allies, 0));
